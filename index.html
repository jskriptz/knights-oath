// ── Dice Helpers ──────────────────────────────────────
function rollDice(sides){return Math.floor(Math.random()*sides)+1}
function rollDamage(expr){
  // Parse "1d8+3", "2d6+4", "2d8", etc.
  const m=expr.match(/(\d+)d(\d+)(?:\+(\d+))?/);
  if(!m)return parseInt(expr)||0;
  let total=0;for(let i=0;i<parseInt(m[1]);i++)total+=rollDice(parseInt(m[2]));
  return total+(parseInt(m[3])||0);
}

// ── Combat Narration — per-scene DM prose ────────────
let COMBAT_NARRATION={};

let COMBAT_OUTCOMES={};

// ── Combat Box ────────────────────────────────────────
function parseCombatBox(text){
  const lines=text.split('\n');
  const enemies=[];const rounds=[];const companions={};
  let statBlock='',afterFight='',winOutcome='',loseOutcome='';
  let section='top';let roundNum=0;let currentRound=null;
  const rewards={xp:0,gold:0,items:[]};

  // Parse enemy attacks from stat line: "Scimitar +4 (1d6+2)" or "Longsword +4, 1d8+2 slashing"
  function parseAttacks(line){
    const attacks=[];
    // Match patterns like: Name +N (NdN+N) or Name +N, NdN+N type
    const atkRegex=/(\w[\w\s]*?)\s*\+(\d+)[\s,]*(?:\()?(\d+d\d+(?:\+\d+)?)(?:\s*(piercing|slashing|bludgeoning|radiant|poison|fire|thunder|lightning|acid|necrotic|force))?/gi;
    let m;
    while((m=atkRegex.exec(line))!==null){
      const name=m[1].trim();
      // Determine melee vs ranged
      const isRanged=/range|bow|crossbow|javelin|thrown/i.test(line.substring(Math.max(0,m.index-30),m.index+m[0].length+50));
      const reachM=line.match(/reach/i);
      attacks.push({
        name:name,bonus:parseInt(m[2]),damage:m[3],
        type:isRanged?'ranged':'melee',
        reach:isRanged?80:(reachM?10:5)
      });
    }
    return attacks;
  }

  // Parse specials from enemy line
  function parseSpecials(line){
    const specials=[];
    const specialPatterns=[
      /Death Throes[:\s]*([^.]+\.)/i,
      /Nimble Escape[:\s]*([^.]+\.)/i,
      /Relentless[:\s]*([^.]+\.)/i,
      /Charge[:\s]*([^.]+\.)/i,
      /Redirect Attack[:\s]*([^.]+\.)/i,
      /Multi-attack[:\s]*([^.]+\.)/i,
      /Lick Blade[:\s]*([^.]+\.)/i,
      /Formation[:\s]*([^.]+\.)/i,
      /Pack Tactics[:\s]*([^.]+\.)/i,
      /Observant[:\s]*([^.]+\.?)/i,
      /Burning Hands[:\s]*([^.]+\.)/i,
      /Lightning Bolt[:\s]*([^.]+\.)/i
    ];
    for(const pat of specialPatterns){
      const sm=line.match(pat);
      if(sm)specials.push(sm[0].trim());
    }
    return specials;
  }

  for(const line of lines){
    const l=line.trim();if(!l)continue;

    // Detect enemies from new format: **Name (count):** AC N, HP N ...
    const enemyM=l.match(/\*\*(.+?)(?:\s*\((\d+)\))?(?:\s*x(\d+))?:\*\*\s*AC\s*(\d+)(?:\s*\([^)]*\))?,\s*HP\s*(\d+)/);
    if(enemyM){
      const count=parseInt(enemyM[2]||enemyM[3])||1;
      const attacks=parseAttacks(l);
      const specials=parseSpecials(l);
      for(let i=0;i<count;i++){
        enemies.push({
          name:enemyM[1].trim()+(count>1?' '+(i+1):''),
          ac:parseInt(enemyM[4]),maxHp:parseInt(enemyM[5]),hp:parseInt(enemyM[5]),
          attacks:attacks.length?attacks:[{name:'Attack',bonus:3,damage:'1d6+2',type:'melee',reach:5}],
          specials:specials,zone:'close'
        });
      }
      statBlock+=l+'\n';continue;
    }

    // Also detect "• Name xN:" or bullet-point enemy format
    const bulletEnemy=l.match(/[•\-]\s*(.+?)\s*x(\d+):\s*AC\s*(\d+),\s*HP\s*(\d+)/);
    if(bulletEnemy){
      const count=parseInt(bulletEnemy[2]);
      const attacks=parseAttacks(l);
      const specials=parseSpecials(l);
      for(let i=0;i<count;i++){
        enemies.push({
          name:bulletEnemy[1].trim()+(count>1?' '+(i+1):''),
          ac:parseInt(bulletEnemy[3]),maxHp:parseInt(bulletEnemy[4]),hp:parseInt(bulletEnemy[4]),
          attacks:attacks.length?attacks:[{name:'Attack',bonus:3,damage:'1d6+2',type:'melee',reach:5}],
          specials:specials,zone:'close'
        });
      }
      statBlock+=l+'\n';continue;
    }

    // Single enemy without count: "• Baaz Draconian: AC 13, HP 14"
    const singleEnemy=l.match(/[•\-]\s*(.+?):\s*AC\s*(\d+),\s*HP\s*(\d+)/);
    if(singleEnemy&&!l.match(/^\|/)&&section==='top'){
      const attacks=parseAttacks(l);
      const specials=parseSpecials(l);
      enemies.push({
        name:singleEnemy[1].trim(),
        ac:parseInt(singleEnemy[2]),maxHp:parseInt(singleEnemy[3]),hp:parseInt(singleEnemy[3]),
        attacks:attacks.length?attacks:[{name:'Attack',bonus:3,damage:'1d6+2',type:'melee',reach:5}],
        specials:specials,zone:'close'
      });
      statBlock+=l+'\n';continue;
    }

    // Detect round headers: "ROUND N" or "NARRATIVE COMBAT — ROUND N"
    const roundM=l.match(/(?:NARRATIVE COMBAT\s*[\u2014\-]+\s*)?ROUND\s*(\d+)/i);
    if(roundM){
      if(currentRound)rounds.push(currentRound);
      roundNum=parseInt(roundM[1]);
      currentRound={num:roundNum,situation:'',text:l};
      section='round';continue;
    }

    // Detect win outcome
    if(/^(?:\*\*)?(?:Victory|WIN|VICTORY)[:\s]/i.test(l)){
      winOutcome+=l.replace(/^\*\*(?:Victory|WIN|VICTORY)[:\s]?\*\*\s*/i,'')+'\n';
      section='win';continue;
    }
    if(section==='win'&&!l.startsWith('**')){winOutcome+=l+'\n';continue}
    if(section==='win'&&l.startsWith('**')){section='top'}

    // Parse rewards line (Rewards: XX XP. Items.) or **XP:** XX XP or Record: XP earned: XX XP
    if(/^Rewards?:/i.test(l)||/^\*\*XP:?\*\*/i.test(l)||/Record:.*XP/i.test(l)){
      // For "Rewards: 60 XP" take the single value; for "**XP:** 10 per goblin. 15 for boss." sum all values up to 200
      const xpAll=[...l.matchAll(/(\d+)\s*XP/gi)];if(xpAll.length===1){rewards.xp+=parseInt(xpAll[0][1])}else if(xpAll.length>1){let total=0;xpAll.forEach(m=>{const n=parseInt(m[1]);if(n&&n<=200)total+=n});rewards.xp+=Math.min(total,300)}
      const goldM=l.match(/(\d+)\s*stl/i);if(goldM)rewards.gold+=parseInt(goldM[1]);
      // Extract inventory items marked with (inventory item)
      const itemMs=l.matchAll(/([A-Z][\w\s'-]+?)\s*\(inventory item\)/gi);
      for(const im of itemMs){rewards.items.push(im[1].trim())}
      continue;
    }

    // Detect lose outcome
    if(/^(?:\*\*)?(?:Fallen|LOSE|DEFEAT|DEFEATED)[:\s(]/i.test(l)){
      loseOutcome+=l.replace(/^\*\*(?:Fallen|LOSE|DEFEAT|DEFEATED)[\s:(]?\*\*\s*/i,'')+'\n';
      section='lose';continue;
    }
    if(section==='lose'&&!l.startsWith('**')){loseOutcome+=l+'\n';continue}
    if(section==='lose'&&l.startsWith('**')){section='top'}

    // Detect companion actions table
    const compM=l.match(/^\|\s*(\w[\w\s]*?)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*\|$/);
    if(compM&&compM[1]!=='Companion'&&compM[1]!=='---'){
      const name=compM[1].trim();
      companions[name]=[compM[2].trim(),compM[3].trim(),compM[4].trim()].filter(a=>a&&a!=='\u2014');
      continue;
    }

    // Detect companion actions in non-table format: **Name:** A) ... B) ... C) ...
    const compBlock=l.match(/^\*\*(?:\(If\s+)?(\w+)\)?(?:\s*\(if present\))?:\*\*$/i);
    if(compBlock){
      // Next lines should have A) B) C) actions — but we handle inline
      continue;
    }
    // Inline companion actions: **Aldric:** A) Flank (+1 attack) | B) Shield Wall (+1 AC)
    const compInline=l.match(/^\*\*(?:\(If\s+)?(\w+)\)?(?:\s*\(if present\))?:\*\*\s*(?:A\))\s*(.+)/i);
    if(compInline){
      const cname=compInline[1].trim();
      const actionText=compInline[2];
      const acts=[];
      const actParts=l.replace(/^\*\*[^*]+\*\*\s*/,'').split(/\s*\|\s*(?=[A-C]\))/);
      for(const part of actParts){
        const am=part.match(/^[A-C]\)\s*(.+)/);
        if(am)acts.push(am[1].trim());
      }
      if(acts.length)companions[cname]=acts;
      continue;
    }

    // After the fight
    if(l.includes('AFTER THE FIGHT')){section='after';afterFight+=l+'\n';continue}
    if(section==='after'){afterFight+=l+'\n';continue}

    // Situation prose in rounds (italic text or plain prose paragraphs)
    if(section==='round'&&currentRound){
      if(l.startsWith('*')&&!l.startsWith('**')){
        currentRound.situation+=l.replace(/^\*|\*$/g,'')+' ';continue;
      }
      // Also capture non-bold, non-header prose as situation
      if(!l.startsWith('**')&&!l.startsWith('|')&&!l.startsWith('>')&&!l.match(/^[A-Z]\)/)){
        currentRound.situation+=l+' ';continue;
      }
    }
    if(section==='top')statBlock+=l+'\n';
  }
  if(currentRound)rounds.push(currentRound);

  // Default: if no rounds parsed, create one generic round per enemy pair
  if(rounds.length===0&&enemies.length>0){
    const numRounds=Math.max(1,Math.ceil(enemies.reduce((s,e)=>s+e.maxHp,0)/15));
    for(let i=0;i<Math.min(numRounds,5);i++){
      rounds.push({num:i+1,situation:i===0?'The enemy is before you.':'The fight continues.',text:''});
    }
  }

  // Extract XP/gold/items from afterFight or winOutcome if not already in rewards
  if(rewards.xp===0){
    const xpSrc=(afterFight||'')+(winOutcome||'');
    const xpLines=xpSrc.match(/(\d+)\s*XP/gi);
    if(xpLines){let total=0;xpLines.forEach(m=>{const n=parseInt(m);if(n&&n<=200)total+=n});if(total>0)rewards.xp=Math.min(total,300)}
    if(rewards.gold===0){const goldM=xpSrc.match(/(\d+)\s*stl/i);if(goldM)rewards.gold+=parseInt(goldM[1])}
    const itemMs=xpSrc.matchAll(/([A-Z][\w\s'-]+?)\s*\(inventory item\)/gi);
    for(const im of itemMs){rewards.items.push(im[1].trim())}
  }
  return{enemies,rounds,companions,statBlock,afterFight,winOutcome:winOutcome.trim(),loseOutcome:loseOutcome.trim(),rewards};
}

// ── Combat Box (5e 2024) ─────────────────────────────────
function CombatBox({text,gs,derived,onStateUpdate,sceneId}){
  const e=React.createElement;
  const parsed=React.useMemo(()=>parseCombatBox(text),[text]);
  const narr=COMBAT_NARRATION[sceneId]||null;
  const[narratorText,setNarratorText]=useState('');
  const narrUsed=React.useRef({});

  // Pick a narration line from an array, avoiding repeats
  const pickNarr=(arr)=>{
    if(!arr||!arr.length)return'';
    const key=arr[0].substring(0,20);
    const used=narrUsed.current[key]||[];
    const available=arr.filter((_,i)=>!used.includes(i));
    const pool=available.length?available:arr;
    const idx=arr.indexOf(pool[Math.floor(Math.random()*pool.length)]);
    narrUsed.current[key]=[...used,idx].slice(-Math.ceil(arr.length/2));
    return pool[Math.floor(Math.random()*pool.length)];
  };

  // Build narrator text from combat events
  const updateNarrator=(events)=>{
    if(!narr)return;
    const lines=[];
    // Round start
    if(events.roundStart!==undefined){
      const rs=narr.roundStart;
      if(rs)lines.push(rs[Math.min(events.roundStart-1,rs.length-1)]);
    }
    // Player attack result
    if(events.playerCrit)lines.push(pickNarr(narr.playerCrit));
    else if(events.playerHit)lines.push(pickNarr(narr.playerHit));
    else if(events.playerMiss)lines.push(pickNarr(narr.playerMiss));
    // Enemy state changes
    if(events.enemyDeath)lines.push(pickNarr(narr.enemyDeath));
    else if(events.relentless&&narr.relentless)lines.push(narr.relentless);
    else if(events.enemyNearDeath)lines.push(pickNarr(narr.enemyNearDeath));
    else if(events.enemyBloodied)lines.push(pickNarr(narr.enemyBloodied));
    // Player hit by enemy
    if(events.playerDowned)lines.push(pickNarr(narr.playerDowned));
    else if(events.playerHurtBad)lines.push(pickNarr(narr.playerHurtBad));
    else if(events.playerHurt_scar)lines.push(pickNarr(narr.playerHit_scar));
    else if(events.playerHurt)lines.push(pickNarr(narr.playerHurt));
    // Enemy miss
    if(events.enemyMissPlayer)lines.push(narr.enemyMissPlayer||'');
    // Enemy hits/misses companion
    if(events.enemyHitCompanion){
      const name=events.enemyHitCompanion;
      const first=(name.match(/^(\w+)/)||[])[1];
      const pool=narr.enemyHitCompanion;
      if(pool)lines.push(pool[first]||pool.generic||'');
    }
    if(events.enemyMissCompanion){
      const name=events.enemyMissCompanion;
      const first=(name.match(/^(\w+)/)||[])[1];
      const pool=narr.enemyMissCompanion;
      if(pool)lines.push(pool[first]||pool.generic||'');
    }
    // Companion actions
    if(events.companionActs&&narr.companionActs){
      for(const key of events.companionActs){
        if(narr.companionActs[key])lines.push(narr.companionActs[key]);
      }
    }
    if(lines.length)setNarratorText(lines.filter(l=>l).join(' '));
  };

  // Resolve companion names: filter by party membership
  const resolvedCompanions=React.useMemo(()=>{
    const comps=gs.companions||[];
    const has=n=>comps.some(c=>c.toLowerCase().includes(n.toLowerCase()));
    const resolved={};
    for(const[name,actions]of Object.entries(parsed.companions)){
      const ifPresent=name.match(/^(.+?)\s*\(if present\)/i);
      if(ifPresent){
        if(has(ifPresent[1].trim()))resolved[ifPresent[1].trim()]=actions;
        continue;
      }
      if(/other squire|another squire|fellow squire/i.test(name)){
        const listed=Object.keys(parsed.companions).map(n=>(n.match(/^(\w+)/)||[])[1]?.toLowerCase());
        const available=comps.find(c=>!listed.includes(c.toLowerCase()));
        resolved[available||name]=actions;
        continue;
      }
      const firstName=(name.match(/^(\w+)/)||[])[1];
      if(firstName&&has(firstName)){resolved[name]=actions}
      else if(!comps.length||!firstName){resolved[name]=actions}
    }
    return resolved;
  },[parsed.companions,gs.companions]);

  // Get the correct ability modifier for a weapon (STR for melee, DEX for ranged, best of both for Finesse)
  const getWeaponAbilMod=(w)=>{
    const isFinesse=/finesse/i.test(w.props||'');
    const isRanged=w.type==='ranged';
    return isRanged?derived.dexMod:(isFinesse?Math.max(derived.strMod,derived.dexMod):derived.strMod);
  };
  const getWeaponAttackBonus=(w)=>getWeaponAbilMod(w)+derived.profBonus;
  const getWeaponDamageExpr=(w)=>{const m=getWeaponAbilMod(w);const baseDie=w.dmg?w.dmg.replace(/\s*(slash|pierce|bludg).*/i,'').trim():'1d8';return baseDie+'+'+ m};

  // Get weapon data for player
  const getWeaponData=(weaponName)=>{
    // Pig Skewer: inherits stats from base weapon + flavor
    if(weaponName==='Pig Skewer'&&gs.flags&&gs.flags.pigSkewerBase){
      const base=WEAPONS_WITH_MASTERY.find(x=>x.name===gs.flags.pigSkewerBase);
      if(base){
        const isRanged=/bow|crossbow/i.test(base.name)||/thrown/i.test(base.props);
        const hasReach=/reach/i.test(base.props);
        return{...base,name:'Pig Skewer',pigSkewer:true,type:isRanged?'ranged':'melee',reach:isRanged?80:(hasReach?10:5)};
      }
    }
    const w=WEAPONS_WITH_MASTERY.find(x=>x.name===weaponName);
    if(!w)return{name:weaponName||'Unarmed',mastery:null,dmg:'1d4',props:'',type:'melee',reach:5};
    const isRanged=/bow|crossbow/i.test(w.name)||/thrown/i.test(w.props);
    const hasReach=/reach/i.test(w.props);
    return{...w,type:isRanged?'ranged':'melee',reach:isRanged?80:(hasReach?10:5)};
  };

  // Combat state machine
  const initCombat=()=>{
    const companionList=(gs.companions||[]).map(name=>{
      const first=(name.match(/^(\w+)/)||[])[1];
      const stats=COMPANION_COMBAT_STATS[first]||{ac:13,maxHp:12,attack:{name:'Attack',bonus:3,damage:'1d4+1',type:'melee',reach:5},zone:'close'};
      let actions=resolvedCompanions[name]||resolvedCompanions[first]||[];
      if(actions.length===0){
        actions=stats.defaultActions||['Attack (+3, 1d4+1)','Dodge (enemies have disadvantage)'];
      }
      return{name,hp:stats.maxHp,maxHp:stats.maxHp,ac:stats.ac,attack:stats.attack,actions,conditions:[],alive:true,zone:stats.zone,deathSaves:{success:0,fail:0},unconscious:false};
    });
    const enemyList=parsed.enemies.map((en,i)=>({
      ...en,currentHp:en.maxHp,conditions:[],alive:true,
      id:'enemy_'+i
    }));
    // Simple initiative: player first, then companions, then enemies
    const order=['player',...companionList.map(c=>c.name),...enemyList.map(e=>e.id)];
    return{
      phase:'playerTurn',round:1,
      enemies:enemyList,companions:companionList,
      initiativeOrder:order,currentTurnIndex:0,
      turnPhase:'action',hasActed:false,hasBonused:false,hasSurged:false,
      weaponSwappedThisTurn:false,
      activeWeapon:getWeaponData(gs.weapon),
      concentrating:null,conditions:[],
      log:[],result:null,selectedTarget:null,
      playerHp:gs.hp,playerMaxHp:derived.maxHp,playerAc:derived.ac,
      deathSaves:{success:0,fail:0},unconscious:false,
      companionActionsThisRound:{},
      vexTarget:null,helpTarget:null,dodging:false,
      localSpellSlots:gs.spellSlotsUsed||0,
      localSW:gs.secondWindUsed||0,
      localAS:gs.actionSurgeUsed||false,
      localLoH:gs.layOnHandsPool||0,
      localPotions:gs.potions||0,
      localBandages:gs.bandages||0,
      smiteUsedThisTurn:false,
      blessActive:false,blessRoundsLeft:0,
      shieldOfFaithActive:false,
      revealEnemyHp:false,
      reactionUsed:false
    };
  };

  const[mode,setMode]=useState('narrative');
  const[combat,setCombat]=useState(null);
  const[rolling,setRolling]=useState(false);
  const[rollDisplay,setRollDisplay]=useState(null);
  const[lastRollResult,setLastRollResult]=useState(null);
  const[healMode,setHealMode]=useState(null); // 'cureWounds' or 'layOnHands'

  // Sync combat resource usage to sidebar in real-time
  React.useEffect(()=>{
    if(!combat||!onStateUpdate)return;
    onStateUpdate(g=>({...g,spellSlotsUsed:combat.localSpellSlots,layOnHandsPool:combat.localLoH,secondWindUsed:combat.localSW,actionSurgeUsed:combat.localAS,potions:combat.localPotions,bandages:combat.localBandages}));
  },[combat?.localSpellSlots,combat?.localLoH,combat?.localSW,combat?.localAS,combat?.localPotions,combat?.localBandages]);

  // Start combat
  const startCombat=()=>{setCombat(initCombat());updateNarrator({roundStart:1})};

  // Dice animation helper
  // Check if all enemies are dead — if so, trigger immediate victory
  const checkVictory=(c)=>{
    if(c.enemies.every(e=>!e.alive)&&!c.result){
      c.result='win';
      c.log=[...c.log,{type:'result',text:'VICTORY \u2014 All enemies defeated!',round:c.round}];
    }
    return c;
  };

  const animateRoll=(callback)=>{
    setRolling(true);let c=0;
    const iv=setInterval(()=>{
      setRollDisplay(rollDice(20));
      if(++c>=10){clearInterval(iv);setRolling(false);callback()}
    },60);
  };

  // Roll dice expression and return total
  const rollExpr=(expr)=>{
    const m=expr.match(/(\d+)d(\d+)(?:\+(\d+))?/);
    if(!m)return parseInt(expr)||0;
    let total=0;for(let i=0;i<parseInt(m[1]);i++)total+=rollDice(parseInt(m[2]));
    return total+(parseInt(m[3])||0);
  };

  // Apply weapon mastery effect
  const applyMastery=(weapon,hit,target,damage,c)=>{
    if(!weapon.mastery)return{msg:null,extraDmg:0,c};
    // Check mastery proficiency: base weapon must be in gs.mastery
    const baseWeaponName=weapon.pigSkewer&&gs.flags&&gs.flags.pigSkewerBase?gs.flags.pigSkewerBase:weapon.name;
    if(!gs.mastery||!gs.mastery.includes(baseWeaponName))return{msg:null,extraDmg:0,c};
    const nc={...c};
    const mastery=weapon.mastery;

    if(mastery==='Graze'&&!hit){
      const grazeDmg=derived.strMod>0?derived.strMod:1;
      const tIdx=nc.enemies.findIndex(e=>e.id===target);
      if(tIdx>=0){nc.enemies=[...nc.enemies];nc.enemies[tIdx]={...nc.enemies[tIdx],currentHp:Math.max(0,nc.enemies[tIdx].currentHp-grazeDmg)};if(nc.enemies[tIdx].currentHp<=0)nc.enemies[tIdx].alive=false}
      return{msg:'GRAZE: '+grazeDmg+' damage (ability modifier)',extraDmg:0,c:nc};
    }
    if(!hit)return{msg:null,extraDmg:0,c:nc};

    if(mastery==='Sap'){
      const tIdx=nc.enemies.findIndex(e=>e.id===target);
      if(tIdx>=0){nc.enemies=[...nc.enemies];nc.enemies[tIdx]={...nc.enemies[tIdx],conditions:[...nc.enemies[tIdx].conditions,{name:'Sapped',duration:1}]}}
      return{msg:'SAP: Target has disadvantage on next attack',extraDmg:0,c:nc};
    }
    if(mastery==='Topple'){
      const dc=8+derived.profBonus+derived.strMod;
      const save=rollDice(20);
      if(save<dc){
        const tIdx=nc.enemies.findIndex(e=>e.id===target);
        if(tIdx>=0){nc.enemies=[...nc.enemies];nc.enemies[tIdx]={...nc.enemies[tIdx],conditions:[...nc.enemies[tIdx].conditions,{name:'Prone',duration:99}]}}
        return{msg:'TOPPLE: Enemy fails CON save ('+save+' vs DC '+dc+') \u2014 knocked prone!',extraDmg:0,c:nc};
      }
      return{msg:'TOPPLE: Enemy passes CON save ('+save+' vs DC '+dc+')',extraDmg:0,c:nc};
    }
    if(mastery==='Vex'){
      nc.vexTarget=target;
      return{msg:'VEX: Next attack vs this target has advantage',extraDmg:0,c:nc};
    }
    if(mastery==='Cleave'){
      const tIdx=nc.enemies.findIndex(e=>e.id===target);
      if(tIdx>=0&&nc.enemies[tIdx].currentHp<=0){
        const nextTarget=nc.enemies.find(e=>e.alive&&e.id!==target&&e.zone==='close');
        if(nextTarget){
          const cleaveRoll=rollDice(20)+getWeaponAttackBonus(weapon);
          const cleaveHit=cleaveRoll>=nextTarget.ac;
          if(cleaveHit){
            const cleaveDmg=rollExpr(getWeaponDamageExpr(weapon));
            const nIdx=nc.enemies.findIndex(e=>e.id===nextTarget.id);
            nc.enemies=[...nc.enemies];nc.enemies[nIdx]={...nc.enemies[nIdx],currentHp:Math.max(0,nc.enemies[nIdx].currentHp-cleaveDmg)};
            if(nc.enemies[nIdx].currentHp<=0)nc.enemies[nIdx].alive=false;
            return{msg:'CLEAVE! Free attack on '+nextTarget.name+': '+cleaveRoll+' vs AC '+nextTarget.ac+' \u2714 '+cleaveDmg+' damage!',extraDmg:0,c:nc};
          }
          return{msg:'CLEAVE! Free attack on '+nextTarget.name+': '+cleaveRoll+' vs AC '+nextTarget.ac+' \u2718 miss',extraDmg:0,c:nc};
        }
      }
      return{msg:null,extraDmg:0,c:nc};
    }
    if(mastery==='Nick'){
      return{msg:'NICK: Free offhand attack (no bonus action needed)',extraDmg:0,c:nc,nick:true};
    }
    if(mastery==='Push'){
      return{msg:'PUSH: Target pushed 10ft back',extraDmg:0,c:nc};
    }
    if(mastery==='Slow'){
      const tIdx=nc.enemies.findIndex(e=>e.id===target);
      if(tIdx>=0){nc.enemies=[...nc.enemies];nc.enemies[tIdx]={...nc.enemies[tIdx],conditions:[...nc.enemies[tIdx].conditions,{name:'Slowed',duration:1}]}}
      return{msg:'SLOW: Target speed reduced by 10ft',extraDmg:0,c:nc};
    }
    return{msg:null,extraDmg:0,c:nc};
  };

  // Player attack action
  const doPlayerAttack=(targetId)=>{
    animateRoll(()=>{
      setCombat(prev=>{
        let c={...prev};
        const target=c.enemies.find(e=>e.id===targetId);
        if(!target||!target.alive)return prev;

        // Roll attack
        let d20=rollDice(20);let d20b=null;
        // Advantage sources: Vex mastery, Help action, Prone (melee), Faerie Fire, Guiding Bolt, Flanking
        const isFlanked=c.companions.filter(cp=>cp.alive&&!cp.unconscious&&cp.engaged===targetId).length>=1;
        const hasAdvantage=(c.vexTarget===targetId)||(c.helpTarget===targetId)||(target.conditions.some(cd=>cd.name==='Prone')&&c.activeWeapon.type==='melee')||(target.conditions.some(cd=>cd.name==='Faerie Fire'||cd.name==='Guiding Bolt'))||isFlanked;
        // Disadvantage sources: Dodging, Restrained attacker, Blinded attacker
        const hasDisadvantage=target.conditions.some(cd=>cd.name==='Dodging');
        if(hasAdvantage&&!hasDisadvantage){d20b=rollDice(20);d20=Math.max(d20,d20b)}
        else if(hasDisadvantage&&!hasAdvantage){d20b=rollDice(20);d20=Math.min(d20,d20b)}
        // Clear help target after use
        if(c.helpTarget===targetId)c.helpTarget=null;

        // Companion bonuses
        let atkMod=c.attackBuff||0;c.attackBuff=0;
        const weapon=c.activeWeapon;
        const weapAtk=getWeaponAttackBonus(weapon);
        const weapDmg=getWeaponDamageExpr(weapon);

        // Bless
        let blessBonus=0;
        if(c.blessActive){blessBonus=rollDice(4)}

        // Exhaustion penalty (D&D 5e 2024: -1 per level to d20 rolls)
        const exhPenalty=gs?.derived?.exhaustionPenalty||0;
        const total=d20+weapAtk+atkMod+blessBonus-exhPenalty;
        const isCrit=d20===20;
        const isFumble=d20===1;
        const hit=isCrit||(total>=target.ac&&!isFumble);

        let dmg=0;let logMsg='';

        if(hit){
          dmg=rollExpr(weapDmg);
          if(isCrit)dmg+=rollExpr(weapDmg.replace(/\+.*$/,'')); // double dice on crit (no mod)
          // Bronwyn's bonus: +1 damage vs armoured targets (AC >= 13)
          if(gs&&gs.flags&&gs.flags.bronwyn_fix&&target.ac>=13)dmg+=1;
          // Apply damage
          const tIdx=c.enemies.findIndex(e=>e.id===targetId);
          c.enemies=[...c.enemies];c.enemies[tIdx]={...c.enemies[tIdx],currentHp:Math.max(0,c.enemies[tIdx].currentHp-dmg)};
          if(c.enemies[tIdx].currentHp<=0)c.enemies[tIdx].alive=false;
          const bronwynBonus=gs&&gs.flags&&gs.flags.bronwyn_fix&&target.ac>=13;
          logMsg='R'+c.round+' Attack: d20='+d20+(d20b!==null?' (adv/disadv: '+d20b+')':'')+' +'+weapAtk+(atkMod?'+'+atkMod:'')+(blessBonus?'+'+blessBonus+' bless':'')+(exhPenalty?'-'+exhPenalty+' exhaustion':'')+' = '+total+' vs AC '+target.ac+' \u2714 HIT'+(isCrit?' (CRITICAL!)':'')+' for '+dmg+' damage'+(bronwynBonus?' (incl. Bronwyn\u2019s +1)':'');
        }else{
          logMsg='R'+c.round+' Attack: d20='+d20+(d20b!==null?' (adv/disadv: '+d20b+')':'')+' +'+weapAtk+(atkMod?'+'+atkMod:'')+(blessBonus?'+'+blessBonus+' bless':'')+(exhPenalty?'-'+exhPenalty+' exhaustion':'')+' = '+total+' vs AC '+target.ac+' \u2718 MISS';
        }

        // Apply weapon mastery
        const masteryResult=applyMastery(weapon,hit,targetId,dmg,c);
        c=masteryResult.c;
        if(masteryResult.msg)logMsg+='. '+masteryResult.msg;

        // Clear vex if used
        if(c.vexTarget===targetId)c.vexTarget=null;

        c.log=[...c.log,{type:'attack',text:logMsg,round:c.round}];
        checkVictory(c);
        c.hasActed=true;
        c.turnPhase=c.result?'done':'bonus';
        c.selectedTarget=null;

        // Set last roll result for display
        setLastRollResult({d20,total,hit,dmg,isCrit,targetId:targetId,targetName:target.name,mastery:masteryResult.msg});
        setRollDisplay(d20);

        // Narrator update
        if(narr){
          const ev={};
          const tgt=c.enemies.find(en=>en.id===targetId);
          if(isCrit)ev.playerCrit=true;
          else if(hit)ev.playerHit=true;
          else ev.playerMiss=true;
          if(tgt&&!tgt.alive)ev.enemyDeath=true;
          else if(tgt&&tgt.currentHp<=1&&tgt.currentHp>0&&narr.relentless)ev.relentless=true;
          else if(tgt&&tgt.alive&&tgt.currentHp<=tgt.maxHp*0.25&&tgt.currentHp>0)ev.enemyNearDeath=true;
          else if(tgt&&tgt.alive&&tgt.currentHp<=tgt.maxHp*0.5&&tgt.currentHp>0)ev.enemyBloodied=true;
          updateNarrator(ev);
        }

        return c;
      });
    });
  };

  // Player dodge action
  const doPlayerDodge=()=>{
    setCombat(prev=>{
      const c={...prev};
      c.dodging=true;
      c.hasActed=true;c.turnPhase='bonus';
      c.log=[...c.log,{type:'action',text:'R'+c.round+' Dodge: Attacks against you have disadvantage until next turn',round:c.round}];
      return c;
    });
  };

  // Player help action — grants advantage on next attack against target
  const[helpMode,setHelpMode]=useState(false);
  const doPlayerHelp=(targetId)=>{
    setCombat(prev=>{
      const c={...prev};
      const target=c.enemies.find(e=>e.id===targetId);
      c.helpTarget=targetId;
      c.hasActed=true;c.turnPhase='bonus';
      c.log=[...c.log,{type:'action',text:'R'+c.round+' Help: You assist allies — next attack against '+(target?.name||'target')+' has advantage',round:c.round}];
      return c;
    });
    setHelpMode(false);
  };

  // Divine Smite (bonus action, after hit)
  const useSmite=()=>{
    const smiteTargetId=lastRollResult?.targetId;
    setRolling(true);let c=0;
    const iv=setInterval(()=>{
      setRollDisplay(rollDice(8)+' + '+rollDice(8));
      if(++c>=10){
        clearInterval(iv);setRolling(false);
        const dice=rollDice(8);const dice2=rollDice(8);const dmg=dice+dice2;
        setRollDisplay(dice+' + '+dice2+' = '+dmg);
        setCombat(prev=>{
          const nc={...prev};
          if(nc.localSpellSlots>=(derived.spellSlotsMax||0))return prev;
          // Target the enemy we just hit, fallback to first alive
          const target=smiteTargetId?nc.enemies.find(e=>e.id===smiteTargetId&&e.alive):nc.enemies.find(e=>e.alive);
          if(target){
            const tIdx=nc.enemies.findIndex(e=>e.id===target.id);
            nc.enemies=[...nc.enemies];nc.enemies[tIdx]={...nc.enemies[tIdx],currentHp:Math.max(0,nc.enemies[tIdx].currentHp-dmg)};
            if(nc.enemies[tIdx].currentHp<=0)nc.enemies[tIdx].alive=false;
          }
          nc.localSpellSlots+=1;nc.smiteUsedThisTurn=true;nc.hasBonused=true;nc.turnPhase='done';
          nc.log=[...nc.log,{type:'smite',text:'R'+nc.round+' Divine Smite on '+(target?target.name:'enemy')+': '+dice+'+'+dice2+' = '+dmg+' radiant damage!',round:nc.round}];
          checkVictory(nc);
          setLastRollResult(r=>({...r,smiteDmg:dmg,smiteDice:[dice,dice2],smiteTarget:target?target.name:'enemy'}));
          return nc;
        });
      }
    },60);
  };

  // Second Wind (bonus action)
  const useSecondWind=()=>{
    setCombat(prev=>{
      const c={...prev};
      if(c.localSW>=(derived.secondWindMax||2))return prev;
      const heal=rollExpr('1d10')+gs.level;
      c.playerHp=Math.min(c.playerMaxHp,c.playerHp+heal);c.localSW+=1;c.hasBonused=true;c.turnPhase='done';
      c.log=[...c.log,{type:'heal',text:'R'+c.round+' Second Wind: healed '+heal+' HP',round:c.round}];
      return c;
    });
  };

  // Lay on Hands (bonus action) — self or companion
  const useLayOnHands=(targetName)=>{
    setCombat(prev=>{
      const c={...prev};
      if(c.localLoH<=0)return prev;
      if(!targetName||targetName==='self'){
        const amt=Math.min(5,c.localLoH,c.playerMaxHp-c.playerHp);
        c.playerHp=Math.min(c.playerMaxHp,c.playerHp+amt);c.localLoH-=amt;c.hasBonused=true;c.turnPhase='done';
        c.log=[...c.log,{type:'heal',text:'R'+c.round+' Lay on Hands on self: healed '+amt+' HP ('+c.localLoH+' pool remaining)',round:c.round}];
      }else{
        const cIdx=c.companions.findIndex(cp=>cp.name.includes(targetName));
        if(cIdx>=0){
          const cp=c.companions[cIdx];
          const amt=Math.min(5,c.localLoH,cp.maxHp-cp.hp);
          c.companions=[...c.companions];c.companions[cIdx]={...cp,hp:Math.min(cp.maxHp,cp.hp+amt),unconscious:false,alive:true};
          c.localLoH-=amt;c.hasBonused=true;c.turnPhase='done';
          c.log=[...c.log,{type:'heal',text:'R'+c.round+' Lay on Hands on '+targetName+': healed '+amt+' HP ('+c.localLoH+' pool remaining)',round:c.round}];
        }
      }
      return c;
    });
  };

  // Potion (bonus action)
  const usePotion=()=>{
    setCombat(prev=>{
      const c={...prev};
      if(c.localPotions<=0)return prev;
      const heal=rollExpr('2d4')+2;
      c.playerHp=Math.min(c.playerMaxHp,c.playerHp+heal);c.localPotions-=1;c.hasBonused=true;c.turnPhase='done';
      c.log=[...c.log,{type:'heal',text:'R'+c.round+' Potion of Healing: healed '+heal+' HP',round:c.round}];
      return c;
    });
  };

  // Drop any active concentration spell cleanly
  const dropConcentration=(c)=>{
    if(!c.concentrating)return;
    if(c.blessActive){c.blessActive=false;c.blessRoundsLeft=0}
    if(c.shieldOfFaithActive){c.acBuff=Math.max(0,(c.acBuff||0)-2);c.shieldOfFaithActive=false}
    c.concentrating=null;
  };

  // Cast Bless (action, concentration)
  const castBless=()=>{
    setCombat(prev=>{
      const c={...prev};
      if(c.localSpellSlots>=(derived.spellSlotsMax||0))return prev;
      if(c.concentrating)dropConcentration(c); // new conc spell drops old one
      c.localSpellSlots+=1;c.blessActive=true;c.blessRoundsLeft=10;
      c.concentrating={spell:'Bless',roundsLeft:10};
      c.hasActed=true;c.turnPhase='bonus';
      c.log=[...c.log,{type:'spell',text:'R'+c.round+' Cast Bless: +1d4 to attacks and saves (concentration)',round:c.round}];
      return c;
    });
  };

  // Cast Shield of Faith (bonus action, concentration, +2 AC)
  const castShieldOfFaith=()=>{
    setCombat(prev=>{
      const c={...prev};
      if(c.localSpellSlots>=(derived.spellSlotsMax||0))return prev;
      if(c.concentrating)dropConcentration(c); // new conc spell drops old one
      c.localSpellSlots+=1;
      c.acBuff=(c.acBuff||0)+2;
      c.shieldOfFaithActive=true;
      c.concentrating={spell:'Shield of Faith',roundsLeft:100};
      c.hasBonused=true;c.turnPhase='done';
      c.log=[...c.log,{type:'spell',text:'R'+c.round+' Shield of Faith: +2 AC (concentration)',round:c.round}];
      return c;
    });
  };

  // Cast Cure Wounds (action, replaces attack)
  const castCureWounds=(targetName)=>{
    setCombat(prev=>{
      const c={...prev};
      if(c.localSpellSlots>=(derived.spellSlotsMax||0))return prev;
      const heal=rollExpr('2d8')+(derived.chaMod||0);
      c.localSpellSlots+=1;
      if(targetName==='self'){
        c.playerHp=Math.min(c.playerMaxHp,c.playerHp+heal);
      }else{
        const cIdx=c.companions.findIndex(cp=>cp.name.includes(targetName));
        if(cIdx>=0){c.companions=[...c.companions];c.companions[cIdx]={...c.companions[cIdx],hp:Math.min(c.companions[cIdx].maxHp,c.companions[cIdx].hp+heal),unconscious:false,alive:true}}
      }
      c.hasActed=true;c.turnPhase='bonus';
      c.log=[...c.log,{type:'heal',text:'R'+c.round+' Cure Wounds on '+(targetName==='self'?'self':targetName)+': healed '+heal+' HP',round:c.round}];
      return c;
    });
  };

  // Action Surge (extra action after bonus)
  const useActionSurge=()=>{
    setCombat(prev=>{
      const c={...prev};
      c.localAS=true;c.hasSurged=true;c.hasActed=false;c.turnPhase='action';
      c.log=[...c.log,{type:'action',text:'R'+c.round+' Action Surge! Extra action this turn.',round:c.round}];
      return c;
    });
  };

  // Weapon swap
  const swapWeapon=(weaponName)=>{
    setCombat(prev=>{
      const c={...prev};
      c.activeWeapon=getWeaponData(weaponName);c.weaponSwappedThisTurn=true;
      c.log=[...c.log,{type:'action',text:'R'+c.round+' Swapped to '+weaponName,round:c.round}];
      return c;
    });
  };

  // End player turn -> companion turn
  const endPlayerTurn=()=>{
    setCombat(prev=>{
      const c={...prev};
      if(c.result)return c; // combat already over
      c.turnPhase=null;
      setLastRollResult(null);
      // Move to companion turn if we have living companions with actions
      const livingCompanions=c.companions.filter(cp=>cp.alive&&!cp.unconscious);
      if(livingCompanions.length>0){
        c.phase='companionTurn';
        c.companionActionsThisRound={};
      }else{
        c.phase='enemyTurn';
      }
      return c;
    });
  };

  // Companion action selection
  const selectCompanionAction=(compName,action)=>{
    setCombat(prev=>{
      const c={...prev};
      c.companionActionsThisRound={...c.companionActionsThisRound,[compName]:action};
      return c;
    });
  };

  // Resolve all companion actions and proceed to enemy turn
  const resolveCompanionActions=()=>{
    setCombat(prev=>{
      let c={...prev};
      const logEntries=[];

      for(const comp of c.companions){
        if(!comp.alive||comp.unconscious)continue;
        const action=c.companionActionsThisRound[comp.name];
        if(!action)continue;

        // Attack actions
        if(/strike|shot|dagger|frontline|veteran/i.test(action)){
          const target=c.enemies.find(e=>e.alive);
          if(target&&comp.attack){
            const roll=rollDice(20);
            const blessB=c.blessActive?rollDice(4):0;
            const total=roll+comp.attack.bonus+blessB;
            const hit=roll===20||(total>=target.ac&&roll!==1);
            if(hit){
              const dmg=rollExpr(comp.attack.damage);
              const tIdx=c.enemies.findIndex(e=>e.id===target.id);
              c.enemies=[...c.enemies];c.enemies[tIdx]={...c.enemies[tIdx],currentHp:Math.max(0,c.enemies[tIdx].currentHp-dmg)};
              if(c.enemies[tIdx].currentHp<=0)c.enemies[tIdx].alive=false;
              logEntries.push(comp.name+': '+action+' \u2192 d20='+roll+'+'+comp.attack.bonus+(blessB?'+'+blessB+' bless':'')+'='+total+' vs AC '+target.ac+' \u2714 '+dmg+' dmg');
            }else{
              logEntries.push(comp.name+': '+action+' \u2192 d20='+roll+'+'+comp.attack.bonus+(blessB?'+'+blessB+' bless':'')+'='+total+' vs AC '+target.ac+' \u2718 miss');
            }
          }
        }
        // Heal actions (Mira)
        else if(/heal.*\d/i.test(action)){
          // Heal player or lowest HP companion
          const heal=rollExpr('1d6')+2;
          if(c.playerHp<c.playerMaxHp){
            c.playerHp=Math.min(c.playerMaxHp,c.playerHp+heal);
            logEntries.push(comp.name+': Healed you for '+heal+' HP');
          }else{
            const injured=c.companions.filter(cp=>cp.alive&&cp.hp<cp.maxHp).sort((a,b)=>a.hp-b.hp)[0];
            if(injured){
              const idx=c.companions.findIndex(cp=>cp.name===injured.name);
              c.companions=[...c.companions];c.companions[idx]={...c.companions[idx],hp:Math.min(c.companions[idx].maxHp,c.companions[idx].hp+heal)};
              logEntries.push(comp.name+': Healed '+injured.name+' for '+heal+' HP');
            }else{
              logEntries.push(comp.name+': No one needs healing');
            }
          }
        }
        // Guard (Lysander takes next hit)
        else if(/guard|takes.*next.*hit/i.test(action)){
          logEntries.push(comp.name+': Guarding you (will take next hit aimed at you)');
          // Flag handled in enemy turn
          c.companionActionsThisRound[comp.name]='GUARD_ACTIVE';
        }
        // Flee / rescue civilian — remove companion from combat, grant bonus
        else if(/flee|civilian|safety|rescue|wounded squire/i.test(action)){
          const idx=c.companions.findIndex(cp=>cp.name===comp.name);
          if(idx>=0){c.companions=[...c.companions];c.companions[idx]={...c.companions[idx],alive:false,rescued:true}}
          logEntries.push(comp.name+': Gets the civilians to safety! (Left combat — bonus reward)');
          c.civilianRescued=true;
        }
        // Flank / Mark / Intel — buff player's next attack
        else if(/flank|mark target|\+\d+.*(?:attack|your next)|intel/i.test(action)){
          const buffM=action.match(/\+(\d+)/);
          const amt=buffM?parseInt(buffM[1]):1;
          c.attackBuff=(c.attackBuff||0)+amt;
          logEntries.push(comp.name+': '+action+' \u2192 You get +'+amt+' to your next attack');
        }
        // Shield Wall — buff player AC this round
        else if(/shield wall|\+\d+.*AC/i.test(action)){
          const buffM=action.match(/\+(\d+)/);
          const amt=buffM?parseInt(buffM[1]):1;
          c.acBuff=(c.acBuff||0)+amt;
          logEntries.push(comp.name+': '+action+' \u2192 Your AC is temporarily +'+ amt);
        }
        // Distraction — debuff enemy
        else if(/distraction|enemy.*-\d/i.test(action)){
          c.enemyDebuff=(c.enemyDebuff||0)+1;
          logEntries.push(comp.name+': '+action+' \u2192 Enemies get -1 to next attack');
        }
        // Encourage / Command / Rally — buff all
        else if(/encourage|command|rally|tactical advice/i.test(action)){
          c.attackBuff=(c.attackBuff||0)+1;
          c.acBuff=(c.acBuff||0)+1;
          logEntries.push(comp.name+': '+action+' \u2192 +1 to attack and AC this round');
        }
        // Bandage / stabilize
        else if(/bandage|stabilize|stabilise/i.test(action)){
          const down=c.companions.find(cp=>cp.unconscious&&cp.alive);
          if(down){
            const idx=c.companions.findIndex(cp=>cp.name===down.name);
            c.companions=[...c.companions];c.companions[idx]={...c.companions[idx],hp:1,unconscious:false,deathSaves:{success:0,fail:0}};
            logEntries.push(comp.name+': Stabilized '+down.name+'!');
          }else{
            logEntries.push(comp.name+': '+action+' (no one to stabilize)');
          }
        }
        // Honest Assessment / reveal HP
        else if(/honest assessment|reveal.*HP/i.test(action)){
          c.revealEnemyHp=true;
          logEntries.push(comp.name+': '+action+' \u2192 Enemy HP revealed');
        }
        // Dodge — companion dodges, attacks against them have disadvantage
        else if(/dodge/i.test(action)){
          const idx=c.companions.findIndex(cp=>cp.name===comp.name);
          if(idx>=0){c.companions=[...c.companions];c.companions[idx]={...c.companions[idx],dodging:true}}
          logEntries.push(comp.name+': Dodging \u2014 attacks against them have disadvantage');
        }
        // Default — logged as narrative
        else{
          logEntries.push(comp.name+': '+action);
        }
      }

      // Companion death saves for unconscious companions
      for(let i=0;i<c.companions.length;i++){
        if(c.companions[i].unconscious&&c.companions[i].alive){
          const save=rollDice(20);
          c.companions=[...c.companions];
          const cp={...c.companions[i],deathSaves:{...c.companions[i].deathSaves}};
          if(save===20){cp.hp=1;cp.unconscious=false;logEntries.push(cp.name+' rolls nat 20 on death save \u2014 regains 1 HP!')}
          else if(save>=10){cp.deathSaves.success+=1;logEntries.push(cp.name+' death save: '+save+' \u2714 ('+cp.deathSaves.success+'/3 successes)')}
          else if(save===1){cp.deathSaves.fail+=2;logEntries.push(cp.name+' death save: nat 1 \u2718\u2718 ('+cp.deathSaves.fail+'/3 failures)')}
          else{cp.deathSaves.fail+=1;logEntries.push(cp.name+' death save: '+save+' \u2718 ('+cp.deathSaves.fail+'/3 failures)')}
          if(cp.deathSaves.success>=3){cp.unconscious=false;cp.hp=0;logEntries.push(cp.name+' stabilized!')}
          if(cp.deathSaves.fail>=3){cp.alive=false;cp.unconscious=false;logEntries.push(cp.name+' has fallen. They do not rise.')}
          c.companions[i]=cp;
        }
      }

      c.log=[...c.log,...logEntries.map(t=>({type:'companion',text:'R'+c.round+' '+t,round:c.round}))];
      checkVictory(c);
      c.phase=c.result?c.phase:'enemyTurn';

      // Narrator update for companion actions — build narrative summary
      const compNarrParts=[];
      for(const comp of c.companions){
        if(!comp.alive||comp.unconscious)continue;
        const action=c.companionActionsThisRound[comp.name];
        if(!action||action==='GUARD_ACTIVE')continue;
        const first=(comp.name.match(/^(\w+)/)||[])[1];
        const compLog=logEntries.find(l=>l.startsWith(comp.name));

        // Try scene-specific narration first
        if(narr&&narr.companionActs){
          let narrKey=null;
          if(/flank/i.test(action))narrKey=first+'_flank';
          else if(/shield wall/i.test(action))narrKey=first+'_shield';
          else if(/aggressive/i.test(action))narrKey=first+'_aggressive';
          else if(/heal|rush|bandage/i.test(action))narrKey=first+'_heal';
          else if(/shot/i.test(action))narrKey=first+'_shot';
          else if(/mark target/i.test(action))narrKey=first+'_mark';
          else if(/distraction/i.test(action))narrKey='generic_distraction';
          else if(/flee|civilian|rescue/i.test(action))narrKey='generic_flee';
          if(compLog&&/\u2714/.test(compLog)&&narr.companionActs[first+'_hit']){compNarrParts.push(narr.companionActs[first+'_hit']);continue}
          if(compLog&&/\u2718/.test(compLog)&&narr.companionActs[first+'_miss']){compNarrParts.push(narr.companionActs[first+'_miss']);continue}
          if(narrKey&&narr.companionActs[narrKey]){compNarrParts.push(narr.companionActs[narrKey]);continue}
        }

        // Generic fallback narration
        if(/strike|shot|dagger/i.test(action)){
          if(compLog&&/\u2714/.test(compLog)){const dmgM=compLog.match(/(\d+)\s*dmg/);compNarrParts.push(first+' strikes true'+(dmgM?', dealing '+dmgM[1]+' damage.':'.'));}
          else if(compLog&&/\u2718/.test(compLog)){compNarrParts.push(first+'\'s attack goes wide, missing the mark.');}
          else{compNarrParts.push(first+' attacks.');}
        }
        else if(/heal/i.test(action)){
          if(compLog&&/Healed you/i.test(compLog)){const hM=compLog.match(/(\d+)\s*HP/);compNarrParts.push(first+' tends to your wounds'+(hM?', restoring '+hM[1]+' HP.':'.'));}
          else if(compLog&&/Healed/i.test(compLog)){const tgt=compLog.match(/Healed\s+(\w+)/);const hM=compLog.match(/(\d+)\s*HP/);compNarrParts.push(first+' tends to '+(tgt?tgt[1]+'\'s':'an ally\'s')+' wounds'+(hM?', restoring '+hM[1]+' HP.':'.'));}
          else{compNarrParts.push(first+' prepares a healing salve.');}
        }
        else if(/bandage|stabilize/i.test(action)){
          if(compLog&&/Stabilized/i.test(compLog)){const tgt=compLog.match(/Stabilized\s+(\w+)/);compNarrParts.push(first+' rushes to '+(tgt?tgt[1]:'a fallen ally')+' and binds their wounds.');}
          else{compNarrParts.push(first+' readies bandages.');}
        }
        else if(/shield wall/i.test(action)){compNarrParts.push(first+' raises their shield beside you, bracing for the next blow.');}
        else if(/guard/i.test(action)){compNarrParts.push(first+' steps in front of you, ready to take the next hit.');}
        else if(/mark target/i.test(action)){compNarrParts.push(first+' calls out the enemy\'s weak point \u2014 you see an opening.');}
        else if(/intel/i.test(action)){compNarrParts.push(first+' reads the enemy\'s stance and signals you where to strike.');}
        else if(/encourage|command|rally/i.test(action)){compNarrParts.push(first+' rallies the party with a sharp command.');}
        else if(/distraction/i.test(action)){compNarrParts.push(first+' feints, drawing the enemy\'s attention away.');}
        else if(/tactical advice/i.test(action)){compNarrParts.push(first+' quietly advises your next move.');}
        else if(/honest assessment|reveal/i.test(action)){compNarrParts.push(first+' studies the enemy carefully, gauging their strength.');}
        else if(/dodge/i.test(action)){compNarrParts.push(first+' keeps light on their feet, ready to evade.');}
        else if(/flee|civilian|rescue/i.test(action)){compNarrParts.push(first+' breaks from the fight to get the civilians to safety.');}
        else{compNarrParts.push(first+': '+action);}
      }
      if(compNarrParts.length)setNarratorText(compNarrParts.join('\n'));

      return c;
    });
  };

  // Enemy turn: stepped per-enemy with dice animation
  const pendingNarrRef=React.useRef(null);
  const[enemyRollDisplay,setEnemyRollDisplay]=useState(null);
  const[enemyRollResult,setEnemyRollResult]=useState(null);
  const[enemyAttackIndex,setEnemyAttackIndex]=useState(0);

  // Resolve a single enemy's attack
  const resolveSingleEnemy=(enemyIdx)=>{
    setEnemyRollResult(null);
    animateRoll(()=>{
      setCombat(prev=>{
        let c={...prev};
        const logEntries=[];
        const narrEvents=pendingNarrRef.current||{};
        const livingEnemies=c.enemies.filter(e=>e.alive);

        // Death saves on first enemy only
        if(enemyIdx===0&&c.unconscious&&!c.result){
          const save=rollDice(20);
          const ds={...c.deathSaves};
          if(save===20){c.playerHp=1;c.unconscious=false;ds.success=0;ds.fail=0;logEntries.push('You roll nat 20 on death save \u2014 you regain 1 HP and wake up!')}
          else if(save>=10){ds.success+=1;logEntries.push('Death save: '+save+' \u2714 ('+ds.success+'/3 successes)')}
          else if(save===1){ds.fail+=2;logEntries.push('Death save: nat 1 \u2718\u2718 ('+ds.fail+'/3 failures)')}
          else{ds.fail+=1;logEntries.push('Death save: '+save+' \u2718 ('+ds.fail+'/3 failures)')}
          if(ds.success>=3){c.unconscious=false;logEntries.push('You are stabilized.')}
          if(ds.fail>=3){c.result='lose';logEntries.push('You have fallen.')}
          c.deathSaves=ds;
        }

        const enemy=livingEnemies[enemyIdx];
        if(!enemy||c.result){
          // No more enemies — finish turn
          c.enemies=c.enemies.map(e=>({...e,conditions:e.conditions.filter(cd=>{if(cd.duration<=1)return false;cd.duration--;return true})}));
          if(c.enemies.every(e=>!e.alive)){c.result='win';c.log=[...c.log,{type:'result',text:'VICTORY \u2014 All enemies defeated!',round:c.round}]}
          if(!c.result){
            // Opportunity Attack: if player hasn't used reaction and a bloodied enemy repositions
            const bloodiedEnemy=c.enemies.find(e=>e.alive&&e.hp<=e.maxHp*0.5&&e.hp>0);
            if(!c.reactionUsed&&bloodiedEnemy&&!c.unconscious&&Math.random()>0.4){
              const wpn=WEAPONS_WITH_MASTERY.find(w=>w.name===(gs.weapon||'Longsword'))||{name:'Longsword',damage:'1d8'};
              const atkBonus=derived.attackBonus||4;
              const oaRoll=rollDice(20);const oaTotal=oaRoll+atkBonus;
              if(oaRoll===20||oaTotal>=bloodiedEnemy.ac){
                const oaDmg=rollExpr(wpn.damage)+derived.strMod;
                bloodiedEnemy.hp=Math.max(0,bloodiedEnemy.hp-oaDmg);
                c.log=[...c.log,{type:'hit',text:'\u26a1 Opportunity Attack on '+bloodiedEnemy.name+': d20='+oaRoll+'+'+atkBonus+'='+oaTotal+' \u2714 '+oaDmg+' dmg',round:c.round}];
                if(bloodiedEnemy.hp<=0){bloodiedEnemy.alive=false;c.log=[...c.log,{type:'kill',text:bloodiedEnemy.name+' falls to your reaction strike!',round:c.round}]}
              }else{
                c.log=[...c.log,{type:'miss',text:'\u26a1 Opportunity Attack on '+bloodiedEnemy.name+': d20='+oaRoll+'+'+atkBonus+'='+oaTotal+' \u2718 miss',round:c.round}];
              }
              c.reactionUsed=true;
            }
            c.round+=1;c.phase='playerTurn';c.turnPhase='action';
            c.hasActed=false;c.hasBonused=false;c.hasSurged=false;
            c.weaponSwappedThisTurn=false;c.smiteUsedThisTurn=false;
            c.dodging=false;c.selectedTarget=null;c.reactionUsed=false;
            c.companions=c.companions.map(cp=>cp.dodging?{...cp,dodging:false}:cp);
            c.acBuff=0;c.enemyDebuff=0;c.attackBuff=0;
            if(c.blessActive){c.blessRoundsLeft-=1;if(c.blessRoundsLeft<=0)dropConcentration(c)}
            narrEvents.roundStart=c.round;
          }
          pendingNarrRef.current=narrEvents;
          // Finalize combat if over
          if(c.result&&onStateUpdate){
            onStateUpdate(g=>{
              const NO_AUTO_RESOLVE=['11_YARD','11','11_PATROL','26','43','44C','28_CARAVAN','51','53_BREACH','53_SABOTAGE','64B_WOLVES','64E','65','69','70A','70C_SCOUTS','70'];
              const needsLootChoice=c.result==='win'&&NO_AUTO_RESOLVE.includes(sceneId);
              const ng={...g,hp:Math.max(c.result==='win'?1:0,c.playerHp),spellSlotsUsed:c.localSpellSlots,secondWindUsed:c.localSW,actionSurgeUsed:c.localAS,layOnHandsPool:c.localLoH,potions:c.localPotions,bandages:c.localBandages,combatResolved:needsLootChoice?false:true};
              if(c.result==='win'&&parsed.rewards){
                const sceneKey=gs.history&&gs.history.length?gs.history[gs.history.length-1]:'';
                if(!ng.awardedScenes)ng.awardedScenes={};
                if(!ng.awardedScenes[sceneKey]){
                  ng.awardedScenes[sceneKey]=true;
                  if(parsed.rewards.xp){ng.xp=(ng.xp||0)+parsed.rewards.xp;ng.history=[...(ng.history||[]),'\u2728 +'+parsed.rewards.xp+' XP earned']}
                  if(parsed.rewards.gold)ng.gold=(ng.gold||0)+parsed.rewards.gold;
                  if(parsed.rewards.items&&parsed.rewards.items.length){ng.inventory=[...(ng.inventory||[])];parsed.rewards.items.forEach(item=>{if(!ng.inventory.includes(item))ng.inventory.push(item)})}
                }
              }
              // Mount takes minor damage on victory (30% chance)
              if(c.result==='win'&&ng.mount&&Math.random()<0.3){const mountDmg=rollDice(6);ng.mount={...ng.mount,hp:ng.mount.hp-mountDmg};
                if(ng.mount.hp<=0){ng.mount=null;ng.history=[...(ng.history||[]),'\ud83d\udc0e Your mount was killed in the fighting.']}
                else ng.history=[...(ng.history||[]),'\ud83d\udc0e Your mount took '+mountDmg+' damage in the fighting.']}
              if(c.result==='lose'){ng.hp=1;ng.exhaustion=Math.min(10,(ng.exhaustion||0)+1);
                // Add wound (random stat -1 for 3 combats) and scar
                const woundStats=['str','dex','con','int','wis','cha'];const wStat=woundStats[Math.floor(Math.random()*6)];
                const newWound={stat:wStat,combatsLeft:3,scene:g.history&&g.history.length?g.history[g.history.length-1]:'unknown'};
                ng.wounds=[...(ng.wounds||[]),newWound];
                const usedScars=(ng.scars||[]).map(s=>s.text);const availScars=SCARS.filter(s=>!usedScars.includes(s));
                const scarText=availScars.length>0?availScars[Math.floor(Math.random()*availScars.length)]:SCARS[Math.floor(Math.random()*SCARS.length)];
                ng.scars=[...(ng.scars||[]),{text:scarText,scene:newWound.scene}];
                ng.derived=calcDerived(ng.stats,ng.cls,ng.level,ng.armor,ng.hasShield,ng.feat,ng.wounds,ng.exhaustion);
                setTimeout(()=>setDefeatRecovery({wound:newWound,scar:scarText}),400);
                // Mount takes heavy damage on defeat — 50% chance killed
                if(ng.mount){const mountDmg=rollDice(10)+rollDice(10);ng.mount={...ng.mount,hp:ng.mount.hp-mountDmg};
                  if(ng.mount.hp<=0){ng.mount=null;ng.history=[...(ng.history||[]),'\ud83d\udc0e Your mount was killed in the fighting.']}
                  else ng.history=[...(ng.history||[]),'\ud83d\udc0e Your mount took '+mountDmg+' damage in the fighting.']}
              }
              const dead=c.companions.filter(cp=>!cp.alive&&!cp.rescued);
              if(dead.length){ng.companions=(g.companions||[]).filter(name=>!dead.some(d=>d.name===name));ng.deadCompanions=[...(g.deadCompanions||[]),...dead.map(d=>({name:d.name,scene:g.history&&g.history.length?g.history[g.history.length-1]:'unknown',cause:'Fell in combat'}))]}
              if(c.civilianRescued&&c.result==='win'){ng.xp=(ng.xp||0)+10;ng.rose=(ng.rose||0)+2;ng.flags={...(ng.flags||{}),civilianRescued:true}}
              // Tick down wound timers on combat completion (victory heals; defeat adds new wound above)
              ng.combatCount=(ng.combatCount||0)+1;
              if(c.result==='win'&&ng.wounds&&ng.wounds.length){ng.wounds=ng.wounds.map(w=>({...w,combatsLeft:Math.max(0,w.combatsLeft-1)})).filter(w=>w.combatsLeft>0);ng.derived=calcDerived(ng.stats,ng.cls,ng.level,ng.armor,ng.hasShield,ng.feat,ng.wounds,ng.exhaustion)}
              return ng;
            });
          }
          setEnemyAttackIndex(0);setEnemyRollResult(null);setEnemyRollDisplay(null);
          if(narr&&pendingNarrRef.current){updateNarrator(pendingNarrRef.current);pendingNarrRef.current=null}
          return c;
        }

        const attack=enemy.attacks[0]||{name:'Attack',bonus:3,damage:'1d6+2',type:'melee',reach:5};
        const isSapped=enemy.conditions.some(cd=>cd.name==='Sapped');
        let targetType='player';let targetAc=c.playerAc;let targetName='you';
        const livingComps=c.companions.filter(cp=>cp.alive&&!cp.unconscious);

        const guardComp=Object.entries(c.companionActionsThisRound).find(([k,v])=>v==='GUARD_ACTIVE');
        if(guardComp){const gc=c.companions.find(cp=>cp.name===guardComp[0]&&cp.alive&&!cp.unconscious);if(gc){targetType='companion';targetAc=gc.ac;targetName=gc.name}}
        else if(Object.values(c.companionActionsThisRound).some(a=>/frontline|draws aggro/i.test(a))){const fc=c.companions.find(cp=>cp.name.includes('Caeron')&&cp.alive&&!cp.unconscious);if(fc){targetType='companion';targetAc=fc.ac;targetName=fc.name}}
        else if(livingComps.length>0&&!c.unconscious&&Math.random()>0.6){const rc=livingComps[Math.floor(Math.random()*livingComps.length)];targetType='companion';targetAc=rc.ac;targetName=rc.name}
        if(c.unconscious&&targetType==='player'&&livingComps.length>0){const rc=livingComps[Math.floor(Math.random()*livingComps.length)];targetType='companion';targetAc=rc.ac;targetName=rc.name}
        if(targetType==='player'){targetAc+=(c.acBuff||0)}

        let d20=rollDice(20);
        const targetComp=targetType==='companion'?c.companions.find(cp=>cp.name===targetName):null;
        const hasDisadv=(targetType==='player'&&c.dodging)||(targetComp&&targetComp.dodging)||isSapped;
        if(hasDisadv){const d20b=rollDice(20);d20=Math.min(d20,d20b)}
        const total=d20+attack.bonus-(c.enemyDebuff||0);
        let hit=d20===20||(total>=targetAc&&d20!==1);
        const isCrit=d20===20;

        // ── Reactions ──
        // Shield spell (Wizard): +5 AC, costs spell slot and reaction
        if(hit&&!isCrit&&targetType==='player'&&!c.reactionUsed&&gs.cls==='Wizard'&&(gs.spells?.level1||[]).includes('Shield')&&c.localSpellSlots<(derived.spellSlots||0)){
          const shieldAc=targetAc+5;
          if(total<shieldAc){
            hit=false;
            c.localSpellSlots=(c.localSpellSlots||0)+1;
            c.reactionUsed=true;
            logEntries.push('\u26a1 REACTION: Shield! +5 AC (AC '+shieldAc+') \u2014 attack misses! (1 spell slot used)');
            narrEvents.enemyMissPlayer=true;
          }
        }

        let dmg=0;
        if(hit){
          dmg=rollExpr(attack.damage);
          if(targetType==='player'&&!c.unconscious){
            c.playerHp=Math.max(0,c.playerHp-dmg);
            logEntries.push(enemy.name+' attacks '+targetName+': d20='+d20+'+'+attack.bonus+'='+total+' vs AC '+targetAc+' \u2714 '+dmg+' damage');
            if(c.playerHp<=0)narrEvents.playerDowned=true;
            else if(isCrit)narrEvents.playerHurt_scar=true;
            else if(c.playerHp/c.playerMaxHp<=0.3)narrEvents.playerHurtBad=true;
            else narrEvents.playerHurt=true;
            narrEvents.enemyHitPlayer=true;
            if(c.concentrating){const conDC=Math.max(10,Math.floor(dmg/2));const conSave=rollDice(20)+derived.conMod+(c.blessActive?rollDice(4):0);if(conSave<conDC){dropConcentration(c);logEntries.push('Concentration broken! (CON save '+conSave+' vs DC '+conDC+')')}else{logEntries.push('Concentration held (CON save '+conSave+' vs DC '+conDC+')')}}
            if(c.playerHp<=0){c.playerHp=0;if(livingComps.length>0){c.unconscious=true;c.deathSaves={success:0,fail:0};logEntries.push('You fall unconscious! Your companions fight on.')}else{c.result='lose';logEntries.push('You fall. There is no one left to save you.')}}
          }else if(targetType==='companion'){
            const cIdx=c.companions.findIndex(cp=>cp.name===targetName);
            if(cIdx>=0){c.companions=[...c.companions];c.companions[cIdx]={...c.companions[cIdx],hp:Math.max(0,c.companions[cIdx].hp-dmg)};logEntries.push(enemy.name+' attacks '+targetName+': d20='+d20+'+'+attack.bonus+'='+total+' vs AC '+targetAc+' \u2714 '+dmg+' damage');narrEvents.enemyHitCompanion=targetName;if(c.companions[cIdx].hp<=0){c.companions[cIdx]={...c.companions[cIdx],hp:0,unconscious:true,deathSaves:{success:0,fail:0}};logEntries.push(targetName+' falls unconscious!')}}
          }
        }else{
          logEntries.push(enemy.name+' attacks '+targetName+': d20='+d20+'+'+attack.bonus+'='+total+' vs AC '+targetAc+' \u2718 miss');
          if(targetType==='player')narrEvents.enemyMissPlayer=true;
          else narrEvents.enemyMissCompanion=targetName;
        }

        c.log=[...c.log,...logEntries.map(t=>({type:'enemy',text:'R'+c.round+' '+t,round:c.round}))];
        pendingNarrRef.current=narrEvents;

        // Show roll result for this enemy
        setEnemyRollDisplay(d20);
        setEnemyRollResult({enemyName:enemy.name,targetName,d20,bonus:attack.bonus,total,targetAc,hit,isCrit,dmg});
        setEnemyAttackIndex(enemyIdx);

        return c;
      });
    });
  };

  // Start enemy turn: resolve first enemy
  const startEnemyTurn=()=>{
    pendingNarrRef.current={};
    setEnemyAttackIndex(0);setEnemyRollResult(null);
    resolveSingleEnemy(0);
  };

  // Advance to next enemy attack
  const nextEnemyAttack=()=>{
    const nextIdx=enemyAttackIndex+1;
    const livingCount=combat?combat.enemies.filter(e=>e.alive).length:0;
    if(nextIdx>=livingCount){
      // All enemies done — finish the turn
      resolveSingleEnemy(nextIdx);
    }else{
      resolveSingleEnemy(nextIdx);
    }
  };

  // ─── Pen & Paper Mode ───
  const combatLocked=!!combat||gs.combatResolved;
  if(mode==='penandpaper'){
    return e('div',{className:'combat-wrapper'},
      e('div',{className:'combat-mode-toggle'},
        e('button',{className:'combat-mode-btn'+(combatLocked?' locked':''),onClick:()=>{if(!combatLocked)setMode('narrative')},disabled:combatLocked},'NARRATIVE'),
        e('button',{className:'combat-mode-btn active'},'PEN & PAPER')),
      // Stat blocks
      e('div',{className:'combat-stat-blocks'},
        parsed.enemies.length>0?e('div',{className:'combat-section-header'},'ENEMY STAT BLOCKS'):null,
        parsed.enemies.filter((_,i)=>!parsed.enemies.slice(0,i).some(p=>p.name.replace(/ \d+$/,'')===_.name.replace(/ \d+$/,''))).map((en,i)=>{
          const baseName=en.name.replace(/ \d+$/,'');
          const count=parsed.enemies.filter(e2=>e2.name.replace(/ \d+$/,'')===baseName).length;
          return e('div',{key:i,className:'stat-block'},
            e('div',{className:'stat-block-header'},baseName+(count>1?' (\u00d7'+count+')':'')),
            e('div',{className:'stat-block-line'},'AC '+en.ac+' | HP '+en.maxHp),
            en.attacks.map((atk,j)=>e('div',{key:j,className:'stat-block-line'},atk.name+': +'+atk.bonus+' to hit, '+atk.damage+(atk.type==='ranged'?' (ranged)':''))),
            en.specials.map((sp,j)=>e('div',{key:'s'+j,className:'stat-block-special'},sp))
          );
        })),
      // Companion stat blocks
      (gs.companions||[]).length>0?e('div',{className:'combat-stat-blocks'},
        e('div',{className:'combat-section-header'},'COMPANION STAT BLOCKS'),
        (gs.companions||[]).map((name,i)=>{
          const first=(name.match(/^(\w+)/)||[])[1];
          const stats=COMPANION_COMBAT_STATS[first];
          if(!stats)return null;
          return e('div',{key:i,className:'stat-block companion-stat'},
            e('div',{className:'stat-block-header'},name),
            e('div',{className:'stat-block-line'},'AC '+stats.ac+' | HP '+stats.maxHp),
            stats.attack?e('div',{className:'stat-block-line'},stats.attack.name+': +'+stats.attack.bonus+', '+stats.attack.damage):e('div',{className:'stat-block-line'},'Non-combatant'));
        })
      ):null,
      // Win/Lose outcome boxes
      e('div',{className:'combat-outcomes'},
        e('div',{className:'combat-section-header'},'OUTCOMES'),
        e('button',{className:'combat-outcome-btn win',onClick:()=>{
          if(onStateUpdate)onStateUpdate(g=>{
            const PP_NO_AUTO=['11_YARD','11','11_PATROL','26','43','44C','28_CARAVAN','51','53_BREACH','53_SABOTAGE','64B_WOLVES','64E','65','69','70A','70C_SCOUTS','70'];
            const ng={...g,combatResolved:PP_NO_AUTO.includes(sceneId)?false:true};
            const sceneKey=g.history&&g.history.length?g.history[g.history.length-1]:'';
            if(parsed.rewards){
              if(!ng.awardedScenes)ng.awardedScenes={};
              if(!ng.awardedScenes[sceneKey]){
                ng.awardedScenes[sceneKey]=true;
                if(parsed.rewards.xp){ng.xp=(ng.xp||0)+parsed.rewards.xp;ng.history=[...(ng.history||[]),'\u2728 +'+parsed.rewards.xp+' XP earned']}
                if(parsed.rewards.gold)ng.gold=(ng.gold||0)+parsed.rewards.gold;
                if(parsed.rewards.items&&parsed.rewards.items.length){ng.inventory=[...(ng.inventory||[])];parsed.rewards.items.forEach(item=>{if(!ng.inventory.includes(item))ng.inventory.push(item)})}
              }
            }
            ng.combatCount=(ng.combatCount||0)+1;
            if(ng.wounds&&ng.wounds.length){ng.wounds=ng.wounds.map(w=>({...w,combatsLeft:Math.max(0,w.combatsLeft-1)})).filter(w=>w.combatsLeft>0);ng.derived=calcDerived(ng.stats,ng.cls,ng.level,ng.armor,ng.hasShield,ng.feat,ng.wounds,ng.exhaustion)}
            return ng;
          });
          setCombat({result:'win',log:[{type:'result',text:'Victory (pen & paper)',round:0}],phase:'over'});
        }},'\u2694 VICTORY \u2014 The party defeats the enemies'),
        parsed.winOutcome?e('div',{className:'outcome-text'},parsed.winOutcome):null,
        e('button',{className:'combat-outcome-btn lose',onClick:()=>{
          if(onStateUpdate)onStateUpdate(g=>{
            const ng={...g,hp:1,combatResolved:true,exhaustion:Math.min(10,(g.exhaustion||0)+1)};
            const woundStats=['str','dex','con','int','wis','cha'];const wStat=woundStats[Math.floor(Math.random()*6)];
            const newWound={stat:wStat,combatsLeft:3,scene:g.history&&g.history.length?g.history[g.history.length-1]:'unknown'};
            ng.wounds=[...(ng.wounds||[]),newWound];
            const usedScars=(ng.scars||[]).map(s=>s.text);const availScars=SCARS.filter(s=>!usedScars.includes(s));
            const scarText=availScars.length>0?availScars[Math.floor(Math.random()*availScars.length)]:SCARS[Math.floor(Math.random()*SCARS.length)];
            ng.scars=[...(ng.scars||[]),{text:scarText,scene:newWound.scene}];
            ng.derived=calcDerived(ng.stats,ng.cls,ng.level,ng.armor,ng.hasShield,ng.feat,ng.wounds,ng.exhaustion);
            setTimeout(()=>setDefeatRecovery({wound:newWound,scar:scarText}),400);
            return ng;
          });
          setCombat({result:'lose',log:[{type:'result',text:'Defeat (pen & paper)',round:0}],phase:'over'});
        }},'\u2620 DEFEAT \u2014 The party is defeated'),
        parsed.loseOutcome?e('div',{className:'outcome-text'},parsed.loseOutcome):null),
      // After fight
      parsed.afterFight?e('div',{className:'box combat'},
        parsed.afterFight.split('\n').filter(l=>l.trim()).map((l,i)=>e('p',{key:i,dangerouslySetInnerHTML:{__html:fmt(l)}}))):null);
  }

  // ─── Narrative Mode ───

  // Not started yet
  if(!combat){
    return e('div',{className:'combat-wrapper'},
      e('div',{className:'combat-mode-toggle'},
        e('button',{className:'combat-mode-btn active'},'NARRATIVE'),
        e('button',{className:'combat-mode-btn',onClick:()=>{if(!gs.combatResolved)setMode('penandpaper')},disabled:gs.combatResolved},'PEN & PAPER')),
      // Show stat blocks preview
      e('div',{className:'combat-enemy-stats'},
        parsed.enemies.filter((_,i)=>!parsed.enemies.slice(0,i).some(p=>p.name.replace(/ \d+$/,'')===_.name.replace(/ \d+$/,''))).map((en,i)=>{
          const baseName=en.name.replace(/ \d+$/,'');
          const count=parsed.enemies.filter(e2=>e2.name.replace(/ \d+$/,'')===baseName).length;
          return e('div',{key:i,className:'combat-enemy-preview'},
            e('strong',null,baseName+(count>1?' (\u00d7'+count+')':'')),
            ' \u2014 AC '+en.ac);
        })),
      // Round 1 situation prose
      parsed.rounds[0]&&parsed.rounds[0].situation?e('div',{className:'combat-situation'},e('em',null,parsed.rounds[0].situation)):null,
      e('button',{className:'dice-btn',style:{marginTop:'12px',fontSize:'14px'},onClick:startCombat},'\u2694 Begin Combat'));
  }
