tter":"E","text":"'I believe in the Order. I have heard everything you said and I choose this anyway.'","target":"67","points":{"CROWN":2,"ROSE":1},"conviction":"STEADFAST"},{"letter":"R1","text":"'Stay. Not for the Order. For me.'","target":null,"points":{},"romance_oath":true},{"letter":"R2","text":"'Thank you. For all of it.'","target":null,"points":{}},{"letter":"R3","text":"Do not address.","target":null,"points":{}}]},"66B_Lysander":{"id":"66B_Lysander","title":"THE LAST FIRE","location":"","prose":["'I took the Oath at nineteen. I meant every word. I stopped meaning them when the system rewarded the decision to let people die and punished the decision to save them, and did both correctly according to its own rules.'","'I am not telling you not to take the Oath. I am telling you: the words are not the thing. You are the thing.'","**CONVICTION CHOICE (FALLEN is possible here):**","**ROMANCE CHOICE (optional — if at FLAME or higher):**"],"boxes":[],"choices":[{"letter":"A","text":"'I will take the Oath. And I will mean it the way you meant it — the real version.'","target":"67","points":{"ROSE":2,"CROWN":-1},"conviction":"CONVINCED"},{"letter":"B","text":"'The words are not the thing. The Oath is a formality I will perform because Vogler needs it, not because I believe the institution will save anyone.'","target":"67","points":{"ROSE":1,"CROWN":-2},"conviction":"FALLEN"},{"letter":"C","text":"'The Oath means what I decide it means. What I decide, in the moment, with the people in front of me.'","target":"67","points":{"ROSE":1,"CROWN":1},"conviction":"QUESTIONING"},{"letter":"D","text":"'I hear you. I respect you. And I am going to take the Oath and mean every word because the alternative is a world where no one tries.'","target":"67","points":{"CROWN":2,"SWORD":1},"conviction":"STEADFAST"},{"letter":"E","text":"'I do not know what the Oath means yet. I will figure it out after.'","target":"67","points":{"ROSE":1},"conviction":"SHAKEN"},{"letter":"R1","text":"'Stay with me tonight.'","target":null,"points":{},"romance_oath":true},{"letter":"R2","text":"Take his hand. Let the fire burn down.","target":null,"points":{},"romance_oath":true},{"letter":"R3","text":"'Thank you.'","target":null,"points":{}},{"letter":"R4","text":"Do not address.","target":null,"points":{}}]},"67":{"id":"67","title":"ALDRIC AT THE RIVER","location":"","prose":["*Forest River Crossing — Dawn, Day 3*","He tells you about three months before you arrived: he disobeyed an order to turn away refugees at the western gate. He has been waiting to be punished. 'I need to know if you would have done the same.'"],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Persuasion (+0) | CHA | DC 13\n**SUCCESS (roll 13+):** +1 Aldric Oath track. ROMANCE OATH activates if Flame was present.\n**FAILURE (roll 1-12):** He nods anyway."}],"choices":[{"letter":"A","text":"'Yes. I would have done the same.'","target":"68","points":{"ROSE":3},"romance_oath":true},{"letter":"B","text":"'I do not know for certain. But you made the right call.'","target":"68","points":{"ROSE":2,"SWORD":1}}]},"68":{"id":"68","title":"THE LAST CAMP","location":"","prose":["*Forest Road — Night, Day 3*","The last camp before Vogler. Someone has a flute somewhere down the line — playing every night for twenty years. The melody is old. Tomorrow, Vogler."],"boxes":[{"type":"info","text":"**PALADIN — THE CHOOSING**\nAll Paladins: after your choice below, turn to Scene P4 now."},{"type":"info","text":"**PALADIN — FALLEN TRACK**\nIf FALLEN on DG track: turn to Scene DG4 now."},{"type":"measure","text":"**FIGHTER — MEASURE TRACK**\nIf you have not yet completed M3 and M4: turn to Scene M3 now."},{"type":"info","text":"**ROMANCE CONDITIONAL SCENES**\nIf Sera at FLAME: turn to Scene 68B. If Vael at FLAME: turn to Scene 68C."}],"choices":[{"letter":"A","text":"Tell her the true thing.","target":"69","points":{"ROSE":2},"romance_oath":true},{"letter":"B","text":"'Same thing as before. Not being enough.'","target":"69","points":{"ROSE":1}},{"letter":"C","text":"'Right now? Nothing.'","target":"69","points":{"SWORD":2}},{"letter":"D","text":"Paladin on DG track: The Reckoning (Scene DG4)","target":"DG4","points":{}},{"letter":"E","text":"Sera at Flame: the last camp together (Scene 68B)","target":"68B","points":{}},{"letter":"F","text":"Vael at Flame: the last camp together (Scene 68C)","target":"68C","points":{}}]},"68B":{"id":"68B","title":"THE LAST CAMP — SERA","location":"","prose":["*Forest Road — Night, Day 3 (if Sera Oath-track active)*","The camp is quiet. The watch has changed. Sera is not on rotation tonight — she has not slept in forty hours and you told her you would take the first watch if she told you where she was going. She told you.","You find her at the far edge of the firelight where it thins into darkness, sitting with her back against a tree and her knife across her knees not because she thinks she needs it but because having it there is how she slows down. She looks up at you. The half-dark makes her face different — softer, less defended, the way people look when they think no one is watching."],"boxes":[{"type":"info","text":"**CONDITIONAL SCENE**\nThis scene occurs if Sera is at Flame level or above."},{"type":"romance","text":"**ROMANCE MOMENT**\nShe says: 'You came.' Like she did not expect it. Like she expected it. Like both are true. You sit down against the same tree and the distance between you is not much. She tilts her head and studies your face with the focused attention she normally gives to terrain. Then she says: 'I have been thinking about this since the south road.' She does not elaborate. She does not need to."}],"choices":[{"letter":"A","text":"'So have I.' Two words. She holds your gaze for a long moment. Then she puts the knife down and turns toward you and the rest of the watch is not spent watching.","target":"69","points":{},"romance_oath":true},{"letter":"B","text":"'Tell me what you found in that village. The real version.' She tells you. It is terrible. You hold it together. Sometime before dawn the holding becomes something else.","target":"69","points":{},"romance_oath":true},{"letter":"C","text":"'I did not want to get to Vogler without saying something.' She considers this. Then: 'What are you saying?' You tell her.","target":"69","points":{},"romance_oath":true}]},"68C":{"id":"68C","title":"THE LAST CAMP — VAEL","location":"","prose":["*Forest Road — Night, Day 3 (if Vael Oath-track active)*","She is cleaning her equipment for the third time, which is how you know she is not actually thinking about her equipment. She looks up when you approach with the expression of someone who has made a decision and is not sure they have the nerve to act on it.","She says: 'I want to say something before tomorrow and I need you to let me finish it because I am going to say it badly.' She looks at her sword. 'I have been here six months and the only person whose opinion of me I actually care about is yours. I did not plan for that. I do not know what to do with it. But we are one day from Vogler and I am not going to be someone who did not say it.'"],"boxes":[{"type":"info","text":"**CONDITIONAL SCENE**\nThis scene occurs if Vael is at Flame level or above."},{"type":"romance","text":"**ROMANCE MOMENT**\nShe is looking at you now. The firelight is behind you and her expression is completely unguarded — all the competitive competence and dry deflection set aside, just: a person who told you a true thing and is waiting to see what you do with it. She is slightly breathless. She would hate knowing that you can see that."}],"choices":[{"letter":"A","text":"'I know. I have known for a while. I did not know what to do with it either.' She exhales. Somewhere in that exhale is a laugh. Then she closes the distance and so do you.","target":"69","points":{},"romance_oath":true},{"letter":"B","text":"'You said it exactly right.' You mean this. She blinks. Then she sets down the sword and reaches for you.","target":"69","points":{},"romance_oath":true},{"letter":"C","text":"Say nothing. Close the distance instead. She makes a small surprised sound and then she is kissing you back like she has been waiting to for weeks, which she has.","target":"69","points":{},"romance_oath":true}]},"P4":{"id":"P4","title":"THE CHOOSING","location":"","prose":["*Forest Road — Dusk, Night Before Vogler*","You are on watch. The camp is quiet behind you. The road south is dark. Tomorrow you reach Vogler. The presence is here tonight. Not behind you — not anywhere you can point at. It is simply present, the way a colour is present when you open your eyes. You have felt it before. It has been patient. It is still patient. But tonight you understand, in the way you understand things below language, that it has brought you this far and will not push you further. Whatever comes next is your decision.","Count your tallies:","Now choose:"],"boxes":[{"type":"info","text":"**PALADIN ONLY — THE MOST IMPORTANT SCENE**\nCount your God Sign tallies now. The god with the most tallies has been reaching for you throughout this journey. Fighters: skip ahead to Scene 70."},{"type":"divine","text":"**DIVINE SIGN**\nThe forest is still. The stars are out — Solinari rising, Lunitari somewhere behind the clouds, and in the space between them, if you look in the right way, a darkness that is not empty: Nuitari, the Black Moon. All three moons moving through their courses. And below them, somewhere very far down, the presence. Patient. Waiting. Still not asking."}],"choices":[{"letter":"A","text":"Speak to Paladine. 'I am yours, if you will have me. I will guard what is good. I will not look away.'","target":"P4_Paladine","points":{}},{"letter":"B","text":"Speak to Kiri-Jolith. 'I will fight. I will not waste what you give me. The line will hold while I stand.'","target":"P4_KiriJolith","points":{}},{"letter":"C","text":"Speak to Mishakal. 'I will heal. I will not choose who deserves it. I will be where the hurt is.'","target":"P4_Mishakal","points":{}},{"letter":"D","text":"Speak to Habbakuk. 'I will protect what cannot protect itself. I will not ask permission first.'","target":"P4_Habbakuk","points":{}},{"letter":"E","text":"Speak to Branchala. 'I will hold onto the possibility of beauty in the middle of this. I will not let the war take everything.'","target":"P4_Branchala","points":{}},{"letter":"F","text":"Remain silent. 'I am not ready to name you. But I will not pretend you are not here either.'","target":"P4_Unnamed","points":{}},{"letter":"G","text":"The tallies do not match how you feel. Choose the god who calls to you most regardless of the count.","target":null,"points":{}}]},"P4_Paladine":{"id":"P4_Paladine","title":"PALADINE RESPONDS","location":"","prose":["*Platinum Dragon, The Valiant Warrior, Father of Good*","Something vast and silver acknowledges you. Not with words — with the feeling of a great weight settling, not on you but around you, as if the space you occupy has been noted and found to matter. The silence after is profound.","**Mechanics:** Devotion Oath (recommended). Sacred Weapon grants your longsword +CHA to attacks. Channel Divinity: Turn the Unholy. +1 ROSE. Advantage on CHA saves for the remainder of this adventure.","**In the Main Campaign:** Paladine was worshipped as the highest of the gods of good. His chosen were judges and guardians. His divine spark in you is a candle against a coming darkness — and candles matter.","Proceed to Scene 70."],"boxes":[{"type":"info","text":"**DRAGONLANCE CAMEO — AN OLD MAN WITH A POINTY HAT**\nThere is an old man sitting on a tree root nearby. He was not there before. He has a long beard, a battered pointy hat, and the general air of someone who wandered in by mistake and is enjoying the view. He looks at you with kind, gold-flecked eyes. 'Ah,' he says. 'Good. Very good.' He sounds pleased in the way someone sounds pleased when a thing they have been hoping for finally happens. When you look back he is gone. Fizban is, depending on who you ask, a befuddled old wizard, a Hero of the Lance, or Paladine himself walking the world in mortal guise. These three things are not mutually exclusive."}],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"70","points":{}}]},"P4_KiriJolith":{"id":"P4_KiriJolith","title":"KIRI-JOLITH RESPONDS","location":"","prose":["*The Bison of Heaven, God of Just War*","Something strikes. That is the only word for it — not painful but percussive, like a hammer on an anvil very close to you. A sound and a sensation at once. Then silence. Then the smell of steel and something that might be blood but might be rain.","**Mechanics:** Vengeance Oath (recommended) or Devotion. Vow of Enmity: choose one enemy per fight to gain Advantage against for 1 minute. Abjure Enemy: one creature within 60 ft. must make WIS DC 13 save or be frightened and halved in speed for 1 minute. +2 SWORD.","**In the Main Campaign:** Kiri-Jolith has always chosen those who fight not for glory but for the person beside them. His paladins will find that fighting to give someone else a chance to live is its own kind of prayer.","Proceed to Scene 70."],"boxes":[],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"70","points":{}}]},"P4_Mishakal":{"id":"P4_Mishakal","title":"MISHAKAL RESPONDS","location":"","prose":["*The Blue Lady, Goddess of Healing and Compassion*","Warmth. Simple and enormous. Your hands feel it first — both palms, spreading up your arms and settling in your chest. It is the warmth of something that is pleased with you. Not proud. Pleased. Like coming home.","**Mechanics:** Devotion Oath. Sacred Weapon. Channel Divinity: Turn the Unholy. Bonus: Lay on Hands pool increases to 15 HP per long rest. Cure Wounds spell added to your spells known (no slot required, 1/day). +2 ROSE.","**In the Main Campaign:** Mishakal's return is the most significant spiritual event in Krynn's history since the Cataclysm. Her chosen carry actual divine healing in a world that has forgotten what that feels like. The healing you provide will be understood by NPCs as a miracle. Because it is.","Proceed to Scene 70."],"boxes":[],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"70","points":{}}]},"P4_Habbakuk":{"id":"P4_Habbakuk","title":"HABBAKUK RESPONDS","location":"","prose":["*The Fisher King, God of Nature, Sea, and Animal Life*","The forest moves. Not like wind — like attention. The trees around you shift their weight fractionally. Somewhere close, an owl lands and watches you with complete stillness. A fox crosses the road twenty feet ahead and sits down and looks at you and then moves on.","**Mechanics:** Ancients Oath (recommended). Nature's Wrath: restrain one creature with spectral vines (STR/DEX DC 13, concentration 1 min). Turn the Faithless: fey and fiends within 30 ft. must make WIS DC 13 save or be turned for 1 min. +1 ROSE, +1 SWORD. Animals in the main campaign will not flee from you.","**In the Main Campaign:** Habbakuk is the god of living things that do not have a vote in what happens to their world. His paladins will find that Krynn's natural world responds to them — animals bring warnings, weather shifts, and occasionally something very old in a forest recognises you.","Proceed to Scene 70."],"boxes":[],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"70","points":{}}]},"P4_Branchala":{"id":"P4_Branchala","title":"BRANCHALA RESPONDS","location":"","prose":["*The Song of Life, God of Beauty, Art, and Inspiration*","You hear music. Not in your ears — in the space behind your eyes. Something that is not quite a song and not quite a feeling and is exactly what you would call the reason not to give up. It lasts three seconds. It is enough.","**Mechanics:** Devotion or Ancients Oath. Channel Divinity: Sacred Weapon. Bonus: once per long rest, you may use your Channel Divinity to grant an ally advantage on their next ability check or attack roll. +2 ROSE.","**In the Main Campaign:** Branchala is the god of the unreasonable belief that beauty and hope survive. His paladins carry something the Dragon Army cannot easily destroy: the ability to make people feel, briefly, that it will be all right. This turns out to matter enormously.","Proceed to Scene 70."],"boxes":[],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"70","points":{}}]},"P4_Unnamed":{"id":"P4_Unnamed","title":"THE UNNAMED PRESENCE","location":"","prose":["*The God Who Did Not Name Themselves*","The presence acknowledges your silence the way a patient teacher acknowledges a student who says: I do not understand yet. Not disappointment. Something that is almost approval. The between-spaces are where most thinking actually happens.","**Mechanics:** Choose any Sacred Oath at Level 3. Bonus: once per long rest, you may roll twice on any Religion or History check and take the better result. +1 ROSE, +1 CROWN.","**In the Main Campaign:** The unnamed presence has been patient for three hundred years. Your god's identity will become clearer through your actions rather than through declaration. What you do in Vogler will matter more than what you said tonight.","Proceed to Scene 70."],"boxes":[],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"70","points":{}}]},"DG4":{"id":"DG4","title":"THE RECKONING","location":"","prose":["*Vogler Road — The Day Before Vogler (Paladin Who Has Fallen)*","You are on the last road before Vogler. The column has stopped for water. You are sitting on a stone wall looking at the lake in the distance when you hear footsteps approaching — not Aldric's, not Mira's. The figure is old. Very old. Robes that are neither white nor grey but the specific colour of very old wood. A face like a map of decisions made and paid for. He sits down without being invited and looks at the lake with you for a while.","'You've been carrying something that isn't yours,' he says. Not unkindly. Factually. 'It is not permanent. But it does not come off easily. The question is whether you want it off badly enough.' He looks at you. 'Not whether you are sorry. Whether you want to be different.' He waits.","This is the hardest question the prelude asks. Not 'did you fall' — you know the answer to that. But whether the falling was truly the end of something or whether it was a lesson you are willing to carry forward. The answer has to be real. He will know if it isn't."],"boxes":[{"type":"info","text":"**FALLEN PALADINS ONLY**\nIf you are HELD, HELD FIRM, PURIFIED, or PULLED BACK: skip to Scene 70."},{"type":"info","text":"**DRAGONLANCE: ELISTAN OF PALANTHAS (or a messenger in his name)**\nElistan was the first Chosen of Paladine after the Cataclysm — the first person in three hundred years to carry true divine power. He did not come to judge you. He came because someone asked him to find you."}],"choices":[{"letter":"A","text":"Yes. I want to be different. I want to understand what I chose and unmake it.","target":"DG4_recover","points":{}},{"letter":"B","text":"I want to be different but I don't know if I can. That's the honest answer.","target":"DG4_partial","points":{}},{"letter":"C","text":"I want redemption more than anything. But I don't have the path.","target":"DG4_ember","points":{}},{"letter":"D","text":"I made a rational choice. I stand by it.","target":"DG4_fallen","points":{}}]},"DG4_recover":{"id":"DG4_recover","title":"THE RETURN","location":"","prose":["*Vogler Road — Recovery*","He nods once. He puts his hand on your head for a moment — briefly, the way a blessing works when it is genuinely meant — and then he stands and walks away. The road is the same road. The lake is the same lake. Your hands feel clean. Not new-clean. Clean the way things are clean when they have been used and washed and used again. Your god's warmth is back in full, unfiltered, entirely present."],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE VOW RESTORED**\n*Wondrous Item (Requires Attunement by a Paladin), Uncommon*\nA small medallion of white-silver, shaped like a closed fist holding a flame.\n**Mechanics:** Once per long rest: when you use Lay on Hands, you may also remove one condition: frightened, charmed, or poisoned. Advantage on saving throws against being charmed or possessed by fiends or undead.\n**Lore:** Carried by one who fell and chose to return."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"70","points":{}}]},"DG4_partial":{"id":"DG4_partial","title":"THE SCAR","location":"","prose":["*Vogler Road — Partial Recovery*","He does not argue with the honesty. 'That is a better answer than certainty,' he says. Your Lay on Hands is restored. The muffled quality in your prayers is mostly gone. But there is still a small thing — a faint violet note to the golden warmth."],"boxes":[{"type":"info","text":"**MARK ON YOUR CHARACTER SHEET — FAULTY DIVINE POWERS**\nLay on Hands: restored to full pool. Spell slots: each time you expend a spell slot, roll 1d6 first. On a 1 or 2, the slot is spent but the spell fails. This instability ends if you complete the Quest of the Returning Flame."},{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE SHARD OF RETURNING LIGHT**\n*Wondrous Item (Requires Attunement by a Paladin), Uncommon — GROWING*\nA sliver of white crystal that throws no reflection and casts no shadow. It is slightly warm.\n**Mechanics:** Advantage on saves against being frightened. Once per long rest, as a bonus action: creatures of your choice within 10 ft. that are frightened or charmed may reroll their saving throw with advantage. QUEST STATE: grows stronger when quest is completed.\n**Lore:** Given to a paladin whose faith is cracked but not broken. The crystal holds light it hasn't earned yet, on credit."},{"type":"info","text":"**QUEST: THE RETURNING FLAME**\nComplete in Shadow of the Dragon Queen: Find the Shrine of Mishakal (or any good-aligned god shrine). Spend a full night in honest prayer. In the same session, perform one act of genuine self-sacrifice for a stranger. When both conditions are met: faulty spell mechanic ends permanently. The Shard upgrades: bonus action also grants 2d6 temp HP. Once per long rest: cast Protection from Evil and Good without a slot."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"70","points":{}}]},"DG4_ember":{"id":"DG4_ember","title":"THE EMBER","location":"","prose":["*Vogler Road — The Wanting Without the Way*","Elistan is quiet for a long time. 'That is the hardest state,' he says at last. 'Wanting and not having the path. It is not failure. It is the condition that precedes everything real.' He gives you something small and closes your fingers around it.","Your Lay on Hands pool is restored to half normal (rounded up). Your divine abilities still function — unevenly, with effort. But the wanting is a kind of fire, and fire is not nothing."],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE EMBER THAT REMAINED**\n*Wondrous Item (Requires Attunement by a Paladin), Uncommon — SEEKING*\nA small piece of charcoal that is faintly warm at the centre when you hold it in a closed fist.\n**Mechanics:** Lay on Hands pool is half normal maximum (rounded up). Once per long rest: spend 10 minutes in honest prayer to cast Guidance on yourself without a slot. Each time you act in direct service of an innocent without personal benefit, mark one tally. At 5 tallies, the ember becomes The Vow Restored. Tallies reset if you knowingly act against innocents.\n**Lore:** Given to a paladin who wanted the way back and didn't have it yet. The gods of good do not require certainty — they require the wanting."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"70","points":{}}]},"DG4_fallen":{"id":"DG4_fallen","title":"THE GIFT OF THE DARK QUEEN","location":"","prose":["*Vogler Road — No Recovery*","He looks at you for a long moment. 'You believe it,' he says. 'That is real.' He stands. He does not touch you. 'When you understand what you chose,' he says, 'the door is still open. It is always open. The gods of good do not lock doors.' He walks away. That night, something else leaves gifts at the edge of your bedroll. They are beautiful. They are cold."],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE QUEEN'S BRAND**\n*Wondrous Item (Requires Attunement), Uncommon — TAINTED*\nA black iron ring inlaid with five colours of enamel — red, blue, black, green, white — in the pattern of five dragon heads.\n**Mechanics:** Lay on Hands heals normally. Once per long rest: add 1d6 necrotic damage to a melee attack. However: at dawn each day, DC 12 WIS save or take 1 point of Exhaustion. Removing the ring requires Remove Curse or Greater Restoration.\n**Lore:** A gift from Takhisis to a paladin she considers an investment. The Queen of Darkness plays a long game."},{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE UNASKED QUESTION**\n*Weapon (Longsword), Requires Attunement, Rare — TAINTED*\nA longsword with a blade of black steel that reflects nothing. The crossguard is five interlocking crescents.\n**Mechanics:** +1 to attack and damage rolls. Once per long rest: on a hit, target makes DC 13 WIS save or is frightened until end of their next turn. Whenever you use this ability, make a DC 12 WIS save yourself or take 1 Exhaustion. The sword cannot be lost — if separated, it reappears in your pack within 24 hours.\n**Lore:** A gift from Takhisis to a paladin she considers a long-term investment. It can be unmade only at the Shrine of Paladine by someone who genuinely no longer wants what it offers."},{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE SHADOW MANTLE**\n*Wondrous Item (Cloak), Requires Attunement, Rare — TAINTED*\nA cloak of deep violet-black that absorbs the light around you slightly.\n**Mechanics:** +1 to AC. Advantage on Stealth checks in dim light or darkness. Once per long rest: become heavily obscured to creatures more than 5 ft. away until start of your next turn. Disadvantage on Persuasion checks with clerics and paladins of good-aligned gods. Removing the cloak requires a DC 14 WIS save at dawn. On failure, you feel no desire to remove it.\n**Lore:** Takhisis gives good gifts. That is the point."},{"type":"info","text":"**YOUR PALADIN ABILITIES — THE SECRET PATRON**\nUntil you formally pledge to Takhisis in Shadow of the Dragon Queen, your paladin abilities continue to function — but their source has changed. Lay on Hands heals normally. Divine Smite is very slightly violet. Spell slots function. You are, right now, a paladin of Takhisis who does not know it yet."},{"type":"info","text":"**QUEST: THE PLEDGE OF THE FIVE HEADS**\nIn Shadow of the Dragon Queen: Takhisis will reach for you at moments of violence, desperation, or victory. When ready, seek a Dragon Army officer of Black Wing Command who carries her symbol. The pledge is private, brief, and irreversible. Upon pledging: Oathbreaker subclass. Channel Divinity becomes Animate Dead and Aura of Hate. Lay on Hands can harm enemies. The redemption arc remains available. Elistan said the door is always open."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"70","points":{}}]},"M4":{"id":"M4","title":"THE VOGLER QUESTION","location":"","prose":["*Vogler Road — Day Before the City (Fighter Only)*","Ser Aldous finds you at the edge of the last camp. He has the old book again — the cracked binding one, not the official Measure. He sets it down beside you. 'One more question,' he says. 'Tomorrow you ride into Vogler. You will be a newly-oathed squire of the Knights of Solamnia carrying the Measure you have been learning for three weeks. Someone in that village will need you to know what it means. What do you know?'"],"boxes":[{"type":"info","text":"**FIGHTER ONLY — MEASURE SUBPLOT CONCLUSION**\nCount your Measure Track score: 3-4 = Scholar, 5-7 = Practitioner, 8+ = Keeper. This determines your gift."}],"choices":[{"letter":"A","text":"'I know the Measure is a tool for protecting people. Not a shield for the person holding it. If I have to choose between the law and the person, the law is there to serve the person.'","target":"M4_keeper","points":{}},{"letter":"B","text":"'I know the Measure requires me to make judgment calls I cannot undo. And that the right call is not always the comfortable one.'","target":"M4_practitioner","points":{}},{"letter":"C","text":"'I know I do not know everything yet. But I know enough to hold the line until I do.'","target":"M4_scholar","points":{}}]},"M4_keeper":{"id":"M4_keeper","title":"THE KEEPER'S GIFT","location":"","prose":["*The Last Camp*","He nods slowly. Not just at the answer — at the person saying it. 'That is what the Measure says,' he tells you. 'Not in those words. But that is what it says.' He hands you the old book. 'Not a copy. The original. My copy, the one I have carried for forty years. I do not need it anymore. I have it memorised.' He looks at you. 'You have what matters. Go use it.'"],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: ALDOUS'S MEASURE**\n*Wondrous Item (Requires Attunement by a Solamnic Knight), Uncommon*\nA small, ancient book with a cracked leather binding and forty years of margin notes in Ser Aldous's precise hand. The pages are worn thin where he returned to them most. It smells of tallow and old stone — the chapel library at Brightholm.\n**Mechanics:** While attuned: advantage on History checks related to law, justice, or the Knights of Solamnia. Once per long rest: you may consult the book to automatically know the Measure's position on any legal or ethical question (the DM will provide the answer). Additionally, Insight checks against NPCs who are acting under false pretence of law are made with advantage.\n**Lore:** Ser Aldous of Brightholm carried this book through forty years of knighthood and gave it to the squire who understood it fastest. In the main campaign, senior Solamnic Knights will recognise it and understand what it means that you are carrying it."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"70","points":{}}]},"M4_practitioner":{"id":"M4_practitioner","title":"THE PRACTITIONER'S GIFT","location":"","prose":["*The Last Camp*","He is quiet for a moment. Then: 'That is honest. That is the honest answer and it is the right answer.' He reaches into his robe and takes out something he has been carrying. 'I was not sure I would give you this,' he says. 'But you have earned it. Not because you were perfect. Because you understood what you were not perfect at and kept going anyway.'"],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE CHAPLAIN'S SEAL**\n*Wondrous Item (Requires Attunement), Uncommon*\nA brass stamp in the shape of the Solamnic sun, worn smooth with use. Aldous has used it to seal documents for thirty years. When you press it to paper, the impression is clean and permanent.\n**Mechanics:** While attuned: once per long rest you may invoke the Measure's authority — any Intimidation or Persuasion check made to enforce law or protect innocents is made with advantage. Additionally, documents bearing this seal are treated as legally binding by any Solamnic NPC of Knight rank or below.\n**Lore:** A working seal, not ceremonial. Aldous of Brightholm's seal carries forty years of genuine decisions. In the main campaign, NPCs who recognise it will understand that its bearer earned it."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"70","points":{}}]},"M4_scholar":{"id":"M4_scholar","title":"THE SCHOLAR'S GIFT","location":"","prose":["*The Last Camp*","'That,' says Aldous, 'is the truest thing a new squire can know.' He looks at you for a moment. 'You will make mistakes in Vogler. Every new knight does. What matters is that you have the foundation to understand them.' He sets the old cracked book down in front of you. 'Read the third chapter tonight. Then read it again after Vogler. See how different it looks.'"],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE COMMENTARIES (INCOMPLETE)**\n*Wondrous Item (Requires Attunement), Common — Grows in Power*\nA copy of the secondary Measure commentaries, heavily annotated by Ser Aldous but with wide margins left blank. He intended you to fill them.\n**Mechanics:** While attuned: advantage on History checks about Solamnic law. After each completed adventure in which you faced a Measure dilemma, add a note to one blank page. When all blank pages are filled (DM discretion, usually 3-5 adventures), the book becomes Aldous's Measure (Uncommon, see Keeper's gift). The item grows with you.\n**Lore:** A book given to someone at the beginning of understanding, not the end. The best version of this gift is earned later. In the main campaign, any Solamnic Knight who examines it will read Aldous's marginal note on the front page: 'For the squire who had the sense to know what they did not know yet.'"}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"70","points":{}}]},"69":{"id":"69","title":"MIRA AT THE CROSSROADS","location":"","prose":["*Forest Road Junction — Afternoon, Day 3*","The road splits. North to safety. South toward Vogler. Mira stands at the junction. 'I told myself I was going to take the safe road. I am not going to do that.'"],"boxes":[],"choices":[{"letter":"A","text":"South. She falls in beside you.","target":"69B","points":{"ROSE":2},"romance_oath":true},{"letter":"B","text":"'North. Take the others to safety.'","target":"69B","points":{}}]},"69B":{"id":"69B","title":"THE LAKE AT DAWN","location":"","prose":["*South Road — Day 3, Final Approach*","The lake appears first as light — the reflection of the sunrise off water, a brightness on the southern horizon that is different from sky-brightness, flatter and wider and the colour of beaten silver. Then the water. Then the village.","Vogler in the early morning is beautiful. That is the thing no one warned you about — that the place you are riding to defend is genuinely, quietly, achingly beautiful. Stone buildings along the waterfront. Boats at the pier. Smoke from morning cooking fires. A stand of aspens at the east end that have gone gold with autumn and are catching the sunrise in a way that looks like the trees are on fire in the good way.","Aldric rides beside you. He sees the lake and for a moment his face does something it almost never does: it opens. Then it reassembles. But you saw it.","**IF MIRA IS WITH YOU:** She stops her horse. 'My mother's village looked like this.' Very quiet. Then she rides on.","**IF TARIEL IS WITH YOU:** Her notebook stays closed. This is not an observation she is willing to reduce to writing.","**IF LYSANDER IS WITH YOU:** He is standing at the ridgeline, separate from the column, looking at the lake. He looks exactly like a Knight of the Sword on the morning of a battle, which is what he is whether the paperwork agrees or not."],"boxes":[],"choices":[{"letter":"A","text":"Stop. Look. Remember this.","target":"70","points":{"ROSE":1}},{"letter":"B","text":"'It is worth saving.'","target":"70","points":{"ROSE":1,"SWORD":1}},{"letter":"C","text":"Ride on. The beauty does not change the numbers.","target":"70","points":{"SWORD":1,"CROWN":1}},{"letter":"D","text":"The morning with both of them.","target":"DATE_POLY_MORN","points":{}}]},"70":{"id":"70","title":"THE BRIDGE","location":"","prose":["*South Road — Vogler Approach, Late Day 3*","The lake appears first. Then the village. And on the bridge into Vogler: a Dragon Army forward element setting up a checkpoint. Four soldiers. They have not seen you yet."],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Perception (+2) | WIS | DC 14\n**SUCCESS (roll 14+):** Two days to Vogler, not three. You warn the group. The party gains surprise.\n**FAILURE (roll 1-13):** No surprise — initiative is rolled normally."},{"type":"combat","text":"**COMBAT ENCOUNTER — THE BRIDGE CHECKPOINT**\n**ENEMIES:**\n• Human Soldier x4: AC 14, HP 16 each. Longsword +4 1d8+2.\n• Sergeant (one of the four): HP 22. Bonus action Shout: one ally rerolls a failed attack.\nRewards: 30 XP. Bridge clear. The people of Vogler watched the fight from the walls.\nFallen (0 HP): Aldric holds the sergeant. You enter Vogler at 1 HP. Villagers treat your wounds."}],"choices":[{"letter":"A","text":"Proceed to Scene 71.","target":"71","points":{}}]},"71":{"id":"71","title":"THE FIRST SIGHT OF VOGLER","location":"","prose":["*Vogler — Evening*","Vogler in the late afternoon has the quality of a place that has been bracing itself and is briefly, exhaustedly, relieved. The people watching from the walls as you crossed the bridge have the faces of people for whom Solamnic armour is the best thing they have seen this week.","Behind you, the Dragon Army is moving. Behind you, also, are weeks that changed the shape of what you are. You are a squire now — sworn, blooded, tired in the specific way of someone who has been tested at intervals and kept passing.","Whatever comes next is the main campaign. This was how it began.","**Motto:** Est Sularus oth Mithas — My honour is my life.","You earned this not through outstanding sword work but through asking the right questions and standing by the answers. The Rose values wisdom and moral courage. Ser Aldous was present at your oath. He did not try to hide that he was moved.","**Your Road to Vogler:** You ride into Vogler carrying the weight of what justice means when law fails it. Start with +2 Persuasion and the trait: Voice of the Rose (NPCs who see you protect someone at personal cost trust you immediately).","**Motto:** The blade that does not waver.","You earned this on the south road, on the ridge, at the bridge — in every fight where you chose to stand rather than step back. Aldric was in the front row at your oath. You saw him.","**Your Road to Vogler:** You ride into Vogler knowing what is coming will need everything you have. Start with +2 Athletics and the trait: Blade-Oath (advantage on first attack of any combat).","**Motto:** Law is the shield of the innocent.","You kept the law when others would have broken it and understood that duty is the structure that lets conscience act in the world. Lord Caeron conducted your squiring ceremony himself. Afterwards, in private, he shook your hand instead of saluting. That is not in the protocol.","**Your Road to Vogler:** You ride into Vogler as the Order's standard. People will look to you when things fall apart. Start with +2 Persuasion/Intimidation and the trait: Command Presence (NPCs do not panic in your presence during combat)."],"boxes":[{"type":"info","text":"**Your Prelude Ends Here**\nTurn to the Order Outcome section for your squiring ceremony and title. Then turn to the Romance Epilogue section. Then turn to THE BRIDGE TO THE CAMPAIGN."},{"type":"info","text":"**Squire Title Granted**\nSquire-Scholar of the Rose. Addressed as 'Squire', given deference in matters of law and the Measure."},{"type":"info","text":"**Fighter Ability (carry into main campaign)**\nHistorical Insight (1/day): Ask the DM one true lore question. Advantage on Persuasion checks when appealing to someone's sense of justice."},{"type":"info","text":"**Paladin Ability (carry into main campaign)**\nVoice of Mercy (1/day): When you use Lay on Hands on a creature, they are also freed of one condition (frightened, charmed, or poisoned). Advantage on Persuasion with any NPC who has seen you act against personal interest to protect someone."},{"type":"info","text":"**Squire Title Granted**\nSquire-Warrior of the Sword. Addressed as 'Squire', first position in any fighting formation."},{"type":"info","text":"**Fighter Ability (carry into main campaign)**\nCombat Resolve (1/day): When reduced to 0 HP, make one final attack before falling. When you succeed on a death save, use Second Wind as a reaction."},{"type":"info","text":"**Paladin Ability (carry into main campaign)**\nRighteous Fury (1/day): When you use Divine Smite, you may choose to double the radiant damage. The first time in each combat that an ally is reduced to 0 HP within 30 ft. of you, your next attack before the end of your next turn has Advantage."},{"type":"info","text":"**Squire Title Granted**\nSquire-Commander of the Crown (junior). Given deference in command decisions."},{"type":"info","text":"**Fighter Ability (carry into main campaign)**\nAuthority of the Crown (1/day): Issue a command to a non-hostile NPC. They comply unless it directly harms them. Advantage on Intimidation checks against Dragon Army soldiers."},{"type":"info","text":"**Paladin Ability (carry into main campaign)**\nAura of Command (passive): Your Aura of Protection (CHA +2 to saves) also applies to allies' attack rolls against enemies that are frightened, stunned, or prone. Authority of the Crown (1/day): same as Fighter version."}],"choices":[{"letter":"A","text":"Epilogue: Aldric Voss (Scene 72)","target":"72","points":{}},{"letter":"B","text":"Epilogue: Thessaly Brightwater (Scene 73)","target":"73","points":{}},{"letter":"C","text":"Epilogue: Commander Serath (Scene 74)","target":"74","points":{}},{"letter":"D","text":"Epilogue: Mira of the Oaks (Scene 75)","target":"75","points":{}},{"letter":"E","text":"Epilogue: Lord Caeron Ashvale (Scene 76)","target":"76","points":{}},{"letter":"F","text":"Epilogue: Sera Nighthollow (Scene 77)","target":"77","points":{}},{"letter":"G","text":"Epilogue: Vael Ashmore (Scene 78)","target":"78","points":{}},{"letter":"H","text":"Epilogue: Tariel Duskmantle (Scene 79)","target":"79","points":{}},{"letter":"I","text":"Epilogue: Lysander Graves (Scene 80)","target":"80","points":{}}]},"72":{"id":"72","title":"ALDRIC VOSS","location":"","prose":["He finds you after the squiring when everyone else has gone. 'I spent eight months being competitive with you. I think that was because I did not know what else to do with it.' He looks at you. 'I know now.' He says I love you with staying — with showing up — with the way his hand finds yours. In the main campaign, Aldric Voss is a named companion with his own quest line."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"73","points":{}}]},"73":{"id":"73","title":"THESSALY BRIGHTWATER","location":"","prose":["She interviews you one last time. Except this time: 'What do you want people to remember about what happened here?' She writes it down carefully. Then she closes the notebook. Sets it on the wall. Looks at you without the professional distance. 'I stopped being a journalist about you a while ago.' She puts it down. In the main campaign, Thessaly provides intelligence and covers you."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"74","points":{}}]},"74":{"id":"74","title":"COMMANDER SERATH","location":"","prose":["They find you just before dawn. 'I am trying to become the kind of person who deserves it. I have not succeeded yet. But I am trying. I have not been trying for anyone before.' In the main campaign, Serath is a morally complex ally."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"75","points":{}}]},"75":{"id":"75","title":"MIRA OF THE OAKS","location":"","prose":["She walks beside you on the last road. She does not touch you, and she does not need to. At some point she says, very quietly: 'I was not looking for this.' You were not either. In the main campaign, Mira is the party's healer and the person you fight hardest to keep standing."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"76","points":{}}]},"76":{"id":"76","title":"LORD CAERON ASHVALE","location":"","prose":["He gives you your evaluation report. In the Overall Assessment box he has written: 'This squire will be remarkable. I have no further notes.' He stops at the door. 'The Order of the Crown values constancy. I intend to be constant.' In the main campaign, Caeron provides strategic resources and a quest line about what he is hiding."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"77","points":{}}]},"77":{"id":"77","title":"SERA NIGHTHOLLOW","location":"","prose":["She is already awake and has scouted the perimeter. She says: 'I should tell you that I am not easy to be with. I have been told this.' You tell her you are not particularly easy either. Then, not smiling but with the thing behind her eyes that is equivalent: 'All right.' That is everything. In the main campaign, Sera Nighthollow is a scout companion with her own quest line."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"78","points":{}}]},"78":{"id":"78","title":"VAEL ASHMORE","location":"","prose":["She does not do the thing where people are strange in the morning after something real. She is exactly herself — a little softer. She hands you your gear and says: 'For what it is worth, I have no regrets.' Then you are both laughing. 'I want to do this again. After. When there is an after.' In the main campaign, Vael Ashmore is a Crown-path companion with her own quest line."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"79","points":{}}]},"79":{"id":"79","title":"TARIEL DUSKMANTLE","location":"","prose":["She does not take the Oath. She watches you take it from the back of the chapel with her notebook open and her pen still. She writes one line. Afterward: 'I have decided to stay. Not as an observer.' She takes the credential and folds it and puts it in your hand. 'I do not need this anymore. I know what I am observing.' In the main campaign, Tariel Duskmantle is a political advisor with no rank, no oath, and the most accurate assessment of power in any room she enters. She loves you the way she loves an argument: completely, with her full attention, and with the knowledge that the conclusion may change."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"80","points":{}}]},"80":{"id":"80","title":"LYSANDER GRAVES","location":"","prose":["He is not at the ceremony. He is at the gate, already mounted, facing south. On the road he does not ride beside you — he rides near. The night before Vogler: 'I will be at the wall. Whatever they need me to be. Sword for hire. No title, no Oath, no complications.' He looks at you. 'Except one.' In the main campaign, Lysander Graves is an unaffiliated fighter with no rank and the best sword arm in Vogler. He is the most dangerous kind of complication: a good man without a system, in love with someone inside one.","**CLASS:** Fighter / Paladin (circle)","**ORDER POINTS:** ROSE: ___ pts | SWORD: ___ pts | CROWN: ___ pts Highest score = Your Order. Tiebreaker: choose the one that feels true.","**PALADIN — GOD SIGN TALLIES:** PALADINE: ___ | KIRI-JOLITH: ___ | MISHAKAL: ___ | HABBAKUK: ___ | BRANCHALA: ___ God chosen at Scene P4: _______________ Sacred Oath: Devotion / Ancients / Vengeance (circle)","**FIGHTER — ARCHETYPE:** Champion / Battle Master / Eldritch Knight (circle)","**COMPANIONS AT ADVENTURE'S END (circle):** Aldric / Thessaly / Serath / Mira / Caeron / Sera / Vael / Tariel / Lysander","**ROMANCE OATH REACHED WITH (circle):** Aldric / Thessaly / Serath / Mira / Caeron / Sera / Vael / Tariel / Lysander / None","**CORRUPTION TRACKS:**","CORRUPTION TRACK 1: STEADFAST / QUESTIONING / SHAKEN / CONVINCED / FALLEN / NOT ENGAGED ROMANCE TRACK (same companion): NONE / SPARK / FLAME / OATH","CORRUPTION TRACK 2: STEADFAST / QUESTIONING / SHAKEN / CONVINCED / FALLEN / NOT ENGAGED ROMANCE TRACK (same companion): NONE / SPARK / FLAME / OATH","**ACTIVE MODIFIERS:** THE HOLLOW CROWN: Reduced / Full / Not Active THE BROKEN SWORD: Reduced / Full / Not Active","**DISPATCH POUCH KEPT:** Yes / No **TOTAL XP EARNED:** ___ / 120","**Paladin Dark God Track:** DG Track: HELD FIRM / HELD / LISTENING / COMPROMISED / FALLEN / DEEPLY FALLEN / PURIFIED / RETURNED / SCARRED","**Fighter Measure Track:**","**CONVINCED (reduced):** Disadvantage on Persuasion when invoking Order authority. Fixable through main campaign story.","**FALLEN (full):** Disadvantage on Order authority Persuasion. Advantage on individual appeals. Permanent unless resolved through main campaign quest.","**CONVINCED (reduced):** Disadvantage on Persuasion when defending institutional decisions. Fixable through story.","**FALLEN (full):** Disadvantage on institutional defence Persuasion. Advantage on civilian defence attack rolls. Permanent unless resolved through quest.","**Both FALLEN:** Both modifiers full strength. Hardest character — sees both sides of every argument.","**SHAKEN+ corruption + LISTENING+ DG:** All DG saves at Disadvantage.","**FALLEN corruption + FALLEN DG:** Darkest Paladin outcome. Recovery requires two separate quests.","**STEADFAST corruption + HELD FIRM DG:** Strongest character. Advantage on charm/compulsion/fear saves for remainder of prelude and first chapter of main campaign.","**FALLEN corruption + Keeper Measure (Fighter):** Most sophisticated fall. You understand the Measure deeply AND believe it is insufficient. Aldous will recognise this.","Your oath is spoken. Your blade is blooded. The road to Vogler is open.","The Dragon Queen's armies are marching.","The gods are waking.","Ride on, Squire.","*End of The Knight's Oath — Version 16*"],"boxes":[],"choices":[{"letter":"A","text":"View your final character sheet.","target":"END","points":{}}]},"REST_ROMANCE":{"id":"REST_ROMANCE","title":"A QUIET MOMENT","location":"","prose":["*Camp — Evening*","The fire is low. Tomorrow the road continues. Tonight, for a few hours, the war is somewhere else and you are here with the people who matter to you."],"boxes":[{"type":"info","text":"**REST SCENE — RELATIONSHIP CHECK**\nThis scene occurs at the end of each act. If you are pursuing more than one romance, the situation may need to be addressed."}],"choices":[]},"REST_CONFRONT":{"id":"REST_CONFRONT","title":"THE CONVERSATION YOU CANNOT AVOID","location":"","prose":["*Camp — Late Evening*","You knew this was coming. Two people who matter to you, who cannot share this particular space in your life. Not because of any failing in them — because of who they are to each other. The tension has been building. Tonight it arrives.","One of them finds you first. The other arrives a moment later. The silence between them says everything that needs saying."],"boxes":[{"type":"info","text":"**You must choose.** Both companions will remain in your party regardless, but the romantic path continues with only one. The other will understand — or will learn to."}],"choices":[]},"REST_COMPATIBLE":{"id":"REST_COMPATIBLE","title":"AN UNEXPECTED UNDERSTANDING","location":"","prose":["*Camp — Late Evening*","You expected awkwardness. What you got was something else entirely. They already knew — of course they did. They are both too perceptive to have missed it. What surprises you is that they are not angry. What surprises you more is the look they exchange — not jealousy, not competition, but a kind of mutual recognition.","'We have talked,' one of them says. 'About you. About this.' A pause. 'We are not in competition. We do not need to be.'"],"boxes":[{"type":"romance","text":"**POLYAMORY PATH AVAILABLE**\nBoth companions are willing to share this with you — and with each other. This requires honesty, attention, and the understanding that love is not a finite resource."}],"choices":[]},"REST_SWITCH":{"id":"REST_SWITCH","title":"SOMETHING HAS CHANGED","location":"","prose":["*Camp — A Private Moment*","You have been carrying this for a while now — the slow shift in how you feel, the awareness that what you want has changed. It is not a betrayal. It is honesty, arriving late but arriving."],"boxes":[{"type":"info","text":"**ROMANCE CHANGE**\nYou may end a current romance and redirect your heart. The previous partner will transition to friendship or distance, depending on how you handle it."}],"choices":[]},"BOND_CAMP":{"id":"BOND_CAMP","title":"AROUND THE FIRE","location":"","prose":["*Camp — Evening*","The fire is the right size tonight — not the regulation minimum that Caeron insists on, but the slightly larger version that happens when someone adds a log without being asked and no one corrects them. The column has settled into the particular rhythm of people who have been moving together long enough to develop unspoken protocols: who fills the water, who checks the perimeter, who tells the story.","Aldric is cleaning his blade. He always cleans his blade. It is the thing he does when he wants to be present without having to speak, and it works — the repetitive motion gives his hands somewhere to be while the rest of him listens.","Tonight someone asks a question. It is the kind of question that only gets asked around fires, in the dark, when the day is far enough behind and tomorrow is far enough ahead that the present moment feels briefly safe.","'What will you do when this is over?'"],"boxes":[{"type":"info","text":"**PARTY BONDING SCENE**\nThis scene deepens your connection with your companions. All companions present will react."}],"choices":[{"letter":"A","text":"'Go home. See my family. Then come back.'","target":"BOND_RETURN","points":{"ROSE":1}},{"letter":"B","text":"'Keep going. There is more road.'","target":"BOND_RETURN","points":{"SWORD":1}},{"letter":"C","text":"'I do not know yet. Ask me at Vogler.'","target":"BOND_RETURN","points":{"ROSE":1}},{"letter":"D","text":"Ask someone else the question instead.","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}}]},"BOND_TRAIN":{"id":"BOND_TRAIN","title":"TRAINING TOGETHER","location":"","prose":["*Camp — Morning*","Dawn training has become a group ritual. Not ordered — evolved. Aldric runs sword forms. Vael, if present, matches him pass for pass, the two of them moving through the same combinations with the synchronised precision of people who have been watching each other improve. Sera, if present, watches from the armoury roof or a convenient tree with the professional attention of someone filing observations for later use.","Today someone suggests a change: train together. Not the formal pairs Caeron assigns. Real training — the kind where you learn from each other's differences."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Athletics (+3) | STR | DC 12\n**SUCCESS (roll 12+):** You learn a technique from the session. +1 to your next combat encounter attack roll.\n**FAILURE (roll 1-11):** Good exercise. No specific breakthrough."}],"choices":[{"letter":"A","text":"Spar with everyone willing. Learn their styles.","target":"BOND_RETURN","points":{"SWORD":2}},{"letter":"B","text":"Focus on teaching. Show them what you know.","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"Ask Sera or Serath for tactical advice instead.","target":"BOND_RETURN","points":{"ROSE":1,"SWORD":1}},{"letter":"D","text":"Run the perimeter with whoever will join you.","target":"BOND_RETURN","points":{"SWORD":1}}]},"BOND_MEAL":{"id":"BOND_MEAL","title":"BREAKING BREAD","location":"","prose":["*Camp — Midday*","Mira, if present, has done something to the garrison rations that borders on alchemy. The bread is the same bread. The cheese is the same cheese. But somehow the combination, with whatever herbs she found at the roadside this morning, has become something worth sitting down for.","If Mira is not present, Aldric has attempted to cook. The result is edible in the way that garrison food is always edible: it sustains life without celebrating it. He is aware of this. He is not apologising.","People sit closer than they used to. That is the change you notice — not the food, not the conversation, but the physical distance. Eight months ago these were strangers. Now they are the people whose breathing you recognise in the dark."],"boxes":[{"type":"info","text":"**PARTY BONDING SCENE**\nShare a meal. Listen. Be present."}],"choices":[{"letter":"A","text":"Tell a story from home. Something true.","target":"BOND_RETURN","points":{"ROSE":2}},{"letter":"B","text":"Ask each companion one question they have never been asked.","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"Eat in comfortable silence. Let the quiet do the work.","target":"BOND_RETURN","points":{"ROSE":1}},{"letter":"D","text":"Plan tomorrow's route with the group.","target":"BOND_RETURN","points":{"CROWN":1,"SWORD":1}}]},"BOND_STAR":{"id":"BOND_STAR","title":"WATCHING THE MOONS","location":"","prose":["*Camp — Late Night*","Solinari is full tonight, silver-white. Lunitari hangs low on the horizon, red as old copper. Between them, if you know where to look: the absence that is Nuitari, the black moon. Three moons. Three kinds of power. Three ways of seeing the same sky.","You are not alone on the watch. Someone has joined you without asking, which is the specific trust of people who have stopped requiring invitations. You sit together in the silver-red dark and look at the moons and do not speak for a while.","Thessaly, if present, writes in her notebook by moonlight. Tariel, if present, watches the moons the way she watches everything — cataloguing. Lysander, if present, looks south."],"boxes":[{"type":"info","text":"**Paladin Note:** The three moons remind you of the divine presence. Mark 1 tally under whichever god feels right tonight."}],"choices":[{"letter":"A","text":"'Do you believe in the gods?'","target":"BOND_RETURN","points":{"ROSE":1}},{"letter":"B","text":"'What are you fighting for? Not the Order. You, personally.'","target":"BOND_RETURN","points":{"ROSE":2}},{"letter":"C","text":"Say nothing. Some moments do not need words.","target":"BOND_RETURN","points":{"ROSE":1,"SWORD":1}},{"letter":"D","text":"Point out Nuitari. Not everyone can see the black moon.","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}}]},"BOND_RETURN":{"id":"BOND_RETURN","title":"THE ROAD CONTINUES","location":"","prose":["The moment passes. Tomorrow continues. But something has shifted — the invisible architecture of the group has settled into a new shape, one where you are a little more known and a little more trusted. That is not nothing. In a war, it is almost everything."],"boxes":[],"choices":[{"letter":"A","text":"Continue.","target":"BOND_HUB","points":{}}]},"BOND_HUB":{"id":"BOND_HUB","title":"CAMP","location":"","prose":["The group settles. The road awaits."],"boxes":[],"choices":[{"letter":"A","text":"Return to camp preparations.","target":"11","points":{}},{"letter":"B","text":"Continue the march south.","target":"62D","points":{}}]},"DATE_WALK":{"id":"DATE_WALK","title":"THE WALK","location":"","prose":["*Road Edge — Sunset*","You find each other at the edge of camp where the firelight thins into dusk. Not by accident. Not entirely on purpose either — the specific gravity of two people who have been orbiting each other for long enough that proximity has become the default state.","The road south stretches into purple distance. The air smells of pine and the particular mineral quality of autumn in northern Solamnia. You walk together. Not toward anything. Just: together.","After a while, without discussion, your hands find each other. The calluses of training. The warmth underneath."],"boxes":[{"type":"romance","text":"**ROMANCE SCENE**\nA quiet moment with your partner. No decisions required. Just presence."}],"choices":[{"letter":"A","text":"'Tell me something about yourself I do not know yet.'","target":"BOND_RETURN","points":{"ROSE":2}},{"letter":"B","text":"Walk in silence. Let the evening speak.","target":"BOND_RETURN","points":{"ROSE":1}},{"letter":"C","text":"'After Vogler. What happens to us?'","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}}]},"DATE_SPAR":{"id":"DATE_SPAR","title":"THE PRIVATE SPAR","location":"","prose":["*Training Ground — After Hours*","The others have finished. The training ground is empty except for the two of you and the particular quality of attention that exists when someone you care about is trying to hit you with a practice sword.","It starts as training. It does not stay training. The gap between combat distance and personal distance narrows with each pass until you are close enough to hear breathing and the spar becomes something else — a conversation conducted in movement, in the give and take of space, in the specific trust of two people who know exactly how much force the other can take.","The last pass ends with you both laughing. Or breathing hard. Or both."],"boxes":[{"type":"romance","text":"**ROMANCE SCENE**\nPhysical and competitive. For Aldric, Vael, Lysander, or Sera especially."},{"type":"roll","text":"**OPTIONAL ROLL:** Athletics (+3) | STR | DC 12\n**SUCCESS (roll 12+):** You win. They look at you with something that is definitely not just respect.\n**FAILURE (roll 1-11):** They win. The look they give you is the same."}],"choices":[{"letter":"A","text":"'Best two out of three.' They are already raising the sword.","target":"BOND_RETURN","points":{"SWORD":1,"ROSE":1}},{"letter":"B","text":"Close the distance. The spar is over.","target":"BOND_RETURN","points":{"ROSE":2}},{"letter":"C","text":"'You have been holding back.' 'So have you.'","target":"BOND_RETURN","points":{"SWORD":2}}]},"DATE_QUIET":{"id":"DATE_QUIET","title":"THE QUIET HOUR","location":"","prose":["*Camp — Very Late*","Everyone else is asleep. The fire is embers. They find you — or you find them — at the edge of the camp where the light barely reaches. The conversation starts about nothing: the road, the weather, the quality of the bread. It becomes about everything: what you want, what you fear, what you are willing to fight for beyond the obvious.","At some point — you will not remember exactly when — the distance between you disappears entirely. Not dramatically. Quietly. The way important things happen."],"boxes":[{"type":"romance","text":"**ROMANCE SCENE**\nIntimate and honest. For Mira, Thessaly, Caeron, or Tariel especially."}],"choices":[{"letter":"A","text":"Stay until dawn. Let tomorrow find you here.","target":"BOND_RETURN","points":{"ROSE":2}},{"letter":"B","text":"'I am glad you are here.' Mean all of it.","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"Let the silence hold. Some things are said without speaking.","target":"BOND_RETURN","points":{"ROSE":1}}]},"DATE_POLY":{"id":"DATE_POLY","title":"THE THREE OF YOU","location":"","prose":["*Camp — Evening*","It takes time to learn the geometry of three. Not the logistics — those are simpler than expected — but the emotional architecture: who needs attention when, whose silence means contentment and whose means distance, how to hold two people in your awareness at once without making either feel secondary.","Tonight the geometry works. You are together — all three — at the edge of the firelight. They talked to each other first, before either of them talked to you. That matters. This is not two separate relationships with you at the centre. It is a triangle, and tonight all three sides are holding."],"boxes":[{"type":"romance","text":"**POLYAMORY SCENE**\nA moment with both partners. Only available if the polyamory path was accepted."}],"choices":[{"letter":"A","text":"Ask them: 'How are you two?' Not about you. About them.","target":"BOND_RETURN","points":{"ROSE":2}},{"letter":"B","text":"Let the evening unfold. No agenda. Just presence.","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"'I never expected this. I am glad it is real.'","target":"BOND_RETURN","points":{"ROSE":2}}]},"DATE_POLY_MORN":{"id":"DATE_POLY_MORN","title":"MORNING AFTER","location":"","prose":["*Camp — Dawn*","You wake to the specific warmth of not being alone. The morning has the quality of something new that is also, somehow, already familiar. One of them is still asleep. The other is watching you with the quiet expression of someone who has been awake for a while and decided not to move because the moment was worth holding.","'Good morning,' they say. Not a question. A fact they are pleased about."],"boxes":[{"type":"romance","text":"**POLYAMORY SCENE**\nThe morning after. Tender. Real."}],"choices":[{"letter":"A","text":"'Good morning.' Mean everything.","target":"BOND_RETURN","points":{"ROSE":1}},{"letter":"B","text":"Let the sleeping one sleep. Talk quietly with the other.","target":"BOND_RETURN","points":{"ROSE":1}}]},"56B":{"id":"56B","title":"WHAT THESSALY DOES NOT WRITE DOWN","location":"","prose":["*Castle Brightholm — East Gate, Late Night*","She has been writing for three hours. You know because you checked twice and told yourself both times that you were checking the perimeter. The third time you stop pretending.","Her notebook is closed when you arrive. She was waiting. Thessaly Brightwater does not accidentally leave her notebook closed when someone she wants to talk to approaches. The pen is behind her ear. The locket is in her hand — open, for once. She closes it when she sees you looking but does not put it away.","'I wrote three versions of tonight,' she says. 'The professional one. The honest one. And the one I will not send.' She looks at you with the particular directness that means she has decided something. 'You are in the third one.'"],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nShe is showing you the version of herself that does not appear in dispatches."}],"choices":[{"letter":"A","text":"'Show me.'","target":"60","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"'Keep it. Some things do not need to be read to be known.'","target":"60","points":{"ROSE":1},"romance_flame":true},{"letter":"C","text":"'I am glad I am in any version.' Leave her to write.","target":"60","points":{"ROSE":1}}]}};

// ── Roll Box Parser ────────────────────────────────────
function parseRollBox(text){
  const lines=text.split('\n');
  let preamble=[],success=[],failure=[],coinflip='',isRequired=false,dc=null,skill=null;
  let section='pre';
  for(const line of lines){
    const l=line.trim();
    if(!l)continue;
    if(l.match(/\*\*ROLL REQUIRED/i)){isRequired=true;preamble.push(l);section='pre';continue}
    if(l.match(/\*\*OPTIONAL ROLL/i)){isRequired=false;preamble.push(l);section='pre';continue}
    if(l.match(/\*\*SUCCESS\s*\(/i)){section='success';success.push(l);continue}
    if(l.match(/\*\*FAILURE\s*\(/i)){section='failure';failure.push(l);continue}
    if(l.match(/No dice\?|Flip a coin/i)){coinflip=l;continue}
    if(section==='pre')preamble.push(l);
    else if(section==='success')success.push(l);
    else if(section==='failure')failure.push(l);
  }
  // Extract DC and skill from preamble
  const full=preamble.join(' ');
  const dcM=full.match(/DC\s+(\d+)/);if(dcM)dc=parseInt(dcM[1]);
  const skills=['Athletics','Perception','Insight','Investigation','History','Religion','Medicine','Persuasion','Intimidation','Survival','Stealth','Acrobatics','Composure'];
  const sts=['STR','DEX','CON','INT','WIS','CHA'];
  for(const s of skills)if(full.includes(s)){skill=s;break}
  if(!skill)for(const s of sts)if(full.includes(s)){skill=s;break}
  return{preamble,success,failure,coinflip,isRequired,dc,skill:skill||'WIS'};
}

function RollBox({text,derived,gs,onBonus}){
  const[result,setResult]=useState(null);
  const[rolling,setRolling]=useState(false);
  const[display,setDisplay]=useState(null);
  const[prayerAvail,setPrayerAvail]=useState(false);
  const[prayerResult,setPrayerResult]=useState(null);
  const[prayRolling,setPrayRolling]=useState(false);
  const parsed=parseRollBox(text);
  const bonus=getBonus(derived,parsed.skill);
  const e=React.createElement;
  
  // Determine which god to pray to
  const getGod=()=>{
    if(!gs)return'Paladine';
    if(gs.cls==='Paladin'){
      const signs=gs.godSigns||{};
      let best='Paladine',bestVal=0;
      for(const[g,v] of Object.entries(signs)){if(v>bestVal){bestVal=v;best=g}}
      return best;
    }
    // Fighter: Takhisis if fallen, Paladine otherwise
    return gs.dgTrack==='FALLEN'?'Takhisis':'Paladine';
  };
  
  const roll=()=>{setRolling(true);setResult(null);setPrayerAvail(false);let c=0;
    const iv=setInterval(()=>{setDisplay(Math.floor(Math.random()*20)+1);if(++c>=10){clearInterval(iv);
      const d20=Math.floor(Math.random()*20)+1;const total=d20+bonus;
      const ok=total>=parsed.dc;
      setResult({d20,total,ok});setDisplay(d20);setRolling(false);
      // Track bonuses from successful rolls
      if(ok&&onBonus&&parsed.success){
        const stxt=parsed.success.join(' ');
        const bonusPatterns=[
          {re:/\+1 to (?:any |all )?(.+?)(?:check|roll|interaction|track)/i, type:'roll_bonus'},
          {re:/(?:Advantage|advantage) (?:on |in )?(.+?)(?:\.|,|$)/i, type:'advantage'},
          {re:/\+1 (.+?) romance/i, type:'romance_bonus'},
        ];
        bonusPatterns.forEach(bp=>{
          const m=stxt.match(bp.re);
          if(m)onBonus({name:m[0].substring(0,60).trim(),desc:m[0].substring(0,100).trim(),scene:gs?.history?.length?'~'+gs.history.length:'?',type:bp.type});
        });
      }
      // 10% chance of divine prayer on failure
      if(!ok&&Math.random()<0.10)setPrayerAvail(true);
    }},60)};
  
  const pray=()=>{setPrayRolling(true);let c=0;
    const iv=setInterval(()=>{setDisplay(Math.floor(Math.random()*20)+1);if(++c>=10){clearInterval(iv);
      const d20=Math.floor(Math.random()*20)+1;const total=d20+bonus;
      const ok=total>=parsed.dc;
      setPrayerResult({d20,total,ok});setPrayRolling(false);setPrayerAvail(false);
      if(ok&&onBonus&&parsed.success){
        const stxt=parsed.success.join(' ');
        const m=stxt.match(/\+1 to (?:any |all )?(.+?)(?:check|roll|interaction)/i);
        if(m)onBonus({name:m[0].substring(0,60).trim(),desc:m[0].substring(0,100).trim(),scene:'prayer',type:'roll_bonus'});
      }
    }},60)};
  
  const isOptional=!parsed.isRequired;
  const finalResult=prayerResult||result;
  const showOutcome=finalResult&&!finalResult.skipped;
  
  return e('div',{className:'roll-box-wrapper'},
    e('div',{className:'box roll'},
      parsed.preamble.map((l,i)=>e('p',{key:i,dangerouslySetInnerHTML:{__html:fmt(l)}})),
      parsed.coinflip?e('p',{className:'coinflip',dangerouslySetInnerHTML:{__html:fmt(parsed.coinflip)}}):null
    ),
    parsed.dc?e('div',{className:'dice-area'},
      e('div',{className:'dice-info'},parsed.skill+' \u2022 DC '+parsed.dc+' \u2022 Mod '+(bonus>=0?'+':'')+bonus+(isOptional?' \u2022 Optional':'')),
      // Show result
      result?e('div',{className:'dice-result '+(result.ok?'success':'fail')},
        e('span',{className:'dice-num'},result.d20),
        bonus!==0?e('span',{className:'dice-bonus'},' '+(bonus>=0?'+':'\u2212')+' '+Math.abs(bonus)+' = '+result.total):null,
        e('div',{className:'dice-verdict'},result.ok?'\u2714 SUCCESS':'\u2718 FAILURE')
      ):e('div',{className:'dice-placeholder'},rolling&&display?display:'?'),
      // Roll button: only show if no result yet
      !result?e('button',{className:'dice-btn',onClick:roll,disabled:rolling},rolling?'\u2684 Rolling...':'\u2684 Roll d20'):null,
      // Prayer button: rare divine intervention
      prayerAvail&&!prayerResult?e('div',{className:'prayer-block'},
        e('p',{className:'prayer-text'},'You feel a presence. A warmth at the edge of your awareness.'),
        e('button',{className:'prayer-btn',onClick:pray,disabled:prayRolling},prayRolling?'Praying...':'Pray to '+getGod())
      ):null,
      // Prayer result
      prayerResult?e('div',{className:'prayer-result'},
        e('p',{className:'prayer-flavor'},prayerResult.ok?getGod()+' answers.':'The silence holds. Perhaps another time.'),
        e('div',{className:'dice-result '+(prayerResult.ok?'success':'fail')},
          e('span',{className:'dice-num'},prayerResult.d20),
          bonus!==0?e('span',{className:'dice-bonus'},' '+(bonus>=0?'+':'\u2212')+' '+Math.abs(bonus)+' = '+prayerResult.total):null,
          e('div',{className:'dice-verdict'},prayerResult.ok?'\u2714 DIVINE SUCCESS':'\u2718 UNANSWERED'))
      ):null
    ):null,
    // Outcome text - use prayer result if it exists, otherwise original result
    showOutcome?e('div',{className:'box '+(finalResult.ok?'roll-success':'roll-failure')},
      (finalResult.ok?parsed.success:parsed.failure).map((l,i)=>e('p',{key:i,dangerouslySetInnerHTML:{__html:fmt(l)}}))
    ):null,
    isOptional&&!result?e('button',{className:'skip-roll-btn',onClick:()=>setResult({d20:0,total:0,ok:false,skipped:true})},'Skip this roll'):null,
    result&&result.skipped&&!prayerResult?e('div',{className:'box roll-failure'},
      parsed.failure.map((l,i)=>e('p',{key:i,dangerouslySetInnerHTML:{__html:fmt(l)}}))
    ):null
  );
}
