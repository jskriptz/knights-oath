"Guiding Bolt":{level:"1st",school:"Evocation",time:"Action",range:"120 feet",comp:"V, S",dur:"1 round",desc:"A flash of light streaks toward a creature within range. Make a ranged spell attack. On hit: 4d6 radiant damage and the next attack roll against this target has Advantage. At Higher Levels: +1d6 per slot above 1st."},
"Healing Word":{level:"1st",school:"Abjuration",time:"Bonus Action",range:"60 feet",comp:"V",dur:"Instantaneous",desc:"A creature of your choice that you can see within range regains HP equal to 2d4 + your spellcasting modifier. No effect on undead or constructs. At Higher Levels: +2d4 per slot above 1st."},
"Protection from Evil and Good":{level:"1st",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S, M (holy water or silver/iron powder)",dur:"Concentration, up to 10 minutes",desc:"One willing creature you touch is protected against aberrations, celestials, elementals, fey, fiends, and undead. They have Disadvantage on attack rolls against the target, and the target can\u2019t be charmed, frightened, or possessed by them."},
"Sanctuary":{level:"1st",school:"Abjuration",time:"Bonus Action",range:"30 feet",comp:"V, S, M (a small silver mirror)",dur:"1 minute",desc:"You ward a creature within range. Any creature who targets the warded creature with an attack or harmful spell must make a WIS save. On a failed save, the creature must choose a new target or lose the attack/spell. Ends if the warded creature attacks or casts a harmful spell."},
"Shield of Faith":{level:"1st",school:"Abjuration",time:"Bonus Action",range:"60 feet",comp:"V, S, M (a parchment with a holy text)",dur:"Concentration, up to 10 minutes",desc:"A shimmering field appears around a creature of your choice within range, granting it a +2 bonus to AC for the duration."},
"Magic Missile":{level:"1st",school:"Evocation",time:"Action",range:"120 feet",comp:"V, S",dur:"Instantaneous",desc:"You create three glowing darts of magical force. Each dart hits a creature of your choice you can see within range. Each dart deals 1d4+1 force damage. At Higher Levels: +1 dart per slot above 1st."},
"Shield":{level:"1st",school:"Abjuration",time:"Reaction (when hit by attack or targeted by Magic Missile)",range:"Self",comp:"V, S",dur:"1 round",desc:"An invisible barrier of magical force appears and protects you. Until the start of your next turn, you have a +5 bonus to AC, including against the triggering attack, and take no damage from Magic Missile."},
"Sleep":{level:"1st",school:"Enchantment",time:"Action",range:"60 feet",comp:"V, S, M (a pinch of sand)",dur:"Concentration, up to 1 minute",desc:"Each creature of your choice within a 5-foot-radius Sphere centered on a point within range must succeed on a WIS save or have the Unconscious condition until the spell ends, the sleeper takes damage, or someone uses an action to wake it."},
"Thunderwave":{level:"1st",school:"Evocation",time:"Action",range:"Self (15-foot cube)",comp:"V, S",dur:"Instantaneous",desc:"A wave of thunderous force sweeps out from you. Each creature in a 15-foot cube originating from you must make a CON save. On a failed save: 2d8 thunder damage and pushed 10 feet away. On success: half damage. Unsecured objects pushed 10 feet. At Higher Levels: +1d8 per slot above 1st."},
"Absorb Elements":{level:"1st",school:"Abjuration",time:"Reaction (when you take acid, cold, fire, lightning, or thunder damage)",range:"Self",comp:"S",dur:"1 round",desc:"You capture some of the incoming energy. You have resistance to the triggering damage type until the start of your next turn. Also, the first time you hit with a melee attack on your next turn, the target takes an extra 1d6 damage of the triggering type."},
"Find Familiar":{level:"1st",school:"Conjuration",time:"1 hour (Ritual)",range:"10 feet",comp:"V, S, M (10 gp of charcoal, incense, and herbs consumed)",dur:"Instantaneous",desc:"You gain the service of a familiar, a spirit that takes an animal form you choose (bat, cat, hawk, lizard, owl, rat, raven, spider, weasel, etc.). It acts independently but obeys your commands. You can communicate telepathically within 100 feet. As an action, you can see through its eyes."},
"Mage Armor":{level:"1st",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S, M (a piece of cured leather)",dur:"8 hours",desc:"You touch a willing creature who isn\u2019t wearing armor, and a protective magical force surrounds it. The target\u2019s base AC becomes 13 + its DEX modifier. The spell ends if the target dons armor or if you dismiss the spell."},
// Paladin Level 1
"Compelled Duel":{level:"1st",school:"Enchantment",time:"Bonus Action",range:"30 feet",comp:"V",dur:"Concentration, up to 1 minute",desc:"You attempt to compel a creature into a duel. One creature you can see within range must make a WIS save. On a failed save, the creature is drawn to you, compelled by your divine demand. It has Disadvantage on attack rolls against creatures other than you, and must make a WIS save to move more than 30 feet from you."},
"Detect Evil and Good":{level:"1st",school:"Divination",time:"Action",range:"Self",comp:"V, S",dur:"Concentration, up to 10 minutes",desc:"For the duration, you know if there is an aberration, celestial, elemental, fey, fiend, or undead within 30 feet of you, as well as where the creature is located. You also know if a place or object within 30 feet has been magically consecrated or desecrated."},
"Divine Favor":{level:"1st",school:"Transmutation",time:"Bonus Action",range:"Self",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"Your prayer empowers you with divine radiance. Until the spell ends, your weapon attacks deal an extra 1d4 radiant damage on a hit."},
"Heroism":{level:"1st",school:"Enchantment",time:"Action",range:"Touch",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"A willing creature you touch is imbued with bravery. Until the spell ends, the creature is immune to the Frightened condition and gains temporary hit points equal to your spellcasting modifier at the start of each of its turns. At Higher Levels: one additional creature per slot above 1st."},
"Searing Smite":{level:"1st",school:"Evocation",time:"Bonus Action (after hitting with melee weapon)",range:"Self",comp:"V",dur:"1 minute",desc:"Your weapon flares with white-hot intensity. The attack deals an extra 1d6 fire damage. At the start of each of its turns, the target must make a CON save or take 1d6 fire damage. On success or if it or an adjacent creature uses an action to extinguish, the spell ends."},
"Shield of Faith":{level:"1st",school:"Abjuration",time:"Bonus Action",range:"60 feet",comp:"V, S, M",dur:"Concentration, up to 10 minutes",desc:"A shimmering field appears around a creature, granting +2 bonus to AC for the duration."},
"Thunderous Smite":{level:"1st",school:"Evocation",time:"Bonus Action (after hitting with melee weapon)",range:"Self",comp:"V",dur:"Instantaneous",desc:"Your weapon rings with thunder. The attack deals an extra 2d6 thunder damage. Additionally, if the target is a creature, it must succeed on a STR save or be pushed 10 feet away from you and have the Prone condition."},
"Wrathful Smite":{level:"1st",school:"Necromancy",time:"Bonus Action (after hitting with melee weapon)",range:"Self",comp:"V",dur:"Concentration, up to 1 minute",desc:"Your weapon is imbued with dark energy. The attack deals an extra 1d6 psychic damage. If the target is a creature, it must make a WIS save or have the Frightened condition until the spell ends. As an action, the frightened target can make a WIS check against your spell save DC to end the effect."},
"Paladin\u2019s Smite":{level:"1st",school:"Evocation",time:"Bonus Action (after hitting with melee or unarmed)",range:"Self",comp:"V",dur:"Instantaneous",desc:"You channel divine energy into your strike. The attack deals an extra 2d8 Radiant damage. At Higher Levels: +1d8 per slot above 1st. Once per turn only. Cannot be used on Opportunity Attacks. This spell is always prepared and does not count against your prepared spell limit."},
"Divine Smite":{level:"1st",school:"Evocation",time:"Bonus Action (after hitting with melee or unarmed)",range:"Self",comp:"V",dur:"Instantaneous",desc:"Same as Paladin\u2019s Smite. The 2024 PHB renames this to Paladin\u2019s Smite. +2d8 radiant, +1d8 per slot above 1st. Once per turn."},
// Additional Level 1 Spells
"Burning Hands":{level:"1st",school:"Evocation",time:"Action",range:"Self (15-foot cone)",comp:"V, S",dur:"Instantaneous",desc:"A thin sheet of flames shoots forth from your fingertips. Each creature in a 15-foot cone must make a DEX save. On a failed save: 3d6 fire damage, or half on success. At Higher Levels: +1d6 per slot above 1st."},
"Chromatic Orb":{level:"1st",school:"Evocation",time:"Action",range:"90 feet",comp:"V, S, M (a diamond worth 50+ gp)",dur:"Instantaneous",desc:"You hurl a 4-inch-diameter sphere of energy. Choose acid, cold, fire, lightning, poison, or thunder. Make a ranged spell attack. On hit: 3d8 damage of the chosen type. At Higher Levels: +1d8 per slot above 1st."},
"Color Spray":{level:"1st",school:"Illusion",time:"Action",range:"Self (15-foot cone)",comp:"V, S, M (pinch of powder)",dur:"1 round",desc:"A dazzling array of flashing colors springs from your hand. Each creature in a 15-foot cone must succeed on a CON save or have the Blinded condition until the end of your next turn."},
"Charm Person":{level:"1st",school:"Enchantment",time:"Action",range:"30 feet",comp:"V, S",dur:"1 hour",desc:"You attempt to charm a humanoid. It must make a WIS save (Advantage if you or allies are fighting it). On failure, it is Charmed by you until the spell ends or you or allies harm it. The charmed creature regards you as a friendly acquaintance."},
"Comprehend Languages":{level:"1st",school:"Divination",time:"Action (Ritual)",range:"Self",comp:"V, S, M (a pinch of soot and salt)",dur:"1 hour",desc:"For the duration, you understand the literal meaning of any spoken language that you hear. You also understand any written language that you see, but you must be touching the surface on which the words are written."},
"Disguise Self":{level:"1st",school:"Illusion",time:"Action",range:"Self",comp:"V, S",dur:"1 hour",desc:"You make yourself—including your clothing, armor, weapons, and other belongings—look different until the spell ends. You can seem up to 1 foot shorter or taller and can appear thin, fat, or in between."},
"Dissonant Whispers":{level:"1st",school:"Enchantment",time:"Action",range:"60 feet",comp:"V",dur:"Instantaneous",desc:"You whisper a discordant melody. One creature of your choice within range must make a WIS save. On a failed save: 3d6 psychic damage and must immediately use its reaction to move as far as its speed allows away from you. At Higher Levels: +1d6 per slot above 1st."},
"Entangle":{level:"1st",school:"Conjuration",time:"Action",range:"90 feet",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"Grasping weeds and vines sprout from the ground in a 20-foot square. A creature in the area when you cast must succeed on a STR save or be Restrained. A creature can use its action to make a STR check to free itself."},
"Expeditious Retreat":{level:"1st",school:"Transmutation",time:"Bonus Action",range:"Self",comp:"V, S",dur:"Concentration, up to 10 minutes",desc:"You take the Dash action, and until the spell ends, you can take the Dash action as a Bonus Action on each of your turns."},
"Faerie Fire":{level:"1st",school:"Evocation",time:"Action",range:"60 feet",comp:"V",dur:"Concentration, up to 1 minute",desc:"Objects and creatures in a 20-foot cube are outlined in blue, green, or violet light. DEX save or be outlined. An outlined creature sheds dim light in a 10-foot radius and can't benefit from being Invisible. Attack rolls against it have Advantage."},
"False Life":{level:"1st",school:"Necromancy",time:"Action",range:"Self",comp:"V, S, M (a small amount of alcohol)",dur:"1 hour",desc:"Bolstering yourself with necromantic energy, you gain 1d4 + 4 temporary hit points for the duration. At Higher Levels: +5 temporary HP per slot above 1st."},
"Feather Fall":{level:"1st",school:"Transmutation",time:"Reaction (when you or a creature within 60 feet falls)",range:"60 feet",comp:"V, M (a small feather)",dur:"1 minute",desc:"Choose up to five falling creatures within range. A falling creature's rate of descent slows to 60 feet per round until the spell ends. If the creature lands before the spell ends, it takes no falling damage."},
"Fog Cloud":{level:"1st",school:"Conjuration",time:"Action",range:"120 feet",comp:"V, S",dur:"Concentration, up to 1 hour",desc:"You create a 20-foot-radius sphere of fog centered on a point within range. The sphere spreads around corners, and its area is Heavily Obscured. At Higher Levels: radius increases by 20 feet per slot above 1st."},
"Goodberry":{level:"1st",school:"Conjuration",time:"Action",range:"Touch",comp:"V, S, M (a sprig of mistletoe)",dur:"Instantaneous",desc:"Up to ten berries appear in your hand and are infused with magic for the duration. A creature can use its action to eat one berry and regain 1 HP. The berries provide enough nourishment to sustain a creature for one day."},
"Grease":{level:"1st",school:"Conjuration",time:"Action",range:"60 feet",comp:"V, S, M (a bit of pork rind)",dur:"1 minute",desc:"Slick grease covers the ground in a 10-foot square. When the grease appears, each creature standing in the area must succeed on a DEX save or fall Prone. A creature that enters or ends its turn there must also save or fall Prone."},
"Hellish Rebuke":{level:"1st",school:"Evocation",time:"Reaction (when damaged by a creature within 60 feet)",range:"60 feet",comp:"V, S",dur:"Instantaneous",desc:"You point your finger at the creature that damaged you. It must make a DEX save. On failure: 2d10 fire damage, or half on success. At Higher Levels: +1d10 per slot above 1st."},
"Hex":{level:"1st",school:"Enchantment",time:"Bonus Action",range:"90 feet",comp:"V, S, M (the petrified eye of a newt)",dur:"Concentration, up to 1 hour",desc:"You curse a creature. Until the spell ends, you deal an extra 1d6 necrotic damage to the target whenever you hit it with an attack. Choose one ability—the target has Disadvantage on ability checks with that ability."},
"Hunter's Mark":{level:"1st",school:"Divination",time:"Bonus Action",range:"90 feet",comp:"V",dur:"Concentration, up to 1 hour",desc:"You magically mark a creature you can see. Until the spell ends, you deal an extra 1d6 damage to the target whenever you hit it with a weapon attack, and you have Advantage on any Perception or Survival check to find it."},
"Identify":{level:"1st",school:"Divination",time:"1 minute (Ritual)",range:"Touch",comp:"V, S, M (a pearl worth 100+ gp)",dur:"Instantaneous",desc:"You choose one object that you must touch throughout the casting. If it is a magic item or magical object, you learn its properties and how to use them, whether it requires Attunement, and how many charges it has, if any."},
"Inflict Wounds":{level:"1st",school:"Necromancy",time:"Action",range:"Touch",comp:"V, S",dur:"Instantaneous",desc:"Make a melee spell attack against a creature you can reach. On hit: 3d10 necrotic damage. At Higher Levels: +1d10 per slot above 1st."},
"Jump":{level:"1st",school:"Transmutation",time:"Bonus Action",range:"Touch",comp:"V, S, M (a grasshopper's hind leg)",dur:"1 minute",desc:"You touch a creature. The creature's jump distance is tripled until the spell ends."},
"Longstrider":{level:"1st",school:"Transmutation",time:"Action",range:"Touch",comp:"V, S, M (a pinch of dirt)",dur:"1 hour",desc:"You touch a creature. The target's speed increases by 10 feet until the spell ends. At Higher Levels: one additional creature per slot above 1st."},
"Ray of Sickness":{level:"1st",school:"Necromancy",time:"Action",range:"60 feet",comp:"V, S",dur:"Instantaneous",desc:"A ray of sickening green energy lashes out. Make a ranged spell attack. On hit: 2d8 poison damage and target must make a CON save or be Poisoned until the end of your next turn. At Higher Levels: +1d8 per slot above 1st."},
"Speak with Animals":{level:"1st",school:"Divination",time:"Action (Ritual)",range:"Self",comp:"V, S",dur:"10 minutes",desc:"You gain the ability to comprehend and verbally communicate with beasts for the duration. The knowledge and awareness of many beasts is limited by their intelligence."},
"Tasha's Hideous Laughter":{level:"1st",school:"Enchantment",time:"Action",range:"30 feet",comp:"V, S, M (tarts and a feather)",dur:"Concentration, up to 1 minute",desc:"A creature of your choice must succeed on a WIS save or fall Prone and have the Incapacitated condition, spending its turns laughing. At the end of each of its turns, and when it takes damage, it can make another save."},
"Unseen Servant":{level:"1st",school:"Conjuration",time:"Action (Ritual)",range:"60 feet",comp:"V, S, M (a piece of string)",dur:"1 hour",desc:"This spell creates an invisible, mindless, shapeless, Medium force that performs simple tasks at your command. The servant has AC 10, 1 HP, STR 2, and can't attack."},
"Witch Bolt":{level:"1st",school:"Evocation",time:"Action",range:"60 feet",comp:"V, S, M (a twig struck by lightning)",dur:"Concentration, up to 1 minute",desc:"A beam of crackling blue energy arcs toward a creature. Make a ranged spell attack. On hit: 2d12 lightning damage. On each of your turns, you can use your action to deal 1d12 lightning damage automatically. At Higher Levels: initial +1d12 per slot above 1st."},
"Wrathful Smite":{level:"1st",school:"Necromancy",time:"Bonus Action",range:"Self",comp:"V",dur:"Concentration, up to 1 minute",desc:"Your weapon is imbued with power. The next time you hit with a melee weapon attack: extra 1d6 psychic damage, and target must WIS save or be Frightened of you until the spell ends."},
// Level 2 Spells
"Aid":{level:"2nd",school:"Abjuration",time:"Action",range:"30 feet",comp:"V, S, M (a tiny strip of white cloth)",dur:"8 hours",desc:"Your spell bolsters your allies with toughness and resolve. Choose up to three creatures within range. Each target's HP maximum and current HP increase by 5 for the duration. At Higher Levels: +5 HP per slot above 2nd."},
"Alter Self":{level:"2nd",school:"Transmutation",time:"Action",range:"Self",comp:"V, S",dur:"Concentration, up to 1 hour",desc:"You assume a different form. Choose Aquatic Adaptation (swim speed and water breathing), Change Appearance (alter your features), or Natural Weapons (grow claws, fangs, etc. dealing 1d6 + STR slashing)."},
"Arcane Lock":{level:"2nd",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S, M (gold dust worth 25+ gp, consumed)",dur:"Until dispelled",desc:"You touch a closed door, window, gate, chest, or other entryway. It becomes locked for the duration. You and creatures you designate can open the object normally. The spell increases the DC to break it or pick any locks on it by 10."},
"Blindness/Deafness":{level:"2nd",school:"Necromancy",time:"Action",range:"30 feet",comp:"V",dur:"1 minute",desc:"You can blind or deafen a foe. Choose one creature you can see. It must make a CON save. On a failed save, the target is either Blinded or Deafened (your choice) for the duration. At the end of each of its turns, it can make another save."},
"Blur":{level:"2nd",school:"Illusion",time:"Action",range:"Self",comp:"V",dur:"Concentration, up to 1 minute",desc:"Your body becomes blurred. For the duration, any creature has Disadvantage on attack rolls against you. An attacker is immune to this effect if it doesn't rely on sight or can see through illusions."},
"Branding Smite":{level:"2nd",school:"Evocation",time:"Bonus Action",range:"Self",comp:"V",dur:"Concentration, up to 1 minute",desc:"The next time you hit a creature with a weapon attack: extra 2d6 radiant damage. The target becomes visible if Invisible, and it sheds dim light in a 5-foot radius. At Higher Levels: +1d6 per slot above 2nd."},
"Calm Emotions":{level:"2nd",school:"Enchantment",time:"Action",range:"60 feet",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"You attempt to suppress strong emotions in a group. Each humanoid in a 20-foot-radius sphere must make a CHA save. On a failed save, choose: suppress Charmed/Frightened conditions, or make it indifferent about hostile creatures."},
"Cloud of Daggers":{level:"2nd",school:"Conjuration",time:"Action",range:"60 feet",comp:"V, S, M (a sliver of glass)",dur:"Concentration, up to 1 minute",desc:"You fill the air with spinning daggers in a cube 5 feet on each side. A creature takes 4d4 slashing damage when it enters the spell's area for the first time on a turn or starts its turn there. At Higher Levels: +2d4 per slot above 2nd."},
"Continual Flame":{level:"2nd",school:"Evocation",time:"Action",range:"Touch",comp:"V, S, M (ruby dust worth 50 gp, consumed)",dur:"Until dispelled",desc:"A flame springs forth from an object that you touch. The flame sheds bright light in a 20-foot radius and dim light for an additional 20 feet. It doesn't create heat and doesn't consume oxygen."},
"Darkness":{level:"2nd",school:"Evocation",time:"Action",range:"60 feet",comp:"V, M (bat fur and a drop of pitch)",dur:"Concentration, up to 10 minutes",desc:"Magical darkness spreads from a point you choose within range to fill a 15-foot-radius sphere. Creatures with darkvision can't see through this darkness, and nonmagical light can't illuminate it."},
"Darkvision":{level:"2nd",school:"Transmutation",time:"Action",range:"Touch",comp:"V, S, M (either a pinch of dried carrot or an agate)",dur:"8 hours",desc:"You touch a willing creature to grant it the ability to see in the dark. For the duration, that creature has darkvision out to a range of 60 feet."},
"Detect Thoughts":{level:"2nd",school:"Divination",time:"Action",range:"Self",comp:"V, S, M (a copper piece)",dur:"Concentration, up to 1 minute",desc:"For the duration, you can read the thoughts of certain creatures. As an action, you can focus your mind on any one creature that you can see within 30 feet. The target makes a WIS save; on failure, you gain insight into its reasoning."},
"Enhance Ability":{level:"2nd",school:"Transmutation",time:"Action",range:"Touch",comp:"V, S, M (fur or a feather from a beast)",dur:"Concentration, up to 1 hour",desc:"You touch a creature and bestow upon it a magical enhancement. Choose Bear's Endurance, Bull's Strength, Cat's Grace, Eagle's Splendor, Fox's Cunning, or Owl's Wisdom. At Higher Levels: one additional creature per slot above 2nd."},
"Enlarge/Reduce":{level:"2nd",school:"Transmutation",time:"Action",range:"30 feet",comp:"V, S, M (a pinch of powdered iron)",dur:"Concentration, up to 1 minute",desc:"You cause a creature or object to grow larger or smaller. An unwilling target can make a CON save to resist. Enlarge: Advantage on STR checks and saves, +1d4 weapon damage. Reduce: Disadvantage on STR, -1d4 weapon damage."},
"Enthrall":{level:"2nd",school:"Enchantment",time:"Action",range:"60 feet",comp:"V, S",dur:"1 minute",desc:"You weave a distracting string of words. Each creature of your choice within range must make a WIS save. On a failed save, the creature has Disadvantage on Perception checks made to perceive any creature other than you."},
"Find Steed":{level:"2nd",school:"Conjuration",time:"10 minutes",range:"30 feet",comp:"V, S",dur:"Until dispelled",desc:"You summon a spirit that assumes the form of a steed: warhorse, pony, camel, elk, or mastiff. It serves you as a mount, in and out of combat. You have a telepathic bond with it. When you cast a spell targeting yourself, you can also affect the steed."},
"Flame Blade":{level:"2nd",school:"Evocation",time:"Bonus Action",range:"Self",comp:"V, S, M (leaf of sumac)",dur:"Concentration, up to 10 minutes",desc:"You evoke a fiery blade in your free hand. It counts as a simple melee weapon and deals 3d6 fire damage on a hit. You can use your action to make a melee spell attack. At Higher Levels: +1d6 per two slots above 2nd."},
"Flaming Sphere":{level:"2nd",school:"Conjuration",time:"Action",range:"60 feet",comp:"V, S, M (a bit of tallow and brimstone)",dur:"Concentration, up to 1 minute",desc:"A 5-foot-diameter sphere of fire appears. When it appears, each creature within 5 feet must make a DEX save: 2d6 fire damage on a failed save, or half on success. As a Bonus Action, you can move the sphere up to 30 feet. At Higher Levels: +1d6 per slot above 2nd."},
"Gentle Repose":{level:"2nd",school:"Necromancy",time:"Action (Ritual)",range:"Touch",comp:"V, S, M (a pinch of salt and copper pieces placed on eyes)",dur:"10 days",desc:"You touch a corpse or other remains. For the duration, the target is protected from decay and can't become undead. The spell extends the time limit on raising the target from the dead."},
"Gust of Wind":{level:"2nd",school:"Evocation",time:"Action",range:"Self (60-foot line)",comp:"V, S, M (a legume seed)",dur:"Concentration, up to 1 minute",desc:"A line of strong wind 60 feet long and 10 feet wide blasts from you. Each creature that starts its turn in the line must succeed on a STR save or be pushed 15 feet away from you."},
"Heat Metal":{level:"2nd",school:"Transmutation",time:"Action",range:"60 feet",comp:"V, S, M (a piece of iron)",dur:"Concentration, up to 1 minute",desc:"Choose a manufactured metal object within range. Any creature in contact with it takes 2d8 fire damage. As a Bonus Action on subsequent turns, you can cause this damage again. If a creature holds or wears the object and takes damage, it must make a CON save or drop the object."},
"Hold Person":{level:"2nd",school:"Enchantment",time:"Action",range:"60 feet",comp:"V, S, M (a small, straight piece of iron)",dur:"Concentration, up to 1 minute",desc:"Choose a humanoid that you can see within range. The target must succeed on a WIS save or be Paralyzed for the duration. At the end of each of its turns, the target can make another save. At Higher Levels: one additional humanoid per slot above 2nd."},
"Invisibility":{level:"2nd",school:"Illusion",time:"Action",range:"Touch",comp:"V, S, M (an eyelash in gum arabic)",dur:"Concentration, up to 1 hour",desc:"A creature you touch becomes Invisible until the spell ends. Anything the target is wearing or carrying is invisible as long as it is on the target's person. The spell ends if the target attacks or casts a spell. At Higher Levels: one additional creature per slot above 2nd."},
"Knock":{level:"2nd",school:"Transmutation",time:"Action",range:"60 feet",comp:"V",dur:"Instantaneous",desc:"Choose an object such as a door, a box, a chest, or a padlock. One lock, latch, or bar that is holding it shut is unlocked, unlatched, or unbarred. The spell emits a loud knock, audible from as far away as 300 feet."},
"Lesser Restoration":{level:"2nd",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S",dur:"Instantaneous",desc:"You touch a creature and can end either one disease or one condition afflicting it. The condition can be Blinded, Deafened, Paralyzed, or Poisoned."},
"Levitate":{level:"2nd",school:"Transmutation",time:"Action",range:"60 feet",comp:"V, S, M (leather loop or golden wire)",dur:"Concentration, up to 10 minutes",desc:"One creature or loose object of your choice rises vertically, up to 20 feet, and remains suspended there for the duration. An unwilling creature that succeeds on a CON save is unaffected."},
"Locate Object":{level:"2nd",school:"Divination",time:"Action",range:"Self",comp:"V, S, M (a forked twig)",dur:"Concentration, up to 10 minutes",desc:"Describe or name an object that is familiar to you. You sense the direction to the object's location, as long as it is within 1,000 feet of you. If the object is in motion, you know the direction of its movement."},
"Magic Weapon":{level:"2nd",school:"Transmutation",time:"Bonus Action",range:"Touch",comp:"V, S",dur:"Concentration, up to 1 hour",desc:"You touch a nonmagical weapon. Until the spell ends, that weapon becomes a magic weapon with a +1 bonus to attack rolls and damage rolls. At Higher Levels: +2 at 4th level, +3 at 6th level."},
"Mirror Image":{level:"2nd",school:"Illusion",time:"Action",range:"Self",comp:"V, S",dur:"1 minute",desc:"Three illusory duplicates of yourself appear in your space. Each time a creature targets you with an attack, roll a d20. If you have three duplicates, you must roll a 6 or higher to change the attack's target to a duplicate. AC 10 + your DEX modifier."},
"Misty Step":{level:"2nd",school:"Conjuration",time:"Bonus Action",range:"Self",comp:"V",dur:"Instantaneous",desc:"Briefly surrounded by silvery mist, you teleport up to 30 feet to an unoccupied space that you can see."},
"Moonbeam":{level:"2nd",school:"Evocation",time:"Action",range:"120 feet",comp:"V, S, M (several seeds of any moonseed plant)",dur:"Concentration, up to 1 minute",desc:"A silvery beam of pale light shines down in a 5-foot-radius, 40-foot-high cylinder. When a creature enters the area for the first time on a turn or starts its turn there, it must make a CON save: 2d10 radiant damage on failure, half on success. At Higher Levels: +1d10 per slot above 2nd."},
"Pass without Trace":{level:"2nd",school:"Abjuration",time:"Action",range:"Self",comp:"V, S, M (ashes from a burned leaf of mistletoe)",dur:"Concentration, up to 1 hour",desc:"A veil of shadows and silence radiates from you, masking you and your companions from detection. For the duration, each creature you choose within 30 feet has a +10 bonus to Stealth checks and can't be tracked except by magical means."},
"Prayer of Healing":{level:"2nd",school:"Abjuration",time:"10 minutes",range:"30 feet",comp:"V",dur:"Instantaneous",desc:"Up to five creatures of your choice that you can see within range each regain hit points equal to 2d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs. At Higher Levels: +1d8 per slot above 2nd."},
"Protection from Poison":{level:"2nd",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S",dur:"1 hour",desc:"You touch a creature. If it is Poisoned, you neutralize the poison. For the duration, the target has Advantage on saving throws against being Poisoned and has resistance to poison damage."},
"Ray of Enfeeblement":{level:"2nd",school:"Necromancy",time:"Action",range:"60 feet",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"A black beam of enervating energy springs from your finger toward a creature within range. Make a ranged spell attack. On a hit, the target deals only half damage with weapon attacks that use Strength until the spell ends. At the end of each of its turns, the target can make a CON save."},
"Rope Trick":{level:"2nd",school:"Transmutation",time:"Action",range:"Touch",comp:"V, S, M (powdered corn extract and a twisted loop of parchment)",dur:"1 hour",desc:"You touch a length of rope. One end rises into the air until the whole rope hangs perpendicular to the ground. At the upper end is an invisible entrance to an extradimensional space that can hold up to eight Medium or smaller creatures."},
"Scorching Ray":{level:"2nd",school:"Evocation",time:"Action",range:"120 feet",comp:"V, S",dur:"Instantaneous",desc:"You create three rays of fire and hurl them at targets within range. You can hurl them at one target or several. Make a ranged spell attack for each ray. On a hit, the target takes 2d6 fire damage. At Higher Levels: one additional ray per slot above 2nd."},
"See Invisibility":{level:"2nd",school:"Divination",time:"Action",range:"Self",comp:"V, S, M (a pinch of talc)",dur:"1 hour",desc:"For the duration, you see Invisible creatures and objects as if they were visible, and you can see into the Ethereal Plane. Ethereal creatures and objects appear ghostly and translucent."},
"Shatter":{level:"2nd",school:"Evocation",time:"Action",range:"60 feet",comp:"V, S, M (a chip of mica)",dur:"Instantaneous",desc:"A sudden loud ringing noise painfully intense erupts from a point of your choice within range. Each creature in a 10-foot-radius sphere must make a CON save. A creature takes 3d8 thunder damage on a failed save, or half on success. At Higher Levels: +1d8 per slot above 2nd."},
"Silence":{level:"2nd",school:"Illusion",time:"Action (Ritual)",range:"120 feet",comp:"V, S",dur:"Concentration, up to 10 minutes",desc:"For the duration, no sound can be created within or pass through a 20-foot-radius sphere centered on a point you choose. Any creature or object entirely inside the sphere is immune to thunder damage, and creatures are Deafened. Casting a spell with a verbal component is impossible."},
"Spider Climb":{level:"2nd",school:"Transmutation",time:"Action",range:"Touch",comp:"V, S, M (a drop of bitumen and a spider)",dur:"Concentration, up to 1 hour",desc:"Until the spell ends, one willing creature you touch gains the ability to move up, down, and across vertical surfaces and upside down along ceilings, while leaving its hands free. The target also gains a climbing speed equal to its walking speed."},
"Spiritual Weapon":{level:"2nd",school:"Evocation",time:"Bonus Action",range:"60 feet",comp:"V, S",dur:"1 minute",desc:"You create a floating, spectral weapon that lasts for the duration. When you cast the spell, make a melee spell attack against a creature within 5 feet of the weapon: 1d8 + spellcasting modifier force damage. As a Bonus Action, you can move the weapon up to 20 feet and repeat the attack. At Higher Levels: +1d8 per two slots above 2nd."},
"Suggestion":{level:"2nd",school:"Enchantment",time:"Action",range:"30 feet",comp:"V, M (a snake's tongue)",dur:"Concentration, up to 8 hours",desc:"You suggest a course of activity (limited to a sentence or two) and magically influence a creature you can see within range that can hear and understand you. The suggestion must be worded in such a manner as to make the course of action sound reasonable. WIS save to resist."},
"Warding Bond":{level:"2nd",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S, M (a pair of platinum rings worth 50 gp, which you and the target must wear)",dur:"1 hour",desc:"This spell wards a willing creature you touch. The target gains a +1 bonus to AC and saving throws, and has resistance to all damage. Also, each time the target takes damage, you take the same amount of damage."},
"Web":{level:"2nd",school:"Conjuration",time:"Action",range:"60 feet",comp:"V, S, M (a bit of spiderweb)",dur:"Concentration, up to 1 hour",desc:"You conjure a mass of thick, sticky webbing in a 20-foot cube. The webs are difficult terrain and lightly obscure their area. If the webs aren't anchored between two solid masses, the spell ends at the start of your next turn. Each creature that starts its turn in the webs or enters them must make a DEX save or be Restrained."},
"Zone of Truth":{level:"2nd",school:"Enchantment",time:"Action",range:"60 feet",comp:"V, S",dur:"10 minutes",desc:"You create a magical zone that guards against deception in a 15-foot-radius sphere. A creature that enters the spell's area for the first time on a turn or starts its turn there must make a CHA save. On a failed save, a creature can't speak a deliberate lie while in the radius."},
// Level 3 Spells
"Aura of Vitality":{level:"3rd",school:"Abjuration",time:"Action",range:"Self (30-foot radius)",comp:"V",dur:"Concentration, up to 1 minute",desc:"Healing energy radiates from you in a 30-foot radius. Until the spell ends, as a Bonus Action you can cause one creature in that area (including yourself) to regain 2d6 hit points."},
"Beacon of Hope":{level:"3rd",school:"Abjuration",time:"Action",range:"30 feet",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"This spell bestows hope and vitality. Choose any number of creatures within range. For the duration, each target has Advantage on WIS saves and death saving throws, and regains the maximum number of hit points possible from any healing."},
"Bestow Curse":{level:"3rd",school:"Necromancy",time:"Action",range:"Touch",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"You touch a creature, and it must succeed on a WIS save or become cursed. Choose the nature of the curse from several options: Disadvantage on one ability's checks and saves, Disadvantage on attacks against you, WIS save each turn or waste action, or your attacks deal extra 1d8 necrotic."},
"Blinding Smite":{level:"3rd",school:"Evocation",time:"Bonus Action",range:"Self",comp:"V",dur:"Concentration, up to 1 minute",desc:"The next time you hit a creature with a melee weapon attack, your weapon flares with bright light, and the attack deals an extra 3d8 radiant damage. The target must succeed on a CON save or be Blinded until the spell ends."},
"Call Lightning":{level:"3rd",school:"Conjuration",time:"Action",range:"120 feet",comp:"V, S",dur:"Concentration, up to 10 minutes",desc:"A storm cloud appears in a 60-foot radius centered on a point you can see 100 feet directly above you. You call down a bolt of lightning in a 5-foot-radius. Each creature in that radius must make a DEX save: 3d10 lightning damage on failure, half on success. On each subsequent turn, you can use your action to call down lightning again."},
"Clairvoyance":{level:"3rd",school:"Divination",time:"10 minutes",range:"1 mile",comp:"V, S, M (a focus worth 100 gp)",dur:"Concentration, up to 10 minutes",desc:"You create an invisible sensor within range in a location familiar to you. The sensor remains stationary. Choose seeing or hearing when you cast. You can use the chosen sense through the sensor as if you were in its space."},
"Counterspell":{level:"3rd",school:"Abjuration",time:"Reaction (when you see a creature within 60 feet casting a spell)",range:"60 feet",comp:"S",dur:"Instantaneous",desc:"You attempt to interrupt a creature in the process of casting a spell. If the creature is casting a spell of 3rd level or lower, its spell fails and has no effect. If it is casting a spell of 4th level or higher, make an ability check using your spellcasting ability. The DC equals 10 + the spell's level. On a success, the creature's spell fails."},
"Create Food and Water":{level:"3rd",school:"Conjuration",time:"Action",range:"30 feet",comp:"V, S",dur:"Instantaneous",desc:"You create 45 pounds of food and 30 gallons of water on the ground or in containers within range—enough to sustain up to fifteen humanoids or five steeds for 24 hours."},
"Crusader's Mantle":{level:"3rd",school:"Evocation",time:"Action",range:"Self (30-foot radius)",comp:"V",dur:"Concentration, up to 1 minute",desc:"Holy power emanates from you in a 30-foot radius. Until the spell ends, your allies in that area deal an extra 1d4 radiant damage when they hit with a weapon attack."},
"Daylight":{level:"3rd",school:"Evocation",time:"Action",range:"60 feet",comp:"V, S",dur:"1 hour",desc:"A 60-foot-radius sphere of light spreads out from a point you choose. The sphere is bright light and sheds dim light for an additional 60 feet. If any of this spell's area overlaps with an area of darkness created by a spell of 3rd level or lower, the spell that created the darkness is dispelled."},
"Dispel Magic":{level:"3rd",school:"Abjuration",time:"Action",range:"120 feet",comp:"V, S",dur:"Instantaneous",desc:"Choose one creature, object, or magical effect within range. Any spell of 3rd level or lower on the target ends. For each spell of 4th level or higher on the target, make an ability check using your spellcasting ability. The DC equals 10 + the spell's level. On a success, the spell ends."},
"Elemental Weapon":{level:"3rd",school:"Transmutation",time:"Action",range:"Touch",comp:"V, S",dur:"Concentration, up to 1 hour",desc:"A nonmagical weapon you touch becomes a magic weapon. Choose one of the following damage types: acid, cold, fire, lightning, or thunder. For the duration, the weapon has a +1 bonus to attack rolls and deals an extra 1d4 damage of the chosen type when it hits."},
"Fear":{level:"3rd",school:"Illusion",time:"Action",range:"Self (30-foot cone)",comp:"V, S, M (a white feather)",dur:"Concentration, up to 1 minute",desc:"You project a phantasmal image of a creature's worst fears. Each creature in a 30-foot cone must succeed on a WIS save or drop whatever it is holding and become Frightened. While Frightened, the creature must take the Dash action and move away from you by the safest available route on each of its turns."},
"Fireball":{level:"3rd",school:"Evocation",time:"Action",range:"150 feet",comp:"V, S, M (a tiny ball of bat guano and sulfur)",dur:"Instantaneous",desc:"A bright streak flashes from your pointing finger to a point you choose within range and then blossoms with a low roar into an explosion of flame. Each creature in a 20-foot-radius sphere must make a DEX save. A target takes 8d6 fire damage on a failed save, or half as much damage on a successful one. At Higher Levels: +1d6 per slot above 3rd."},
"Fly":{level:"3rd",school:"Transmutation",time:"Action",range:"Touch",comp:"V, S, M (a wing feather)",dur:"Concentration, up to 10 minutes",desc:"You touch a willing creature. The target gains a flying speed of 60 feet for the duration. When the spell ends, the target falls if it is still aloft. At Higher Levels: one additional creature per slot above 3rd."},
"Glyph of Warding":{level:"3rd",school:"Abjuration",time:"1 hour",range:"Touch",comp:"V, S, M (incense and powdered diamond worth 200+ gp, consumed)",dur:"Until dispelled or triggered",desc:"When you cast this spell, you inscribe a glyph that later unleashes a magical effect. You can store a prepared spell of 3rd level or lower in the glyph (Spell Glyph) or create a harmful effect (Explosive Runes: 5d8 acid, cold, fire, lightning, or thunder damage)."},
"Haste":{level:"3rd",school:"Transmutation",time:"Action",range:"30 feet",comp:"V, S, M (a shaving of licorice root)",dur:"Concentration, up to 1 minute",desc:"Choose a willing creature that you can see within range. Until the spell ends, the target's speed is doubled, it gains a +2 bonus to AC, it has Advantage on DEX saves, and it gains an additional action on each of its turns (Attack (one weapon attack only), Dash, Disengage, Hide, or Use an Object action only). When the spell ends, the target can't move or take actions until after its next turn."},
"Hypnotic Pattern":{level:"3rd",school:"Illusion",time:"Action",range:"120 feet",comp:"S, M (a glowing stick of incense)",dur:"Concentration, up to 1 minute",desc:"You create a twisting pattern of colors in a 30-foot cube within range. Each creature in the area must make a WIS save. On a failed save, the creature becomes Charmed for the duration. While Charmed, the creature is Incapacitated and has a speed of 0. The effect ends if the creature takes any damage or if someone else uses an action to shake the creature."},
"Lightning Bolt":{level:"3rd",school:"Evocation",time:"Action",range:"Self (100-foot line)",comp:"V, S, M (a bit of fur and a crystal rod)",dur:"Instantaneous",desc:"A stroke of lightning forming a line 100 feet long and 5 feet wide blasts out from you. Each creature in the line must make a DEX save. A creature takes 8d6 lightning damage on a failed save, or half as much damage on a successful one. At Higher Levels: +1d6 per slot above 3rd."},
"Magic Circle":{level:"3rd",school:"Abjuration",time:"1 minute",range:"10 feet",comp:"V, S, M (holy water or silver and iron powder worth 100 gp, consumed)",dur:"1 hour",desc:"You create a 10-foot-radius, 20-foot-tall cylinder of magical energy centered on a point on the ground. Choose one or more of the following creature types: celestials, elementals, fey, fiends, or undead. The circle affects a creature of the chosen type: can't willingly enter, has Disadvantage on attacks against targets within, and can't Charm, Frighten, or Possess targets within."},
"Major Image":{level:"3rd",school:"Illusion",time:"Action",range:"120 feet",comp:"V, S, M (a bit of fleece)",dur:"Concentration, up to 10 minutes",desc:"You create the image of an object, a creature, or some other visible phenomenon no larger than a 20-foot cube. The image appears at a spot within range and includes sounds, smells, and temperature appropriate to the thing depicted. You can use your action to move the image."},
"Mass Healing Word":{level:"3rd",school:"Abjuration",time:"Bonus Action",range:"60 feet",comp:"V",dur:"Instantaneous",desc:"As you call out words of restoration, up to six creatures of your choice that you can see within range regain HP equal to 2d4 + your spellcasting ability modifier. This spell has no effect on undead or constructs. At Higher Levels: +1d4 per slot above 3rd."},
"Nondetection":{level:"3rd",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S, M (a pinch of diamond dust worth 25 gp sprinkled over the target, consumed)",dur:"8 hours",desc:"For the duration, you hide a target that you touch from divination magic. The target can be a willing creature or a place or an object no larger than 10 feet in any dimension. The target can't be targeted by any divination magic or perceived through magical scrying sensors."},
"Plant Growth":{level:"3rd",school:"Transmutation",time:"Action or 8 hours",range:"150 feet",comp:"V, S",dur:"Instantaneous",desc:"If you cast this spell using 1 action, choose a point within range. All normal plants in a 100-foot radius centered on that point become thick and overgrown. A creature moving through the area must spend 4 feet of movement for every 1 foot it moves. Or if you cast this spell over 8 hours, the plants in a half-mile radius become enriched for 1 year."},
"Protection from Energy":{level:"3rd",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S",dur:"Concentration, up to 1 hour",desc:"For the duration, the willing creature you touch has resistance to one damage type of your choice: acid, cold, fire, lightning, or thunder."},
"Remove Curse":{level:"3rd",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S",dur:"Instantaneous",desc:"At your touch, all curses affecting one creature or object end. If the object is a cursed magic item, its curse remains, but the spell breaks its owner's Attunement to the object so it can be removed or discarded."},
"Revivify":{level:"3rd",school:"Necromancy",time:"Action",range:"Touch",comp:"V, S, M (diamonds worth 300 gp, consumed)",dur:"Instantaneous",desc:"You touch a creature that has died within the last minute. That creature returns to life with 1 hit point. This spell can't return to life a creature that has died of old age, nor can it restore any missing body parts."},
"Sending":{level:"3rd",school:"Divination",time:"Action",range:"Unlimited",comp:"V, S, M (a short piece of fine copper wire)",dur:"1 round",desc:"You send a short message of twenty-five words or less to a creature with which you are familiar. The creature hears the message in its mind, recognizes you as the sender if it knows you, and can answer in a like manner immediately."},
"Slow":{level:"3rd",school:"Transmutation",time:"Action",range:"120 feet",comp:"V, S, M (a drop of molasses)",dur:"Concentration, up to 1 minute",desc:"You alter time around up to six creatures of your choice in a 40-foot cube within range. Each target must succeed on a WIS save or be affected: speed halved, -2 to AC and DEX saves, can't use reactions, and can use either an action or a bonus action on its turn, not both."},
"Spirit Guardians":{level:"3rd",school:"Conjuration",time:"Action",range:"Self (15-foot radius)",comp:"V, S, M (a holy symbol)",dur:"Concentration, up to 10 minutes",desc:"You call forth spirits to protect you. They flit around you to a distance of 15 feet for the duration. When a creature enters the area for the first time on a turn or starts its turn there, it must make a WIS save: 3d8 radiant (or necrotic) damage on failed save, half on success. At Higher Levels: +1d8 per slot above 3rd."},
"Stinking Cloud":{level:"3rd",school:"Conjuration",time:"Action",range:"90 feet",comp:"V, S, M (a rotten egg)",dur:"Concentration, up to 1 minute",desc:"You create a 20-foot-radius sphere of yellow, nauseating gas centered on a point within range. The cloud spreads around corners and is heavily obscured. Each creature that is completely within the cloud at the start of its turn must make a CON save against poison. On a failed save, the creature spends its action that turn retching and reeling."},
"Tongues":{level:"3rd",school:"Divination",time:"Action",range:"Touch",comp:"V, M (a small clay model of a ziggurat)",dur:"1 hour",desc:"This spell grants the creature you touch the ability to understand any spoken language it hears. Moreover, when the target speaks, any creature that knows at least one language and can hear the target understands what it says."},
"Vampiric Touch":{level:"3rd",school:"Necromancy",time:"Action",range:"Self",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"The touch of your shadow-wreathed hand can siphon life force from others. Make a melee spell attack against a creature within your reach. On a hit, the target takes 3d6 necrotic damage, and you regain HP equal to half the necrotic damage dealt. At Higher Levels: +1d6 per slot above 3rd."},
"Water Breathing":{level:"3rd",school:"Transmutation",time:"Action (Ritual)",range:"30 feet",comp:"V, S, M (a short reed or piece of straw)",dur:"24 hours",desc:"This spell grants up to ten willing creatures you can see within range the ability to breathe underwater until the spell ends. Affected creatures also retain their normal mode of respiration."},
"Water Walk":{level:"3rd",school:"Transmutation",time:"Action (Ritual)",range:"30 feet",comp:"V, S, M (a piece of cork)",dur:"1 hour",desc:"This spell grants the ability to move across any liquid surface—such as water, acid, mud, snow, quicksand, or lava—as if it were solid ground. Up to ten willing creatures you can see within range gain this ability for the duration."},
// Level 4 Spells
"Aura of Life":{level:"4th",school:"Abjuration",time:"Action",range:"Self (30-foot radius)",comp:"V",dur:"Concentration, up to 10 minutes",desc:"Life-preserving energy radiates from you in a 30-foot radius. Until the spell ends, the aura moves with you, centered on you. Each nonhostile creature in the aura (including you) has resistance to necrotic damage, and its hit point maximum can't be reduced. Also, a nonhostile, living creature regains 1 hit point when it starts its turn in the aura with 0 hit points."},
"Aura of Purity":{level:"4th",school:"Abjuration",time:"Action",range:"Self (30-foot radius)",comp:"V",dur:"Concentration, up to 10 minutes",desc:"Purifying energy radiates from you in a 30-foot radius. Until the spell ends, the aura moves with you, centered on you. Each nonhostile creature in the aura (including you) can't become Diseased, has resistance to poison damage, and has Advantage on saving throws against effects that cause Blinded, Charmed, Deafened, Frightened, Paralyzed, Poisoned, or Stunned conditions."},
"Banishment":{level:"4th",school:"Abjuration",time:"Action",range:"60 feet",comp:"V, S, M (an item distasteful to the target)",dur:"Concentration, up to 1 minute",desc:"You attempt to send one creature you can see within range to another plane of existence. The target must succeed on a CHA save or be banished. If the target is native to a different plane than the one you're on, the target is banished with a faint popping noise, returning to its home plane. At Higher Levels: one additional creature per slot above 4th."},
"Blight":{level:"4th",school:"Necromancy",time:"Action",range:"30 feet",comp:"V, S",dur:"Instantaneous",desc:"Necromantic energy washes over a creature of your choice. The target must make a CON save, taking 8d8 necrotic damage on a failed save, or half on success. This spell has no effect on undead or constructs. A plant creature or a magical plant makes the save with Disadvantage, and takes maximum damage from this spell. At Higher Levels: +1d8 per slot above 4th."},
"Compulsion":{level:"4th",school:"Enchantment",time:"Action",range:"30 feet",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"Creatures of your choice that you can see within range and that can hear you must make a WIS save. On a failed save, a target is affected by this spell. Until the spell ends, you can use a Bonus Action on each of your turns to designate a direction that is horizontal. Each affected target must use as much of its movement as possible to move in that direction."},
"Confusion":{level:"4th",school:"Enchantment",time:"Action",range:"90 feet",comp:"V, S, M (three nut shells)",dur:"Concentration, up to 1 minute",desc:"This spell assaults and twists creatures' minds. Each creature in a 10-foot-radius sphere centered on a point you choose must succeed on a WIS save or be affected. An affected target can't take reactions and must roll a d10 at the start of each of its turns to determine its behavior for that turn. At Higher Levels: radius increases by 5 feet per slot above 4th."},
"Control Water":{level:"4th",school:"Transmutation",time:"Action",range:"300 feet",comp:"V, S, M (a drop of water and a pinch of dust)",dur:"Concentration, up to 10 minutes",desc:"Until the spell ends, you control any freestanding water inside an area you choose that is a cube up to 100 feet on a side. Choose one of the following effects: Flood (raise water level by up to 20 feet), Part Water (create a trench), Redirect Flow, or Whirlpool."},
"Death Ward":{level:"4th",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S",dur:"8 hours",desc:"You touch a creature and grant it a measure of protection from death. The first time the target would drop to 0 hit points as a result of taking damage, the target instead drops to 1 hit point, and the spell ends. If the spell is still in effect when the target is subjected to an effect that would kill it instantaneously without dealing damage, that effect is negated and the spell ends."},
"Dimension Door":{level:"4th",school:"Conjuration",time:"Action",range:"500 feet",comp:"V",dur:"Instantaneous",desc:"You teleport yourself from your current location to any other spot within range. You arrive at exactly the spot desired. It can be a place you can see, one you can visualize, or one you can describe by stating distance and direction. You can bring along objects as long as their weight doesn't exceed what you can carry. You can also bring one willing creature of your size or smaller."},
"Divination":{level:"4th",school:"Divination",time:"Action (Ritual)",range:"Self",comp:"V, S, M (incense and a sacrificial offering worth 25+ gp, consumed)",dur:"Instantaneous",desc:"Your magic and an offering put you in contact with a god or a god's servants. You ask a single question concerning a specific goal, event, or activity to occur within 7 days. The DM offers a truthful reply, which might be a short phrase, a cryptic rhyme, or an omen."},
"Dominate Beast":{level:"4th",school:"Enchantment",time:"Action",range:"60 feet",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"You attempt to beguile a beast that you can see within range. It must succeed on a WIS save or be Charmed by you for the duration. While Charmed, you have a telepathic link with it. You can use this telepathic link to issue commands to the creature (no action required), which it does its best to obey."},
"Fabricate":{level:"4th",school:"Transmutation",time:"10 minutes",range:"120 feet",comp:"V, S",dur:"Instantaneous",desc:"You convert raw materials into products of the same material. Metal, stone, or other mineral objects can be no larger than 5 feet in any dimension. The quality of objects made by the spell is commensurate with the quality of the raw materials."},
"Fire Shield":{level:"4th",school:"Evocation",time:"Action",range:"Self",comp:"V, S, M (a bit of phosphorus or a firefly)",dur:"10 minutes",desc:"Thin wispy flames wreathe your body, shedding bright light in a 10-foot radius and dim light for an additional 10 feet. Choose warm or cold shield. The warm shield grants resistance to cold damage; if a creature within 5 feet hits you with a melee attack, it takes 2d8 fire damage. The cold shield does the opposite."},
"Freedom of Movement":{level:"4th",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S, M (a leather strap)",dur:"1 hour",desc:"You touch a willing creature. For the duration, the target's movement is unaffected by difficult terrain, and spells and other magical effects can neither reduce the target's speed nor cause the target to be Paralyzed or Restrained. The target can also spend 5 feet of movement to automatically escape from nonmagical restraints."},
"Greater Invisibility":{level:"4th",school:"Illusion",time:"Action",range:"Touch",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"You or a creature you touch becomes Invisible until the spell ends. Anything the target is wearing or carrying is invisible as long as it is on the target's person."},
"Guardian of Faith":{level:"4th",school:"Conjuration",time:"Action",range:"30 feet",comp:"V",dur:"8 hours",desc:"A Large spectral guardian appears and hovers for the duration in an unoccupied space of your choice that you can see within range. Any creature hostile to you that moves to a space within 10 feet of the guardian for the first time on a turn must succeed on a DEX save. On a failed save, the creature takes 20 radiant damage, or half on success. The guardian vanishes when it has dealt a total of 60 damage."},
"Ice Storm":{level:"4th",school:"Evocation",time:"Action",range:"300 feet",comp:"V, S, M (a pinch of dust and a few drops of water)",dur:"Instantaneous",desc:"A hail of rock-hard ice pounds to the ground in a 20-foot-radius, 40-foot-high cylinder centered on a point within range. Each creature in the cylinder must make a DEX save. A creature takes 2d8 bludgeoning damage and 4d6 cold damage on a failed save, or half as much on a successful one. The storm's area is difficult terrain until the end of your next turn."},
"Locate Creature":{level:"4th",school:"Divination",time:"Action",range:"Self",comp:"V, S, M (a bit of fur from a bloodhound)",dur:"Concentration, up to 1 hour",desc:"Describe or name a creature that is familiar to you. You sense the direction to the creature's location, as long as that creature is within 1,000 feet of you. If the creature is moving, you know the direction of its movement. The spell can locate a specific creature known to you, or the nearest creature of a specific kind."},
"Otiluke's Resilient Sphere":{level:"4th",school:"Evocation",time:"Action",range:"30 feet",comp:"V, S, M (a hemispherical piece of clear crystal)",dur:"Concentration, up to 1 minute",desc:"A sphere of shimmering force encloses a creature or object of Large size or smaller within range. An unwilling creature must make a DEX save. On a failed save, the creature is enclosed for the duration. Nothing can pass through the barrier, but a creature can breathe there. The sphere is weightless and just large enough to contain the creature or object inside."},
