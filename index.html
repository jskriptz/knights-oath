<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dragonlance: The Knight's Oath</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" media="print" onload="this.media='all'" onerror="">
<style>
/* Loading screen */
#loading-screen{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#0e0e18;display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:99999;transition:opacity .5s ease-out;
}
#loading-screen.fade-out{opacity:0;pointer-events:none}
#loading-title{font-family:Georgia,serif;color:#c9a84c;font-size:13px;letter-spacing:6px;text-transform:uppercase;margin-bottom:8px}
#loading-name{font-family:Georgia,serif;color:#c9a84c;font-size:28px;letter-spacing:3px;margin-bottom:32px}
#loading-bar-container{width:240px;height:3px;background:#252540;border-radius:2px;overflow:hidden;margin-bottom:16px}
#loading-bar{height:100%;width:0%;background:linear-gradient(90deg,#8b7332,#c9a84c,#e8c860);border-radius:2px;transition:width .3s ease}
#loading-status{font-family:Georgia,serif;color:#7a7568;font-size:12px;letter-spacing:1px}
#loading-sub{font-family:Georgia,serif;color:#4a4538;font-size:11px;margin-top:24px}
</style>
<style>
/* System fonts — zero network required */
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0e0e18;--panel:#16162a;--border:#252540;--gold:#c9a84c;--gold-dim:#8b7332;--gold-bright:#e8c860;--text:#d4cfc4;--text-dim:#7a7568;--text-bright:#f0ebe0;--blue:#4a7ab5;--green:#4a8a5a;--red:#8b3a3a;--purple:#6a4a8a;--orange:#9a6a3a;--pink:#8b4a6a}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,'Times New Roman',serif;font-size:17px;line-height:1.7}

.cover{min-height:100vh;min-height:100dvh;height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:40px;text-align:center}
.cover h1{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:52px;letter-spacing:4px}
.cover h2{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:26px;font-weight:400;margin-bottom:12px}
.cover h2.gold,.gold{color:var(--gold)}
.cover p{color:var(--text);max-width:480px;margin-bottom:8px}
.dim-italic{font-style:italic;color:var(--text-dim)!important}
.cover .stats{color:var(--gold-dim);font-size:13px;margin:16px 0}
.divider{width:180px;height:1px;background:var(--gold-dim);margin:16px auto}

.gold-btn{background:var(--gold-dim);color:var(--bg);border:none;padding:14px 40px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:16px;font-weight:700;border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.gold-btn:hover{background:var(--gold);transform:translateY(-2px);box-shadow:0 4px 20px rgba(201,168,76,.3)}
.gold-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.ghost-btn{background:transparent;color:var(--text-dim);border:1px solid var(--border);padding:12px 28px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:14px;border-radius:6px;cursor:pointer;transition:all .2s}
.ghost-btn:hover{border-color:var(--gold-dim);color:var(--gold-dim)}
.btn-row{display:flex;gap:12px;margin-top:20px}

.class-choice{display:flex;gap:20px;margin-top:24px;flex-wrap:wrap;justify-content:center}
.class-btn{background:transparent;border:2px solid var(--border);color:var(--gold);padding:24px 36px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:20px;font-weight:600;cursor:pointer;border-radius:8px;transition:all .3s;min-width:200px;text-align:center}
.class-btn:hover{background:rgba(201,168,76,.1);border-color:var(--gold-dim);transform:translateY(-3px);box-shadow:0 6px 24px rgba(201,168,76,.15)}
.class-btn small{display:block;font-family:'Crimson Text',serif;font-size:13px;color:var(--text-dim);margin-top:6px;font-weight:400}
.quick-choice{gap:12px}
.class-btn.quick{border-style:dashed;padding:16px 28px;font-size:16px}
.class-btn.quick:hover{border-style:solid}

.stat-grid{display:flex;flex-direction:column;gap:10px;max-width:400px;width:100%;margin-top:16px}
.stat-input-row{display:flex;align-items:center;gap:12px;padding:8px 16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px}
.stat-input-row label{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:12px;color:var(--gold-dim);width:110px;text-align:left;letter-spacing:1px}
.stat-input-group{display:flex;align-items:center;gap:8px}
.stat-adj{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);width:32px;height:32px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:4px;transition:all .15s}
.stat-adj:hover{background:rgba(201,168,76,.15);border-color:var(--gold-dim)}
.stat-num{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:22px;color:var(--text-bright);width:36px;text-align:center;font-weight:700}
.stat-mod{font-size:14px;color:var(--text-dim);min-width:36px}
.stat-error{font-size:12px;color:#e87070}

.style-options{display:flex;flex-direction:column;gap:8px;max-width:420px;width:100%;margin-top:16px}
.style-btn{background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);padding:14px 18px;text-align:left;cursor:pointer;border-radius:6px;transition:all .2s}
.style-btn:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.06)}
.style-btn.selected{border-color:var(--gold);background:rgba(201,168,76,.12)}
.style-btn strong{display:block;color:var(--gold);font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:14px;margin-bottom:2px}
.style-btn span{font-size:14px;color:var(--text-dim)}
.name-input{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text-bright);padding:12px 16px;font-family:'Crimson Text',serif;font-size:16px;border-radius:6px;width:100%;max-width:300px;text-align:center}
.name-input::placeholder{color:var(--text-dim)}

/* Standard Array Assignment */
.stat-assign-row{display:flex;align-items:center;gap:10px;padding:8px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px}
.stat-assign-row label{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:11px;color:var(--gold-dim);width:100px;letter-spacing:1px}
.stat-select{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text-bright);padding:6px 10px;border-radius:4px;font-family:'Crimson Text',serif;font-size:16px;min-width:60px;cursor:pointer}
.stat-select:focus{border-color:var(--gold-dim);outline:none}
.bonus-toggles{display:flex;gap:4px}
.bonus-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text-dim);width:30px;height:28px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:3px;transition:all .15s;font-family:'Cinzel',Georgia,'Times New Roman',serif}
.bonus-btn:hover{border-color:var(--gold-dim)}
.bonus-btn.active2{background:rgba(201,168,76,.25);border-color:var(--gold);color:var(--gold)}
.bonus-btn.active1{background:rgba(100,180,200,.2);border-color:var(--blue);color:var(--blue)}
.stat-final{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:20px;color:var(--text-bright);font-weight:700;min-width:30px;text-align:center}
.stat-final.has-bonus{color:var(--gold-bright)}
.stat-error.center{text-align:center;margin-top:6px}

/* Feat & Mastery Options */
.feat-options{display:flex;flex-direction:column;gap:6px;max-width:480px;width:100%;margin-top:12px;max-height:50vh;overflow-y:auto;padding-right:8px}
.mastery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;max-width:560px;width:100%;margin-top:8px;max-height:45vh;overflow-y:auto;padding-right:6px}
.mastery-btn{background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);padding:8px 12px;text-align:left;cursor:pointer;border-radius:6px;transition:all .2s;font-family:'Crimson Text',serif;font-size:14px;display:flex;flex-direction:column;gap:2px}
.mastery-btn:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.06)}
.mastery-btn.selected{border-color:var(--gold);background:rgba(201,168,76,.12)}
.mastery-btn strong{display:block;color:var(--gold);font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:12px;margin-bottom:2px}
.mastery-btn span{font-size:12px;color:var(--text-dim)}
.mastery-prop{display:inline-block;background:rgba(106,27,154,.15);color:#b080d0;border:1px solid rgba(106,27,154,.25);border-radius:8px;padding:0 6px;font-size:10px;font-family:'Cinzel',Georgia,'Times New Roman',serif;letter-spacing:.5px;margin-bottom:3px}

/* Roll box outcome reveal */
.roll-box-wrapper{margin:14px 0}
.box.roll-success{border-color:var(--green);background:rgba(46,125,50,.1);animation:fadeReveal .5s ease}
.box.roll-failure{border-color:rgba(139,58,58,.5);background:rgba(139,58,58,.08);animation:fadeReveal .5s ease}
@keyframes fadeReveal{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.skip-roll-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:8px 20px;font-family:'Crimson Text',serif;font-size:13px;border-radius:5px;cursor:pointer;margin-top:8px;transition:all .2s;display:block;margin-left:auto;margin-right:auto}
.skip-roll-btn:hover{border-color:var(--gold-dim);color:var(--gold-dim)}

/* Equipment selection grid */
.equip-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;max-width:560px;width:100%;max-height:35vh;overflow-y:auto;padding-right:6px}
.equip-btn{background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);padding:8px 12px;text-align:left;cursor:pointer;border-radius:6px;transition:all .2s;font-family:'Crimson Text',serif;font-size:13px;display:flex;flex-direction:column;gap:2px}
.equip-btn:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.06)}
.equip-btn.selected{border-color:var(--gold);background:rgba(201,168,76,.12)}
.equip-btn strong{color:var(--gold);font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:12px}
.equip-props{font-size:11px;color:var(--text-dim);font-style:italic}
.shield-toggle{margin-top:12px;display:flex;align-items:center;gap:8px;font-size:14px;color:var(--text)}
.shield-toggle input{width:18px;height:18px;accent-color:var(--gold)}

/* Prayer mechanic */
.prayer-block{margin-top:16px;padding:16px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:8px;text-align:center;animation:prayerGlow 2s ease-in-out infinite alternate}
@keyframes prayerGlow{from{box-shadow:0 0 8px rgba(201,168,76,.1)}to{box-shadow:0 0 20px rgba(201,168,76,.25)}}
.prayer-text{font-style:italic;color:var(--gold-dim);font-size:14px;margin-bottom:12px}
.prayer-btn{background:transparent;border:2px solid var(--gold);color:var(--gold);padding:12px 28px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:15px;font-weight:600;border-radius:6px;cursor:pointer;transition:all .3s;letter-spacing:1px}
.prayer-btn:hover{background:rgba(201,168,76,.15);box-shadow:0 0 24px rgba(201,168,76,.3);transform:translateY(-2px)}
.prayer-btn:disabled{opacity:.5}
.prayer-result{margin-top:12px;text-align:center}
.prayer-flavor{font-style:italic;color:var(--gold);font-size:14px;margin-bottom:8px}
.coinflip{font-size:12px;color:var(--text-dim);font-style:italic;margin-top:4px}

/* Spell selection grid */
.spell-section-title{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:13px;letter-spacing:1px;margin-top:16px;margin-bottom:8px}
.spell-grid{display:flex;flex-wrap:wrap;gap:6px;max-width:480px;width:100%}
.spell-btn{background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);padding:8px 14px;font-family:'Crimson Text',serif;font-size:14px;border-radius:5px;cursor:pointer;transition:all .15s}
.spell-btn:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.06)}
.spell-btn.selected{border-color:var(--gold);background:rgba(201,168,76,.15);color:var(--gold)}
.confirm-spells{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}

/* Spell book in sidebar */
.spellbook{background:rgba(106,27,154,.06);border:1px solid rgba(106,27,154,.2);border-radius:6px;padding:8px 10px;font-size:12px}
.spell-slots{color:var(--gold-dim);font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:10px;letter-spacing:1px;margin-bottom:6px}
.spell-cat{display:flex;flex-wrap:wrap;align-items:baseline;gap:4px;margin-bottom:4px}
.spell-cat-label{color:var(--text-dim);font-size:10px;min-width:50px;font-family:'Cinzel',Georgia,'Times New Roman',serif;letter-spacing:.5px}
.spell-tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:11px}
.spell-tag.always{background:rgba(201,168,76,.15);color:var(--gold);border:1px solid rgba(201,168,76,.3)}
.spell-tag.cantrip{background:rgba(74,122,181,.12);color:var(--blue);border:1px solid rgba(74,122,181,.25)}
.spell-tag.l1{background:rgba(106,27,154,.12);color:#b080d0;border:1px solid rgba(106,27,154,.25)}
.spell-tag.has-info{cursor:pointer;display:inline-flex;align-items:center;gap:3px;padding-right:4px;transition:all .15s}
.spell-tag.has-info:hover{filter:brightness(1.2);border-color:var(--gold-dim)}
.spell-tag.has-info:active{transform:scale(.95)}
.spell-tag-name{pointer-events:none}
.spell-tag-info{font-size:10px;opacity:.5;transition:opacity .15s;pointer-events:none}
.spell-tag.has-info:hover .spell-tag-info{opacity:1}

/* Spell button with info icon */
.spell-btn-wrap{display:inline-flex;align-items:stretch;border-radius:5px;overflow:hidden;border:1px solid var(--border);transition:border-color .15s}
.spell-btn-wrap:hover{border-color:var(--gold-dim)}
.spell-btn-wrap .spell-btn{border:none;border-radius:0;flex:1}
.spell-btn-wrap .spell-btn.selected{border:none}
.spell-btn-wrap:has(.spell-btn.selected){border-color:var(--gold);background:rgba(201,168,76,.15)}
.spell-info-btn{background:rgba(255,255,255,.04);border:none;border-left:1px solid var(--border);color:var(--text-dim);width:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.spell-info-btn:hover{background:rgba(201,168,76,.15);color:var(--gold)}

/* Spell tooltip overlay */
.spell-tooltip-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.spell-tooltip{background:var(--panel);border:1px solid var(--gold-dim);border-radius:10px;max-width:440px;width:100%;padding:0;overflow:hidden;animation:tooltipIn .2s ease}
@keyframes tooltipIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.st-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(201,168,76,.08);border-bottom:1px solid var(--border)}
.st-name{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:16px;font-weight:600}
.st-level{font-size:12px;color:var(--text-dim);font-style:italic}
.st-close{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;padding:4px 8px}
.st-close:hover{color:var(--gold)}
.st-meta{padding:12px 18px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text-dim);display:grid;grid-template-columns:1fr 1fr;gap:4px}
.st-meta strong{color:var(--text)}
.st-desc{padding:14px 18px;font-size:14px;line-height:1.6;color:var(--text)}

/* Stat warnings (soft, yellow) */
.stat-warning{font-size:12px;color:#d4a844;text-align:center;margin-top:4px;font-style:italic}

/* Roll Conditional Reveal */
.roll-box-wrapper{margin:14px 0}
.box.roll-success{border-color:#2e7d32;background:rgba(46,125,50,.1);border-left:4px solid #4caf50;animation:revealBox .4s ease}
.box.roll-failure{border-color:#8b3a3a;background:rgba(139,58,58,.08);border-left:4px solid #b71c1c;animation:revealBox .4s ease}
@keyframes revealBox{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.coin-flip{font-size:12px;color:var(--text-dim);font-style:italic;margin-top:6px;text-align:center}

/* Spell Selection */
.spell-step{max-width:600px}
.spell-section-title{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.spell-list{display:flex;flex-direction:column;gap:6px;max-height:45vh;overflow-y:auto;padding-right:4px}
.spell-btn{background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--text);padding:12px 14px;text-align:left;cursor:pointer;border-radius:6px;transition:all .2s;width:100%}
.spell-btn:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.05)}
.spell-btn.selected{border-color:var(--gold);background:rgba(201,168,76,.1)}
.spell-btn-header{display:flex;align-items:center;gap:8px}
.spell-btn-header strong{color:var(--gold);font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:13px}
.spell-school{font-size:11px;color:var(--text-dim);font-style:italic}
.spell-check{color:var(--gold-bright);font-size:16px;margin-left:auto}
.spell-meta-line{display:flex;gap:12px;font-size:11px;color:var(--text-dim);margin-top:4px}
.spell-desc{font-size:13px;color:var(--text-dim);margin-top:6px;line-height:1.5}
.spell-comp{font-size:11px;color:var(--text-dim);margin-top:2px}

/* Spellbook in Sidebar */
.sb-spells{font-size:12px}
.spell-slots{color:var(--gold);font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:11px;letter-spacing:1px;margin-bottom:6px}
.sb-spell-group{margin-bottom:4px}
.sb-spell-label{display:block;font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.sb-spell-tag{display:inline-block;padding:1px 6px;border-radius:8px;font-size:11px;margin:1px 2px;background:rgba(201,168,76,.1);color:var(--gold);border:1px solid rgba(201,168,76,.2)}
.sb-spell-tag.cantrip{background:rgba(74,122,181,.1);color:var(--blue);border-color:rgba(74,122,181,.2)}

/* Spell Cards on Character Sheet */
.cs-spell-details{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.cs-spell-card{padding:10px 14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px}
.cs-spell-name{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:13px;font-weight:600}
.cs-spell-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.cs-spell-desc{font-size:13px;color:var(--text);margin-top:6px;line-height:1.5}

.confirm-sheet{max-width:400px;width:100%;text-align:left}
.confirm-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:15px}
.confirm-row span:first-child{color:var(--text-dim)}
.confirm-stats{display:flex;justify-content:space-around;margin:16px 0;gap:4px}
.mini-stat{text-align:center;padding:8px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;min-width:52px}
.mini-label{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:10px;color:var(--gold-dim);letter-spacing:1px}
.mini-val{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:20px;color:var(--text-bright);font-weight:700}
.mini-mod{font-size:12px;color:var(--text-dim)}

#game-container{display:flex;height:100vh;height:100dvh;overflow:hidden}

.sidebar{width:300px;min-width:300px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.sidebar h3{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold-dim);font-size:11px;text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.sidebar-section{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;padding:10px}
.char-header{text-align:center;padding-bottom:12px;border-bottom:1px solid var(--border)}
.char-name{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:18px;font-weight:600}
.char-class{color:var(--text-dim);font-size:13px}

.hp-bar-container{position:relative;height:24px;background:rgba(139,58,58,.2);border-radius:4px;overflow:hidden;margin-bottom:8px}
.hp-bar{height:100%;background:linear-gradient(90deg,#4a8a5a,#6aaa6a);border-radius:4px;transition:width .5s}
.hp-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:12px;color:var(--text-bright);font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.8)}
.mini-stats-row{display:flex;justify-content:space-around;font-size:12px;color:var(--text-dim);font-family:'Cinzel',Georgia,'Times New Roman',serif}

.stat-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.stat-chip{text-align:center;padding:4px 2px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:4px}
.chip-label{display:block;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:9px;color:var(--gold-dim);letter-spacing:1px}
.chip-val{display:block;font-size:15px;color:var(--text-bright);font-weight:700}
.chip-mod{display:block;font-size:10px;color:var(--text-dim)}

.order-points{display:flex;gap:6px}
.order-badge{flex:1;text-align:center;padding:6px 2px;border-radius:4px;font-size:10px;font-family:'Cinzel',Georgia,'Times New Roman',serif;letter-spacing:1px}
.order-badge.rose{background:rgba(200,100,100,.12);color:#e8a0a0;border:1px solid rgba(200,100,100,.25)}
.order-badge.sword{background:rgba(100,150,200,.12);color:#a0c0e8;border:1px solid rgba(100,150,200,.25)}
.order-badge.crown{background:rgba(200,180,100,.12);color:#e8d8a0;border:1px solid rgba(200,180,100,.25)}
.order-badge .num{display:block;font-size:20px;font-weight:700}

.companion-list{display:flex;flex-wrap:wrap;gap:4px}
.companion-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;background:rgba(74,138,90,.15);color:#8ac8a0;border:1px solid rgba(74,138,90,.25);cursor:pointer;transition:all .15s}
.companion-tag:hover{filter:brightness(1.2);border-color:rgba(74,138,90,.5)}
.companion-tag .spell-tag-info{font-size:9px;opacity:.5}
.companion-tag:hover .spell-tag-info{opacity:1}
.companion-tag.romance{background:rgba(139,74,106,.15);color:#d8a0c0;border-color:rgba(139,74,106,.25)}

/* Companion tooltip */
.companion-tooltip .comp-meta{grid-template-columns:1fr;gap:8px}
.companion-tooltip .comp-romance-info{font-size:13px;color:var(--pink);padding:10px 18px;border-top:1px solid var(--border)}

/* God Signs sidebar */
.god-signs{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);border-radius:6px;padding:8px 10px}
.god-sign-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:12px}
.god-name{color:var(--gold);font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:11px;letter-spacing:.5px}
.god-count{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:14px;color:var(--gold-bright);font-weight:700}
.god-sign-empty{font-size:11px;color:var(--text-dim);font-style:italic;text-align:center}
.inv-list{font-size:12px;color:var(--text-dim)}
.inv-item{padding:1px 0}
.inv-item::before{content:'\2022 ';color:var(--gold-dim)}
.history-list{font-size:11px;color:#555;max-height:120px;overflow-y:auto}
.hist-item{padding:1px 0}

.main-content{flex:1;overflow-y:auto}
.scene-header{background:var(--panel);padding:22px 36px;border-bottom:2px solid var(--gold-dim)}
.scene-header h1{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:22px;font-weight:600;letter-spacing:1px}
.scene-header .location{color:var(--text-dim);font-style:italic;margin-top:3px;font-size:14px}
.scene-body{padding:28px 36px;max-width:780px;margin:0 auto;width:100%}
.scene-body p{margin-bottom:14px;text-align:justify}
.scene-body p strong{color:var(--text-bright)}
.scene-body p em{color:var(--text-dim)}

.box{margin:14px 0;padding:14px 16px;border-radius:6px;border-left:4px solid var(--blue);background:rgba(42,74,127,.08);font-size:15px;line-height:1.6}
.box p{margin-bottom:6px}.box p:last-child{margin-bottom:0}
.box.roll{border-color:var(--green);background:rgba(46,125,50,.06)}
.box.combat{border-color:var(--orange);background:rgba(141,78,26,.06)}
.box.levelup{border-color:#1b2a4a;background:rgba(27,42,74,.1)}
.box.companion{border-color:var(--green);background:rgba(40,167,69,.06)}
.box.romance{border-color:var(--pink);background:rgba(173,20,87,.06)}
.box.dark,.box.conviction,.box.dg_track{border-color:var(--purple);background:rgba(106,27,154,.06)}
.box.divine{border-color:var(--gold);background:rgba(201,168,76,.05)}
.box.item{border-color:var(--gold-dim);background:rgba(139,115,50,.06)}
.box.measure{border-color:#1b2a4a;background:rgba(27,42,74,.08)}

.choices{margin-top:20px;display:flex;flex-direction:column;gap:6px}
.choice-btn{background:rgba(42,74,127,.1);border:1px solid rgba(74,122,181,.25);border-left:4px solid var(--blue);color:var(--text-bright);padding:12px 16px;text-align:left;cursor:pointer;border-radius:6px;font-family:'Crimson Text',serif;font-size:15px;line-height:1.5;transition:all .2s}
.choice-btn:hover{background:rgba(74,122,181,.18);border-color:var(--blue);transform:translateX(3px)}
.choice-btn .letter{color:var(--gold);font-family:'Cinzel',Georgia,'Times New Roman',serif;font-weight:700;margin-right:6px}
.choice-btn .points{display:inline-block;font-size:11px;color:var(--text-dim);margin-left:6px}
.choice-btn.conviction{border-left-color:var(--purple)}
.choice-btn.romance-choice{border-left-color:var(--pink)}

/* Mandatory detours */
.mandatory-detours{margin-bottom:16px;padding:14px;background:rgba(201,168,76,.08);border:2px solid rgba(201,168,76,.3);border-radius:8px}
.detour-label{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:12px;color:var(--gold);letter-spacing:1px;margin-bottom:10px}
.detour-btn{display:block;width:100%;background:rgba(201,168,76,.1);border:1px solid var(--gold);color:var(--gold);padding:12px 16px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:14px;font-weight:600;border-radius:6px;cursor:pointer;transition:all .2s;margin-bottom:6px;text-align:left;letter-spacing:.5px}
.detour-btn:hover{background:rgba(201,168,76,.2);box-shadow:0 0 12px rgba(201,168,76,.15)}
.detour-btn.mandatory{border-width:2px;animation:detourPulse 2s ease-in-out infinite alternate}
@keyframes detourPulse{from{box-shadow:0 0 4px rgba(201,168,76,.1)}to{box-shadow:0 0 16px rgba(201,168,76,.25)}}
.choices.greyed{opacity:.3;pointer-events:none;filter:grayscale(0.5)}
.choices.greyed::before{content:'Complete the scene above first';display:block;text-align:center;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:11px;color:var(--text-dim);letter-spacing:1px;margin-bottom:8px}
.no-choices{color:#555;font-style:italic;margin-top:20px}

.dice-area{margin:14px 0;padding:20px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;text-align:center}
.dice-info{color:var(--text-dim);font-size:13px;margin-bottom:12px;font-family:'Cinzel',Georgia,'Times New Roman',serif;letter-spacing:1px}
.dice-placeholder{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:48px;color:var(--border);margin:12px 0}
.dice-result{margin:12px 0}
.dice-num{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:48px;font-weight:700}
.dice-bonus{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:24px;color:var(--text-dim)}
.dice-result.success .dice-num{color:#6adb6a;text-shadow:0 0 20px rgba(106,219,106,.3)}
.dice-result.fail .dice-num{color:#db6a6a;text-shadow:0 0 20px rgba(219,106,106,.3)}
.dice-verdict{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:14px;margin-top:6px;letter-spacing:2px}
.dice-result.success .dice-verdict{color:#6adb6a}
.dice-result.fail .dice-verdict{color:#db6a6a}
.dice-btn{background:var(--gold-dim);color:var(--bg);border:none;padding:10px 28px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:14px;font-weight:700;border-radius:6px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.dice-btn:hover{background:var(--gold);transform:scale(1.03)}
.dice-btn:disabled{opacity:.5}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}

/* Mobile bar & backdrop: hidden on desktop */
.mobile-bar{display:none!important}
.sidebar-backdrop{display:none}

@media(max-width:768px){
  /* Game layout: sidebar becomes slide-in overlay */
  #game-container{flex-direction:column;position:relative}
  .sidebar{position:fixed;top:0;left:0;width:85vw;max-width:320px;height:100vh;height:100dvh;min-width:0;z-index:100;
    transform:translateX(-100%);transition:transform .3s ease;flex-direction:column;flex-wrap:nowrap;
    max-height:100vh;height:100dvh;box-shadow:4px 0 20px rgba(0,0,0,.5)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:99}
  .sidebar-backdrop.show{display:block}
  
  /* Mobile top bar */
  .mobile-bar{display:flex!important;align-items:center;justify-content:space-between;padding:10px 16px;
    background:var(--panel);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
  .mobile-bar .bar-name{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:14px;font-weight:600}
  .mobile-bar .bar-stats{font-size:11px;color:var(--text-dim);display:flex;gap:8px}
  .mobile-bar .bar-stats span{display:inline-block}
  .hamburger{background:none;border:1px solid var(--border);color:var(--gold);width:40px;height:40px;
    font-size:20px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .hamburger:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.1)}
  
  /* Main content fills screen */
  .main-content{width:100%;height:100vh;height:100dvh;padding-bottom:60px}
  .scene-header{padding:14px 16px}
  .scene-header h1{font-size:18px}
  .scene-body{padding:16px}
  .scene-body p{font-size:16px;line-height:1.65;margin-bottom:12px}
  
  /* Touch-friendly choices */
  .choice-btn{padding:14px 16px;font-size:16px;min-height:48px}
  .choice-btn:hover{transform:none} /* no hover shift on mobile */
  .choice-btn:active{background:rgba(74,122,181,.25);transform:scale(.98)}
  .detour-btn{padding:14px 16px;font-size:15px;min-height:48px}
  
  /* Boxes */
  .box{padding:12px 14px;font-size:14px}
  .box p{font-size:14px}
  
  /* Dice roller */
  .dice-area{padding:16px}
  .dice-btn{padding:14px 32px;font-size:16px;min-height:48px}
  .dice-num{font-size:40px}
  
  /* Cover screen */
  .cover{padding:24px 20px;min-height:100vh;min-height:100dvh;height:100dvh}
  .cover h1{font-size:32px;letter-spacing:2px}
  .cover h2{font-size:20px}
  .cover p{font-size:15px}
  .gold-btn{padding:14px 32px;font-size:15px;width:100%;max-width:300px}
  .ghost-btn{padding:12px 24px;font-size:13px}
  .btn-row{flex-wrap:wrap;justify-content:center}
  
  /* Class selection */
  .class-choice{flex-direction:column;width:100%;max-width:340px}
  .class-btn{padding:20px 24px;font-size:18px;width:100%}
  .class-btn small{font-size:12px}
  
  /* Stat assignment */
  .stat-grid{max-width:100%}
  .stat-assign-row{flex-wrap:wrap;gap:8px;padding:10px 12px}
  .stat-assign-row label{width:100%;margin-bottom:-4px}
  .stat-select{flex:1;min-width:50px;font-size:18px;padding:8px}
  .bonus-btn{width:36px;height:36px;font-size:13px}
  .stat-final{font-size:22px;min-width:36px}
  .stat-input-row{flex-wrap:wrap;gap:6px;padding:10px 12px}
  .stat-input-row label{width:100%;margin-bottom:-2px}
  .stat-adj{width:40px;height:40px;font-size:22px}
  .stat-num{font-size:24px;width:44px}
  
  /* Feat & style options */
  .style-options,.feat-options{max-width:100%}
  .style-btn{padding:14px 16px}
  .style-btn strong{font-size:15px}
  .style-btn span{font-size:13px}
  .mastery-grid{grid-template-columns:1fr;max-width:100%}
  .mastery-btn{padding:12px 14px}
  .spell-grid{max-width:100%}
  .spell-btn{padding:10px 14px;font-size:15px;flex:1 0 45%}
  .spell-btn-wrap{flex:1 0 45%}
  .spell-btn-wrap .spell-btn{padding:10px 12px;font-size:14px}
  .spell-info-btn{width:38px;font-size:16px}
  .equip-grid{grid-template-columns:1fr;max-width:100%}
  .equip-btn{padding:12px 14px}
  .prayer-btn{padding:14px 24px;font-size:14px;width:100%}
  .spell-tooltip{max-width:95vw}
  .st-meta{grid-template-columns:1fr}
  .st-header{padding:12px 14px}
  .st-desc{padding:12px 14px;font-size:15px}
  .mastery-btn strong{font-size:13px}
  .mastery-btn span{font-size:12px}

  /* Spell selection on mobile */
  .spell-step{max-width:100%}
  .spell-list{max-height:40vh}
  .spell-btn{padding:14px}
  .spell-btn-header strong{font-size:14px}
  .spell-desc{font-size:14px}
  .name-input{max-width:100%;font-size:18px;padding:14px 16px}
  
  /* Confirm sheet */
  .confirm-sheet{max-width:100%}
  .confirm-stats{flex-wrap:wrap;justify-content:center}
  .mini-stat{min-width:60px;flex:1}
  
  /* Save slots */
  .save-slots{max-width:100%;width:100%}
  .save-slot{padding:14px 12px}
  .slot-info{min-height:44px;display:flex;flex-direction:column;justify-content:center}
  .slot-delete{width:44px;height:44px;font-size:24px}
  
  /* Modal */
  .modal-box{padding:20px;max-width:95vw}
  .save-slot-btn{padding:16px 14px;min-height:56px}
  
  /* Character sheet */
  .char-sheet-page{padding:20px 16px}
  .cs-stats-grid{grid-template-columns:repeat(3,1fr)}
  .cs-abilities{grid-template-columns:repeat(3,1fr)}
  .cs-skills-grid{grid-template-columns:1fr}
  .cs-combat-grid{flex-direction:row;flex-wrap:wrap}
  .cs-combat-box{min-width:45%}
  .cs-atk-header,.cs-atk-row{grid-template-columns:1.5fr 1fr 1.5fr 1fr;font-size:12px}
  .cs-stat-score{font-size:22px}
  .cs-inv-grid{grid-template-columns:1fr}
  .cs-order-grid{flex-wrap:wrap}
  .cs-order{min-width:80px}
  .cs-actions{flex-direction:column;gap:8px}
  .cs-actions .gold-btn,.cs-actions .ghost-btn{width:100%;margin-left:0!important}
  
  /* Sidebar actions on mobile */
  .sidebar-actions{flex-direction:row;flex-wrap:wrap;gap:6px}
  .save-btn,.menu-btn{flex:1;min-height:44px}
  .sheet-sidebar-btn{min-height:44px}
  .confirm-btns{flex-direction:column}
  .romance-prompt-btns{gap:10px}
  .romance-prompt-btns button{min-height:48px;font-size:15px}
  .confirm-yes{width:100%}
  .slot-delete-btn{width:44px;height:44px;font-size:22px}
  
  /* Order badges in sidebar */
  .order-badge{padding:8px 4px}
  .order-badge .num{font-size:18px}
}
  .class-choice{flex-direction:column}
}

/* Save Slots */
.save-slots{width:100%;max-width:420px;margin-top:8px}
.slots-title{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold-dim);font-size:11px;text-transform:uppercase;letter-spacing:2px;text-align:center;margin-bottom:10px}
.save-slot{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;background:rgba(255,255,255,.02)}
.save-slot.empty{opacity:.5}
.save-slot.filled{cursor:pointer;transition:all .2s}
.save-slot.filled:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.06)}
.slot-label{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:11px;color:var(--gold-dim);letter-spacing:1px;min-width:50px}
.slot-info{flex:1;cursor:pointer}
.slot-name{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:14px;font-weight:600}
.slot-details{font-size:12px;color:var(--text-dim);margin-top:1px}
.slot-date{font-size:11px;color:var(--text-dim);opacity:.7}
.slot-empty-text{font-size:13px;color:var(--text-dim);font-style:italic;flex:1;text-align:center}
.slot-delete{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px 8px;transition:color .2s;opacity:.5}
.slot-delete:hover{color:var(--red);opacity:1}
.slot-confirm{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim)}
.slot-yes,.slot-no{background:none;border:1px solid var(--border);color:var(--text);padding:2px 10px;border-radius:3px;cursor:pointer;font-size:11px}
.slot-yes:hover{border-color:var(--red);color:var(--red)}
.slot-no:hover{border-color:var(--gold-dim);color:var(--gold-dim)}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.modal-box{background:var(--panel);border:1px solid var(--gold-dim);border-radius:10px;padding:28px 32px;max-width:420px;width:90%;text-align:center}
.modal-box h2{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:18px;margin-bottom:16px}

/* Confirm modal */
.confirm-modal{text-align:center;max-width:360px}
.confirm-msg{font-size:15px;color:var(--text);margin-bottom:20px;line-height:1.6}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.confirm-yes{padding:10px 24px!important}

/* Romance prompt */
.romance-prompt{text-align:center;max-width:380px}
.romance-prompt-icon{font-size:36px;margin-bottom:8px}
.romance-prompt-stage{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:13px;color:var(--pink);letter-spacing:2px;text-transform:uppercase}
.romance-prompt-text{font-size:15px;color:var(--text);line-height:1.6;margin:8px 0 12px;font-style:italic}
.romance-prompt-desc{font-size:12px;color:var(--text-dim);margin-bottom:16px}
.romance-prompt-btns{display:flex;flex-direction:column;gap:8px}
.romance-accept{background:rgba(173,20,87,.15)!important;border-color:rgba(173,20,87,.4)!important;color:var(--pink)!important}
.romance-accept:hover{background:rgba(173,20,87,.25)!important}
.romance-friend{border-color:rgba(74,138,90,.3)!important;color:#8ac8a0!important}
.romance-friend:hover{background:rgba(74,138,90,.1)!important}
.romance-decline{opacity:.6}
.romance-decline:hover{opacity:1}

/* Romance manage button in sidebar */
.romance-manage-btn{background:rgba(173,20,87,.1);border:1px solid rgba(173,20,87,.25);color:var(--pink);padding:6px 12px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:11px;border-radius:5px;cursor:pointer;transition:all .2s;width:100%;letter-spacing:.5px}
.romance-manage-btn:hover{background:rgba(173,20,87,.2);border-color:var(--pink)}

/* Romance manage modal */
.romance-manage{max-width:420px}
.rm-section{margin-bottom:16px}
.rm-section h3{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:13px;color:var(--gold-dim);letter-spacing:1px;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.rm-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;flex-wrap:wrap}
.rm-row.friend{border-color:rgba(74,138,90,.2);background:rgba(74,138,90,.04)}
.rm-row.available{border-style:dashed;opacity:.6}
.rm-name{font-weight:600;color:var(--text);flex:1;min-width:120px}
.rm-stage{font-size:12px;color:var(--pink)}
.rm-actions{display:flex;gap:4px;flex-wrap:wrap}
.rm-btn{padding:4px 10px!important;font-size:11px!important;min-height:auto!important}
.rm-end{border-color:rgba(139,58,58,.3)!important;color:var(--red)!important}
.rm-end:hover{background:rgba(139,58,58,.1)!important}

/* Relationship check modal */
.romance-check{max-width:420px;text-align:center}
.rc-icon{font-size:40px;margin-bottom:8px}
.rc-names{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:16px;color:var(--gold);margin:8px 0}
.rc-reason{font-size:13px;color:var(--text-dim);font-style:italic;margin-bottom:12px}
.rc-prose{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:20px}
.rc-btns{display:flex;flex-direction:column;gap:8px}

/* Breakup scene */
.breakup-scene{max-width:520px;text-align:left}
.breakup-desc{font-size:13px;color:var(--text-dim);font-style:italic;margin-bottom:8px}
.breakup-status{font-size:12px;color:var(--pink);margin-bottom:16px}
.breakup-options{display:flex;flex-direction:column;gap:12px}
.breakup-option{padding:14px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.02)}
.breakup-option h3{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:14px;margin-bottom:8px}
.breakup-option.gentle h3{color:#8ac8a0}
.breakup-option.harsh h3{color:var(--gold-dim)}
.breakup-option.betrayal h3{color:var(--red)}
.breakup-option p{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:8px}
.breakup-outcome{font-size:12px;font-weight:600;margin-bottom:8px}
.breakup-bad{border-color:rgba(139,58,58,.3)!important;color:var(--red)!important}
.breakup-bad:hover{background:rgba(139,58,58,.1)!important}

/* NPC notification modal */
.npc-notify{text-align:center;max-width:380px}
.npc-notify-icon{font-size:40px;margin-bottom:8px}
.npc-notify-name{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:18px;color:var(--gold);margin:8px 0}
.npc-notify-reason{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:12px;font-style:italic}
.npc-notify-personality{font-size:12px;color:var(--text-dim)}
h2.red{color:var(--red)}

/* Friend status on companion tags */
.cs-comp-romance.friend{color:#8ac8a0!important;border-color:rgba(74,138,90,.25)}

/* Save slot rows with delete */
.save-slot-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.save-slot-row .save-slot-btn{flex:1}
.slot-delete-btn{background:none;border:1px solid var(--border);color:var(--text-dim);width:36px;height:36px;min-width:36px;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:5px;transition:all .15s;flex-shrink:0}
.slot-delete-btn:hover{border-color:var(--red);color:var(--red);background:rgba(139,58,58,.1)}
.slot-del-confirm{display:flex;gap:4px;flex-shrink:0}
.slot-del-confirm .slot-yes{background:rgba(139,58,58,.15);border:1px solid rgba(139,58,58,.4);color:#e87070;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.slot-del-confirm .slot-no{background:none;border:1px solid var(--border);color:var(--text-dim);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px}
.modal-slots .save-slot-btn{display:flex;flex-direction:column;align-items:flex-start;width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,.02);cursor:pointer;margin-bottom:6px;transition:all .2s;text-align:left;color:var(--text);font-family:'Crimson Text',serif;font-size:14px}
.modal-slots .save-slot-btn:hover{border-color:var(--gold-dim);background:rgba(201,168,76,.08)}
.modal-slots .save-slot-btn.has-data{border-color:rgba(200,100,100,.25)}
.modal-slots .save-slot-btn.has-data:hover{border-color:rgba(200,100,100,.5)}
.slot-overwrite{font-size:11px;color:var(--red);margin-top:2px;font-style:italic}

/* Sidebar Actions */
.sidebar-actions{margin-top:auto;padding-top:12px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.save-btn{background:rgba(201,168,76,.12);border:1px solid var(--gold-dim);color:var(--gold);padding:8px 12px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:12px;border-radius:5px;cursor:pointer;transition:all .2s;letter-spacing:1px}
.save-btn:hover{background:rgba(201,168,76,.2);border-color:var(--gold)}
.sheet-sidebar-btn{background:rgba(74,122,181,.12);border:1px solid rgba(74,122,181,.3);color:var(--blue);padding:8px 12px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:12px;border-radius:5px;cursor:pointer;transition:all .2s;letter-spacing:1px;width:100%}
.sheet-sidebar-btn:hover{background:rgba(74,122,181,.2);border-color:var(--blue)}
.menu-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:11px;border-radius:5px;cursor:pointer;transition:all .2s}
.menu-btn:hover{border-color:var(--text-dim);color:var(--text)}
.save-msg{font-size:12px;color:var(--green);text-align:center;font-style:italic;animation:fadeMsg 2.5s forwards}
@keyframes fadeMsg{0%{opacity:1}80%{opacity:1}100%{opacity:0}}

/* Character Sheet */
.char-sheet-page{min-height:100vh;min-height:100dvh;height:100dvh;background:var(--bg);padding:40px;max-width:800px;margin:0 auto}
.cs-header{text-align:center;margin-bottom:32px}
.cs-title-block h1{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:28px;letter-spacing:3px}
.cs-title-block h2{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--text-dim);font-size:14px;font-weight:400;letter-spacing:2px;margin-top:4px}
.cs-divider{width:200px;height:1px;background:var(--gold-dim);margin:16px auto}
.cs-body{display:flex;flex-direction:column;gap:24px}
.cs-section{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:20px 24px}
.cs-section-title{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.cs-section-body{display:flex;flex-direction:column;gap:6px}
.cs-row{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;font-size:15px}
.cs-label{color:var(--text-dim)}
.cs-val{color:var(--text-bright);font-weight:600}
.cs-note{font-size:13px;color:var(--text-dim);font-style:italic;margin-top:8px}
.cs-empty{font-size:13px;color:var(--text-dim);font-style:italic}

.cs-stats-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}

/* Ability scores with saves */
.cs-abilities{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.cs-ability-block{text-align:center;padding:10px 4px 6px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px}
.cs-ability-block .cs-stat-label{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:9px;color:var(--gold-dim);letter-spacing:1px}
.cs-ability-block .cs-stat-score{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:24px;color:var(--text-bright);font-weight:700}
.cs-ability-block .cs-stat-mod{font-size:12px;color:var(--text-dim);margin-bottom:4px}
.cs-save{font-size:11px;color:var(--text-dim);border-top:1px solid var(--border);padding-top:4px;margin-top:4px}
.cs-save.prof{color:var(--gold)}
.cs-save-dot{font-size:8px}

/* Skills grid */
.cs-skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px}
.cs-skill-row{display:flex;align-items:center;gap:6px;padding:3px 8px;font-size:13px;border-radius:3px}
.cs-skill-row.prof{background:rgba(201,168,76,.06)}
.cs-skill-dot{font-size:8px;color:var(--text-dim);min-width:10px}
.cs-skill-row.prof .cs-skill-dot{color:var(--gold)}
.cs-skill-mod{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:12px;color:var(--text-bright);min-width:24px;font-weight:600}
.cs-skill-name{color:var(--text);flex:1}
.cs-skill-row.prof .cs-skill-name{color:var(--gold)}
.cs-skill-stat{font-size:10px;color:var(--text-dim)}
.cs-passive{grid-column:1/-1;text-align:center;padding:8px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:12px;color:var(--gold-dim);border-top:1px solid var(--border);margin-top:4px}

/* Combat boxes */
.cs-combat-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.cs-combat-box{flex:1;min-width:80px;text-align:center;padding:10px 8px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px}
.cs-combat-box.hp{min-width:120px}
.cs-combat-label{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:9px;color:var(--gold-dim);letter-spacing:1px;margin-bottom:4px}
.cs-combat-val{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:22px;color:var(--text-bright);font-weight:700}

/* Attack table */
.cs-atk-header{display:grid;grid-template-columns:2fr 1fr 1.5fr 1fr;gap:8px;padding:6px 8px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:10px;color:var(--gold-dim);letter-spacing:1px;border-bottom:1px solid var(--border)}
.cs-atk-row{display:grid;grid-template-columns:2fr 1fr 1.5fr 1fr;gap:8px;padding:6px 8px;font-size:14px;color:var(--text);border-bottom:1px solid rgba(255,255,255,.03)}

/* Features list */
.cs-features{display:flex;flex-direction:column;gap:6px}
.cs-feature{font-size:13px;color:var(--text);line-height:1.5}
.cs-feature strong{color:var(--gold)}

/* Active Bonuses */
.cs-bonuses{display:flex;flex-direction:column;gap:4px}
.cs-bonus-row{padding:6px 10px;background:rgba(74,138,90,.06);border:1px solid rgba(74,138,90,.15);border-radius:5px;font-size:13px}
.cs-bonus-name{color:var(--green);font-weight:600;display:block;margin-bottom:2px}
.cs-bonus-desc{color:var(--text-dim);font-size:12px}

/* Magic Items */
.cs-magic-items{display:flex;flex-direction:column;gap:8px}
.cs-magic-item{padding:10px 14px;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.2);border-radius:6px}
.cs-mi-name{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:14px;color:var(--gold);font-weight:600;margin-bottom:4px}
.cs-mi-rarity{font-size:11px;color:var(--text-dim);font-style:italic;margin-bottom:4px}
.cs-mi-mech{font-size:12px;color:var(--text);line-height:1.5}

/* Measure Track */
.cs-measure{font-size:14px}

/* DG Track */
.cs-dg{font-size:14px}
.cs-dg-warn{color:var(--red);font-style:italic;font-size:13px;margin-top:4px}
.cs-dg-pure{color:var(--gold);font-style:italic;font-size:13px;margin-top:4px}
.cs-stat-block{text-align:center;padding:12px 4px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px}
.cs-stat-label{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:10px;color:var(--gold-dim);letter-spacing:1px}
.cs-stat-score{font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:26px;color:var(--text-bright);font-weight:700}
.cs-stat-mod{font-size:13px;color:var(--text-dim)}

.cs-order-grid{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.cs-order{flex:1;text-align:center;padding:12px 8px;border-radius:6px;font-family:'Cinzel',Georgia,'Times New Roman',serif;font-size:12px;letter-spacing:1px}
.cs-order.rose{background:rgba(200,100,100,.1);color:#e8a0a0;border:1px solid rgba(200,100,100,.25)}
.cs-order.sword{background:rgba(100,150,200,.1);color:#a0c0e8;border:1px solid rgba(100,150,200,.25)}
.cs-order.crown{background:rgba(200,180,100,.1);color:#e8d8a0;border:1px solid rgba(200,180,100,.25)}
.cs-order-num{font-size:28px;font-weight:700;display:block}
.cs-order-result{width:100%;text-align:center;font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:16px;font-weight:600;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

.cs-companion-grid{display:flex;flex-direction:column;gap:6px}
.cs-companion{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:4px}
.cs-companion.has-romance{border-color:rgba(173,20,87,.3);background:rgba(173,20,87,.05)}
.cs-companion-card{padding:12px 14px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;margin-bottom:8px}
.cs-companion-card.has-romance{border-color:rgba(173,20,87,.3);background:rgba(173,20,87,.04)}
.cs-comp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cs-comp-details{font-size:13px;color:var(--text-dim);line-height:1.5}
.cs-comp-details p{margin-bottom:4px}
.cs-comp-details strong{color:var(--text)}
.cs-comp-rom-arc{color:var(--pink)!important;font-style:italic}
.cs-comp-log{margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.06);font-size:12px;color:var(--text-dim)}
.cs-comp-log strong{color:var(--gold-dim);font-size:11px;letter-spacing:.5px;font-family:'Cinzel',Georgia,'Times New Roman',serif}
.cs-comp-log ul{margin:4px 0 0 16px;padding:0}
.cs-comp-log li{margin-bottom:2px;line-height:1.4}
.cs-comp-name{color:var(--text-bright);font-weight:600}
.cs-comp-romance{color:var(--pink);font-size:13px}

.cs-inv-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
.cs-inv-item{padding:4px 10px;font-size:14px;color:var(--text);background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:3px}

.cs-decisions{display:flex;flex-direction:column;gap:4px}
.cs-decision-item{font-size:14px;padding:3px 0;color:var(--text)}
.cs-decision-item strong{color:var(--gold-dim)}

.cs-footer{text-align:center;margin-top:32px;color:var(--text-dim);font-style:italic}
.cs-footer p{margin-bottom:6px}
.cs-ride{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-style:normal;font-size:18px;margin-top:12px!important}

.cs-actions{text-align:center;margin-top:24px;padding:20px 0}
.sheet-btn{font-size:18px!important;padding:16px 48px!important}

.ending-block{text-align:center;margin-top:32px;padding-top:24px}
.ending-text{font-family:'Cinzel',Georgia,'Times New Roman',serif;color:var(--gold);font-size:18px;margin-bottom:16px}
.ending-sub{font-size:13px;color:var(--text-dim);margin-top:8px}

/* Print Styles */
@media print{
  .no-print,.sidebar,.cs-actions{display:none!important}
  .char-sheet-page{padding:20px;background:#fff!important;color:#000!important}
  .cs-section{border-color:#ccc!important;background:#fafafa!important}
  .cs-section-title{color:#8b7332!important;border-color:#ddd!important}
  .cs-row .cs-label{color:#666!important}
  .cs-row .cs-val{color:#000!important}
  .cs-stat-block{border-color:#ccc!important;background:#f5f5f5!important}
  .cs-stat-label{color:#8b7332!important}
  .cs-stat-score{color:#000!important}
  .cs-stat-mod{color:#666!important}
  .cs-title-block h1{color:#1a1a2e!important}
  .cs-title-block h2{color:#666!important}
  .cs-divider{background:#ccc!important}
  .cs-order.rose{background:#fef0f0!important;color:#8b3a3a!important;border-color:#daa!important}
  .cs-order.sword{background:#f0f0fe!important;color:#3a5a8b!important;border-color:#aac!important}
  .cs-order.crown{background:#fef8f0!important;color:#8b7332!important;border-color:#dca!important}
  .cs-order-result{color:#1a1a2e!important;border-color:#ddd!important}
  .cs-companion{border-color:#ddd!important;background:#fafafa!important}
  .cs-companion-card{border-color:#ddd!important;background:#fafafa!important}
  .cs-companion-card.has-romance{border-color:#c8a!important;background:#fef5f8!important}
  .cs-comp-details{color:#333!important}
  .cs-comp-details strong{color:#000!important}
  .cs-comp-log{border-color:#ddd!important}
  .cs-comp-log strong{color:#5a4a20!important}
  .cs-comp-log li{color:#333!important}
  .cs-comp-name{color:#000!important}
  .cs-inv-item{border-color:#ddd!important;background:#fafafa!important;color:#000!important}
  .cs-note{color:#666!important}
  .cs-footer{color:#666!important}
  .cs-ride{color:#8b7332!important}
  .cs-decision-item{color:#000!important}
  .cs-decision-item strong{color:#8b7332!important}
  .cs-ability-block{border-color:#ccc!important;background:#f5f5f5!important}
  .cs-save{border-color:#ddd!important;color:#666!important}
  .cs-save.prof{color:#8b7332!important}
  .cs-skill-row.prof{background:#faf5e8!important}
  .cs-skill-row.prof .cs-skill-name{color:#5a4a20!important}
  .cs-combat-box{border-color:#ccc!important;background:#f5f5f5!important}
  .cs-combat-label{color:#8b7332!important}
  .cs-combat-val{color:#000!important}
  .cs-atk-header{border-color:#ddd!important;color:#8b7332!important}
  .cs-atk-row{border-color:#eee!important;color:#000!important}
  .cs-feature strong{color:#8b7332!important}
  .cs-passive{border-color:#ddd!important;color:#8b7332!important}
  .cs-bonus-row{border-color:#ccc!important;background:#f0f8f0!important}
  .cs-bonus-name{color:#2a6b2a!important}
  .cs-magic-item{border-color:#d4b456!important;background:#faf8f0!important}
  .cs-mi-name{color:#5a4a20!important}
  .cs-mi-mech{color:#333!important}
  .cs-dg-warn{color:#a33!important}
  .cs-dg-pure{color:#5a4a20!important}
  .cs-spell-card{border-color:#ddd!important;background:#fafafa!important}
  .cs-spell-name{color:#1a1a2e!important}
  .cs-spell-meta{color:#666!important}
  .cs-spell-desc{color:#333!important}
  body{background:#fff!important}
}
</style>

<script>
_ldr(50,'Loading scenes...');
const SCENES = {"1":{"id":"1","title":"A MORNING LIKE EVERY OTHER","location":"","prose":["*Castle Brightholm — Dawn*","The bell has not rung yet. You wake before it — always have, which is one of the small unglamorous disciplines that separate squires who want to be knights from squires who want to have been knights. The barracks smells of oiled leather and cold ash and the particular warmth of ten people sleeping in the same room in autumn. Aldric Voss sleeps across from you with his arms folded on his chest like a man who has already decided to be composed even in unconsciousness. Eight months here. Seven days until the Trials. Outside the window the sky is the purple-grey of pre-dawn that looks almost exactly like the moment before something begins.","Seven days. That is how many mornings remain before the formal Trials. You have been counting them differently lately — not as days remaining but as last-times. Last Tuesday at early formation. Last Wednesday in the chapel library with Aldous. This morning has the particular quality of the last first-morning-of-the-week before the thing that changes things. You get up before the bell anyway. You always do."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Perception (WIS, proficiency if trained) (+1) | WIS | DC 10\n**SUCCESS (roll 10+):** Something is off this morning — the south-facing guards are doubled and there are fresh horses in the yard that were not there yesterday. New orders arrived overnight. You know before anyone tells you.\n**FAILURE (roll 1-9):** The morning is ordinary. Nothing unusual is visible.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Go to the courtyard and practise sword forms in the dark.","target":"3","points":{"SWORD":1}},{"letter":"B","text":"Open the Measure and study the passage on Justice.","target":"4","points":{"ROSE":1}},{"letter":"C","text":"Read the letter from home again.","target":"2","points":{"ROSE":1}},{"letter":"D","text":"Wake Aldric. You want to spar before the day starts.","target":"3","points":{"SWORD":1}}]},"2":{"id":"2","title":"THE LETTER","location":"","prose":["*Castle Brightholm — Barracks*","You have read it four times. The harvest fair, your father's knee worse in the cold, your sister grown two inches. That she is proud. That she is afraid. She does not say afraid of what. She does not need to. Your mother's handwriting slopes slightly left, which it always has. At the bottom, in different ink — she sealed it, then reopened it: 'Come home safe. Be good. Be the kind of knight they write songs about, not the kind they write tragedies about. I love you.' The second ink is darker. She wrote the rest of the letter first and then could not send it without saying the true thing."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 11\n**SUCCESS (roll 11+):** Reading between the lines: she knows something specific, not just general fear. Someone has been through your village recently. Someone official, heading south. This letter was written the day after they left.\n**FAILURE (roll 1-10):** The worry in the letter is real but unreadable. You fold it and carry it.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Place it in your breast pocket. Then go train.","target":"3","points":{"ROSE":1}},{"letter":"B","text":"Set it down. Go practise. Sentiment waits.","target":"3","points":{"SWORD":1}},{"letter":"C","text":"Write back immediately, while the feeling is fresh.","target":"3","points":{"ROSE":1}}]},"3":{"id":"3","title":"ALDRIC IN THE COURTYARD","location":"","prose":["*Castle Brightholm — Training Yard, Dawn*","He is already there, which is not surprising. Aldric Voss does not oversleep. He runs sword forms in the grey pre-dawn with the absorbed focus of someone not thinking about anything else — which is precisely what being very good at something looks like. He finishes his combination before he stops, because Aldric Voss does not interrupt things that should be finished. Then a slight smile that is not quite a smile. A nod toward the practice sword on the rack.","Aldric Voss is tall and fair, with the kind of face that defaults to a neutrality so complete it reads as severity until you learn to look for the small tells — the slight relaxation around the eyes when something amuses him, the almost imperceptible tightening when something doesn't. He has the build of someone who has been training since he could hold a sword and the posture of someone who has never been entirely at ease anywhere except in motion.","The yard smells of wet stone and the specific iron tang of weapons that have been out since before dawn. Eight months ago you would have hesitated before picking up the practice sword. You pick it up without thinking, which tells you something. Aldric settles into his guard and tilts his head slightly — the same adjustment every time, left side, the tell you found in the second month and have never mentioned. You found it by watching. He knows you found it. He uses it anyway, which is either trust or a counter-trap. You have not yet decided which."],"boxes":[{"type":"companion","text":"**COMPANION JOINS: ALDRIC VOSS**\nKnight-squire, rival, possible love interest. Joins as sparring partner from this scene.\nRole: Combat ally: +1 to your attack rolls when fighting side by side."},{"type":"roll","text":"**OPTIONAL ROLL:** Perception (+1) | WIS | DC 12\n**SUCCESS (roll 12+):** You spot a gap in his left-side footwork. Carry into Scene 12: spar check at Advantage.\n**FAILURE (roll 1-11):** His form is tight this morning. Scene 12 is a fair fight.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**OPTIONAL SCENE — SERA NIGHTHOLLOW**\nBefore the spar: there is someone on the armoury roof. If you want to meet her, turn to Scene 3B (The Armoury Roof) now. Scene 3B is her first appearance — no prior relationship needed. 3B leads directly to Scene 12 (the spar)."}],"choices":[{"letter":"A","text":"Take the sword and spar.","target":"12","points":{"SWORD":1}},{"letter":"B","text":"Watch him first. Point out the gap.","target":"4","points":{"ROSE":1}},{"letter":"C","text":"Challenge him to a running race.","target":"6","points":{"SWORD":1}},{"letter":"D","text":"Tell him honestly you could not sleep. Ask if he is nervous.","target":"7","points":{"ROSE":1},"romance_spark":true},{"letter":"E","text":"Meet the woman on the armoury roof (Scene 3B — Sera Nighthollow)","target":"3B","points":{}}]},"3B":{"id":"3B","title":"THE ARMOURY ROOF","location":"","prose":["*Castle Brightholm — Training Yard, Dawn*","She is sitting on the armoury roof with her legs hanging over the edge and a whetstone working a long knife with the slow patience of someone who has been awake for a while. She watches you spar below — or watches Aldric, specifically, with the professional attention of someone cataloguing how he moves.","After a while she calls down without raising her voice: 'Your footwork has a gap on the left. He overcommits on the third combination. If you wait him out, he gives it to you.' Then she goes back to the whetstone. You have not been introduced. You do not know her name."],"boxes":[{"type":"companion","text":"**COMPANION JOINS: SERA NIGHTHOLLOW**\nGarrison scout-rogue. She sees things. She tells you when she feels like it. Possible love interest — the slow kind.\nRole: Scout intelligence: she knows the roads, the patrol patterns, and who is lying. If you listen to her, she keeps talking."},{"type":"roll","text":"**OPTIONAL ROLL:** Perception (WIS, proficiency if trained) (+2) | WIS | DC 12\n**SUCCESS (roll 12+):** She has been here for at least an hour — the whetstone marks on the roof edge show she worked on that knife before the sparring started. She was not watching Aldric. She was watching the approach to the courtyard. She is a scout, and she came here to observe something. Possibly you.\n**FAILURE (roll 1-11):** She is sitting on the roof sharpening a knife. That is all you can read.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Call up: 'I know. I have been trying to get him to show it for three weeks.' She looks at you with new attention.","target":"12","points":{"ROSE":1},"romance_spark":true},{"letter":"B","text":"Ignore the advice. You do not know her.","target":"12","points":{}},{"letter":"C","text":"Ask her name. She considers. Then tells you.","target":"12","points":{"ROSE":1}}]},"4":{"id":"4","title":"THE MEASURE","location":"","prose":["*Castle Brightholm — Chapel Library*","The chapel library is cold and smells of old parchment and tallow and three centuries of people asking difficult questions in a small room. The candles are thin — the chapel gets last priority for supplies, which says something about how equipment maintenance ranks relative to justice. You find the passage: Est Sularus oth Mithas — My honour is my life. Three words. Commentaries running to thousands of pages. You are reading one of them when Ser Aldous sits down without being invited, sets his elbows on the table, looks at you, and says: 'Ask it.' You did not know there was a question visible on your face."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Religion or History (INT, proficiency if trained) (+0) | INT | DC 12\n**SUCCESS (roll 12+):** You find the commentary passage that explains what Est Sularus actually meant when first written — not abstract honour, but a specific refusal of a corrupt command three centuries ago. The words have teeth. When Aldous asks his question you have the context to answer it well. +1 to your response in this scene.\n**FAILURE (roll 1-11):** The passage is clear but the history behind it is opaque. You know the words. You do not yet fully know what they cost.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"'What do you do when the law asks you to be cruel?'","target":"5","points":{"ROSE":2}},{"letter":"B","text":"'Is the Measure still true if the world it was written for is gone?'","target":"8","points":{"CROWN":2}},{"letter":"C","text":"'I am not sure I am good enough for the Trials.'","target":"10","points":{"ROSE":1}},{"letter":"D","text":"Say nothing. Close the book. Head to the courtyard.","target":"3","points":{"SWORD":1}}]},"5":{"id":"5","title":"THE FIRST EVALUATION","location":"","prose":["*Castle Brightholm — Assessment Hall*","Lord Caeron Ashvale conducts the morning evaluation with the economy of a man who has done this a hundred times and sees no reason to approach it differently on the hundred-and-first. He works through the squire line without warmth or hurry, marking his clipboard in the small precise hand you can identify from across a courtyard. When he reaches you, he takes your sword. He examines the blade — clean, sharp, well-maintained — and then he finds the pommel dent. He holds it at eye level and examines the dent with the expression of a man not looking at the dent but at the choice that left it there. His verdict: 'Satisfactory.' The word lands like a door being closed by someone very good at closing doors quietly.","Lord Caeron Ashvale is thirty, and already carries the compressed quality of a man who does not waste movement or word. Dark hair, pale eyes that take inventory before they settle. The armour shows years of use — bought before he could afford to replace it, maintained since out of something other than necessity."],"boxes":[{"type":"info","text":"**OPTIONAL SCENE — VAEL ASHMORE**\nYou are not the only squire waiting for Caeron's results. If you want to meet Vael Ashmore, turn to Scene 5B (The Same Dent) now. Scene 5B is her first appearance — she is in this same corridor. Read 5B instead of this scene. 5B leads to Scene 11."},{"type":"companion","text":"**COMPANION JOINS: LORD CAERON ASHVALE**\nYour evaluating officer. Cold, exacting, possible love interest.\nRole: Quest-giver for formal assignments. His approval unlocks Crown path bonuses."},{"type":"roll","text":"**OPTIONAL ROLL:** Insight (+1) | WIS | DC 13\n**SUCCESS (roll 13+):** This is a test of your reaction, not your sword. +1 to any Caeron Persuasion check this adventure.\n**FAILURE (roll 1-12):** He is completely unreadable.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Meet his gaze and accept the verdict.","target":"11","points":{"CROWN":2}},{"letter":"B","text":"Apologise for the dent and ask for the correct protocol.","target":"13","points":{"CROWN":1,"ROSE":1}},{"letter":"C","text":"'I can do better, my lord.'","target":"14","points":{"SWORD":1},"romance_spark":true},{"letter":"D","text":"Ask whether satisfactory is the highest mark given today.","target":"15","points":{"ROSE":1}},{"letter":"E","text":"Meet the other squire waiting for results (Scene 5B — Vael Ashmore)","target":"5B","points":{}}]},"5B":{"id":"5B","title":"THE SAME DENT","location":"","prose":["*Castle Brightholm — Assessment Hall Corridor*","You are both waiting outside the assessment hall for your individual results. The corridor is narrow. She is looking at the wall. You are looking at your sword. After a while she glances over, sees the pommel dent, and without any preamble holds up her own sword. The same dent. Same location. Same cause, probably.","'Caeron?' she says. You nod. 'He gave me satisfactory too.' A pause. 'I think satisfactory is actually his highest mark.' She says this with the slight bitterness of someone who has thought about it a lot and decided to find it funny instead of devastating."],"boxes":[{"type":"companion","text":"**COMPANION JOINS: VAEL ASHMORE**\nKnight-squire candidate, your equal in training. She has been here six months. She noticed you three weeks ago and did not say anything until now.\nRole: Mutual support: once per Act, you may ask Vael's read on a situation. She gives honest assessments, even when they are not what you want to hear."},{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 11\n**SUCCESS (roll 11+):** She has been here six months and knows exactly how long it takes Caeron to review each squire's assessment. She timed her appearance in this corridor. She has been looking for a reason to speak to you for longer than this morning. ROMANCE SPARK Vael at Advantage if you acknowledge this.\n**FAILURE (roll 1-10):** She is waiting for her results. The timing seems coincidental.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"'Satisfactory is the ceiling. I decided that this morning.' She looks at you. Recalibrates.","target":"11","points":{"CROWN":1},"romance_spark":true},{"letter":"B","text":"'I think you are right. Which is worse somehow.' She laughs.","target":"11","points":{"ROSE":1},"romance_spark":true},{"letter":"C","text":"'We should compare notes on how to fix it.' Practical. She approves.","target":"11","points":{"ROSE":1,"CROWN":1}}]},"6":{"id":"6","title":"THE CORRESPONDENT","location":"","prose":["*Castle Brightholm — East Gate*","Thessaly Brightwater arrived three days ago with a press credential, a better map than the garrison has, and the easy confidence of someone who has been in considerably more dangerous places than this and made her peace with that some time ago. In three days she has interviewed the senior knights, both stable hands, the armourer, and apparently Zinnia Quickfingers, who gave excellent copy. She catches you at the east gate with her notebook open and her pen uncapped and the particular quality of attention that does not permit comfortable evasion. 'Tell me something true,' she says, 'about why you are here.' Not what you believe. Not what you want. Something true.","Thessaly Brightwater is half-elven, which shows mostly in the pointed ears and the quality of attention she gives things. Dark hair cut short and practical, ink on her fingers, a coat with too many pockets, all in use. She looks like someone for whom the road has become the natural state."],"boxes":[{"type":"companion","text":"**COMPANION JOINS: THESSALY BRIGHTWATER**\nWar correspondent. She hears things. She will share them if she trusts you.\nRole: Intelligence and information network. +1 to Scene 23 and 56 if she trusts you."},{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 12\n**SUCCESS (roll 12+):** She has asked this question before — you can see it in how her pen is already positioned. She is not writing down the answer yet. She is waiting for something specific: the moment a person stops reciting and starts speaking. Answer honestly and she will mark the moment exactly.\n**FAILURE (roll 1-11):** Her expression is professionally neutral. You cannot tell what she is looking for.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"'Because I watched the south burn and I need to be able to do something.'","target":"16","points":{"ROSE":2},"romance_spark":true},{"letter":"B","text":"'Because my family has been Solamnic for six generations.'","target":"17","points":{"CROWN":2}},{"letter":"C","text":"'Because the Measure might be the last thing standing between Ansalon and darkness.'","target":"16","points":{"ROSE":2}},{"letter":"D","text":"'I am not sure yet. Is that honest enough?'","target":"16","points":{"ROSE":1,"CROWN":1},"romance_spark":true}]},"7":{"id":"7","title":"AN HONEST MOMENT","location":"","prose":["*Castle Brightholm — Training Yard*","You ask because the yard is empty and the day has not started yet and you have been wondering about this for eight months and you may not get another unguarded moment. He is quiet. Not the quiet of no answer — the quiet of deciding whether to give it. Then: 'Every morning.' He does not look at you. 'I just do not talk about it.' He keeps looking at the courtyard wall as if it is very interesting. This is the most honest thing he has said to you at six in the morning, which means it is probably the most honest thing he has said to anyone at six in the morning, including himself.","The day has not started yet. The bell will ring in eight minutes and then it will have started and this — whatever this is — will become part of the past. He is still looking at the wall. You let him. You understand that he gave you something just now that cost him something, in the way it always costs something when a person who is very good at being composed lets you see underneath it for a moment. You do not remark on it. That is also something."],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nThere is a pause before he turns back to the sword forms. The quality of the silence is different now."},{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 10\n**SUCCESS (roll 10+):** He is not just saying what sounds right — he has been awake since before you. His sword forms are running faster than usual, burning off something. Aldric Voss is genuinely frightened of failing the Trials. ROMANCE SPARK Aldric at Advantage if you respond to the fear rather than the bravado.\n**FAILURE (roll 1-9):** He says it easily. You cannot tell if it is practiced or true.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Tell him you are nervous too.","target":"11","points":{"ROSE":1}},{"letter":"B","text":"'Then we will both pass anyway.'","target":"11","points":{"SWORD":1}}]},"8":{"id":"8","title":"SER ALDOUS ON JUSTICE","location":"","prose":["*Castle Brightholm — Chapel Library*","He is quiet long enough that you wonder if he will answer. Then: 'The Measure says the law exists to protect the innocent.' He sets his commentary text down. He is not reading from it. 'If the law stops doing that — if a decree comes down requiring you to act against an innocent — the Measure itself gives you the answer. Est Sularus oth Mithas. My honour is my life.' He looks at you with the steadiness of someone who arrived at this through experience rather than reading. 'Not your lord's honour. Not the Order's. Yours. You carry it. You are responsible for where it goes.'","Ser Aldous is seventy or near it, with white hair, a weathered face, and the unhurried physicality of someone who was once very strong and is still, in the ways that matter, exactly that. He wears the chaplain's robe over the frame of a man who spent forty years in armour before he took it off, and he gives the impression of someone who removed the armour but kept everything it stood for."],"boxes":[{"type":"info","text":"**You Gain:**\nSer Aldous as Mentor (+1 to ROSE checks in Act One). The Rose Commentary text — relevant in Scene 31."},{"type":"info","text":"**FIGHTER — MEASURE SUBPLOT**\nBefore your choice below, Fighters turn to Scene M1 (The Letter and the Spirit) now. It occurs this same morning. M1 leads back to Scene 9 after your choice there."},{"type":"info","text":"**PALADIN — THE HEALER'S TENT**\nBefore your choice below, Paladins may also visit the infirmary. Turn to Scene 9 (The Healer's Tent) now. It occurs this same morning — Aldous sends you. 'There is someone in the infirmary who could use a steady hand,' he says. 'Go. Come back when you have something to tell me about mercy.' Scene 9 leads back here for your choice."}],"choices":[{"letter":"A","text":"Thank him and read the text immediately.","target":"M1","points":{"ROSE":1}},{"letter":"B","text":"'Have you ever had to make that choice yourself?'","target":"M1","points":{"ROSE":2}}]},"9":{"id":"9","title":"THE HEALER'S TENT","location":"","prose":["*Castle Brightholm — Infirmary*","The infirmary smells of yarrow and clean linen and underneath both, the copper-salt note of pain being handled by someone who knows exactly what they are doing. Mira of the Oaks has not slept — you can see it in the particular stillness that develops past tiredness, when the body stops ne
