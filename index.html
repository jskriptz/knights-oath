// ── Shop Box ──────────────────────────────────────────
function parseShopBox(text){
  const lines=text.split('\n');
  const items=[];let shopName='Shop';let hasDiscount=false;let rareSection=[];let section='items';let hasStables=false;
  for(const line of lines){
    const l=line.trim();if(!l)continue;
    const nameM=l.match(/\*\*SHOP\s*[\u2014\-]+\s*(.+?)\*\*/);
    if(nameM){shopName=nameM[1].trim();continue}
    if(l.includes('Dorren')||l.includes('10%'))hasDiscount=true;
    if(/STABLE|MOUNT|HORSE/i.test(l))hasStables=true;
    // Parse table rows: | Item | Price | Notes |
    const rowM=l.match(/^\|\s*(.+?)\s*\|\s*(\d+)\s*stl\s*\|\s*(.+?)\s*\|$/);
    if(rowM&&!l.includes('---')&&!l.includes('Item')){
      items.push({name:rowM[1].trim(),price:parseInt(rowM[2]),notes:rowM[3].trim()});continue;
    }
    if(l.includes('RARE STOCK')){section='rare'}
    if(section==='rare')rareSection.push(l);
  }
  return{shopName,items,hasDiscount,rareSection,hasStables};
}

// Sell price lookup (half of buy price, rounded down)
let SELL_PRICES={};
// Items that cannot be sold — companion gifts, quest items, key gear
let UNSELLABLE=/^$/;

// Magic item lookup from EQUIPMENT_DATA
function getMagicItemInfo(itemName){
  if(!EQUIPMENT_DATA)return null;
  const nm=itemName.toLowerCase();
  // Check magic weapons
  for(const mw of (EQUIPMENT_DATA.magicWeapons||[])){
    if(nm.includes(mw.name.toLowerCase()))return{...mw,category:'weapon'};
  }
  // Check magic armor
  for(const ma of (EQUIPMENT_DATA.magicArmor||[])){
    if(nm.includes(ma.name.toLowerCase()))return{...ma,category:'armor'};
  }
  return null;
}

function getSellPrice(itemName){
  for(const[k,v]of Object.entries(SELL_PRICES)){if(itemName.toLowerCase().includes(k.toLowerCase()))return v}
  // Check magic item data for rarity-based pricing
  const mi=getMagicItemInfo(itemName);
  if(mi){
    if(mi.rarity==='very rare')return 400;
    if(mi.rarity==='rare')return 150;
    if(mi.rarity==='uncommon')return 40;
  }
  // Fallback patterns
  if(/\+3/.test(itemName))return 400;
  if(/\+2/.test(itemName))return 150;
  if(/\+1/.test(itemName))return 40;
  if(/masterwork/i.test(itemName))return 15;
  return 1; // default fallback for unknown sellable items
}

function ShopBox({text,gs,onStateUpdate}){
  const e=React.createElement;
  const parsed=React.useMemo(()=>parseShopBox(text),[text]);
  const[bought,setBought]=useState({});
  const[sold,setSold]=useState({});
  const[rareRolled,setRareRolled]=useState(false);
  const[rareResult,setRareResult]=useState(null);
  const[rareRolling,setRareRolling]=useState(false);
  const[rareDisplay,setRareDisplay]=useState(null);
  const[localGold,setLocalGold]=useState(gs.gold||0);
  const[localInv,setLocalInv]=useState(gs.inventory||[]);
  const[tuskChoice,setTuskChoice]=useState(null); // 'sold' or 'crafted'

  const hasTusks=localInv.includes('Boar Tusks')&&!gs.flags?.pigSkewer;

  const sellTusks=()=>{
    setTuskChoice('sold');setLocalGold(g=>g+5);
    setLocalInv(inv=>{const a=[...inv];a.splice(a.indexOf('Boar Tusks'),1);return a});
    if(onStateUpdate)onStateUpdate(g=>{
      const ng={...g,gold:(g.gold||0)+5,inventory:[...g.inventory]};
      const idx=ng.inventory.indexOf('Boar Tusks');if(idx>=0)ng.inventory.splice(idx,1);
      return ng;
    });
  };

  const craftPigSkewer=()=>{
    if(localGold<3)return;
    setTuskChoice('crafted');setLocalGold(g=>g-3);
    const weapName=localInv.find(it=>WEAPONS_WITH_MASTERY.some(w=>w.name===it))||gs.weapon||'Longsword';
    setLocalInv(inv=>{
      const a=[...inv];
      const ti=a.indexOf('Boar Tusks');if(ti>=0)a.splice(ti,1);
      const wi=a.indexOf(weapName);if(wi>=0)a[wi]='Pig Skewer';
      return a;
    });
    if(onStateUpdate)onStateUpdate(g=>{
      const ng={...g,gold:(g.gold||0)-3,inventory:[...g.inventory],flags:{...(g.flags||{})}};
      const ti=ng.inventory.indexOf('Boar Tusks');if(ti>=0)ng.inventory.splice(ti,1);
      const weapN=ng.inventory.find(it=>WEAPONS_WITH_MASTERY.some(w=>w.name===it))||ng.weapon||'Longsword';
      ng.flags.pigSkewer=true;ng.flags.pigSkewerBase=weapN;
      const wi=ng.inventory.indexOf(weapN);if(wi>=0)ng.inventory[wi]='Pig Skewer';
      if(ng.weapon===weapN)ng.weapon='Pig Skewer';
      if(ng.equipment&&ng.equipment.mainHand===weapN){ng.equipment={...ng.equipment,mainHand:'Pig Skewer'}}
      return ng;
    });
  };

  const discount=parsed.hasDiscount&&gs.flags&&gs.flags.dorren_saved?0.9:1;

  const buyItem=(item)=>{
    const cost=Math.floor(item.price*discount);
    if(localGold<cost)return;
    setLocalGold(g=>g-cost);
    setBought(b=>({...b,[item.name]:(b[item.name]||0)+1}));
    setLocalInv(inv=>[...inv,item.name]);
    if(onStateUpdate){
      onStateUpdate(g=>{
        const ng={...g,gold:(g.gold||0)-cost,inventory:[...g.inventory,item.name]};
        if(item.name.includes('Bandage'))ng.bandages=(ng.bandages||0)+1;
        if(item.name.includes('Potion of Healing')&&!item.name.includes('Greater'))ng.potions=(ng.potions||0)+1;
        if(item.name.includes('Greater Potion'))ng.greaterPotions=(ng.greaterPotions||0)+1;
        if(item.name==='Shield'&&!ng.hasShield){ng.hasShield=true;if(ng.equipment)ng.equipment={...ng.equipment,offHand:'Shield'};ng.derived=calcDerived(ng.stats,ng.cls,ng.level,ng.armor,true,ng.feat,ng.wounds,ng.exhaustion)}
        return ng;
      });
    }
  };

  const sellItem=(itemName)=>{
    console.log('[Shop] sellItem:',itemName,'localInv:',localInv,'bought:',bought,'sold:',sold);
    // Full refund for items bought this visit, half price for pre-owned
    const boughtQty=bought[itemName]||0;
    const soldQty=sold[itemName]||0;
    const canReturn=boughtQty>soldQty;
    const shopItem=canReturn?parsed.items.find(it=>it.name===itemName):null;
    const price=canReturn&&shopItem?Math.floor(shopItem.price*discount):getSellPrice(itemName);
    setLocalGold(g=>g+price);
    setSold(s=>({...s,[itemName]:(s[itemName]||0)+1}));
    const idx=localInv.indexOf(itemName);
    if(idx>=0)setLocalInv(inv=>{const a=[...inv];a.splice(idx,1);return a});
    if(onStateUpdate){
      onStateUpdate(g=>{
        const ng={...g,gold:(g.gold||0)+price};
        const idx2=ng.inventory.indexOf(itemName);
        if(idx2>=0){ng.inventory=[...ng.inventory];ng.inventory.splice(idx2,1)}
        if(itemName.includes('Bandage'))ng.bandages=Math.max(0,(ng.bandages||0)-1);
        if(itemName.includes('Potion of Healing')&&!itemName.includes('Greater'))ng.potions=Math.max(0,(ng.potions||0)-1);
        if(itemName.includes('Greater Potion'))ng.greaterPotions=Math.max(0,(ng.greaterPotions||0)-1);
        // Unequip from equipment slots if selling an equipped item
        if(ng.equipment){const eq={...ng.equipment};let changed=false;for(const[k,v]of Object.entries(eq)){if(v===itemName&&!ng.inventory.includes(itemName)){eq[k]=null;changed=true;break}}if(changed){ng.equipment=eq;syncEquipToState(ng);ng.derived=calcDerived(ng.stats,ng.cls,ng.level,ng.armor,ng.hasShield,ng.feat,ng.wounds,ng.exhaustion)}}
        if(itemName==='Shield'&&ng.hasShield&&!ng.inventory.includes('Shield')){ng.hasShield=false;if(ng.equipment)ng.equipment={...ng.equipment,offHand:null};ng.derived=calcDerived(ng.stats,ng.cls,ng.level,ng.armor,false,ng.feat,ng.wounds,ng.exhaustion)}
        return ng;
      });
    }
  };

  // Build sellable inventory (deduplicated with counts, show refund vs sell price)
  const sellableItems=React.useMemo(()=>{
    const counts={};
    localInv.forEach(it=>{if(!UNSELLABLE.test(it)){counts[it]=(counts[it]||0)+1}});
    if(Object.keys(counts).length===0)console.log('[Shop] No sellable items. localInv:',localInv,'gs.inventory:',gs.inventory);
    return Object.entries(counts).map(([name,qty])=>{
      const boughtQty=bought[name]||0;
      const soldQty=sold[name]||0;
      const returnable=Math.max(0,boughtQty-soldQty);
      const shopItem=parsed.items.find(it=>it.name===name);
      const refundPrice=shopItem?Math.floor(shopItem.price*discount):getSellPrice(name);
      const sellPrice=getSellPrice(name);
      // Show refund price if any are returnable, otherwise sell price
      return{name,qty,price:returnable>0?refundPrice:sellPrice,isReturn:returnable>0};
    });
  },[localInv,bought,sold]);

  // Parse rare tiers from markdown text for shop-specific rare items
  const rareTiers=React.useMemo(()=>{
    const tiers={uncommon:null,masterwork:null,rare:null};
    for(const l of parsed.rareSection){
      const u=l.match(/16.?18.*?[—–-]\s*(.+)/);if(u)tiers.uncommon=u[1].trim();
      const m=l.match(/19.*?[—–-]\s*(.+)/);if(m)tiers.masterwork=m[1].trim();
      const r=l.match(/20.*?[—–-]\s*(.+)/);if(r)tiers.rare=r[1].trim();
    }
    return tiers;
  },[parsed.rareSection]);

  // Determine rare item details based on roll
  const getRareItem=()=>{
    if(!rareResult||rareResult<=15)return null;
    if(rareResult<=18)return{name:'Greater Potion of Healing',price:15,notes:'4d4+4 HP',desc:rareTiers.uncommon||'Uncommon item available!'};
    if(rareResult===19){
      // Pick weapon type from markdown text or default list
      const mwWeapons=['Longsword','Greatsword','Battleaxe','Warhammer','Rapier','Morningstar'];
      const mwMatch=(rareTiers.masterwork||'').match(/Masterwork\s+(\w+)/i);
      const weaponName=mwMatch?mwMatch[1]:mwWeapons[Math.floor(Math.random()*mwWeapons.length)];
      return{name:'Masterwork '+weaponName,price:20,notes:'+1 damage, not magical',desc:rareTiers.masterwork||'Masterwork weapon!'};
    }
    // nat 20
    const rareMatch=(rareTiers.rare||'').match(/\+1\s+(\w[\w\s]*?)(?:\s+available|\s*\()/i);
    const rareName=rareMatch?'+1 '+rareMatch[1].trim():'+1 Weapon';
    return{name:rareName,price:50,notes:'Magical',desc:rareTiers.rare||'Magical item!'};
  };

  // Mount buying/selling
  const[localMount,setLocalMount]=useState(gs.mount||null);
  const mountsAvail=EQUIPMENT_DATA?.mounts?.filter(m=>m.hp)||[];
  const tack=EQUIPMENT_DATA?.mounts?.filter(m=>m.type==='tack')||[];
  const barding=EQUIPMENT_DATA?.mounts?.filter(m=>m.type==='barding')||[];

  const buyMount=(m)=>{
    if(localGold<m.cost||localMount)return;
    const mt={name:m.name,speed:m.speed,carry:m.carry,hp:m.hp,maxHp:m.hp,ac:m.ac||10,barding:null};
    setLocalMount(mt);setLocalGold(g=>g-m.cost);
    if(onStateUpdate)onStateUpdate(g=>({...g,gold:(g.gold||0)-m.cost,mount:mt}));
  };
  const sellMount=()=>{
    if(!localMount)return;
    const mData=mountsAvail.find(m=>m.name===localMount.name);
    const price=Math.floor((mData?.cost||50)/2);
    setLocalGold(g=>g+price);setLocalMount(null);
    if(onStateUpdate)onStateUpdate(g=>({...g,gold:(g.gold||0)+price,mount:null}));
  };
  const buyTack=(item)=>{
    if(localGold<item.cost)return;
    setLocalGold(g=>g-item.cost);setLocalInv(inv=>[...inv,item.name]);
    if(onStateUpdate)onStateUpdate(g=>({...g,gold:(g.gold||0)-item.cost,inventory:[...g.inventory,item.name]}));
  };
  const buyBarding=(b)=>{
    if(localGold<b.cost||!localMount)return;
    const mt={...localMount,barding:b.name,ac:(localMount.ac||10)-((localMount.barding?barding.find(x=>x.name===localMount.barding)?.acBonus:0)||0)+b.acBonus};
    if(b.name.includes('Chain')||b.name.includes('Plate'))mt.speed=Math.max(20,mt.speed-10);
    setLocalMount(mt);setLocalGold(g=>g-b.cost);
    if(onStateUpdate)onStateUpdate(g=>({...g,gold:(g.gold||0)-b.cost,mount:mt}));
  };

  const[rareBought,setRareBought]=useState(false);
  const buyRareItem=()=>{
    const item=getRareItem();
    if(!item||rareBought||localGold<item.price)return;
    setRareBought(true);
    setLocalGold(g=>g-item.price);
    setLocalInv(inv=>[...inv,item.name]);
    if(onStateUpdate){
      onStateUpdate(g=>{
        const ng={...g,gold:(g.gold||0)-item.price,inventory:[...g.inventory,item.name]};
        if(item.name.includes('Greater Potion'))ng.greaterPotions=(ng.greaterPotions||0)+1;
        if(item.name.includes('Potion of Healing')&&!item.name.includes('Greater'))ng.potions=(ng.potions||0)+1;
        return ng;
      });
    }
  };

  const doRareRoll=()=>{
    setRareRolling(true);let c=0;
    const iv=setInterval(()=>{setRareDisplay(rollDice(20));if(++c>=10){clearInterval(iv);
      const d20=rollDice(20);setRareResult(d20);setRareDisplay(d20);setRareRolling(false);setRareRolled(true);
    }},60);
  };

  return e('div',{className:'shop-wrapper'},
    e('div',{className:'box shop'},
      e('div',{className:'shop-header'},
        e('span',null,parsed.shopName),
        e('span',{className:'shop-gold'},localGold+' stl')),
      discount<1?e('p',{style:{fontSize:'12px',color:'var(--green)'}},'\u2714 Dorren\'s discount: 10% off all prices'):null,
      e('table',{className:'shop-table'},
        e('thead',null,e('tr',null,e('th',null,'ITEM'),e('th',null,'PRICE'),e('th',null,'NOTES'),e('th',null,''))),
        e('tbody',null,parsed.items.map((item,i)=>{
          const cost=Math.floor(item.price*discount);
          const qty=bought[item.name]||0;
          return e('tr',{key:i},
            e('td',null,item.name),
            e('td',null,cost+' stl'),
            e('td',{style:{fontSize:'12px',color:'var(--text-dim)'}},item.notes),
            e('td',null,e('button',{className:'shop-buy-btn'+(qty>0?' bought':''),onClick:()=>buyItem(item),disabled:localGold<cost},qty>0?'Buy ('+qty+')':'Buy')));
        }))),
      // Sell section
      sellableItems.length>0?e('div',{className:'shop-sell-section'},
        e('h4',{style:{color:'var(--gold)',margin:'16px 0 8px',borderTop:'1px solid var(--gold-dim)',paddingTop:12}},'SELL / RETURN ITEMS'),
        e('table',{className:'shop-table'},
          e('thead',null,e('tr',null,e('th',null,'ITEM'),e('th',null,'VALUE'),e('th',null,'QTY'),e('th',null,''))),
          e('tbody',null,sellableItems.map((si,i)=>
            e('tr',{key:'sell-'+i},
              e('td',null,si.name),
              e('td',null,si.price+' stl'+(si.isReturn?' (full)':'')),
              e('td',{style:{textAlign:'center'}},si.qty),
              e('td',null,e('button',{className:'shop-sell-btn',onClick:()=>sellItem(si.name)},
                si.isReturn?'Return':'Sell'))))))
      ):null,
      // Boar Tusks crafting
      hasTusks&&!tuskChoice?e('div',{style:{margin:'16px 0',padding:'12px',border:'1px solid var(--gold-dim)',borderRadius:'6px',background:'rgba(255,215,0,0.05)'}},
        e('h4',{style:{color:'var(--gold)',margin:'0 0 8px'}},'\u2694 BOAR TUSKS'),
        e('p',{style:{fontSize:'13px',color:'var(--text-dim)',marginBottom:'10px'}},'The merchant eyes the curved tusk you unwrap. "That\u2019s a fine one. I can give you five steel for it outright\u2026 or for three steel I\u2019ll fashion a grip from it. Bind it to your weapon. Ugly, but effective."'),
        e('div',{style:{display:'flex',gap:'8px'}},
          e('button',{className:'shop-sell-btn',onClick:sellTusks,style:{flex:1}},'Sell Tusks (+ 5 stl)'),
          e('button',{className:'shop-buy-btn',onClick:craftPigSkewer,disabled:localGold<3,style:{flex:1}},'Fashion Pig Skewer (3 stl)'))):null,
      tuskChoice==='sold'?e('p',{style:{fontStyle:'italic',color:'var(--gold)',margin:'12px 0'}},'\ud83d\udcb0 The merchant weighs the tusk and nods. Five steel, fair and done. (+5 stl)'):null,
      tuskChoice==='crafted'?e('p',{style:{fontStyle:'italic',color:'var(--gold)',margin:'12px 0'}},'\u2694 The merchant works the tusk into a grip, binding it to your weapon with leather cord. The "Pig Skewer" is born. It is not beautiful. It does not need to be. (+1 Intimidation)'):null,
      // Rare stock
      parsed.rareSection.length>0&&!rareRolled?e('button',{className:'shop-rare-btn',onClick:doRareRoll,disabled:rareRolling},rareRolling?'Rolling...':'RARE STOCK ROLL'):null,
      rareRolling?e('div',{className:'dice-placeholder',style:{textAlign:'center',margin:'10px 0'}},rareDisplay):null,
      rareResult?e('div',{className:'loot-result'},
        e('p',null,'\u2684 Rare stock roll: '+rareResult),
        (()=>{const ri=getRareItem();
          return ri?e('div',{style:{marginTop:8}},
            e('p',{dangerouslySetInnerHTML:{__html:fmt('**'+ri.name+'** — '+ri.price+' stl. '+ri.notes)}}),
            e('button',{className:'shop-buy-btn'+(rareBought?' bought':''),onClick:buyRareItem,disabled:rareBought||localGold<ri.price,style:{marginTop:6}},rareBought?'Purchased':'Buy ('+ri.price+' stl)')
          ):e('p',{style:{color:'var(--text-dim)'}},'Standard stock only. Nothing unusual.')
        })()
      ):null,
      // Stables section
      parsed.hasStables&&mountsAvail.length?e('div',{style:{margin:'16px 0',padding:'12px',border:'1px solid rgba(180,160,100,.2)',borderRadius:'6px',background:'rgba(180,160,100,.04)'}},
        e('h4',{style:{color:'var(--gold)',margin:'0 0 8px',fontFamily:'Cinzel,serif',letterSpacing:1}},'\ud83d\udc0e STABLES'),
        localMount?e('div',{style:{marginBottom:10}},
          e('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:6}},
            e('span',{style:{color:'var(--gold)',fontFamily:'Cinzel,serif'}},localMount.name),
            e('span',{style:{fontSize:11,color:'var(--text-dim)'}},'Speed '+localMount.speed+' ft \u2022 HP '+localMount.hp+'/'+localMount.maxHp+(localMount.barding?' \u2022 '+localMount.barding:''))),
          e('button',{className:'shop-sell-btn',onClick:sellMount},'Sell Mount ('+Math.floor((mountsAvail.find(m=>m.name===localMount.name)?.cost||50)/2)+' stl)')
        ):null,
        !localMount?e('table',{className:'shop-table'},
          e('thead',null,e('tr',null,e('th',null,'MOUNT'),e('th',null,'PRICE'),e('th',null,'SPEED'),e('th',null,''))),
          e('tbody',null,mountsAvail.map((m,i)=>
            e('tr',{key:'mt-'+i},
              e('td',{title:m.desc||''},m.name),
              e('td',null,m.cost+' stl'),
              e('td',{style:{fontSize:'12px',color:'var(--text-dim)'}},m.speed+' ft, '+m.carry+' lb carry'),
              e('td',null,e('button',{className:'shop-buy-btn',onClick:()=>buyMount(m),disabled:localGold<m.cost},'Buy')))))
        ):null,
        // Tack
        tack.length?e('div',{style:{marginTop:8}},
          e('div',{style:{fontSize:11,color:'var(--text-dim)',marginBottom:4}},'TACK & HARNESS'),
          tack.map((t,i)=>e('div',{key:'tk-'+i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',fontSize:12}},
            e('span',{title:t.desc||''},t.name+' ('+t.cost+' stl)'),
            e('button',{className:'shop-buy-btn',style:{fontSize:10,padding:'2px 8px'},onClick:()=>buyTack(t),disabled:localGold<t.cost},'Buy')
          ))
        ):null,
        // Barding
        localMount&&barding.length?e('div',{style:{marginTop:8}},
          e('div',{style:{fontSize:11,color:'var(--text-dim)',marginBottom:4}},'BARDING (MOUNT ARMOR)'),
          barding.map((b,i)=>e('div',{key:'bd-'+i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'3px 0',fontSize:12}},
            e('span',{title:b.desc||''},b.name+' — AC +'+b.acBonus+' ('+b.cost+' stl)'),
            e('button',{className:'shop-buy-btn',style:{fontSize:10,padding:'2px 8px'},onClick:()=>buyBarding(b),disabled:localGold<b.cost||localMount.barding===b.name},localMount.barding===b.name?'Equipped':'Buy')
          ))
        ):null
      ):null));
}

// ── Loot Box ──────────────────────────────────────────
function parseLootBox(text){
  const lines=text.split('\n');
  let searchType='body';let moralCost=null;const lootTable=[];let hasRareRoll=false;
  let promptText='';let leaveText='';
  for(const line of lines){
    const l=line.trim();if(!l)continue;
    if(l.includes('SEARCH THE FALLEN')||l.includes('Search them'))searchType='body';
    if(l.includes('stash')||l.includes('STASH')||l.includes('cache'))searchType='stash';
    if(l.match(/-\d+\s*ROSE/))moralCost={rose:-1};
    if(l.match(/-\d+\s*CROWN/)){if(!moralCost)moralCost={};moralCost.crown=-1}
    // Parse loot table rows
    const lootM=l.match(/(\d+)[-–]?(\d+)?:\s*(.+)/);
    if(lootM&&!l.includes('RARE ITEM')){
      lootTable.push({min:parseInt(lootM[1]),max:parseInt(lootM[2])||parseInt(lootM[1]),text:lootM[3].trim()});
    }
    if(l.includes('RARE ITEM ROLL'))hasRareRoll=true;
    if(l.includes('A)')||l.includes('Search them'))promptText=l;
    if(l.includes('B)')||l.includes('Leave'))leaveText=l;
  }
  return{searchType,moralCost,lootTable,hasRareRoll,promptText,leaveText};
}

function LootBox({text,gs,onStateUpdate}){
  const e=React.createElement;
  const parsed=React.useMemo(()=>parseLootBox(text),[text]);
  const[choice,setChoice]=useState(null);
  const[lootRoll,setLootRoll]=useState(null);
  const[rolling,setRolling]=useState(false);
  const[display,setDisplay]=useState(null);
  const[rareRoll,setRareRoll]=useState(null);

  const doLoot=()=>{
    setChoice('search');setRolling(true);let c=0;
    const iv=setInterval(()=>{setDisplay(rollDice(20));if(++c>=10){clearInterval(iv);
      const d20=rollDice(20);setLootRoll(d20);setDisplay(d20);setRolling(false);
      // Apply moral cost
      if(parsed.moralCost&&onStateUpdate){
        onStateUpdate(g=>{
          const ng={...g};
          if(parsed.moralCost.rose)ng.rose=(ng.rose||0)+parsed.moralCost.rose;
          if(parsed.moralCost.crown)ng.crown=(ng.crown||0)+parsed.moralCost.crown;
          return ng;
        });
      }
      // Add gold based on roll
      const goldDice=parsed.searchType==='stash'?'d6':'d4';
      let goldAmt=0;
      if(d20>=6&&d20<=10)goldAmt=rollDamage('1'+goldDice);
      else if(d20>=11&&d20<=14)goldAmt=rollDamage('2'+goldDice);
      else if(d20>=15&&d20<=17)goldAmt=rollDamage('3'+goldDice);
      else if(d20>=18&&d20<=19)goldAmt=rollDamage('4'+goldDice);
      else if(d20>=20)goldAmt=rollDamage('5'+goldDice);
      if(goldAmt>0&&onStateUpdate){
        onStateUpdate(g=>({...g,gold:(g.gold||0)+goldAmt}));
      }
      // Add items from loot text to inventory
      if(onStateUpdate&&d20>=6){
        const entry=parsed.lootTable.find(t=>d20>=t.min&&d20<=t.max);
        const txt=entry?entry.text:'';
        onStateUpdate(g=>{
          const ng={...g,inventory:[...(g.inventory||[])]};
          // Potions
          if(/Potion of Healing/i.test(txt)){ng.potions=(ng.potions||0)+1;if(!ng.inventory.includes('Potion of Healing'))ng.inventory.push('Potion of Healing')}
          // Rations
          const ratM=txt.match(/(\d+)\s*days?\s*rations/i);
          if(ratM){const days=parseInt(ratM[1]);ng.rations=(ng.rations||0)+days}
          // Named items
          const items=[
            [/caltrops/i,'Caltrops'],[/signal horn/i,'Signal Horn'],[/antitoxin/i,'Antitoxin'],
            [/venom vial/i,'Kapak Venom Vial'],[/spyglass/i,'Spyglass'],[/compass/i,'Compass'],
            [/bandage/i,null],[/whetstone/i,'Whetstone'],[/masterwork dagger/i,'Masterwork Dagger'],
            [/family sword|longsword/i,'Longsword'],[/patrol schedule/i,'Dragon Army Patrol Schedule'],
            [/patrol routes/i,'Dragon Army Patrol Routes'],[/coded orders/i,'Coded Orders'],
            [/attack route map/i,'Dragon Army Attack Route Map'],[/merchant.?s ledger/i,"Merchant's Ledger"],
            [/dispatch pouch/i,'Sealed Dispatch Pouch'],[/signal whistle/i,'Signal Whistle']
          ];
          for(const[rx,name] of items){
            if(rx.test(txt)){
              if(name==='Bandages'||!name){if(/bandage/i.test(txt))ng.bandages=(ng.bandages||0)+1}
              else if(!ng.inventory.includes(name))ng.inventory.push(name);
            }
          }
          return ng;
        });
      }
      // Rare roll on nat 20
      if(d20===20){
        setTimeout(()=>{
          const r=rollDice(20);setRareRoll(r);
          // Apply rare item
          if(r===20&&onStateUpdate){
            onStateUpdate(g=>{
              const ng={...g,magicItems:[...(g.magicItems||[])]};
              // +1 weapon or +1 armor
              const choice=Math.random()<0.5?{name:'+1 Weapon',desc:'+1 to attack and damage rolls',rarity:'Uncommon'}:{name:'+1 Armor',desc:'+1 AC',rarity:'Uncommon'};
              if(!ng.magicItems.some(m=>m.name===choice.name))ng.magicItems.push(choice);
              return ng;
            });
          }
        },1000);
      }
    }},60);
  };

  const doLeave=()=>{
    setChoice('leave');
    // Leaving often gives +1 ROSE or CROWN
    if(onStateUpdate){
      onStateUpdate(g=>({...g,rose:(g.rose||0)+1}));
    }
  };

  // Find matching loot text
  const getLootText=()=>{
    if(!lootRoll||!parsed.lootTable.length)return'';
    const entry=parsed.lootTable.find(t=>lootRoll>=t.min&&lootRoll<=t.max);
    return entry?entry.text:'Nothing found.';
  };

  return e('div',{className:'loot-wrapper'},
    !choice?e('div',null,
      e('div',{className:'box loot'},
        text.split('\n').filter(l=>l.trim()&&!l.includes('A)')&&!l.includes('B)')&&!l.includes('1-5')&&!l.includes('6-10')).slice(0,3).map((l,i)=>e('p',{key:i,dangerouslySetInnerHTML:{__html:fmt(l)}}))),
      e('div',{className:'loot-choice'},
        e('button',{className:'loot-choice-btn search',onClick:doLoot},'\u2694 Search'+(parsed.moralCost?' ('+Object.entries(parsed.moralCost).map(([k,v])=>v+' '+k.toUpperCase()).join(', ')+')':'')),
        e('button',{className:'loot-choice-btn leave',onClick:doLeave},'\u21b6 Leave'))
    ):null,
    choice==='search'?e('div',null,
      e('div',{className:'dice-area'},
        e('div',{className:'dice-info'},'Loot Roll \u2022 d20'),
        lootRoll?e('div',{className:'dice-result '+(lootRoll>=11?'success':'fail')},
          e('span',{className:'dice-num'},lootRoll),
          e('div',{className:'dice-verdict'},lootRoll>=15?'EXCELLENT':lootRoll>=11?'GOOD':lootRoll>=6?'MODEST':'NOTHING')
        ):e('div',{className:'dice-placeholder'},rolling&&display?display:'?'),
        !lootRoll?e('button',{className:'dice-btn',disabled:true},'Rolling...'):null),
      lootRoll?e('div',{className:'loot-result'},
        e('p',{className:'loot-items',dangerouslySetInnerHTML:{__html:fmt(getLootText())}}),
        rareRoll?e('div',{style:{marginTop:'8px',padding:'8px',borderTop:'1px solid var(--gold)'}},
          e('p',null,'\u2728 RARE ITEM ROLL: '+rareRoll),
          e('p',{style:{color:rareRoll===20?'var(--gold)':'var(--text-dim)'}},
            rareRoll===20?'MAGIC ITEM! +1 weapon or +1 armor found!':'Quality mundane item — well-crafted but not magical.')
        ):null
      ):null
    ):null,
    choice==='leave'?e('div',{className:'loot-result'},
      e('p',null,'You leave them.. Some things are not worth the weight.')
    ):null
  );
}

// ── Campaign Select ───────────────────────────────────
function CampaignSelect({onSelect,onBack}){
  const[campaigns,setCampaigns]=useState(null);const[loading,setLoading]=useState(true);const[error,setError]=useState(null);
  const e=React.createElement;
  useEffect(()=>{
    fetch('campaigns/index.json').then(r=>{if(!r.ok)throw new Error('Not found');return r.json()})
      .then(data=>{setCampaigns(data.campaigns||[]);setLoading(false)})
      .catch(err=>{setError(err.message);setLoading(false)})
  },[]);
  if(loading)return e('div',{className:'cover'},e('p',{className:'dim-italic'},'Loading campaigns...'));
  if(error||!campaigns||campaigns.length===0){
    // Single campaign fallback — skip selection
    onSelect('knights-oath');return null
  }
  if(campaigns.length===1){onSelect(campaigns[0].id);return null}
  return e('div',{className:'cover'},
    e('h1',null,'DRAGONLANCE'),e('div',{className:'divider'}),
    e('h2',null,'CHOOSE YOUR CAMPAIGN'),
    e('p',{className:'dim-italic'},'Select an adventure to begin or continue.'),
    e('div',{className:'divider'}),
    e('div',{style:{display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:400}},

// Filter scene boxes by class
function filterBoxes(boxes, gs) {
  if (!boxes || !gs) return boxes || [];
  return boxes.filter(b => {
    const t = b.text || '';
    const cls = gs.cls;
    // Hide Paladin-only boxes from Fighters
    if (cls === 'Fighter') {
      if (t.startsWith('**PALADIN') || t.startsWith('**Paladin Note') || t.startsWith('**Paladin Only'))return false;
      if (t.includes('Mark 1 tally under') || t.includes('Mark 1 tally:'))return false;
      if (t.includes('PALADIN \u2014 DARK TEMPTATION') || t.includes('PALADIN \u2014 DIVINE TRACK') || t.includes('PALADIN \u2014 THE CHOOSING') || t.includes('PALADIN \u2014 FALLEN TRACK') || t.includes('PALADIN \u2014 THE HEALER'))return false;
      if (b.type === 'divine' || b.type === 'dg_track')return false;
    }
    // Hide Fighter-only boxes from Paladins
    if (cls === 'Paladin') {
      if (t.startsWith('**FIGHTER') || t.startsWith('**Fighter Only'))return false;
      if (t.includes('FIGHTER \u2014 MEASURE') || t.includes('FIGHTER \u2014 MEASURE TRACK'))return false;
      if (b.type === 'measure' && !t.includes('Paladin'))return false;
    }
    return true;
  });
}

// Determine mandatory detour scenes that must be visited before regular choices
function getMandatoryDetours(sceneId, gs) {
  if (!gs) return [];
  const rules = CAMPAIGN_RULES || {};
  const visited = gs.awardedScenes || {};
  const detours = [];
  const comps = gs.companions || [];
  const flags = gs.flags || {};
  for (const d of (rules.mandatoryDetours || [])) {
    if (d.scene !== sceneId) continue;
    if (d.ifClass && gs.cls !== d.ifClass) continue;
    if (d.requireDgTrack && !d.requireDgTrack.includes(gs.dgTrack)) continue;
    if (d.requireNotVisited && visited[d.requireNotVisited]) continue;
    if (d.requireAlsoNotVisited && visited[d.requireAlsoNotVisited]) continue;
    // Companion presence check
    if (d.requireCompanion && !comps.some(c => c === d.requireCompanion)) continue;
    // Flag check with ! prefix for negation
    if (d.requireFlag) {
      const neg = d.requireFlag.startsWith('!');
      const fn = neg ? d.requireFlag.slice(1) : d.requireFlag;
      const has = flags[fn];
      if (neg ? has : !has) continue;
    }
    // Skip if target already visited
    if (visited[d.target + '_visited']) continue;
    detours.push({target: d.target, label: d.label, mandatory: d.mandatory !== false});
  }
  return detours;
}

function filterChoices(choices, sceneId, gs) {
  if (!gs || !choices) return choices;
  const rules = CAMPAIGN_RULES || {};
  const comps = gs.companions || [];
  const has = (name) => comps.some(c => c.toLowerCase().includes(name.toLowerCase()));
  const visitedScenes = new Set((gs.history || []).map(h => h.split(':')[0].trim()));
  const flags = gs.flags || {};
  const HUB_SCENES = rules.hubScenes || [];
  const EXEMPT = new Set(rules.exemptTargets || []);
  const UNREVISITABLE = new Set(rules.unrevisitableScenes || []);

  return choices.map(c => {
    const txt = c.text || '';
    const target = c.target || '';

    // Strip "If not yet visited" prefix; hide if already visited
    if (txt.includes('If not yet visited')) {
      if (target && visitedScenes.has(target)) return null;
      c = {...c, text: txt.replace(/^\(If not yet visited(?:,\s*[^)]+)?\)\s*/i, '')};
    }
    if (target && UNREVISITABLE.has(target) && visitedScenes.has(target)) return null;

    // Hub visit gating
    if (HUB_SCENES.includes(sceneId) && target && !EXEMPT.has(target) && visitedScenes.has(target)) return null;

    // Hub companion swaps
    for (const swap of (rules.hubCompanionSwaps || [])) {
      if (swap.scenes.includes(sceneId) && (txt.includes(swap.textContains) || (swap.targets && swap.targets.includes(target)))) {
        if (!has(swap.ifMissing)) return {...c, text: swap.swapText, target: swap.swapTarget, _swapped: true};
      }
    }

    // Companion choice gates
    for (const gate of (rules.companionChoiceGates || [])) {
      if (gate.scene !== sceneId) continue;
      const matches = (gate.target && target === gate.target) ||
                      (gate.textContains && txt.includes(gate.textContains));
      if (matches && !has(gate.requireCompanion)) return null;
    }

    // Hide already-visited epilogue targets
    if ((rules.epilogueVisitGating || []).includes(sceneId) && visitedScenes.has(target)) return null;

    // Choice filters (class gates, flag requirements, awarded-scene checks)
    for (const f of (rules.choiceFilters || [])) {
      if (f.scene !== sceneId) continue;
      const matchLetter = (f.letter && c.letter === f.letter) || (f.letters && f.letters.includes(c.letter));
      const matchTarget = f.target && target === f.target;
      if (!matchLetter && !matchTarget) continue;
      if (f.hideIfClass && gs.cls === f.hideIfClass) return null;
      if (f.requireFlag) {
        const val = flags[f.requireFlag];
        const ok = f.requireFlagValue ? val === f.requireFlagValue : !!val;
        if (!ok) {
          if (f.disabledText) return {...c, text: c.text + f.disabledText, _disabled: true};
          return null;
        }
      }
      if (f.requireAwardedAny) {
        const awarded = gs.awardedScenes || {};
        if (!f.requireAwardedAny.some(k => awarded[k])) return null;
      }
    }

    // Generic "if present" companion check
    if (txt.toLowerCase().includes('if present')) {
      let found = false;
      for (const comp of COMPANIONS_ALL) {
        const parts = comp.split(' ');
        if (parts.some(p => txt.includes(p))) { found = has(parts[parts.length - 1]); break; }
      }
      if (!found) return null;
    }

    // Class target gates
    for (const gate of (rules.classTargetGates || [])) {
      if (gate.targets && gate.targets.includes(target) && gs.cls !== gate.requireClass) return null;
      if (gate.targetPrefixes) {
        const prefixes = Array.isArray(gate.targetPrefixes) ? gate.targetPrefixes : [gate.targetPrefixes];
        for (const pfx of prefixes) {
          if (target && target.startsWith(pfx) && gs.cls !== gate.requireClass) return null;
        }
      }
    }

    // DG track gates
    for (const gate of (rules.dgTrackGates || [])) {
      if (target === gate.target) {
        if (gs.cls !== gate.requireClass) return null;
        if (gate.requireDgTrack && !gate.requireDgTrack.includes(gs.dgTrack)) return null;
      }
    }

    // Romance date gates
    for (const rg of (rules.romanceTargetGates || [])) {
      if (rg.targets && rg.targets.includes(target)) {
        if (rg.requireActiveRomance) {
          const hasRomance = Object.values(gs.romances || {}).some(v => v && !['Friend','Distant','Cold','Observer','Hostile'].includes(v));
          if (!hasRomance) return null;
        }
        if (rg.requirePolyamory) {
          const active = Object.entries(gs.romances || {}).filter(([k, v]) => v && !['Friend','Distant','Cold','Observer','Hostile'].includes(v));
          if (active.length < 2) return null;
        }
      }
    }

    return c;
  }).filter(Boolean);
}

// ── Epilogue ──────────────────────────────────────────
function EpilogueBlock({gs,sceneId}){
  const e=React.createElement;
  const ep=EPILOGUES;if(!ep||!ep.companions)return null;
  const allComp=COMPANIONS_ALL||[];
  const met=allComp.filter(n=>(gs.companions||[]).includes(n)||(gs.deadCompanions||[]).includes(n));
  if(met.length===0)return null;

  const entries=met.map(name=>{
    const data=ep.companions[name];if(!data)return null;
    const alive=(gs.companions||[]).includes(name);
    const dead=(gs.deadCompanions||[]).includes(name);
    const rom=gs.romances&&gs.romances[name];
    let text='';
    if(dead&&data.dead){text=data.dead}
    else if(alive&&data.alive){
      if(rom&&rom!=='Friend'&&data.alive.romance)text=data.alive.romance;
      else if(rom==='Friend'&&data.alive.romanceFriend)text=data.alive.romanceFriend;
      else text=data.alive.default;
    }
    if(!text)return null;
    return{name,text,dead:!!dead,romance:rom&&rom!=='Friend'};
  }).filter(Boolean);

  // Closing paragraph
  let closing='';
  if(ep.closing){
    if(sceneId==='DISGRACE'&&ep.closing.disgraced)closing=ep.closing.disgraced;
    else if(gs.cls==='Paladin'&&(gs.dgTrack==='FALLEN'||gs.dgTrack==='DEEPLY FALLEN')&&ep.closing.paladin_fallen)closing=ep.closing.paladin_fallen;
    else if(gs.cls==='Paladin'&&ep.closing.paladin)closing=ep.closing.paladin;
    else if(gs.cls==='Fighter'&&gs.measureOrientation==='KEEPER'&&ep.closing.fighter_keeper)closing=ep.closing.fighter_keeper;
    else if(gs.cls==='Fighter'&&gs.measureOrientation==='REFORMER'&&ep.closing.fighter_reformer)closing=ep.closing.fighter_reformer;
    else if(gs.cls==='Fighter'&&gs.measureOrientation==='PRACTITIONER'&&ep.closing.fighter_practitioner)closing=ep.closing.fighter_practitioner;
    else if(gs.cls==='Fighter'&&ep.closing.fighter)closing=ep.closing.fighter;
    else closing=ep.closing.default||'';
    if(gs.flags&&gs.flags.dispatch_kept&&(gs.honour||5)<4&&ep.closing.dispatch_shadow)closing+=' '+ep.closing.dispatch_shadow;
  }

  return e('div',{className:'epilogue-block'},
    e('div',{className:'divider'}),
    e('h3',{className:'epilogue-title'},ep.title||'EPILOGUE'),
    ep.intro?e('p',{className:'epilogue-intro'},ep.intro):null,
    entries.map((ent,i)=>e('div',{key:i,className:'epilogue-entry'+(ent.dead?' dead':'')+(ent.romance?' romance':'')},
      e('div',{className:'epilogue-name'},ent.name+(ent.dead?' \u2020':'')),
      e('p',{className:'epilogue-text'},ent.text))),
    closing?e('div',{className:'epilogue-closing'},
      e('div',{className:'divider'}),
      e('p',{className:'epilogue-text closing-text'},closing)):null
  );
}

// ── Party Banter Block ──
function BanterBlock({sceneId,gs}){
  const e=React.createElement;
  if(!PARTY_BANTER||!PARTY_BANTER.length)return null;
  const comps=gs.companions||[];
  const matching=PARTY_BANTER.filter(b=>{
    if(b.scene!==sceneId)return false;
    if(b.requireCompanion&&!b.requireCompanion.every(c=>comps.some(p=>p.includes(c))))return false;
    if(b.requireClass&&b.requireClass!==gs.cls)return false;
    if(b.requireFlag&&!(gs.flags&&gs.flags[b.requireFlag]))return false;
    if(b.requireRomance&&!b.requireRomance.some(c=>gs.romances&&gs.romances[c]))return false;
    if(b.excludeFlag&&gs.flags&&gs.flags[b.excludeFlag])return false;
    return true;
  });
  if(!matching.length)return null;
  // Pick one banter entry per scene (deterministic by scene+companion combo)
  const banter=matching[0];
  return e('div',{className:'banter-block'},
    banter.lines.map((line,i)=>e('div',{key:i,className:'banter-line'},
      e('span',{className:'banter-speaker'},line.speaker+':'),
      e('span',{className:'banter-text'},line.text)
    ))
  );
}

// ── Approval Processing ──
function processApproval(ns,sceneId,choiceLetter){
  if(!CAMPAIGN_RULES||!CAMPAIGN_RULES.approvalDeltas)return;
  const comps=ns.companions||[];
  if(!ns.approval)ns.approval={};
  for(const rule of CAMPAIGN_RULES.approvalDeltas){
    if(rule.scene!==sceneId)continue;
    if(rule.letter!=='*'&&rule.letter!==choiceLetter)continue;
    for(const[comp,delta]of Object.entries(rule.deltas||{})){
      // Only apply if companion is in party
      const fullName=comps.find(c=>c.includes(comp));
      if(!fullName)continue;
      const prev=ns.approval[fullName]||0;
      ns.approval[fullName]=Math.max(-5,Math.min(8,prev+delta));
    }
  }
}

function evaluateDmCondition(cond,gs,sceneId){
  if(cond.ifFlag){const has=gs.flags&&gs.flags[cond.ifFlag];if(cond.negate?has:!has)return false}
  if(cond.ifClass&&gs.cls!==cond.ifClass)return false;
  if(cond.ifDgTrack&&gs.dgTrack!==cond.ifDgTrack)return false;
  if(cond.ifOrderMax){const vals={rose:gs.rose||0,sword:gs.sword||0,crown:gs.crown||0};const max=Object.entries(vals).sort((a,b)=>b[1]-a[1])[0];if(max[0]!==cond.ifOrderMax)return false;if(cond.ifOrderMin&&max[1]<cond.ifOrderMin)return false}
  if(cond.ifHonourAbove&&(gs.honour||0)<=cond.ifHonourAbove)return false;
  if(cond.ifHonourBelow&&(gs.honour||0)>=cond.ifHonourBelow)return false;
  if(cond.ifEnding&&sceneId!==cond.ifEnding)return false;
  if(cond.ifCompanionAlive&&!(gs.companions||[]).includes(cond.ifCompanionAlive))return false;
  if(cond.ifCompanionDead&&!(gs.deadCompanions||[]).includes(cond.ifCompanionDead))return false;
  if(cond.ifAnyCompanionDead&&(!gs.deadCompanions||gs.deadCompanions.length===0))return false;
  if(cond.ifCompanionCount!==undefined&&(gs.companions||[]).length!==cond.ifCompanionCount)return false;
  if(cond.ifCompanionCountMin&&(gs.companions||[]).length<cond.ifCompanionCountMin)return false;
  if(cond.ifAnyRomance){const r=gs.romances||{};if(!Object.values(r).some(v=>v&&v!=='Friend'))return false}
  if(cond.ifNoRomance){const r=gs.romances||{};if(Object.values(r).some(v=>v&&v!=='Friend'))return false}
  if(cond.ifRomanceCount){const r=gs.romances||{};const ct=Object.values(r).filter(v=>v&&v!=='Friend').length;if(ct<cond.ifRomanceCount)return false}
  if(cond.ifGodSignsMin){const total=Object.values(gs.godSigns||{}).reduce((a,b)=>a+b,0);if(total<cond.ifGodSignsMin)return false}
  if(cond.ifGodSignsMax){const total=Object.values(gs.godSigns||{}).reduce((a,b)=>a+b,0);if(total>cond.ifGodSignsMax)return false}
  if(cond.ifCombatCountMin&&(gs.combatCount||0)<cond.ifCombatCountMin)return false;
  if(cond.ifScarsMin&&(gs.scars||[]).length<cond.ifScarsMin)return false;
  return true;
}

function DmSummary({gs,sceneId,onBack}){
  const e=React.createElement;
  const dm=DM_SUMMARY||{};
  const d=gs.derived||calcDerived(gs.stats,gs.cls,gs.level,gs.armor,gs.hasShield,gs.feat,gs.wounds,gs.exhaustion);
  const cTitle=(CAMPAIGN&&CAMPAIGN.title)||'Campaign';

  // Ending info
  const ending=(dm.endings&&dm.endings[sceneId])||{title:sceneId,summary:''};

  // Evaluate chronicle entries
  const chronicle=(dm.chronicle||[]).filter(c=>evaluateDmCondition(c,gs,sceneId));

  // Companion chronicle
  const compEntries=[];
  const cc=dm.companionChronicle||{};
  for(const name of (COMPANIONS_ALL||[])){
    const data=cc[name];if(!data)continue;
    const alive=(gs.companions||[]).includes(name);
    const dead=(gs.deadCompanions||[]).includes(name);
    if(!alive&&!dead)continue;
    const rom=gs.romances&&gs.romances[name];
    const lines=[];
    if(alive)lines.push(data.joined);
    if(dead)lines.push(data.dead);
    if(rom&&rom!=='Friend')lines.push(data.romance+' ('+rom+')');
    compEntries.push({name,lines,hook:data.hook,alive,dead,romance:rom&&rom!=='Friend'});
  }

  // DM hooks
  const hooks=(dm.dmHooks||[]).filter(h=>evaluateDmCondition(h,gs,sceneId));

  // God signs summary (Paladin)
  const godSigns=gs.godSigns||{};
  const topGod=Object.entries(godSigns).sort((a,b)=>b[1]-a[1]).filter(x=>x[1]>0);

  // Order alignment
  const orders={Rose:gs.rose||0,Sword:gs.sword||0,Crown:gs.crown||0};

  return e('div',{className:'dm-summary'},

          e('div',{className:'dm-char-stat'},'AC: '+d.ac),
          e('div',{className:'dm-char-stat'},'Attack: +'+d.attackBonus),
          e('div',{className:'dm-char-stat'},'XP: '+(gs.xp||0)),
          e('div',{className:'dm-char-stat'},'Honour: '+(gs.honour||0))),
        e('div',{className:'dm-char-block'},
          e('div',{className:'dm-label'},'Ability Scores'),
          e('div',{className:'dm-stats-row'},['str','dex','con','int','wis','cha'].map(s=>
            e('span',{key:s,className:'dm-stat-chip'},s.toUpperCase()+' '+gs.stats[s])))),
        e('div',{className:'dm-char-block'},
          e('div',{className:'dm-label'},'Equipment'),
          e('div',null,'Weapon: '+(gs.weapon||'None')),
          e('div',null,'Armor: '+(gs.armor||'None')),
          gs.hasShield?e('div',null,'Shield: Yes'):null,
          gs.feat?e('div',null,'Feat: '+gs.feat):null,
          gs.style?e('div',null,'Fighting Style: '+gs.style):null,
          gs.mastery&&gs.mastery.length?e('div',null,'Mastery: '+gs.mastery.join(', ')):null),

function NpcNotification({notif,onDismiss}){
  const e=React.createElement;
  if(!notif)return null;
  const cd=findCompanion(notif.comp);
  const icons={departure:'\u2620',npc_breakup:'\u2764\u200D\u{1F525}',npc_cool:'\u2744',gift:'\u2728',confrontation:'\u26a0'};
  const titles={departure:'COMPANION LOST',npc_breakup:'ROMANCE ENDED',npc_cool:'ROMANCE STRAINED',gift:'BOND FORGED',confrontation:'CONFRONTATION'};
  const giftDesc=notif.gift?notif.comp.split(' ')[0]+' teaches you something. +1 '+notif.gift.skill+'.':'';
  const confrontDesc=notif.comp.split(' ')[0]+' is angry. Your choices have driven them to the edge.';
  const descs={
    departure:'has left the party.',
    npc_breakup:'has ended things with you.',
    npc_cool:'The connection has cooled.',
    gift:giftDesc,
    confrontation:confrontDesc
  };
  return e('div',{className:'modal-overlay'},
    e('div',{className:'modal-box npc-notify'},
      e('div',{className:'npc-notify-icon'},icons[notif.type]||'\u26a0'),
      e('h2',{className:notif.type==='departure'||notif.type==='confrontation'?'red':notif.type==='gift'?'gold':'gold'},titles[notif.type]||'SOMETHING CHANGED'),
      e('p',{className:'npc-notify-name'},notif.comp),
      notif.type==='gift'||notif.type==='confrontation'?e('p',{className:'npc-notify-reason'},descs[notif.type]):e('p',{className:'npc-notify-reason'},notif.reason),
      cd?e('p',{className:'npc-notify-personality'},cd.personality):null,
      e('button',{className:'gold-btn',onClick:onDismiss,style:{marginTop:16}},'Continue')));
}

function BreakupScene({name,gs,onResolve}){
  const e=React.createElement;
  const bd=BREAKUP_DATA[name];
  if(!bd)return null;
  const cd=findCompanion(name);
  const stage=gs.romances?.[name]||'';
  
  return e('div',{className:'modal-overlay'},
    e('div',{className:'modal-box breakup-scene'},
      e('h2',{className:'gold'},'ENDING THINGS WITH '+name.toUpperCase()),
      cd?e('p',{className:'breakup-desc'},cd.personality):null,
      e('p',{className:'breakup-status'},'Current: \u2661 '+stage),
      e('div',{className:'breakup-options'},
        e('div',{className:'breakup-option gentle'},
          e('h3',null,'With Kindness'),
          e('p',null,bd.gentle.text),
          e('p',{className:'breakup-outcome'},bd.gentle.stays?'\u2713 Stays in party as '+bd.gentle.status:'\u2717 Leaves party (may return)'),
          e('button',{className:'gold-btn',onClick:()=>onResolve(name,'gentle',bd.gentle)},'Choose this')),
        e('div',{className:'breakup-option harsh'},

          e('p',null,bd.harsh.text),
          e('p',{className:'breakup-outcome'},bd.harsh.stays?'\u2713 Stays in party as '+bd.harsh.status:'\u2717 Leaves party'+(bd.harsh.returns?' (returns: '+bd.harsh.returns+')':'')),
          e('button',{className:'ghost-btn',onClick:()=>onResolve(name,'harsh',bd.harsh)},'Choose this')),

      e('button',{className:'ghost-btn',onClick:()=>onResolve(null),style:{marginTop:16}},'Cancel')));
}

function RomanceManage({gs,onClose,onSwitch,onEnd,onFriend}){
  const e=React.createElement;
  const active=Object.entries(gs.romances||{}).filter(([k,v])=>v&&v!=='Friend');
  const friends=Object.entries(gs.romances||{}).filter(([k,v])=>v==='Friend');
  const available=COMPANIONS_ALL.filter(c=>gs.companions.includes(c)&&!gs.romances[c]&&!(gs.romanceDeclined||{})[c]);
  return e('div',{className:'modal-overlay'},
    e('div',{className:'modal-box romance-manage'},
      e('h2',{className:'gold'},'ROMANCES'),
      active.length?e('div',{className:'rm-section'},
        e('h3',null,'Active'),
        active.map(([name,stage])=>e('div',{key:name,className:'rm-row'},
          e('span',{className:'rm-name'},name),

            e('button',{className:'ghost-btn rm-btn',onClick:()=>onFriend(name)},'Transition to friends'),
            e('button',{className:'ghost-btn rm-btn rm-end',onClick:()=>onEnd(name)},'End romance'))))
      ):e('p',{className:'dim-italic'},'No active romances.'),
      friends.length?e('div',{className:'rm-section'},
        e('h3',null,'Friends'),

      available.length?e('div',{className:'rm-section'},
        e('h3',null,'Available'),

function RelationshipCheck({check,gs,onResolve}){
  const e=React.createElement;
  if(!check)return null;
  const{names,compat,sceneAfter}=check;

function ShortRestModal({gs,onDone}){
  const e=React.createElement;
  const d=gs.derived;
  const[hdUsed,setHdUsed]=useState(gs.hitDiceUsed||0);
  const[hp,setHp]=useState(gs.hp);
  const[rolls,setRolls]=useState([]);
  const[rolling,setRolling]=useState(false);
  const[display,setDisplay]=useState(null);
  const remaining=d.hitDiceTotal-hdUsed;
  const atMax=hp>=d.maxHp;
  const spendHitDie=()=>{
    if(remaining<=0||atMax||rolling)return;
    setRolling(true);let c=0;
    const iv=setInterval(()=>{setDisplay(Math.floor(Math.random()*d.hitDie)+1);if(++c>=10){clearInterval(iv);
      const roll=Math.floor(Math.random()*d.hitDie)+1;
      const heal=roll+d.conMod;const actual=Math.min(heal,d.maxHp-hp);
      setHp(prev=>Math.min(prev+Math.max(0,heal),d.maxHp));
      setHdUsed(prev=>prev+1);
      setRolls(prev=>[...prev,{roll,conMod:d.conMod,heal:actual}]);
      setRolling(false);setDisplay(null);
    }},60);
  };
  const finish=()=>{onDone({hp,hitDiceUsed:hdUsed})};
  const totalHealed=rolls.reduce((s,r)=>s+r.heal,0);
  return e('div',{className:'modal-overlay'},
    e('div',{className:'modal-box rest-modal'},
      e('h2',{className:'gold',style:{marginBottom:4}},'SHORT REST'),
      e('p',{style:{fontSize:13,color:'var(--text-dim)',marginBottom:12}},'You take a breather, binding wounds and catching your breath. Spend Hit Dice to recover hit points.'),
      e('div',{className:'rest-stats'},
        e('div',{className:'rest-stat'},e('span',{className:'rest-label'},'HP'),e('span',{className:'rest-val'},hp+' / '+d.maxHp)),
        e('div',{className:'rest-stat'},e('span',{className:'rest-label'},'Hit Dice'),e('span',{className:'rest-val'},remaining+' / '+d.hitDiceTotal+' (d'+d.hitDie+')'))),
      rolls.length?e('div',{className:'rest-rolls'},rolls.map((r,i)=>
        e('div',{key:i,className:'rest-roll-row'},'d'+d.hitDie+': '+r.roll+' + '+r.conMod+' CON = '+r.heal+' HP healed'))):null,
      rolling?e('div',{className:'rest-rolling'},e('span',{className:'roll-anim'},display)):null,
      totalHealed>0?e('div',{style:{fontSize:13,color:'var(--gold)',margin:'8px 0'}},'Total healed: '+totalHealed+' HP'):null,
      e('div',{className:'confirm-btns',style:{marginTop:12}},
        remaining>0&&!atMax?e('button',{className:'gold-btn',onClick:spendHitDie,disabled:rolling},'Spend Hit Die (d'+d.hitDie+' + '+d.conMod+')'):null,
        e('button',{className:remaining>0&&!atMax?'ghost-btn':'gold-btn',onClick:finish},atMax?'Fully Rested — Continue':rolls.length?'Done Resting':'Skip Rest'))));
}

function HealingPanel({gs,onUpdate,onClose}){
  const e=React.createElement;
  const d=gs.derived;
  const[hp,setHp]=useState(gs.hp);
  const[loh,setLoh]=useState(gs.layOnHandsPool||0);
  const[slots,setSlots]=useState(gs.spellSlotsUsed||0);
  const[potions,setPotions]=useState(gs.potions||0);
  const[bandages,setBandages]=useState(gs.bandages||0);
  const[lohAmt,setLohAmt]=useState(5);
  const[log,setLog]=useState([]);
  const maxHp=d.maxHp;
  const atMax=hp>=maxHp;
  const addLog=(msg)=>setLog(prev=>[msg,...prev].slice(0,8));
  const applyHeal=(amt)=>{const actual=Math.min(amt,maxHp-hp);setHp(prev=>Math.min(prev+actual,maxHp));return actual};
  const useLoh=()=>{
    if(loh<=0||atMax)return;const amt=Math.min(lohAmt,loh,maxHp-hp);
    setLoh(prev=>prev-amt);const healed=applyHeal(amt);addLog('Lay on Hands: +'+healed+' HP ('+Math.max(0,loh-amt)+' pool remaining)');
  };
  const useCureWounds=()=>{
    if(slots>=(d.spellSlotsMax||0)||atMax)return;
    const castMod=['Cleric','Druid','Ranger'].includes(gs.cls)?d.wisMod:['Wizard'].includes(gs.cls)?d.intMod:d.chaMod;
    const roll=Array.from({length:2},()=>Math.floor(Math.random()*8)+1).reduce((a,b)=>a+b,0);
    const heal=roll+(castMod||0);setSlots(prev=>prev+1);const healed=applyHeal(heal);
    addLog('Cure Wounds (2d8+'+castMod+'): rolled '+roll+'+'+castMod+' = +'+healed+' HP');
  };
  const usePotion=()=>{
    if(potions<=0||atMax)return;const roll=Array.from({length:2},()=>Math.floor(Math.random()*4)+1).reduce((a,b)=>a+b,0)+2;
    setPotions(prev=>prev-1);const healed=applyHeal(roll);addLog('Potion of Healing (2d4+2): +'+healed+' HP');
  };
  const useBandage=()=>{
    if(bandages<=0||atMax)return;const roll=Math.floor(Math.random()*4)+1;
    setBandages(prev=>prev-1);const healed=applyHeal(roll);addLog('Bandage (1d4): +'+healed+' HP');
  };
  const done=()=>{onUpdate({hp,layOnHandsPool:loh,spellSlotsUsed:slots,potions,bandages});onClose()};
  const slotsRemaining=(d.spellSlotsMax||0)-slots;
  const hasCureWounds=gs.spells&&gs.spells.level1&&gs.spells.level1.includes('Cure Wounds');
  return e('div',{className:'modal-overlay'},
    e('div',{className:'modal-box heal-modal'},
      e('h2',{className:'gold',style:{marginBottom:4}},'HEALING'),
      e('div',{className:'rest-stats',style:{marginBottom:12}},
        e('div',{className:'rest-stat'},e('span',{className:'rest-label'},'HP'),e('span',{className:'rest-val'},hp+' / '+maxHp))),
      atMax?e('p',{style:{color:'var(--gold)',fontSize:13}},'You are at full health.'):null,
      e('div',{className:'heal-options'},
        // Lay on Hands (Paladin)
        loh>0?e('div',{className:'heal-option'},
          e('div',{className:'heal-option-header'},'Lay on Hands ('+loh+' pool)'),
          e('div',{className:'heal-loh-row'},
            e('input',{type:'range',min:1,max:Math.min(loh,maxHp-hp||1),value:Math.min(lohAmt,loh),onChange:ev=>setLohAmt(parseInt(ev.target.value))}),
            e('span',{style:{marginLeft:8,minWidth:30}},Math.min(lohAmt,loh)+' HP')),
          e('button',{className:'gold-btn heal-btn',onClick:useLoh,disabled:atMax},'Heal '+Math.min(lohAmt,loh)+' HP')):null,
        // Cure Wounds (any class with spell prepared)
        hasCureWounds&&slotsRemaining>0?e('div',{className:'heal-option'},
          e('div',{className:'heal-option-header'},'Cure Wounds ('+slotsRemaining+' slots)'),
          e('div',{style:{fontSize:12,color:'var(--text-dim)'}},'2d8 + '+(['Cleric','Druid','Ranger'].includes(gs.cls)?d.wisMod+' (WIS)':d.chaMod+' (CHA)')),
          e('button',{className:'gold-btn heal-btn',onClick:useCureWounds,disabled:atMax},'Cast Cure Wounds')):null,
        // Potions
        potions>0?e('div',{className:'heal-option'},
          e('div',{className:'heal-option-header'},'Potion of Healing ('+potions+')'),
          e('div',{style:{fontSize:12,color:'var(--text-dim)'}},'2d4 + 2'),
          e('button',{className:'gold-btn heal-btn',onClick:usePotion,disabled:atMax},'Drink Potion')):null,
        // Bandages
        bandages>0?e('div',{className:'heal-option'},
          e('div',{className:'heal-option-header'},'Bandage ('+bandages+')'),
          e('div',{style:{fontSize:12,color:'var(--text-dim)'}},'1d4'),
          e('button',{className:'gold-btn heal-btn',onClick:useBandage,disabled:atMax},'Apply Bandage')):null,
        // Nothing available
        loh<=0&&(!hasCureWounds||slotsRemaining<=0)&&potions<=0&&bandages<=0?
          e('p',{style:{fontSize:13,color:'var(--text-dim)'}},'No healing resources available.'):null),
      log.length?e('div',{className:'heal-log'},log.map((l,i)=>e('div',{key:i,className:'heal-log-entry'},l))):null,
      e('div',{className:'confirm-btns',style:{marginTop:12}},
        e('button',{className:'gold-btn',onClick:done},'Done'))));

let CAMPAIGN=null;
let CAMPAIGN_RULES=null;
let DM_SUMMARY=null;
let EPILOGUES=null;
let SPECIES_DATA=null;
let CLASS_DATA=null;
let EQUIPMENT_DATA=null;
let LANGUAGES_DATA=null;

async function loadCampaign(campaignId){
  // Standalone build: use embedded data instead of fetching
  if(window.__STANDALONE_CAMPAIGN__&&window.__STANDALONE_CAMPAIGN__.id===campaignId){
    const manifest=window.__STANDALONE_CAMPAIGN__;
    const d=window.__STANDALONE_DATA__||{};
    if(d.scenes)SCENES=d.scenes;
    if(d.combatNarration)COMBAT_NARRATION=d.combatNarration;
    if(d.combatOutcomes)COMBAT_OUTCOMES=d.combatOutcomes;
    if(d.companions){const c=d.companions;if(c.all)COMPANIONS_ALL=c.all;if(c.data)COMPANION_DATA=c.data;if(c.combatStats)COMPANION_COMBAT_STATS=c.combatStats;if(c.romanceCompat)ROMANCE_COMPAT=c.romanceCompat;if(c.romanceTooltips)ROMANCE_TOOLTIPS=c.romanceTooltips;if(c.breakupData)BREAKUP_DATA=c.breakupData}
    if(d.sceneEffects){if(d.sceneEffects.sceneEffects)SCENE_EFFECTS=d.sceneEffects.sceneEffects;if(d.sceneEffects.npcBreakups)NPC_BREAKUPS=d.sceneEffects.npcBreakups}
    if(d.shopData){if(d.shopData.sellPrices)SELL_PRICES=d.shopData.sellPrices;if(d.shopData.unsellablePattern)UNSELLABLE=new RegExp(d.shopData.unsellablePattern,'i')}
    if(d.rules){CAMPAIGN_RULES=d.rules;if(d.rules.endingScenes)ENDING_SCENES=d.rules.endingScenes;if(d.rules.relationshipCheckScenes)RELATIONSHIP_CHECK_SCENES=d.rules.relationshipCheckScenes;if(d.rules.gods)GODS=d.rules.gods;if(d.rules.godFlavour)GOD_FLAVOUR=d.rules.godFlavour;if(d.rules.presets)PRESETS=d.rules.presets}
    if(d.theme){applyTheme(d.theme);if(d.theme.loadingScreen)manifest.loadingScreen=d.theme.loadingScreen}
    if(d.dmSummary)DM_SUMMARY=d.dmSummary;
    if(d.epilogues)EPILOGUES=d.epilogues;
    if(d.partyBanter)PARTY_BANTER=d.partyBanter;
    if(d.companionGifts)COMPANION_GIFTS=d.companionGifts;
    if(d.species)SPECIES_DATA=d.species;
    if(d.classes)CLASS_DATA=d.classes;
    if(d.equipment)EQUIPMENT_DATA=d.equipment;
