ds room and her face has the specific quality it gets when she has found something she did not want to find.","The Dragon Army knew the refugees were on the south road before the patrol found them. The dispatch pouch from the patrol — if you kept it — contains a reference code that matches a garrison communication cipher. The Blue Wing had intelligence on the garrison's movements. Current intelligence. Not intercepted — given.","Thessaly lays it out carefully: the timing, the cipher reference, the two officers who had access to that level of communication. One is dead — killed in the ambush on the south road. The other is Ser Aldous.","There is another possibility Thessaly offers, quietly: the cipher reference could have been planted to implicate Aldous. By the Dragon Army, if they knew his history with that village. If someone wanted a trusted garrison mentor removed. She does not know which is true. She has given you everything she has."],"boxes":[{"type":"info","text":"**DARK SCENE — BETRAYAL**\nSer Aldous, who told you about the village he could not save. Who mentored you on the Measure. Thessaly's evidence is circumstantial but strong. What you do with this is yours to decide. Caeron does not know yet."},{"type":"roll","text":"**ROLL REQUIRED:** Investigation (INT, proficiency if trained) (+3) | INT | DC 14\n**SUCCESS (roll 14+):** The cipher reference uses a secondary field code, not the primary garrison cipher. A traitor using the primary code would be caught by standard security sweeps. Using the secondary requires counter-intelligence knowledge — this narrows the suspect list significantly and rules out the obvious names.\n**FAILURE (roll 1-13):** The evidence is what Thessaly described. You cannot evaluate it further without more information.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Take the evidence to Lord Caeron immediately. Let the command structure decide.","target":"53_HUB","points":{"CROWN":2}},{"letter":"B","text":"Confront Aldous directly, alone, before going to Caeron. Give him the chance to explain.","target":"53C","points":{"ROSE":2}},{"letter":"C","text":"Tell no one yet. Keep it between you and Thessaly and watch Aldous closely.","target":"53_HUB","points":{"ROSE":1,"SWORD":1}},{"letter":"D","text":"Destroy the evidence. Aldous has given you too much for this to be what it looks like.","target":"53_HUB","points":{"ROSE":1}}]},"53C":{"id":"53C","title":"ALDOUS ALONE","location":"","prose":["*Castle Brightholm — Chapel Steps, Night*","He is exactly where he always is late at night: the chapel steps, watching whatever hawk or star he watches when he cannot sleep. He sees you coming and he looks at what you are carrying — the papers — and something in his face shifts. Not guilt. Something more complicated.","He is quiet for a long time after you show him. Then: 'I did not give them information about the refugees. I would tell you if I had. I have been honest with you about worse things than this.' He looks at the cipher reference. 'I know who used this code. And I know who had reason to make it look like me.'","He gives you a name. A garrison officer you know slightly — someone whose brother is a Dragon Army officer. Someone who has been sending private correspondence south. Someone Aldous has been watching for three weeks and has not yet had enough evidence to bring to Caeron."],"boxes":[{"type":"info","text":"**The Real Traitor**\nAldous was right. The officer is the source. If you went to Aldous first, you now have the actual name. You can bring this to Caeron with full context — but it means admitting you sat on Thessaly's evidence for a night before reporting it. Caeron will know. He will not say anything. He will remember."}],"choices":[{"letter":"A","text":"Take everything to Caeron immediately — Thessaly's evidence, Aldous's name, all of it.","target":"53_HUB","points":{"ROSE":2,"CROWN":1}},{"letter":"B","text":"Deal with the officer yourself, tonight, before Caeron is involved.","target":"53_HUB","points":{"SWORD":1}}]},"53D":{"id":"53D","title":"TARIEL AFTER THE NEWS","location":"","prose":["*Castle Brightholm — Map Room, Night (Conditional: Tariel in party)*","'Two thousand soldiers,' she says. 'Moving north. The garrison has — what — eighty? The decree sent thirty refugees south into their path. And the Order's response is to accelerate your Trials so you can ride to Vogler as a sworn squire rather than an unsworn one.' She looks at you. 'Does the title make your sword sharper?'","Then she opens the locket. A portrait. A young man in Dragon Army colours. Dark hair like hers. Her eyes.","'My brother,' she says. 'Aldren. He joined the Dragon Army because the Knights would not have him — wrong province, wrong politics, wrong family name. He tried to leave after Thresh. They do not let people leave. He is dead. Both institutions failed him. He was twenty-three.'","**CONVICTION CHOICE (Tariel Corruption Track — Debate 2):**","**ROMANCE CHOICE (optional — if at SPARK or higher):**"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Insight (+1) | WIS | DC 13\n**SUCCESS (roll 13+):** The locket portrait is recent. The grief is not old. The diplomatic observer role is a response. She is not your enemy. She is something more complicated.\n**FAILURE (roll 1-12):** She is grieving. The arguments are a form of grief."}],"choices":[{"letter":"A","text":"'Neither system killed your brother. People did. The Measure exists to hold those people accountable.'","target":"53_HUB","points":{"CROWN":1},"conviction":"remains"},{"letter":"B","text":"'I am sorry about Aldren. The Order should have been better. I intend to make it better.'","target":"53_HUB","points":{"ROSE":1},"conviction":"remains"},{"letter":"C","text":"'You are right. Both systems failed. I do not know what replaces them but I know they are not enough.'","target":"53_HUB","points":{"ROSE":1,"CROWN":-1},"conviction":"advances"},{"letter":"D","text":"'The Order can be reformed. Your brother's death is an argument for reform, not abandonment.'","target":"53_HUB","points":{"CROWN":2},"conviction":"improves"},{"letter":"R1","text":"'I am sorry about Aldren.' Name him. Touch her hand.","target":null,"points":{},"romance_flame":true},{"letter":"R2","text":"Maintain professional distance.","target":null,"points":{}}]},"53E":{"id":"53E","title":"LYSANDER'S TRUTH","location":"","prose":["*Castle Brightholm — Garrison Wall, Night (Conditional: Lysander in party)*","He tells you. The bridge. The refugees. The court-martial. The Knight who filed the court-martial was promoted to Commander.","He tells this story the way Aldous told his — flat, worn smooth. But where Aldous carries the weight as penance, Lysander carries it as evidence.","**CONVICTION CHOICE (Lysander Corruption Track — Experience 3):**","**ROMANCE CHOICE (optional — if at SPARK or higher):**"],"boxes":[],"choices":[{"letter":"A","text":"'File the appeal. I will speak on your behalf.'","target":"53_HUB","points":{"ROSE":1,"CROWN":1},"conviction":"improves"},{"letter":"B","text":"'The system that punished you is broken. It needs people like you inside it.'","target":"53_HUB","points":{"CROWN":1},"conviction":"remains"},{"letter":"C","text":"'They promoted the man who let people drown. I do not know how to defend that.'","target":"53_HUB","points":{"ROSE":1,"CROWN":-1},"conviction":"advances"},{"letter":"D","text":"'You did the right thing. The institution did the wrong thing. Both are true and I can hold both.'","target":"53_HUB","points":{"ROSE":2},"conviction":"QUESTIONING"},{"letter":"E","text":"'I want to believe the Order would have done differently if it knew.'","target":"53_HUB","points":{"ROSE":1},"conviction":"SHAKEN"},{"letter":"R1","text":"Put your hand on his arm.","target":null,"points":{},"romance_flame":true},{"letter":"R2","text":"Carry it with him through witness.","target":null,"points":{}}]},"54":{"id":"54","title":"TENDING THE COMPANIONS","location":"","prose":["*Castle Brightholm*","Aldric is in the armoury, re-checking equipment. Mira — if present — is doubling her medical supplies. Serath — if present — is watching the south road."],"boxes":[],"choices":[{"letter":"A","text":"Spend the time with Aldric.","target":"53_HUB","points":{"SWORD":1},"romance_comp":"Aldric Voss","romance_flame":true},{"letter":"B","text":"Spend the time with Mira if present, otherwise train.","target":"53_HUB","points":{"ROSE":1}},{"letter":"C","text":"Sit with Serath if present.","target":"53_HUB","points":{"ROSE":1}}]},"54B":{"id":"54B","title":"MIRA TENDS SERATH","location":"","prose":["*Castle Brightholm — Infirmary, Night (NPC Cross-Talk — Conditional: both Mira and Serath present)*","You pass the infirmary and the door is ajar. Inside: Mira is re-dressing Serath's wound. Her hands move with certainty. She does not look at Serath's face while she works.","Serath is watching Mira's hands. Then the assessment becomes something else. They are watching someone who is kind to them without asking for anything.","Mira: 'What you did — leaving the army. That took a different kind of courage.' Serath: 'You are the first person who called it courage.'"],"boxes":[],"choices":[{"letter":"A","text":"Watch. Learn.","target":"53_HUB","points":{"ROSE":1}},{"letter":"B","text":"Enter. 'Is there anything you need?'","target":"53_HUB","points":{"ROSE":1}}]},"55":{"id":"55","title":"THE EMPTY HALL","location":"","prose":["*Castle Brightholm — Great Hall*","Everyone left. The hall emptied in the efficient way of a military institution responding to something real. You stayed. You are not entirely sure why — something in how he stood after everyone else left made going feel like the wrong thing to do. He is at the table now with the dispatch open again, reading it a third time or using it as somewhere to look. He hears you. Looks up. For one moment, before the composure reassembles, you see what is underneath the officer. He is thirty years old. He is afraid. He is very good at his job and that has not made this less frightening. 'You stayed,' he says. The two words carry at least three others.","You stay for a while. Not long — there is work to do and both of you know it. But a while. The dispatch is still open on the table. He does not close it. You do not ask him to. Some things you can only do if you do not make them into an act — if you just stand in the same room with someone who is carrying something heavy until they are ready to carry it into the next room."],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\n'I intend to conduct your Trials evaluation before we march — whatever comes after, you should have the thing you came here for.' He says this to his papers. You have never heard Caeron Ashvale ask for anything before."}],"choices":[{"letter":"A","text":"'I do. Thank you, my lord.'","target":"53_HUB","points":{"CROWN":2},"romance_comp":"Lord Caeron Ashvale","romance_flame":true},{"letter":"B","text":"'What about you? What do you want?'","target":"59","points":{"ROSE":2}},{"letter":"C","text":"Stand beside him at the table. Look at the dispatch together. Say nothing.","target":"59","points":{"ROSE":2},"romance_comp":"Lord Caeron Ashvale","romance_flame":true}]},"56":{"id":"56","title":"THESSALY'S INFORMATION","location":"","prose":["*Castle Brightholm*","Thessaly finds you in the map room an hour after the briefing. She has been busy since — ink on her hands, the look of someone who has been writing fast and stopping to think. She lays it out: the Dragon Army has a specific objective in Vogler. Not only the supply route. Something in the village — or someone. She has narrowed it to two possibilities and cannot narrow it further. 'I wanted you to know before we march,' she says. 'Because you are riding toward it whether you know what it is or not.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** History (INT, proficiency if trained) (+3) | INT | DC 13\n**SUCCESS (roll 13+):** Vogler is on Lake Akh-Tiel — the only navigable route between the southern Solamnic coast and the northern fortresses that does not require mountain passes. Whoever controls Vogler controls that supply line for the whole northern campaign. The Dragon Army does not need something in the village. They need the village itself.\n**FAILURE (roll 1-12):** The strategic value is military. You cannot narrow it further.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Take this to Caeron immediately.","target":"53_HUB","points":{"CROWN":1,"ROSE":1}},{"letter":"B","text":"Keep it between you for now.","target":"53_HUB","points":{"ROSE":1}},{"letter":"C","text":"Stay. There is something else between you tonight.","target":"56B","points":{"ROSE":1}}]},"57":{"id":"57","title":"ALDRIC IN THE ARMOURY","location":"","prose":["*Castle Brightholm*","He is sharpening his sword for the third time tonight. You can tell it is the third time because the blade has the particular high shine of something worked past the point of usefulness by someone who needed something to do with their hands. He looks up when he hears you.","The armoury is quiet. Tallow candles, low. Somewhere down the corridor someone is walking fast and then stopping, then fast again — the sound of a garrison trying to be ready for something it cannot fully prepare for. After a while Aldric sets the whetstone down. 'Whatever Order claims you,' he says, 'I am glad you were here this year.'"],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nHe hands you a leather wrist guard — his, slightly worn. 'Fits better than yours,' he says. He is not looking at you."},{"type":"info","text":"**CONDITIONAL — IF YOU READ SCENE 53B CHOICE B**\nIf in Scene 53B you chose option B (implicating Aldric): before your choice below, turn to Scene 58B (What Aldric Did) now."}],"choices":[{"letter":"A","text":"Take it. 'Thank you.'","target":"53_HUB","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"'You will want it back when this is over.' 'Maybe,' he says.","target":"53_HUB","points":{"ROSE":1,"SWORD":1}},{"letter":"C","text":"If you implicated Aldric in Scene 53B: see what happened (Scene 58B)","target":"58B","points":{}}]},"58B":{"id":"58B","title":"WHAT ALDRIC DID","location":"","prose":["*Castle Brightholm — Storeroom, Night Before Trials*","Aldric finds you before you find him. He looks like someone who has done something and cannot undo it and has not decided yet whether he should try.","He found the officer. The one Aldous named. He followed him to the storeroom where the private correspondence was hidden. And then — Aldric does not describe this part clearly, and you do not push him — something happened. The officer is alive. He is going to stay alive. He is also, currently, unconscious, bound, and in the storeroom, and Aldric hit him harder than he meant to and then harder than that and then stopped himself and he does not know what to do with what stopping himself felt like.","He looks at you. He is not asking for absolution. He is asking whether he is still the person he thought he was. He does not know yet. He wants you to help him figure it out."],"boxes":[{"type":"info","text":"**CONDITIONAL DARK SCENE**\nThis scene occurs if Aldric is in your party AND you chose Option B in Scene 53B (watched the suspected traitor rather than reporting)."},{"type":"info","text":"**MORAL WEIGHT**\nAldric did not kill him. He stopped. That matters. But he also crossed a line the Measure is very clear about. The officer is a traitor. Aldric's anger was not wrong. His method was. Both of these are true at the same time."},{"type":"roll","text":"**OPTIONAL ROLL:** Medicine (WIS, proficiency if trained) (+1) | WIS | DC 12\n**SUCCESS (roll 12+):** His knuckles are split and his breathing is slightly elevated — not from exertion but from the controlled effort of not shaking. He stopped himself mid-action. That kind of stop leaves a specific mark: not guilt about what he did but the physical memory of choosing not to continue. He is more in control of himself than he believes. Tell him this.\n**FAILURE (roll 1-11):** He is in distress. The specific detail of his emotional state is not readable.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Report everything to Caeron — the officer, Aldric's actions, all of it. Aldric faces a formal reprimand. The traitor is imprisoned.","target":"53_HUB","points":{"CROWN":2}},{"letter":"B","text":"Report the officer. Say Aldric found him and subdued him in the line of duty. The rest is not said.","target":"53_HUB","points":{"SWORD":1}},{"letter":"C","text":"Tell Aldric: 'You stopped. That is the part that matters.' Then go wake Caeron together.","target":"53_HUB","points":{"ROSE":2}}]},"59":{"id":"59","title":"WHAT CAERON CANNOT SAY","location":"","prose":["*Castle Brightholm — Great Hall*","'I became a knight because the world requires people willing to stand in front of the bad things. I have been wondering for some time whether I am still that person.' A pause. 'You make me think that I might be.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 15\n**SUCCESS (roll 15+):** He said 'still' — present tense. This is not a past doubt: it is active. Lord Caeron Ashvale does not know if he has what this moment requires. He told you because he trusts you with it. ROMANCE FLAME Caeron activates immediately if you respond without trying to reassure him.\n**FAILURE (roll 1-14):** He is speaking honestly but opaquely. The layer beneath the words is not clear.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"'You are.'","target":"53_HUB","points":{"ROSE":2},"romance_comp":"Lord Caeron Ashvale","romance_flame":true},{"letter":"B","text":"'Show me at Vogler.'","target":"53_HUB","points":{"ROSE":1,"SWORD":1}},{"letter":"C","text":"Paladin: something pulls you to the south field tonight. Turn to Scene P3 before Scene 60.","target":"P3","points":{}}]},"60":{"id":"60","title":"THE ACCELERATED TRIALS","location":"","prose":["*Castle Brightholm — Great Hall, Dawn*","The day of the Trials begins before dawn. No ceremony — there is no time for it. But someone has lit the chapel candles anyway, all of them, and left them burning without explanation.","Stripped of the usual ritual, the day has a different weight — denser, more honest. Physical evaluation. Combat assessment, Aldric as your opponent. Written Measure examination. An oral panel: Caeron, Aldous, and two senior knights whose names you have never learned because they have been here for thirty years and no longer need names so much as presence.","**IF SERA IS IN YOUR PARTY:** Sera is not in the hall for the Trials — she is on the armoury roof again, where she was the first time you saw her. She watches the sparring bout from above. After, when you pass the armoury, there is a folded note on the step: 'Your footwork gap is fixed. Your guard on the right needs work. I will show you on the road. — S.' This is the most she has ever written to you.","**Final Oral Question:** 'Name the highest principle of the Solamnic Knighthood.'"],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Athletics (Sparring Bout) (+3) | STR | DC 15\n**SUCCESS (roll 15+):** You disarm Aldric on the third pass. +2 SWORD. The panel leans forward.\n**FAILURE (roll 1-14):** Aldric takes the bout. +1 SWORD — they evaluate effort, not only outcome.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"roll","text":"**ROLL REQUIRED:** History / Religion (Written Measure Exam) (+0) | INT | DC 14\n**SUCCESS (roll 14+):** Your responses are precise and occasionally surprising. Aldous underlines one answer twice. +2 ROSE. (Paladins: your answer on divine duty is unexpectedly sophisticated.)\n**FAILURE (roll 1-13):** Solid, correct, conventional. +1 ROSE.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**TONIGHT — BEFORE SCENE 61**\nThe Oath is tomorrow. Tonight is the last night before everything changes. • PALADINS on the DG track: turn to Scene DG3 (The Crown) now. • FIGHTERS on the Measure track: turn to Scene M3 (Two Oaths) now. M3 leads to M4, then return to Scene 62."}],"choices":[{"letter":"A","text":"'Est Sularus oth Mithas. My honour is my life.'","target":"61","points":{"CROWN":2}},{"letter":"B","text":"'The protection of the innocent, from which all other laws derive.'","target":"61","points":{"ROSE":3}},{"letter":"C","text":"'Courage in the face of darkness, maintained even when the outcome is uncertain.'","target":"61","points":{"SWORD":2}},{"letter":"D","text":"Fighter: The Measure — Two Oaths (Scene M3)","target":"M3","points":{}},{"letter":"E","text":"Paladin on DG track: The Crown (Scene DG3)","target":"DG3","points":{}},{"letter":"F","text":"(Paladin) \u2018For the innocent. For those who cannot protect themselves.\u2019","target":"P3a","points":{"ROSE":2},"condition":"paladin"},{"letter":"G","text":"(Paladin) \u2018For those who fight beside me. For the line that holds.\u2019","target":"P3b","points":{"SWORD":2},"condition":"paladin"},{"letter":"H","text":"(Paladin) \u2018For the living things that have no voice in the decisions made about them.\u2019","target":"P3c","points":{"ROSE":1,"SWORD":1},"condition":"paladin"},{"letter":"I","text":"(Paladin) \u2018For the possibility that the world can be better than it is.\u2019","target":"P3d","points":{"ROSE":2},"condition":"paladin"},{"letter":"J","text":"(Paladin) \u2018I do not know yet. I am still becoming the person who will know.\u2019","target":"P3e","points":{"ROSE":1,"CROWN":1},"condition":"paladin"}]},"P3":{"id":"P3","title":"THE TEST","location":"","prose":["*Castle Brightholm — South Field, Night Before Trials*","The south field is empty and dark. You are here because something pulled you — the same wordless pull that brought you to the old chapel. You are getting used to following it. You are not sure this is wise.","There is a figure in the field. Not human — or not entirely. It has the general shape of a person standing very still in the darkness, but the details do not resolve cleanly. It does not threaten. It waits.","It speaks. One question. Simple. Unanswerable by anyone who has not thought about it very carefully:","The figure waits. It is genuinely asking. This is not a test with a wrong answer — it is a test to see if you have an answer at all, and whether it is yours."],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nFighters: proceed directly to Scene 60."},{"type":"divine","text":"**DIVINE SIGN**\n'You have power that most people in this age do not possess. It came to you through something vast and old that has been watching you since before you knew it was there. The question is not whether you will use it. You will. The question is: for whom?'"}],"choices":[{"letter":"A","text":"'For the innocent. For those who cannot protect themselves.'** Mark 1 tally: PALADINE or MISHAKAL .","target":"P3a","points":{"ROSE":2}},{"letter":"B","text":"'For those who fight beside me. For the line that holds.'** Mark 1 tally: KIRI-JOLITH.","target":"P3b","points":{"SWORD":2}},{"letter":"C","text":"'For the living things that have no voice in the decisions made about them.'** Mark 1 tally: HABBAKUK.","target":"P3c","points":{"ROSE":1,"SWORD":1}},{"letter":"D","text":"'For the possibility that the world can be better than it is.'** Mark 1 tally: BRANCHALA or PALADINE .","target":"P3d","points":{"ROSE":2}},{"letter":"E","text":"'I do not know yet. I am still becoming the person who will know.'** Mark nothing.","target":"P3e","points":{"ROSE":1,"CROWN":1}}]},"P3a":{"id":"P3a","title":"THE TEST — RESPONSE","location":"","prose":["The figure is still for a long time. Then: 'Good. That answer holds.' It does not say whose answer it is. It does not need to. It was already there when you started speaking.","Award: +2 ROSE. Proceed to Scene 60."],"boxes":[],"choices":[{"letter":"A","text":"Continue to the Trials.","target":"60","points":{}}]},"P3b":{"id":"P3b","title":"THE TEST — RESPONSE","location":"","prose":["The figure's stillness changes quality — something in it settles, like a weapon lowered rather than sheathed. 'That is the answer of a soldier. There is no higher one.' It steps back and is not there anymore.","Award: +2 SWORD. Proceed to Scene 60."],"boxes":[],"choices":[{"letter":"A","text":"Continue to the Trials.","target":"60","points":{}}]},"P3c":{"id":"P3c","title":"THE TEST — RESPONSE","location":"","prose":["The figure turns its head as if listening to something you cannot hear. Then: 'There are more things alive in this world than have names. It is good to remember them.' Warmth. Brief. Gone.","Award: +1 ROSE +1 SWORD. Proceed to Scene 60."],"boxes":[],"choices":[{"letter":"A","text":"Continue to the Trials.","target":"60","points":{}}]},"P3d":{"id":"P3d","title":"THE TEST — RESPONSE","location":"","prose":["The figure makes a sound that might be music if it were louder. 'That is the most difficult answer,' it says. 'It requires you to keep hoping.' A pause. 'Do not stop.'","Award: +2 ROSE. Proceed to Scene 60."],"boxes":[],"choices":[{"letter":"A","text":"Continue to the Trials.","target":"60","points":{}}]},"P3e":{"id":"P3e","title":"THE TEST — RESPONSE","location":"","prose":["The figure is still for a long time. Then, quietly: 'Most people never ask the question. You asked it. That is enough for now.' It is gone when you blink.","Award: +1 ROSE +1 CROWN. Proceed to Scene 60."],"boxes":[],"choices":[{"letter":"A","text":"Continue to the Trials.","target":"60","points":{}}]},"DG3":{"id":"DG3","title":"THE CROWN","location":"","prose":["*Castle Brightholm — Night Before the Oath (Paladin Only)*","You are alone in the old chapel. The official ceremony is tomorrow. You have been sitting here for an hour with your hands on your knees trying to remember why you started. The voice does not whisper tonight. It speaks clearly, quietly, with the tone of someone who believes they are offering something genuinely good.","This is the most sophisticated temptation yet. It is not asking you to be evil. It is asking you to believe the ends justify the means and that you are wise enough to navigate the result. It might even be true. That is what makes it the worst one."],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nOnly triggers if you are LISTENING, COMPROMISED, or FALLEN on the DG track. If you are HELD FIRM throughout: skip to Scene 61 — you will receive your gift there instead."},{"type":"dark","text":"**DARK TEMPTATION — TAKHISIS SPEAKS PLAINLY**\nTomorrow they give you an Order. Rose, Sword, Crown — their little hierarchy of virtue. I offer you something they cannot. Not a rank. A purpose. The Dragon Armies will reshape this world. Every Solamnic Knight who rides against them will die for a structure that cannot hold. But a Knight who rides with me — a Knight who carries both edges — could change everything. Not a traitor. A bridge. You know how to hold two truths. I am asking you to hold this one: the light and the dark, working through the same hands."}],"choices":[{"letter":"A","text":"No. The oath is not a strategy. It is what you are.","target":"DG3_purified","points":{}},{"letter":"B","text":"You are tempted — but you pull back. You spend the night in prayer.","target":"DG3_resist","points":{}},{"letter":"C","text":"You accept. The bridge metaphor is genuinely compelling.","target":"DG3_fall","points":{}}]},"DG3_purified":{"id":"DG3_purified","title":"THE PURIFICATION","location":"","prose":["*Castle Brightholm — Old Chapel, Night Before the Oath*","You say no so clearly that the voice does not just leave — something cleanses. Whatever had been accumulating — the listening, the delay, the compromise — burns off in a single moment of absolute certainty. You know who you are. You know whose you are. Tomorrow the Oath will be the truest thing you have ever said."],"boxes":[{"type":"dg_track","text":"**DG TRACK: PURIFIED ✓✓**\nAll previous compromises cleared. Restore any reduced Lay on Hands pool. Restore frozen god tallies — add +1 to highest for this proof of faith. Proceed to DG_GIFT_PURE for your reward."}],"choices":[{"letter":"A","text":"Receive your gift.","target":"DG_GIFT_PURE","points":{}}]},"DG3_resist":{"id":"DG3_resist","title":"THE HARD RETREAT","location":"","prose":["*Castle Brightholm — Old Chapel, Night Before the Oath*","You pull back. It costs you — not just sleep. The cost is the admission that you were closer than you want to admit. You spend the night in prayer with the specific discomfort of someone who has seen themselves clearly and does not entirely like the view. By morning you are steady. Not clean — steady. That distinction matters. Steady is enough."],"boxes":[{"type":"dg_track","text":"**DG TRACK: PULLED BACK ✓**\nImproved state. Lay on Hands partially restored (+2 to pool). God tallies partially unfrozen. Proceed to DG_GIFT_SCARRED for your reward."}],"choices":[{"letter":"A","text":"Receive your gift.","target":"DG_GIFT_SCARRED","points":{}}]},"DG3_fall":{"id":"DG3_fall","title":"THE BRIDGE ACCEPTED","location":"","prose":["*Castle Brightholm — Old Chapel, Night Before the Oath*","You have convinced yourself. That is the part that will haunt you later — not that you were deceived but that you did the work yourself. The reasoning was so good. In the morning you take the Oath with the others. The words come out. They feel true. They feel true through something. Through something that is not quite you anymore."],"boxes":[{"type":"dg_track","text":"**DG TRACK: DEEPLY FALLEN ■■■■**\nThe Oath is taken. Its power continues to function. The source is no longer what you believe it is. • Lay on Hands heals 1 HP per use until DG4 is resolved. • Divine Smite functions. The radiance is violet-tinged. • Proceed to DG4 — The Reckoning is your next scene on the road to Vogler."}],"choices":[{"letter":"A","text":"Continue to Scene 61.","target":"61","points":{}}]},"DG_GIFT_PURE":{"id":"DG_GIFT_PURE","title":"THE GIFT OF STEADFAST FAITH","location":"","prose":["*Castle Brightholm — After the Oath Ceremony*","After the ceremony, after everyone else has gone, you find something on the chapel step. It was not there when you arrived. There is no note. You do not need one. The warmth in it is unmistakeable — the same warmth from P1, the same quality, made solid and given form. Your god has been watching. Your god is pleased."],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE UNBROKEN VOW**\n*Wondrous Item (Requires Attunement by a Paladin), Uncommon*\nA silver disc engraved with the words EST SULARUS OTH MITHAS on one side and a five-pointed star on the other. It is warm to the touch and has been since you found it.\n**Mechanics:** While attuned: your Lay on Hands pool increases by 5 HP. Once per long rest: when you or an ally within 10 ft. drops to 0 HP, you may use your reaction to immediately stabilise them and grant them 1 HP. Additionally, you have advantage on saving throws against fear effects.\n**Lore:** Given to a paladin who was tempted and did not bend."},{"type":"item","text":"**✦ MAGIC ITEM GAINED: OATH-KEEPER**\n*Weapon (Longsword), Requires Attunement by a Paladin, Rare*\nA longsword with a blade of white steel and a crossguard shaped like two wings folded in rest. The grip is wrapped in white leather that does not soil. The blade catches light and holds it a moment longer than it should.\n**Mechanics:** +1 bonus to attack and damage rolls. When you hit a fiend or undead, the target takes an extra 1d6 radiant damage. Once per long rest: on a hit, you may choose to maximise the damage rather than rolling. The sword does not glow on command — it glows when it judges the moment worthy.\n**Lore:** Forged in spirit and given form by an act of unbroken faith. In the main campaign, it will glow in the presence of Dragon Army officers who are genuinely conflicted about their service."},{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE VIGIL CLOAK**\n*Wondrous Item (Cloak), Requires Attunement by a Paladin or Knight, Rare*\nA deep blue-grey cloak with a silver clasp shaped like the Solamnic sun. It is heavier than it looks and does not blow in wind.\n**Mechanics:** +1 to AC. Advantage on saving throws against being magically moved or knocked prone. Once per long rest: when an ally within 30 ft. is targeted by an attack, you may use your reaction to impose disadvantage on that attack roll. Cannot be charmed or frightened while in direct sunlight.\n**Lore:** Given to a paladin who stood where they were supposed to stand and did not move."}],"choices":[{"letter":"A","text":"Continue to Scene 62.","target":"62","points":{}}]},"DG_GIFT_SCARRED":{"id":"DG_GIFT_SCARRED","title":"THE GIFT OF THE SCARRED FLAME","location":"","prose":["*Castle Brightholm or Vogler Road — After Pulling Back*","You do not find it placed with ceremony. It is simply in your hand at some point after — after the hard night of prayer, after the slow return. You are not entirely sure when it arrived."],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE SCARRED FLAME**\n*Wondrous Item (Requires Attunement by a Paladin), Uncommon*\nA pendant shaped like a flame with a crack through it, sealed with silver. The gold and violet in the metalwork are both deliberately visible — not hidden, acknowledged.\n**Mechanics:** Once per long rest: when you fail a saving throw against a charm or compulsion effect, you may reroll it with advantage. Proficiency in Insight checks when determining if a creature is deceiving you or acting under magical influence. Your Lay on Hands pool is fully restored.\n**Lore:** Given to a paladin who was tempted, bent toward the fall, and pulled back. The scar is not hidden because the gods of good do not hide their histories."}],"choices":[{"letter":"A","text":"Proceed to Scene 62.","target":"62","points":{}}]},"M3":{"id":"M3","title":"TWO OATHS","location":"","prose":["*Castle Brightholm — Night of the Oath Ceremony (Fighter Only)*","After the ceremony, after Caeron's sword and the words and Aldous in the corner, you find yourself standing outside the chapel with a very specific question you did not have before you took the oath. The oath says: honour the innocent, obey your commanding officer, serve the Order. But you have now seen, in three weeks of field exercise, two cases where those clauses are in direct conflict. Aldous finds you. Of course he does. 'You have questions,' he says. Not a question."],"boxes":[{"type":"info","text":"**FIGHTER ONLY**\nThis scene occurs on the night of Scene 61, after the ceremony. Paladins skip to Scene 62."},{"type":"info","text":"**THE MEASURE: THE MEASURE ON CONFLICTING OBLIGATIONS**\nThe Oath has three pillars: Rose (justice, compassion, wisdom), Sword (courage, battle, honour), Crown (law, loyalty, duty). The Measure does not rank them. This is intentional. It places the burden of adjudication on the Knight who must live with both the choice and its consequences."}],"choices":[{"letter":"A","text":"'When the three conflict, Rose takes precedence. A law that creates injustice has already broken the Oath.'","target":"M3_rose","points":{}},{"letter":"B","text":"'When the three conflict, Sword takes precedence — the person who holds the line protects the others.'","target":"M3_sword","points":{}},{"letter":"C","text":"'When the three conflict, Crown takes precedence — the structure must hold or nothing else can.'","target":"M3_crown","points":{}},{"letter":"D","text":"'I do not know yet. I think the answer is situational.'","target":"M3_balance","points":{}}]},"M3_rose":{"id":"M3_rose","title":"THE ROSE PATH","location":"","prose":["*Chapel Yard*","Aldous looks at you steadily. 'The Rose Knights have always said that. Most of them are right. Some of them have used it to excuse breaking every rule they found inconvenient. The difference is whether you actually know what justice requires or whether you just think you do.' A pause. 'You do. So far.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: ROSE orientation.**"}],"choices":[{"letter":"A","text":"Continue to Scene M4.","target":"M4","points":{}}]},"M3_sword":{"id":"M3_sword","title":"THE SWORD PATH","location":"","prose":["*Chapel Yard*","Aldous considers this. 'The Sword Knights have always said that too. And they are right: the person who does not hold their post creates the hole that everything else falls through. The question is what you do when holding your post requires injustice.' He looks at you. 'You have an answer. I can tell.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: SWORD orientation.**"}],"choices":[{"letter":"A","text":"Continue to Scene M4.","target":"M4","points":{}}]},"M3_crown":{"id":"M3_crown","title":"THE CROWN PATH","location":"","prose":["*Chapel Yard*","'The Crown Knights,' Aldous says. 'The institution has to survive for the ideal to survive — that argument has defended both the best decisions and the worst ones in Solamnic history. The difference is who is doing the reforming and from what motive.' He is quiet. 'You have the motive right. Keep it.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: CROWN orientation.**"}],"choices":[{"letter":"A","text":"Continue to Scene M4.","target":"M4","points":{}}]},"M3_balance":{"id":"M3_balance","title":"THE BALANCE PATH","location":"","prose":["*Chapel Yard*","Aldous is quiet for a long time. Then: 'That is the answer the Measure itself gives, if you read it carefully. The lack of ranking is intentional. It is asking every Knight to do the hardest thing: think. Every time. Even when you are tired.' He nods. 'Harder path. But a real one.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: BALANCE orientation.**"}],"choices":[{"letter":"A","text":"Continue to Scene M4.","target":"M4","points":{}}]},"61":{"id":"61","title":"THE OATH OF SQUIREHOOD","location":"","prose":["*Castle Brightholm — Chapel, Afternoon*","Caeron's sword is cold on your shoulder. The chapel smells of tallow and old stone and something you will later identify as the specific smell of commitment taking a permanent form. Aldric in the front row, jaw set. Thessaly with her notebook closed. Mira at the back if she is still here. Ser Aldous in the corner.","Caeron speaks the words of the Oath of Squirehood. When you rise, quiet enough for only you: 'Whatever Order claims you — you have earned this.'","*End of Act Three.*","You march south toward Vogler. Two more combat encounters await. Romance arcs reach their Oath moments. Paladins: Paladin Scene P4 — the Choosing — is in Act Four."],"boxes":[{"type":"info","text":"**You Are Now a Squire**\nTotal your Order points. The highest score determines which Order claims your oath."},{"type":"levelup","text":"**LEVEL UP — YOU ARE NOW LEVEL 3**\nFighter Level 3: Full Archetype activates. Paladin Level 3: Sacred Oath (Devotion, Ancients, or Vengeance). Channel Divinity: 2 uses/long rest. Spell slots increase to 3 first-level.\nNative PC — Fighter: HP +7 (total 26). Paladin: HP +6 (total 22)."},{"type":"info","text":"**ITEM GIVEN — ALDOUS'S COMPASS**\nA small brass compass, old, with a chip on the case. 'It has been wrong since 862,' he says. 'Points about twelve degrees west of north. I have used it my entire career and navigated correctly every time, because I knew to account for it.'"}],"choices":[{"letter":"A","text":"(Fighter) Rest tonight. March at dawn.","target":"62","points":{}},{"letter":"B","text":"(Fighter, Measure track) Seek out Aldous tonight \u2014 he said one more conversation.","target":"M3","points":{}},{"letter":"C","text":"(Paladin, DG track) Tonight, before rest, the voice comes again.","target":"DG3","points":{}},{"letter":"D","text":"(Paladin) Rest tonight. March at dawn.","target":"62","points":{}},{"letter":"E","text":"(Paladin) The Choosing \u2014 your god speaks.","target":"P4","points":{}}]},"62":{"id":"62","title":"THE MARCH","location":"","prose":["*South Road — Day 1*","Brightholm disappears behind the first hill at the third mile. You watch the towers go until the hill takes them. Aldric rides beside you in the grey morning and says nothing, which is something — Aldric Voss does not ride in silence unless he is thinking something he has not yet decided whether to say.","After a long while: 'Whatever Order you got — I am not competing with you anymore.' He means: I will now be competing to be worthy of riding beside you, which is a different thing."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Perception (+2) | WIS | DC 12\n**SUCCESS (roll 12+):** Boot prints south of the verge — someone left the road in a hurry recently. Relevant in Scene 70.\n**FAILURE (roll 1-11):** The road looks clear."}],"choices":[{"letter":"A","text":"Laugh. 'That is the nicest thing you have said to me.'","target":"62D","points":{"ROSE":1},"romance_comp":"Aldric Voss","romance_flame":true},{"letter":"B","text":"'Understood. Same.' Comfortable silence.","target":"62D","points":{"SWORD":1}},{"letter":"C","text":"'Race you to the ridge.'","target":"62D","points":{"SWORD":1}}]},"P4":{"id":"P4","title":"THE CHOOSING","location":"","prose":["*Forest Road — Dusk, Night Before Vogler*","You are on watch. The camp is quiet behind you. The road south is dark. Tomorrow you reach Vogler. The presence is here tonight. Not behind you — not anywhere you can point at. It is simply present, the way a colour is present when you open your eyes. You have felt it before. It has been patient. It is still patient. But tonight you understand, in the way you understand things below language, that it has brought you this far and will not push you further. Whatever comes next is your decision.","Count your tallies:","Now choose:"],"boxes":[{"type":"info","text":"**PALADIN ONLY — THE MOST IMPORTANT SCENE**\nCount your God Sign tallies now. The god with the most tallies has been reaching for you throughout this journey. Fighters: skip ahead to Scene 70."},{"type":"divine","text":"**DIVINE SIGN**\nThe forest is still. The stars are out — Solinari rising, Lunitari somewhere behind the clouds, and in the space between them, if you look in the right way, a darkness that is not empty: Nuitari, the Black Moon. All three moons moving through their courses. And below them, somewhere very far down, the presence. Patient. Waiting. Still not asking."}],"choices":[{"letter":"A","text":"Speak to Paladine. 'I am yours, if you will have me. I will guard what is good. I will not look away.'","target":"P4_Paladine","points":{}},{"letter":"B","text":"Speak to Kiri-Jolith. 'I will fight. I will not waste what you give me. The line will hold while I stand.'","target":"P4_KiriJolith","points":{}},{"letter":"C","text":"Speak to Mishakal. 'I will heal. I will not choose who deserves it. I will be where the hurt is.'","target":"P4_Mishakal","points":{}},{"letter":"D","text":"Speak to Habbakuk. 'I will protect what cannot protect itself. I will not ask permission first.'","target":"P4_Habbakuk","points":{}},{"letter":"E","text":"Speak to Branchala. 'I will hold onto the possibility of beauty in the middle of this. I will not let the war take everything.'","target":"P4_Branchala","points":{}},{"letter":"F","text":"Remain silent. 'I am not ready to name you. But I will not pretend you are not here either.'","target":"P4_Unnamed","points":{}},{"letter":"G","text":"The tallies do not match how you feel. Choose the god who calls to you most regardless of the count.","target":null,"points":{}}]},"P4_Paladine":{"id":"P4_Paladine","title":"PALADINE RESPONDS","location":"","prose":["*Platinum Dragon, The Valiant Warrior, Father of Good*","Something vast and silver acknowledges you. Not with words — with the feeling of a great weight settling, not on you but around you, as if the space you occupy has been noted and found to matter. The silence after is profound.","**Mechanics:** Devotion Oath (recommended). Sacred Weapon grants your longsword +CHA to attacks. Channel Divinity: Turn the Unholy. +1 ROSE. Advantage on CHA saves for the remainder of this adventure.","**In the Main Campaign:** Paladine was worshipped as the highest of the gods of good. His chosen were judges and guardians. His divine spark in you is a candle against a coming darkness — and candles matter.","Proceed to Scene 70."],"boxes":[{"type":"info","text":"**DRAGONLANCE CAMEO — AN OLD MAN WITH A POINTY HAT**\nThere is an old man sitting on a tree root nearby. He was not there before. He has a long beard, a battered pointy hat, and the general air of someone who wandered in by mistake and is enjoying the view. He looks at you with kind, gold-flecked eyes. 'Ah,' he says. 'Good. Very good.' He sounds pleased in the way someone sounds pleased when a thing they have been hoping for finally happens. When you look back he is gone. Fizban is, depending on who you ask, a befuddled old wizard, a Hero of the Lance, or Paladine himself walking the world in mortal guise. These three things are not mutually exclusive."}],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"62","points":{}}]},"P4_KiriJolith":{"id":"P4_KiriJolith","title":"KIRI-JOLITH RESPONDS","location":"","prose":["*The Bison of Heaven, God of Just War*","Something strikes. That is the only word for it — not painful but percussive, like a hammer on an anvil very close to you. A sound and a sensation at once. Then silence. Then the smell of steel and something that might be blood but might be rain.","**Mechanics:** Vengeance Oath (recommended) or Devotion. Vow of Enmity: choose one enemy per fight to gain Advantage against for 1 minute. Abjure Enemy: one creature within 60 ft. must make WIS DC 13 save or be frightened and halved in speed for 1 minute. +2 SWORD.","**In the Main Campaign:** Kiri-Jolith has always chosen those who fight not for glory but for the person beside them. His paladins will find that fighting to give someone else a chance to live is its own kind of prayer.","Proceed to Scene 70."],"boxes":[],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"62","points":{}}]},"P4_Mishakal":{"id":"P4_Mishakal","title":"MISHAKAL RESPONDS","location":"","prose":["*The Blue Lady, Goddess of Healing and Compassion*","Warmth. Simple and enormous. Your hands feel it first — both palms, spreading up your arms and settling in your chest. It is the warmth of something that is pleased with you. Not proud. Pleased. Like coming home.","**Mechanics:** Devotion Oath. Sacred Weapon. Channel Divinity: Turn the Unholy. Bonus: Lay on Hands pool increases to 15 HP per long rest. Cure Wounds spell added to your spells known (no slot required, 1/day). +2 ROSE.","**In the Main Campaign:** Mishakal's return is the most significant spiritual event in Krynn's history since the Cataclysm. Her chosen carry actual divine healing in a world that has forgotten what that feels like. The healing you provide will be understood by NPCs as a miracle. Because it is.","Proceed to Scene 70."],"boxes":[],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"62","points":{}}]},"P4_Habbakuk":{"id":"P4_Habbakuk","title":"HABBAKUK RESPONDS","location":"","prose":["*The Fisher King, God of Nature, Sea, and Animal Life*","The forest moves. Not like wind — like attention. The trees around you shift their weight fractionally. Somewhere close, an owl lands and watches you with complete stillness. A fox crosses the road twenty feet ahead and sits down and looks at you and then moves on.","**Mechanics:** Ancients Oath (recommended). Nature's Wrath: restrain one creature with spectral vines (STR/DEX DC 13, concentration 1 min). Turn the Faithless: fey and fiends within 30 ft. must make WIS DC 13 save or be turned for 1 min. +1 ROSE, +1 SWORD. Animals in the main campaign will not flee from you.","**In the Main Campaign:** Habbakuk is the god of living things that do not have a vote in what happens to their world. His paladins will find that Krynn's natural world responds to them — animals bring warnings, weather shifts, and occasionally something very old in a forest recognises you.","Proceed to Scene 70."],"boxes":[],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"62","points":{}}]},"P4_Branchala":{"id":"P4_Branchala","title":"BRANCHALA RESPONDS","location":"","prose":["*The Song of Life, God of Beauty, Art, and Inspiration*","You hear music. Not in your ears — in the space behind your eyes. Something that is not quite a song and not quite a feeling and is exactly what you would call the reason not to give up. It lasts three seconds. It is enough.","**Mechanics:** Devotion or Ancients Oath. Channel Divinity: Sacred Weapon. Bonus: once per long rest, you may use your Channel Divinity to grant an ally advantage on their next ability check or attack roll. +2 ROSE.","**In the Main Campaign:** Branchala is the god of the unreasonable belief that beauty and hope survive. His paladins carry something the Dragon Army cannot easily destroy: the ability to make people feel, briefly, that it will be all right. This turns out to matter enormously.","Proceed to Scene 70."],"boxes":[],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"62","points":{}}]},"P4_Unnamed":{"id":"P4_Unnamed","title":"THE UNNAMED PRESENCE","location":"","prose":["*The God Who Did Not Name Themselves*","The presence acknowledges your silence the way a patient teacher acknowledges a student who says: I do not understand yet. Not disappointment. Something that is almost approval. The between-spaces are where most thinking actually happens.","**Mechanics:** Choose any Sacred Oath at Level 3. Bonus: once per long rest, you may roll twice on any Religion or History check and take the better result. +1 ROSE, +1 CROWN.","**In the Main Campaign:** The unnamed presence has been patient for three hundred years. Your god's identity will become clearer through your actions rather than through declaration. What you do in Vogler will matter more than what you said tonight.","Proceed to Scene 70."],"boxes":[],"choices":[{"letter":"A","text":"Continue to Vogler.","target":"62","points":{}}]},"M4":{"id":"M4","title":"THE VOGLER QUESTION","location":"","prose":["*Vogler Road — Day Before the City (Fighter Only)*","Ser Aldous finds you at the edge of the last camp. He has the old book again — the cracked binding one, not the official Measure. He sets it down beside you. 'One more question,' he says. 'Tomorrow you ride into Vogler. You will be a newly-oathed squire of the Knights of Solamnia carrying the Measure you have been learning for three weeks. Someone in that village will need you to know what it means. What do you know?'"],"boxes":[{"type":"info","text":"**FIGHTER ONLY — MEASURE SUBPLOT CONCLUSION**\nCount your Measure Track score: 3-4 = Scholar, 5-7 = Practitioner, 8+ = Keeper. This determines your gift."}],"choices":[{"letter":"A","text":"'I know the Measure is a tool for protecting people. Not a shield for the person holding it. If I have to choose between the law and the person, the law is there to serve the person.'","target":"M4_keeper","points":{}},{"letter":"B","text":"'I know the Measure requires me to make judgment calls I cannot undo. And that the right call is not always the comfortable one.'","target":"M4_practitioner","points":{}},{"letter":"C","text":"'I know I do not know everything yet. But I know enough to hold the line until I do.'","target":"M4_scholar","points":{}}]},"M4_keeper":{"id":"M4_keeper","title":"THE KEEPER'S GIFT","location":"","prose":["*The Last Camp*","He nods slowly. Not just at the answer — at the person saying it. 'That is what the Measure says,' he tells you. 'Not in those words. But that is what it says.' He hands you the old book. 'Not a copy. The original. My copy, the one I have carried for forty years. I do not need it anymore. I have it memorised.' He looks at you. 'You have what matters. Go use it.'"],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: ALDOUS'S MEASURE**\n*Wondrous Item (Requires Attunement by a Solamnic Knight), Uncommon*\nA small, ancient book with a cracked leather binding and forty years of margin notes in Ser Aldous's precise hand. The pages are worn thin where he returned to them most. It smells of tallow and old stone — the chapel library at Brightholm.\n**Mechanics:** While attuned: advantage on History checks related to law, justice, or the Knights of Solamnia. Once per long rest: you may consult the book to automatically know the Measure's position on any legal or ethical question (the DM will provide the answer). Additionally, Insight checks against NPCs who are acting under false pretence of law are made with advantage.\n**Lore:** Ser Aldous of Brightholm carried this book through forty years of knighthood and gave it to the squire who understood it fastest. In the main campaign, senior Solamnic Knights will recognise it and understand what it means that you are carrying it."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"62","points":{}}]},"M4_practitioner":{"id":"M4_practitioner","title":"THE PRACTITIONER'S GIFT","location":"","prose":["*The Last Camp*","He is quiet for a moment. Then: 'That is honest. That is the honest answer and it is the right answer.' He reaches into his robe and takes out something he has been carrying. 'I was not sure I would give you this,' he says. 'But you have earned it. Not because you were perfect. Because you understood what you were not perfect at and kept going anyway.'"],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE CHAPLAIN'S SEAL**\n*Wondrous Item (Requires Attunement), Uncommon*\nA brass stamp in the shape of the Solamnic sun, worn smooth with use. Aldous has used it to seal documents for thirty years. When you press it to paper, the impression is clean and permanent.\n**Mechanics:** While attuned: once per long rest you may invoke the Measure's authority — any Intimidation or Persuasion check made to enforce law or protect innocents is made with advantage. Additionally, documents bearing this seal are treated as legally binding by any Solamnic NPC of Knight rank or below.\n**Lore:** A working seal, not ceremonial. Aldous of Brightholm's seal carries forty years of genuine decisions. In the main campaign, NPCs who recognise it will understand that its bearer earned it."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"62","points":{}}]},"M4_scholar":{"id":"M4_scholar","title":"THE SCHOLAR'S GIFT","location":"","prose":["*The Last Camp*","'That,' says Aldous, 'is the truest thing a new squire can know.' He looks at you for a moment. 'You will make mistakes in Vogler. Every new knight does. What matters is that you have the foundation to understand them.' He sets the old cracked book down in front of you. 'Read the third chapter tonight. Then read it again after Vogler. See how different it looks.'"],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE COMMENTARIES (INCOMPLETE)**\n*Wondrous Item (Requires Attunement), Common — Grows in Power*\nA copy of the secondary Measure commentaries, heavily annotated by Ser Aldous but with wide margins left blank. He intended you to fill them.\n**Mechanics:** While attuned: advantage on History checks about Solamnic law. After each completed adventure in which you faced a Measure dilemma, add a note to one blank page. When all blank pages are filled (DM discretion, usually 3-5 adventures), the book becomes Aldous's Measure (Uncommon, see Keeper's gift). The item grows with you.\n**Lore:** A book given to someone at the beginning of understanding, not the end. The best version of this gift is earned later. In the main campaign, any Solamnic Knight who examines it will read Aldous's marginal note on the front page: 'For the squire who had the sense to know what they did not know yet.'"}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"62","points":{}}]},"56B":{"id":"56B","title":"WHAT THESSALY DOES NOT WRITE DOWN","location":"","prose":["*Castle Brightholm — East Gate, Late Night*","She has been writing for three hours. You know because you checked twice and told yourself both times that you were checking the perimeter. The third time you stop pretending.","Her notebook is closed when you arrive. She was waiting. Thessaly Brightwater does not accidentally leave her notebook closed when someone she wants to talk to approaches. The pen is behind her ear. The locket is in her hand — open, for once. She closes it when she sees you looking but does not put it away.","'I wrote three versions of tonight,' she says. 'The professional one. The honest one. And the one I will not send.' She looks at you with the particular directness that means she has decided something. 'You are in the third one.'"],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nShe is showing you the version of herself that does not appear in dispatches."}],"choices":[{"letter":"A","text":"'Show me.'","target":"60","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"'Keep it. Some things do not need to be read to be known.'","target":"60","points":{"ROSE":1},"romance_flame":true},{"letter":"C","text":"'I am glad I am in any version.' Leave her to write.","target":"60","points":{"ROSE":1}}]},"11_AFTERNOON":{"id":"11_AFTERNOON","title":"THE AFTERNOON","location":"Castle Brightholm — Midday and After","prose":["The sun is overhead and the garrison shifts into its afternoon rhythm. The morning's edge — training, study, the formality of formation — gives way to something looser. Squires move between tasks with less supervision. The mess hall fills. The forge fires are banked high. Somewhere in the east wing, Thessaly is interviewing someone. Somewhere else, Mira is tending whoever needs tending. The garrison is a small world and you are learning its geography.","Tomorrow you march south. The field exercise. 'Reported bandits.' Whatever that means, it means something different than it did three weeks ago. The south road has been in the briefings every morning and every morning the language has been slightly more careful, which is how you know the situation is slightly worse.","At the mess table, between mouthfuls, a garrison rider mentions something offhand: dead draconians found at waypoints along the south road — killed cleanly, by someone who knew what they were doing. No patrol has claimed credit. 'Someone is out there hunting them alone,' he says, and shakes his head like that is either very brave or very stupid and he has not decided which. Across the table, another soldier mutters about a barn south of the ridge that refugees have been avoiding — says there is someone sheltering there, civilian clothes, moves like military. 'Could be a deserter. Could be worse.' Nobody follows up. The south road has too many stories and not enough patrols to check them all."],"boxes":[{"type":"info","text":"**AFTERNOON — Choose how to spend the afternoon. You may return here after each activity.**\n"},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Go to the mess hall. Eat. Watch. Learn","target":"33","points":{"rose":1}},{"letter":"B","text":"Find Thessaly — she may have intelligence on the south road","target":"23","points":{"rose":1}},{"letter":"C","text":"Check on Mira before you march","target":"25","points":{"rose":1}},{"letter":"D","text":"Visit the forge. Your blade needs attention","target":"35","points":{"sword":1}},{"letter":"E","text":"Visit the armoury. Your gear could use an upgrade before the march","target":"11_ARMOURY","points":{}},{"letter":"F","text":"Shouts from the training yard. Something has come over the wall","target":"11_YARD","points":{"sword":1}},{"letter":"G","text":"The afternoon is spent. Move on to the evening","target":"11_EVENING","points":{}}]},"11_ARMOURY":{"id":"11_ARMOURY","title":"THE ARMOURY","location":"Castle Brightholm — Armoury, Afternoon","prose":["The armoury is in the east wing, past the forge. The heat hits you three steps before you reach the door. Inside, the walls are lined with racks — swords, shields, polearms, all maintained to Solamnic standard, which means they gleam even when nobody is looking. The armourer is a thin man named Garrett who moves with the precision of someone who has fitted a thousand suits of mail and knows exactly which rivet you will need replaced before you do.","He looks at your current equipment, frowns the professional frown of a man who sees room for improvement, and gestures at his stock.","Garrett watches you test the balance of whatever you have chosen. He nods once if he approves. He nods once if he does not approve, too — you cannot tell the difference. 'The south road is not kind to cheap steel,' he says. 'Whatever you carry, carry it sharp.'"],"boxes":[{"type":"shop","text":"**SHOP — BRIGHTHOLM ARMOURY**\nBrowse the wares. Prices in steel pieces (stl). Check your character sheet for current gold.\n\n**WEAPONS:**\n| Item | Price | Notes |\n|------|-------|-------|\n| Longsword | 15 stl | 1d8+STR, versatile (1d10) |\n| Greatsword | 20 stl | 2d6+STR, heavy, two-handed |\n| Shortsword | 10 stl | 1d6+STR, finesse, light |\n| Handaxe | 5 stl | 1d6+STR, thrown (20/60) |\n| Dagger | 2 stl | 1d4+STR, finesse, light, thrown (20/60) |\n| Javelin (3) | 3 stl | 1d6+STR, thrown (30/120) |\n\n**ARMOUR & SHIELDS:**\n| Item | Price | Notes |\n|------|-------|-------|\n| Shield | 10 stl | +2 AC |\n| Studded Leather | 12 stl | AC 12+DEX (lighter than chain) |\n| Chain Mail | 25 stl | AC 16 (upgrade/replacement) |\n\n**RARE STOCK ROLL (once per visit):**\nRoll 1d20 to see if Garrett has anything in the back.\n1–15: Standard stock only.\n16–18: Uncommon — Greater Potion of Healing available (15 stl, 4d4+4 HP). 'Left behind by a patrol.'\n19: Uncommon — Masterwork Greatsword available (+1 damage, not magical, 20 stl). 'My best work this year.'\n20: RARE — +1 Longsword available (50 stl). Old Solamnic steel, faintly warm to the touch. Garrett does not know what it is. You do.\n\n*Record purchases on your character sheet. Deduct steel spent.*"}],"choices":[{"letter":"A","text":"Done shopping. Return to the afternoon","target":"11_AFTERNOON","points":{}}]},"11_EVENING":{"id":"11_EVENING","title":"THE EVENING","location":"Castle Brightholm — Dusk","prose":["The light changes. The garrison at dusk is a different place than the garrison at noon — quieter, longer-shadowed, the kind of quiet where conversations happen that would not happen in daylight. The wall torches are lit. The mess hall empties. The courtyard belongs to the night watch now and the people who come out when the day's work is done and the real thinking begins.","Tomorrow. The word has weight now. You can feel it in the way people move — slightly more deliberately, slightly more aware of each other. Aldric cleaned his armour twice today. Thessaly's notebook has not left her hand since lunch. Even Caeron, who is never visibly affected by anything, paused at the window during the afternoon briefing and looked south for three seconds longer than a man looks at something he is not worried about."],"boxes":[{"type":"info","text":"**EVENING — Choose how to spend the evening. You may return here after each activity.**\n"},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Take a night watch shift. The wall has things to teach you","target":"34","points":{"sword":1}},{"letter":"B","text":"Find a quiet place. Write a letter home. You may not get another chance before the march","target":"11_LETTER","points":{"rose":1}},{"letter":"C","text":"Seek out a companion for a quiet conversation by the fire","target":"11_FIRE","points":{"rose":1}},{"letter":"D","text":"Turn in early. Tomorrow matters and sleep is preparation","target":"11_NIGHT","points":{}},{"letter":"E","text":"The alarm bell. Goblins on the perimeter. Grab your weapon","target":"11_PATROL","points":{"sword":1}},{"letter":"F","text":"Spend the evening getting to know your companions better","target":"BOND_CAMP","points":{}}]},"11_FIRE":{"id":"11_FIRE","title":"EVENING BY THE FIRE","location":"Castle Brightholm — Courtyard Brazier, Night","prose":["The courtyard brazier is where the garrison comes when the day is over and the barracks feel too close. Three squires are already there, talking in low voices about nothing — the food, the weather, a rumour about the south. They make room when you approach. This is how it works: the fire belongs to whoever needs it."],"boxes":[{"type":"info","text":"**Choose a companion to sit with. Each conversation is its own moment.**\n"},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Aldric is here, arms crossed, watching the fire like it owes him something","target":"11_FIRE_ALDRIC","points":{"rose":1}},{"letter":"B","text":"Thessaly is at the edge, notebook closed for once, looking at the stars","target":"11_FIRE_THESSALY","points":{"rose":1}},{"letter":"C","text":"(If Mira is in your party) Mira is tending a small herb pouch by firelight","target":"11_FIRE_MIRA","points":{"rose":1}},{"letter":"D","text":"(If Caeron is nearby) Lord Caeron is standing at the edge of the light, alone","target":"11_FIRE_CAERON","points":{"crown":1}},{"letter":"E","text":"Sit alone. The fire is enough company","target":"11_EVENING","points":{"sword":1}}]},"11_FIRE_ALDRIC":{"id":"11_FIRE_ALDRIC","title":"ALDRIC BY THE FIRE","location":"Castle Brightholm — Courtyard Brazier, Night","prose":["He does not look up when you sit down. This is not unfriendliness — it is Aldric's way of saying he noticed and does not need to perform noticing. You sit in silence for a while. The fire crackles. Somewhere on the wall, the night watch changes.","'Do you think about what happens after?' he says, eventually. Not looking at you. 'After the Trials. After the oath. After all of this becomes — real.'","He means: after we are not squires anymore. After the practice swords are replaced by the ones that kill people. After the south road stops being a briefing and starts being a place we go."],"boxes":[{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"'Yes. Every night.' He looks at you. Something shifts. The fire pops. Neither of you moves to leave, but the silence has changed","target":"11_EVENING","points":{"rose":1}},{"letter":"B","text":"'I try not to. It does not help.' He nods slowly. The fire burns lower. After a while he claps your shoulder once and stands","target":"11_EVENING","points":{"sword":1}},{"letter":"C","text":"'I think about who I want beside me when it does.' He is very still. The fire is between you. Then he exhales and you sit together until the coals dim","target":"11_EVENING","points":{"rose":2}}]},"11_FIRE_CAERON":{"id":"11_FIRE_CAERON","title":"CAERON AT THE EDGE","location":"Castle Brightholm — Courtyard, Night","prose":["He is standing where the firelight meets the dark — precisely at the boundary, as though he has calculated the exact distance at which he can observe without participating. When you approach he does not move but something in his posture adjusts. An acknowledgement.","'You should be resting, squire.' It is not an order. It is the observation of a man who knows what tomorrow requires and is concerned you do not.","'So should you, my lord.'","A pause. Then, very quietly: 'I do not rest well before exercises. I have found it more useful to stand here and count the things that could go wrong and make a plan for each of them. I am currently on number fourteen.'"],"boxes":[{"type":"info","text":"**CONDITIONAL — Lord Caeron is nearby.**"},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"'What is number fourteen?' He almost smiles. Almost. You stand there until he reaches number twenty-three, and then he says 'Goodnight, squire' in a voice that is almost warm","target":"11_EVENING","points":{"rose":1}},{"letter":"B","text":"'You care more than you show, my lord.' He goes very still. A long silence. Then: 'Go and rest.' But his voice has changed, and you carry it with you back toward the firelight","target":"11_EVENING","points":{"rose":2}},{"letter":"C","text":"Stand with him. Count your own list. Say nothing. When you finally leave, he nods once — the nod of a man who understands that some things do not need to be spoken aloud","target":"11_EVENING","points":{"crown":1,"rose":1}}]},"11_FIRE_MIRA":{"id":"11_FIRE_MIRA","title":"MIRA BY THE FIRE","location":"Castle Brightholm — Courtyard Brazier, Night","prose":["She is sorting herbs by firelight with the focused efficiency of someone whose hands know the work better than her eyes do. Yarrow. Comfrey. Something you do not recognise. She does not stop when you sit down but she moves the herb pouch slightly closer to you — an invitation to watch, or to stay, or both.","'I learned this from my mother,' she says. 'She could identify forty plants by smell alone. I can do thirty-two. I keep a list of the eight I cannot.' She looks up. 'That is what a healer is, if you think about it. A person who keeps a list of what they cannot yet do and works on it.'"],"boxes":[{"type":"info","text":"**CONDITIONAL — Mira must be in your party.**"},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"'That sounds like a knight, too.' She smiles — genuinely. You sit together a while longer before the fire burns low and the night calls you both back","target":"11_EVENING","points":{"rose":1}},{"letter":"B","text":"Ask her to teach you one. She does — carefully, patiently. By the time you can identify it by touch alone, the brazier has burned to embers","target":"11_EVENING","points":{"rose":1}},{"letter":"C","text":"Sit quietly and watch her work. The silence is enough. When she finally ties the pouch closed, the fire has gone to coals and the courtyard is still","target":"11_EVENING","points":{"rose":1}}]},"11_FIRE_THESSALY":{"id":"11_FIRE_THESSALY","title":"THESSALY BY THE FIRE","location":"Castle Brightholm — Courtyard Brazier, Night","prose":["Her notebook is closed. This is unusual enough that it constitutes an event. She is looking at the sky with an expression you have not seen on her before — not analytical, not professional. Wistful.","'Do you know what I was before this?' she says, when you sit down. 'A clerk. In a printing house in Palanthas. I wrote advertisements for soap. I was very good at it.' A pause. 'I left because I realised I was writing about clean things from a clean room while the world was getting dirty. The pen felt dishonest for the first time.'"],"boxes":[{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"'And now?' 'Now the pen feels like a weapon. I have not decided if that is better.' She looks at the stars a moment longer. Then the notebook comes out and the moment is over, but something was exchanged","target":"11_EVENING","points":{"rose":1}},{"letter":"B","text":"'You are doing important work here.' She looks at you with sharp gratitude. Then the mask comes back — professional, precise — but warmer at the edges","target":"11_EVENING","points":{"rose":1}},{"letter":"C","text":"'What would you write about tonight, if you could write anything?' She opens the notebook. For a moment you read together by firelight. Then she closes it and the evening resumes","target":"11_EVENING","points":{"rose":1}}]},"11_LETTER":{"id":"11_LETTER","title":"THE LETTER HOME","location":"Castle Brightholm — Barracks, Late Evening","prose":["You sit on the edge of your bunk with a candle and a piece of parchment that cost you two coppers from the quartermaster's stores. The pen is borrowed from Thessaly, who lent it without comment and with the faintest smile that suggested she approved of what you were using it for.","You write. You cross out. You write again. The difficulty is not finding words — it is finding the right ones. You cannot tell them what you know about the south road. You cannot tell them about the doubled guard or the refugee reports or the way Caeron looks when he thinks no one is watching. What you can tell them is that you are well, that you are ready, that you have friends beside you and a purpose ahead of you. These things are true. They are not the whole truth. But they are the part of the truth that will let your mother sleep, and that is worth the two coppers.","Aldric walks past as you are sealing it. He stops. Reads your expression. 'Family?' You nod. He nods back — the nod of someone who understands exactly what that letter costs and does not need to say so. Then he is gone and the barracks is quiet and the candle burns low."],"boxes":[{"type":"info","text":""}],"choices":[{"letter":"A","text":"Seal it. Set it on the quartermaster's outbound pile. The evening is not over yet","target":"11_EVENING","points":{"rose":1}},{"letter":"B","text":"Add a postscript. Something true. Something you have not said yet. Then seal it. The candle is lower now but the evening still has time","target":"11_EVENING","points":{"rose":2}}]},"11_MORNING":{"id":"11_MORNING","title":"THE MORNING","location":"Castle Brightholm — After the Spar","prose":["The spar with Aldric is done and the bruises are already forming. Formation is over. Lord Caeron has given the assignments. The field exercise on the south road is not today — it is tomorrow, or the day after, depending on preparations. Today is yours to use. The garrison operates on a rhythm: mornings are for training and study, afternoons for practical work and intelligence, evenings for the quieter things — the watch, the forge, the conversations that happen when the day's noise settles. How you spend this time matters. It is the last of it you will have before things change."],"boxes":[{"type":"info","text":"**MORNING — Choose how to spend the morning hours. You may return here after each activity.**\n"},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Seek out Ser Aldous in the chapel library. The Measure has questions you have not answered","target":"4","points":{"rose":1}},{"letter":"B","text":"Check the infirmary. There was mention of refugees arriving in the night","target":"9","points":{"rose":1}},{"letter":"C","text":"Train harder. You want to be sharp for tomorrow","target":"24","points":{"sword":1}},{"letter":"D","text":"Visit the garrison quartermaster. You have steel and tomorrow is the march","target":"11_QM","points":{}},{"letter":"E","text":"The morning is spent. Move on to the afternoon","target":"11_AFTERNOON","points":{}}]},"11_NIGHT":{"id":"11_NIGHT","title":"THE NIGHT BEFORE","location":"Castle Brightholm — Barracks, Night","prose":["The barracks settles. Boots off. Armour racked. The sounds of ten people finding sleep in the order they always find it — the heavy breather in the corner first, then the shuffler by the window, then one by one the others, until it is just you and the dark and the particular quality of silence that exists in a room full of people who are all pretending to be asleep while thinking about tomorrow.","Aldric's breathing evens out. He is either asleep or very good at pretending. You stare at the ceiling and count the beams and think about the south road and the field exercise and the word 'bandits' and what it means when the garrison doubles the guard and Lord Caeron looks south for three seconds too long.","Sleep comes eventually. It always does. The last thing you see before it takes you is the window — south-facing, dark, showing nothing. The morning bell will come. It always does."],"boxes":[],"choices":[{"letter":"A","text":"Sleep comes. Dawn follows. The field exercise begins","target":"26_PREP","points":{}}]},"11_PATROL":{"id":"11_PATROL","title":"THE NIGHT PATROL","location":"Castle Brightholm — South Perimeter, Night","prose":["The alarm is a single bell, struck twice. Not the full garrison alarm — the sentry alarm, the one that means *something is here but we do not know what yet*. You are on your feet before the second strike fades. Your weapon is in your hand before you think about reaching for it. Training.","The south perimeter is a stretch of low wall between the garrison's main fortification and the old granary. The torches have been doused — deliberately, which means the sentries saw something and went dark. Aldric is beside you. He arrived at the same time you did, which means he was not sleeping either.","A garrison sentry — a man named Corwin — is crouched behind the wall. There is an arrow in his shoulder. It went through the mail at the joint, which means whoever shot it knew where to aim. 'Goblins,' he says through his teeth. 'Three, maybe four. They were probing the wall. Pulled back when I called it.'","Blood is running down his arm. The arrow is still in."],"boxes":[{"type":"loot","text":"**SEARCH THE FALLEN (Optional — moral choice)**\nThe goblins are dead. Their equipment is crude but they may carry coin or useful items.\nSearching enemy dead is not forbidden by the Measure, but it is not honoured either.\nAldric looks at his boots. Corwin does not care — he is being bandaged.\n\n**A) Search them.** (-1 ROSE or -1 CROWN, whichever is lower. Roll below.)\n**B) Leave them. Report to the garrison.** (+1 ROSE or +1 CROWN. No loot.)"},{"type":"loot","text":"**LOOT ROLL (if searched):** Roll 1d20.\n1–5: Nothing useful. Goblin gear is garbage.\n6–10: 1d4 stl in a belt pouch. Copper mixed with steel. 1 day rations (smoked rat meat — edible, barely).\n11–14: 2d4 stl + a mundane item (whetstone, 10ft rope, 2 days rations).\n15–17: 3d4 stl + a useful item (Potion of Healing, caltrops, a signal horn). 1 day rations.\n18–19: 4d4 stl + a quality item (masterwork dagger, a map of the south road). 2 days rations.\n20: 5d4 stl + RARE ITEM ROLL. 3 days rations."},{"type":"loot","text":"**GOBLIN CAMP STASH:** The goblins had a camp in the treeline. Investigation DC 11.\n**SUCCESS:** Stash Loot Roll:\n1–5: Empty. They ate everything.\n6–10: Supplies (rations, crude bandages, 1d4 stl).\n11–14: 2d6 stl + mundane item.\n15–17: 3d6 stl + Potion of Healing.\n18–19: 4d6 stl + quality weapon.\n20: 5d6 stl + RARE ITEM ROLL."},{"type":"combat","text":"**COMBAT MODE**\n**Pen & Paper:** Use stat blocks below. Run the encounter at your table, then skip to Victory: The last goblin falls. The night patrol is clear. Corwin is alive — barely. The garrison owes you.\nFallen (0 HP): The garrison relief arrives. Aldric carries you back. 1 HP, one exhaustion.\n**AFTER THE FIGHT**.\n**Narrative Mode:** Follow the rounds below. Roll when prompted.\n**INJURED NPC — SENTRY CORWIN**\nArrow in shoulder, bleeding. Will collapse in 4 rounds without treatment.\n**Heal him:** Mira (if present, automatic), Paladin Cure Wounds (1 spell slot), Paladin Lay on Hands (5 HP from pool), Bandage (1 use, stabilize at 1 HP), Fighter Magic Initiate healing spell (if applicable).\n*Record any resources spent on your character sheet.*\n**If healed:** Corwin returns to the wall. +1 morale for garrison. He gives you his garrison watch token (+1 to one future Brightholm check).\n**If not healed:** Corwin is carried to the infirmary. He survives but cannot fight tomorrow. The south wall is short one sentry.\n**COMPANION SELECTION**\nAldric is with you automatically. Choose one additional companion (if available):\n**Sera** — Scout advantage. +1 to your first attack roll (she spots them first).\n**Mira** — Heals Corwin automatically. Frees your action economy.\n**Lysander** — Veteran presence. +2 to your first attack roll. 'Watch the treeline.'
