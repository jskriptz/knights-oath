,"target":"20","points":{"SWORD":2}},{"letter":"B","text":"'I am afraid I will make the wrong choice when it actually matters.'","target":"20","points":{"ROSE":2}},{"letter":"C","text":"'I am afraid I will not know the right choice until it is too late.'","target":"20","points":{"ROSE":1,"CROWN":1}}]},"11":{"id":"11","title":"THE DAY BEGINS","location":"","prose":["*Castle Brightholm — Main Courtyard*","The bell rings at the same time it always does. Formation assembles in the main courtyard with the efficiency of people whose bodies have been doing this for eight months without consulting them. You find your place. Aldric finds his, three feet to your right, where he has been every morning for eight months.","**IF VAEL IS IN YOUR PARTY:** Vael is three positions to your left in formation. She does not look at you. She is looking at Caeron, with the same focused assessment you have seen her bring to her own sword dents — the attention of someone who is studying how a thing works so she can understand why it sometimes doesn't. After formation she catches your eye. A slight nod. Not casual. The nod of someone who has been paying attention and wants you to know it.","Lord Caeron reads out the day's assignments with the unhurried precision of a man who has already decided everything and is now informing you of the results. Field exercise. South road. Reported bandits. He reads out the pairs. Your name, then Aldric's. You feel Aldric absorb it without moving."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** History (INT, proficiency if trained) (+3) | INT | DC 11\n**SUCCESS (roll 11+):** You recall a garrison briefing from three weeks ago: there have been refugee reports on the south road for over a month, not just the past few days. Someone suppressed those earlier reports. The 'bandits' may have been there much longer than the official timeline suggests.\n**FAILURE (roll 1-10):** You have no specific knowledge of the south road beyond what Caeron just said.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**OPTIONAL SCENE — DRAGONLANCE CAMEO**\nBefore your preparation choice below: if you want a brief encounter with a canon character from the Dragonlance world, turn to Scene 11B now. It is non-mandatory flavour. Return here after 11B."}],"choices":[{"letter":"A","text":"Continue to Scene 12 — the spar.","target":"12","points":{}},{"letter":"B","text":"A familiar face in the courtyard (Scene 11B — optional canon encounter)","target":"11B","points":{}},{"letter":"C","text":"Plan the exercise with Aldric together.","target":"22","points":{"ROSE":1,"CROWN":1}},{"letter":"D","text":"Find Thessaly first — she may have intelligence.","target":"23","points":{"ROSE":1}},{"letter":"E","text":"Train harder. You want to be sharp.","target":"24","points":{"SWORD":1}},{"letter":"F","text":"Check on Mira before you march.","target":"25","points":{"ROSE":1}},{"letter":"G","text":"Go to the mess hall. Eat. Watch. Learn.","target":"33","points":{"ROSE":1}},{"letter":"H","text":"Take a night watch shift. The wall has things to teach you.","target":"34","points":{"SWORD":1}},{"letter":"I","text":"Visit the forge. Your blade needs attention.","target":"35","points":{"SWORD":1}},{"letter":"J","text":"Check the infirmary for refugees.","target":"9","points":{"ROSE":1}},{"letter":"K","text":"Spend the evening getting to know your companions better.","target":"BOND_CAMP","points":{}}]},"11B":{"id":"11B","title":"A FAMILIAR FACE IN THE COURTYARD","location":"","prose":["*Castle Brightholm — Main Courtyard*","At the edge of the morning formation there is a young man you have not seen before. Not a garrison squire — his armour is older, a knight's kit that has been carefully maintained through years of use rather than stored and polished for ceremony. The Brightblade family crest. He stands in the formation anyway, because standing in formation is what you do, and he is clearly the kind of person who does what you do.","Ser Aldous speaks to him after formation. A brief exchange. The young man listens with the complete attention of someone who does not take instruction for granted. He nods once. He does not look as though things are going particularly well for him. He looks as though he intends to do the honourable thing regardless.","When formation breaks he catches your eye. A slight nod — not casual, formal. The greeting of one squire to another. His name is Sturm. He is passing through on his way south and needed a place to sleep. 'The Knighthood still stands,' he says, when you ask why he wears the armour when he could wear anything. 'Someone should act as though it does.'","The spar with Aldric is part of the morning routine. After the spar — and after formation, where Lord Caeron reads out the day's assignments — the real decisions begin. The field exercise on the south road is tomorrow. Today is preparation. How you spend it matters."],"boxes":[{"type":"info","text":"**DRAGONLANCE CAMEO — OPTIONAL SCENE**\nThis scene is non-mandatory flavour. It introduces a canon character from the Dragonlance world who may reappear in the main campaign."},{"type":"info","text":"**Who Is Sturm Brightblade?**\nSturm Brightblade is one of the Companions of the Lance — the heroes of the War of the Lance. At this point in the timeline he is a squire himself, working to prove himself worthy of the Knighthood his father abandoned. He takes the Oath of Measures more seriously than most knights. He will fight for anyone who cannot fight for themselves. He will die for it one day. Right now he is just a young man who sleeps in garrison stables when he has to and acts like a knight when he does not have to."}],"choices":[{"letter":"S1","text":"Tell him you admire the conviction. He looks surprised — not many say that.","target":"11_MORNING","points":{"ROSE":1}},{"letter":"S2","text":"Ask him about his father. He is quiet a moment. 'He left the Order. I chose not to.'","target":"11_MORNING","points":{"ROSE":1}},{"letter":"S3","text":"Nod back. Let the moment be what it is.","target":"11_MORNING","points":{"CROWN":1}},{"letter":"A","text":"Plan the exercise with Aldric together.","target":"11_MORNING","points":{"ROSE":1,"CROWN":1}},{"letter":"B","text":"Find Thessaly first — she may have intelligence.","target":"11_MORNING","points":{"ROSE":1}},{"letter":"C","text":"Train harder. You want to be sharp.","target":"11_MORNING","points":{"SWORD":1}},{"letter":"D","text":"Check on Mira before you march.","target":"25","points":{"ROSE":1}},{"letter":"E","text":"Check the infirmary. There was mention of refugees arriving in the night.","target":"9","points":{"ROSE":1}},{"letter":"F","text":"Go to the mess hall. Eat. Watch. Learn.","target":"33","points":{"ROSE":1}},{"letter":"G","text":"Take a night watch shift. The wall has things to teach you.","target":"34","points":{"SWORD":1}},{"letter":"H","text":"Visit the forge. Your blade needs attention.","target":"35","points":{"SWORD":1}}]},"12":{"id":"12","title":"THE SPAR","location":"","prose":["*Castle Brightholm — Training Yard*","Twenty minutes in and you are evenly matched. This is not how this usually goes — Aldric Voss has been beating you in sparring for seven months by the specific margin of someone who is better and knows it and does not need to prove it further. Tonight the margin has disappeared. He pauses, breathing hard, and looks at you with an expression that takes a moment to identify because you have not seen it before: surprised. Not unhappy. Surprised.","'You have been watching me,' he says. Not an accusation. An assessment. He looks pleased in the way that people who take competition seriously look pleased when the competition is finally worth their attention. 'The tell. You found it.' You did. Three months ago. You said nothing. 'Good,' he says — and means it — and raises the practice sword again.","The spar is over. The morning bell rings. Formation assembles. Whatever happened between you and Aldric in the yard — the gap, the finding, the almost-laugh — is something you will both carry into the day without mentioning. That is also something."],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Athletics (+3) | STR | DC 14\n**SUCCESS (roll 14+):** You find the gap on his third combination. He goes down on one knee, laughing. +2 SWORD. His respect is genuine now.\n**FAILURE (roll 1-13):** He wins by a narrow margin. +1 SWORD. 'Better than last month.'\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Let him win. Concede with grace.","target":"11_MORNING","points":{"CROWN":1},"romance_comp":"Aldric Voss","romance_spark":true},{"letter":"B","text":"Take your opening. Win clean.","target":"11_MORNING","points":{"SWORD":2}},{"letter":"C","text":"Call it a draw.","target":"11_MORNING","points":{"ROSE":1,"CROWN":1}}]},"13":{"id":"13","title":"THE REPAIRED SWORD","location":"","prose":["*Castle Brightholm — Armoury*","The armoury smells of iron filings and neatsfoot oil and the particular efficiency of a woman who has been doing this work for longer than you have been alive and views every preventable problem as a small personal insult. She takes your sword without comment, examines the pommel dent with the expression of someone who has seen worse but finds worse no consolation, and sets it in the repair queue. While you wait, Lord Caeron arrives for his monthly equipment review. He acknowledges you with the absence of acknowledgment that means he has registered you and is thinking about it.","He works his way through the rack with the same clipboard efficiency. When he reaches your sword — the dent now smoothed, the pommel flush and clean — he holds it at eye level for exactly the same amount of time as every other sword. He makes his mark. He sets it down. He moves to the next one. He does not comment. You understand, from everything you know about Lord Caeron Ashvale, that not commenting is the comment."],"boxes":[],"choices":[{"letter":"A","text":"'Thank you, my lord.' Accept it quietly.","target":"11_MORNING","points":{"CROWN":1}},{"letter":"B","text":"'What do you look for in a squire, my lord?'","target":"28","points":{"ROSE":1}},{"letter":"C","text":"'I notice you inspect your own equipment personally.'","target":"29","points":{"ROSE":1},"romance_comp":"Lord Caeron Ashvale","romance_spark":true}]},"14":{"id":"14","title":"I CAN DO BETTER","location":"","prose":["*Castle Brightholm — Assessment Hall*","He does not look up. He makes a small mark on his clipboard. Then: 'Then do.' You turn to go. You are almost at the door when he adds — same tone, almost to himself but not quite: 'The dent is a small thing. It is the attention to small things that determines a knight's character.' He is already looking at the next item on his list. The assessment is over. The other thing hangs in the empty hall.","You are in the corridor when you fully understand what he said. Not the 'then do' — that was expected, brisk, over. The other thing. The one he said almost to himself. The dent is a small thing. It is the attention to small things. He is not talking about the sword. You replay it three times in the next twenty steps and by the third time you have decided it is the most useful thing anyone has said to you this week, possibly this month."],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nHe watches you leave. The pause before he returns to his papers is slightly longer than necessary."},{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 14\n**SUCCESS (roll 14+):** He said it to your back because he cannot say it to your face — not yet. That addendum cost him something. He does not give unsolicited assessments. You are the first squire this year he has followed with an additional remark. ROMANCE SPARK Caeron activates at Advantage if you act on this knowledge.\n**FAILURE (roll 1-13):** He speaks to the room. You are not sure if the remark was for you or habit.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Go directly to the armoury and fix the dent today.","target":"13","points":{"CROWN":2}},{"letter":"B","text":"Find Aldric — spar and work off the feeling.","target":"3","points":{"SWORD":1}}]},"15":{"id":"15","title":"THE POINTED QUESTION","location":"","prose":["*Castle Brightholm — Assessment Hall*","'Satisfactory is not the highest mark given today,' he says. 'Ser Voss received the same. You and he are currently equal. That answer will be the last one that surprises me from you. I would advise you not to lose the instinct that generated it.'","He leaves before you can respond. The hall is briefly, completely quiet. The other squire who was waiting for their result has apparently vanished. You stand in the empty corridor with the feeling of someone who has just been told something important in a language they are still learning."],"boxes":[],"choices":[{"letter":"A","text":"File it away and move on.","target":"11_MORNING","points":{"CROWN":1}},{"letter":"B","text":"Find Aldric and tell him. He will find it funny or annoying. Probably both.","target":"11_MORNING","points":{"ROSE":1}},{"letter":"C","text":"Ask around about Lord Caeron. Who is he really?","target":"30","points":{"ROSE":1}}]},"16":{"id":"16","title":"WHAT THESSALY WRITES DOWN","location":"","prose":["*Castle Brightholm — East Gate*","'That is the first honest answer I have gotten all week.' She asks if she can follow your progress through the Trials. In exchange, she will share what she hears.","There is something in how she frames it — not 'may I follow your progress' but a genuine exchange, an offer of her own access for yours. She has better intelligence than the garrison. You can see that from the map she carries and the ink still drying on the page she just turned. She has been here three days and she already knows things Lord Caeron does not. Whatever she is writing down, it is worth having her write it."],"boxes":[],"choices":[{"letter":"A","text":"Yes. An ally who hears everything is valuable.","target":"11_MORNING","points":{"ROSE":1}},{"letter":"B","text":"Yes, but you want to read what she writes first.","target":"11_MORNING","points":{"CROWN":1}},{"letter":"C","text":"You would rather she observed and formed her own conclusions.","target":"19","points":{"ROSE":2}}]},"17":{"id":"17","title":"THE FAMILY NAME","location":"","prose":["*Castle Brightholm — East Gate*","'Six generations. Does that feel like a gift or a weight?'","It is the kind of question that sounds simple and isn't. Thessaly asks it the way she asks everything — without judgment already loaded into it, genuinely waiting to see what you say. Her pen is not moving. Whatever you answer, she is listening, not transcribing.","She found you near the east wall, which is not a coincidence. Thessaly Brightwater does not accidentally find people. The evening is cold and the torches have been lit and the garrison has the quieter particular quality of a place preparing for something. She has her notebook closed, which means this is not on the record, and her pen behind her ear, which means she might change her mind."],"boxes":[],"choices":[{"letter":"A","text":"'Both. Always both.'","target":"16","points":{"ROSE":2}},{"letter":"B","text":"'A gift. I carry it proudly.'","target":"11_MORNING","points":{"CROWN":2}},{"letter":"C","text":"'Mostly a weight lately.'","target":"16","points":{"ROSE":1},"romance_comp":"Thessaly Brightwater","romance_spark":true}]},"19":{"id":"19","title":"THE FIRM WORD","location":"","prose":["*Castle Brightholm — Squire Quarters*","You stand in the restored quiet of your tent. The quill is back on the footlocker. Everything is exactly where it should be. You are not sure why this is unsatisfying.","The interaction with Zinnia — who borrowed your quill to write something she called 'extremely urgent correspondence' and returned it covered in blue ink — was brief, entirely reasonable on your part, and is now sitting oddly. You were polite. You were clear. She left without apparent offense. None of this explains the specific quality of the silence she left behind."],"boxes":[],"choices":[{"letter":"A","text":"Go after her and apologise — you were too stiff.","target":"7","points":{"ROSE":1}},{"letter":"B","text":"Let it go. She understood.","target":"11_MORNING","points":{}}]},"20":{"id":"20","title":"WHAT ALDOUS KNOWS","location":"","prose":["*Castle Brightholm — Chapel Steps*","'A village. Twenty years ago. I had orders that were legal. That followed the Measure to the letter. And they were wrong. I followed them anyway because I told myself it was not my place to decide. The village is not there anymore.' He says it the way someone says a thing they have said before — out loud, to themselves, in the dark — enough times that the words are worn smooth. Not healed. Smooth.","He is quiet for a moment. The chapel library is cold and the candle between you is down to its last inch and neither of you moves to replace it. 'I tell you this,' he says finally, 'not because it is a cautionary tale. It is not a cautionary tale. It is a true story about what happens when you let the law do your thinking. The Measure exists to protect people. If you ever hold the Measure in one hand and a person in the other and you are not certain which one matters more — that uncertainty is the answer.' He closes the commentary text. The lesson is over. The weight of it is not."],"boxes":[{"type":"info","text":"**You Gain:**\nAldous's Trust. Unlocks a critical path in Scene 31."},{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 13\n**SUCCESS (roll 13+):** He has told this story before — not often, but deliberately. He chose to tell it to you now and not six months ago. Something about how you asked made him think you were ready for it. He is giving you the most important thing he can: evidence that the Measure can become a shield if you let it. This is instruction, not confession.\n**FAILURE (roll 1-12):** It is a heavy story told plainly. You receive it as such.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Thank him. Mean it.","target":"11_MORNING","points":{"ROSE":1}},{"letter":"B","text":"Sit with him in silence a while longer.","target":"11_MORNING","points":{"ROSE":2}}]},"21":{"id":"21","title":"THE HEALER'S GIFT","location":"","prose":["*Castle Brightholm — Infirmary*","She prepared it before you asked — before the assignment was formally posted, even. Dried yarrow. Clean bandages rolled tight. A small clay jar of salve smelling of pine and something you cannot name. 'The yarrow slows bleeding. Press hard and do not move them until it stops. The salve is for infection — draconian wounds tend to close wrong without it.' She says this the way she says everything medical: factual, complete, without drama. Her hand is warm when yours brush taking the bundle. She does not pull away immediately."],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nHer hand is warm when yours brush. 'Be careful,' she says — two words carrying more weight than their purpose."},{"type":"info","text":"**ADD TO INVENTORY — MIRA'S TRAVEL BUNDLE**\nMira prepared this before you asked. Native PC and CPC: add to your inventory or equipment list. • Dried yarrow (press hard: slows bleeding, DC 10 Medicine to apply) • Clean bandages (2 uses, each stabilises at 1 HP) • Pine salve (prevents infection in draconian wounds — use within 1 hour of injury)"}],"choices":[{"letter":"A","text":"'I will. Thank you.' Hold her gaze.","target":"11_AFTERNOON","points":{"ROSE":1},"romance_comp":"Mira of the Oaks","romance_spark":true},{"letter":"B","text":"Ask her to come as a field medic.","target":"11_AFTERNOON","points":{"ROSE":2}},{"letter":"C","text":"Accept efficiently and leave.","target":"11_AFTERNOON","points":{"CROWN":1}}]},"22":{"id":"22","title":"ALDRIC'S PLAN","location":"","prose":["*Castle Brightholm — Map Room*","He already has a plan. Aldric Voss does not arrive at planning sessions — he arrives to them. The approach routes are sketched in charcoal on the back of his exercise schedule with timing estimates and threat assessments in his small precise handwriting. 'Three approaches. Direct is fastest but visible from the ridge. East through the treeline is slower but quiet. West crosses the river and needs a ford.' He looks at you after each one. Not for permission. For what you think. This is what trust looks like when Aldric Voss demonstrates it."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** History (+3) | INT | DC 11\n**SUCCESS (roll 11+):** The eastern treeline has a hidden ford — the route is faster than Aldric thinks.\n**FAILURE (roll 1-10):** You have no useful knowledge of this terrain.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"'East. Agreed.'","target":"40","points":{"CROWN":1}},{"letter":"B","text":"'Direct. We are knights, not scouts.'","target":"41","points":{"SWORD":1}},{"letter":"C","text":"'What is on the west bank? I want more information.'","target":"42","points":{"ROSE":2}},{"letter":"D","text":"'East — but split up. Meet at the ridge.'","target":"43","points":{"SWORD":1,"ROSE":1}},{"letter":"E","text":"'Wait. Let me check with Sera first — she has been watching the south road.'","target":"40","points":{"ROSE":1,"CROWN":1}}]},"23":{"id":"23","title":"THESSALY'S INTELLIGENCE","location":"","prose":["*Castle Brightholm — East Gate*","Thessaly has a better map than the garrison does. Not better as in more detailed — better as in updated, with marks the garrison does not have, from sources the garrison has not consulted. She spreads it on the table in the field tent and shows you a red mark. 'Refugees,' she says. 'About thirty. Here, not here' — she taps the bandit location — 'here.' The second location is further south. 'The bandit report and the refugee report are from the same place. Draw your own conclusions.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Investigation (INT, proficiency if trained) (+3) | INT | DC 13\n**SUCCESS (roll 13+):** Thessaly's map has three additional marks she did not explain. Cross-referencing with garrison road records: the Dragon Army has made at least two probing passes on this road in the last month. The refugees are not just fleeing the war — they are fleeing something that has been methodically clearing the area ahead of the main advance.\n**FAILURE (roll 1-12):** The map shows what Thessaly told you. Nothing more is visible.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Take the map directly to Lord Caeron before the exercise.","target":"11_AFTERNOON","points":{"CROWN":2}},{"letter":"B","text":"Share it with Aldric and plan together.","target":"11_AFTERNOON","points":{"ROSE":1,"SWORD":1}},{"letter":"C","text":"Ask Thessaly to come with you as an observer.","target":"11_AFTERNOON","points":{"ROSE":1}}]},"24":{"id":"24","title":"SHARPENING THE BLADE","location":"","prose":["*Castle Brightholm — Training Yard*","You train until the light fails. Running forms. Working the gap in your guard that you spotted in Scene 3 and have been quietly furious about ever since. The yard empties around you. The evening bell rings. You keep going.","There is a particular quality to training when no one is watching — no evaluation marks, no Caeron with his clipboard, no Aldric to compete with. Just you and the forms and the steady accumulation of marginally better. It is not exciting. It is the point. Aldric finds you packing up. 'You have improved,' he says. From Aldric Voss, this is equivalent to a sonnet."],"boxes":[],"choices":[{"letter":"A","text":"'Yes.' You mean it.","target":"11_MORNING","points":{"SWORD":1}},{"letter":"B","text":"'Ask me at the end of tomorrow.'","target":"11_MORNING","points":{"ROSE":1}},{"letter":"C","text":"'I will not be ready until I am there.'","target":"11_MORNING","points":{"ROSE":1}}]},"25":{"id":"25","title":"BEFORE THE MARCH","location":"","prose":["*Castle Brightholm — Infirmary, Dawn*","She is awake before you come. The infirmary at pre-dawn has the quality of somewhere that has been working all night without anyone noticing. She hands you the folded paper before you speak — the yarrow directions in her careful hand. 'I prepared it this morning. Just in case.' She looks away when she says it. Not evasively — the way people look away when they are giving you something they cannot take back and they need a moment to finish releasing it. 'Be careful today.'"],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nYou stand in the infirmary doorway with morning light behind you and Mira will not quite look at you and you will not quite leave."}],"choices":[{"letter":"A","text":"'I will come back and tell you how it went.'","target":"11_AFTERNOON","points":{"ROSE":2},"romance_comp":"Mira of the Oaks","romance_flame":true},{"letter":"B","text":"Nod. Say nothing. It means the same thing.","target":"11_AFTERNOON","points":{"ROSE":1}},{"letter":"C","text":"March south — the road ambush awaits (Scene 26)","target":"26","points":{}}]},"33":{"id":"33","title":"THE MESS HALL","location":"","prose":["*Castle Brightholm — Midday*","The mess hall operates on a schedule that has not changed in forty years, which is either a testament to institutional consistency or evidence that no one with authority has eaten here recently. Long trestle tables, benches worn smooth, the smell of bread and something involving turnips that has been a source of garrison debate since before you arrived. The bread is good. The bread has always been good. The rest is a matter of opinion held by people who have stopped expecting otherwise.","Aldric eats like he does everything else — efficiently, without wasted motion, finishing before you are half done. Across the hall, Thessaly is interviewing one of the kitchen staff. Whatever she is learning about turnip procurement is, knowing Thessaly, somehow connected to garrison supply routes and by extension the Dragon Army's logistical capacity. Two tables down, Ser Aldous eats alone with a book open beside his plate and the comfortable air of a man who considers a meal without reading a meal wasted."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Perception (WIS, proficiency if trained) (+1) | WIS | DC 10\n**SUCCESS (roll 10+):** At the corner table, partly hidden by the pillar: Lord Caeron is eating alone. He is not reading. He is watching the room — specifically, the squires. Specifically, for slightly longer than the others, you. When your eyes meet he looks down at his plate with the speed of someone who was not expecting to be caught. +1 to any Caeron Insight check this Act.\n**FAILURE (roll 1-9):** The mess hall is busy and loud and you notice nothing beyond the turnips.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**NPC CROSS-TALK — ALDRIC AND THESSALY**\nAldric and Thessaly are arguing — not loudly, but with the focused energy of two people who are both certain they are correct. The subject, as far as you can tell: whether the garrison's intelligence on the south road is adequate. Thessaly thinks it is catastrophically insufficient. Aldric thinks the chain of command will provide. They are both, in different ways, right. Thessaly catches your eye mid-argument and raises one eyebrow — an invitation to weigh in, or permission to enjoy the show."}],"choices":[{"letter":"A","text":"Join the argument. Side with Thessaly — the intelligence is inadequate.","target":"11_AFTERNOON","points":{"ROSE":1}},{"letter":"B","text":"Join the argument. Side with Aldric — the chain of command exists for a reason.","target":"11_AFTERNOON","points":{"CROWN":1}},{"letter":"C","text":"Listen. Do not weigh in. Take the bread.","target":"11_AFTERNOON","points":{"ROSE":1}},{"letter":"D","text":"Sit with Aldous instead. You want to ask about something.","target":"4","points":{"ROSE":1}}]},"34":{"id":"34","title":"THE WATCH","location":"","prose":["*Castle Brightholm — East Wall, Night*","The night watch is four hours of looking at darkness and learning what darkness sounds like when nothing is in it. The east wall faces the road and the road faces south and south is where, at some indeterminate distance, something is happening that has not reached you yet. The stars are Solinari, half-full, and whatever scattered light the lesser moons provide. The wall is cold stone and you lean against it and breathe and the air smells of pine and frost and the particular mineral quality of a late autumn night in northern Solamnia.","You are alone for the first hour. Then you are not.","**IF SERA IS IN YOUR PARTY:** Sera appears without announcement, as she does. She sits on the wall rather than leaning against it, legs dangling over the dark, and for ten minutes she says nothing. Then: 'Listen.' You listen. Wind. Pine. The creak of the gate timber. Nothing. 'Exactly,' she says. 'That is what worries me. No night birds. They stopped two days ago.' She looks at you with the flat professional gaze that means she is trusting you with something she has not told the senior officers yet. 'Something is on the south road. Something that frightened the wildlife before the patrols noticed.'","**IF SERA IS NOT IN YOUR PARTY:** You are alone for the four hours. This is not a hardship. There is a particular quality to standing watch that you have come to value — the suspension of the day's noise, the reduction to essentials: eyes, ears, the dark, the question of what is in it. You learn more about Castle Brightholm from its silence than from its bustle. The stone cools at a rate that tells you the season. The wind shifts at the second hour, carrying something from the south that is not quite smoke and not quite nothing."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Perception (WIS, proficiency if trained) (+1) | WIS | DC 13\n**SUCCESS (roll 13+):** Just before the third hour: a light on the south road. Brief — a lantern uncovered and covered again, the signal pattern used by Solamnic scouts to report all-clear. But the garrison did not send a scout tonight. Someone is using Solamnic signals on the south road and the garrison did not authorise it. This is relevant in Scene 53B.\n**FAILURE (roll 1-12):** The night is dark and clear and empty. Four hours. Nothing to report.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**Paladin Note:**\nIf you are a Paladin: at the quietest part of the watch — the hour between two and three when even the wind stops — something happens. Not a vision. Not a voice. A feeling, behind your sternum, of being accompanied. Of someone standing watch with you who is not visible and not intrusive and simply: present. It lasts ten minutes. When it ends the cold feels less cold and you are certain, without evidence, that whatever is on the south road will not arrive tonight. Mark 1 tally under whichever god feels right. This is a small sign. Small signs count."}],"choices":[{"letter":"A","text":"Report the light to Caeron at dawn.","target":"11_EVENING","points":{"CROWN":1,"ROSE":1}},{"letter":"B","text":"Tell no one. Watch more carefully tomorrow.","target":"11_EVENING","points":{"SWORD":1}},{"letter":"C","text":"Share it with Sera . Two sets of eyes are better.","target":"11_EVENING","points":{"ROSE":1}}]},"35":{"id":"35","title":"THE FORGE","location":"","prose":["*Castle Brightholm — Armoury Forge, Afternoon*","The forge is the loudest place in Brightholm and the warmest. Bronwyn — the armourer, who has been here longer than Ser Aldous and sees no reason to say so — works the bellows with the steady rhythm of someone whose body stopped distinguishing between work and breathing years ago. The heat is a wall. The sound is a heartbeat. The smell is hot iron, coal, neatsfoot oil, and the specific human smell of someone who has been sweating productively since before dawn.","She does not acknowledge you for three minutes. This is not rudeness — Bronwyn has standards, and one of them is that she finishes what she is doing before she decides whether the interruption is worth her attention. When she does look up, she looks at your sword first and you second. This tells you everything about Bronwyn's hierarchy of values.","'Let me see it.' Not a request. She takes the sword, holds it to the light, turns it twice. Examines the edge where you have been sharpening it yourself. Makes a sound that is not approval but is the absence of disapproval, which from Bronwyn is considerable.","'You sharpen it too far forward,' she says. 'Two inches behind the point is where the work happens in a real fight. Not the tip. The belly.' She shows you. Her hands on the blade are as precise as a surgeon's. In three strokes she changes something you cannot quite identify and when she hands it back the balance is different. Better. You wonder how long the sword has been wrong and how long she has been waiting for you to bring it in."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Investigation (INT, proficiency if trained) (+0) | INT | DC 11\n**SUCCESS (roll 11+):** While she works, you notice something on the forge wall — a Solamnic Knight's insignia, old, scorched. Not displayed. Set aside. 'My husband's,' she says, without being asked. 'Knight of the Rose. Died at Vingaard. The insignia survived the fire.' She does not say anything else about it. She does not need to. The forge is hot and the hammer falls and someone who loved a Knight of the Rose is still here, maintaining the swords, and has been for a very long time.\n**FAILURE (roll 1-10):** She finishes her work. You learn about sword maintenance. The forge is loud and hot and that is all.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**ADD TO KNOWLEDGE — SWORD MAINTENANCE**\nBronwyn's correction is permanent. Your longsword now has a +1 bonus to damage rolls against enemies in medium armour or heavier (you know where to aim). This bonus stacks with existing weapon modifiers. Mark this on your character sheet."}],"choices":[{"letter":"A","text":"Ask her about the insignia.","target":"35A","points":{"ROSE":1}},{"letter":"B","text":"Ask her to teach you more about blade work.","target":"35B","points":{"SWORD":1}},{"letter":"C","text":"Thank her and leave. She has work to do.","target":"35C","points":{"CROWN":1}}]},"35A":{"id": "35A", "title": "THE INSIGNIA", "location": "", "prose": ["*Castle Brightholm — Armoury Forge, Afternoon*", "You ask about the insignia on the wall. Bronwyn does not stop working. The hammer falls twice before she speaks.", "'Knight of the Rose. Ser Davan Ironhand.' The name comes out like something she has said ten thousand times and will say ten thousand more. 'He believed the Oath was not a set of words. He believed it was a thing you did with your hands, every day, until the day you could not.'", "She turns the metal in the tongs. The glow lights her face from below.", "'He died holding a bridge at Vingaard. Not because he was ordered to. Because there were people behind him who could not hold it themselves. That is what the Rose means. Not wisdom in the abstract. Wisdom applied — knowing what matters and standing in front of it.'", "She sets the hammer down. Looks at you directly for the first time.", "'You sharpen your sword. That is good. But a sword is a tool. The question is what you point it at and why. Get that right and the edge will take care of itself.'", "She picks up the hammer again. The conversation is over. But something has shifted in how she looks at you — not warmth, exactly, but recognition. You are someone who asked the right question."], "boxes": [{"type": "info", "text": "**Bronwyn's Trust:** Bronwyn will remember this. Future visits to the forge may offer additional options."}], "choices": [{"letter": "A", "text": "Return to the afternoon.", "target": "11_AFTERNOON", "points": {}}]},"35B":{"id": "35B", "title": "BLADE WORK", "location": "", "prose": ["*Castle Brightholm — Armoury Forge, Afternoon*", "Bronwyn looks at you for a long moment. Then she nods — once, the way she does everything, with no wasted motion.", "'Stand there. Sword out. No — not like that. Like you mean to use it, not wave it about.'", "For the next hour she takes apart everything you think you know about fighting. Not your technique — your understanding. She shows you where armour is weakest, where joints flex, where a blade finds the gap between plate and chain. She makes you strike a hanging sack of sand until your arms burn, then corrects your grip and makes you do it again.", "'You are strong enough,' she says, which is not a compliment but an observation. 'Strength is common. Precision is not. Any fool can hit hard. Hitting the right place at the right time with the right angle — that is craft. That is what keeps you alive when the fool beside you goes down.'", "By the end your sword arm aches and your edge awareness has changed permanently. You see the lines of a fight differently now — not just where to swing but where a swing will do the most work.", "She takes your sword again, runs a whetstone along the edge with three precise strokes, and hands it back. 'Come back when you have dulled it. Not before.' High praise, from Bronwyn."], "boxes": [{"type": "info", "text": "**ADD TO KNOWLEDGE — BRONWYN'S BLADE TRAINING**\nBronwyn's instruction is permanent. You gain +1 to damage rolls with your primary melee weapon against armoured targets. This stacks with existing bonuses."}], "choices": [{"letter": "A", "text": "Return to the afternoon.", "target": "11_AFTERNOON", "points": {}}]},"35C":{"id": "35C", "title": "RESPECT", "location": "", "prose": ["*Castle Brightholm — Armoury Forge, Afternoon*", "You thank her and turn to leave. Bronwyn makes a sound — not quite acknowledgement, not quite dismissal. Something between the two that means she noticed you did not waste her time and she respects that.", "At the door you glance back. She is already working again, the hammer falling in its steady rhythm, the forge breathing its orange heat into the afternoon air. The insignia on the wall catches the light — a Knight of the Rose who died at Vingaard, maintained by the woman who loved him, in a forge that keeps the living armed.", "Some people show their loyalty with words. Bronwyn shows hers with steel and fire and thirty years of not leaving."], "boxes": [], "choices": [{"letter": "A", "text": "Return to the afternoon.", "target": "11_AFTERNOON", "points": {}}]},"35A":{"id":"35A","title":"THE INSIGNIA","location":"","prose":["*Castle Brightholm — Armoury Forge, Afternoon*","You ask about the insignia on the wall. Bronwyn does not stop working. The hammer falls twice before she speaks.","‘Knight of the Rose. Ser Davan Ironhand.’ The name comes out like something she has said ten thousand times and will say ten thousand more. ‘He believed the Oath was not a set of words. He believed it was a thing you did with your hands, every day, until the day you could not.’","She turns the metal in the tongs. The glow lights her face from below.","‘He died holding a bridge at Vingaard. Not because he was ordered to. Because there were people behind him who could not hold it themselves. That is what the Rose means. Not wisdom in the abstract. Wisdom applied — knowing what matters and standing in front of it.’","She sets the hammer down. Looks at you directly for the first time.","‘You sharpen your sword. That is good. But a sword is a tool. The question is what you point it at and why. Get that right and the edge will take care of itself.’","She picks up the hammer again. The conversation is over. But something has shifted in how she looks at you — not warmth, exactly, but recognition. You are someone who asked the right question."],"boxes":[{"type":"info","text":"**Bronwyn’s Trust:** Bronwyn will remember this. Future visits to the forge may offer additional options."}],"choices":[{"letter":"A","text":"Return to the afternoon.","target":"11_AFTERNOON","points":{}}]},"35B":{"id":"35B","title":"BLADE WORK","location":"","prose":["*Castle Brightholm — Armoury Forge, Afternoon*","Bronwyn looks at you for a long moment. Then she nods — once, the way she does everything, with no wasted motion.","‘Stand there. Sword out. No — not like that. Like you mean to use it, not wave it about.’","For the next hour she takes apart everything you think you know about fighting. Not your technique — your understanding. She shows you where armour is weakest, where joints flex, where a blade finds the gap between plate and chain. She makes you strike a hanging sack of sand until your arms burn, then corrects your grip and makes you do it again.","‘You are strong enough,’ she says, which is not a compliment but an observation. ‘Strength is common. Precision is not. Any fool can hit hard. Hitting the right place at the right time with the right angle — that is craft. That is what keeps you alive when the fool beside you goes down.’","By the end your sword arm aches and your edge awareness has changed permanently. You see the lines of a fight differently now — not just where to swing but where a swing will do the most work.","She takes your sword again, runs a whetstone along the edge with three precise strokes, and hands it back. ‘Come back when you have dulled it. Not before.’ High praise, from Bronwyn."],"boxes":[{"type":"info","text":"**ADD TO KNOWLEDGE — BRONWYN’S BLADE TRAINING**\\nBronwyn’s instruction is permanent. You gain +1 to damage rolls with your primary melee weapon against armoured targets. This stacks with existing bonuses."}],"choices":[{"letter":"A","text":"Return to the afternoon.","target":"11_AFTERNOON","points":{}}]},"35C":{"id":"35C","title":"RESPECT","location":"","prose":["*Castle Brightholm — Armoury Forge, Afternoon*","You thank her and turn to leave. Bronwyn makes a sound — not quite acknowledgement, not quite dismissal. Something between the two that means she noticed you did not waste her time and she respects that.","At the door you glance back. She is already working again, the hammer falling in its steady rhythm, the forge breathing its orange heat into the afternoon air. The insignia on the wall catches the light — a Knight of the Rose who died at Vingaard, maintained by the woman who loved him, in a forge that keeps the living armed.","Some people show their loyalty with words. Bronwyn shows hers with steel and fire and thirty years of not leaving."],"boxes":[],"choices":[{"letter":"A","text":"Return to the afternoon.","target":"11_AFTERNOON","points":{}}]},"M1":{"id":"M1","title":"THE LETTER AND THE SPIRIT","location":"","prose":["*Castle Brightholm — During Act One (Fighter Only)*","Ser Aldous stops you in the corridor two days after your conversation in the library. He has a book under his arm — not the Measure, something older, the binding cracked. 'Walk with me,' he says. He takes you to the garrison's east wall and shows you the southern road. A traveller is being turned away at the gate. The traveller has valid papers. The gate guard has a standing order: no travellers past the third bell. It is not yet the third bell by four minutes. The gate guard is being technically correct and functionally unkind."],"boxes":[{"type":"info","text":"**FIGHTER ONLY**\nThis scene becomes available after Scene 8 (Ser Aldous on Justice). Read Scene 8 first. Paladins: your divine scenes (P-track) cover this ground differently — skip to Scene 9."},{"type":"info","text":"**THE MEASURE: THE MEASURE ON INTERPRETATION**\nThe Measure was written to govern knights, not gate guards. But the same logic applies: the law is only as good as its interpretation. A law followed with malice is not the Measure. A law followed with judgment is. The question Aldous is asking, without asking it: when you hold the Measure, will you hold the letter or the intention?"}],"choices":[{"letter":"A","text":"Speak to the gate guard. The traveller has valid papers and the bell has not rung. The order should be followed as written — which means the traveller passes.","target":"M1_letter","points":{"CROWN":2,"ROSE":1}},{"letter":"B","text":"Let it go. The guard is following orders. The traveller will find lodging. This is not a Measure problem.","target":"M1_restrain","points":{"CROWN":1}},{"letter":"C","text":"Ask the guard why. Not to correct him — to understand his reasoning. Then, depending on the answer, decide.","target":"M1_ask","points":{"ROSE":2}}]},"M1_letter":{"id":"M1_letter","title":"THE LETTER WELL USED","location":"","prose":["*Castle Brightholm East Gate*","The guard is annoyed but cannot argue. The traveller passes. Aldous watches you the whole time with the expression of someone marking a test paper he expected to be harder. 'The letter well used,' he says. 'You can defend that decision at any Measure tribunal in Solamnia. You can also defend it to the traveller. Both matter.' He hands you the old book. 'Read the third chapter when you have time. It is about what happens when the letter is used badly.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +2 — THE LETTER**\nYou are learning the Measure as a tool. Mark +2 on your Measure track. How you use this learning in M3 and M4 will shape your gift."}],"choices":[{"letter":"A","text":"Continue to Scene 9.","target":"9","points":{}}]},"M1_restrain":{"id":"M1_restrain","title":"THE RESTRAINT","location":"","prose":["*Castle Brightholm East Gate*","You let it go. The guard is following his orders. The traveller leaves. Aldous nods slowly. 'Restraint is its own form of judgment,' he says. 'The Measure does not require you to intervene in everything. Knowing when not to act is as important as knowing when to act.' He pauses. 'The traveller will be fine. The guard will keep doing this. At some point you will have to decide whether that concerns you.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +1 — RESTRAINT**\nMark +1. Your path leans toward deliberate judgment over immediate action. This will matter at M3."}],"choices":[{"letter":"A","text":"Continue to Scene 9.","target":"9","points":{}}]},"M1_ask":{"id":"M1_ask","title":"THE QUESTION","location":"","prose":["*Castle Brightholm East Gate*","The guard's reason: he was told the order means no exceptions and he does not want trouble. You let the traveller through. Then you tell the guard, simply: 'The order says third bell. Four minutes before the bell is before the bell.' You do not report him. You do not lecture him. Aldous says nothing for a while. Then: 'You asked why before you judged. Most people do it the other way around. Most of the time that is a mistake.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +3 — THE QUESTION**\nHighest first-scene gain. Mark +3. You are learning the Measure through understanding, not just rule. This path is the hardest and the most useful."}],"choices":[{"letter":"A","text":"Continue to Scene 9.","target":"9","points":{}}]},"29":{"id":"29","title":"CAERON'S ANSWER","location":"","prose":["*Castle Brightholm — Armoury*","He says it when he thinks you are not watching — which means he says it when he thinks the conversation is over and the thing he was holding back while it was not over can now be safely set down. 'I became a knight because being a lord meant staying behind walls when the bad things came.' A pause while he examines the hilt of his sword. 'I have not always been correct about what constitutes a bad thing. That is something I have had to learn at intervals. I prefer not to keep learning it.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 15\n**SUCCESS (roll 15+):** He is describing a specific incident, not a general philosophy. There is a moment in his past where he made a command decision he still questions — not the same as Aldous's, but adjacent. If you note this and ask carefully in a later scene, he will tell you what it was.\n**FAILURE (roll 1-14):** He is speaking generally. The history behind the words is not visible.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Leave quietly.","target":"11_MORNING","points":{"ROSE":1}},{"letter":"B","text":"'I think you are more correct about it than you believe.'","target":"11_MORNING","points":{"ROSE":1},"romance_comp":"Lord Caeron Ashvale","romance_spark":true}]},"30":{"id":"30","title":"WHO IS CAERON","location":"","prose":["*Castle Brightholm*","Third son of a minor noble house, passed over for inheritance. Became a knight because there was nothing else and found out he was exceptional at it. His house considers knighthood beneath them. He considers them beneath the Measure.","What you piece together: the armour he wears is paid for out of his own salary, not the family estate. The saddle on his horse is older than most of the garrison squires. He does not mention his family. No one who knows him mentions it either — which tells you something about how that subject was closed. A man who chose this life at real cost, and will not let it be anything less than exactly what it should be."],"boxes":[],"choices":[{"letter":"A","text":"This makes you respect him differently.","target":"11_AFTERNOON","points":{"ROSE":1}},{"letter":"B","text":"This makes you understand him. There is a difference.","target":"11_AFTERNOON","points":{"CROWN":1},"romance_comp":"Lord Caeron Ashvale","romance_spark":true}]},"40":{"id":"40","title":"THE EASTERN APPROACH","location":"","prose":["*South Road — Treeline*","You reach the ridge by midmorning. The treeline here is old growth — pine and ash, light coming through in long diagonals. Below: not bandits. A camp. Cooking fires. The smell of something being boiled. Children. There are perhaps thirty people. None of them look like bandits. All of them look frightened."],"boxes":[],"choices":[{"letter":"A","text":"Observe before descending.","target":"44","points":{"ROSE":1}},{"letter":"B","text":"Descend and approach openly.","target":"44","points":{"SWORD":1,"CROWN":1}}]},"41":{"id":"41","title":"THE DIRECT APPROACH","location":"","prose":["*South Road*","The direct road means you are visible from half a mile. You watch them see you. A cluster of adults moves without discussion, putting themselves between the children and your approach. Then one of them sees the tabard — the Solamnic sun — and says something low to the group, and the posture changes. An elderly woman starts crying with the specific relief of someone who has been holding something for too long."],"boxes":[],"choices":[{"letter":"A","text":"Identify yourself and explain the routine exercise.","target":"44","points":{"CROWN":1}},{"letter":"B","text":"Ask them where they have come from. Let them talk first.","target":"44","points":{"ROSE":1}}]},"42":{"id":"42","title":"THE WEST BANK","location":"","prose":["*South Road — River Ford*","Three farmsteads on the west bank, recently abandoned. Not weeks — days. Tables still set for a meal that was not finished. A child's wooden horse on the floor near the hearth."],"boxes":[{"type":"info","text":"**You Learn:** The Dragon Army has already crossed the river at least once."}],"choices":[{"letter":"A","text":"Take the boot prints evidence to Caeron immediately.","target":"44","points":{"CROWN":2,"ROSE":1}},{"letter":"B","text":"Proceed to the refugee camp with this information.","target":"44","points":{"ROSE":1}}]},"43":{"id":"43","title":"THE SPLIT","location":"","prose":["*South Road*","You come up the ridge from the east and find Aldric already there. He has a Baaz Draconian bound at the wrists."],"boxes":[{"type":"combat","text":"**COMBAT ENCOUNTER — THE DETAINED SCOUT**\nOne wounded Baaz breaks free. You fight alone for 2 rounds before Aldric arrives.\n**ENEMIES:** Baaz Draconian: AC 13, HP 14 (wounded), Speed 30 ft.\nEnemy Tactics: It tries to disengage and run. If it escapes (not downed in 3 rounds) the patrol arrives early in Scene 44.\nVictory: The Baaz falls. Its body hardens to stone in its death throes — you pry your blade free as Aldric arrives at a run. The scout is dead, but now you know the Dragon Army patrols this road.\nRewards: 5 XP.\nFallen (0 HP): Aldric arrives to finish the fight. 1 HP and one exhaustion."},{"type":"info","text":"**ADD TO INVENTORY — DRAGON ARMY PATROL SKETCH**\nFrom the detained draconian: a hide map of patrol routes. Show this to Caeron: +1 bonus to the Scene 52 defensive position check."}],"choices":[{"letter":"A","text":"Report the scout to Caeron.","target":"44","points":{"CROWN":1}},{"letter":"B","text":"Continue to the refugee camp immediately.","target":"44","points":{"SWORD":1}}]},"45":{"id":"45","title":"THESSALY IN THE FIELD","location":"","prose":["*South Road*","Thessaly moves through the exercise area with practiced near-invisibility. She has her notebook inside her jacket rather than out. She is watching everything and taking no notes yet."],"boxes":[],"choices":[{"letter":"A","text":"Brief her on the refugees.","target":"44","points":{"ROSE":1}},{"letter":"B","text":"Ask her to observe only — do not report yet.","target":"44","points":{"CROWN":1}}]},"62D":{"id":"62D","title":"THE FIRST NIGHT ON THE ROAD","location":"","prose":["*South Road — Day 1, Evening Camp*","The first night out of Brightholm is the hardest. Not because of danger — the road is clear for eight miles — but because of what leaving means. The garrison towers were visible until the fifth mile, then the ridge took them. Brightholm is behind you.","Camp is set with garrison efficiency. The fire is regulation size, which means small and purposeful. You eat garrison rations: hard bread, dried meat, a cheese that has survived the march better than expected. Not good food. Adequate food, eaten in the company of people you have spent the most important weeks of your life with, which makes it the best food you have ever eaten.","**IF TARIEL IS IN YOUR PARTY:** She eats apart from the column. She has her notebook open. Once, she looks up and catches your eye. The moment lasts three seconds. She looks down first.","**IF LYSANDER IS IN YOUR PARTY:** He is not in the camp. He rides parallel, not with, the column. Visible occasionally at the treeline, then not visible."],"boxes":[{"type":"info","text":"**NPC CROSS-TALK — CAERON AND SERA**\nAt the edge of camp: Lord Caeron is speaking with Sera Nighthollow. Caeron's careful listening posture; Sera's clipped precision. When they finish, Caeron nods once. Sera glances at you briefly. Whatever she told him, it was about the road ahead."}],"choices":[{"letter":"A","text":"Walk the perimeter before sleeping.","target":"62E","points":{"CROWN":1}},{"letter":"B","text":"Find your companions. Sit with them.","target":"62E","points":{"ROSE":1}},{"letter":"C","text":"Watch the stars. Solinari is rising.","target":"62E","points":{"ROSE":1}},{"letter":"D","text":"Train together as a group in the morning.","target":"BOND_TRAIN","points":{}},{"letter":"E","text":"Share a quiet meal together.","target":"BOND_MEAL","points":{}}]},"63":{"id":"63","title":"ALDRIC ON THE ROAD","location":"","prose":["*South Road*","'Do you know what I thought when the draconians hit us on the south road? I thought: good, she is here. Or he. Or they.' He glances over once and then back to the road. 'I was glad it was you. Not someone else. Not anyone else.'"],"boxes":[],"choices":[{"letter":"A","text":"'I was glad it was you too.'","target":"64B","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"'You fight well.'","target":"64B","points":{"SWORD":1}},{"letter":"C","text":"Continue riding south in silence (Scene 64)","target":"64","points":{}}]},"64":{"id":"64","title":"RIDING IN SILENCE","location":"","prose":["*South Road*","A good silence — the kind that only exists between people who do not need to fill it. The smoke on the southern horizon is thicker now."],"boxes":[],"choices":[{"letter":"A","text":"Keep the silence all the way to camp.","target":"64B","points":{"SWORD":1}},{"letter":"B","text":"After a mile, ask him something you have wanted to ask.","target":"64B","points":{"ROSE":1}},{"letter":"C","text":"Refugees on the road heading north (Scene 64C)","target":"64C","points":{}}]},"64B":{"id":"64B","title":"THE WAR SIGNS","location":"","prose":["*South Road — Day 2, Morning*","The road changes at the tenth mile. The farms are empty — not abandoned, emptied deliberately. At the eleventh mile: a cart on its side, a pair of child's shoes tied together by the laces. At the twelfth mile: a Solamnic mile-marker with fresh chalk. Someone wrote SOUTH NO. Below it, in a different hand: ARMY 2 DAYS.","The column does not comment. The silence deepens."],"boxes":[],"choices":[{"letter":"A","text":"Stop. Pick up the child's shoes. Carry them.","target":"64C","points":{"ROSE":1}},{"letter":"B","text":"Note the chalk for your report.","target":"64C","points":{"CROWN":1,"ROSE":1}},{"letter":"C","text":"Keep moving.","target":"64C","points":{"SWORD":1}},{"letter":"D","text":"Watch the moons with whoever will join you.","target":"BOND_STAR","points":{}}]},"64C":{"id":"64C","title":"REFUGEES GOING NORTH","location":"","prose":["*South Road — Day 2, Afternoon*","Eleven people moving north. You are moving south. The man with the child stops when he sees the tabard. He says: 'Vogler. Please.'","**IF YOU SAVED THE REFUGEES IN ACT TWO:** One of the eleven recognises you. 'You. You saved us. My daughter is alive because of you.'","**IF YOU TURNED THE REFUGEES BACK:** You do not know what happened to those thirty people. The not-knowing sits in you like a stone."],"boxes":[],"choices":[{"letter":"A","text":"Give them your rations.","target":"64E","points":{"ROSE":2}},{"letter":"B","text":"Brief them on the road north.","target":"64E","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"Keep moving.","target":"64E","points":{"SWORD":1}}]},"65":{"id":"65","title":"THE ROAD AMBUSH","location":"","prose":["*South Road — Forest Edge, Day 2*","Arrows from the treeline, then three Dragon Army soldiers and a Sivak Draconian Officer. Not a patrol. Assassins. They have a description of Solamnic squire colours. They have found you."],"boxes":[{"type":"combat","text":"**COMBAT ENCOUNTER — DRAGON ARMY ASSASSIN SQUAD**\n**ENEMIES:**\n• Human Soldier x3: AC 14, HP 14 each. Longsword +4 1d8+2. Crossbow +4 1d8+2.\n• Sivak Draconian (Officer): AC 16, HP 48. Greatsword +6 2d6+4. Speed 40 ft., Fly 60 ft.\n• Sivak: Shape Steal — on death by melee, takes the killer's appearance. Commander's Aura: soldiers within 30 ft. get +1 to attacks.\n**IMPORTANT:** Do not kill the Sivak in melee — it will Shape Steal your appearance. Use ranged attacks or force it to flee.\nVictory: The last soldier falls. The Sivak shrieks, wings beating — it launches into the sky, fleeing into the dark. On the officer's body you find sealed orders. Your name is on them.\nRewards: 50 XP.\nFallen (0 HP): Aldric holds the Sivak while you are stabilised. 1 HP, one exhaustion."}],"choices":[{"letter":"A","text":"The ambush is broken. Continue to Scene 66.","target":"66","points":{}}]},"66":{"id":"66","title":"AFTER THE AMBUSH","location":"","prose":["*South Road Camp, Night*","The sealed orders have your name in them. Caeron looks at this for a long time. 'They know about the dispatch,' he says. 'And about you.' He folds the paper. 'Good — if they are targeting you specifically, that means what you have been doing has mattered enough.'"],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Investigation (+3) | INT | DC 14\n**SUCCESS (roll 14+):** The orders use a standard Blue Wing format except for one line in a different hand containing your specific description. Added by someone with insider access.\n**FAILURE (roll 1-13):** The source of that intelligence is unclear."}],"choices":[{"letter":"A","text":"Keep the information close.","target":"66B","points":{"ROSE":1}},{"letter":"B","text":"Brief the full command.","target":"66B","points":{"CROWN":2}},{"letter":"C","text":"Find Serath — they may be in danger.","target":"66B","points":{"ROSE":1}}]},"66B":{"id":"66B","title":"CAMP CONVERSATIONS","location":"","prose":["*Forest Road — Day 2, Night Camp*","The fire is smaller tonight — Caeron's order. The conversations become the kind that happen in the dark between people aware that remaining conversations may be finite.","**Choose one companion to spend the evening with:**"],"boxes":[],"choices":[{"letter":"A","text":"Aldric.","target":"66B_Aldric","points":{"ROSE":1}},{"letter":"L","text":"(If romancing Sera) Find Sera. She is on the ridge. She saw you coming.","target":"DATE_SERA","points":{},"condition":"romance_sera"},{"letter":"M","text":"(If romancing Vael) Find Vael. She is running sword forms alone.","target":"DATE_VAEL","points":{},"condition":"romance_vael"},{"letter":"N","text":"(If romancing Caeron) Find Caeron. He is standing at the map, but the map is not what he is looking at.","target":"DATE_CAERON","points":{},"condition":"romance_caeron"},{"letter":"O","text":"(If romancing Tariel) Find Tariel. She is watching the fire with her notebook closed.","target":"DATE_TARIEL","points":{},"condition":"romance_tariel"},{"letter":"P","text":"(If romancing Lysander) Find Lysander. He is at the treeline, looking south.","target":"DATE_LYSANDER","points":{},"condition":"romance_lysander"},{"letter":"Q","text":"(If polyamory accepted) Spend the evening with both partners.","target":"DATE_POLY","points":{},"condition":"romance_poly"},{"letter":"B","text":"Thessaly.","target":"66B_Thessaly","points":{"ROSE":1}},{"letter":"C","text":"Mira, if present.","target":"66B_Mira","points":{"ROSE":1}},{"letter":"D","text":"Serath, if present.","target":"66B_Serath","points":{"ROSE":1}},{"letter":"E","text":"Caeron.","target":"66B_Caeron","points":{"CROWN":1}},{"letter":"F","text":"Tariel, if present.","target":"66B_Tariel","points":{"ROSE":1}},{"letter":"G","text":"Lysander, if present.","target":"66B_Lysander","points":{"SWORD":1}},{"letter":"H","text":"Take a walk with your partner at sunset.","target":"67","points":{}},{"letter":"I","text":"Spar privately with your partner.","target":"DATE_ALDRIC","points":{}},{"letter":"J","text":"Find your partner after everyone sleeps.","target":"DATE_THESSALY","points":{}},{"letter":"K","text":"Spend the evening with both partners.","target":"DATE_MIRA","points":{}}]},"66B_Aldric":{"id":"66B_Aldric","title":"WHAT HE CARRIES","location":"","prose":["He tells you about his mother. She died when he was twelve. 'I compete with you because I do not know another way to tell someone they matter to me. I am working on it. It is slow.'"],"boxes":[],"choices":[{"letter":"A","text":"'I know. I have always known.'","target":"67","points":{"ROSE":1}},{"letter":"B","text":"'You are better at it than you think.'","target":"67","points":{"ROSE":1,"SWORD":1}}]},"66B_Thessaly":{"id":"66B_Thessaly","title":"WHAT SHE FEARS","location":"","prose":["'I am afraid of writing the history that says they fell.' She opens the locket. Inside: a page from a letter her mother wrote the week before the Cataclysm. 'When the world changes, the people who write it down are the ones who decide what it meant.'"],"boxes":[],"choices":[{"letter":"A","text":"'You are. I have seen you work.'","target":"67","points":{"ROSE":1}},{"letter":"B","text":"'Then write the version where we hold.'","target":"67","points":{"SWORD":1,"ROSE":1}}]},"66B_Mira":{"id":"66B_Mira","title":"WHAT SHE KNOWS","location":"","prose":["'I know what two thousand soldiers means. In medical terms. I know the arithmetic does not work.' She is not afraid. She is past afraid. 'I will be there anyway.'"],"boxes":[],"choices":[{"letter":"A","text":"'The arithmetic never accounts for the people who refuse to stop.'","target":"67","points":{"ROSE":2}},{"letter":"B","text":"Help her count. The counting helps.","target":"67","points":{"ROSE":1}}]},"66B_Serath":{"id":"66B_Serath","title":"WHAT THEY LOST","location":"","prose":["'I had a unit. Twelve people. When I left, I left them inside. They are in the army marching on Vogler. I may see people I know across the line. I will not hesitate. But I want you to know it costs something.'"],"boxes":[],"choices":[{"letter":"A","text":"'I will stand beside you when it does.'","target":"67","points":{"ROSE":1,"SWORD":1}},{"letter":"B","text":"'If you need to step back, I will cover you.'","target":"67","points":{"ROSE":2}}]},"66B_Caeron":{"id":"66B_Caeron","title":"WHAT HE HIDES","location":"","prose":["'I have never led people into a situation where I cannot guarantee their survival.' He turns. His face is the face of a man who is thirty years old and does not know if he is enough. 'I wanted someone to know.'"],"boxes":[],"choices":[{"letter":"A","text":"'You are enough. We will hold.'","target":"67","points":{"CROWN":2,"ROSE":1}},{"letter":"B","text":"'Then we hold for as long as we can.'","target":"67","points":{"CROWN":1,"SWORD":1}}]},"66B_Tariel":{"id":"66B_Tariel","title":"THE QUESTION","location":"","prose":["'If the Oath is what you say it is — why is Vogler undefended? Why were the refugees turned south? Why is a squire being sent where a regiment should be?'","**CONVICTION CHOICE (FALLEN is possible here):**","**ROMANCE CHOICE (optional — if at FLAME or higher):**"],"boxes":[],"choices":[{"letter":"A","text":"'Because the institution is failing does not mean the principle is wrong. I am the principle.'","target":"67","points":{"ROSE":2},"conviction":"STEADFAST"},{"letter":"B","text":"'I do not have an answer. I have the Oath and Vogler and the people beside me.'","target":"67","points":{"ROSE":1,"CROWN":1},"conviction":"QUESTIONING"},{"letter":"C","text":"'You are right. The institution is insufficient. I am taking the Oath anyway because the people at Vogler need someone who shows up.'","target":"67","points":{"ROSE":2,"CROWN":-1},"conviction":"CONVINCED"},{"letter":"D","text":"'The Measure is a beautiful relic. I will carry it because someone should, but I no longer believe it is enough.'","target":"67","points":{"ROSE":1,"CROWN":-2},"conviction":"FALLEN"},{"letter":"E","text":"'I believe in the Order. I have heard everything you said and I choose this anyway.'","target":"67","points":{"CROWN":2,"ROSE":1},"conviction":"STEADFAST"},{"letter":"R1","text":"'Stay. Not for the Order. For me.'","target":"67","points":{},"romance_comp":"Tariel Duskmantle","romance_oath":true},{"letter":"R2","text":"'Thank you. For all of it.'","target":"67","points":{}},{"letter":"R3","text":"Do not address.","target":"67","points":{}}]},"66B_Lysander":{"id":"66B_Lysander","title":"THE LAST FIRE","location":"","prose":["'I took the Oath at nineteen. I meant every word. I stopped meaning them when the system rewarded the decision to let people die and punished the decision to save them, and did both correctly according to its own rules.'","'I am not telling you not to take the Oath. I am telling you: the words are not the thing. You are the thing.'","**CONVICTION CHOICE (FALLEN is possible here):**","**ROMANCE CHOICE (optional — if at FLAME or higher):**"],"boxes":[],"choices":[{"letter":"A","text":"'I will take the Oath. And I will mean it the way you meant it — the real version.'","target":"67","points":{"ROSE":2,"CROWN":-1},"conviction":"CONVINCED"},{"letter":"B","text":"'The words are not the thing. The Oath is a formality I will perform because Vogler needs it, not because I believe the institution will save anyone.'","target":"67","points":{"ROSE":1,"CROWN":-2},"conviction":"FALLEN"},{"letter":"C","text":"'The Oath means what I decide it means. What I decide, in the moment, with the people in front of me.'","target":"67","points":{"ROSE":1,"CROWN":1},"conviction":"QUESTIONING"},{"letter":"D","text":"'I hear you. I respect you. And I am going to take the Oath and mean every word because the alternative is a world where no one tries.'","target":"67","points":{"CROWN":2,"SWORD":1},"conviction":"STEADFAST"},{"letter":"E","text":"'I do not know what the Oath means yet. I will figure it out after.'","target":"67","points":{"ROSE":1},"conviction":"SHAKEN"},{"letter":"R1","text":"'Stay with me tonight.'","target":"67","points":{},"romance_comp":"Lysander Graves","romance_oath":true},{"letter":"R2","text":"Take his hand. Let the fire burn down.","target":"67","points":{},"romance_comp":"Lysander Graves","romance_oath":true},{"letter":"R3","text":"'Thank you.'","target":"67","points":{}},{"letter":"R4","text":"Do not address.","target":"67","points":{}}]},"67":{"id":"67","title":"ALDRIC AT THE RIVER","location":"","prose":["*Forest River Crossing — Dawn, Day 3*","He tells you about three months before you arrived: he disobeyed an order to turn away refugees at the western gate. He has been waiting to be punished. 'I need to know if you would have done the same.'"],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Persuasion (+0) | CHA | DC 13\n**SUCCESS (roll 13+):** +1 Aldric Oath track. ROMANCE OATH activates if Flame was present.\n**FAILURE (roll 1-12):** He nods anyway."}],"choices":[{"letter":"A","text":"'Yes. I would have done the same.'","target":"68D","points":{"ROSE":3},"romance_oath":true},{"letter":"B","text":"'I do not know for certain. But you made the right call.'","target":"68D","points":{"ROSE":2,"SWORD":1}}]},"68":{"id":"68","title":"THE LAST CAMP","location":"","prose":["*Forest Road — Night, Day 3*","The last camp before Vogler. Someone has a flute somewhere down the line — playing every night for twenty years. The melody is old. Tomorrow, Vogler."],"boxes":[{"type":"info","text":"**PALADIN — THE CHOOSING**\nAll Paladins: after your choice below, turn to Scene P4 now."},{"type":"info","text":"**PALADIN — FALLEN TRACK**\nIf FALLEN on DG track: turn to Scene DG4 now."},{"type":"measure","text":"**FIGHTER — MEASURE TRACK**\nIf you have not yet completed M3 and M4: turn to Scene M3 now."},{"type":"info","text":"**ROMANCE CONDITIONAL SCENES**\nIf Sera at FLAME: turn to Scene 68B. If Vael at FLAME: turn to Scene 68C."}],"choices":[{"letter":"A","text":"Tell her the true thing.","target":"69","points":{"ROSE":2},"romance_comp":"Sera Nighthollow","romance_oath":true},{"letter":"B","text":"'Same thing as before. Not being enough.'","target":"69","points":{"ROSE":1}},{"letter":"C","text":"'Right now? Nothing.'","target":"69","points":{"SWORD":2}},{"letter":"D","text":"Paladin on DG track: The Reckoning (Scene DG4)","target":"DG4","points":{}},{"letter":"E","text":"Sera at Flame: the last camp together (Scene 68B)","target":"68B","points":{}},{"letter":"F","text":"Vael at Flame: the last camp together (Scene 68C)","target":"68C","points":{}}]},"68B":{"id":"68B","title":"THE LAST CAMP — SERA","location":"","prose":["*Forest Road — Night, Day 3 (if Sera Oath-track active)*","The camp is quiet. The watch has changed. Sera is not on rotation tonight — she has not slept in forty hours and you told her you would take the first watch if she told you where she was going. She told you.","You find her at the far edge of the firelight where it thins into darkness, sitting with her back against a tree and her knife across her knees not because she thinks she needs it but because having it there is how she slows down. She looks up at you. The half-dark makes her face different — softer, less defended, the way people look when they think no one is watching."],"boxes":[{"type":"info","text":"**CONDITIONAL SCENE**\nThis scene occurs if Sera is at Flame level or above."},{"type":"romance","text":"**ROMANCE MOMENT**\nShe says: 'You came.' Like she did not expect it. Like she expected it. Like both are true. You sit down against the same tree and the distance between you is not much. She tilts her head and studies your face with the focused attention she normally gives to terrain. Then she says: 'I have been thinking about this since the south road.' She does not elaborate. She does not need to."}],"choices":[{"letter":"A","text":"'So have I.' Two words. She holds your gaze for a long moment. Then she puts the knife down and turns toward you and the rest of the watch is not spent watching.","target":"69","points":{},"romance_oath":true},{"letter":"B","text":"'Tell me what you found in that village. The real version.' She tells you. It is terrible. You hold it together. Sometime before dawn the holding becomes something else.","target":"69","points":{},"romance_oath":true},{"letter":"C","text":"'I did not want to get to Vogler without saying something.' She considers this. Then: 'What are you saying?' You tell her.","target":"69","points":{},"romance_oath":true}]},"68C":{"id":"68C","title":"THE LAST CAMP — VAEL","location":"","prose":["*Forest Road — Night, Day 3 (if Vael Oath-track active)*","She is cleaning her equipment for the third time, which is how you know she is not actually thinking about her equipment. She looks up when you approach with the expression of someone who has made a decision and is not sure they have the nerve to act on it.","She says: 'I want to say something before tomorrow and I need you to let me finish it because I am going to say it badly.' She looks at her sword. 'I have been here six months and the only person whose opinion of me I actually care about is yours. I did not plan for that. I do not know what to do with it. But we are one day from Vogler and I am not going to be someone who did not say it.'"],"boxes":[{"type":"info","text":"**CONDITIONAL SCENE**\nThis scene occurs if Vael is at Flame level or above."},{"type":"romance","text":"**ROMANCE MOMENT**\nShe is looking at you now. The firelight is behind you and her expression is completely unguarded — all the competitive competence and dry deflection set aside, just: a person who told you a true thing and is waiting to see what you do with it. She is slightly breathless. She would hate knowing that you can see that."}],"choices":[{"letter":"A","text":"'I know. I have known for a while. I did not know what to do with it either.' She exhales. Somewhere in that exhale is a laugh. Then she closes the distance and so do you.","target":"69","points":{},"romance_oath":true},{"letter":"B","text":"'You said it exactly right.' You mean this. She blinks. Then she sets down the sword and reaches for you.","target":"69","points":{},"romance_oath":true},{"letter":"C","text":"Say nothing. Close the distance instead. She makes a small surprised sound and then she is kissing you back like she has been waiting to for weeks, which she has.","target":"69","points":{},"romance_oath":true},{"letter":"D","text":"(Paladin) Speak to Paladine. \u2018I am yours, if you will have me. I will guard what is good.\u2019","target":"P4_Paladine","points":{},"condition":"paladin"},{"letter":"E","text":"(Paladin) Speak to Kiri-Jolith. \u2018I will fight. I will not waste what you give me.\u2019","target":"P4_KiriJolith","points":{},"condition":"paladin"},{"letter":"F","text":"(Paladin) Speak to Mishakal. \u2018I will heal. I will not choose who deserves it.\u2019","target":"P4_Mishakal","points":{},"condition":"paladin"},{"letter":"G","text":"(Paladin) Speak to Habbakuk. \u2018I will protect what cannot protect itself.\u2019","target":"P4_Habbakuk","points":{},"condition":"paladin"},{"letter":"H","text":"(Paladin) Speak to Branchala. \u2018I will hold onto the possibility of beauty.\u2019","target":"P4_Branchala","points":{},"condition":"paladin"},{"letter":"I","text":"(Paladin) Remain silent. \u2018I am not ready to name you.\u2019","target":"P4_Unnamed","points":{},"condition":"paladin"}]},"DG4":{"id":"DG4","title":"THE RECKONING","location":"","prose":["*Vogler Road — The Day Before Vogler (Paladin Who Has Fallen)*","You are on the last road before Vogler. The column has stopped for water. You are sitting on a stone wall looking at the lake in the distance when you hear footsteps approaching — not Aldric's, not Mira's. The figure is old. Very old. Robes that are neither white nor grey but the specific colour of very old wood. A face like a map of decisions made and paid for. He sits down without being invited and looks at the lake with you for a while.","'You've been carrying something that isn't yours,' he says. Not unkindly. Factually. 'It is not permanent. But it does not come off easily. The question is whether you want it off badly enough.' He looks at you. 'Not whether you are sorry. Whether you want to be different.' He waits.","This is the hardest question the prelude asks. Not 'did you fall' — you know the answer to that. But whether the falling was truly the end of something or whether it was a lesson you are willing to carry forward. The answer has to be real. He will know if it isn't."],"boxes":[{"type":"info","text":"**FALLEN PALADINS ONLY**\nIf you are HELD, HELD FIRM, PURIFIED, or PULLED BACK: skip to Scene 70."},{"type":"info","text":"**DRAGONLANCE: ELISTAN OF PALANTHAS (or a messenger in his name)**\nElistan was the first Chosen of Paladine after the Cataclysm — the first person in three hundred years to carry true divine power. He did not come to judge you. He came because someone asked him to find you."}],"choices":[{"letter":"A","text":"Yes. I want to be different. I want to understand what I chose and unmake it.","target":"DG4_recover","points":{}},{"letter":"B","text":"I want to be different but I don't know if I can. That's the honest answer.","target":"DG4_partial","points":{}},{"letter":"C","text":"I want redemption more than anything. But I don't have the path.","target":"DG4_ember","points":{}},{"letter":"D","text":"I made a rational choice. I stand by it.","target":"DG4_fallen","points":{}}]},"DG4_recover":{"id":"DG4_recover","title":"THE RETURN","location":"","prose":["*Vogler Road — Recovery*","He nods once. He puts his hand on your head for a moment — briefly, the way a blessing works when it is genuinely meant — and then he stands and walks away. The road is the same road. The lake is the same lake. Your hands feel clean. Not new-clean. Clean the way things are clean when they have been used and washed and used again. Your god's warmth is back in full, unfiltered, entirely present."],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE VOW RESTORED**\n*Wondrous Item (Requires Attunement by a Paladin), Uncommon*\nA small medallion of white-silver, shaped like a closed fist holding a flame.\n**Mechanics:** Once per long rest: when you use Lay on Hands, you may also remove one condition: frightened, charmed, or poisoned. Advantage on saving throws against being charmed or possessed by fiends or undead.\n**Lore:** Carried by one who fell and chose to return."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"62","points":{}}]},"DG4_partial":{"id":"DG4_partial","title":"THE SCAR","location":"","prose":["*Vogler Road — Partial Recovery*","He does not argue with the honesty. 'That is a better answer than certainty,' he says. Your Lay on Hands is restored. The muffled quality in your prayers is mostly gone. But there is still a small thing — a faint violet note to the golden warmth."],"boxes":[{"type":"info","text":"**MARK ON YOUR CHARACTER SHEET — FAULTY DIVINE POWERS**\nLay on Hands: restored to full pool. Spell slots: each time you expend a spell slot, roll 1d6 first. On a 1 or 2, the slot is spent but the spell fails. This instability ends if you complete the Quest of the Returning Flame."},{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE SHARD OF RETURNING LIGHT**\n*Wondrous Item (Requires Attunement by a Paladin), Uncommon — GROWING*\nA sliver of white crystal that throws no reflection and casts no shadow. It is slightly warm.\n**Mechanics:** Advantage on saves against being frightened. Once per long rest, as a bonus action: creatures of your choice within 10 ft. that are frightened or charmed may reroll their saving throw with advan
