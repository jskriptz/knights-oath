and has stopped noticing the cold.","'Let me ask you something,' he says. 'The man with the barrel-stave splint. At the refugee column. You saw him try to stand at attention when he saw the tabard.' You nod. 'Why did he do that?'","'No,' he says. 'He did it because three hundred years of Solamnic presence taught civilians that the tabard means safety. And it did, once. Before the Cataclysm, before the Order turned inward, before the Measure became a text people quote instead of a thing people do.' He is not angry. That is the dangerous part. He is calm. 'The man stood at attention for a symbol. You — specifically you — chose to live up to it. The institution chose to send him south.'","'I am not saying the Oath is worthless,' he says. 'I am saying it is insufficient. I am saying a good person does not need it to do the right thing, and a bad person will not be stopped by it. I am saying the Measure is beautiful and I loved it and it told me to let people drown. I did not let them drown. The Measure told me I was wrong. Which of us do you believe?'","**CONVICTION CHOICE (Lysander Corruption Track — Experience 2):**","**ROMANCE CHOICE (optional — if at SPARK or higher):**"],"boxes":[{"type":"info","text":"**CONDITIONAL SCENE**\nThis scene occurs only if Lysander Graves is in your party."}],"choices":[{"letter":"A","text":"'I believe you. And I believe the Measure. Both at the same time.'","target":"44","points":{"ROSE":2},"conviction":"remains"},{"letter":"B","text":"'The Measure was wrong. You were right. But walking away means no one fixes it from inside.'","target":"44","points":{"ROSE":1,"CROWN":1},"conviction":"remains"},{"letter":"C","text":"'You asked me which I believe — you or the Measure. I believe you.'","target":"44","points":{"ROSE":1,"CROWN":-1},"conviction":"advances"},{"letter":"D","text":"'The Oath exists because individual judgment is not enough.' He walks away.","target":"44","points":{"CROWN":2},"conviction":"STEADFAST"},{"letter":"E","text":"'I do not know. I am a squire who has been at this for three weeks. But I am listening.'","target":"44","points":{"ROSE":1},"conviction":"QUESTIONING"},{"letter":"R1","text":"The dark and the fire and the honesty have created something. Lean into it.","target":null,"points":{},"romance_flame":true},{"letter":"R2","text":"Keep the distance.","target":null,"points":{}}]},"37":{"id":"37","title":"PROOF OF DEFECTION","location":"","prose":["*Abandoned Barn*","Serath gives you the patrol schedules by drawing them — a grid in the dirt with a stick, the specific rotations that tell you where the Dragon Army pickets are and more importantly where the gaps are."],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Investigation (INT, proficiency if trained) (+3) | INT | DC 12\n**SUCCESS (roll 12+):** The patrol schedules are genuine. But there is something else: the description of Commander Hestrix's seal matches what is on the dispatch pouch from Scene 27 exactly. Serath knew about that pouch before you mentioned it.\n**FAILURE (roll 1-11):** The information checks out.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Enough. Treat the wound and hide them.","target":"36","points":{},"romance_spark":true},{"letter":"B","text":"Use the information but turn them in.","target":"39","points":{}}]},"38":{"id":"38","title":"ALDRIC AND THE QUESTION","location":"","prose":["*South Road*","He has been quiet since the barn. Now he asks: 'What do you want to do?' Not: what does protocol say. Not: what would Caeron decide. What do you want."],"boxes":[],"choices":[{"letter":"A","text":"'Hide them.'","target":"36","points":{"ROSE":1}},{"letter":"B","text":"'Report them.'","target":"39","points":{"CROWN":2}},{"letter":"C","text":"'I honestly do not know.'","target":"36","points":{"ROSE":1}}]},"39":{"id":"39","title":"THE REPORT","location":"","prose":["*Garrison*","You report Serath. They are detained. Lord Caeron commends your adherence to protocol. The paperwork is filed. The garrison moves on.","You think about the village they described. You think about the way they said it — flat precision, no performance of grief, worse than if they had been crying. You hear later they survived captivity and escaped three months after."],"boxes":[],"choices":[{"letter":"A","text":"You made the right call by the law.","target":"44","points":{"CROWN":2}},{"letter":"B","text":"It sits poorly.","target":"44","points":{"ROSE":1}},{"letter":"C","text":"A storm breaks on the road (Scene 40B)","target":"40B","points":{}}]},"40":{"id":"40","title":"THE EASTERN APPROACH","location":"","prose":["*South Road — Treeline*","You reach the ridge by midmorning. The treeline here is old growth — pine and ash, light coming through in long diagonals. Below: not bandits. A camp. Cooking fires. The smell of something being boiled. Children. There are perhaps thirty people. None of them look like bandits. All of them look frightened."],"boxes":[],"choices":[{"letter":"A","text":"Observe before descending.","target":"44","points":{"ROSE":1}},{"letter":"B","text":"Descend and approach openly.","target":"44","points":{"SWORD":1,"CROWN":1}}]},"40B":{"id":"40B","title":"THE STORM","location":"","prose":["*South Road — Field Exercise, Day 2*","The storm comes from the west with the particular speed that storms have when they are not interested in your schedule. One hour of grey sky, then thirty minutes of wind that turns the treeline into a sound you have never heard trees make, then rain that is not rain so much as a quantity of water that has decided to be somewhere lower and does not care what is in the way.","Aldric has his back against a pine and his arms folded with the focused patience of someone who has decided that being wet is a temporary condition he refuses to acknowledge. Mira, if present, is already working — redistributing supplies with calm efficiency. Caeron stands in the rain without appearing to notice it.","**IF TARIEL IS IN YOUR PARTY:** 'The rain is useful — it reveals who adapts and who endures. Both are valuable. The Knights of Solamnia, in my experience, default to endure.'","**IF LYSANDER IS IN YOUR PARTY:** He appears from the treeline with dry deadwood gathered before the rain started. He builds a fire with offhand competence. 'The garrison teaches you to endure discomfort. I have found it more useful to eliminate discomfort and save the enduring for things that actually require it.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Survival (WIS) (+1) | WIS | DC 12\n**SUCCESS (roll 12+):** This will pass in ninety minutes. The treeline ridge path will dry faster than the road.\n**FAILURE (roll 1-11):** The storm is a storm. You endure it."}],"choices":[{"letter":"A","text":"Endure. Stand in the rain with Caeron.","target":"44","points":{"CROWN":1,"SWORD":1}},{"letter":"B","text":"Adapt. Help Mira redistribute supplies.","target":"44","points":{"ROSE":1}},{"letter":"C","text":"Build shelter.","target":"44","points":{"SWORD":1}},{"letter":"D","text":"Join Lysander at the fire.","target":"44","points":{"SWORD":1,"CROWN":-1}}]},"41":{"id":"41","title":"THE DIRECT APPROACH","location":"","prose":["*South Road*","The direct road means you are visible from half a mile. You watch them see you. A cluster of adults moves without discussion, putting themselves between the children and your approach. Then one of them sees the tabard — the Solamnic sun — and says something low to the group, and the posture changes. An elderly woman starts crying with the specific relief of someone who has been holding something for too long."],"boxes":[],"choices":[{"letter":"A","text":"Identify yourself and explain the routine exercise.","target":"44","points":{"CROWN":1}},{"letter":"B","text":"Ask them where they have come from. Let them talk first.","target":"44","points":{"ROSE":1}}]},"42":{"id":"42","title":"THE WEST BANK","location":"","prose":["*South Road — River Ford*","Three farmsteads on the west bank, recently abandoned. Not weeks — days. Tables still set for a meal that was not finished. A child's wooden horse on the floor near the hearth."],"boxes":[{"type":"info","text":"**You Learn:** The Dragon Army has already crossed the river at least once."}],"choices":[{"letter":"A","text":"Take the boot prints evidence to Caeron immediately.","target":"31","points":{"CROWN":2,"ROSE":1}},{"letter":"B","text":"Proceed to the refugee camp with this information.","target":"44","points":{"ROSE":1}}]},"43":{"id":"43","title":"THE SPLIT","location":"","prose":["*South Road*","You come up the ridge from the east and find Aldric already there. He has a Baaz Draconian bound at the wrists."],"boxes":[{"type":"combat","text":"**COMBAT ENCOUNTER — THE DETAINED SCOUT**\nOne wounded Baaz breaks free. You fight alone for 2 rounds before Aldric arrives.\n**ENEMIES:** Baaz Draconian: AC 13, HP 14 (wounded), Speed 30 ft.\nEnemy Tactics: It tries to disengage and run. If it escapes (not downed in 3 rounds) the patrol arrives early in Scene 44.\nRewards: 5 XP. Aldric arrives just after.\nFallen (0 HP): Aldric arrives to finish the fight. 1 HP and one exhaustion."},{"type":"info","text":"**ADD TO INVENTORY — DRAGON ARMY PATROL SKETCH**\nFrom the detained draconian: a hide map of patrol routes. Show this to Caeron: +1 bonus to the Scene 52 defensive position check."}],"choices":[{"letter":"A","text":"Report the scout to Caeron.","target":"44","points":{"CROWN":1}},{"letter":"B","text":"Continue to the refugee camp immediately.","target":"44","points":{"SWORD":1}}]},"44":{"id":"44","title":"THE REFUGEE COLUMN","location":"","prose":["*South Road — Day of Exercise*","The waystation is the skeleton of a building — three walls standing, the fourth a pile of useful stone. Thirty-one people in a space meant for one night's passing have been here for three days. Three children. Eight elderly. A man with a barrel-stave splint.","When they see you, the able-bodied step forward and the children are moved to the back. Then the man with the splint tries to stand at attention when he sees the Solamnic tabard.","**IF VAEL IS IN YOUR PARTY:** Vael is already here. She scouted ahead and is standing very still at the edge of the column. 'I counted. Thirty-one. Three children. We have to do something.' Not a suggestion. A fact about who she is.","**IF SERA IS IN YOUR PARTY:** Sera has been scouting ahead. She gives you the tactical picture: patrol distances, terrain cover, the window you have. 'You have about four hours,' she says. 'Use them.' +1 to the Perception roll."],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Perception (+2) | WIS | DC 13\n**SUCCESS (roll 13+):** Scout still half a mile back. All options available without time pressure.\n**FAILURE (roll 1-12):** Patrol is closer than you thought. Options B and C cost one extra round.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**OPTIONAL SCENE — THE WAYSTATION**\nThere is someone inside who should not be here. Turn to Scene 18 (The Stranger in the Barn)."},{"type":"info","text":"**OPTIONAL NIGHT SCENE — SCENE 34B**\nIf you met Sera in Scene 3B: turn to Scene 34B now."}],"choices":[{"letter":"A","text":"Report and wait for garrison orders.","target":"31","points":{"CROWN":2}},{"letter":"B","text":"Move them north yourself, now.","target":"51","points":{"ROSE":2,"SWORD":1}},{"letter":"C","text":"Set a defensive position. Hold scouts while they move.","target":"52","points":{"SWORD":2,"ROSE":1}},{"letter":"D","text":"Find Caeron first.","target":"31","points":{"ROSE":2,"CROWN":1}},{"letter":"E","text":"What the scouts found before the march (Scene 34B)","target":"34B","points":{}},{"letter":"F","text":"Explore the old ruins nearby (Scene 44B)","target":"44B","points":{}},{"letter":"G","text":"A boy in a blue coat by the road (Scene 45B — optional)","target":"45B","points":{}},{"letter":"H","text":"The Waystation — someone is inside who should not be here (Scene 18)","target":"18","points":{}}]},"44B":{"id":"44B","title":"THE OLD RUINS","location":"","prose":["*South Road — Between the Column and the March, Day 2*","There is a ruin on the ridge that the garrison maps mark as 'Solamnic watchtower (inactive).' The walls are chest-high. The archway is intact. Someone carved Est Sularus oth Mithas into the keystone at a date you can identify by the letter forms as pre-Cataclysmic.","Inside: grass growing through flagstones. A fire pit long cold. And carved into the inner wall at about knee height, a child's handprint in mud, dried hard. Someone sheltered here on the way north. Someone very young left their mark because that is what very young people do when they are in a place they will not come back to."],"boxes":[{"type":"info","text":"**Paladin Note:**\nThe Est Sularus oth Mithas carved in the keystone warms when you pass under the archway. Not the stone — the words themselves. Mark 1 tally under PALADINE or KIRI-JOLITH."},{"type":"roll","text":"**OPTIONAL ROLL:** History (INT) (+0) | INT | DC 13\n**SUCCESS (roll 13+):** This was a Solamnic chapter house. Before the Cataclysm, one of hundreds. Now it is grass and stone and the handprint of a child.\n**FAILURE (roll 1-12):** Old ruin. Old words."}],"choices":[{"letter":"A","text":"Touch the handprint.","target":"44","points":{"ROSE":1}},{"letter":"B","text":"Read the keystone aloud.","target":"44","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"Make camp here for the night.","target":"44","points":{"ROSE":1}}]},"45":{"id":"45","title":"THESSALY IN THE FIELD","location":"","prose":["*South Road*","Thessaly moves through the exercise area with practiced near-invisibility. She has her notebook inside her jacket rather than out. She is watching everything and taking no notes yet."],"boxes":[],"choices":[{"letter":"A","text":"Brief her on the refugees.","target":"44","points":{"ROSE":1}},{"letter":"B","text":"Ask her to observe only — do not report yet.","target":"44","points":{"CROWN":1}}]},"45B":{"id":"45B","title":"THE BOY WITH THE BLUE COAT","location":"","prose":["*South Road — The Refugee Camp, Evening (if Mira is in your party)*","His name was Aldren. He was eleven years old and he had a blue coat with brass buttons. He was the one who kept the other children calm during the march. The infection moved faster than she expected. She did everything correctly. She did not have the medicines she would have had in a proper infirmary. In the morning he was gone.","Mira is sitting outside the camp. She is not crying. She is somewhere past crying — the place where grief becomes a very quiet, very heavy thing that does not make noise."],"boxes":[{"type":"info","text":"**CONDITIONAL SCENE — Mira must be in your party.**"},{"type":"roll","text":"**OPTIONAL ROLL:** Medicine (WIS) (+1) | WIS | DC 11\n**SUCCESS (roll 11+):** She needs witness: someone to simply confirm that what happened was real and that it mattered. Ask his name. That is the correct thing.\n**FAILURE (roll 1-10):** She is in pain and very still."}],"choices":[{"letter":"A","text":"Stay beside her until she is ready to move.","target":"46","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"'You did everything right. This was not your failure.'","target":"46","points":{"ROSE":1}},{"letter":"C","text":"Ask her his name. Make her say it aloud.","target":"46","points":{"ROSE":2},"romance_flame":true}]},"46":{"id":"46","title":"THE DECREE STANDS","location":"","prose":["*South Road Camp*","The refugees are escorted south. The man with the splinted leg is helped by one of the escort soldiers who does not look at him while doing it. The children do not fully understand what is happening."],"boxes":[{"type":"info","text":"**Consequence:** If Mira is in your party, she leaves quietly that evening."},{"type":"info","text":"**FIGHTER — MEASURE SUBPLOT**\nFighters turn to Scene M2 (The Wrong Order) now."}],"choices":[{"letter":"A","text":"You obeyed the law. You will live with that.","target":"53","points":{"CROWN":3}},{"letter":"B","text":"You will never make that choice again.","target":"53","points":{"ROSE":1}},{"letter":"C","text":"Fighter: The Measure subplot continues (Scene M2 — The Wrong Order)","target":"M2","points":{}}]},"M2":{"id":"M2","title":"THE WRONG ORDER","location":"","prose":["*Field Camp — During the Refugee Crisis (Fighter Only)*","You have seen the decree enforced. You have your choice on record. Now you have six hours before the column moves and Ser Aldous has found you at the camp perimeter. He is not here to debrief you. He looks, if anything, like he has been thinking very hard about something he should have said years ago.","'I want to ask you something,' Aldous says. 'Not as a senior officer. As a man who got this wrong once. What do you do when the Measure is clear and the order contradicts it?' He waits. He wants your answer, not the textbook one."],"boxes":[{"type":"info","text":"**FIGHTER ONLY**\nThis scene occurs alongside Scene 46 (The Decree Stands). Paladins: you have the divine scenes instead — skip to Scene 47."},{"type":"info","text":"**THE MEASURE: THE MEASURE ON UNJUST ORDERS**\nEst Sularus oth Mithas. My honour is my life. The Measure is explicit: a decree that requires acting against innocents is an improper decree and a Knight is not bound by it — but must be prepared to defend that judgment at tribunal. This is not the easy clause. It puts the burden of judgment on the individual Knight in the exact moment when the individual Knight is most afraid."}],"choices":[{"letter":"A","text":"'You follow the Measure. That is the point of it. The order is wrong and the Measure says so.'","target":"M2_measure","points":{}},{"letter":"B","text":"'You follow the order and argue at tribunal. The moment of conflict is not the time to make policy.'","target":"M2_order","points":{}},{"letter":"C","text":"'You try to find a path that satisfies both. The 24-hour delay, the technical argument. You use the law against itself.'","target":"M2_clever","points":{}}]},"M2_measure":{"id":"M2_measure","title":"THE MEASURE IS CLEAR","location":"","prose":["*Field Camp*","Aldous is quiet for a long time. Then: 'I got it wrong the first time. I followed the order. The village is not there anymore.' He looks at you. 'The Measure gave me the answer. I chose the safer path anyway. I have had a long time to understand why that was wrong. You worked it out in one conversation.' He stands. 'You will be a good knight. What matters now is making sure the good is worth the trouble it causes.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +3**"}],"choices":[{"letter":"A","text":"Continue to Scene 47.","target":"47","points":{}}]},"M2_order":{"id":"M2_order","title":"DEFENSIBLE","location":"","prose":["*Field Camp*","'Defensible,' Aldous says. 'Not right. Defensible.' He does not push further. He does not need to. You know the difference and he knows you know. The conversation ends there and you carry the word defensible with you for the rest of the exercise, testing things against it, checking whether what you are about to do is merely defensible or actually correct."],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +1**"}],"choices":[{"letter":"A","text":"Continue to Scene 47.","target":"47","points":{}}]},"M2_clever":{"id":"M2_clever","title":"USING THE LAW","location":"","prose":["*Field Camp*","'Sometimes correct,' Aldous says. 'Know when it isn't.' He lets that sit. Then: 'The people who use the law against itself are necessary. They are also the ones who eventually find a case where the clever solution does not exist and they have to make the same choice you avoided making. Know which kind of case that was. Know it before you need to.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +2**"}],"choices":[{"letter":"A","text":"Continue to Scene 47.","target":"47","points":{}}]},"47":{"id":"47","title":"CAERON'S PRIVATE ANSWER","location":"","prose":["*South Road Camp*","'No. I do not believe it is right.' He does not look at you when he says this. 'It is, however, the law. And I am bound by the law I swore to serve.' A pause. 'I am telling you this because I think you should know where I actually stand.'"],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nHis eyes hold yours one second longer than the conversation requires."}],"choices":[{"letter":"A","text":"'Then find a way to do both.'","target":"49","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"'I respect the honesty.'","target":"31","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"'What would you do if you were a squire right now?'","target":"49","points":{"ROSE":2}}]},"48":{"id":"48","title":"REFUSAL","location":"","prose":["*South Road Camp*","You say the word. In the careful language of the Measure, clearly, to Lord Caeron's face: No. The refugees are not turned back."],"boxes":[{"type":"info","text":"**Consequence:** +3 ROSE. Formal reprimand. The refugees live. Aldric looks at you differently."}],"choices":[{"letter":"A","text":"Accept the reprimand without argument.","target":"53","points":{"CROWN":1}},{"letter":"B","text":"Tell Caeron privately you would do it again.","target":"53","points":{"ROSE":2}}]},"49":{"id":"49","title":"THE 24-HOUR WINDOW","location":"","prose":["*South Road Camp*","The delay buys a day. By the time the argument is over, the refugees have been given directions north. They move through the night."],"boxes":[],"choices":[{"letter":"A","text":"File the assessment and say nothing more.","target":"53","points":{"CROWN":1}},{"letter":"B","text":"Make sure Caeron knows exactly what you did and why.","target":"53","points":{"ROSE":1,"CROWN":1}}]},"50":{"id":"50","title":"SERATH IN THE MORNING","location":"","prose":["*South Road Camp*","Just before dawn, Serath tells you three things about the Blue Wing's plans — specific things that can only come from someone recently inside the command structure."],"boxes":[{"type":"info","text":"**Intelligence Gained:** Dragon Army timeline on the north road is two days earlier than garrison estimates. The Blue Wing has orders to take Vogler before moving to Kalaman."}],"choices":[{"letter":"A","text":"Thank them formally.","target":"53","points":{"ROSE":1}},{"letter":"B","text":"Ask what they want in return. 'Nothing,' they say.","target":"53","points":{"ROSE":1}}]},"51":{"id":"51","title":"MOVING THE COLUMN","location":"","prose":["*South Road*","You get everyone moving. Aldric takes the rear. You take point. Three miles north you hear the patrol behind you."],"boxes":[{"type":"combat","text":"**COMBAT ENCOUNTER — REARGUARD ACTION**\nHold 3 Baaz Draconians and 1 Human Corporal for 3 rounds while refugees move ahead.\n**ENEMIES:**\n• Baaz Draconian x3: AC 13, HP 18 each.\n• Human Soldier (Corporal): AC 14, HP 16. Longsword +4 1d8+2. Tactical Command: one draconian gets +2 to its next attack.\nEnemy Tactics: Corporal hangs back with crossbow. After 3 rounds a recall horn sounds.\nRewards: 20 XP. Column is clear.\nFallen (0 HP): Column is safe. Aldric stabilised you. 1 HP, one exhaustion."}],"choices":[{"letter":"A","text":"Proceed to Scene 53.","target":"53","points":{}}]},"52":{"id":"52","title":"THE DEFENSIVE POSITION","location":"","prose":["*Waystation*","You organise the waystation into a defensible position. The patrol probes twice and pulls back.","*End of Act Two.*"],"boxes":[{"type":"info","text":"**Outcome:** Refugees safe. You take 1d6 damage (roll or take 3). +2 SWORD."}],"choices":[{"letter":"A","text":"Proceed to Scene 53.","target":"53","points":{}},{"letter":"D","text":"Paladin: before continuing, turn to Scene P2.","target":"P2","points":{}}]},"P2":{"id":"P2","title":"THE CHAPEL VISION","location":"","prose":["*Castle Brightholm — Old Chapel, Night*","You cannot sleep. The old chapel of the garrison is not the official chapel — the official one is clean and regularly used. This one is behind the armoury, half the roof gone, grass growing through the floor stones. The garrison uses it for storage now. But the altar is still there, uncovered, and the stone that was once the offering bowl is still the shape of a bowl.","You did not mean to come here. You were walking and ended up here. That is different from choosing.","You sit in front of the altar for a while. Nothing happens. Then you put your hand in the offering bowl — an absurd thing to do, and you do not know why you do it — and the stone is warm. Not the warmth of stone that has been sitting in an enclosed space. Warm like something living.","You speak aloud. You have not decided to do this — it simply happens. You say: 'Who are you?' No answer in words. But the warmth in your chest becomes, briefly, the specific warmth of something smiling. Then it fades to ordinary stone temperature and you are alone again.","You think about what kind of warmth that was:","The Dragon Army is confirmed within twenty miles. The formal Trials are accelerated. Scenes 53-70 cover the crisis, the condensed Trials, and the road south to Vogler. You gain Level 3 at Scene 61. Paladins: Paladin Scene P3 is in Act Three."],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nThis scene occurs the night before the formal Trials begin. Fighters: proceed directly to Scene 53 after Scene 51 or 52."},{"type":"divine","text":"**DIVINE SIGN**\nThe warmth travels up your arm and settles behind your sternum. Not painful. Not frightening. It feels like: the moment before you speak the correct answer to something important. Certainty that has not yet found words. The stone is warm and the grass is still growing through the floor and the stars are visible through the broken roof and you understand, in the part of you below language, that you are not alone in this room."}],"choices":[{"letter":"A","text":"The warmth of law and order — a gentle judge's certainty, high and patient.** Mark 1 tally: PALADINE.","target":"53","points":{"ROSE":1}},{"letter":"B","text":"The warmth of a forge before battle — practical, purposeful, directed.** Mark 1 tally: KIRI-JOLITH.","target":"53","points":{"SWORD":1}},{"letter":"C","text":"The warmth of a healer's hands — soft, focused on what hurts.** Mark 1 tally: MISHAKAL.","target":"53","points":{"ROSE":1}},{"letter":"D","text":"The warmth of sunlight through trees — wide, un-directed, alive.** Mark 1 tally: HABBAKUK.","target":"53","points":{"ROSE":1}},{"letter":"E","text":"The warmth of music heard from another room — joyful, reaching, optimistic.** Mark 1 tally: BRANCHALA.","target":"53","points":{"ROSE":1}},{"letter":"F","text":"You cannot read it. The warmth was just warmth. Mark nothing.","target":"53","points":{"CROWN":1}}]},"53":{"id":"53","title":"THE NEWS ARRIVES","location":"","prose":["*Castle Brightholm — Great Hall, Night*","Three bells at midnight — the signal everyone knows and hopes never to hear at this hour. The rider is at the back being given water. Lord Caeron is at the front with the dispatch. He reads it through twice. In the moment before he turns, before he chooses his expression, you see what is underneath it. Then he turns. 'The Dragon Army's Blue Wing has been confirmed south of Lake Akh-Tiel. Approximately two thousand. Moving north. Three days from Vogler. Possibly two.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Composure (WIS Save) (+1) | WIS | DC 11\n**SUCCESS (roll 11+):** Your face stays neutral. Caeron holds your gaze a half-second longer. +1 CROWN.\n**FAILURE (roll 1-10):** Something crosses your expression. No penalty, but it was seen."}],"choices":[{"letter":"A","text":"Go to your companions.","target":"54","points":{"ROSE":1}},{"letter":"B","text":"Stay for the full briefing.","target":"55","points":{"CROWN":1}},{"letter":"C","text":"Find Thessaly.","target":"56","points":{"ROSE":1}},{"letter":"D","text":"Find Aldric.","target":"57","points":{"ROSE":1},"romance_flame":true},{"letter":"E","text":"Something is wrong about the timing. Find out who knew first.","target":"53B","points":{"ROSE":1,"CROWN":1}},{"letter":"F","text":"Find Tariel, if present.","target":"53D","points":{"ROSE":1}},{"letter":"G","text":"Find Lysander, if present.","target":"53E","points":{"SWORD":1}},{"letter":"H","text":"Mira tends to the wounded Commander (Scene 54B)","target":"54B","points":{}}]},"53B":{"id":"53B","title":"THE SOURCE","location":"","prose":["*Castle Brightholm — Records Room, Night After the News*","Thessaly finds you an hour after Caeron's briefing. She has been in the records room and her face has the specific quality it gets when she has found something she did not want to find.","The Dragon Army knew the refugees were on the south road before the patrol found them. The dispatch pouch from the patrol — if you kept it — contains a reference code that matches a garrison communication cipher. The Blue Wing had intelligence on the garrison's movements. Current intelligence. Not intercepted — given.","Thessaly lays it out carefully: the timing, the cipher reference, the two officers who had access to that level of communication. One is dead — killed in the ambush on the south road. The other is Ser Aldous.","There is another possibility Thessaly offers, quietly: the cipher reference could have been planted to implicate Aldous. By the Dragon Army, if they knew his history with that village. If someone wanted a trusted garrison mentor removed. She does not know which is true. She has given you everything she has."],"boxes":[{"type":"info","text":"**DARK SCENE — BETRAYAL**\nSer Aldous, who told you about the village he could not save. Who mentored you on the Measure. Thessaly's evidence is circumstantial but strong. What you do with this is yours to decide. Caeron does not know yet."},{"type":"roll","text":"**ROLL REQUIRED:** Investigation (INT, proficiency if trained) (+3) | INT | DC 14\n**SUCCESS (roll 14+):** The cipher reference uses a secondary field code, not the primary garrison cipher. A traitor using the primary code would be caught by standard security sweeps. Using the secondary requires counter-intelligence knowledge — this narrows the suspect list significantly and rules out the obvious names.\n**FAILURE (roll 1-13):** The evidence is what Thessaly described. You cannot evaluate it further without more information.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Take the evidence to Lord Caeron immediately. Let the command structure decide.","target":"54","points":{"CROWN":2}},{"letter":"B","text":"Confront Aldous directly, alone, before going to Caeron. Give him the chance to explain.","target":"53C","points":{"ROSE":2}},{"letter":"C","text":"Tell no one yet. Keep it between you and Thessaly and watch Aldous closely.","target":"54","points":{"ROSE":1,"SWORD":1}},{"letter":"D","text":"Destroy the evidence. Aldous has given you too much for this to be what it looks like.","target":"54","points":{"ROSE":1}}]},"53C":{"id":"53C","title":"ALDOUS ALONE","location":"","prose":["*Castle Brightholm — Chapel Steps, Night*","He is exactly where he always is late at night: the chapel steps, watching whatever hawk or star he watches when he cannot sleep. He sees you coming and he looks at what you are carrying — the papers — and something in his face shifts. Not guilt. Something more complicated.","He is quiet for a long time after you show him. Then: 'I did not give them information about the refugees. I would tell you if I had. I have been honest with you about worse things than this.' He looks at the cipher reference. 'I know who used this code. And I know who had reason to make it look like me.'","He gives you a name. A garrison officer you know slightly — someone whose brother is a Dragon Army officer. Someone who has been sending private correspondence south. Someone Aldous has been watching for three weeks and has not yet had enough evidence to bring to Caeron."],"boxes":[{"type":"info","text":"**The Real Traitor**\nAldous was right. The officer is the source. If you went to Aldous first, you now have the actual name. You can bring this to Caeron with full context — but it means admitting you sat on Thessaly's evidence for a night before reporting it. Caeron will know. He will not say anything. He will remember."}],"choices":[{"letter":"A","text":"Take everything to Caeron immediately — Thessaly's evidence, Aldous's name, all of it.","target":"54","points":{"ROSE":2,"CROWN":1}},{"letter":"B","text":"Deal with the officer yourself, tonight, before Caeron is involved.","target":"54","points":{"SWORD":1}}]},"53D":{"id":"53D","title":"TARIEL AFTER THE NEWS","location":"","prose":["*Castle Brightholm — Map Room, Night (Conditional: Tariel in party)*","'Two thousand soldiers,' she says. 'Moving north. The garrison has — what — eighty? The decree sent thirty refugees south into their path. And the Order's response is to accelerate your Trials so you can ride to Vogler as a sworn squire rather than an unsworn one.' She looks at you. 'Does the title make your sword sharper?'","Then she opens the locket. A portrait. A young man in Dragon Army colours. Dark hair like hers. Her eyes.","'My brother,' she says. 'Aldren. He joined the Dragon Army because the Knights would not have him — wrong province, wrong politics, wrong family name. He tried to leave after Thresh. They do not let people leave. He is dead. Both institutions failed him. He was twenty-three.'","**CONVICTION CHOICE (Tariel Corruption Track — Debate 2):**","**ROMANCE CHOICE (optional — if at SPARK or higher):**"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Insight (+1) | WIS | DC 13\n**SUCCESS (roll 13+):** The locket portrait is recent. The grief is not old. The diplomatic observer role is a response. She is not your enemy. She is something more complicated.\n**FAILURE (roll 1-12):** She is grieving. The arguments are a form of grief."}],"choices":[{"letter":"A","text":"'Neither system killed your brother. People did. The Measure exists to hold those people accountable.'","target":"54","points":{"CROWN":1},"conviction":"remains"},{"letter":"B","text":"'I am sorry about Aldren. The Order should have been better. I intend to make it better.'","target":"54","points":{"ROSE":1},"conviction":"remains"},{"letter":"C","text":"'You are right. Both systems failed. I do not know what replaces them but I know they are not enough.'","target":"54","points":{"ROSE":1,"CROWN":-1},"conviction":"advances"},{"letter":"D","text":"'The Order can be reformed. Your brother's death is an argument for reform, not abandonment.'","target":"54","points":{"CROWN":2},"conviction":"improves"},{"letter":"R1","text":"'I am sorry about Aldren.' Name him. Touch her hand.","target":null,"points":{},"romance_flame":true},{"letter":"R2","text":"Maintain professional distance.","target":null,"points":{}}]},"53E":{"id":"53E","title":"LYSANDER'S TRUTH","location":"","prose":["*Castle Brightholm — Garrison Wall, Night (Conditional: Lysander in party)*","He tells you. The bridge. The refugees. The court-martial. The Knight who filed the court-martial was promoted to Commander.","He tells this story the way Aldous told his — flat, worn smooth. But where Aldous carries the weight as penance, Lysander carries it as evidence.","**CONVICTION CHOICE (Lysander Corruption Track — Experience 3):**","**ROMANCE CHOICE (optional — if at SPARK or higher):**"],"boxes":[],"choices":[{"letter":"A","text":"'File the appeal. I will speak on your behalf.'","target":"54","points":{"ROSE":1,"CROWN":1},"conviction":"improves"},{"letter":"B","text":"'The system that punished you is broken. It needs people like you inside it.'","target":"54","points":{"CROWN":1},"conviction":"remains"},{"letter":"C","text":"'They promoted the man who let people drown. I do not know how to defend that.'","target":"54","points":{"ROSE":1,"CROWN":-1},"conviction":"advances"},{"letter":"D","text":"'You did the right thing. The institution did the wrong thing. Both are true and I can hold both.'","target":"54","points":{"ROSE":2},"conviction":"QUESTIONING"},{"letter":"E","text":"'I want to believe the Order would have done differently if it knew.'","target":"54","points":{"ROSE":1},"conviction":"SHAKEN"},{"letter":"R1","text":"Put your hand on his arm.","target":null,"points":{},"romance_flame":true},{"letter":"R2","text":"Carry it with him through witness.","target":null,"points":{}}]},"54":{"id":"54","title":"TENDING THE COMPANIONS","location":"","prose":["*Castle Brightholm*","Aldric is in the armoury, re-checking equipment. Mira — if present — is doubling her medical supplies. Serath — if present — is watching the south road."],"boxes":[],"choices":[{"letter":"A","text":"Spend the time with Aldric.","target":"60","points":{"SWORD":1},"romance_flame":true},{"letter":"B","text":"Spend the time with Mira if present, otherwise train.","target":"60","points":{"ROSE":1}},{"letter":"C","text":"Sit with Serath if present.","target":"60","points":{"ROSE":1}}]},"54B":{"id":"54B","title":"MIRA TENDS SERATH","location":"","prose":["*Castle Brightholm — Infirmary, Night (NPC Cross-Talk — Conditional: both Mira and Serath present)*","You pass the infirmary and the door is ajar. Inside: Mira is re-dressing Serath's wound. Her hands move with certainty. She does not look at Serath's face while she works.","Serath is watching Mira's hands. Then the assessment becomes something else. They are watching someone who is kind to them without asking for anything.","Mira: 'What you did — leaving the army. That took a different kind of courage.' Serath: 'You are the first person who called it courage.'"],"boxes":[],"choices":[{"letter":"A","text":"Watch. Learn.","target":"60","points":{"ROSE":1}},{"letter":"B","text":"Enter. 'Is there anything you need?'","target":"60","points":{"ROSE":1}}]},"55":{"id":"55","title":"THE EMPTY HALL","location":"","prose":["*Castle Brightholm — Great Hall*","Everyone left. The hall emptied in the efficient way of a military institution responding to something real. You stayed. You are not entirely sure why — something in how he stood after everyone else left made going feel like the wrong thing to do. He is at the table now with the dispatch open again, reading it a third time or using it as somewhere to look. He hears you. Looks up. For one moment, before the composure reassembles, you see what is underneath the officer. He is thirty years old. He is afraid. He is very good at his job and that has not made this less frightening. 'You stayed,' he says. The two words carry at least three others.","You stay for a while. Not long — there is work to do and both of you know it. But a while. The dispatch is still open on the table. He does not close it. You do not ask him to. Some things you can only do if you do not make them into an act — if you just stand in the same room with someone who is carrying something heavy until they are ready to carry it into the next room."],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\n'I intend to conduct your Trials evaluation before we march — whatever comes after, you should have the thing you came here for.' He says this to his papers. You have never heard Caeron Ashvale ask for anything before."}],"choices":[{"letter":"A","text":"'I do. Thank you, my lord.'","target":"60","points":{"CROWN":2},"romance_flame":true},{"letter":"B","text":"'What about you? What do you want?'","target":"59","points":{"ROSE":2}},{"letter":"C","text":"Stand beside him at the table. Look at the dispatch together. Say nothing.","target":"59","points":{"ROSE":2},"romance_flame":true}]},"56":{"id":"56","title":"THESSALY'S INFORMATION","location":"","prose":["*Castle Brightholm*","Thessaly finds you in the map room an hour after the briefing. She has been busy since — ink on her hands, the look of someone who has been writing fast and stopping to think. She lays it out: the Dragon Army has a specific objective in Vogler. Not only the supply route. Something in the village — or someone. She has narrowed it to two possibilities and cannot narrow it further. 'I wanted you to know before we march,' she says. 'Because you are riding toward it whether you know what it is or not.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** History (INT, proficiency if trained) (+3) | INT | DC 13\n**SUCCESS (roll 13+):** Vogler is on Lake Akh-Tiel — the only navigable route between the southern Solamnic coast and the northern fortresses that does not require mountain passes. Whoever controls Vogler controls that supply line for the whole northern campaign. The Dragon Army does not need something in the village. They need the village itself.\n**FAILURE (roll 1-12):** The strategic value is military. You cannot narrow it further.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Take this to Caeron immediately.","target":"60","points":{"CROWN":1,"ROSE":1}},{"letter":"B","text":"Keep it between you for now.","target":"60","points":{"ROSE":1}},{"letter":"C","text":"Stay. There is something else between you tonight.","target":"56B","points":{"ROSE":1}}]},"57":{"id":"57","title":"ALDRIC IN THE ARMOURY","location":"","prose":["*Castle Brightholm*","He is sharpening his sword for the third time tonight. You can tell it is the third time because the blade has the particular high shine of something worked past the point of usefulness by someone who needed something to do with their hands. He looks up when he hears you.","The armoury is quiet. Tallow candles, low. Somewhere down the corridor someone is walking fast and then stopping, then fast again — the sound of a garrison trying to be ready for something it cannot fully prepare for. After a while Aldric sets the whetstone down. 'Whatever Order claims you,' he says, 'I am glad you were here this year.'"],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nHe hands you a leather wrist guard — his, slightly worn. 'Fits better than yours,' he says. He is not looking at you."},{"type":"info","text":"**CONDITIONAL — IF YOU READ SCENE 53B CHOICE B**\nIf in Scene 53B you chose option B (implicating Aldric): before your choice below, turn to Scene 58B (What Aldric Did) now."}],"choices":[{"letter":"A","text":"Take it. 'Thank you.'","target":"60","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"'You will want it back when this is over.' 'Maybe,' he says.","target":"60","points":{"ROSE":1,"SWORD":1}},{"letter":"C","text":"If you implicated Aldric in Scene 53B: see what happened (Scene 58B)","target":"58B","points":{}}]},"58B":{"id":"58B","title":"WHAT ALDRIC DID","location":"","prose":["*Castle Brightholm — Storeroom, Night Before Trials*","Aldric finds you before you find him. He looks like someone who has done something and cannot undo it and has not decided yet whether he should try.","He found the officer. The one Aldous named. He followed him to the storeroom where the private correspondence was hidden. And then — Aldric does not describe this part clearly, and you do not push him — something happened. The officer is alive. He is going to stay alive. He is also, currently, unconscious, bound, and in the storeroom, and Aldric hit him harder than he meant to and then harder than that and then stopped himself and he does not know what to do with what stopping himself felt like.","He looks at you. He is not asking for absolution. He is asking whether he is still the person he thought he was. He does not know yet. He wants you to help him figure it out."],"boxes":[{"type":"info","text":"**CONDITIONAL DARK SCENE**\nThis scene occurs if Aldric is in your party AND you chose Option B in Scene 53B (watched the suspected traitor rather than reporting)."},{"type":"info","text":"**MORAL WEIGHT**\nAldric did not kill him. He stopped. That matters. But he also crossed a line the Measure is very clear about. The officer is a traitor. Aldric's anger was not wrong. His method was. Both of these are true at the same time."},{"type":"roll","text":"**OPTIONAL ROLL:** Medicine (WIS, proficiency if trained) (+1) | WIS | DC 12\n**SUCCESS (roll 12+):** His knuckles are split and his breathing is slightly elevated — not from exertion but from the controlled effort of not shaking. He stopped himself mid-action. That kind of stop leaves a specific mark: not guilt about what he did but the physical memory of choosing not to continue. He is more in control of himself than he believes. Tell him this.\n**FAILURE (roll 1-11):** He is in distress. The specific detail of his emotional state is not readable.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Report everything to Caeron — the officer, Aldric's actions, all of it. Aldric faces a formal reprimand. The traitor is imprisoned.","target":"60","points":{"CROWN":2}},{"letter":"B","text":"Report the officer. Say Aldric found him and subdued him in the line of duty. The rest is not said.","target":"60","points":{"SWORD":1}},{"letter":"C","text":"Tell Aldric: 'You stopped. That is the part that matters.' Then go wake Caeron together.","target":"60","points":{"ROSE":2}}]},"59":{"id":"59","title":"WHAT CAERON CANNOT SAY","location":"","prose":["*Castle Brightholm — Great Hall*","'I became a knight because the world requires people willing to stand in front of the bad things. I have been wondering for some time whether I am still that person.' A pause. 'You make me think that I might be.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 15\n**SUCCESS (roll 15+):** He said 'still' — present tense. This is not a past doubt: it is active. Lord Caeron Ashvale does not know if he has what this moment requires. He told you because he trusts you with it. ROMANCE FLAME Caeron activates immediately if you respond without trying to reassure him.\n**FAILURE (roll 1-14):** He is speaking honestly but opaquely. The layer beneath the words is not clear.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"'You are.'","target":"60","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"'Show me at Vogler.'","target":"60","points":{"ROSE":1,"SWORD":1}},{"letter":"C","text":"Paladin: something pulls you to the south field tonight. Turn to Scene P3 before Scene 60.","target":"P3","points":{}}]},"60":{"id":"60","title":"THE ACCELERATED TRIALS","location":"","prose":["*Castle Brightholm — Great Hall, Dawn*","The day of the Trials begins before dawn. No ceremony — there is no time for it. But someone has lit the chapel candles anyway, all of them, and left them burning without explanation.","Stripped of the usual ritual, the day has a different weight — denser, more honest. Physical evaluation. Combat assessment, Aldric as your opponent. Written Measure examination. An oral panel: Caeron, Aldous, and two senior knights whose names you have never learned because they have been here for thirty years and no longer need names so much as presence.","**IF SERA IS IN YOUR PARTY:** Sera is not in the hall for the Trials — she is on the armoury roof again, where she was the first time you saw her. She watches the sparring bout from above. After, when you pass the armoury, there is a folded note on the step: 'Your footwork gap is fixed. Your guard on the right needs work. I will show you on the road. — S.' This is the most she has ever written to you.","**Final Oral Question:** 'Name the highest principle of the Solamnic Knighthood.'"],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Athletics (Sparring Bout) (+3) | STR | DC 15\n**SUCCESS (roll 15+):** You disarm Aldric on the third pass. +2 SWORD. The panel leans forward.\n**FAILURE (roll 1-14):** Aldric takes the bout. +1 SWORD — they evaluate effort, not only outcome.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"roll","text":"**ROLL REQUIRED:** History / Religion (Written Measure Exam) (+0) | INT | DC 14\n**SUCCESS (roll 14+):** Your responses are precise and occasionally surprising. Aldous underlines one answer twice. +2 ROSE. (Paladins: your answer on divine duty is unexpectedly sophisticated.)\n**FAILURE (roll 1-13):** Solid, correct, conventional. +1 ROSE.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**TONIGHT — BEFORE SCENE 61**\nThe Oath is tomorrow. Tonight is the last night before everything changes. • PALADINS on the DG track: turn to Scene DG3 (The Crown) now. • FIGHTERS on the Measure track: turn to Scene M3 (Two Oaths) now. M3 leads to M4, then return to Scene 62."}],"choices":[{"letter":"A","text":"'Est Sularus oth Mithas. My honour is my life.'","target":"61","points":{"CROWN":2}},{"letter":"B","text":"'The protection of the innocent, from which all other laws derive.'","target":"61","points":{"ROSE":3}},{"letter":"C","text":"'Courage in the face of darkness, maintained even when the outcome is uncertain.'","target":"61","points":{"SWORD":2}},{"letter":"D","text":"Fighter: The Measure — Two Oaths (Scene M3)","target":"M3","points":{}},{"letter":"E","text":"Paladin on DG track: The Crown (Scene DG3)","target":"DG3","points":{}}]},"P3":{"id":"P3","title":"THE TEST","location":"","prose":["*Castle Brightholm — South Field, Night Before Trials*","The south field is empty and dark. You are here because something pulled you — the same wordless pull that brought you to the old chapel. You are getting used to following it. You are not sure this is wise.","There is a figure in the field. Not human — or not entirely. It has the general shape of a person standing very still in the darkness, but the details do not resolve cleanly. It does not threaten. It waits.","It speaks. One question. Simple. Unanswerable by anyone who has not thought about it very carefully:","The figure waits. It is genuinely asking. This is not a test with a wrong answer — it is a test to see if you have an answer at all, and whether it is yours."],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nFighters: proceed directly to Scene 60."},{"type":"divine","text":"**DIVINE SIGN**\n'You have power that most people in this age do not possess. It came to you through something vast and old that has been watching you since before you knew it was there. The question is not whether you will use it. You will. The question is: for whom?'"}],"choices":[{"letter":"A","text":"'For the innocent. For those who cannot protect themselves.'** Mark 1 tally: PALADINE or MISHAKAL .","target":"P3a","points":{"ROSE":2}},{"letter":"B","text":"'For those who fight beside me. For the line that holds.'** Mark 1 tally: KIRI-JOLITH.","target":"P3b","points":{"SWORD":2}},{"letter":"C","text":"'For the living things that have no voice in the decisions made about them.'** Mark 1 tally: HABBAKUK.","target":"P3c","points":{"ROSE":1,"SWORD":1}},{"letter":"D","text":"'For the possibility that the world can be better than it is.'** Mark 1 tally: BRANCHALA or PALADINE .","target":"P3d","points":{"ROSE":2}},{"letter":"E","text":"'I do not know yet. I am still becoming the person who will know.'** Mark nothing.","target":"P3e","points":{"ROSE":1,"CROWN":1}}]},"P3a":{"id":"P3a","title":"THE TEST — RESPONSE","location":"","prose":["The figure is still for a long time. Then: 'Good. That answer holds.' It does not say whose answer it is. It does not need to. It was already there when you started speaking.","Award: +2 ROSE. Proceed to Scene 60."],"boxes":[],"choices":[{"letter":"A","text":"Continue to the Trials.","target":"60","points":{}}]},"P3b":{"id":"P3b","title":"THE TEST — RESPONSE","location":"","prose":["The figure's stillness changes quality — something in it settles, like a weapon lowered rather than sheathed. 'That is the answer of a soldier. There is no higher one.' It steps back and is not there anymore.","Award: +2 SWORD. Proceed to Scene 60."],"boxes":[],"choices":[{"letter":"A","text":"Continue to the Trials.","target":"60","points":{}}]},"P3c":{"id":"P3c","title":"THE TEST — RESPONSE","location":"","prose":["The figure turns its head as if listening to something you cannot hear. Then: 'There are more things alive in this world than have names. It is good to remember them.' Warmth. Brief. Gone.","Award: +1 ROSE +1 SWORD. Proceed to Scene 60."],"boxes":[],"choices":[{"letter":"A","text":"Continue to the Trials.","target":"60","points":{}}]},"P3d":{"id":"P3d","title":"THE TEST — RESPONSE","location":"","prose":["The figure makes a sound that might be music if it were louder. 'That is the most difficult answer,' it says. 'It requires you to keep hoping.' A pause. 'Do not stop.'","Award: +2 ROSE. Proceed to Scene 60."],"boxes":[],"choices":[{"letter":"A","text":"Continue to the Trials.","target":"60","points":{}}]},"P3e":{"id":"P3e","title":"THE TEST — RESPONSE","location":"","prose":["The figure is still for a long time. Then, quietly: 'Most people never ask the question. You asked it. That is enough for now.' It is gone when you blink.","Award: +1 ROSE +1 CROWN. Proceed to Scene 60."],"boxes":[],"choices":[{"letter":"A","text":"Continue to the Trials.","target":"60","points":{}}]},"DG3":{"id":"DG3","title":"THE CROWN","location":"","prose":["*Castle Brightholm — Night Before the Oath (Paladin Only)*","You are alone in the old chapel. The official ceremony is tomorrow. You have been sitting here for an hour with your hands on your knees trying to remember why you started. The voice does not whisper tonight. It speaks clearly, quietly, with the tone of someone who believes they are offering something genuinely good.","This is the most sophisticated temptation yet. It is not asking you to be evil. It is asking you to believe the ends justify the means and that you are wise enough to navigate the result. It might even be true. That is what makes it the worst one."],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nOnly triggers if you are LISTENING, COMPROMISED, or FALLEN on the DG track. If you are HELD FIRM throughout: skip to Scene 61 — you will receive your gift there instead."},{"type":"dark","text":"**DARK TEMPTATION — TAKHISIS SPEAKS PLAINLY**\nTomorrow they give you an Order. Rose, Sword, Crown — their little hierarchy of virtue. I offer you something they cannot. Not a rank. A purpose. The Dragon Armies will reshape this world. Every Solamnic Knight who rides against them will die for a structure that cannot hold. But a Knight who rides with me — a Knight who carries both edges — could change everything. Not a traitor. A bridge. You know how to hold two truths. I am asking you to hold this one: the light and the dark, working through the same hands."}],"choices":[{"letter":"A","text":"No. The oath is not a strategy. It is what you are.","target":"DG3_purified","points":{}},{"letter":"B","text":"You are tempted — but you pull back. You spend the night in prayer.","target":"DG3_resist","points":{}},{"letter":"C","text":"You accept. The bridge metaphor is genuinely compelling.","target":"DG3_fall","points":{}}]},"DG3_purified":{"id":"DG3_purified","title":"THE PURIFICATION","location":"","prose":["*Castle Brightholm — Old Chapel, Night Before the Oath*","You say no so clearly that the voice does not just leave — something cleanses. Whatever had been accumulating — the listening, the delay, the compromise — burns off in a single moment of absolute certainty. You know who you are. You know whose you are. Tomorrow the Oath will be the truest thing you have ever said."],"boxes":[{"type":"dg_track","text":"**DG TRACK: PURIFIED ✓✓**\nAll previous compromises cleared. Restore any reduced Lay on Hands pool. Restore frozen god tallies — add +1 to highest for this proof of faith. Proceed to DG_GIFT_PURE for your reward."}],"choices":[{"letter":"A","text":"Receive your gift.","target":"DG_GIFT_PURE","points":{}}]},"DG3_resist":{"id":"DG3_resist","title":"THE HARD RETREAT","location":"","prose":["*Castle Brightholm — Old Chapel, Night Before the Oath*","You pull back. It costs you — not just sleep. The cost is the admission that you were closer than you want to admit. You spend the night in prayer with the specific discomfort of someone who has seen themselves clearly and does not entirely like the view. By morning you are steady. Not clean — steady. That distinction matters. Steady is enough."],"boxes":[{"type":"dg_track","text":"**DG TRACK: PULLED BACK ✓**\nImproved state. Lay on Hands partially restored (+2 to pool). God tallies partially unfrozen. Proceed to DG_GIFT_SCARRED for your reward."}],"choices":[{"letter":"A","text":"Receive your gift.","target":"DG_GIFT_SCARRED","points":{}}]},"DG3_fall":{"id":"DG3_fall","title":"THE BRIDGE ACCEPTED","location":"","prose":["*Castle Brightholm — Old Chapel, Night Before the Oath*","You have convinced yourself. That is the part that will haunt you later — not that you were deceived but that you did the work yourself. The reasoning was so good. In the morning you take the Oath with the others. The words come out. They feel true. They feel true through something. Through something that is not quite you anymore."],"boxes":[{"type":"dg_track","text":"**DG TRACK: DEEPLY FALLEN ■■■■**\nThe Oath is taken. Its power continues to function. The source is no longer what you believe it is. • Lay on Hands heals 1 HP per use until DG4 is resolved. • Divine Smite functions. The radiance is violet-tinged. • Proceed to DG4 — The Reckoning is your next scene on the road to Vogler."}],"choices":[{"letter":"A","text":"Continue to Scene 61.","target":"61","points":{}}]},"DG_GIFT_PURE":{"id":"DG_GIFT_PURE","title":"THE GIFT OF STEADFAST FAITH","location":"","prose":["*Castle Brightholm — After the Oath Ceremony*","After the ceremony, after everyone else has gone, you find something on the chapel step. It was not there when you arrived. There is no note. You do not need one. The warmth in it is unmistakeable — the same warmth from P1, the same quality, made solid and given form. Your god has been watching. Your god is pleased."],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE UNBROKEN VOW**\n*Wondrous Item (Requires Attunement by a Paladin), Uncommon*\nA silver disc engraved with the words EST SULARUS OTH MITHAS on one side and a five-pointed star on the other. It is warm to the touch and has been since you found it.\n**Mechanics:** While attuned: your Lay on Hands pool increases by 5 HP. Once per long rest: when you or an ally within 10 ft. drops to 0 HP, you may use your reaction to immediately stabilise them and grant them 1 HP. Additionally, you have advantage on saving throws against fear effects.\n**Lore:** Given to a paladin who was tempted and did not bend."},{"type":"item","text":"**✦ MAGIC ITEM GAINED: OATH-KEEPER**\n*Weapon (Longsword), Requires Attunement by a Paladin, Rare*\nA longsword with a blade of white steel and a crossguard shaped like two wings folded in rest. The grip is wrapped in white leather that does not soil. The blade catches light and holds it a moment longer than it should.\n**Mechanics:** +1 bonus to attack and damage rolls. When you hit a fiend or undead, the target takes an extra 1d6 radiant damage. Once per long rest: on a hit, you may choose to maximise the damage rather than rolling. The sword does not glow on command — it glows when it judges the moment worthy.\n**Lore:** Forged in spirit and given form by an act of unbroken faith. In the main campaign, it will glow in the presence of Dragon Army officers who are genuinely conflicted about their service."},{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE VIGIL CLOAK**\n*Wondrous Item (Cloak), Requires Attunement by a Paladin or Knight, Rare*\nA deep blue-grey cloak with a silver clasp shaped like the Solamnic sun. It is heavier than it looks and does not blow in wind.\n**Mechanics:** +1 to AC. Advantage on saving throws against being magically moved or knocked prone. Once per long rest: when an ally within 30 ft. is targeted by an attack, you may use your reaction to impose disadvantage on that attack roll. Cannot be charmed or frightened while in direct sunlight.\n**Lore:** Given to a paladin who stood where they were supposed to stand and did not move."}],"choices":[{"letter":"A","text":"Continue to Scene 62.","target":"62","points":{}}]},"DG_GIFT_SCARRED":{"id":"DG_GIFT_SCARRED","title":"THE GIFT OF THE SCARRED FLAME","location":"","prose":["*Castle Brightholm or Vogler Road — After Pulling Back*","You do not find it placed with ceremony. It is simply in your hand at some point after — after the hard night of prayer, after the slow return. You are not entirely sure when it arrived."],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE SCARRED FLAME**\n*Wondrous Item (Requires Attunement by a Paladin), Uncommon*\nA pendant shaped like a flame with a crack through it, sealed with silver. The gold and violet in the metalwork are both deliberately visible — not hidden, acknowledged.\n**Mechanics:** Once per long rest: when you fail a saving throw against a charm or compulsion effect, you may reroll it with advantage. Proficiency in Insight checks when determining if a creature is deceiving you or acting under magical influence. Your Lay on Hands pool is fully restored.\n**Lore:** Given to a paladin who was tempted, bent toward the fall, and pulled back. The scar is not hidden because the gods of good do not hide their histories."}],"choices":[{"letter":"A","text":"Proceed to Scene 62.","target":"62","points":{}}]},"M3":{"id":"M3","title":"TWO OATHS","location":"","prose":["*Castle Brightholm — Night of the Oath Ceremony (Fighter Only)*","After the ceremony, after Caeron's sword and the words and Aldous in the corner, you find yourself standing outside the chapel with a very specific question you did not have before you took the oath. The oath says: honour the innocent, obey your commanding officer, serve the Order. But you have now seen, in three weeks of field exercise, two cases where those clauses are in direct conflict. Aldous finds you. Of course he does. 'You have questions,' he says. Not a question."],"boxes":[{"type":"info","text":"**FIGHTER ONLY**\nThis scene occurs on the night of Scene 61, after the ceremony. Paladins skip to Scene 62."},{"type":"info","text":"**THE MEASURE: THE MEASURE ON CONFLICTING OBLIGATIONS**\nThe Oath has three pillars: Rose (justice, compassion, wisdom), Sword (courage, battle, honour), Crown (law, loyalty, duty). The Measure does not rank them. This is intentional. It places the burden of adjudication on the Knight who must live with both the choice and its consequences."}],"choices":[{"letter":"A","text":"'When the three conflict, Rose takes precedence. A law that creates injustice has already broken the Oath.'","target":"M3_rose","points":{}},{"letter":"B","text":"'When the three conflict, Sword takes precedence — the person who holds the line protects the others.'","target":"M3_sword","points":{}},{"letter":"C","text":"'When the three conflict, Crown takes precedence — the structure must hold or nothing else can.'","target":"M3_crown","points":{}},{"letter":"D","text":"'I do not know yet. I think the answer is situational.'","target":"M3_balance","points":{}}]},"M3_rose":{"id":"M3_rose","title":"THE ROSE PATH","location":"","prose":["*Chapel Yard*","Aldous looks at you steadily. 'The Rose Knights have always said that. Most of them are right. Some of them have used it to excuse breaking every rule they found inconvenient. The difference is whether you actually know what justice requires or whether you just think you do.' A pause. 'You do. So far.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: ROSE orientation.**"}],"choices":[{"letter":"A","text":"Continue to Scene M4.","target":"M4","points":{}}]},"M3_sword":{"id":"M3_sword","title":"THE SWORD PATH","location":"","prose":["*Chapel Yard*","Aldous considers this. 'The Sword Knights have always said that too. And they are right: the person who does not hold their post creates the hole that everything else falls through. The question is what you do when holding your post requires injustice.' He looks at you. 'You have an answer. I can tell.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: SWORD orientation.**"}],"choices":[{"letter":"A","text":"Continue to Scene M4.","target":"M4","points":{}}]},"M3_crown":{"id":"M3_crown","title":"THE CROWN PATH","location":"","prose":["*Chapel Yard*","'The Crown Knights,' Aldous says. 'The institution has to survive for the ideal to survive — that argument has defended both the best decisions and the worst ones in Solamnic history. The difference is who is doing the reforming and from what motive.' He is quiet. 'You have the motive right. Keep it.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: CROWN orientation.**"}],"choices":[{"letter":"A","text":"Continue to Scene M4.","target":"M4","points":{}}]},"M3_balance":{"id":"M3_balance","title":"THE BALANCE PATH","location":"","prose":["*Chapel Yard*","Aldous is quiet for a long time. Then: 'That is the answer the Measure itself gives, if you read it carefully. The lack of ranking is intentional. It is asking every Knight to do the hardest thing: think. Every time. Even when you are tired.' He nods. 'Harder path. But a real one.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: BALANCE orientation.**"}],"choices":[{"letter":"A","text":"Continue to Scene M4.","target":"M4","points":{}}]},"61":{"id":"61","title":"THE OATH OF SQUIREHOOD","location":"","prose":["*Castle Brightholm — Chapel, Afternoon*","Caeron's sword is cold on your shoulder. The chapel smells of tallow and old stone and something you will later identify as the specific smell of commitment taking a permanent form. Aldric in the front row, jaw set. Thessaly with her notebook closed. Mira at the back if she is still here. Ser Aldous in the corner.","Caeron speaks the words of the Oath of Squirehood. When you rise, quiet enough for only you: 'Whatever Order claims you — you have earned this.'","*End of Act Three.*","You march south toward Vogler. Two more combat encounters await. Romance arcs reach their Oath moments. Paladins: Paladin Scene P4 — the Choosing — is in Act Four."],"boxes":[{"type":"info","text":"**You Are Now a Squire**\nTotal your Order points. The highest score determines which Order claims your oath."},{"type":"levelup","text":"**LEVEL UP — YOU ARE NOW LEVEL 3**\nFighter Level 3: Full Archetype activates. Paladin Level 3: Sacred Oath (Devotion, Ancients, or Vengeance). Channel Divinity: 2 uses/long rest. Spell slots increase to 3 first-level.\nNative PC — Fighter: HP +7 (total 26). Paladin: HP +6 (total 22)."},{"type":"info","text":"**ITEM GIVEN — ALDOUS'S COMPASS**\nA small brass compass, old, with a chip on the case. 'It has been wrong since 862,' he says. 'Points about twelve degrees west of north. I have used it my entire career and navigated correctly every time, because I knew to account for it.'"}],"choices":[{"letter":"A","text":"Paladin: The Choosing — your god speaks (Scene P4)","target":"P4","points":{}}]},"62":{"id":"62","title":"THE MARCH","location":"","prose":["*South Road — Day 1*","Brightholm disappears behind the first hill at the third mile. You watch the towers go until the hill takes them. Aldric rides beside you in the grey morning and says nothing, which is something — Aldric Voss does not ride in silence unless he is thinking something he has not yet decided whether to say.","After a long while: 'Whatever Order you got — I am not competing with you anymore.' He means: I will now be competing to be worthy of riding beside you, which is a different thing."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Perception (+2) | WIS | DC 12\n**SUCCESS (roll 12+):** Boot prints south of the verge — someone left the road in a hurry recently. Relevant in Scene 70.\n**FAILURE (roll 1-11):** The road looks clear."}],"choices":[{"letter":"A","text":"Laugh. 'That is the nicest thing you have said to me.'","target":"62D","points":{"ROSE":1},"romance_flame":true},{"letter":"B","text":"'Understood. Same.' Comfortable silence.","target":"62D","points":{"SWORD":1}},{"letter":"C","text":"'Race you to the ridge.'","target":"62D","points":{"SWORD":1}}]},"62D":{"id":"62D","title":"THE FIRST NIGHT ON THE ROAD","location":"","prose":["*South Road — Day 1, Evening Camp*","The first night out of Brightholm is the hardest. Not because of danger — the road is clear for eight miles — but because of what leaving means. The garrison towers were visible until the fifth mile, then the ridge took them. Brightholm is behind you.","Camp is set with garrison efficiency. The fire is regulation size, which means small and purposeful. You eat garrison rations: hard bread, dried meat, a cheese that has survived the march better than expected. Not good food. Adequate food, eaten in the company of people you have spent the most important weeks of your life with, which makes it the best food you have ever eaten.","**IF TARIEL IS IN YOUR PARTY:** She eats apart from the column. She has her notebook open. Once, she looks up and catches your eye. The moment lasts three seconds. She looks down first.","**IF LYSANDER IS IN YOUR PARTY:** He is not in the camp. He rides parallel, not with, the column. Visible occasionally at the treeline, then not visible."],"boxes":[{"type":"info","text":"**NPC CROSS-TALK — CAERON AND SERA**\nAt the edge of camp: Lord Caeron is speaking with Sera Nighthollow. Caeron's careful listening posture; Sera's clipped precision. When they finish, Caeron nods once. Sera glances at you briefly. Whatever she told him, it was about the road ahead."}],"choices":[{"letter":"A","text":"Walk the perimeter before sleeping.","target":"63","points":{"CROWN":1}},{"letter":"B","text":"Find your companions. Sit with them.","target":"63","points":{"ROSE":1}},{"letter":"C","text":"Watch the stars. Solinari is rising.","target":"63","points":{"ROSE":1}},{"letter":"D","text":"Train together as a group in the morning.","target":"BOND_TRAIN","points":{}},{"letter":"E","text":"Share a quiet meal together.","target":"BOND_MEAL","points":{}}]},"63":{"id":"63","title":"ALDRIC ON THE ROAD","location":"","prose":["*South Road*","'Do you know what I thought when the draconians hit us on the south road? I thought: good, she is here. Or he. Or they.' He glances over once and then back to the road. 'I was glad it was you. Not someone else. Not anyone else.'"],"boxes":[],"choices":[{"letter":"A","text":"'I was glad it was you too.'","target":"64B","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"'You fight well.'","target":"64B","points":{"SWORD":1}},{"letter":"C","text":"Continue riding south in silence (Scene 64)","target":"64","points":{}}]},"64":{"id":"64","title":"RIDING IN SILENCE","location":"","prose":["*South Road*","A good silence — the kind that only exists between people who do not need to fill it. The smoke on the southern horizon is thicker now."],"boxes":[],"choices":[{"letter":"A","text":"Keep the silence all the way to camp.","target":"64B","points":{"SWORD":1}},{"letter":"B","text":"After a mile, ask him something you have wanted to ask.","target":"64B","points":{"ROSE":1}},{"letter":"C","text":"Refugees on the road heading north (Scene 64C)","target":"64C","points":{}}]},"64B":{"id":"64B","title":"THE WAR SIGNS","location":"","prose":["*South Road — Day 2, Morning*","The road changes at the tenth mile. The farms are empty — not abandoned, emptied deliberately. At the eleventh mile: a cart on its side, a pair of child's shoes tied together by the laces. At the twelfth mile: a Solamnic mile-marker with fresh chalk. Someone wrote SOUTH NO. Below it, in a different hand: ARMY 2 DAYS.","The column does not comment. The silence deepens."],"boxes":[],"choices":[{"letter":"A","text":"Stop. Pick up the child's shoes. Carry them.","target":"65","points":{"ROSE":1}},{"letter":"B","text":"Note the chalk for your report.","target":"65","points":{"CROWN":1,"ROSE":1}},{"letter":"C","text":"Keep moving.","target":"65","points":{"SWORD":1}},{"letter":"D","text":"Watch the moons with whoever will join you.","target":"BOND_STAR","points":{}}]},"64C":{"id":"64C","title":"REFUGEES GOING NORTH","location":"","prose":["*South Road — Day 2, Afternoon*","Eleven people moving north. You are moving south. The man with the child stops when he sees the tabard. He says: 'Vogler. Please.'","**IF YOU SAVED THE REFUGEES IN ACT TWO:** One of the eleven recognises you. 'You. You saved us. My daughter is alive because of you.'","**IF YOU TURNED THE REFUGEES BACK:** You do not know what happened to those thirty people. The not-knowing sits in you like a stone."],"boxes":[],"choices":[{"letter":"A","text":"Give them your rations.","target":"65","points":{"ROSE":2}},{"letter":"B","text":"Brief them on the road north.","target":"65","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"Keep moving.","target":"65","points":{"SWORD":1}}]},"65":{"id":"65","title":"THE ROAD AMBUSH","location":"","prose":["*South Road — Forest Edge, Day 2*","Arrows from the treeline, then three Dragon Army soldiers and a Sivak Draconian Officer. Not a patrol. Assassins. They have a description of Solamnic squire colours. They have found you."],"boxes":[{"type":"combat","text":"**COMBAT ENCOUNTER — DRAGON ARMY ASSASSIN SQUAD**\n**ENEMIES:**\n• Human Soldier x3: AC 14, HP 14 each. Longsword +4 1d8+2. Crossbow +4 1d8+2.\n• Sivak Draconian (Officer): AC 16, HP 48. Greatsword +6 2d6+4. Speed 40 ft., Fly 60 ft.\n• Sivak: Shape Steal — on death by melee, takes the killer's appearance. Commander's Aura: soldiers within 30 ft. get +1 to attacks.\n**IMPORTANT:** Do not kill the Sivak in melee — it will Shape Steal your appearance. Use ranged attacks or force it to flee.\nRewards: 50 XP. Sivak carries sealed orders naming you as a specific target.\nFallen (0 HP): Aldric holds the Sivak while you are stabilised. 1 HP, one exhaustion."}],"choices":[{"letter":"A","text":"The ambush is broken. Continue to Scene 66.","target":"66","points":{}}]},"66":{"id":"66","title":"AFTER THE AMBUSH","location":"","prose":["*South Road Camp, Night*","The sealed orders have your name in them. Caeron looks at this for a long time. 'They know about the dispatch,' he says. 'And about you.' He folds the paper. 'Good — if they are targeting you specifically, that means what you have been doing has mattered enough.'"],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Investigation (+3) | INT | DC 14\n**SUCCESS (roll 14+):** The orders use a standard Blue Wing format except for one line in a different hand containing your specific description. Added by someone with insider access.\n**FAILURE (roll 1-13):** The source of that intelligence is unclear."}],"choices":[{"letter":"A","text":"Keep the information close.","target":"66B","points":{"ROSE":1}},{"letter":"B","text":"Brief the full command.","target":"66B","points":{"CROWN":2}},{"letter":"C","text":"Find Serath — they may be in danger.","target":"66B","points":{"ROSE":1}}]},"66B":{"id":"66B","title":"CAMP CONVERSATIONS","location":"","prose":["*Forest Road — Day 2, Night Camp*","The fire is smaller tonight — Caeron's order. The conversations become the kind that happen in the dark between people aware that remaining conversations may be finite.","**Choose one companion to spend the evening with:**"],"boxes":[],"choices":[{"letter":"A","text":"Aldric.","target":"66B_Aldric","points":{"ROSE":1}},{"letter":"B","text":"Thessaly.","target":"66B_Thessaly","points":{"ROSE":1}},{"letter":"C","text":"Mira, if present.","target":"66B_Mira","points":{"ROSE":1}},{"letter":"D","text":"Serath, if present.","target":"66B_Serath","points":{"ROSE":1}},{"letter":"E","text":"Caeron.","target":"66B_Caeron","points":{"CROWN":1}},{"letter":"F","text":"Tariel, if present.","target":"66B_Tariel","points":{"ROSE":1}},{"letter":"G","text":"Lysander, if present.","target":"66B_Lysander","points":{"SWORD":1}},{"letter":"H","text":"Take a walk with your partner at sunset.","target":"DATE_WALK","points":{}},{"letter":"I","text":"Spar privately with your partner.","target":"DATE_SPAR","points":{}},{"letter":"J","text":"Find your partner after everyone sleeps.","target":"DATE_QUIET","points":{}},{"letter":"K","text":"Spend the evening with both partners.","target":"DATE_POLY","points":{}}]},"66B_Aldric":{"id":"66B_Aldric","title":"WHAT HE CARRIES","location":"","prose":["He tells you about his mother. She died when he was twelve. 'I compete with you because I do not know another way to tell someone they matter to me. I am working on it. It is slow.'"],"boxes":[],"choices":[{"letter":"A","text":"'I know. I have always known.'","target":"67","points":{"ROSE":1}},{"letter":"B","text":"'You are better at it than you think.'","target":"67","points":{"ROSE":1,"SWORD":1}}]},"66B_Thessaly":{"id":"66B_Thessaly","title":"WHAT SHE FEARS","location":"","prose":["'I am afraid of writing the history that says they fell.' She opens the locket. Inside: a page from a letter her mother wrote the week before the Cataclysm. 'When the world changes, the people who write it down are the ones who decide what it meant.'"],"boxes":[],"choices":[{"letter":"A","text":"'You are. I have seen you work.'","target":"67","points":{"ROSE":1}},{"letter":"B","text":"'Then write the version where we hold.'","target":"67","points":{"SWORD":1,"ROSE":1}}]},"66B_Mira":{"id":"66B_Mira","title":"WHAT SHE KNOWS","location":"","prose":["'I know what two thousand soldiers means. In medical terms. I know the arithmetic does not work.' She is not afraid. She is past afraid. 'I will be there anyway.'"],"boxes":[],"choices":[{"letter":"A","text":"'The arithmetic never accounts for the people who refuse to stop.'","target":"67","points":{"ROSE":2}},{"letter":"B","text":"Help her count. The counting helps.","target":"67","points":{"ROSE":1}}]},"66B_Serath":{"id":"66B_Serath","title":"WHAT THEY LOST","location":"","prose":["'I had a unit. Twelve people. When I left, I left them inside. They are in the army marching on Vogler. I may see people I know across the line. I will not hesitate. But I want you to know it costs something.'"],"boxes":[],"choices":[{"letter":"A","text":"'I will stand beside you when it does.'","target":"67","points":{"ROSE":1,"SWORD":1}},{"letter":"B","text":"'If you need to step back, I will cover you.'","target":"67","points":{"ROSE":2}}]},"66B_Caeron":{"id":"66B_Caeron","title":"WHAT HE HIDES","location":"","prose":["'I have never led people into a situation where I cannot guarantee their survival.' He turns. His face is the face of a man who is thirty years old and does not know if he is enough. 'I wanted someone to know.'"],"boxes":[],"choices":[{"letter":"A","text":"'You are enough. We will hold.'","target":"67","points":{"CROWN":2,"ROSE":1}},{"letter":"B","text":"'Then we hold for as long as we can.'","target":"67","points":{"CROWN":1,"SWORD":1}}]},"66B_Tariel":{"id":"66B_Tariel","title":"THE QUESTION","location":"","prose":["'If the Oath is what you say it is — why is Vogler undefended? Why were the refugees turned south? Why is a squire being sent where a regiment should be?'","**CONVICTION CHOICE (FALLEN is possible here):**","**ROMANCE CHOICE (optional — if at FLAME or higher):**"],"boxes":[],"choices":[{"letter":"A","text":"'Because the institution is failing does not mean the principle is wrong. I am the principle.'","target":"67","points":{"ROSE":2},"conviction":"STEADFAST"},{"letter":"B","text":"'I do not have an answer. I have the Oath and Vogler and the people beside me.'","target":"67","points":{"ROSE":1,"CROWN":1},"conviction":"QUESTIONING"},{"letter":"C","text":"'You are right. The institution is insufficient. I am taking the Oath anyway because the people at Vogler need someone who shows up.'","target":"67","points":{"ROSE":2,"CROWN":-1},"conviction":"CONVINCED"},{"letter":"D","text":"'The Measure is a beautiful relic. I will carry it because someone should, but I no longer believe it is enough.'","target":"67","points":{"ROSE":1,"CROWN":-2},"conviction":"FALLEN"},{"le
