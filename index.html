\n**ENEMY STAT BLOCKS (Pen & Paper)**\n**Goblin Scout (3):** AC 13, HP 7, Speed 30ft. Scimitar +4 (1d6+2). Shortbow +4 (1d6+2, 80/320). Nimble Escape (Disengage/Hide as bonus action).\n**Goblin Boss:** AC 15, HP 12, Speed 30ft. Scimitar +4 (1d6+2). Shortbow +4 (1d6+2). Redirect Attack (reaction: when missed, redirect to adjacent goblin scout — the boss sacrifices his own). Multi-attack: 2 scimitar attacks.\nNARRATIVE COMBAT — ROUND 1\nThe treeline is forty feet south. Moonlight makes the grass silver and the shadows black. You can see shapes — low, hunched, moving with the particular scuttle of things that know they are smaller than you and have decided that numbers and darkness make up the difference.\nThree goblins. They are fanned out across the approach — one left, one centre, one right. The centre one is bigger. Better armed. It is giving orders in a language that sounds like gravel being chewed.\n**YOUR ATTACK — Choose a target:**\n**Left goblin** / **Centre goblin (Boss)** / **Right goblin**\n\n**ROLL REQUIRED:** Attack roll | DC = target's AC (Scouts: 13, Boss: 15)\nRoll 1d20 + your attack bonus. Meet or beat the DC = hit.\n**ON HIT:** Roll damage (your weapon die + STR modifier).\n\n**IF SERA IS PRESENT:** +1 to this roll. She spotted them from the wall — you know exactly where they are.\n**IF LYSANDER IS PRESENT:** +2 to this roll. He is beside you, calm as a man watching rain. 'The big one. Always the big one first.'\n**COMPANION ACTION — Choose one:**\n**Aldric:**\nA) Flank — Move to opposite side. +1 to your next attack.\nB) Shield Wall — Brace beside you. +1 AC until next round.\nC) Aggressive Strike — Charges the nearest goblin. 1d8+2 damage, but Aldric takes 1d4 damage from the engagement.\n\n**(If Sera):**\nA) Scout Shot — Fires from the wall. 1d6 damage to a goblin of your choice.\nB) Mark Target — Calls out movement. +2 to your next attack.\nC) Disengage Cover — Covers your retreat if needed. Safe withdrawal guaranteed.\n\n**(If Mira):**\nA) Heal Corwin — Removes the arrow, stops the bleeding. Corwin stabilized. (Frees your healing resources.)\nB) Bandage — Stabilizes Corwin at 1 HP. Less effective but faster.\nC) Herbal Boost — Gives you a poultice. +1 to your next saving throw.\n\n**(If Lysander):**\nA) Combat Instruction — Corrects your stance mid-fight. +2 to your next attack.\nB) Veteran Strike — Steps forward and cuts. 1d10+3 damage to the nearest goblin.\nC) Guard — Positions himself to take the next hit meant for you.\n**ABILITY / ITEM USE (choose one, optional):**\n• (Paladin) Cast Bless: +1d4 to attacks and saves for up to 3 targets, Concentration, lasts entire combat. 1 spell slot. Does not replace attack.\n• (Paladin) Divine Smite: Bonus action after hitting with a melee weapon. 2d8 radiant (+1d8 vs Fiends/Undead). Once per turn. 1 spell slot (or free 1/long rest at level 2+).\n• (Paladin) Lay on Hands: Heal self or Corwin up to [pool] HP. Bonus action (does not replace attack).\n• (Paladin) Cure Wounds: Heal Corwin 2d8+CHA HP. 1 spell slot. Replaces your attack this round.\n• (Fighter) Action Surge: Take an additional Action this round (except Magic action). 1/short or long rest.\n• (Fighter) Second Wind: Heal 1d10+[level] HP. Bonus action. 2 uses/long rest, regain 1/short rest.\n• (Any) Drink Potion of Healing: 2d4+2 HP. Bonus action. Consumes 1 potion.\n• (Any) Use Bandage on Corwin: Stabilize at 1 HP. Replaces your attack.\nENEMY STRIKE — ROUND 1\nThe right goblin fires its shortbow. The arrow comes out of the dark with a sound like a whispered threat.\n**DEFENSE ROLL:** Roll 1d20 + DEX modifier | DC 14 (goblin attack +4, DC = attack bonus + 10)\n**SUCCESS (14+):** You deflect or dodge. No damage.\n**FAILURE (1-13):** The arrow hits. Take 1d6+2 piercing damage. Record on your character sheet.\n**IF ALDRIC CHOSE SHIELD WALL:** DC reduced to 13 (+1 AC).\n**IF LYSANDER CHOSE GUARD:** Lysander takes the hit instead. He grunts. 'That one was free.'\nNARRATIVE COMBAT — ROUND 2\nThe goblins are fast. The one you did not target has circled right, looking for a flank. The boss is barking orders — sharper now, angrier. Whatever they expected to find at this wall, resistance was not it.\nThe night air smells of goblin — unwashed leather, rancid fat, something acrid that might be poison on the arrowheads. The grass is wet. Your boots slide. The torch on the wall behind you casts your shadow long and the goblins keep looking at it, tracking your position by the dark shape you throw.\n**YOUR ATTACK — Choose a target:**\n**ROLL REQUIRED:** Attack roll | DC = target's AC\nRoll 1d20 + your attack bonus. Meet or beat the DC = hit.\n**ON HIT:** Roll damage.\n\n**PERCEPTION CHECK (free action):** Roll 1d20 + WIS modifier | DC 13\n**SUCCESS:** You spot a fourth goblin — hidden in the ditch, flanking position. You can redirect your attack or warn Aldric.\n**FAILURE:** You do not see the fourth goblin. It will attack in Round 3 with advantage.\n**COMPANION ACTION — Choose one:** (same options as Round 1)\n**ABILITY / ITEM USE (choose one, optional):** (same options as Round 1)\nENEMY STRIKE — ROUND 2\nThe boss charges. It is faster than it should be, low to the ground, scimitar in each hand. It screams something that might be a war cry or might be an insult — with goblins, the distinction is academic.\n**DEFENSE ROLL:** Roll 1d20 + DEX modifier | DC 14\n**SUCCESS (14+):** You turn the blade. The boss snarls and recoils.\n**FAILURE (1-13):** The scimitar bites. Take 1d6+2 slashing damage.\n\n**BOSS ABILITY — REDIRECT ATTACK:** If you hit the boss this round and a goblin scout is adjacent, the boss shoves the scout into the blade path. The scout takes the damage instead. The boss survives. *This happens once.*\nNARRATIVE COMBAT — ROUND 3\nThe fight is close now. Blood on the grass — yours, theirs, or both. The goblins are not retreating. They should be retreating. Three goblins do not hold against armoured Solamnic squires unless they are desperate, fanatical, or buying time for something else. The boss is still standing and still fighting and it occurs to you, between heartbeats, that this was never a raid. This was reconnaissance. They were counting your sentries.\n**IF THE 4TH GOBLIN WAS NOT SPOTTED:** It emerges from the ditch behind you. Surprise attack with advantage.\n**SURPRISE DEFENSE ROLL:** Roll 1d20 + DEX modifier | DC 14. The goblin rolls twice and takes the better result (advantage).\n**FAILURE:** Take 1d6+2 piercing damage. The goblin is now in melee range behind you.\n**IF THE 4TH GOBLIN WAS SPOTTED:** You warned Aldric. He is already turning. The goblin's ambush fails.\n**YOUR ATTACK — Final round. End this.**\n**ROLL REQUIRED:** Attack roll | DC = target's AC\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage. *If this kills the boss, describe it. This is your moment.*\n**COMPANION ACTION — Choose one:** (same options as previous rounds)\n**ABILITY / ITEM USE (choose one, optional):** (same options as previous rounds)\nENEMY STRIKE — ROUND 3\nWhatever remains fights with the desperation of things that know the mathematics have turned. If the boss is alive, it makes one final attack — not at you. At Corwin. Finishing what it started.\n**IF BOSS IS ALIVE — PROTECT CORWIN:**\n**ROLL REQUIRED:** Athletics or DEX save | DC 13\n**SUCCESS:** You intercept. The boss's blade hits your shield or armour. Corwin is safe.\n**FAILURE:** The boss reaches Corwin. 1d6+2 damage to an already-wounded man. If Corwin has not been healed, he drops to 0 HP and begins death saves.\nAFTER THE FIGHT\nThe last goblin falls or flees. The night returns to its usual sounds — wind, distant water, the breathing of people who have just fought for the first time and are discovering what that does to the body. Your hands are shaking. This is normal. Aldric's hands are shaking too, and he does not try to hide it.\nOn the goblin boss: a crude map of the garrison perimeter. Marked in charcoal: the south wall, the granary, the sentry positions. Whoever sent these goblins knew what they were looking for.\n\n**SEARCH THE FALLEN (Optional — moral choice)**\nThe goblins are dead. Their equipment is crude but they may carry coin or useful items.\nSearching enemy dead is not forbidden by the Measure, but it is not honoured either.\nAldric looks at his boots. Corwin does not care — he is being bandaged.\n\n**A) Search them.** (-1 ROSE or -1 CROWN, whichever is lower. Roll below.)\n**B) Leave them. Report to the garrison.** (+1 ROSE or +1 CROWN. No loot.)\n\n**LOOT ROLL (if searched):** Roll 1d20.\n1–5: Nothing useful. Goblin gear is garbage.\n6–10: 1d4 stl in a belt pouch. Copper mixed with steel. 1 day rations (smoked rat meat — edible, barely).\n11–14: 2d4 stl + a mundane item (whetstone, 10ft rope, 2 days rations).\n15–17: 3d4 stl + a useful item (Potion of Healing, caltrops, a signal horn). 1 day rations.\n18–19: 4d4 stl + a quality item (masterwork dagger, a map of the south road). 2 days rations.\n20: 5d4 stl + RARE ITEM ROLL. 3 days rations.\n**RARE ITEM ROLL (only on natural 20 above):** Roll 1d20.\n1–19: Quality mundane item (well-crafted goblin blade, usable as shortsword).\n20: MAGIC ITEM — +1 Dagger. Elvish make. What a goblin was doing with it is a question you cannot answer tonight.\n\n**GOBLIN CAMP STASH:** The goblins had a camp in the treeline. Investigation DC 11.\n**SUCCESS:** Stash Loot Roll:\n1–5: Empty. They ate everything.\n6–10: Supplies (rations, crude bandages, 1d4 stl).\n11–14: 2d6 stl + mundane item.\n15–17: 3d6 stl + Potion of Healing.\n18–19: 4d6 stl + quality weapon.\n20: 5d6 stl + RARE ITEM ROLL.\n**NPC GRATITUDE — SENTRY CORWIN** (if healed)\nCorwin grips your arm with his good hand. His face is grey but his grip is strong. 'I owe you one, Squire. I mean that.'\n\n**ROLL:** Persuasion (+[bonus]) | CHA | DC 10\n*You are not haggling. The roll reflects how much Corwin has to give.*\n\n**10–12 (Modest):** 'Here.' He presses 1d4 stl into your hand. Sentry pay. It is all he carries.\n**13–15 (Grateful):** 2d4 stl and his garrison watch token (+1 to one future Brightholm check).\n**16–18 (Deeply Grateful):** 3d4 stl, the watch token, and a Potion of Healing from the sentry kit. 'I was saving it. You need it more.'\n**19+ (Indebted):** 4d4 stl, the watch token, and a family ring (5 stl value, or keep for +1 to one Persuasion check in Vogler — 'Corwin's family is from the lake region').\n**FAILURE (1–9):** Corwin has nothing to give. He clasps your arm. 'I will remember your name.' +1 ROSE.\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots,\nLay on Hands pool, bandages, potions consumed.\nUpdate gold if loot was found. Record any items gained.\n**Short rest available:** Recover Action Surge, regain 1 Second Wind use. HP: spend Hit Dice if desired.\n**XP:** 10 XP per goblin killed. 15 XP for the boss. Bonus 10 XP if Corwin was saved. Bonus 5 XP if the 4th goblin was spotted."}],"choices":[{"letter":"A","text":"Return to the evening. The wall is secure. For now","target":"11_EVENING","points":{}}]},"11_QM":{"id":"11_QM","title":"THE QUARTERMASTER","location":"Castle Brightholm — Quartermaster's Store, Morning","prose":["The quartermaster is a broad woman named Hesta who has been supplying Solamnic garrisons since before the Cataclysm broke the supply lines. Her storeroom smells of oiled leather, lamp oil, and the particular dust of things that have been inventoried more often than they have been used. She looks at your tabard, your rank, your purse, and calculates exactly how much of your stipend you are about to leave on her counter.","'Squire,' she says, by way of greeting. 'What do you need?'","Hesta wraps your purchases in waxed cloth with garrison efficiency. 'Don't die,' she says. This is her version of good luck."],"boxes":[{"type":"shop","text":"**SHOP — BRIGHTHOLM QUARTERMASTER**\nBrowse the wares. Prices in steel pieces (stl). Check your character sheet for current gold.\n\n| Item | Price | Notes |\n|------|-------|-------|\n| Bandage (1 use) | 1 stl | Stabilize at 1 HP |\n| Potion of Healing | 5 stl | 2d4+2 HP, bonus action in combat |\n| Rations (3 days) | 1 stl | Travel supplies |\n| Antitoxin | 3 stl | Advantage on poison saves for 1 hour |\n| Whetstone | 1 stl | +1 damage on next attack (single use) |\n| Caltrops (bag) | 2 stl | 10ft area, DC 12 DEX or 1 piercing + speed 0 |\n| Rope (50 ft) | 1 stl | Climbing, binding |\n| Torch (5) | 1 stl | Light source |\n| Longsword | 15 stl | 1d8+STR, versatile (1d10), Sap |\n| Greatsword | 20 stl | 2d6+STR, heavy, two-handed, Graze |\n| Battleaxe | 15 stl | 1d8+STR, versatile (1d10), Topple |\n| Greataxe | 20 stl | 1d12+STR, heavy, two-handed, Cleave |\n| Warhammer | 15 stl | 1d8+STR, versatile (1d10), Push |\n| Morningstar | 15 stl | 1d8+STR, Sap |\n| Flail | 15 stl | 1d8+STR, Sap |\n| War Pick | 15 stl | 1d8+STR, versatile (1d10), Push |\n| Rapier | 15 stl | 1d8+STR, finesse, Vex |\n| Halberd | 20 stl | 1d10+STR, heavy, reach, two-handed, Cleave |\n| Glaive | 20 stl | 1d10+STR, heavy, reach, two-handed, Graze |\n| Shortsword | 10 stl | 1d6+STR, finesse, light, Vex |\n| Handaxe | 5 stl | 1d6+STR, thrown (20/60), Vex |\n| Dagger | 2 stl | 1d4+STR, finesse, light, thrown, Nick |\n| Javelin (3) | 3 stl | 1d6+STR, thrown (30/120), Slow |\n| Chain Mail | 25 stl | AC 16, STR 13 required, Stealth disadv. |\n| Scale Mail | 20 stl | AC 14+DEX (max 2), Stealth disadv. |\n| Studded Leather | 12 stl | AC 12+DEX |\n| Leather Armor | 10 stl | AC 11+DEX |\n| Shield | 10 stl | +2 AC |\n\n**RARE STOCK ROLL (once per visit):**\nRoll 1d20 to see if Hesta has anything special today.\n1–15: Standard stock only.\n16–18: Uncommon — Greater Potion of Healing available (15 stl, 4d4+4 HP).\n19: Uncommon — Masterwork Longsword available (+1 damage, not magical, 20 stl). ‘Solamnic make. Pre-Cataclysm.’\n20: RARE — +1 Shield available (50 stl). Dented, old, Solamnic make. Hesta found it in the deep stores.\n\n*If the rare stock roll reveals an item, you may buy it at the listed price. Record purchases on your character sheet. Deduct steel spent.*"}],"choices":[{"letter":"A","text":"Done shopping. Return to the morning","target":"11_MORNING","points":{}}]},"11_YARD":{"id":"11_YARD","title":"THE THING IN THE TRAINING YARD","location":"Castle Brightholm — Training Yard, Afternoon","prose":["The shout comes from the yard — not a drill shout, not the bark of a training sergeant. A real shout. The kind that has fear in it. You are running before you identify the voice.","The training yard gate — the one that leads to the eastern slope, the one that is supposed to be barred at all times because the eastern slope leads to forest — is open. Not forced. Unbarred. Someone left it unlatched and the smell of the mess hall kitchen, which backs onto the yard, has drawn something in from the wild.","A dire boar. Not the farm boar you have seen in textbooks — a dire boar, chest-high, scarred, tusks the colour of old bone and the length of your forearm. It has overturned a weapons rack and is standing in the centre of the yard, sides heaving, eyes red with the particular rage of an animal that has been driven south by something worse than itself. The Dragon Army's advance is pushing wildlife north. This is what that looks like at ground level.","Two squires are pressed against the far wall. One of them is bleeding — a gash across the thigh from a tusk. The other is holding a practice sword that will not do a thing against an animal this size. They are both younger than you and they are both terrified.","**IF ALDRIC IS IN YOUR PARTY:** Aldric is already in the yard. He came from the armoury at a dead sprint and he is carrying his real sword, not a practice blade. He positions himself between the boar and the wounded squire without being told.","**IF MIRA IS IN YOUR PARTY:** You can hear her boots on the corridor stone behind you. She will be here in thirty seconds. The squire's thigh wound needs her."],"boxes":[{"type":"combat","text":"**COMBAT MODE**\n**Pen & Paper:** Use stat blocks below. Run at your table. Skip to AFTER THE FIGHT.\n**Narrative Mode:** Follow rounds below. Roll when prompted.\n\n**ENEMY:**\n**Dire Boar:** AC 12, HP 28, Speed 40 ft. Tusks +5 (2d6+3 piercing). Charge: if the boar moves 20+ ft in a straight line, tusks deal an extra 2d6 and target must make DC 13 STR save or be knocked prone. Relentless (1/day): if reduced to 0 HP by damage that would not kill outright, drops to 1 HP instead.\n\n**YOUR STATS:** Fighter: HP 12, AC 16, Longsword +5 1d8+3. Paladin: HP 11, AC 16, Longsword +5 1d8+3.\n\n**COMPANION ACTIONS (choose 1 per round):**\n| Companion | Action A | Action B | Action C |\n|-----------|----------|----------|----------|\n| Aldric (if present) | Flank (+1 attack) | Shield Wall (+1 AC) | Aggressive Strike (1d8+2, takes 1d4) |\n| Other squire | Distraction (boar -1 next attack) | Throw practice sword (1d4) | Flee with wounded squire (removes civilians from danger) |\n**ROUND 1 — THE CHARGE**\n\n*The boar lowers its head. The tusks catch the afternoon light. It charges — not at you, at the wounded squire. Forty feet of yard, four hundred pounds of animal, and two seconds to put yourself in the way.*\n\n**INTERCEPT:**\n**ROLL REQUIRED:** Athletics (+3) | STR | DC 13\n\n**SUCCESS (13+):** You throw yourself into the boar's path. It hits you instead. Make a STR save DC 13 or be knocked prone. Either way, the squire is clear. +1 ROSE.\n\n**FAILURE (1-12):** You are too slow. The boar reaches the squire. The squire takes 2d6+3 damage. If Aldric is present, he intercepts instead (he takes the hit, -5 HP to Aldric). If Aldric is not present, the other squire drags the wounded one aside — barely.\n\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll (+5) | DC 12 (Boar AC)\n\n**HIT:** Your blade bites into the boar's flank. It screams — a sound you did not know boars could make. Deal 1d8+3 damage.\n\n**MISS:** The boar is fast. Faster than something that size should be.\n\n**BOAR'S GORE:**\n**ROLL REQUIRED:** Defense roll | DC 15 (Tusks +5)\n\n**SUCCESS:** You catch the tusks on your blade and turn them aside.\n\n**FAILURE:** Take 2d6+3 piercing damage. The tusks go through padding like it is not there.\n**ROUND 2 — CORNERED ANIMAL**\n\n*The boar is wounded and angry. It circles, head low, blood on its tusks — yours or the squire's or both. The training yard is not large enough for this. The walls make it worse. A cornered dire boar is the second most dangerous thing in the Solamnic lowlands. The first is what drove it here.*\n\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll (+5) | DC 12\n\n**HIT:** Deal 1d8+3 damage. The boar staggers. If this reduces it to 0 HP, **Relentless triggers**: it drops to 1 HP instead, enraged.\n\n**MISS:** It dodges. For something this large, it moves like water.\n\n**(Paladin) OPTIONAL — DIVINE SMITE:** If your attack hit, add 2d8 radiant damage. The light of your conviction is visible. The boar flinches. One spell slot expended.\n\n**(Fighter) OPTIONAL — ACTION SURGE:** Take a second attack this round. One use expended.\n\n**BOAR'S GORE (if still standing):**\n**ROLL REQUIRED:** Defense roll | DC 15\n\n**SUCCESS:** Turned aside.\n\n**FAILURE:** Take 2d6+3 piercing. If this drops you to 0 HP: **IF MIRA HAS ARRIVED** she stabilizes you. You wake up in the infirmary. The boar was finished by Aldric or the garrison watch. Proceed to AFTER THE FIGHT. **IF MIRA IS NOT PRESENT:** Aldric (if present) drags you clear. The garrison watch finishes the boar with crossbow bolts. You wake up on the yard stones.\n**ROUND 3 — THE KILL (if boar still standing)**\n\n*It is dying and it knows it and it does not care. The eyes are not red anymore — they are flat, animal, the eyes of a thing that has been running from something it cannot fight and has decided to stop running here, in this yard, against you. There is something terrible and honest in it.*\n\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll (+5) | DC 12\n\n**HIT:** The blade goes in clean. The boar falls. The yard is suddenly, completely quiet except for the sound of two squires breathing and the distant clatter of the garrison responding to an alarm that is already over.\n\n**MISS:** Aldric finishes it. Or the garrison watch arrives with crossbows. Either way, it ends here.\nVictory: The boar crashes to the ground. The yard is quiet. You are breathing hard and your sword arm is shaking but you are standing.\nFallen (0 HP): The boar gores you. Aldric drags you clear and the beast is brought down by the garrison. 1 HP, one exhaustion.\n**AFTER THE FIGHT**\n\nThe boar is dead in the training yard. Its blood is on the flagstones and will stain. The wounded squire — his name is Pell, you learn later — has a gash that will scar but will heal. Mira, if present, treats him on the yard stones with the efficient calm of someone who has been waiting to be needed.\n\n**IF MIRA IS IN YOUR PARTY:** She looks up from the wound. 'The gate was unlatched.' It is not an accusation. It is a diagnosis. Something drove this animal into the garrison and the garrison was not ready. She is already thinking about what else might come over the wall before morning.\n\n**IF ALDRIC IS IN YOUR PARTY:** He is cleaning his blade. He looks at you. He does not say anything about the fight — Aldric does not comment on combat performance when the combat was real. What he does is nod. Once. The nod of a man who has been fighting beside you and has decided that fighting beside you is where he belongs.\n\nSer Aldous arrives. He studies the boar. He studies the gate. He studies you. 'The wildlife is moving north,' he says. 'The Dragon Army is pushing everything ahead of it. This will not be the last.' He pauses. 'You did well, Squire.'\n\n**LOOT — BOAR TUSKS (optional):**\nThe dire boar's tusks are intact. They are valuable — ivory, old, dense enough to be worked into weapon grips or sold.\n**A) Take the tusks.** Gain: Dire Boar Tusks (worth 3 stl, or can be worked into a weapon grip: +1 to Intimidation checks in combat).\n**B) Leave them.** The garrison groundskeeper will deal with it. +1 ROSE (Pell thanks you for saving him, not for salvaging the thing that gored him).\n\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots, Lay on Hands pool.\n**Short rest available:** Recover Second Wind, Action Surge.\nRecord: XP earned: 15 XP."}],"choices":[{"letter":"A","text":"Return to the afternoon","target":"11_AFTERNOON","points":{}}]},"1_HUB":{"id":"1_HUB","title":"THE HOURS BEFORE","location":"Castle Brightholm — Pre-Dawn to Dawn","prose":["The sky has shifted since you woke — still dark, but the kind of dark that knows the light is coming. The castle moves around you in the small familiar sounds of a place about to begin its day. Boot-steps in the upper corridor. A door. The distant clatter of the kitchen grate being raked. You have time. Not much, but enough.","You stand in the corridor between the barracks and the courtyard and consider how to spend what remains of the morning. Seven days until the Trials. Each one a chance to learn something, or to miss something you will wish you had not."],"boxes":[{"type":"info","text":"**GATE: Track activities completed. The formation bell does not ring until you have spent time in at least two of Brightholm's corners this morning.**"},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"(If not yet visited) The training yard is calling. Aldric will be there — he is always there","target":"3","points":{}},{"letter":"B","text":"(If not yet visited) The chapel library is quiet at this hour. The Measure waits","target":"4","points":{}},{"letter":"C","text":"(If not yet visited) The letter from home is still folded in your pocket. You have not read it yet today","target":"2","points":{}},{"letter":"D","text":"(If not yet visited) The infirmary. There is always someone who needs a steady hand","target":"9","points":{}},{"letter":"E","text":"(If 2+ activities completed) The bell rings. The morning you have been living in becomes the morning everyone else wakes up to. Time for formation","target":"11","points":{}}]},"26_PREP":{"id":"26_PREP","title":"THE SOUTH GATE","location":"Castle Brightholm — South Gate, Dawn","prose":["The armoury was open before the bell. Someone — you suspect Aldric — laid out your field kit on the bench with the particular arrangement of someone who has opinions about how equipment should be packed and has decided to express them through action rather than conversation. Sword oiled. Rations for three days. Waterskin. The practice blade replaced by the real one, which has a different weight — not heavier, exactly, but more serious, the weight of a thing that has a purpose beyond training.","The south gate is smaller than the main entrance — a working exit, not a ceremonial one. The stones are darker here, stained by centuries of departures that did not require an audience. Lord Caeron is already mounted, reviewing a field map with the compressed focus of a man who has been awake since before the bell and considers this normal. Aldric falls in beside you without discussion, the way he has fallen in beside you for eight months, and the familiarity of it steadies something.","**IF SERA IS IN YOUR PARTY:** She appears from a direction you did not see her arrive from, already packed, already mounted. She nods once.","**IF MIRA IS IN YOUR PARTY:** She is checking medical supplies in the saddlebag with the focus of someone cataloguing what she has against what she might need. The list in her head is longer than the one in the bag.","Caeron gives the briefing in the shadow of the gate: south road, field exercise, assess and report. The words are formal. The tone is not. He looks south for one second too long before he gives the order to move."],"boxes":[{"type":"info","text":"**WAGES PAID — FIELD EXERCISE PAY**\nThe quartermaster hands you a leather pouch as you pass through the gate. Ten steel pieces — field exercise rate. 'Bring back receipts,' he says, deadpan. He has never once asked anyone for receipts.\n**Add 10 stl to your gold.**"}],"choices":[{"letter":"A","text":"Ride out. The south road is waiting","target":"22","points":{}}]},"28_CARAVAN":{"id":"28_CARAVAN","title":"THE AMBUSHED CARAVAN","location":"South Road — Half a Mile South of Camp, Night","prose":["The smoke is thicker than cookfire. You smell it before you see it — wood, canvas, something chemical that makes your eyes water. The overturned cart is in the road ditch, one wheel still turning slowly. The mule is dead. The cargo is scattered across the verge: bolts of cloth, iron nails, a cask of something that has spilled into the dirt and smells of vinegar.","One body on the road. A merchant's guard — throat cut, eyes open, hand still on the hilt of a sword he never drew. He has been dead less than an hour.","The second figure is alive. Barely. He is under the cart, one leg pinned by the axle, and there is a compound fracture below the knee — bone through skin, blood soaking the road dust black. His breathing is the shallow, rapid kind that means shock. His name, you will learn, is Dorren. He is a merchant from Gateway. He was bringing supplies south because someone told him Vogler would pay double for iron and salt.","He has three rounds before the bleeding kills him."],"boxes":[{"type":"loot","text":"**SEARCH THE FALLEN (Optional — moral choice)**\nThe draconians are stone. The deserter's gear is scattered. You could search them.\nAldric is looking at the dead merchant's guard. He does not look at you.\n\n**A) Search the bodies.** (-1 ROSE or -1 CROWN. Loot Roll below.)\n**B) Leave them. The road has taken enough.** (+1 ROSE or +1 CROWN. No loot.)"},{"type":"loot","text":"**LOOT ROLL (if searched):** Roll 1d20.\n1–5: Nothing useful. Draconian gear crumbles with the stone.\n6–10: 1d4 stl from the deserter's belt pouch. 1 day rations (hardtack and dried meat).\n11–14: 2d4 stl + a mundane item (whetstone, 2 days rations, a battered compass).\n15–17: 3d4 stl + Potion of Healing from the deserter's kit. 2 days rations.\n18–19: 4d4 stl + a quality item (the deserter's shortsword is well-made, or a map of Dragon Army patrol routes). 3 days rations.\n20: 5d4 stl + RARE ITEM ROLL. 3 days rations."},{"type":"loot","text":"**CARAVAN WRECKAGE:** Investigation DC 12. (No moral penalty — legitimate scouting.)\n**SUCCESS:** Stash Loot Roll:\n1–5: Spoiled supplies. Nothing salvageable.\n6–10: Supplies (rations, bandages, 1d4 stl).\n11–14: 2d6 stl + mundane item (iron nails, salt — trade goods).\n15–17: 3d6 stl + Potion of Healing (hidden in cargo).\n18–19: 4d6 stl + quality item (merchant's ledger — intel on Dragon Army supply disruption).\n20: 5d6 stl + RARE ITEM ROLL."},{"type":"combat","text":"**COMBAT MODE**\n**Pen & Paper:** Use stat blocks below. Run the encounter at your table, then skip to Victory: The ambush is broken. The draconians are stone and the road is open again.\nFallen (0 HP): Aldric finishes the fight while you bleed in the road dust. 1 HP, one exhaustion.\n**AFTER THE FIGHT**.\n**Narrative Mode:** Follow the rounds below. Roll when prompted.\n**INJURED NPC — MERCHANT DORREN**\nCompound leg fracture, bleeding heavily. Dies in 3 rounds without healing.\n**Heal him:** Medicine DC 13 (stabilize only), Mira (if present, automatic stabilize + 1d6+2 heal), Paladin Cure Wounds (1 spell slot, heals 2d8+CHA), Paladin Lay on Hands (from pool), Bandage (stabilize at 1 HP), Potion of Healing (2d4+2).\n*Record any resources spent on your character sheet.*\n**If healed:** Dorren survives. He appears in Vogler with supplies. +1 ROSE. His shop in Vogler offers 10% discount (Scene 70C_SHOP).\n**If not healed:** Dorren bleeds out. You bury him by the road. The supplies are salvageable but the man is not.\n**COMPANION SELECTION**\nChoose up to 2 companions (if available):\n**Lysander** — +2 to your first attack. 'They are still close. I can smell the draconian.'\n**Mira** — Heals Dorren automatically in Round 1. Essential if you lack healing.\n**Serath** — Scouts the perimeter. Warns you of reinforcements (prevents surprise in Round 3).\n**Sera** — Marks the first target. +2 to your second attack roll.\n**Aldric** — Shield wall. Solid. Reliable. Angry about the dead guard.\n**ENEMY STAT BLOCKS (Pen & Paper)**\n**Baaz Draconian (2):** AC 13, HP 18, Speed 30ft. Scimitar +4 (1d6+2). Claw +4 (1d4+2). Death Throes: on death, turns to stone, weapon stuck (DC 11 STR to free). Disguise Self (used to look human at distance).\n**Human Deserter:** AC 12, HP 11, Speed 30ft. Shortsword +3 (1d6+1). Light crossbow +3 (1d8+1, 80/320). Cowardly: flees at half HP or if both draconians fall. Surrender possible (Persuasion DC 11).\n**INVESTIGATION CHECK (before or during combat):** Roll 1d20 + INT modifier | DC 12\n**SUCCESS:** Hidden under the cart's false bottom — a Potion of Healing and 2d4 stl. Dorren was smuggling it. He will not mind if it saves his life.\n**FAILURE:** You do not find the hidden compartment.\nNARRATIVE COMBAT — ROUND 1\nThey are still here. That is the first wrong thing — whoever attacked the caravan should have taken what they wanted and gone. Instead, they are standing over the wreckage as if waiting. When you come around the cart, you understand why. They were not robbing the caravan. They were using it as bait.\nTwo draconians. You have read the reports but the reports did not prepare you for the reality: seven feet tall, scaled, the wings vestigial but the claws very real. They are wearing scavenged armour and their eyes have the flat, predatory patience of things that are confident in what they are. Between them: a human. Deserter's gear — Solamnic-issue mail with the tabard torn off. He has the look of a man who made a choice six months ago and has been living inside the consequences ever since.\nThe draconians see you and do not react with surprise. They react with hunger.\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll | DC = target's AC (Baaz: 13, Deserter: 12)\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage.\n\n**IF LYSANDER IS PRESENT:** +2 to this attack. He moves beside you like a shadow with a sword.\n**COMPANION ACTION — Choose one:**\n**Aldric:** A) Flank (+1 next attack) | B) Shield Wall (+1 AC) | C) Aggressive Strike (1d8+2, takes 1d4)\n**Sera:** A) Scout Shot (1d6 dmg) | B) Mark Target (+2 next attack) | C) Disengage Cover (safe retreat)\n**Mira:** A) Heal Dorren (automatic stabilize + 1d6+2) | B) Bandage Dorren (stabilize 1 HP) | C) Herbal Boost (+1 save)\n**Serath:** A) Intel (+2 one attack) | B) Dagger Strike (1d4+2) | C) Feint (enemy -1 next attack)\n**Lysander:** A) Combat Instruction (+2 attack) | B) Veteran Strike (1d10+3) | C) Guard (takes next hit)\n**ABILITY / ITEM USE (choose one, optional):**\n• (Paladin) Cast Bless: +1d4 to attacks and saves for up to 3 targets, Concentration, lasts entire combat. 1 spell slot.\n• (Paladin) Divine Smite: Bonus action after hitting with a melee weapon. 2d8 radiant (+1d8 vs Fiends/Undead). Once per turn. 1 spell slot (or free 1/long rest at level 2+). *Draconians recoil from radiant damage.*\n• (Paladin) Lay on Hands: Heal self or Dorren. Bonus action.\n• (Paladin) Cure Wounds: Heal Dorren 2d8+CHA. 1 spell slot. Replaces attack.\n• (Fighter) Action Surge: Additional Action this round (except Magic). 1/short or long rest.\n• (Fighter) Second Wind: 1d10+[level] HP. Bonus action. 2 uses/long rest, regain 1/short rest.\n• (Any) Drink Potion of Healing: 2d4+2 HP. Bonus action.\n• (Any) Use Bandage on Dorren: Stabilize at 1 HP. Replaces attack.\nENEMY STRIKE — ROUND 1\nThe first Baaz attacks with its claws — not the scimitar. The claws. It wants you to understand what it is. The second flanks, moving with a speed that the armour should prevent but doesn't. The deserter hangs back, crossbow raised, and fires.\n**DEFENSE ROLL (Baaz claw):** Roll 1d20 + DEX modifier | DC 14\n**SUCCESS:** Deflected. The claws scrape armour.\n**FAILURE:** 1d4+2 slashing damage. The claw is filthy — describe the sensation.\n\n**DEFENSE ROLL (Crossbow):** Roll 1d20 + DEX modifier | DC 13\n**SUCCESS:** The bolt goes wide.\n**FAILURE:** 1d8+1 piercing damage.\n*Dorren has 2 rounds remaining if not healed.*\nNARRATIVE COMBAT — ROUND 2\nThe draconian you hit is bleeding something that is not quite blood — thicker, darker, and it steams when it hits the cold ground. It does not slow down. It gets angrier. The scimitar comes out now, held in a grip that says the claws were an introduction and this is the real conversation.\nThe deserter is retreating, step by step. He does not want to be here. His hands are shaking. He aimed for your head and hit the cart behind you. He is not a soldier anymore — he is a man with a crossbow and no courage left.\n**PERSUASION CHECK (optional, replaces attack):** Roll 1d20 + CHA modifier | DC 11\nTarget the deserter. 'Drop it. Surrender. You know how this ends.'\n**SUCCESS:** The deserter drops the crossbow. Falls to his knees. He is done. One less enemy. (+1 ROSE if you accept the surrender, +1 CROWN if you take him prisoner for trial.)\n**FAILURE:** He fires again. Fear makes his aim worse but luck is not guaranteed.\n**YOUR ATTACK:** (if not using Persuasion)\n**ROLL REQUIRED:** Attack roll | DC = target's AC\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage.\n**BAAZ DEATH THROES:** If a Baaz drops to 0 HP, it turns to stone. Your weapon is stuck in the stone corpse. DC 11 STR check to free it, or draw a backup weapon.\n**COMPANION ACTION — Choose one:** (same options as Round 1)\n**ABILITY / ITEM USE (choose one, optional):** (same options as Round 1)\nENEMY STRIKE — ROUND 2\nThe remaining Baaz presses the attack. It is stronger than it looks, and it looks very strong. The scimitar comes from the left — a feint — then the claw from the right, aimed at the gap between your breastplate and pauldron. It knows where armour fails. It has done this before.\n**DEFENSE ROLL:** Roll 1d20 + DEX modifier | DC 14\n**SUCCESS:** You read the feint. Block the claw. Hold your ground.\n**FAILURE:** 1d6+2 slashing damage. The scimitar finds the gap.\n\n**IF DESERTER DID NOT SURRENDER:** Another bolt. DC 13 DEX save or 1d8+1 piercing.\n*Dorren has 1 round remaining if not healed. His breathing is getting worse.*\nNARRATIVE COMBAT — ROUND 3\nThe fight has the quality of something that needs to end. The road is dark and the draconian smells of copper and sulfur and its eyes have not blinked once. You are learning that the things you trained to fight are real and they do not care about your training — they care about whether you can survive the next ten seconds.\n**IF SERATH IS NOT PRESENT:** Movement at the treeline. A third shape — another draconian, drawn by the noise, emerging from the south. It will arrive in 2 rounds if you do not end this now.\n**IF SERATH IS PRESENT:** 'Movement south. We have two minutes before company arrives. Finish this.' Serath's warning gives you time but not much.\n**YOUR ATTACK — End it.**\n**ROLL REQUIRED:** Attack roll | DC = target's AC\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage. *If this kills the last Baaz, the stone death throes are your signal to move.*\n**COMPANION ACTION — Choose one:** (same options)\n**ABILITY / ITEM USE (choose one, optional):** (same options)\nENEMY STRIKE — ROUND 3\nThe draconian makes its final play — a lunging thrust aimed at your chest, all weight behind it, the kind of attack that sacrifices defence for the chance to end you.\n**DEFENSE ROLL:** Roll 1d20 + DEX modifier | DC 15 (lunging attack, +1 DC)\n**SUCCESS:** You sidestep. The blade buries in the cart. The draconian is overextended.\n**FAILURE:** 1d6+3 slashing damage. The lunge has power behind it.\nAFTER THE FIGHT\nThe last draconian turns to stone. The statue steams in the cold air and you will remember that sound — the hissing of hot rock meeting night dew — for the rest of your life. The deserter is on his knees or dead or fled. The road is quiet again, the way roads are quiet after violence — not peaceful, just emptied.\nDorren, if he is alive, is staring at you with the expression of a man who has just been given back the remainder of his life and has not yet decided what to do with it.\n\n**SEARCH THE FALLEN (Optional — moral choice)**\nThe draconians are stone. The deserter's gear is scattered. You could search them.\nAldric is looking at the dead merchant's guard. He does not look at you.\n\n**A) Search the bodies.** (-1 ROSE or -1 CROWN. Loot Roll below.)\n**B) Leave them. The road has taken enough.** (+1 ROSE or +1 CROWN. No loot.)\n\n**LOOT ROLL (if searched):** Roll 1d20.\n1–5: Nothing useful. Draconian gear crumbles with the stone.\n6–10: 1d4 stl from the deserter's belt pouch. 1 day rations (hardtack and dried meat).\n11–14: 2d4 stl + a mundane item (whetstone, 2 days rations, a battered compass).\n15–17: 3d4 stl + Potion of Healing from the deserter's kit. 2 days rations.\n18–19: 4d4 stl + a quality item (the deserter's shortsword is well-made, or a map of Dragon Army patrol routes). 3 days rations.\n20: 5d4 stl + RARE ITEM ROLL. 3 days rations.\n**RARE ITEM ROLL (only on natural 20 above):** Roll 1d20.\n1–19: Quality mundane item (the deserter's mail is Solamnic-issue, AC 16, good condition).\n20: MAGIC ITEM — +1 Shield. The deserter took it when he left. The rose emblem has been scratched off but the enchantment remains.\n**THE DEAD GUARD (Optional — NON-COMBATANT)**\nThe guard is still on the road. His sword is in its scabbard. He never drew it. His eyes are open. He was a man with a job and the job killed him and his employer is twenty feet away bleeding out from a compound fracture. He has a belt pouch, a water skin, and a locket around his neck.\n\n**A) Search the guard's body.** You are searching the body of a man who was not your enemy. He was protecting a merchant on a road that should have been safe. See **Looting the Dead — Non-Combatant** penalties in Combat Reference. (-2 ROSE, -2 CROWN. 1d4 stl + 2 days rations + the locket contains a portrait of a woman and a child.)\nAldric's voice, quiet: 'He was on our side.' It is not an accusation. It is worse — it is a fact.\n**B) Leave him.** (+1 ROSE. The guard deserves better than this road. You cannot give him better. You can give him the dignity of not being searched.)\n\n**CARAVAN WRECKAGE:** Investigation DC 12. (No moral penalty — legitimate scouting.)\n**SUCCESS:** Stash Loot Roll:\n1–5: Spoiled supplies. Nothing salvageable.\n6–10: Supplies (rations, bandages, 1d4 stl).\n11–14: 2d6 stl + mundane item (iron nails, salt — trade goods).\n15–17: 3d6 stl + Potion of Healing (hidden in cargo).\n18–19: 4d6 stl + quality item (merchant's ledger — intel on Dragon Army supply disruption).\n20: 5d6 stl + RARE ITEM ROLL.\n**MERCHANT'S STRONGBOX:** Visible in the wreckage. Contains 3d6 stl. *Taking it is theft — Dorren's property, whether he lives or dies.* (-2 ROSE, -2 CROWN. Aldric will not speak to you for a scene. Caeron will hear of it.)\n**NPC GRATITUDE — MERCHANT DORREN** (if healed)\nDorren cannot stand but he can grip your hand. He grips it like a man holding a rope over a cliff. 'I will be in Vogler,' he says. 'If I have anything left when I get there, it is yours.'\n\n**ROLL:** Persuasion (+[bonus]) | CHA | DC 10\n\n**10–12 (Modest):** 1d4 stl. 'It is all I have on me. I am sorry.'\n**13–15 (Grateful):** 2d4 stl and a promise: 10% discount at his Vogler shop.\n**16–18 (Deeply Grateful):** 3d4 stl, the shop discount, and a Potion of Healing from his personal stash. 'I was saving it. You are the reason I do not need it.'\n**19+ (Indebted):** 4d4 stl, the discount, and a merchant's ring (10 stl value, or +1 to Persuasion checks with merchants — 'Tell them Dorren sent you').\n**FAILURE (1–9):** Dorren has nothing. He is a merchant with no goods and no money on a road that almost killed him. He looks at you with wet eyes. 'I will find a way to repay you.' +1 ROSE.\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots,\nLay on Hands pool, bandages, potions consumed.\nUpdate gold if loot was found. Record any items gained.\nNote if Dorren was saved (affects Scene 70C_SHOP).\n**Short rest available:** Recover Action Surge, regain 1 Second Wind use. HP: spend Hit Dice.\n**XP:** 15 XP per draconian. 10 XP for the deserter (killed or captured). Bonus 15 XP if Dorren saved. Bonus 5 XP if deserter surrendered peacefully."}],"choices":[{"letter":"A","text":"Return to camp. Report what you found","target":"44_REPORT","points":{}}]},"44C":{"id":"44C","title":"THE RUINS AT NIGHT","location":"South Road — Old Watchtower Ruins, Night","prose":["You wait. Aldric waits with you because that is what Aldric does — he does not question it, he simply crouches beside you in the dark and matches your breathing to the silence. The bootprints in the fire pit were military. Hobnailed. Heavier than refugee sandals. And they went deeper into the ruin, toward the collapsed cellar that the garrison maps do not show.","The moon is a sliver. The wind carries the smell of old stone and something else — smoke, very faint, from below the ruin. Someone has a fire in the cellar. Someone who does not want to be seen from the road.","You hear the voice before you see the light. Not Common. Not Solamnic. A language that clicks and hisses and makes the hair on your arms stand up. Then: a child's voice. Small. Frightened. Speaking Common in fragments: 'Please. I want to go home. Please.'"],"boxes":[{"type":"loot","text":"**DRAGON ARMY SUPPLY CACHE:** Investigation is not needed — the crates are right there. Stash Loot Roll (no moral penalty — enemy supplies):\n1–5: Empty crates. They already moved the good stuff.\n6–10: Supplies (rations, crude maps, 1d4 stl).\n11–14: 2d6 stl + mundane item (Dragon Army patrol schedule, signal flags).\n15–17: 3d6 stl + a useful item (Potion of Healing, military-grade rope, antitoxin).\n18–19: 4d6 stl + quality item (Dragon Army officer's spyglass, coded orders — Caeron will want these).\n20: 5d6 stl + RARE ITEM ROLL."},{"type":"loot","text":"**SEARCH THE BODIES (Optional — moral choice):**\nThe soldiers and the Kapak remains. Searching Dragon Army dead is enemy intelligence, but the Kapak's acid makes it unpleasant.\n\n**A) Search them.** (-1 CROWN. Loot Roll below.)\n**B) Leave them. You have what you came for.** (+1 CROWN. No loot.)"},{"type":"loot","text":"**LOOT ROLL (if searched):** Roll 1d20.\n1–5: Nothing. The Kapak acid dissolved most of it.\n6–10: 1d4 stl from soldier belt pouches. 1 day rations (Dragon Army field bread, stale but edible).\n11–14: 2d4 stl + mundane item (a locket with a portrait — the soldier was someone's son). 2 days rations.\n15–17: 3d4 stl + Potion of Healing (the soldiers had supplies the Kapak did not share). 1 day rations.\n18–19: 4d4 stl + Kapak venom vial (single-use: +1d4 poison damage on next weapon attack). 2 days rations.\n20: 5d4 stl + RARE ITEM ROLL. 3 days rations."},{"type":"combat","text":"**COMBAT MODE**\n**Pen & Paper:** Use stat blocks below. Run the encounter at your table, then skip to Victory: The Kapak dissolves in its own acid. The soldiers are down. The ruins are yours.\nFallen (0 HP): Your companions hold the line while Mira stabilises you. 1 HP, one exhaustion.\n**AFTER THE FIGHT**.\n**Narrative Mode:** Follow the rounds below. Roll when prompted.\n**INJURED NPC — REFUGEE CHILD LINNA**\nAge 8. Dehydration + fever. Captured by Dragon Army foragers using the ruins as a supply cache.\n**Heal her:** Mira (if present, automatic — herbs + care), Paladin Cure Wounds (1 spell slot), Paladin Lay on Hands (from pool), Bandage + water (stabilize, but fever needs herbs or magic), Potion of Healing (2d4+2 HP, cures fever).\n*Record any resources spent.*\n**If healed:** Linna recovers. She is returned to the refugee column or carried north. She appears in Vogler (Scene 70B) — she and her family recognize you. +2 ROSE.\n**If not healed:** Linna survives the night but the fever worsens. She reaches Vogler but is bedridden. The family does not know who found her.\n**COMPANION SELECTION**\nAldric is with you automatically. Choose up to 2 additional companions:\n**Vael** — Reveals the Kapak's poison ability before combat. 'The one with the dark scales — its blade is coated. Do not let it cut you.'\n**Thessaly** — +1 to all saving throws vs poison. She identified the antidote herbs in her research. Also +1 ROSE after the fight (she documents Linna's rescue).\n**Mira** — Heals Linna automatically. Carries herbs that break the fever.\n**Sera** — Stealth approach. If present, your Stealth DC is reduced by 2.\n**Serath** — Knows Dragon Army patrol patterns. Warns you of timing: 'We have fifteen minutes before the next rotation.'\n**ENEMY STAT BLOCKS (Pen & Paper)**\n**Human Soldier (2):** AC 14 (chain shirt + shield), HP 14, Speed 30ft. Longsword +4 (1d8+2). Javelin +4 (1d6+2, 30/120). Formation: +1 AC when adjacent to another soldier.\n**Kapak Draconian:** AC 14 (natural), HP 26, Speed 30ft. Poisoned Shortsword +5 (1d6+3 + DC 11 CON save or 1d6 poison and poisoned condition for 1 round). Claw +5 (1d4+3). Lick Blade (bonus action, re-poisons weapon). Death Throes: dissolves into acid pool (5ft radius, 2d4 acid damage, DC 12 DEX to avoid).\n**STEALTH APPROACH:** Roll 1d20 + DEX modifier | DC 14 (DC 12 if Sera present)\n**SUCCESS:** Surprise round. You attack before they know you are there. One free attack with advantage.\n**FAILURE:** They hear you. No surprise. The Kapak hisses and draws its blade. The soldiers form up. Linna screams.\nNARRATIVE COMBAT — ROUND 1\nThe cellar is lit by a single low fire. Three figures: two humans in patchwork armour — Dragon Army regulars, not elite, the kind that hold supply lines and guard things that matter — and something else. The Kapak is crouched by the far wall, running its tongue along a short blade with the slow, deliberate care of a thing that is tasting its own poison. Its scales are dark, almost black, and its eyes reflect the firelight like a cat's.\nLinna is tied to a support beam. She is small and filthy and her eyes are enormous. She sees you and her mouth opens but no sound comes out. She has learned that sound brings attention and attention brings pain.\n**IF STEALTH SUCCEEDED:** They do not see you. The moment is yours. Take it.\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll | DC = target's AC (Soldiers: 14, Kapak: 14)\nRoll 1d20 + your attack bonus. (Advantage if stealth succeeded — roll twice, take higher.)\n**ON HIT:** Roll damage.\n\n**IF VAEL IS PRESENT:** 'The Kapak's poison lasts one round. If it cuts you, disengage and let it fade. Do not panic.' (You know to expect the poison — tactical advantage.)\n**COMPANION ACTION — Choose one:**\n**Aldric:** A) Flank (+1 next attack) | B) Shield Wall — blocks the cellar entrance (+1 AC, enemies cannot flee) | C) Aggressive Strike (1d8+2, takes 1d4)\n**Vael:** A) Flanking Shot (1d6 dmg) | B) Honest Assessment — reveals Kapak's remaining HP | C) Cover Fire (+1 AC)\n**Thessaly:** A) Encourage (+1 next roll) | B) Document (+1 ROSE after fight) | C) Distraction — she calls out in Draconic, the Kapak hesitates (enemy skips next attack)\n**Mira:** A) Rush to Linna — begins healing immediately | B) Herbal Boost (+1 save vs poison) | C) Bandage Linna (stabilize)\n**Sera:** A) Scout Shot (1d6 dmg) | B) Mark Target (+2 next attack) | C) Block retreat route (enemies cannot flee)\n**Serath:** A) Intel (+2 one attack) | B) Dagger Strike (1d4+2 from the shadows) | C) Feint (enemy -1 next attack)\n**ABILITY / ITEM USE (choose one, optional):**\n• (Paladin) Cast Bless: +1d4 to attacks and saves for up to 3 targets, Concentration, lasts entire combat. 1 spell slot.\n• (Paladin) Divine Smite: Bonus action after hitting with a melee weapon. 2d8 radiant (+1d8 vs Fiends/Undead). Once per turn. 1 spell slot (or free 1/long rest at level 2+).\n• (Paladin) Lay on Hands: Heal self or Linna. Bonus action.\n• (Paladin) Cure Wounds: Heal Linna 2d8+CHA. 1 spell slot. Replaces attack.\n• (Fighter) Action Surge: Additional Action this round (except Magic). 1/short or long rest.\n• (Fighter) Second Wind: 1d10+[level] HP. Bonus action. 2 uses/long rest, regain 1/short rest.\n• (Any) Drink Potion of Healing: 2d4+2 HP. Bonus action.\n• (Any) Use Antitoxin: Advantage on poison saves for 1 hour. Bonus action.\nENEMY STRIKE — ROUND 1\nThe Kapak moves first. It is faster than the humans, faster than something that size should be, and it comes at you low — beneath your guard, blade leading. The poison on the shortsword glistens in the firelight, wet and dark.\n**DEFENSE ROLL (Kapak):** Roll 1d20 + DEX modifier | DC 15\n**SUCCESS:** You evade. The blade passes close enough to smell — bitter, chemical, wrong.\n**FAILURE:** 1d6+3 slashing damage. **POISON:** CON save DC 11. **Failure:** +1d6 poison damage and poisoned (disadvantage on attacks and ability checks) until end of your next turn. **Success:** Half poison damage, not poisoned.\n**IF THESSALY IS PRESENT:** +1 to CON save. She told you what to expect.\n\n**DEFENSE ROLL (Soldier):** Roll 1d20 + DEX modifier | DC 14\n**SUCCESS:** The longsword clangs off your armour.\n**FAILURE:** 1d8+2 slashing damage.\nNARRATIVE COMBAT — ROUND 2\nThe cellar is too small for this. The fire throws shadows that multiply everyone — you are fighting six enemies instead of three, or that is what your eyes tell you. The Kapak licks its blade again, a gesture that is both practical and theatrical, and the soldiers press you toward the wall. They are trained. Not well, but enough. Formation fighting: one attacks while the other defends.\nLinna has her eyes closed. She is not watching. She has decided that if she cannot see, it is not happening.\n**ATHLETICS CHECK (optional, replaces attack):** Roll 1d20 + STR modifier | DC 13\nCut Linna's bonds. She can crawl to safety behind Aldric's shield wall.\n**SUCCESS:** Linna is free. She runs behind the nearest cover. If Mira is present, Mira pulls her to safety.\n**FAILURE:** The bonds are thick rope. You need another round or a blade.\n**YOUR ATTACK:** (if not freeing Linna)\n**ROLL REQUIRED:** Attack roll | DC = target's AC\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage.\n**COMPANION ACTION — Choose one:** (same options as Round 1)\n**ABILITY / ITEM USE (choose one, optional):** (same options as Round 1)\nENEMY STRIKE — ROUND 2\nThe second soldier circles. He is trying to get behind you — standard pincer, textbook, and you know it is textbook because you have practised defending against it and the knowing does not make it less dangerous. The Kapak hangs back, letting the soldiers do the work, waiting for an opening. It is the smart one.\n**DEFENSE ROLL (Soldier flanking):** Roll 1d20 + DEX modifier | DC 15 (flanking, +1 DC)\n**SUCCESS:** You turn to meet the flank. Textbook defence against textbook attack.\n**FAILURE:** 1d8+2 slashing damage from behind. The formation works.\n\n**IF ALDRIC CHOSE SHIELD WALL:** The flank fails. Aldric blocks the cellar entrance. DC remains 14.\nNARRATIVE COMBAT — ROUND 3\nThe Kapak decides it has waited long enough. It makes a sound — not a roar, not a hiss, something between — and charges. The soldiers press from both sides. This is the moment the fight tips: either you break them here or the cellar becomes a trap with you inside it.\n**YOUR ATTACK — Everything you have.**\n**ROLL REQUIRED:** Attack roll | DC = target's AC\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage.\n\n**KAPAK DEATH THROES:** If the Kapak drops to 0 HP, it dissolves into a pool of acid (5ft radius). **DEX save DC 12** or take 2d4 acid damage. *Move or be burned.*\n**MEDICINE CHECK (optional):** Roll 1d20 + WIS modifier | DC 12\nTreat Kapak poison on yourself or a companion. Requires herbs or antitoxin.\n**SUCCESS:** Poisoned condition removed. The bitterness fades.\n**FAILURE:** The poison runs its course naturally (1 round remaining).\n**COMPANION ACTION — Choose one:** (same options)\n**ABILITY / ITEM USE (choose one, optional):** (same options)\nENEMY STRIKE — ROUND 3\nWhat remains fights or breaks. The soldiers, if alive, look at each other — the look of men calculating whether dying here is worth what they are being paid. The Kapak does not calculate. It fights until it cannot.\n**DEFENSE ROLL:** Roll 1d20 + DEX modifier | DC 14\n**SUCCESS:** You hold.\n**FAILURE:** 1d6+3 damage (Kapak) or 1d8+2 damage (soldier).\nAFTER THE FIGHT\nThe Kapak is dead — a pool of steaming acid where a living thing used to be. The soldiers are dead or gone. The cellar smells of acid, blood, and the musty dampness of old stone. The fire is still burning and by its light you can see the supply cache: crates marked with Dragon Army insignia, stacked against the far wall.\nLinna is shaking. She is eight years old and she has been tied to a beam in a cellar with a Kapak draconian for what she will later say was 'a long time,' which could mean two hours or two days. She does not cry. She has gone past crying into the quiet place that children go when the world has exceeded their capacity to process it.\n\n**DRAGON ARMY SUPPLY CACHE:** Investigation is not needed — the crates are right there. Stash Loot Roll (no moral penalty — enemy supplies):\n1–5: Empty crates. They already moved the good stuff.\n6–10: Supplies (rations, crude maps, 1d4 stl).\n11–14: 2d6 stl + mundane item (Dragon Army patrol schedule, signal flags).\n15–17: 3d6 stl + a useful item (Potion of Healing, military-grade rope, antitoxin).\n18–19: 4d6 stl + quality item (Dragon Army officer's spyglass, coded orders — Caeron will want these).\n20: 5d6 stl + RARE ITEM ROLL.\n**RARE ITEM ROLL:** Roll 1d20.\n1–19: Quality mundane item (Dragon Army officer's cloak, +1 to Stealth in wilderness — good camouflage).\n20: MAGIC ITEM — +1 Chain Mail. Solamnic make, stripped from a fallen knight. The rose is still visible. Wearing it feels like a responsibility.\n\n**SEARCH THE BODIES (Optional — moral choice):**\nThe soldiers and the Kapak remains. Searching Dragon Army dead is enemy intelligence, but the Kapak's acid makes it unpleasant.\n\n**A) Search them.** (-1 CROWN. Loot Roll below.)\n**B) Leave them. You have what you came for.** (+1 CROWN. No loot.)\n\n**LOOT ROLL (if searched):** Roll 1d20.\n1–5: Nothing. The Kapak acid dissolved most of it.\n6–10: 1d4 stl from soldier belt pouches. 1 day rations (Dragon Army field bread, stale but edible).\n11–14: 2d4 stl + mundane item (a locket with a portrait — the soldier was someone's son). 2 days rations.\n15–17: 3d4 stl + Potion of Healing (the soldiers had supplies the Kapak did not share). 1 day rations.\n18–19: 4d4 stl + Kapak venom vial (single-use: +1d4 poison damage on next weapon attack). 2 days rations.\n20: 5d4 stl + RARE ITEM ROLL. 3 days rations.\n**KAPAK VENOM VIAL** (if found): Single use. Apply to weapon as a bonus action. Next successful hit deals +1d4 poison damage. The vial is small, black, and warm to the touch. Using it is not forbidden. It is not honoured either.\n**NPC GRATITUDE — LINNA**\nLinna is a child. She has nothing to give you. She presses her face into your tabard and holds on and does not let go for a very long time. You can feel her heartbeat through the cloth. It is fast and small.\n\n+1 ROSE. No roll. Some debts are not paid in steel.\n\n*Her family finds you in Vogler (Scene 70B). They offer a meal, a blanket, and 2d4 stl — everything they have. You may refuse the steel (+1 ROSE) or accept it (no penalty — they insist).*\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots,\nLay on Hands pool, bandages, potions, antitoxin consumed.\nUpdate gold if loot was found. Record any items gained.\nNote if Linna was healed (affects Scene 70B recognition).\n**Short rest available:** Recover Action Surge, regain 1 Second Wind use. HP: spend Hit Dice.\n**XP:** 15 XP per soldier. 25 XP for the Kapak. Bonus 15 XP if Linna healed. Bonus 10 XP if stealth approach succeeded."}],"choices":[{"letter":"A","text":"Carry Linna back to camp. She weighs almost nothing","target":"44_REPORT","points":{"rose":1}}]},"44_PEDDLER":{"id":"44_PEDDLER","title":"THE SOUTH ROAD PEDDLER","location":"South Road — Camp, Edge of Firelight","prose":["He has the look of a man who has been on the road longer than the road has been safe. A mule. A cart with a canvas cover patched in three places. A smile that has sold things to people who did not know they needed them. He introduces himself as Torvin and he does not explain why a merchant is travelling south when everyone with sense is travelling north. Perhaps he is brave. Perhaps he is foolish. Perhaps the margins are better where the danger is, and Torvin has calculated the risk.","'Solamnic steel,' he says, looking at your tabard. 'You lot always need something. Let me see what I have.'","He pulls back the canvas. The cart is better stocked than it has any right to be.","'Safe travels, Squire,' Torvin says, already repacking. 'Or whatever the opposite of safe is, with you lot. Purposeful travels.'"],"boxes":[{"type":"shop","text":"**SHOP — SOUTH ROAD PEDDLER**\nBrowse the wares. Prices in steel pieces (stl). Check your character sheet for current gold.\n\n| Item | Price | Notes |\n|------|-------|-------|\n| Bandage (1 use) | 1 stl | Stabilize at 1 HP |\n| Potion of Healing | 5 stl | 2d4+2 HP, bonus action in combat |\n| Rations (3 days) | 1 stl | Travel supplies |\n| Antitoxin | 3 stl | Advantage on poison saves for 1 hour |\n| Whetstone | 1 stl | +1 damage on next attack (single use) |\n| Rope (50 ft) | 1 stl | Climbing, binding |\n| Healer's Kit (10 uses) | 5 stl | Stabilize without Medicine check |\n| Oil Flask (3) | 1 stl | Burn, lubricate, improvise |\n\n**RARE STOCK ROLL (once per visit):**\nRoll 1d20. Torvin reaches deeper into the cart.\n1–15: Standard stock only. 'That is all I have. Honest.'\n16–18: Uncommon — Greater Potion of Healing available (15 stl, 4d4+4 HP). 'Found it in a ruin. Intact. Miracle.'\n19: Uncommon — Masterwork shortbow available (+1 damage, not magical, 20 stl). 'Qualinesti craft. Do not ask.'\n20: RARE — +1 Chain Mail available (50 stl). The links are too fine for human smithing. Torvin's eyes go careful. 'I know what this is. So do you. Fifty steel and we never speak of it.'\n\n*Record purchases on your character sheet. Deduct steel spent.*"},{"type":"roll","text":"**OPTIONAL ROLL:** Insight (+1) | WIS | DC 13\n\n**SUCCESS (13+):** Torvin is not just a merchant. He is counting soldiers — yours, and the ones he has seen on the road. He is keeping a tally. For whom, you cannot say, but the information flows north.\n\n**FAILURE (1-12):** He seems like a man making a living. Nothing more."}],"choices":[{"letter":"A","text":"Return to the fire","target":"44_REPORT","points":{}}]},"44_REPORT":{"id":"44_REPORT","title":"THE FIRE AND THE RECKONING","location":"South Road — Camp, Evening After the Refugee Column","prose":["The fire is the small, efficient kind that field exercises teach — enough light to see faces, not enough to see from a distance. The refugee column is behind you now, in every sense. What remains is the weight of it: thirty-one people, three children, the man with the barrel-stave splint who stood at attention for a tabard. You are learning that some things become heavier after you stop carrying them.","Aldric sits across from you, cleaning his blade with the particular focus of a man who is processing something by giving his hands work. He has not spoken since the column. After a while: 'I keep thinking about the children.' He says this to the blade, not to you.","Lord Caeron arrives at the fire and does what officers do — takes the report, asks the right questions, writes the answers in his small precise hand. Casualties: none. Contact: confirmed Dragon Army presence. Assessment: the south road is not safe for civilian movement.","Then he closes the report book and does something you have not seen before. He sits. Not at the fire — at the edge of it, half in the dark, the way people sit when they want to be present without being the centre. He looks south. He does not say anything about what he is looking at."],"boxes":[{"type":"info","text":"**OPTIONAL SCENE — SERATH'S BARN**\nIf you have not yet encountered Serath: there is a figure in the barn at the edge of the camp clearing. Turn to Scene 36 (Wound and Trust) now. If you have already met Serath, skip this."},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"(If you chose to report) Take the full report to the command tent. The chain of command will decide what happens next","target":"31","points":{"crown":1}},{"letter":"B","text":"(If you chose to move them) You already acted. The column is moving north. Face the consequences","target":"51","points":{"rose":1}},{"letter":"C","text":"(If you chose to defend) You held the waystation. The refugees had time. Now you need to report what you found","target":"52","points":{"sword":1}},{"letter":"D","text":"(If you chose to find Caeron) Present your assessment directly. He is listening","target":"31","points":{"crown":1}},{"letter":"E","text":"There is a peddler camped at the edge of the firelight. He has been following the column","target":"44_PEDDLER","points":{}},{"letter":"F","text":"Smoke on the south road. Something is burning. Caeron nods once — investigate","target":"28_CARAVAN","points":{"sword":1}}]},"53_BREACH":{"id":"53_BREACH","title":"THE WALL BREACH","location":"Castle Brightholm — South Wall, Deep Night","prose":["The bell is not the sentry bell. It is the wall bell — the one you were told about in the first week, the one that means the garrison itself is under attack. It rings three times and each strike pushes the night a little further away from silence and a little closer to chaos.","The south wall has a weakness. Everyone knows about it — a section where the mortar has been crumbling since before you arrived, where the stones shift when the wind is strong. The engineers were supposed to shore it up last month. Last month, there was no Dragon Army two days south. Last month, there was time.","There is no time now. The breach is eight feet wide and the draconians are already through.","You arrive at the wall and the scene is this: torchlight, dust from the broken stone, the sound of armoured things moving fast, and Ser Aldous — the old knight, the chapel keeper, the man who taught you what the Measure means when it is not just words — standing in the breach with his sword drawn and blood on his ribs. A draconian blade found the gap in his mail. He is fighting anyway.","He will not last. You can see it in the way he favours his left side, in the way his sword arm is slowing. Two rounds, maybe three. After that, the breach is open and the garrison's south flank is exposed."],"boxes":[{"type":"combat","text":"**COMBAT MODE**\n**Pen & Paper:** Use stat blocks below. Run the encounter at your table, then skip to Victory: The breach holds. The draconians fall back into the dark. Brightholm stands.\nFallen (0 HP): Aldric pulls you behind the wall. The breach is held without you. 1 HP, one exhaustion.\n**AFTER THE FIGHT**.\n**Narrative Mode:** Follow the rounds below. Roll when prompted.\n**INJURED NPC — SER ALDOUS**\nDraconian blade across the ribs. Deep cut, bleeding badly. Collapses in 2 rounds without healing.\n**Heal him:** Paladin Cure Wounds (1 spell slot, heals 2d8+CHA), Paladin Lay on Hands (from pool), Mira (if present, stabilize + 1d6+2), Bandage (stabilize at 1 HP), Potion of Healing (2d4+2).\n*Record any resources spent.*\n**If healed:** Aldous survives. He presides over the Trials at dawn with full authority. +1 ROSE at the ceremony. He remembers what you did.\n**If not healed:** Aldous collapses. A different knight presides over the Trials — competent, but without Aldous's gravitas. The ceremony feels incomplete. Aldous recovers eventually, but slowly.\n**COMPANION SELECTION — 'GATHER YOUR PARTY'**\nYou have seconds. Choose 2 companions. The combination changes the fight.\n\n**Aldric + Mira:** Aldric holds the breach, Mira heals Aldous. Solid. Defensive. The safe choice.\n**Aldric + Sera:** Aldric holds, Sera picks targets. Aggressive. Fast. You need to heal Aldous yourself.\n**Aldric + Lysander:** Two frontline fighters and a veteran. Devastating offence. No healer unless you are one.\n**Mira + Sera:** Healing and range. You are the only melee fighter. The breach depends on you alone.\n**Mira + Serath:** Mira heals, Serath exploits chaos. Unconventional. Effective if you are creative.\n**Sera + Serath:** Scout and shadow. No healer. No shield wall. Fast, sharp, dangerous for everyone.\n**Lysander + Mira:** Veteran muscle and healing. Lysander takes point. You support.\n*Any other combination of available companions: use their standard action options.*\n**ENEMY STAT BLOCKS (Pen & Paper)**\n**Baaz Draconian — Wave 1 (2):** AC 13, HP 18, Speed 30ft. Scimitar +4 (1d6+2). Claw +4 (1d4+2). Death Throes: turns to stone, weapon stuck (DC 11 STR to free).\n**Baaz Draconian — Wave 2 (2):** Same stats. Arrive at Round 3. Climbing through the rubble. They have been waiting for the first wave to create the opening.\nNARRATIVE COMBAT — ROUND 1\nThe breach is full of dust and noise and the particular chaos of a fight in a confined space. The two Baaz are through the wall and pressing into the courtyard — one has engaged Aldous, the other is turning toward the armoury door. If it gets past, the interior is exposed.\nTorchlight catches the draconians' scales — bronze, dull, scratched from the stone they broke through. Their eyes are the worst part. Flat. Patient. The eyes of things that are doing a job and are good at it.\nAldous parries a scimitar thrust and his knees buckle. Blood is soaking through his tabard on the left side. He does not make a sound. Knights do not, apparently, even when they should.\n**YOUR ATTACK — Choose a target:**\n**Baaz engaging Aldous** / **Baaz heading for the armoury door**\n\n**ROLL REQUIRED:** Attack roll | DC 13 (Baaz AC)\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage.\n**COMPANION ACTION — Choose one for each companion:**\n\n**Aldric:** A) Flank (+1 next attack) | B) Shield Wall — blocks the armoury door (+1 AC, second Baaz cannot pass) | C) Aggressive Strike (1d8+2, takes 1d4)\n**Sera:** A) Scout Shot (1d6 dmg) | B) Mark Target (+2 next attack) | C) Cover Fire (+1 AC for you)\n**Mira:** A) Rush to Aldous — begins healing (stabilize + 1d6+2) | B) Bandage Aldous (stabilize 1 HP) | C) Herbal Boost (+1 save)\n**Serath:** A) Intel (+2 one attack) | B) Dagger from the shadows (1d4+2, target does not see her) | C) Feint (enemy -1 next attack)\n**Lysander:** A) Combat Instruction (+2 attack) | B) Veteran Strike — cleaves into the nearest Baaz (1d10+3) | C) Guard — steps in front of Aldous, takes the next hit\n**Thessaly:** A) Encourage (+1 next roll) | B) Document (+1 ROSE after) | C) Distraction — shouts from the wall, one Baaz turns (skips next attack)\n**Vael:** A) Flanking Shot (1d6 dmg) | B) Honest Assessment (reveals enemy HP) | C) Cover Fire (+1 AC)\n**ABILITY / ITEM USE (choose one, optional):**\n• (Paladin) Cast Bless: +1d4 to attacks and saves for up to 3 targets, Concentration, lasts entire combat. 1 spell slot.\n• (Paladin) Divine Smite: Bonus action after hitting with a melee weapon. 2d8 radiant (+1d8 vs Fiends/Undead). Once per turn. 1 spell slot (or free 1/long rest at level 2+). *The radiant light fills the breach. Aldous sees it. He knows what you are.*\n• (Paladin) Lay on Hands: Heal self or Aldous. Bonus action.\n• (Paladin) Cure Wounds: Heal Aldous 2d8+CHA. 1 spell slot. Replaces attack.\n• (Fighter) Action Surge: Additional Action this round (except Magic). 1/short or long rest.\n• (Fighter) Second Wind: 1d10+[level] HP. Bonus action. 2 uses/long rest, regain 1/short rest.\n• (Any) Drink Potion of Healing: 2d4+2 HP. Bonus action.\n• (Any) Use Bandage on Aldous: Stabilize at 1 HP. Replaces attack.\nENEMY STRIKE — ROUND 1\nThe Baaz at the armoury door turns its attention to you. It is between you and the interior and it knows it — the position gives it confidence. The scimitar comes fast, a horizontal slash aimed at your midsection.\n**DEFENSE ROLL:** Roll 1d20 + DEX modifier | DC 14\n**SUCCESS:** Parried. The blade rings off yours.\n**FAILURE:** 1d6+2 slashing damage.\n\n**ALDOUS:** If not healed this round, Aldous takes another hit from the engaged Baaz. He has 1 round remaining before he collapses.\nNARRATIVE COMBAT — ROUND 2\nThe breach dust is settling. The fight has found its rhythm — the ugly, grinding rhythm of combat in a space too small for it. You can hear the garrison alarm spreading through the castle behind you, shouts and running boots, but the reinforcements are not here yet. The south wall is yours to hold.\nAldous is on one knee. His sword is braced against the ground and he is using it like a crutch. The Baaz facing him sees the weakness and grins — they grin, you are learning, in a way that has nothing to do with joy and everything to do with anticipation.\n**ATHLETICS CHECK (optional):** Roll 1d20 + STR modifier | DC 14\nBrace the fallen stone. Narrow the breach. Fewer can get through at once.\n**SUCCESS:** The breach is halved. Wave 2 enters one at a time instead of together. Significant tactical advantage.\n**FAILURE:** The stone shifts but does not hold. The breach remains open.\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll | DC 13\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage. *If this kills a Baaz: DEATH THROES — it turns to stone. DC 11 STR to free your weapon, or draw backup.*\n**PERCEPTION CHECK (free action):** Roll 1d20 + WIS modifier | DC 13\n**SUCCESS:** You hear scraping on the outer wall. More coming. Round 3. You can prepare.\n**FAILURE:** Wave 2 arrives without warning.\n**COMPANION ACTION — Choose one for each companion:** (same options as Round 1)\n**ABILITY / ITEM USE (choose one, optional):** (same options)\nENEMY STRIKE — ROUND 2\nThe surviving Baaz commit. Both attack — one high, one low. Coordinated. The draconians fight as a unit and they are better at it than the goblins were. This is not raiding. This is soldiering.\n**DEFENSE ROLL (primary):** Roll 1d20 + DEX modifier | DC 14\n**SUCCESS:** Blocked. Your training holds.\n**FAILURE:** 1d6+2 slashing damage.\n\n**DEFENSE ROLL (secondary, only if 2 Baaz remain):** Roll 1d20 + DEX modifier | DC 14\n**SUCCESS:** Deflected.\n**FAILURE:** 1d4+2 claw damage. The second one got through.\n\n**ALDOUS:** If not healed by end of Round 2, Aldous collapses. He is unconscious and begins death saves (3 failures = death, 3 successes = stable at 0 HP). Healing can still save him, but the window is closing.\nNARRATIVE COMBAT — ROUND 3 — WAVE 2\n**IF BREACH WAS NARROWED:** One Baaz squeezes through the gap. The second is stuck on the other side, trying to find another way. You face 1 new enemy this round.\n**IF BREACH IS OPEN:** Two Baaz climb through the rubble simultaneously. You face 2 new enemies.\nThe second wave is fresh. Unwounded. They have been waiting in the dark while you spent yourself on the first pair, and they know it. The one in front has a notched scimitar and a claw scar across its face — a veteran. It has done this before.\n**INTIMIDATION CHECK (optional, free action):** Roll 1d20 + CHA modifier | DC 12\n**SUCCESS:** You roar. The sound fills the breach. One of the new Baaz hesitates — skips its first attack. The breach is full of Solamnic fury and the draconian was not expecting that.\n**FAILURE:** They are not impressed. They are draconians. They have faced worse than you. (Or they think they have.)\n**YOUR ATTACK — Hold the line.**\n**ROLL REQUIRED:** Attack roll | DC 13\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage.\n**COMPANION ACTION — Choose one for each companion:** (same options)\n**ABILITY / ITEM USE (choose one, optional):** (same options)\nENEMY STRIKE — ROUND 3\nThe fresh Baaz attacks with the eagerness of something that has been waiting and is now, finally, unleashed. The scimitar comes from above — a chopping blow meant to drive you to your knees.\n**DEFENSE ROLL:** Roll 1d20 + DEX modifier | DC 15 (fresh enemy, aggressive)\n**SUCCESS:** You catch the blade on yours. Your arms ache. You hold.\n**FAILURE:** 1d6+3 slashing damage. The fresh Baaz hits harder.\n\n**IF SECOND WAVE 2 BAAZ IS PRESENT:** Additional attack.\n**DEFENSE ROLL:** Roll 1d20 + DEX modifier | DC 14\n**FAILURE:** 1d6+2 additional damage.\nNARRATIVE COMBAT — ROUND 4 (FINAL)\nThe garrison reinforcements are coming — you can hear the boots on stone, the shouted orders, Caeron's voice cutting through the chaos with the precision of a man who has trained for exactly this. But they are not here yet. You have one more round. One more round between the draconians and the interior of Castle Brightholm.\nEverything hurts. Your arms are heavy. Your breath is short. The torchlight has the quality of light seen through exhaustion — too bright, slightly unreal. But you are standing. The breach is in front of you and nothing has gotten past.\n**YOUR ATTACK — Last stand.**\n**ROLL REQUIRED:** Attack roll | DC 13\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage. *This is the round that matters. Describe it.*\n**COMPANION ACTION — Choose one for each companion:** (same options)\n**ABILITY / ITEM USE (choose one, optional):** (same options)\nENEMY STRIKE — ROUND 4\nThe draconians sense the reinforcements too. They fight with desperation now — not the calculated patience of the first round but the vicious last-effort of things that know the window is closing.\n**DEFENSE ROLL:** Roll 1d20 + DEX modifier | DC 15\n**SUCCESS:** You hold. The line holds. The breach holds.\n**FAILURE:** 1d6+3 slashing damage. But you do not fall. You do not step back.\nGarrison soldiers arrive. Caeron is at the front. The draconians break — not out of cowardice but out of mathematics. The breach is held. The south wall stands.\nAFTER THE FIGHT\nThe dust settles. The stone Baaz statues steam in the night air. The breach is being filled with rubble and timber by garrison engineers who arrived thirty seconds after the fight ended, which is both impressive and infuriating.\nAldous, if he is alive, is propped against the inner wall. He looks at you. He does not say anything for a long time. Then: 'I will remember this when the Trials come.' He means: you have already passed a trial that no ceremony can replicate.\nIf Aldous is unconscious, the infirmary team takes him. Mira goes with them, if she is here. The corridor feels emptier.\n**No body search available.** The draconians turned to stone in the breach — the engineers are already building them into the wall. There is a grim poetry to it.\n**NPC GRATITUDE — SER ALDOUS** (if healed)\nAldous does not pay you. That is not what this is.\nHe reaches into his belt and produces a small book — leather-bound, hand-copied, the pages soft with age. *The Rose Commentary.* A treatise on the Measure of the Rose written by a knight whose name you recognize from the chapel histories. Aldous has carried it for thirty years.\n\n'You have earned this,' he says. 'Not because you fought. Because you chose to heal before you chose to strike.'\n\n**Item gained: The Rose Commentary.** +1 to all Measure checks. +1 ROSE.\n*This is not loot. This is inheritance.*\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots,\nLay on Hands pool, bandages, potions consumed.\nNote if Aldous was healed (affects Scene 60 Trials).\n**Short rest available:** Recover Action Surge, regain 1 Second Wind use. HP: spend Hit Dice.\n**XP:** 15 XP per Baaz (60 total if all 4 killed). Bonus 20 XP if Aldous healed. Bonus 10 XP if breach was narrowed. Bonus 10 XP if Intimidation succeeded."}],"choices":[{"letter":"A","text":"The breach is held. Return to the corridors. The night is not over yet","target":"53_HUB","points":{}}]},"53_HUB":{"id":"53_HUB","title":"THE LONG NIGHT","location":"Castle Brightholm — Corridors, Night After the News","prose":["The castle does not sleep. You hear it in the way it breathes — doors that do not close all the way, footsteps at hours when the corridors should be empty, the persistent amber glow of candles that should have been doused two hours ago. The news has changed the air itself. Two thousand soldiers. Three days. Maybe two.","You walk the corridors because standing still feels like consent to fear, and moving feels like something you can control. The people you care about are each handling this in their own way, in their own corners of the garrison. You have time. The night is long when no one is sleeping."],"boxes":[{"type":"info","text":"**GATE: Track companion visits this night. Dawn does not come until you have spoken with at least three people about what is coming.**"},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"(If not yet visited) Go to your companions — Aldric is in the armoury, Mira is in the infirmary, Serath watches the south road","target":"54","points":{}},{"letter":"B","text":"(If not yet visited) Stay in the great hall. Someone else stayed too","target":"55","points":{}},{"letter":"C","text":"(If not yet visited) Find Thessaly. She has been writing since the briefing","target":"56","points":{}},{"letter":"D","t
