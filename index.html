PANION ACTION — Choose one for each companion:** (same options)\n**ABILITY / ITEM USE (choose one, optional):** (same options)\nENEMY STRIKE — ROUND 3\nThe last enemy makes a final stand or a final attempt to flee. The scout, if alive, draws the shortsword — a desperation weapon at this point, a longbow archer in melee range.\n**DEFENSE ROLL:** Roll 1d20 + DEX modifier | DC 14\n**SUCCESS:** Deflected. The last threat is ended.\n**FAILURE:** 1d6+3 damage. A parting gift.\nAFTER THE FIGHT\nThe observation post is neutralized. The lean-to is wreckage. The fire pit is scattered. The lake is perfectly still and the pre-dawn light makes the water look like hammered steel and for a moment, standing over the aftermath with blood on your hands and the adrenaline fading, you see what Vogler looks like from the perspective of the people who have been watching it and planning its destruction. It is small. It is beautiful. It is completely, terrifyingly vulnerable.\n**IF THE HORN WAS NOT BLOWN:** The bridge garrison does not know you are coming. Significant tactical advantage in Scene 70. +2 SWORD.\n**IF THE HORN WAS BLOWN:** The bridge will be reinforced. +2 soldiers at Scene 70. The approach will be harder. +1 SWORD (you tried).\n\n**OBSERVATION POST SUPPLY TENT:** No moral penalty — enemy military supplies. Stash Loot Roll:\n1–5: Empty ration cans and a cold fire. They were living light.\n6–10: Supplies (rations, Dragon Army signal flags, 1d4 stl).\n11–14: 2d6 stl + mundane item (spyglass, maps of the lake shore, patrol schedules).\n15–17: 3d6 stl + useful item (Potion of Healing, antitoxin, military-grade rope).\n18–19: 4d6 stl + quality item (Dragon Army attack route map — Caeron will give you +1 to ALL Vogler defence checks for this intel).\n20: 5d6 stl + RARE ITEM ROLL.\n**RARE ITEM ROLL:** Roll 1d20.\n1–19: Quality mundane item (the scout's longbow — masterwork, +1 damage, not magical).\n20: MAGIC ITEM — +1 Studded Leather. Light, supple, elvish make. The scout took it from someone who will not need it anymore. AC 13+DEX.\n**SEARCH THE SCOUT'S PERSONAL EFFECTS (Optional — moral choice):**\nThe scout was a person. He had a bedroll, a journal, a locket.\n\n**A) Search.** (-1 ROSE. 1d4 stl + 2 days rations + the journal reveals Dragon Army troop numbers — valuable intel.)\n**B) Leave it. He was the enemy but he was a person.** (+1 ROSE. No loot.)\n**THE WAR DOG** (if calmed via Animal Handling):\nThe dog is sitting where you told it to sit. It is a large, grey, short-haired hound with a torn ear and the expression of a dog that has been told to do many things by many people and is waiting to find out what you want. It does not have a name. Or if it does, the name is in a language it no longer obeys.\n\n**A) Take the dog.** (+1 ROSE. The dog follows the column. No combat benefit, but it is a good dog. It sleeps by your feet in Vogler. The villagers' children name it.)\n**B) Let it go.** (The dog watches you leave. It does not follow. It sits by the lake and waits for someone who is not coming back.)\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots,\nLay on Hands pool, bandages, potions consumed.\nUpdate gold if loot was found. Record any items gained.\nNote if the horn was blown (affects Scene 70 bridge fight).\nNote if the dog was taken (flavour in Vogler).\n**Short rest available:** Recover Action Surge, regain 1 Second Wind use. HP: spend Hit Dice.\n**XP:** 15 XP per soldier. 20 XP for the scout. 10 XP for the dog (if calmed, not killed — +5 bonus). Bonus 15 XP if horn was prevented. Bonus 10 XP if stealth succeeded."}],"choices":[{"letter":"A","text":"The post is silent. The bridge is ahead. Ride","target":"69B","points":{}}]},"70B":{"id":"70B","title":"THE PEOPLE OF VOGLER","location":"Vogler — Bridge Square, Late Afternoon","prose":["They are waiting on the other side. Not a crowd — Vogler is too small and too practical for crowds — but a gathering, the kind that forms when people have been watching from windows and walls and have decided, individually, to come down. A woman with flour on her hands. A fisherman still carrying his net, knuckles white on the handle. Three children who have been told to stay inside and have not. An old man leaning on a younger man, both watching you cross the bridge with the expression of people evaluating whether hope is a reasonable investment.","You see them all at once and it hits you like a shield blow: these are eighty-four people and you are what stands between them and the Dragon Army.","The woman with flour says: 'How many of you are there?' You tell her. She looks at Aldric, at Caeron, at the column behind you. She counts. The number is not what she hoped. She nods anyway. 'Come in. There is food.'","The fisherman steps forward. His name is Torren. He has the hands of a man who has hauled nets in every weather for thirty years and the eyes of a man who knows what two thousand soldiers will do to a village of eighty-four. 'The Dragon Army — how long?'","**IF ALDRIC IS IN YOUR PARTY:** Aldric has stopped walking. One of the children — a boy, maybe six, missing a front tooth — has walked up to him and is staring at his tabard with the expression of absolute certainty that knights are invincible. Aldric kneels. 'What is your name?' The boy says *Tam*. Aldric puts his hand on Tam's shoulder, and you see the weight of it settle into him — the understanding that this is not a drill, not a formation exercise, not a score on a sheet. This is a boy named Tam who believes knights do not lose. Aldric stands. His jaw is set in the way that means he has decided something, and the thing he has decided is that Tam is going to be right.","**IF MIRA IS IN YOUR PARTY:** Mira is already moving. A woman at the back of the gathering is holding a baby that is coughing — the wet, rattling cough that means something worse than a cold. Mira reaches her before anyone else notices. Her hands are on the child's chest, listening through touch, already pulling dried yarrow from her belt pouch. 'How long has she been coughing?' The mother's face does the thing faces do when someone competent arrives: it breaks, just for a moment, with relief. Mira looks back at you across the square, and what her look says is: *This village has no healer. They have been managing with hope and prayer and whatever the fisherman's wife remembers about poultices.* She turns back to the baby. She is not going to leave this square until that cough is addressed.","**IF SERA IS IN YOUR PARTY:** Sera's eyes are moving. Not looking at the people — looking at the walls, the rooflines, the approaches from the south. You have seen her do this at every camp, every waystation, every clearing. She is reading the ground the way a scholar reads a page. After thirty seconds she says, very quietly, so only you hear: 'The bridge is the only approach for heavy infantry. The lakeshore is soft ground — bad footing for a charge. The watchtower ridge gives sightline for half a mile south.' She pauses. 'This is defensible. Not easily. But defensibly.' From Sera, this is optimism.","**IF THESSALY IS IN YOUR PARTY:** Thessaly has her notebook open. She is not writing strategy or military assessment. She is writing *names*. The flour woman is Bess. The fisherman is Torren. The old man is Elder Isak's brother, Pettar, who cannot walk without help but who came to the bridge anyway because he wanted to see knights arrive with his own eyes. The children are Tam, Elsa, and the youngest whose name no one has told her yet because the youngest is hiding behind Bess's skirt. Thessaly writes them all down. When you catch her eye she says: 'Someone should know who lived here. Before.'","**IF CAERON IS IN YOUR PARTY:** Caeron is doing the thing he does — the thing you have watched him do at every briefing and every camp and every crossroads since Brightholm. He is being composed. He is shaking Torren's hand with exactly the right firmness. He is telling Bess that the food would be welcome. He is nodding at the right moments and saying the right words. But you have spent enough weeks with Lord Caeron Ashvale to see the fracture line. It is in his eyes, in the moment between one sentence and the next. He looked at Vogler and did the arithmetic and the arithmetic does not work and he is going to do it anyway.","**IF YOU SAVED THE REFUGEES IN ACT TWO:** Someone in the gathering recognises the tabard. A woman pushes forward — you have seen her face before, on the south road, streaked with dust. 'The knights from the south road. They helped my family.' A murmur moves through the group. Torren looks at you differently. The investment in hope becomes slightly more reasonable.","**IF LINNA WAS SAVED (Scene 44C):** A small voice: '*That is them.*' Linna is here. She is thin and her eyes are too old for her face but she is alive and standing and pointing at you with the absolute authority of a child who has decided you are a hero. Her family surrounds her — mother, uncle, a grandmother who takes your hand in both of hers and says nothing because nothing is sufficient. Mira, if she is present, puts her hand on Linna's head and checks her fever by touch. The fever is gone. 'You did good work,' Mira says, and she means the people who kept Linna alive on the road, but she is looking at you.","**IF YOU TURNED THE REFUGEES BACK:** No one recognises you. The tabard is enough. You carry the weight of that, and standing among the people of Vogler, the weight is heavier than it was on the road."],"boxes":[{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"'Two days. Maybe less. We will help you prepare.'","target":"70C","points":{"crown":1,"rose":1}},{"letter":"B","text":"'We need to see your defences. Now.' Caeron is already moving","target":"70C","points":{"crown":1}},{"letter":"C","text":"Accept the food first. These people need to feel useful","target":"70C","points":{"rose":2}}]},"70C":{"id":"70C","title":"THE ELDER OF VOGLER","location":"Vogler — Elder Isak's House, Evening","prose":["The elder's name is Isak. His house is the largest in the village, which means it has two rooms and a table long enough for a map. The lamp on the table is whale oil — the good kind, the kind that burns clean. He has been the elder of Vogler for twenty-three years and his handshake has the particular strength of a man who has been making difficult decisions for longer than you have been alive. His eyes are clear. He has not been sleeping and he is not going to apologise for it.","He unrolls his own map — hand-drawn, accurate, annotated in a steady hand that has not shaken in twenty-three years and is not going to start now. The bridge you crossed. The lake shore with its depth markings. The grain stores, marked with quantities and dates. The fishing fleet — four boats, one leaking. The old Solamnic watchtower on the eastern ridge, abandoned since the Cataclysm but still standing because Solamnic engineers built things to last, even when the world they built them for did not.","'We have eighty-four souls,' he says. 'Eleven who can fight. The rest are families, children, elders. I will not send them away because there is nowhere to send them that is safer than here with you.' He says it without self-pity. He says it the way you state a tactical fact.","He looks at Caeron. 'What do you need from us?'","Caeron studies the map. The silence stretches. You have seen Caeron evaluate terrain a dozen times and he has never taken this long. Then you understand: it is not the terrain that is giving him trouble. It is the numbers. Eighty-four souls. Two thousand soldiers. The arithmetic does not work. He knows it. Isak knows it. Everyone at this table knows it.","'Everything,' Caeron says. And begins.","He starts with the bridge — the chokepoint, the only advantage they have. Four men abreast, maximum. Funnel them. Then the watchtower — sightlines, signal fires, early warning. Then the grain stores — if the siege lasts more than three days, rationing begins immediately. Then the boats — evacuation route for non-combatants if the line breaks. He does not say *when* the line breaks. He says *if*. Isak notices. You notice that Isak notices.","**IF MIRA IS IN YOUR PARTY:** Mira has been standing by the wall, listening. When Caeron says *eighty-four souls, eleven who can fight*, her eyes close. Just for a moment. You remember Scene 68 — *I know the arithmetic does not work.* This is the arithmetic made visible. Eighty-four people with names, eleven who have held a weapon in the last decade, and a baby in the square who was coughing. When she opens her eyes she steps forward to the map and puts her finger on the grain store. 'This building. I need it. Not for grain — for a field hospital. If the fighting starts I will need clean water, flat surfaces, and light. The grain can go in the boats.' Isak looks at her. He looks at the map. He moves the grain allocation to the boats without argument. Mira nods. She is already planning where to put the wounded. She is already planning for wounds that have not happened yet to people she has not met. This is what she does. This is what she has always done.","**IF ALDRIC IS IN YOUR PARTY:** Aldric is studying the bridge approach on the map. His finger traces the sightlines from the watchtower. 'If we station archers on the ridge, the bridge becomes a kill zone for sixty yards.' He pauses. 'The problem is the lakeshore. Soft ground, but not impassable. If they send a flanking force through the shallows at dawn...' Caeron looks at him. Something passes between them — the recognition that Aldric has been paying attention this entire journey, that the competitive squire from Brightholm has become someone who reads terrain like a knight. 'Aldric,' Caeron says. 'You have the watchtower.' It is not a question. It is the first time Caeron has given Aldric a command assignment instead of a training assignment. Aldric straightens. 'Yes, my lord.'","**IF SERA IS IN YOUR PARTY:** Sera is at the window, looking south. She has been silent since entering the house. When Caeron finishes his assessment she says: 'They will send scouts first. A day ahead of the main force. Three or four, moving through the tree line east of the road. If we take them quietly, the main force loses their sightline on the village for six to eight hours. That is enough time to finish the bridge barricade.' Everyone looks at her. She does not elaborate. She does not need to. 'I will need one companion and no torches,' she adds.","**IF THESSALY IS IN YOUR PARTY:** She is already taking notes. Not strategy — Caeron has that. She is writing the record. Isak's map. The grain quantities. The names of the eleven who can fight. The names of the seventy-three who cannot. She is building a document because someone should, and because the people of Vogler deserve to be more than a footnote in whatever history survives. At one point Isak watches her write and says, quietly: 'You are the journalist.' 'Yes.' 'Will anyone read it?' Thessaly looks up from her notebook. 'Yes,' she says. And she means it like a promise.","**IF SERATH IS IN YOUR PARTY:** Serath stands in the corner, arms folded, face unreadable. They know Dragon Army tactics better than anyone at this table. When Caeron finishes, Serath says: 'They will not negotiate. The standing order for lakeside settlements is pacification, not occupation. They will burn the boats first to prevent evacuation, then push the bridge.' A silence. 'I know this because I helped write that doctrine.' Another silence. Isak looks at Serath the way you look at a weapon you are not sure you trust. Serath meets his gaze. 'I am here. That should tell you something.'"],"boxes":[{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Help Caeron plan the defence. The watchtower. The bridge. The grain stores","target":"71B","points":{"crown":1,"sword":1}},{"letter":"B","text":"Talk to the villagers. Learn their names. They should know who is fighting for them","target":"71B","points":{"rose":2}},{"letter":"C","text":"Walk the perimeter with Aldric. See the ground with your own eyes","target":"71B","points":{"sword":1}},{"letter":"D","text":"The village has a general store. Last chance to prepare before whatever comes next","target":"70C_SHOP","points":{}},{"letter":"E","text":"(If Sera is in your party) Sera catches your eye. 'The scouts. Tonight. Before they can signal.' She needs one companion and no torches","target":"70C_SCOUTS","points":{"sword":1}}]},"70C_SCOUTS":{"id":"70C_SCOUTS","title":"THE SCOUT HUNT","location":"Vogler — Eastern Tree Line, Night","prose":["Sera leads. You follow. There are no torches — she was specific about this, and she was right. The moonlight through the canopy is enough for her, and after ten minutes of following the shadow ahead of you, it becomes enough for you too. Your eyes adjust. The forest resolves into shapes: trunk, branch, undergrowth, the path Sera is threading through all of it with the silent certainty of a woman who has spent more of her life in forests than in buildings.","She stops. Her hand comes up — the scout's signal for *halt, silence, enemy ahead*. You freeze. Through the trees, fifty yards downslope toward the lake shore: firelight. Low and disciplined, the kind of fire that soldiers build — visible only from one angle, shielded on three sides by stacked stones. Dragon Army field doctrine. Serath was right about the advance scouts.","Sera kneels beside you. Her mouth is at your ear. Her breath is warm and her voice is so quiet it barely qualifies as sound: 'Three. Two soldiers, one scout with a longbow. The scout is the problem — she is good. If she gets a signal arrow off, the main force knows we are here and the bridge assault becomes harder.'","She draws her bow. 'I take the scout. You take the soldiers. Or—' She looks at you. 'You can try to take them all quietly. Stealth approach, disable the signal fire, and they never know what hit them.'"],"boxes":[{"type":"roll","text":"**APPROACH — Choose your method:**\n\n**A) Sera's plan. She takes the scout, you take the soldiers. Clean and coordinated.** (+1 SWORD, +1 CROWN)\nSera gets one free attack on the scout (automatic hit, 1d8+3). Then combat begins with surprise — enemies do not act Round 1.\n\n**B) Full stealth. Approach the camp, disable the signal fire first, then engage.** (+2 SWORD)\n**ROLL REQUIRED:** Stealth (+2) | DEX | DC 15\n**SUCCESS:** You reach the signal fire. One action to scatter it. Then combat with surprise AND no signal possible.\n**FAILURE:** A branch snaps. The scout's head turns. Combat begins — no surprise. The scout will attempt to light the signal arrow in Round 1.\n\n**C) Call out to them. Offer surrender. They are three soldiers, not an army.** (+1 ROSE, +1 CROWN)\n**ROLL REQUIRED:** Persuasion (+2) | CHA | DC 16\n**SUCCESS:** They are tired. They are three scouts watching a lake village and they did not expect Solamnic knights. Two of the soldiers throw down weapons. The scout hesitates — then lowers the bow. +2 CROWN. No combat. Prisoners who can be questioned.\n**FAILURE:** The scout fires the signal arrow. +2 soldiers at the bridge fight (Scene 70). Then combat begins."},{"type":"loot","text":"Victory: The scouts are down. The signal fire is out — scattered or never lit. The night is quiet again.\nFallen (0 HP): Sera finishes the last scout while you lie in the clearing. 1 HP, one exhaustion.\n**AFTER THE FIGHT**\n\nThe clearing is quiet. The signal fire is out — scattered or never lit. Sera moves through the bodies with the professional efficiency of someone who has done this before and does not enjoy it but does not hesitate.\n\n'Clean,' she says. She means the operation, not the killing. She is not happy about the killing. She is satisfied that the killing was necessary and executed well, which is a different thing, and the difference is important to her even if she would never explain it.\n\n**SIGNAL PREVENTED:** +2 SWORD. The bridge garrison does not get reinforcements. Caeron will not know about this mission unless you tell him. Sera will not tell him. 'Some things do not need to be in the report,' she says. 'This was between us and the trees.'\n\n**SIGNAL FIRED:** +1 SWORD. The bridge fight will be harder — two extra soldiers. Sera's jaw tightens. 'It could have been cleaner. We will compensate.' She means she will compensate. With arrows. At the bridge.\n\n**PRISONERS TAKEN (if surrender accepted):** +2 CROWN. Under questioning, the scouts confirm: the Dragon Army assaults at dawn, two days from now. The main force is split — infantry on the road, draconians through the forest. This intelligence is critical. Caeron will want it immediately.\n\n**IF SERA'S ROMANCE IS ACTIVE:** On the walk back, Sera is silent for a long time. Then: 'I have not worked with a partner in the field in three years. The last one—' She stops. Continues. 'You are better. That is all I will say about it.' From Sera, this is a love letter.\n\n> **SEARCH THE CAMP (Optional):**\n> Enemy scouts travel light but carry intel.\n>\n> **A) Search them.** (No moral penalty — military operation.)\n> **Loot Roll:** Roll 1d20.\n> 1-5: 1d4 stl. Standard military kit.\n> 6-10: 2d4 stl. Scout's coded notebook (Serath can decode if present: +1 CROWN).\n> 11-14: 3d4 stl. Quiver of 20 arrows + a map of Vogler's approaches (share with Caeron: +1 CROWN).\n> 15-17: 4d4 stl. Above + Potion of Healing.\n> 18-19: 5d4 stl. Above + masterwork longbow (1d8+DEX, +1 damage, not magical).\n> 20: 6d4 stl. All above + Dragon Army battle plan for Vogler (share with Caeron: +2 CROWN, advantage on one Vogler defense check).\n>\n> **B) Leave it. The mission is done.** The forest can keep what the forest has.\n\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots, Lay on Hands pool, bandages, potions consumed.\n**Short rest available:** Walk back to Vogler. Recover Second Wind, Action Surge.\n**XP:** 15 XP per soldier, 20 XP for scout. Bonus 20 XP if signal prevented. Bonus 15 XP if prisoners taken."},{"type":"combat","text":"**COMBAT MODE**\n**Pen & Paper:** Use stat blocks below. Run at your table. Skip to AFTER THE FIGHT.\n**Narrative Mode:** Follow rounds below. Roll when prompted.\n\n**ENEMIES:**\n**Dragon Army Scout (1):** AC 15, HP 18, Speed 30 ft. Longbow +6 (1d8+3, 150/600). Shortsword +4 (1d6+2). Observant: advantage on Perception. **Priority action: Fire signal arrow (1 action). If signal arrow is fired, +2 soldiers reinforce the bridge in Scene 70.**\n**Dragon Army Soldier (2):** AC 14 (chain shirt), HP 14, Speed 30 ft. Longsword +4 (1d8+2). Shield bash +4 (1d4+2, target DC 12 STR or pushed 5 ft).\n\n**YOUR STATS:** Per character sheet.\n\n**COMPANION: SERA NIGHTHOLLOW (mandatory)**\n| Action A | Action B | Action C |\n|----------|----------|----------|\n| Aimed Shot (1d8+3 at any target) | Pin Down (target cannot move or signal this round) | Silent Kill (if target is below 5 HP, automatic kill, no noise) |\n\n**ENVIRONMENT:** Forest clearing, 30 ft diameter. Signal fire in centre. Stacked stone windbreak (half cover). Trees (full cover, 5 ft from clearing edge). Darkness: disadvantage on attacks beyond 30 ft unless you have darkvision or the fire is lit.\n**ROUND 1 — SHADOWS AND STEEL**\n\n*The clearing is small. The soldiers are relaxed — they have been here for two days, watching a fishing village, and nothing has happened. They do not expect Solamnic knights in the dark. They should.*\n\n**IF SURPRISE:** Enemies do not act this round. You and Sera act freely.\n\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll (+5 or per sheet) | DC 14 (Soldier AC) or DC 15 (Scout AC)\n\n**HIT:** Deal weapon damage. In the dark, the blade comes from nowhere. The soldier goes down before he fully turns.\n\n**SERA'S ACTION:** Choose from her action table.\n\n**IF NO SURPRISE — SCOUT ACTS:**\nThe scout reaches for the signal arrow. She has one round to fire it.\n**INTERRUPT:** If you or Sera target the scout this round and hit, the signal is prevented.\n**If signal fires:** A burning arrow arcs into the sky over the lake. Somewhere south, someone sees it. +2 soldiers at the bridge. The tactical advantage is gone but the fight continues.\n**ROUND 2 — CLOSE QUARTERS**\n\n*The clearing is chaos now — close, brutal, the kind of fighting that happens when the space is too small for formations and the light is too low for tactics. This is not a spar. This is not a training exercise. This is two soldiers who are going to die in the dark if you are good enough and fast enough and willing to do what Sera brought you here to do.*\n\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll (+5 or per sheet) | DC 14 (Soldier) or DC 15 (Scout)\n\n**(Paladin) OPTIONAL — DIVINE SMITE:** +2d8 radiant. The divine light in the dark forest is blinding. The remaining enemies are stunned for one round (no actions).\n\n**(Fighter) OPTIONAL — ACTION SURGE:** Second attack. End this.\n\n**ENEMY ATTACKS (surviving enemies):**\n**Soldier:** Longsword. Defense roll DC 14. Hit: 1d8+2 slashing.\n**Scout (if alive):** Longbow at range or shortsword in melee. Defense roll DC 16 (bow) or DC 14 (sword). Hit: 1d8+3 or 1d6+2.\n**ROUND 3 (if needed) — FINISHING**\n\nAny remaining enemies fight or flee. A soldier at half HP may break for the tree line.\n**OPTIONAL PURSUIT:** Athletics DC 13 to catch a fleeing soldier. If they escape, +1 soldier at the bridge.\nVictory: The scouts are down. The signal fire is out \u2014 scattered or never lit. The night is quiet again.\nFallen (0 HP): Sera finishes the last scout while you lie in the clearing. 1 HP, one exhaustion.\n\n**AFTER THE FIGHT**\n\nThe clearing is quiet. The signal fire is out — scattered or never lit. Sera moves through the bodies with the professional efficiency of someone who has done this before and does not enjoy it but does not hesitate.\n\n'Clean,' she says. She means the operation, not the killing. She is not happy about the killing. She is satisfied that the killing was necessary and executed well, which is a different thing, and the difference is important to her even if she would never explain it.\n\n**SIGNAL PREVENTED:** +2 SWORD. The bridge garrison does not get reinforcements. Caeron will not know about this mission unless you tell him. Sera will not tell him. 'Some things do not need to be in the report,' she says. 'This was between us and the trees.'\n\n**SIGNAL FIRED:** +1 SWORD. The bridge fight will be harder — two extra soldiers. Sera's jaw tightens. 'It could have been cleaner. We will compensate.' She means she will compensate. With arrows. At the bridge.\n\n**PRISONERS TAKEN (if surrender accepted):** +2 CROWN. Under questioning, the scouts confirm: the Dragon Army assaults at dawn, two days from now. The main force is split — infantry on the road, draconians through the forest. This intelligence is critical. Caeron will want it immediately.\n\n**IF SERA'S ROMANCE IS ACTIVE:** On the walk back, Sera is silent for a long time. Then: 'I have not worked with a partner in the field in three years. The last one—' She stops. Continues. 'You are better. That is all I will say about it.' From Sera, this is a love letter.\n\n> **SEARCH THE CAMP (Optional):**\n> Enemy scouts travel light but carry intel.\n>\n> **A) Search them.** (No moral penalty — military operation.)\n> **Loot Roll:** Roll 1d20.\n> 1-5: 1d4 stl. Standard military kit.\n> 6-10: 2d4 stl. Scout's coded notebook (Serath can decode if present: +1 CROWN).\n> 11-14: 3d4 stl. Quiver of 20 arrows + a map of Vogler's approaches (share with Caeron: +1 CROWN).\n> 15-17: 4d4 stl. Above + Potion of Healing.\n> 18-19: 5d4 stl. Above + masterwork longbow (1d8+DEX, +1 damage, not magical).\n> 20: 6d4 stl. All above + Dragon Army battle plan for Vogler (share with Caeron: +2 CROWN, advantage on one Vogler defense check).\n>\n> **B) Leave it. The mission is done.** The forest can keep what the forest has.\n\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots, Lay on Hands pool, bandages, potions consumed.\n**Short rest available:** Walk back to Vogler. Recover Second Wind, Action Surge.\n**XP:** 15 XP per soldier, 20 XP for scout. Bonus 20 XP if signal prevented. Bonus 15 XP if prisoners taken."}],"choices":[{"letter":"A","text":"Return to Vogler. The scouts are dealt with. The bridge will be cleaner for it","target":"70C","points":{}}]},"70C_SHOP":{"id":"70C_SHOP","title":"THE VOGLER GENERAL STORE","location":"Vogler — Market Square, Evening","prose":["The store is a stone building with a wooden sign that reads MAREN'S in paint that was once red. Inside, it smells of grain, dried fish, and lamp oil. Maren is a woman in her fifties who runs the store, the village accounts, and — from the look of the ledgers stacked behind the counter — most of Vogler's civil administration. She watches you come in with the expression of someone who has been expecting Solamnic soldiers and has already decided what she thinks about it.","'You will need supplies,' she says. It is not a question. She has been listening to Caeron's plans. She knows what is coming better than you do.","Maren counts your steel with practiced fingers. 'Defend my village,' she says, and it is not a request. It is the price of doing business."],"boxes":[{"type":"shop","text":"**SHOP — VOGLER GENERAL STORE**\nBrowse the wares. Prices in steel pieces (stl). Check your character sheet for current gold.\n\n| Item | Price | Notes |\n|------|-------|-------|\n| Bandage (1 use) | 1 stl | Stabilize at 1 HP |\n| Potion of Healing | 5 stl | 2d4+2 HP, bonus action in combat |\n| Rations (3 days) | 1 stl | Travel supplies |\n| Antitoxin | 3 stl | Advantage on poison saves for 1 hour |\n| Whetstone | 1 stl | +1 damage on next attack (single use) |\n| Rope (50 ft) | 1 stl | Climbing, binding |\n| Fishing net | 1 stl | Restrain, trap (improvised) |\n| Lamp oil (3 flasks) | 1 stl | Fire, light, area denial |\n\n**IF MERCHANT DORREN WAS SAVED (Scene 28_CARAVAN):**\nDorren arrived ahead of you. His stock supplements Maren's. All prices reduced by 10% (round down). Additional items available:\n| Item | Price | Notes |\n|------|-------|-------|\n| Greater Potion of Healing | 13 stl | 4d4+4 HP (normally 15 stl) |\n| Caltrops (bag) | 2 stl | 10ft area, DC 12 DEX or 1 piercing + speed 0 |\n| Signal whistle | 1 stl | Audible 300ft. Tactical coordination. |\n\n**RARE STOCK ROLL (once per visit):**\nRoll 1d20. Maren reaches under the counter.\n1–15: Standard stock only. 'This is a fishing village. We sell what we have.'\n16–18: Uncommon — Greater Potion of Healing available (15 stl, 4d4+4 HP). 'My grandmother made these. The recipe works.'\n19: Uncommon — Masterwork fishing spear available (as spear, +1 damage, not magical, 15 stl). 'It was meant for sturgeon. It will work for other things.'\n20: RARE — +1 Shield available (50 stl). Old. Solamnic rose barely visible under the tarnish. It was in the watchtower. Maren does not know its history. You can feel it.\n\n*Record purchases on your character sheet. Deduct steel spent.*"}],"choices":[{"letter":"A","text":"Done. Return to Elder Isak's planning","target":"70C","points":{}}]},"71B":{"id":"71B","title":"THE OATH AT VOGLER","location":"Vogler — Watchtower Ridge, Dusk","prose":["Caeron finds you at sunset. The sky behind him is the colour of old gold — the lake catching the last light, the watchtower casting a shadow that reaches all the way to the village below. He is carrying something wrapped in oilcloth, and when he unwraps it you see the book you have seen on his desk at every camp since Brightholm: his personal copy of the Measure, the one with the cracked spine and the margin notes he has never let anyone read. He sets it on the watchtower stone with the care of a man placing something sacred on an altar that is not quite the right altar but is the one that exists.","Behind you, the village. Cook fires starting. The sound of Torren's voice, carrying, telling someone to bring the nets inside. The baby is not coughing anymore. Below the ridge, the people of Vogler are making dinner and making plans and making the small movements of ordinary life that have no idea they are about to become extraordinary.","'This is not how it is supposed to be done,' Caeron says. His voice is steady the way a bowstring is steady — under tension, controlled, capable of release. 'The ceremony requires a chapter hall. Witnesses of rank. Candles. Three senior knights. The candidate kneels on stone that has been blessed by a cleric of Kiri-Jolith.' He looks at the watchtower, at the cracked flagstones, at the lake. 'We have a watchtower and a village and the Dragon Army two days south.' He pauses. The sunset paints him. 'I have decided that is enough.'","He opens the book. The pages are soft with use, the margins dense with his small, precise handwriting — years of a man's private argument with the principles he has built his life around. He finds the page without looking. He has it memorised. He reads it anyway because the ceremony requires it, and Lord Caeron Ashvale does not skip steps, not even now, not even here, not even when the world is ending.","'The Oath of the Knights of Solamnia. Sworn before Paladine and Kiri-Jolith and the witness of your companions. *Est Sularus oth Mithas* — My honour is my life.'","The words. You have read them a hundred times. You have debated them with Aldous in a courtyard that feels like another life. You have watched people fail to live up to them and succeed in spite of them and struggle with them and lean on them and curse them and come back to them. Standing on a watchtower above a village full of people whose names you learned hours ago, with the lake turning gold and the smoke on the southern horizon and the people below you who are trusting you with everything they have because they do not have anything else to trust — the words feel different.","They feel like yours.","**IF ALDRIC IS IN YOUR PARTY:** He swears beside you. The same words. The same sunset. His voice does not shake but his hands do, slightly, and you notice because you have learned to notice, and he knows you notice and does not hide it. When the words are done he looks at you sideways and there is something in his face that was not there at Brightholm — not competition, not admiration, something older and simpler than both. He chose to stand where you are standing. He chose it every day since the south road. This is the moment that choice becomes permanent. He does not say anything. He does not need to.","**IF MIRA IS IN YOUR PARTY:** She watches from the edge of the ridge. She does not kneel. She has no oath to take and she does not need one — she is already living the principle the Oath describes, and has been since before you met her, since the first bandage she tied on a stranger's wound because the wound existed and her hands were capable. When you meet her eyes she nods. Once. It is enough. It is more than a salute. It is a healer acknowledging that the person in front of her has chosen the wound, chosen to stand between the blade and the body behind them, and she will be there when the choosing has consequences. She always is.","**IF SERA IS IN YOUR PARTY:** She is standing at the edge of the ridge, watching the southern tree line. She does not turn for the ceremony. She does not need to. Her presence *is* her oath — the scout who stays, the ranger who could vanish into any forest on Ansalon and has chosen, for reasons she will not articulate and you will not ask about, to stand on this ridge with these people. When the words are done, she glances back. 'Beautiful,' she says, and it takes you a moment to realise she means the sunset, not the ceremony. Then another moment to realise she means both.","**IF THESSALY IS IN YOUR PARTY:** Her pen has stopped. She has been writing everything — every scene, every conversation, every choice you have made since Brightholm — and now, for the first time, the pen is still. She is watching you take the Oath and she is not recording it. Some moments are not for the record. Some moments are for the person witnessing them. When the words are done she picks up the pen and writes one line. You do not ask what it is. Years later, when the chronicle is published, you will find it: *They meant it. I was there. They meant every word.*","**IF VAEL IS IN YOUR PARTY:** She stands at attention. Not the relaxed posture she usually holds — full, formal, the stance of a Crown knight's daughter who grew up watching ceremonies and learned to see the shape of duty before she learned to spell it. Her eyes are bright. She does not cry. She would be furious if you suggested she was close to it. But her chin is up and her shoulders are back and when the words are done she salutes — not you, not Caeron, but the watchtower itself, the old stone, the Solamnic architecture that has survived the Cataclysm and the abandonment and the centuries, and is still standing.","**IF SERATH IS IN YOUR PARTY:** They stand apart. They do not take the Oath. They cannot — they are not Solamnic, they are barely an ally, they are a defector and a spy and a person whose relationship with oaths is complicated in ways that would take a second book to unpack. But they are here. They are standing on a Solamnic watchtower watching Solamnic knights swear an oath they once fought against, and they are not leaving. When your eyes find them, Serath inclines their head. It is the gesture of someone who does not believe in your institution but believes, against their own judgment, in you.","**IF LYSANDER IS IN YOUR PARTY:** He leans against the watchtower wall with his arms crossed. He has no rank, no order, no oath of his own — just a sword and a lifetime of reasons not to trust institutions. He does not kneel. He does not salute. But he is here, and he did not have to be. When the ceremony is done he pushes off the wall and says: 'Well. Now you have said the words.' He looks south, toward the smoke. 'Let us see if the words hold.' It is the closest thing to approval Lysander Graves has ever given the Knights of Solamnia. It is enough.","The sun sets. The lake goes from gold to copper to the deep bruised purple of a Krynn evening. Below you, the village is lit by cook fires and lamp oil. You can hear, faintly, a child laughing — Tam, probably, who believes knights are invincible and whose belief, in this moment, on this ridge, with these words still warm in your mouth, feels less like innocence and more like a commission.","You are a Squire of Solamnia. The Dragon Army is two days south. The people of Vogler are making dinner.","Whatever comes next, you will be ready."],"boxes":[{"type":"info","text":"**HOW DO YOU TAKE THE OATH?**\n\n**A) Kneeling. The stone is cold and cracked and it is enough. You kneel because the people below you need knights who kneel.** (+2 ROSE) You say the words with your eyes closed. When you open them, Caeron's hand is on your shoulder and his face is doing the thing it almost never does: opening, just for a moment, into something that is not composure but belief.\n\n**B) Standing. Sword drawn, point down. The Oath of the Sword is not taken on your knees.** (+2 SWORD) You say the words facing south — toward the smoke, toward what is coming. Your blade catches the last light. Caeron watches you, and for the first time since Brightholm, he does not correct your form. There is nothing to correct.\n\n**C) Standing beside Caeron, as an equal. 'This is how it is supposed to be done,' you say. 'Before the people we protect.'** (+2 CROWN) Something shifts in Caeron's expression. Not surprise — recognition. He closes the book. He does not need it. He never needed it. He says the words with you, and for the space of those words, the distance between Lord Commander and squire disappears entirely."},{"type":"info","text":"**Your Prelude Ends Here**\nTurn to the Order Outcome section for your squiring ceremony results and title. Then turn to the Romance Epilogue section. Then turn to THE BRIDGE TO THE CAMPAIGN."}],"choices":[{"letter":"A","text":"The Oath is taken. Vogler is ahead. The Dragon Army is behind. Begin","target":"71","points":{}}]},"DATE_ALDRIC":{"id":"DATE_ALDRIC","title":"WHAT THE HANDS SAY","location":"Forest Road — Camp Edge, Night","prose":["He is doing the thing he does when he cannot sleep: walking the perimeter with the whetstone in his hand, running his thumb along the edge without sharpening anything. You fall into step beside him. He does not look at you. He does not need to.","'I have been thinking about Vogler,' he says. The admission costs him something — Aldric does not think about things, he does things, and the gap between those two states is where his fear lives. 'I keep running the numbers. The walls, the bridge, the garrison we do not have. And then I stop running the numbers because the numbers do not help.'","He stops walking. Turns. In the firelight the scar on his jaw is a thin line of silver and his eyes are the particular dark that means he has decided to say the next thing regardless of what it costs.","'The numbers do not help. But you do.' He is looking at you now — really looking, without the deflection or the competition or the whetstone to occupy his hands. 'I am not good at this. At saying things. I am good at standing next to people and hoping they understand what it means that I chose to stand there.' A breath. 'I am standing here.'","His hand finds yours. Not the way it happens in songs — fumbling, a little too tight, the grip of a man who holds everything like a sword because that is the only grip he trusts. Then he adjusts. Softens. Learns the difference.","You stand at the edge of the firelight and the dark and you hold his hand and neither of you says anything else for a while because he was right. Standing there is enough.","Then he turns your hand over and traces the callus on your sword hand with his thumb. Slowly. The roughness of his fingers against your palm. He is memorising the shape of your hand the way he memorises terrain — deliberately, thoroughly, like something he intends to defend.","'After Vogler,' he says. He does not finish the sentence. He does not need to."],"boxes":[{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Finish it for him. 'After Vogler, you are still standing here.' He closes his eyes. When he opens them something has changed and it is not going to change back","target":"BOND_RETURN","points":{"rose":2}},{"letter":"B","text":"Pull him closer. Not gently. He does not need gentle. He needs to know you are as certain as he is. His breath catches. Then his arms are around you and he is holding you the way he holds a position — completely, with everything, like letting go has never occurred to him as an option. The kiss, when it happens, is not tentative. It is a decision","target":"BOND_RETURN","points":{"rose":2,"sword":1}},{"letter":"C","text":"'You do not have to be good at saying things.' Lean your head against his shoulder. Let the fire burn down. He is very still. Then his cheek rests against the top of your head and you can feel his breathing slow and the tension leave his body one muscle at a time, like a garrison standing down","target":"BOND_RETURN","points":{"rose":1}}]},"DATE_CAERON":{"id":"DATE_CAERON","title":"THE WEIGHT OF COMMAND","location":"Forest Road — Command Tent, Night","prose":["He is alone. This is unusual — Caeron is never alone; he is always *commanding*, always visible, always the version of himself that other people require. But the tent flap is half-closed and the light inside is a single candle and when you enter he does not straighten. He does not compose his face. He is sitting with the dispatch in his hand and the dispatch has been read so many times the paper is soft at the folds.","'Two thousand,' he says. Not to you. To the number. 'I have forty-seven. Forty-eight if I count you, which I do.'","'Caeron.'","He looks up. The candlelight finds the lines around his eyes that you did not notice before — lines that come from sustained squinting against things that should not have to be borne, the particular cartography of a man who has been holding the weight of everyone else's survival since before it was fair to ask him to. He is thirty years old. He looks older. He looks, for the first time since you have known him, like he is not enough.","'I wanted to see you,' you say.","'Why?' He is genuinely asking. Not fishing for reassurance. Genuinely unable to construct a reason why someone would seek out his company tonight, here, where he is not Lord Caeron of Ashvale but just a man with a dispatch and a number that does not work.","You sit across from him. Take the dispatch. Set it face-down on the table.","'Because you are not a dispatch. You are not a number. And tonight I do not want to talk to my commanding officer. I want to talk to you.'","Something breaks in his face. Not dramatically — a crack in the masonry, the kind you only see if you know where the load-bearing walls are. His mouth opens. Closes. He looks away. Looks back. His eyes are bright and he is furious about it.","'I am not—' His voice catches. He clears his throat with the dignity of a man who would rather face the Dragon Army than admit to a feeling. 'I am not accustomed to being seen. In that way. By anyone.'","'I know.'","'I have maintained—' He stops. Starts again. 'The command structure requires a distance that—' He stops again. Puts his hands on the table. They are shaking. Lord Caeron's hands are shaking and the sight of it is more intimate than anything that has happened on this march.","'To hell with the command structure,' you say. 'Just for tonight.'","He looks at you. The mask falls. Underneath it is a man who is lonely and frightened and who has been carrying forty-seven lives and a war and the legacy of his family name and the knowledge that he is probably sending you all to die. Underneath it he is human. Underneath it he wants to be touched."],"boxes":[{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Reach across the table. Take his shaking hands. Hold them still. He stares at your hands on his. Then he stands. Comes around the table. Stands in front of you and he is taller than you remembered and his eyes are the colour of whatever is underneath authority when authority admits it is not enough. He touches your face. His fingers are tentative. He has not touched another person without purpose in years. 'Tell me this is allowed,' he whispers. 'I need to hear it.'","target":"BOND_RETURN","points":{"rose":2,"crown":1}},{"letter":"B","text":"Stand. Close the distance. 'You are enough. The number does not matter. You matter.' Kiss him before he can construct a counter-argument. He freezes. Then his hands — the shaking hands, the commander's hands — are on your back and he is pulling you in and the kiss is desperate in a way that Caeron is never desperate and the sound he makes against your mouth is the sound of a man who has been holding his breath for years and is finally, finally exhaling","target":"BOND_RETURN","points":{"rose":2}},{"letter":"C","text":"Sit with him. Talk about nothing — home, food, the bad poetry Aldric thinks no one knows about. Make him laugh. He resists. Then he does not resist. Then he is laughing and the dispatch is still face-down and the candle burns low and at some point his hand is resting on yours on the table and neither of you moves it","target":"BOND_RETURN","points":{"rose":1,"crown":1}}]},"DATE_LYSANDER":{"id":"DATE_LYSANDER","title":"THE SWORD AND THE SCAR","location":"Forest Road — Treeline, Night","prose":["He is at the treeline because Lysander is always at the treeline — the edge of things, the boundary between the group and the dark, the place where a man who no longer belongs to anything can stand and watch the fire without being warmed by it.","You find him leaning against an oak with his sword unsheathed and laid across his knees. Not cleaning it. Not sharpening it. Just holding it, the way you hold a thing that has been your companion longer than any person. The blade reflects the distant firelight.","'Do not,' he says, before you speak. 'Do not ask if I am alright. I am a forty-year-old man sitting in the dark with a sword. The answer is obvious.'","'I was not going to ask that.'","He looks at you. Lysander's look is the heaviest thing in the world — decades of war and disillusion and the specific gravity of a man who did everything right and watched it mean nothing. But tonight there is something else in it. Something lighter. Not hope — Lysander is past hope — but the memory of what hope used to feel like.","'Then what?'","'I came because I wanted to.'","He is quiet for a long time. The sword stays on his knees. Then he sheathes it — slowly, deliberately, the gesture of a man putting down something he has been carrying for too long.","'You know I left the Order,' he says. 'You know why. What you do not know—' He rolls up his left sleeve. A scar runs from wrist to elbow, old and silver and thick. Not a sword wound. Too deliberate. Too straight. 'Two years after I left. I was in Palanthas. I was drinking. I had stopped being a knight and I had not yet figured out what to be instead. A woman found me in a tavern and stitched it and told me I was a waste and I have been angry about the fact that she was right ever since.'","He rolls the sleeve down. Looks at you. 'I am telling you this because you deserve to know the thing I carry. Before you decide — about me, about whatever this is. You deserve the full report.'","'The full report does not change anything.'","'It should.'","'It does not.'","He stands. He is taller when he is uncertain — as though the vulnerability adds an inch, the way a man straightens when he is bracing for impact. He is looking at you with the expression of someone who has forgotten what it means to be chosen and is trying to remember the protocol.","'I am too old for this,' he says.","'You are not.'","'I am difficult. I am angry. I have not been kind to another person in—' He stops counting. The number is too large. 'I do not know how to do this gently.'"],"boxes":[{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"'Then do not do it gently.' Step into him. He is stiff — a soldier's posture, every muscle armoured — and then your hand is on his chest and you can feel his heart hammering beneath the leather and the scars and the years. 'I am not asking for gentle,' you say. 'I am asking for honest.' He makes a sound. Not words. Something older than words. His hand covers yours on his chest and then his mouth is on yours and the kiss is not gentle — it is raw and desperate and years of loneliness converting into a single point of contact and he is shaking and you are holding him upright and the treeline could be burning and neither of you would notice","target":"BOND_RETURN","points":{"rose":2,"sword":1}},{"letter":"B","text":"Take his hand. The scarred one. Turn it over. Press your lips to the scar on his wrist — gently, deliberately, with the specific tenderness of someone who is saying: this is not a waste. You are not a waste. This is worth something. He is absolutely still. You can feel his pulse under your lips, fast and uneven. When you look up, his face has come apart — the cynicism, the anger, the armour, all of it gone, and underneath is a man who is fifty per cent grief and fifty per cent the sudden, devastating realisation that someone has just touched the worst thing about him and not flinched. 'You—' His voice breaks. He pulls you in. Holds on. Does not let go for a very long time","target":"BOND_RETURN","points":{"rose":2}},{"letter":"C","text":"'Sit down. Tell me about the woman in Palanthas. Tell me all of it. Every year since.' Sit beside him against the oak and listen as the fire burns down and the story comes out, not in order, not cleanly, but in the fragments a broken man offers when he has decided to let someone see the pieces. It takes hours. He cries once — silently, briefly, furious about it. You do not comment. When he finishes, the sky is grey with predawn and he looks lighter. Not healed. But lighter. 'No one has ever listened to the whole thing,' he says. 'Thank you.' The word sounds unfamiliar in his mouth. He is learning it","target":"BOND_RETURN","points":{"rose":1,"crown":1}}]},"DATE_MIRA":{"id":"DATE_MIRA","title":"THE HEALER'S HANDS","location":"Forest Road — Mira's Station, Night","prose":["She has not stopped moving since the column halted. You have been watching — not deliberately, but with the peripheral awareness that comes from caring about someone who does not care about themselves with sufficient diligence. She checked Aldric's shoulder. She rebound Sera's wrist. She counted the supplies twice and reorganised the surgical kit three times and now she is sitting with her back against the supply cart and her hands in her lap and she is not moving because she has run out of motion.","'Mira.'","'I am fine.' She says it the way she says everything — practically, efficiently, with the specific conviction of someone who has diagnosed herself and refuses to accept the diagnosis. Then: 'I am not fine. I have been fine for eleven hours and the contract has expired.'","You sit beside her. Close enough that your shoulders touch. She does not lean away. She leans in — just barely, a degree of weight that says she has been holding herself upright through professional obligation and the obligation has clocked out for the night.","Her hands are shaking. Not dramatically — a fine tremor in the fingers, the kind that comes from sustained precision work. Healing hands. They have been healing all day and now they have nothing to heal and they do not know how to stop.","You take her hands. She lets you. They are cold and rougher than you expected — callused differently from sword hands, the pads thick from grinding herbs, a thin scar across the left palm where she told you a blade slipped during her first field surgery. You hold them and she watches you hold them with the expression of someone who has spent her life putting other people back together and has forgotten what it feels like from the other side.","'No one—' She stops. Starts again. 'I am always the one who holds the hands. It is what I do. I hold the hands and I count the breathing and I am steady because someone has to be steady. And it works. It always works. Except that after a while you forget that your hands need holding too.'","She is crying. Quietly, efficiently, even her grief organised — tears running but breathing controlled, the discipline of a woman who learned a long time ago to fall apart without making a sound. You do not wipe the tears away. You hold her hands and you let her cry and you are steady because someone has to be steady and tonight it is your turn.","After a while the trembling stops. She breathes out. Looks at your hands holding hers. 'You have a blister forming on your left index finger,' she says. 'The grip on your sword is too tight. I will wrap it in the morning.' She laughs — small, wet, the ghost of humour returning. 'I cannot stop. I am sorry. I look at you and I see things that need tending.'","'Then tend them.' You turn your hand over. Offer her the blister, the calluses, the accumulated small damages of a month on the road. Not because they need healing. Because she needs to heal.","She unwraps a strip of bandage — her hands steady now, the muscle memory taking over. She wraps your finger with the absent-minded care of someone performing a task so familiar it has become a form of love. When she finishes, she does not let go.","'Stay,' she says. 'I do not need healing. I need—' She looks at you. 'I need someone to sit with me and not need anything.'"],"boxes":[{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Stay. All night. She falls asleep against your shoulder sometime around the third hour and you do not move because the weight of her sleeping is the most important thing you have ever carried. When she wakes she is embarrassed. You are not","target":"BOND_RETURN","points":{"rose":2}},{"letter":"B","text":"Kiss the top of her head. 'I am here. I do not need anything.' She makes a sound that is either a laugh or a sob or both and her arms go around you and she holds on the way she never allows herself to hold on — not as a healer, not as the steady one, just as a woman who is frightened and tired and has finally found the one person she trusts enough to be both","target":"BOND_RETURN","points":{"rose":2}},{"letter":"C","text":"'Tell me about the scar on your left hand. The real story, not the field surgery version.' She tells you. It is a longer story than you expected and it involves a boy she loved when she was sixteen and a window she climbed out of and a knife she grabbed the wrong way in the dark. She is laughing by the end. Properly laughing. The tremor is gone","target":"BOND_RETURN","points":{"rose":1,"crown":1}}]},"DATE_SERA":{"id":"DATE_SERA","title":"AFTER THE ASSESSMENT","location":"Forest Road — Ridge Overlook, Night","prose":["She is on the ridge because Sera is always on the ridge. High ground, clear sightlines, two exits — she chooses her positions the way she chooses everything: with the absolute precision of someone who has turned survival into an art form. You climb up. She watched you coming for two minutes before you started climbing and she already has an opinion about your approach angle.","'Your left,' she says. 'You favour your left on uneven ground. An archer would notice.'","'I am not worried about archers. I am worried about you.'","Something shifts in her face. The professional mask — the Scout Nighthollow mask, precise and cool and always slightly ahead of everyone else — holds for a half-second longer and then adjusts. Not gone. Loosened. The way armour shifts when you undo one strap.","She looks at you. The moonlight does something to her face that the daylight does not — softens the angles, finds the version of her that exists underneath the competence. She is beautiful in the way that dangerous things are beautiful, which is to say: you are very aware that this is a person who could kill you from this distance before you registered the shot, and the fact that she is choosing not to is its own form of intimacy.","'I do not do this,' she says. 'I observe. I report. I do not—' She gestures between you. The gesture is the least precise thing she has ever done. 'This. Whatever this is. I do not have a field manual for this.'","'You have assessed me.'","'Constantly.' No hesitation. 'Your sword grip, your footwork, your breathing pattern during stress, the way your eyes move when you enter a room, the scar on your right forearm that you got from a training accident you have never told anyone about.' She is not looking at you. She is looking at the horizon. 'I have assessed you every day since the courtyard. I have filed detailed mental reports. None of them are adequate.'","'What are they missing?'","She turns. Steps closer. The distance between you narrows to an arm's length and then to less and she moves the way she moves through the dark — without sound, without warning, with the absolute commitment of someone who has chosen her angle of approach and is not going to change it.","'They are missing the part where I stop assessing.' Her voice is lower than you have heard it. Her hand finds the front of your shirt — not pulling, just resting there, feeling the heartbeat underneath. 'Your pulse just increased. You are breathing faster. Your pupils are dilated.' She is cataloguing you and the cataloguing has become something else, the clinical attention turning warm and focused and very close. 'I am going to stop assessing now.'","She kisses you. It is — like everything Sera does — precise. Deliberate. And then approximately three seconds in, it is not precise at all. It is the controlled professional losing control and the loss is dizzying and mutual and her hands are in your hair and your hands are on her waist and she makes a sound against your mouth that is the least tactical thing she has ever done.","When she pulls back her breathing is uneven. She looks at you. The mask is gone entirely. Underneath it she is younger and more startled and more wanting than you have ever seen her.","'I am going to need a moment,' she says, 'to recalibrate.'","'Take your time.'","'That is not what I want to do with my time.' She pulls you back."],"boxes":[{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"The ridge. The moonlight. The woman who sees everything, finally letting herself be seen. Stay until you have both forgotten what precision feels like. The night is very long and neither of you uses it for sleeping and in the morning she will be Sera Nighthollow again, the mask back in place, the assessment running. But she will look at you once, across the camp, and the mask will slip for a half-second, and that half-second will be worth everything","target":"BOND_RETURN","points":{"rose":2,"sword":1}},{"letter":"B","text":"'I see you too.' Tell her what you have observed — the way she checks the perimeter twice when she is nervous, the way she touches the bowstring when she is thinking, the way she looks south and her jaw tightens. Show her that assessment goes both ways. She is very quiet when you finish. Then: 'No one has ever watched me back.' The second kiss is slower. The third is not slow at all","target":"BOND_RETURN","points":{"rose":2}},{"letter":"C","text":"Hold her. Not strategically. Not with any angle of approach. Just hold her and let the competence rest for one night. She is stiff at first — her body does not know how to be held without a tactical purpose — and then something releases, a tension she has been carrying since long before you met her, and she fits against you with a sigh that says she has been waiting for someone to make this feel safe","target":"BOND_RETURN","points":{"rose":1,"crown":1}}]},"DATE_TARIEL":{"id":"DATE_TARIEL","title":"THE OBSERVER OBSERVED","location":"Forest Road — Camp Edge, Night","prose":["Her notebook is closed. You have never seen Tariel's notebook closed when she is awake. She is sitting at the edge of the firelight with her knees drawn up and the closed notebook in her lap and she is looking at the fire with the expression of someone who has run out of observations. Not because there is nothing to observe — because she has observed too much and the weight of it has exceeded the notebook's capacity to contain it.","She hears you coming. She hears everything. But she does not open the notebook.","'I have been trying to write about you,' she says. No preamble. Tariel does not do preamble. 'For seven weeks I have been trying to write about you and I cannot find the right framework. You are not the Order. You are not the system. You defy categorisation and I find it—' She pauses. Chooses the next word with the care of someone who knows words are the most dangerous things she carries. '—distracting.'","You sit beside her. The fire crackles. She watches you sit down with the attentiveness she usually reserves for institutions, the dark eyes cataloguing the angle of your shoulders, the distance you chose, the way you breathe.","'I came here to study the knighthood,' she says. 'To understand why people choose this. The Oath, the structure, the willingness to die for a system. I have catalogued every mechanism of indoctrination. I have identified every leverage point.' She turns to you. The firelight catches the silver at her temples — she is not old, but she has earned those strands. 'And then you happened. And you are the one thing I cannot explain with leverage points.'","'Maybe it is not about leverage.'","'That is what I am afraid of.' Her voice drops. The professional distance — the journalist's distance, the observer's distance — is still there, but thin now, translucent, and you can see through it to the woman underneath who has spent her career at arm's length from everything and has discovered, at the worst possible time, that arm's length is too far.","She puts the notebook on the ground. The gesture is deliberate. She does not put the notebook down. The notebook is her armour. Without it she is just a woman at a fire, looking at you, and the vulnerability of it is breathtaking.","'I am going to say something that I cannot take back,' she says. 'And I need you to understand that I have never said it to anyone and I am not certain I know how.'","'Say it.'","'I am not studying you anymore. I stopped studying you weeks ago. What I have been doing is—' She looks at the fire. Back at you. 'What I have been doing is looking at you and feeling something that I do not have a framework for and I am terrified. Not of the war. Of this. Of you. Of what it means that I would rather be here — without the notebook, without the distance, without any of the things that keep me safe — than anywhere else in Krynn.'"],"boxes":[{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"'Then be here.' Take the notebook. Set it further away. Move closer. 'No framework. No distance. Just here.' She is trembling. Not from cold. You brush the hair from her face and she closes her eyes and when you kiss her it is the quietest, most careful kiss — not because you are uncertain, but because this woman has never let anyone this close and the gentleness is a form of respect. She kisses back. Slowly. Then not slowly. Then the notebook is forgotten and the fire is forgotten and she is holding onto you like the last true thing in a world full of analysis","target":"BOND_RETURN","points":{"rose":2}},{"letter":"B","text":"'Write about this. Right now. Not the analysis. The feeling. What it actually feels like.' She stares at you. Opens the notebook. Writes. Her hand is shaking. When she finishes, she reads it aloud — halting, raw, nothing like her dispatches, everything like the truth. When she looks up there are tears on her face and she is smiling and the smile is the most unguarded thing you have ever seen from Tariel Duskmantle","target":"BOND_RETURN","points":{"rose":2,"crown":1}},{"letter":"C","text":"Say nothing. Take her hand. Sit with her in the quiet space where observation ends and presence begins. She laces her fingers through yours. Holds on. The fire burns down and the stars come out and she leans against you and for the first time since you have known her, Tariel Duskmantle is not watching. She is just here","target":"BOND_RETURN","points":{"rose":1}}]},"DATE_THESSALY":{"id":"DATE_THESSALY","title":"THE THIRD VERSION","location":"Forest Road — Camp Edge, Night","prose":["She is sitting on the fallen log at the edge of camp with her notebook open and her pen behind her ear and the locket in her hand. The locket is open. You have never seen the locket open when she knows someone is watching.","She does not close it when she sees you. That is how you know tonight is different.","'Sit,' she says. Not a request. An observation that you were going to sit anyway and she is acknowledging the inevitability.","You sit. The notebook is between you. She has written three columns — you can see the headers even in the firelight: PROFESSIONAL, HONEST, and a third column she has scratched out so thoroughly the paper is torn.","'The third column,' she says, watching you look at it, 'is the one where I write what I actually want instead of what I am willing to admit.' She turns toward you. The firelight catches the locket and the thing inside it — a scrap of paper, handwriting you cannot read at this distance. 'I am tired of scratching things out.'","She reaches up and takes the pen from behind her ear. Holds it out to you. 'Write something in the third column. Not what you think I want to read. What you would write if you knew no one would ever see it.'","You take the pen. Your fingers brush hers. She does not pull away. Her hand is smaller than you expected — ink-stained at the fingertips, a callus on the middle finger from years of writing, and warm in a way that makes you aware of how cold the night air is by contrast.","You write something. She reads it. Her face does the thing it does when she has received information that changes a conclusion she was already committed to — a small reorganisation behind the eyes, a breath held and released.","'Good,' she says. Very quiet. Then she takes the pen back and writes something beneath it. She turns the notebook so you can read it.","It is not professional. It is not even honest, in the way she uses the word — careful, verified, sourceable. It is the other thing. The thing she does not put in dispatches.","She watches you read it. 'I would like,' she says, 'to stop being the person who writes about the world happening and start being the person it happens to. Tonight. With you.'","The locket is still open. In the firelight you can finally read the scrap of paper inside it: a single line in her own handwriting, old enough that the ink has faded. *Remember what wanting feels like.*","She is remembering."],"boxes":[{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Kiss her. She has written enough. The pen falls somewhere. Neither of you looks for it. The notebook slides off the log. Her hand is on the back of your neck and she kisses the way she writes — precisely, thoroughly, with the focused attention of someone who has been composing this sentence for weeks and is finally putting the pen to the page. The locket presses cold between you and then warms","target":"BOND_RETURN","points":{"rose":2}},{"letter":"B","text":"'Read me the second column. The honest one.' She reads it. Her voice in the dark, reading sentences about you that are true and unflinching and kinder than anything she has said aloud. When she finishes, close the notebook. 'Now tell me the parts you did not write down.' She tells you. It takes a long time. She is shaking by the end — not from cold. You hold her hand through all of it and the pen stays on the ground and the night is very long and very honest and neither of you sleeps","target":"BOND_RETURN","points":{"rose":2,"crown":1}},{"letter":"C","text":"Write something else in the third column. Something that makes her laugh — really laugh, the sound she never makes when she thinks anyone important is listening. Then something that does not make her laugh. Then close the notebook. 'Enough writing,' you say. She nods. You sit together until the fire is embers, trading the pen back and forth, filling the margins with things neither of you will say aloud, and at some point her head is on your shoulder and the pen is still and the notebook is full of a conversation that no one will ever read","target":"BOND_RETURN","points":{"rose":1}}]},"DATE_VAEL":{"id":"DATE_VAEL","title":"THE LAST PASS","location":"Forest Road — Clearing, Dusk","prose":["She found the clearing twenty minutes ago and has been running forms since — not the regulation drills Caeron assigns but the real ones, the Ashmore family forms she has never shown anyone. You can tell by the footwork. It is faster than standard. Sharper. The blade traces patterns in the dusk light that look like writing in a language you almost understand.","She sees you. Does not stop. Finishes the form. The last motion is a high cut that ends with the blade perfectly still, the tip at throat height, her breathing even. She holds the position for a three-count. Lowers the blade.","'Staring is rude,' she says. She is smiling. The Vael smile — competitive, warm, the dare already forming.","'I was studying.'","'You were staring. I can tell the difference. When you study, your weight shifts left.' She tosses you a practice sword. You catch it. She notices the catch. 'Good. You are getting faster.'","The spar starts the way their spars always start: measured, technical, two people who have learned each other's patterns through months of daily repetition. She leads with the high guard she favours. You counter with the low redirect that works against it. She adjusts. You adjust. The conversation is in the steel and the footwork and the breathing.","Then it changes.","She drops the practice sword. 'Enough.'","The distance between you is a blade's width. You can feel the heat coming off her — exertion and something else, the flush rising up her neck, her chest rising and falling with each breath. Her hair has come loose from the tie and there is a strand across her face and she is not moving it and you are very aware that she is not moving it on purpose.","'I have been thinking,' she says, 'about what it means that the only person I cannot beat is the only person I want to—' She stops. Swallows. Vael Ashmore does not hesitate. She is hesitating. 'The only person I want.'","The practice sword is on the ground. Her hands are empty for the first time since you have known her and she does not know what to do with them and that uncertainty is the most honest thing she has ever shown you."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Athletics (+3) | STR | DC 12\n**SUCCESS (roll 12+):** You land the hit. She was not expecting it. Her eyes widen — not with pain, with surprise, and then with something hotter and more immediate than surprise.\n**FAILURE (roll 1-11):** She lands the hit. Your guard was open and she took it. But the way she follows through — checking the strike at the last instant, the blade resting against your chest instead of striking — is not how you end a spar. It is how you hold someone still."},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Show her what empty hands are for. Close the distance. Her breath hitches when your hand finds her waist and then her mouth finds yours and the competitive energy that has been building for months converts into something incandescent. She kisses like she fights — fully committed, no guard, and when you finally break apart she is breathing hard and her eyes are bright and she says, 'Best two out of three,' and she is not talking about the spar","target":"BOND_RETURN","points":{"rose":2,"sword":1}},{"letter":"B","text":"Take her hands. Hold them still. 'You know exactly what to do with them.' She looks at your hands holding hers and her face does something you have never seen — open, unguarded, the competitor gone and just the woman underneath. She steps closer. Presses her forehead against yours. Breathes. 'I never lose,' she whispers. 'And I have completely lost this.' She is shaking. You hold her until she stops","target":"BOND_RETURN","points":{"rose":2}},{"letter":"C","text":"Pick up the practice swords. Hand hers back. 'Again. This time without holding back.' The spar that follows is the best either of you has ever fought and when it ends you are both on the ground, breathing hard, laughing, and the distance between you is nothing and the stars are overhead and neither of you moves to stand up","target":"BOND_RETURN","points":{"rose":1,"sword":1}}]}};
