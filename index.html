// ── Loot Box ──────────────────────────────────────────
function parseLootBox(text){
  const lines=text.split('\n');
  let searchType='body';let moralCost=null;const lootTable=[];let hasRareRoll=false;
  let promptText='';let leaveText='';
  for(const line of lines){
    const l=line.trim();if(!l)continue;
    if(l.includes('SEARCH THE FALLEN')||l.includes('Search them'))searchType='body';
    if(l.includes('stash')||l.includes('STASH')||l.includes('cache'))searchType='stash';
    if(l.match(/-\d+\s*ROSE/))moralCost={rose:-1};
    if(l.match(/-\d+\s*CROWN/)){if(!moralCost)moralCost={};moralCost.crown=-1}
    // Parse loot table rows
    const lootM=l.match(/(\d+)-?(\d+)?:\s*(.+)/);
    if(lootM&&!l.includes('RARE ITEM')){
      lootTable.push({min:parseInt(lootM[1]),max:parseInt(lootM[2])||parseInt(lootM[1]),text:lootM[3].trim()});
    }
    if(l.includes('RARE ITEM ROLL'))hasRareRoll=true;
    if(l.includes('A)')||l.includes('Search them'))promptText=l;
    if(l.includes('B)')||l.includes('Leave'))leaveText=l;
  }
  return{searchType,moralCost,lootTable,hasRareRoll,promptText,leaveText};
}

function LootBox({text,gs,onStateUpdate}){
  const e=React.createElement;
  const parsed=React.useMemo(()=>parseLootBox(text),[text]);
  const[choice,setChoice]=useState(null);
  const[lootRoll,setLootRoll]=useState(null);
  const[rolling,setRolling]=useState(false);
  const[display,setDisplay]=useState(null);
  const[rareRoll,setRareRoll]=useState(null);

  const doLoot=()=>{
    setChoice('search');setRolling(true);let c=0;
    const iv=setInterval(()=>{setDisplay(rollDice(20));if(++c>=10){clearInterval(iv);
      const d20=rollDice(20);setLootRoll(d20);setDisplay(d20);setRolling(false);
      // Apply moral cost
      if(parsed.moralCost&&onStateUpdate){
        onStateUpdate(g=>{
          const ng={...g};
          if(parsed.moralCost.rose)ng.rose=(ng.rose||0)+parsed.moralCost.rose;
          if(parsed.moralCost.crown)ng.crown=(ng.crown||0)+parsed.moralCost.crown;
          return ng;
        });
      }
      // Add gold based on roll
      const goldDice=parsed.searchType==='stash'?'d6':'d4';
      let goldAmt=0;
      if(d20>=6&&d20<=10)goldAmt=rollDamage('1'+goldDice);
      else if(d20>=11&&d20<=14)goldAmt=rollDamage('2'+goldDice);
      else if(d20>=15&&d20<=17)goldAmt=rollDamage('3'+goldDice);
      else if(d20>=18&&d20<=19)goldAmt=rollDamage('4'+goldDice);
      else if(d20>=20)goldAmt=rollDamage('5'+goldDice);
      if(goldAmt>0&&onStateUpdate){
        onStateUpdate(g=>({...g,gold:(g.gold||0)+goldAmt}));
      }
      // Add items from loot text to inventory
      if(onStateUpdate&&d20>=6){
        const entry=parsed.lootTable.find(t=>d20>=t.min&&d20<=t.max);
        const txt=entry?entry.text:'';
        onStateUpdate(g=>{
          const ng={...g,inventory:[...(g.inventory||[])]};
          // Potions
          if(/Potion of Healing/i.test(txt)){ng.potions=(ng.potions||0)+1;if(!ng.inventory.includes('Potion of Healing'))ng.inventory.push('Potion of Healing')}
          // Rations
          const ratM=txt.match(/(\d+)\s*days?\s*rations/i);
          if(ratM){const days=parseInt(ratM[1]);ng.rations=(ng.rations||0)+days}
          // Named items
          const items=[
            [/caltrops/i,'Caltrops'],[/signal horn/i,'Signal Horn'],[/antitoxin/i,'Antitoxin'],
            [/venom vial/i,'Kapak Venom Vial'],[/spyglass/i,'Spyglass'],[/compass/i,'Compass'],
            [/bandage/i,null],[/whetstone/i,'Whetstone'],[/masterwork dagger/i,'Masterwork Dagger'],
            [/family sword|longsword/i,'Longsword'],[/patrol schedule/i,'Dragon Army Patrol Schedule'],
            [/patrol routes/i,'Dragon Army Patrol Routes'],[/coded orders/i,'Coded Orders'],
            [/attack route map/i,'Dragon Army Attack Route Map'],[/merchant.?s ledger/i,"Merchant's Ledger"],
            [/dispatch pouch/i,'Sealed Dispatch Pouch'],[/signal whistle/i,'Signal Whistle']
          ];
          for(const[rx,name] of items){
            if(rx.test(txt)){
              if(name==='Bandages'||!name){if(/bandage/i.test(txt))ng.bandages=(ng.bandages||0)+1}
              else if(!ng.inventory.includes(name))ng.inventory.push(name);
            }
          }
          return ng;
        });
      }
      // Rare roll on nat 20
      if(d20===20){
        setTimeout(()=>{
          const r=rollDice(20);setRareRoll(r);
          // Apply rare item
          if(r===20&&onStateUpdate){
            onStateUpdate(g=>{
              const ng={...g,magicItems:[...(g.magicItems||[])]};
              // +1 weapon or +1 armor
              const choice=Math.random()<0.5?{name:'+1 Weapon',desc:'+1 to attack and damage rolls',rarity:'Uncommon'}:{name:'+1 Armor',desc:'+1 AC',rarity:'Uncommon'};
              if(!ng.magicItems.some(m=>m.name===choice.name))ng.magicItems.push(choice);
              return ng;
            });
          }
        },1000);
      }
    }},60);
  };

  const doLeave=()=>{
    setChoice('leave');
    // Leaving often gives +1 ROSE or CROWN
    if(onStateUpdate){
      onStateUpdate(g=>({...g,rose:(g.rose||0)+1}));
    }
  };

  // Find matching loot text
  const getLootText=()=>{
    if(!lootRoll||!parsed.lootTable.length)return'';
    const entry=parsed.lootTable.find(t=>lootRoll>=t.min&&lootRoll<=t.max);
    return entry?entry.text:'Nothing found.';
  };

  return e('div',{className:'loot-wrapper'},
    !choice?e('div',null,
      e('div',{className:'box loot'},
        text.split('\n').filter(l=>l.trim()&&!l.includes('A)')&&!l.includes('B)')&&!l.includes('1-5')&&!l.includes('6-10')).slice(0,3).map((l,i)=>e('p',{key:i,dangerouslySetInnerHTML:{__html:fmt(l)}}))),
      e('div',{className:'loot-choice'},
        e('button',{className:'loot-choice-btn search',onClick:doLoot},'\u2694 Search'+(parsed.moralCost?' ('+Object.entries(parsed.moralCost).map(([k,v])=>v+' '+k.toUpperCase()).join(', ')+')':'')),
        e('button',{className:'loot-choice-btn leave',onClick:doLeave},'\u21b6 Leave (+1 ROSE)'))
    ):null,
    choice==='search'?e('div',null,
      e('div',{className:'dice-area'},
        e('div',{className:'dice-info'},'Loot Roll \u2022 d20'),
        lootRoll?e('div',{className:'dice-result '+(lootRoll>=11?'success':'fail')},
          e('span',{className:'dice-num'},lootRoll),
          e('div',{className:'dice-verdict'},lootRoll>=15?'EXCELLENT':lootRoll>=11?'GOOD':lootRoll>=6?'MODEST':'NOTHING')
        ):e('div',{className:'dice-placeholder'},rolling&&display?display:'?'),
        !lootRoll?e('button',{className:'dice-btn',disabled:true},'Rolling...'):null),
      lootRoll?e('div',{className:'loot-result'},
        e('p',{className:'loot-items',dangerouslySetInnerHTML:{__html:fmt(getLootText())}}),
        rareRoll?e('div',{style:{marginTop:'8px',padding:'8px',borderTop:'1px solid var(--gold)'}},
          e('p',null,'\u2728 RARE ITEM ROLL: '+rareRoll),
          e('p',{style:{color:rareRoll===20?'var(--gold)':'var(--text-dim)'}},
            rareRoll===20?'MAGIC ITEM! +1 weapon or +1 armor found!':'Quality mundane item — well-crafted but not magical.')
        ):null
      ):null
    ):null,
    choice==='leave'?e('div',{className:'loot-result'},
      e('p',null,'You leave them. +1 ROSE. Some things are not worth the weight.')
    ):null
  );

// Dynamic choice filtering based on companion state

// Filter scene boxes by class
function filterBoxes(boxes, gs) {
  if (!boxes || !gs) return boxes || [];
  return boxes.filter(b => {
    const t = b.text || '';
    const cls = gs.cls;
    // Hide Paladin-only boxes from Fighters
    if (cls === 'Fighter') {
      if (t.startsWith('**PALADIN') || t.startsWith('**Paladin Note') || t.startsWith('**Paladin Only'))return false;
      if (t.includes('PALADIN \u2014 DARK TEMPTATION') || t.includes('PALADIN \u2014 DIVINE TRACK') || t.includes('PALADIN \u2014 THE CHOOSING') || t.includes('PALADIN \u2014 FALLEN TRACK') || t.includes('PALADIN \u2014 THE HEALER'))return false;
      if (b.type === 'divine' || b.type === 'dg_track')return false;
    }
    // Hide Fighter-only boxes from Paladins
    if (cls === 'Paladin') {
      if (t.startsWith('**FIGHTER') || t.startsWith('**Fighter Only'))return false;
      if (t.includes('FIGHTER \u2014 MEASURE') || t.includes('FIGHTER \u2014 MEASURE TRACK'))return false;
      if (b.type === 'measure' && !t.includes('Paladin'))return false;
    }
    return true;
  });
}

// Determine mandatory detour scenes that must be visited before regular choices
function getMandatoryDetours(sceneId, gs) {
  if (!gs) return [];
  const cls = gs.cls;
  const flags = gs.flags || {};
  const visited = gs.awardedScenes || {};
  const detours = [];
  
  // Scene 27: Paladins must visit P1 before continuing
  if (sceneId === '27' && cls === 'Paladin' && !visited['P1_visited']) {
    detours.push({target: 'P1', label: 'The First Sign (Paladin)', mandatory: true});
  }
  // Scene 31: Paladins on DG track must visit DG2
  if (sceneId === '31' && cls === 'Paladin' && gs.dgTrack && gs.dgTrack !== 'NONE' && gs.dgTrack !== 'HELD FIRM' && gs.dgTrack !== 'PURIFIED' && !visited['DG2_visited']) {
    detours.push({target: 'DG2', label: 'The Dark Queen speaks (Paladin)', mandatory: true});
  }
  // Scene 46: Fighters must visit M2
  if (sceneId === '46' && cls === 'Fighter' && !visited['M2_visited']) {
    detours.push({target: 'M2', label: 'The Wrong Order (Fighter)', mandatory: true});
  }
  // Scene 60: Paladins on DG track must visit DG3; Fighters must visit M3
  if (sceneId === '60') {
    if (cls === 'Paladin' && ['LISTENING','COMPROMISED','FALLEN','DEEPLY FALLEN'].includes(gs.dgTrack) && !visited['DG3_visited']) {
      detours.push({target: 'DG3', label: 'The Crown \u2014 Takhisis speaks (Paladin)', mandatory: true});
    }
    if (cls === 'Fighter' && !visited['M3_visited']) {
      detours.push({target: 'M3', label: 'Two Oaths (Fighter)', mandatory: true});
    }
  }
  // Scene 68: Paladins must visit P4; Fallen must visit DG4; Fighters must visit M3 if not done
  if (sceneId === '68') {
    if (cls === 'Paladin' && !visited['P4_visited']) {
      detours.push({target: 'P4', label: 'The Choosing \u2014 your god speaks (Paladin)', mandatory: true});
    }
    if (cls === 'Paladin' && ['FALLEN','DEEPLY FALLEN'].includes(gs.dgTrack) && !visited['DG4_visited']) {
      detours.push({target: 'DG4', label: 'The Reckoning (Paladin)', mandatory: true});
    }
    if (cls === 'Fighter' && !visited['M3_visited'] && !visited['M4_visited']) {
      detours.push({target: 'M3', label: 'The Measure \u2014 Two Oaths (Fighter)', mandatory: true});
    }
  }
  // Scene 8: Fighter → M1, Paladin → 9
  if (sceneId === '8') {
    if (cls === 'Fighter' && !visited['M1_visited']) {
      detours.push({target: 'M1', label: 'The Letter and the Spirit (Fighter)', mandatory: false});
    }
  }
  return detours;
}

function filterChoices(choices, sceneId, gs) {
  if (!gs || !choices) return choices;
  const comps = gs.companions || [];
  const has = (name) => comps.some(c => c.toLowerCase().includes(name.toLowerCase()));
  
  // Hub visit gating: hide choices whose targets have already been visited
  const visitedScenes = new Set((gs.history || []).map(h => h.split(':')[0].trim()));
  
  return choices.map(c => {
    const txt = c.text || '';
    const target = c.target || '';
    
    // Hub scenes: hide already-visited choices (strip the "(If not yet visited)" prefix too)
    if (txt.includes('If not yet visited')) {
      if (target && visitedScenes.has(target)) return null;
      // Strip the prefix for display
      c = {...c, text: txt.replace(/^\(If not yet visited(?:,\s*[^)]+)?\)\s*/i, '')};
    }

    // Auto-hide visited choices in time-of-day hub scenes (exempt: shops, time transitions)
    const HUB_SCENES=['11_MORNING','11_AFTERNOON','11_EVENING'];
    const EXEMPT_TARGETS=new Set(['11_MORNING','11_AFTERNOON','11_EVENING','11_NIGHT','11_ARMOURY','11_QM','53_HUB_MORN']);
    if(HUB_SCENES.includes(sceneId)&&target&&!EXEMPT_TARGETS.has(target)&&visitedScenes.has(target))return null;

    // Scene 11 & 11B: swap companion-specific prep choices for discovery alternatives
    if (sceneId === '11' || sceneId === '11B') {
      // Thessaly: "Find Thessaly" → "A correspondent at the east gate is asking questions"
      if ((txt.includes('Thessaly') || txt.includes('Find Thessaly')) && target === '23') {
        if (!has('Thessaly')) return {...c, text: 'A correspondent at the east gate is asking sharp questions.', target: '6', _swapped: true};
      }
      // Mira: "Check on Mira" → "Check the infirmary"
      if ((txt.includes('Mira') || txt.includes('Check on Mira')) && target === '25') {
        if (!has('Mira')) return {...c, text: 'Visit the infirmary. There are refugees who need help.', target: '9', _swapped: true};
      }
    }
    
    // Scene 66B: filter to companions in party (Aldric and Caeron always present in narrative)
    if (sceneId === '66B') {
      if (target === '66B_Thessaly' && !has('Thessaly')) return null;
      if (target === '66B_Mira' && !has('Mira')) return null;
      if (target === '66B_Serath' && !has('Serath')) return null;
      if (target === '66B_Tariel' && !has('Tariel')) return null;
      if (target === '66B_Lysander' && !has('Lysander')) return null;
    }
    
    // Scene 71: filter epilogues to companions in party + hide already visited
    if (sceneId === '71') {
      if (target === '72' && !has('Aldric')) return null;
      if (target === '73' && !has('Thessaly')) return null;
      if (target === '74' && !has('Serath')) return null;
      if (target === '75' && !has('Mira')) return null;
      if (target === '76' && !has('Caeron')) return null;
      if (target === '77' && !has('Sera')) return null;
      if (target === '78' && !has('Vael')) return null;
      if (target === '79' && !has('Tariel')) return null;
      if (target === '80' && !has('Lysander')) return null;
      if (visitedScenes.has(target)) return null;
    }
    
    // Scene 53: gate optional companion finds
    if (sceneId === '53') {
      if (target === '56' && txt.includes('Thessaly') && !has('Thessaly')) return null;
      if (target === '54B' && txt.includes('Mira') && !has('Mira')) return null;
    }
    
    // Scene 22: Sera intel check
    if (sceneId === '22' && txt.includes('Sera') && !has('Sera')) return null;
    
    // Scene 32B: Lysander philosophy  
    if (sceneId === '32B' && target === '36B' && !has('Lysander')) return null;
    
    // Scene 40B: Lysander at fire
    if (sceneId === '40B' && txt.includes('Lysander') && !has('Lysander')) return null;
    
    // Scene 34: Sera night watch share
    if (sceneId === '34' && txt.includes('Sera') && !has('Sera')) return null;
    
    // Scene 66: Serath in danger
    if (sceneId === '66' && txt.includes('Serath') && !has('Serath')) return null;
    
    // Scene 8: class-split choices — Fighters go to M1 (already filtered), Paladins go to 9
    if(sceneId==='8'&&(c.letter==='C'||c.letter==='D')&&gs.cls==='Fighter')return null;

    // Scene 68: romance flame scenes
    if (sceneId === '68') {
      if (target === '68B' && !has('Sera')) return null;
      if (target === '68C' && !has('Vael')) return null;
    }
    
    // Scene 44: night scene with Sera
    if (sceneId === '44' && target === '34B' && !has('Sera')) return null;
    
    // Generic: any choice with "if present" - check all companions
    if (txt.toLowerCase().includes('if present')) {
      let found = false;
      for (const comp of COMPANIONS_ALL) {
        const parts = comp.split(' ');
        if (parts.some(p => txt.includes(p))) { found = has(parts[parts.length-1]); break; }
      }
      if (!found) return null;
    }
    
    // Story flag gating
    const flags=gs.flags||{};
    // Scene 31: dispatch pouch leverage requires having kept it
    if(sceneId==='31'&&c.letter==='D'&&!flags.dispatch_kept)return null;
    // Scene 53B: dispatch pouch reference check
    if(sceneId==='53'&&target==='53B'&&!flags.dispatch_kept){
      return {...c,text:c.text+' (requires dispatch pouch)',_disabled:true};
    }
    // Scene 57 choice C: requires Scene 53B choice B
    if(sceneId==='57'&&target==='58B'&&!(gs.awardedScenes||{})['53B_B']&&!(gs.awardedScenes||{})['53B_C'])return null;
    // DG scenes: gate by paladin class and DG track state
    if(target==='DG2'&&(gs.cls!=='Paladin'||!gs.dgTrack||gs.dgTrack==='NONE'))return null;
    if(target==='DG3'&&(gs.cls!=='Paladin'||!['LISTENING','COMPROMISED','FALLEN','DEEPLY FALLEN'].includes(gs.dgTrack)))return null;
    if(target==='DG4'&&(gs.cls!=='Paladin'||!['FALLEN','DEEPLY FALLEN'].includes(gs.dgTrack)))return null;
    // Paladin-only scenes
    if(['P1','P2','P3','P4','DG1','DG2','DG3','DG4'].includes(target)&&gs.cls!=='Paladin')return null;
    // Fighter-only scenes
    if(['M1','M2','M3','M4'].includes(target)&&gs.cls!=='Fighter')return null;
    if(target&&target.startsWith('M1_')&&gs.cls!=='Fighter')return null;
    if(target&&target.startsWith('M2_')&&gs.cls!=='Fighter')return null;
    if(target&&target.startsWith('M3_')&&gs.cls!=='Fighter')return null;
    if(target&&target.startsWith('M4_')&&gs.cls!=='Fighter')return null;
    // Romance date scenes: only show if player has active romance
    if(['DATE_WALK','DATE_SPAR','DATE_QUIET'].includes(target)){
      const hasRomance=Object.values(gs.romances||{}).some(v=>v&&v!=='Friend'&&v!=='Distant'&&v!=='Cold'&&v!=='Observer'&&v!=='Hostile');
      if(!hasRomance)return null;
    }
    // Poly date scenes: only show if polyamory accepted
    if(['DATE_POLY','DATE_POLY_MORN'].includes(target)){
      const activeRomances=Object.entries(gs.romances||{}).filter(([k,v])=>v&&!['Friend','Distant','Cold','Observer','Hostile'].includes(v));
      if(activeRomances.length<2)return null;
    }
    return c;
  }).filter(Boolean);
}

    // Lazy-load remaining scenes after UI is interactive
    setTimeout(function(){
      var later={"18":{"id":"18","title":"THE STRANGER IN THE BARN","location":"","prose":["*South Road — Night*","The barn south of the ridge — the one the mess-hall rider mentioned, the one the refugees have been avoiding. You remember his words: someone sheltering there, civilian clothes, moves like military. You almost walked past it. You did not.","The barn was supposed to be empty. Night patrol sweep, routine, you have done a hundred of these. Your lantern finds them behind the hay bales: dark clothes, a wound managed for at least a day without proper materials, eyes that come up to meet yours with the calm of someone who has set fear aside for later as a matter of function. The clothes are civilian. The cuts where insignia were removed are still visible in the fabric."],"boxes":[{"type":"companion","text":"**COMPANION JOINS: COMMANDER SERATH (CONDITIONAL)**\nDragon Army defector, possible love interest. Joins ONLY if you hide them.\nRole: Intelligence on Dragon Army movements and patrol schedules."},{"type":"roll","text":"**ROLL REQUIRED:** Insight (+1) | WIS | DC 14\n**SUCCESS (roll 14+):** They are telling the truth. The fear points south, not at you. Choose with full knowledge.\n**FAILURE (roll 1-13):** You cannot read them. You decide blind.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**Paladin Note:**\nIf you are a Paladin: your Divine Sense activates involuntarily. Serath is not fiend, undead, or celestial — they register as a person in genuine distress. The reading is clean. This is a human who is afraid. Mark 1 tally under MISHAKAL (the god of mercy toward the wounded)."}],"choices":[{"letter":"A","text":"Hide them. Treat the wound. Sort the implications later.","target":"36","points":{"ROSE":1},"romance_comp":"Commander Serath","romance_spark":true},{"letter":"B","text":"Ask them to prove the defection first.","target":"37","points":{"ROSE":1}},{"letter":"C","text":"Tell Aldric — this is a two-person decision.","target":"38","points":{}},{"letter":"D","text":"Report them immediately.","target":"39","points":{"CROWN":2}}]},"26":{"id":"26","title":"THE SOUTH ROAD AMBUSH","location":"","prose":["*South Road — Day 1 of Exercise*","The south road is pine-scented and cold and then the treeline erupts. Three miles from Brightholm — close enough that you could still, if you strained, hear the morning bell — four Baaz Draconians come out of the trees with the businesslike certainty of a unit that has done this before and expects it to work. They cut off the road. They advance. No parley. Aldric's hand is on his sword hilt. So is yours, you notice, before you consciously decided."],"boxes":[{"type":"info","text":"**Paladin Note: Before the Fight**\nIf you are a Paladin: in the half-second before the draconians move, you hear something — a voice, barely there, like a command shouted across a great distance. It is one word. You cannot quite catch it. But your hand is already on your sword and you feel no fear. Mark 1 tally under KIRI-JOLITH (the god who steadies soldiers before battle)."},{"type":"combat","text":"**COMBAT ENCOUNTER — DRAGON ARMY SCOUT PATROL**\nSetup: Four Baaz Draconians block the road. Aldric fights beside you.\n**ENEMIES:**\n• Baaz Draconian x4: AC 13, HP 18 each, Speed 30 ft.\n• Shortsword +3, 1d6+1 piercing. Or Javelin +3, range 30/120 ft., 1d6+1.\n• Death Throes: Turns to stone at 0 HP. DC 10 DEX save or restrained 1 min.\n**YOUR STATS THIS FIGHT:** Fighter: HP 12, AC 16, Longsword +5 1d8+3. Second Wind available. Aldric: AC 15, HP 14, +1 to your rolls. Paladin: HP 10, AC 16, Longsword +5 1d8+3. Lay on Hands pool available. Divine Smite: expend a spell slot (at Level 2) for +2d8 radiant.\nEnemy Tactics: Two draconians rush the closest target. Two hang back with javelins. Killing two causes the remaining two to spread rather than retreat.\nFleeing: Disengage + Dash action. DC 12 Athletics or one free attack as you run.\nRewards: 60 XP. Sealed dispatch pouch (inventory item).\nVictory: Road clear. Aldric claps your shoulder. 'I did not expect that.' Proceed to Scene 27.\nFallen (0 HP): 0 HP. Aldric drags you clear and stabilises you. Proceed to Scene 27 with 1 HP, one exhaustion."},{"type":"info","text":"**BAAZ DRACONIAN (CR 1/2)** AC 13 | HP 18 | Speed 30 ft.\nAttacks: Shortsword +3, 1d6+1 piercing. Javelin +3, range 30/120 ft., 1d6+1 piercing.\nSpecial: Death Throes: Stone at 0 HP. Creature within 5 ft. DC 10 DEX save or restrained 1 min."}],"choices":[{"letter":"A","text":"The draconians are stone. Continue to Scene 27.","target":"27","points":{}}]},"27":{"id":"27","title":"AFTER THE AMBUSH","location":"","prose":["*South Road*","Four Baaz, stone now. The dispatch pouch from the patrol leader bears a Black Wing seal. This is an advance element. They were mapping the road to the garrison. Aldric looks at you with a new calculation in his eyes."],"boxes":[{"type":"info","text":"**TRACK YOUR HP**\nAfter the ambush: update your current HP on your sheet. Native PC starting HP: Fighter 12, Paladin 10. Each Baaz hit deals 1d6+1 (average 4). CPC: record any HP lost. Rest opportunity before Scene 27 if you need it."},{"type":"levelup","text":"**LEVEL UP — YOU ARE NOW LEVEL 2**\nNew Features: Fighter: Action Surge (extra action, 1/short rest). Choose Archetype: Champion (Improved Critical 19-20), Battle Master (4 Superiority Dice d8, 3 manoeuvres), or Eldritch Knight (2 cantrips, 2 1st-level spells, 2 spell slots). Paladin: Fighting Style (Dueling, Great Weapon, or Protection). Spellcasting: 2 first-level slots. Choose 2 spells from: Bless, Command, Cure Wounds, Detect Evil and Good, Divine Favour, Protection from Evil and Good. Divine Smite now available: on a hit, expend a spell slot to add +2d8 radiant damage.\nSpell Slots / HP: Native PC — Fighter: HP +7 (total 19). Paladin: HP +6 (total 16). CPC: add your Level 2 HP roll (1d10+CON for Fighter, 1d8+CON for Paladin) to your sheet.\nRecord this on your character sheet before continuing."},{"type":"info","text":"**PALADIN — DIVINE TRACK**\nBefore making your choice below, Paladins turn to Scene P1 (The First Sign) now. It occurs this same night — you are on watch and something happens. After P1 and DG1, return here and choose your path forward."},{"type":"info","text":"**OPTIONAL SCENE — THE WAYPOINT FIRE**\nThe night after the ambush, on the road back: there is someone at the waypoint mile-marker who should not be there. If you want to investigate, turn to Scene 27B now. Scene 27B introduces Lysander Graves. It leads to Scene 36."},{"type":"info","text":"**DARK SCENE — SCENE 32B**\nScene 32B (What the Army Left Behind) is available now. It depicts what the Dragon Army did in the village of Thresh — you will find it before Scene 31. It leads to Scene 36. NOTE: Vael Ashmore appears in 32B."}],"choices":[{"letter":"E","text":"Turn to Scene 32B now — what the army left in Thresh.","target":"32B","points":{}},{"letter":"A","text":"Turn to Scene P1 now .","target":"P1","points":{}},{"letter":"B","text":"Take the dispatch immediately to Lord Caeron.","target":"31","points":{"CROWN":2}},{"letter":"C","text":"Read it yourself first.","target":"31","points":{"ROSE":1,"CROWN":1}},{"letter":"D","text":"Hide it and find the nearest refugee camp.","target":"44","points":{"ROSE":1}},{"letter":"F","text":"Investigate the stranger at the waypoint fire (Scene 27B)","target":"27B","points":{}}]},"27B":{"id":"27B","title":"THE WAYPOINT FIRE","location":"","prose":["*South Road — Night After the Ambush*","The dead draconians at the waypoints. The garrison rider's story at the mess table: someone is out there hunting them alone. You find out who at the mile-marker.","The waypoint mile-marker, which the garrison uses for overnight stops on extended patrols. A fire, built well — the economical kind that throws heat in one direction and minimal light in every other, the fire of someone who knows what sees fire in the dark. A man sitting against the marker stone, cleaning a blade. He looks up when you approach without alarm, which means he heard you a hundred yards ago and decided you were not a threat.","The blade is not regulation. Solamnic steel, yes — you recognise the fuller line — but the grip has been rewrapped in dark leather, and the crossguard has been modified. The armour, too: Solamnic issue, Knight of the Sword markings half-filed and then left, as if the filing was an impulse he reconsidered or an argument he abandoned.","There are two dead Baaz Draconians at the tree line. They are very recently dead. He did this alone.","'You are from Brightholm,' he says. Not a question. He has seen your tabard. 'Squires.' He looks at Aldric, then at you, the assessment of a professional cataloguing what he is working with. 'How many did you fight today?' You tell him. Four. He nods. 'I had two. They are getting sloppy or I am getting faster. Both are bad signs, for different reasons.'","'Sit,' he says. 'The road is clear for two miles and I have more food than one person needs. That is not generosity — it is logistical efficiency. I stole it from a Dragon Army supply drop an hour ago and it is going to spoil.'","He eats the way soldiers eat — fast, without tasting it, the habit of someone who has been eating between things for long enough that meals have become fuel rather than events. Between bites he tells you, without being asked, that he has been on the south road for three weeks. Alone. He has killed more draconians in that time than most patrols. He has reported none of it because there is no one to report it to, or rather there is, but the report would involve explaining why he is here and who sent him and the answer to both is: no one.","**CONVICTION CHOICE (Lysander Corruption Track — Experience 1):**","**ROMANCE CHOICE (optional — after conviction choice):**"],"boxes":[{"type":"companion","text":"**COMPANION JOINS: LYSANDER GRAVES**\nKnight of the Sword — technically. Currently operating as an independent. He is brilliant, charismatic, and carrying something he has not set down in years. Possible love interest — the dangerous kind.\n**Role:** Combat instructor: once per Act, Lysander teaches you a technique. +1 to your next attack roll after receiving instruction."},{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 12\n**SUCCESS (roll 12+):** The half-filed insignia. He started removing his Order markings and stopped. Not because he changed his mind about leaving — his body language is clear: he has left. He stopped filing because erasing it felt dishonest. He earned it. He does not want to serve under it. He does not want to pretend he never wore it. This is a man for whom honesty is the last principle standing, and he is holding onto it with both hands.\n**FAILURE (roll 1-11):** He is a Knight, or was. He fights well. That is all you can read in the firelight.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"'You fight like a Knight of the Sword.' 'I fight like a man who was one.'","target":"DG1","points":{"SWORD":1},"conviction":"QUESTIONING"},{"letter":"B","text":"'The half-filed insignia. You stopped.' 'I stopped.'","target":"DG1","points":{"ROSE":1},"conviction":"QUESTIONING"},{"letter":"C","text":"'You should report to the garrison. There is a chain of command.' He laughs — genuinely.","target":"DG1","points":{"CROWN":1},"conviction":"STEADFAST"},{"letter":"D","text":"Say nothing. Share the fire.","target":"DG1","points":{"ROSE":1},"conviction":"QUESTIONING"},{"letter":"R1","text":"There is something about the firelight and the competence and the half-filed insignia. You notice him differently than you notice other people.","target":null,"points":{},"romance_comp":"Lysander Graves","romance_spark":true},{"letter":"R2","text":"You share the fire. It is what it is.","target":null,"points":{}}]},"P1":{"id":"P1","title":"THE FIRST SIGN","location":"","prose":["*South Road — Night After the Ambush*","You are keeping watch after the ambush. The fire is low. Aldric is asleep. The night is ordinary in every way except one: the wound on your arm — a graze from a javelin you barely noticed during the fight — has stopped bleeding. You look at it in the firelight. The skin is closed. Not healed over days. Closed, as if it were a week old.","You did not do this. You do not have magic like this. Not yet. There is no spell, no prayer, nothing you can point to as a cause. Just: you were hurt, and now you are less hurt than you should be.","You sit with this for a while. Then you decide what it means:"],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nFighters: skip to Scene 27 or wherever the story sends you next. Paladins: read this scene before continuing."},{"type":"divine","text":"**DIVINE SIGN**\nThe wound is closed. The night is still. Somewhere very far away, something is paying attention to you. It does not feel like a threat. It does not feel like a gift either. It feels like: a gaze. Patient. Vast. Waiting to see what you do next."}],"choices":[{"letter":"A","text":"A sign of protection from a god of good and law — silver light, a guardian's gaze.** Mark 1 tally: PALADINE.","target":"DG1","points":{"ROSE":1}},{"letter":"B","text":"A sign from a god of battle — the warrior's body sustained so it can fight again.** Mark 1 tally: KIRI-JOLITH.","target":"DG1","points":{"SWORD":1}},{"letter":"C","text":"A sign from a god of healing — the body made whole by something that values wholeness.** Mark 1 tally: MISHAKAL.","target":"DG1","points":{"ROSE":1}},{"letter":"D","text":"A sign from a god of nature — living things mend; this is just that, applied.** Mark 1 tally: HABBAKUK.","target":"DG1","points":{"ROSE":1}},{"letter":"E","text":"You are not sure what it means. Mark nothing. Carry the question.","target":"DG1","points":{"ROSE":1}}]},"DG1":{"id":"DG1","title":"THE WHISPER IN THE WOUND","location":"","prose":["*South Road — Night After the Ambush (Paladin Only)*","The wound is closed. That is what you know. What you do not know is what closed it. You are sitting alone at the edge of the firelight when you first hear it — not a voice exactly, more like the shape a voice leaves behind. Something that knows your name and the weight of your ambitions and has been waiting for a moment when you were alone and questioning."],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nThis scene occurs the same night as P1. Read P1 first. Then read this. Fighters: skip to Scene 28."},{"type":"dark","text":"**DARK TEMPTATION — TAKHISIS WHISPERS**\nYou have been chosen. Not by your little gods of law and healing — by something older. Something that does not ask you to serve. That wound? I closed it. Not them. I saw what you could become and I preserved it. Your gods of good ask you to give. I offer you to take. The Dragon Armies will reshape this world. You could reshape them. One word is all it needs. One small yes."}],"choices":[{"letter":"A","text":"Refuse. Directly, clearly, with the Oath. You know what this is.","target":"DG1_held","points":{}},{"letter":"B","text":"Refuse but you are shaken. The voice knew things.","target":"DG1_shaken","points":{}},{"letter":"C","text":"Ask who is speaking. Not agreement — but you engage with it.","target":"DG1_listen","points":{}},{"letter":"D","text":"The wound is real. The help is real. You do not say yes — but you do not say no.","target":"DG1_silent","points":{}}]},"DG1_held":{"id":"DG1_held","title":"THE REFUSAL","location":"","prose":["*South Road — The Same Night*","The voice does not argue. It simply goes. That is what tells you it was real — a voice inside your head would have argued. This one left clean, the way things leave when they have been told no by someone who means it. You sit with the silence for a while. It smells of cold pine and the road and something faintly metallic that might be the aftermath of a divine voice or might just be the night air near a weapon."],"boxes":[{"type":"dg_track","text":"**DG TRACK: HELD**\nYou have refused the first temptation cleanly. Mark HELD on your God Sign notes. This choice compounds — each refusal makes the next easier."}],"choices":[{"letter":"A","text":"Continue to Scene 28.","target":"28","points":{}}]},"DG1_shaken":{"id":"DG1_shaken","title":"THE SHAKEN REFUSAL","location":"","prose":["*South Road — The Same Night*","You said no. That matters. But it knew your name. It knew about the ambition you have not told anyone — the one that lives just under the dedication, the one that might be what actually drives you. You cannot sleep. Somewhere between watch changes you make yourself say the Oath aloud, quietly, to no one. Just to hear it in your own voice. Just to check it is still yours."],"boxes":[{"type":"dg_track","text":"**DG TRACK: HELD (SHAKEN)**\nYou refused, but the temptation landed. Reduce your highest god tally by 1 — the doubt is real. The Dark Queen will find the crack next time."}],"choices":[{"letter":"A","text":"Continue to Scene 28.","target":"28","points":{}}]},"DG1_listen":{"id":"DG1_listen","title":"THE FIRST STEP","location":"","prose":["*South Road — The Same Night*","You asked. The voice told you: Someone who sees what you are capable of. Then it went quiet, not because you refused it but because it had planted what it wanted to plant. You will think about this in the morning. You will tell yourself you were just gathering information. You will almost believe it."],"boxes":[{"type":"dg_track","text":"**DG TRACK: LISTENING ■**\nYou engaged. This is not a fall — yet. But Takhisis does not need agreement. She needs attention. You have given her yours. Mark LISTENING. If you reach FALLEN by DG3 without recovery, your divine abilities are affected."}],"choices":[{"letter":"A","text":"Continue to Scene 28.","target":"28","points":{}}]},"DG1_silent":{"id":"DG1_silent","title":"THE SILENT COMPROMISE","location":"","prose":["*South Road — The Same Night*","You did not say yes. But you let the silence be the answer, and the voice heard that silence the way it was listening for — not as refusal. In the morning the wound is still closed and you are still yourself and the world is still the same world. Almost.","*End of Act One.*","The field exercise has become something far more serious. The 'bandits' are refugees. The Dragon Army has a scout presence within two hours. Scenes 28-52 cover the refugee crisis, a major command decision, two more combat encounters, and the aftermath that defines your Order path. Paladins: Paladin Scene P2 is in Act Two."],"boxes":[{"type":"dg_track","text":"**DG TRACK: COMPROMISED ■■**\nSilence was acceptance enough. Mark COMPROMISED. Your Lay on Hands pool is reduced by 2 HP until you find recovery. The connection to your true god has been partially muffled."}],"choices":[{"letter":"A","text":"Continue to Scene 28.","target":"28","points":{}}]},"28":{"id":"28","title":"WHAT CAERON LOOKS FOR","location":"","prose":["*Castle Brightholm — Armoury*","'Someone who can hold two truths at once — that the law matters and that people matter more. Most can only hold one.'","He says it the way someone says a thing they have thought about very carefully and arrived at through experience rather than reading. You have the sense that this answer cost him something — that there was a version of Lord Caeron Ashvale who could only hold one truth at a time, and the version in front of you is the result of learning, painfully, to hold two."],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nHe meets your eyes with unusual directness. 'Ask me something harder.'"}],"choices":[{"letter":"A","text":"'What do you do when your orders conflict with your conscience?'","target":"29","points":{"ROSE":2}},{"letter":"B","text":"'What made you a knight rather than a lord?'","target":"29","points":{"ROSE":1}},{"letter":"C","text":"Thank him and leave.","target":"11_MORNING","points":{"CROWN":1}}]},"31":{"id":"31","title":"THE HIGH JUSTICE ARRIVES","location":"","prose":["*South Road Camp — Day 2*","He rides in with six escort soldiers and the expression of a man carrying something heavy that he did not choose to carry. Behind the escort, riding alone on a civilian horse with no insignia, there is a woman who is clearly not part of the party but has arrived with it — watching the camp with the unhurried assessment of someone cataloguing everything she sees. You file that away. The decree is formal — sealed, High Justice mark, legally binding and structurally unambiguous. He reads it out in the field camp: The refugee group is to be turned back south. Roads must remain clear for military movement. Crown law overrides field commander discretion. Thirty people. Families. Two wounded from yesterday. The Dragon Army, on a map, is approximately one day south of where they will be sent."],"boxes":[{"type":"info","text":"**DRAGONLANCE CAMEO — LORD GUNTHAR UTH WISTAN**\nThe High Justice who arrives with the decree is Lord Gunthar uth Wistan, Grand Master of the Knights of Solamnia. He is a man of genuine honour caught between the law he serves and the world that law was written for, and they are no longer the same world."},{"type":"roll","text":"**ROLL REQUIRED:** Persuasion (+0) | CHA | DC 15\n**SUCCESS (roll 15+):** You find wording in the decree permitting a 24-hour field assessment delay. Caeron approves. The refugees have time. +2 ROSE, +1 CROWN.\n**FAILURE (roll 1-14):** The decree is airtight. You must choose: comply or refuse.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**OPTIONAL SCENE — THE OBSERVER**\nA woman arrived with Lord Gunthar's escort who is not part of it. If you want to meet her, turn to Scene 31B (The Observer) now. Scene 31B introduces Tariel Duskmantle."},{"type":"dark","text":"**PALADIN — DARK TEMPTATION TRACK**\nTonight, Takhisis speaks again. Before making your choice below, Paladins with the DG track active turn to Scene DG2 (The Offer) now."}],"choices":[{"letter":"A","text":"Comply. The decree is the law.","target":"46","points":{"CROWN":3}},{"letter":"B","text":"Ask Caeron privately if he believes it is right.","target":"47","points":{"ROSE":2}},{"letter":"C","text":"Refuse outright.","target":"48","points":{"ROSE":3}},{"letter":"D","text":"Use the dispatch pouch from Scene 27 as leverage.","target":"49","points":{"ROSE":2,"CROWN":1}},{"letter":"E","text":"Meet the diplomatic observer who arrived with the escort (Scene 31B)","target":"31B","points":{}},{"letter":"F","text":"Paladin: Takhisis speaks again (Scene DG2 — The Offer)","target":"DG2","points":{}}]},"31B":{"id":"31B","title":"THE OBSERVER","location":"","prose":["*South Road Camp — Day of the High Justice's Arrival*","She arrives with Lord Gunthar's escort, though she is clearly not part of it — positioned at the rear, riding a civilian horse, wearing no insignia. Her credential, when Caeron examines it with the unhurried scepticism he brings to all documents, identifies her as a diplomatic observer from the eastern provinces, authorised by the Council of Whitestone to monitor Solamnic field operations during the current crisis. The credential is genuine. Caeron's expression when he hands it back suggests he wishes it were not.","Tariel Duskmantle dismounts with the easy competence of someone who has been in considerably more militarised situations than this and adjusted to each of them within the hour. She surveys the camp — not the defences, which she clearly assessed on approach, but the people. How they stand. How they respond to Gunthar's presence. How the squires look at the knights and the knights look at the decree and the decree looks at the refugees and no one is looking at the same thing.","Then she looks at you. Not past you to Aldric, or through you to Caeron. At you. With the particular attention of someone who has identified the interesting person in the room and intends to have a conversation with them whether they like it or not.","'The decree,' she says, when she finds you after the reading. No preamble. 'Thirty people sent south into the path of the army that displaced them. The Measure permits this?'","**CONVICTION CHOICE (Tariel Corruption Track — Debate 1):**","**ROMANCE CHOICE (optional — after conviction choice, if you chose A or C):**"],"boxes":[{"type":"companion","text":"**COMPANION JOINS: TARIEL DUSKMANTLE**\nDiplomatic observer. She is watching everything. She will share her observations if you engage with them — and her observations will make you uncomfortable.\n**Role:** Political intelligence: +1 to any Persuasion or Insight check involving authority figures if you consult her first."},{"type":"roll","text":"**OPTIONAL ROLL:** Persuasion (CHA) (+0) | CHA | DC 14\n**SUCCESS (roll 14+):** You articulate a response that accounts for the Measure's tension between law and protection. +1 to all future Tariel interactions.\n**FAILURE (roll 1-13):** 'The standard answer,' she says, without contempt.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"'The Measure does not permit it. The decree does. There is a difference.'","target":"31","points":{"ROSE":2},"conviction":"QUESTIONING"},{"letter":"B","text":"'The Measure is imperfect. All law is imperfect. That does not make it worthless.'","target":"31","points":{"ROSE":1,"CROWN":1},"conviction":"STEADFAST"},{"letter":"C","text":"'You are right. The Measure failed those people. I do not know how to reconcile that.'","target":"31","points":{"ROSE":1},"conviction":"SHAKEN"},{"letter":"D","text":"'You are an observer. Observe.'","target":"31","points":{"CROWN":1},"conviction":"STEADFAST"},{"letter":"R1","text":"Hold her gaze a moment longer than the argument requires.","target":null,"points":{},"romance_comp":"Tariel Duskmantle","romance_spark":true},{"letter":"R2","text":"Do not.","target":null,"points":{}}]},"DG2":{"id":"DG2","title":"THE OFFER","location":"","prose":["*Field Camp — Night of the Refugee Decree (Paladin Only)*","Thirty people. The decree in one hand. The Measure in the other. Tomorrow you will have to choose — follow the law that is supposed to protect people but tonight is asking you to destroy them, or break it. You are still awake at the second watch when the voice returns. It sounds different this time. Patient. Almost kind."],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nThis scene triggers after Scene 31 (The High Justice Arrives), on the night before you must act on the decree. Fighters: skip to Scene 36."},{"type":"dark","text":"**DARK TEMPTATION — TAKHISIS WHISPERS — THE SWEET OFFER**\nYou see the problem with your little code? The law is wrong and you know it and you have to obey anyway or break it and be punished. I am offering you a third path. Serve me — just this once — and those thirty people live. I will arrange it. No one will be punished. The decree will be satisfied. The refugees will disappear from the road in a way no one questions. All it costs is this: you carry my mark. Just a small one. No one will know but you."}],"choices":[{"letter":"A","text":"No. You will find your own way to protect them, inside the Measure or outside it. The answer is no.","target":"DG2_held","points":{}},{"letter":"B","text":"No — but you ask how she would arrange it. Just information.","target":"DG2_listen","points":{}},{"letter":"C","text":"You ask for a day to think.","target":"DG2_delay","points":{}},{"letter":"D","text":"You accept. The refugees will be safe. That is what matters.","target":"DG2_fall","points":{}}]},"DG2_held":{"id":"DG2_held","title":"THE REFUSAL — SECOND TIME","location":"","prose":["*Field Camp — The Same Night*","The voice goes. You are alone with the decree and thirty people and no clean answer. This is what the Measure does not account for — the moments when the law fails the people it was written to protect and you are the only person standing between them. You will figure it out yourself. That is the point of the oath. Not to be given the answer. To find it."],"boxes":[{"type":"dg_track","text":"**DG TRACK: HELD FIRM ✓**\nSecond refusal. Your connection to your god strengthens. +1 to your highest god tally (faith proved under pressure)."}],"choices":[{"letter":"A","text":"Continue to Scene 36.","target":"36","points":{}}]},"DG2_listen":{"id":"DG2_listen","title":"THE QUESTION","location":"","prose":["*Field Camp — The Same Night*","She tells you. Casually, as if the answer costs her nothing. The refugees would simply... find another road. One that leads somewhere safe. The decree would be satisfied by their absence from this road specifically. It is, technically, not wrong. You catch yourself thinking: that is actually clever. Then you catch yourself having thought that. You say no. But later."],"boxes":[{"type":"dg_track","text":"**DG TRACK: LISTENING DEEPENS ■**\nYou are reasoning with a dark god. This is dangerous. If already LISTENING: mark COMPROMISED. If first LISTENING: stay at LISTENING but -1 to any one god tally."}],"choices":[{"letter":"A","text":"Continue to Scene 36.","target":"36","points":{}}]},"DG2_delay":{"id":"DG2_delay","title":"THE DELAY","location":"","prose":["*Field Camp — The Same Night*","She takes your pause as what it was — consideration. By morning the refugees are gone from the road. Quietly, without your involvement. The decree is technically satisfied. You did not agree. You just did not say no in time. That distinction matters. It also does not matter at all. Your Lay on Hands heals. The healing feels the same. You test it three times to be sure."],"boxes":[{"type":"dg_track","text":"**DG TRACK: COMPROMISED ■■**\nShe acted on your silence. The debt is recorded even if you didn't sign it. Your Lay on Hands pool is reduced by 3 HP. You are aware of a faint wrongness when you use it."}],"choices":[{"letter":"A","text":"Continue to Scene 36.","target":"36","points":{}}]},"DG2_fall":{"id":"DG2_fall","title":"THE FIRST FALL","location":"","prose":["*Field Camp — The Same Night*","The refugees are safe. You told yourself that is what matters. You still believe this. But there is something different about the divine warmth in your hands now — not absent, not cold, but filtered. As if it is coming through something. The healing works. The prayers feel answered. But there is a quality to the answer that is new and you cannot quite name what the quality is."],"boxes":[{"type":"dg_track","text":"**DG TRACK: FALLEN ■■■**\nYou have accepted the Dark Queen's help with full awareness. This is recoverable — but only through Scene DG4 (The Reckoning). Until recovery: Lay on Hands heals half normal HP (round up). Divine Smite does full damage but leaves a faint shadow-bruise on targets. Your god tallies are frozen until you recover."}],"choices":[{"letter":"A","text":"Continue to Scene 36.","target":"36","points":{}}]},"32B":{"id":"32B","title":"WHAT THE ARMY LEFT BEHIND","location":"","prose":["*South Road — Abandoned Village of Thresh, Day 2*","You smell it before you see it. Woodsmoke that has been burning too long. The village of Thresh is eight buildings around a well and it is mostly still standing, which is worse than if it had burned. What the Dragon Army did here did not require fire.","There are bodies. The Dragon Army did not take prisoners here — or they took some and left the rest as a message. The message is: this is what happens when you do not comply quickly enough. The village elder is still at his table. The door is still open. Someone's dog is still waiting outside a house whose occupants are not coming back. The well has been fouled. This was not a battle. This was an afternoon's work.","There is one survivor. An old woman sitting behind the mill, uninjured, who watched from there and who has not spoken since."],"boxes":[{"type":"info","text":"**VAEL ASHMORE**\nVael Ashmore is already here. If you have not read Scene 5B, this is where you meet her. She was scouting ahead. She found this first. She has been standing here for a while."},{"type":"info","text":"**DARK SCENE — This scene contains depictions of war atrocities.**"},{"type":"romance","text":"**ROMANCE MOMENT**\nVael does not cry in front of you. Later — when you make camp and she thinks you are asleep — you hear her. It is brief and very quiet and when it stops she is silent for a long time. You do not tell her you heard. But in the morning you make sure you are the one who brings her water, and she takes it without looking at you, and that is also a kind of closeness."},{"type":"roll","text":"**OPTIONAL ROLL:** Investigation (INT, proficiency if trained) (+3) | INT | DC 12\n**SUCCESS (roll 12+):** Four days ago — but the supplies show three days of consumption after the army passed. Some people survived the initial visit and stayed or left afterward. The casualty count is lower than it first appears.\n**FAILURE (roll 1-11):** The village shows you what happened. You cannot read more than the obvious.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Bury the dead before you move on.","target":"36","points":{"ROSE":2},"romance_comp":"Vael Ashmore","romance_flame":true},{"letter":"B","text":"Get the survivor moving north.","target":"36","points":{"SWORD":1,"CROWN":1}},{"letter":"C","text":"Find something to mark the place.","target":"36","points":{"ROSE":1}},{"letter":"D","text":"Report the coordinates to Caeron. Document it precisely. This is evidence.","target":"36","points":{"CROWN":2,"ROSE":1}},{"letter":"E","text":"Lysander wants to talk philosophy (Scene 36B)","target":"36B","points":{}}]},"34B":{"id":"34B","title":"WHAT SCOUTS DO BEFORE A MARCH","location":"","prose":["*Field Camp — Night Before Moving the Column*","The watch at midnight has its own texture: coals where the fire was, stars very bright, the camp breathing in the slow rhythm of people genuinely asleep. Sera finds you here not because she was assigned this post but because she walked the perimeter and here is where she ended up. She sits a foot away and does not speak for a while.","She has been doing reconnaissance on the south road and what she found she has already reported. What she has not reported is what it did to her. She has the flat stillness of someone who has been holding something at arm's length all day and is now, in the dark, letting themselves feel the weight."],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nShe does not ask for anything. She is simply — present. Near you. After a while her shoulder finds yours and stays there. That is all. It is not nothing."}],"choices":[{"letter":"A","text":"Stay still. Let her have the silence she came here for.","target":"51","points":{"ROSE":2},"romance_comp":"Sera Nighthollow","romance_flame":true},{"letter":"B","text":"Ask quietly: 'What did you find out there?'","target":"51","points":{"ROSE":1}},{"letter":"C","text":"Cover her hand with yours for a moment. No words.","target":"51","points":{"ROSE":2},"romance_comp":"Sera Nighthollow","romance_flame":true}]},"36":{"id":"36","title":"WOUND AND TRUST","location":"","prose":["*South Road — Abandoned Barn, Night*","The barn smells of old hay and damp and the copper-salt note of a wound managed without proper materials. You work by lantern light. Serath watches you work with the careful attention of someone building a file on you in real time. They do not speak while you work. When it is done: 'You did not have to do that.' Not gratitude. Not manipulation. An honest observation."],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Medicine (+1) | WIS | DC 12\n**SUCCESS (roll 12+):** Clean technique. Serath will be mobile by morning. +1 to all Serath trust checks.\n**FAILURE (roll 1-11):** Adequate work. They will be slow for two days.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"romance","text":"**ROMANCE MOMENT**\n'You could still report me,' Serath says. 'I want you to know I understand that.' Not manipulation. Just honesty."}],"choices":[{"letter":"A","text":"'I know. I am not going to.'","target":"50","points":{"ROSE":2},"romance_comp":"Commander Serath","romance_flame":true},{"letter":"B","text":"'I have not decided yet. But I treated the wound first.'","target":"50","points":{"ROSE":1}},{"letter":"C","text":"'Tell me something the Dragon Army is planning. For the people in its path.'","target":"50","points":{"SWORD":1}}]},"36B":{"id":"36B","title":"LYSANDER'S PHILOSOPHY","location":"","prose":["*South Road — Camp, Night (Conditional: Lysander in party)*","He finds you at the edge of the firelight. He is sitting on a rock with his modified sword across his knees and the stillness of someone who has been sitting like this for years and has stopped noticing the cold.","'Let me ask you something,' he says. 'The man with the barrel-stave splint. At the refugee column. You saw him try to stand at attention when he saw the tabard.' You nod. 'Why did he do that?'","'No,' he says. 'He did it because three hundred years of Solamnic presence taught civilians that the tabard means safety. And it did, once. Before the Cataclysm, before the Order turned inward, before the Measure became a text people quote instead of a thing people do.' He is not angry. That is the dangerous part. He is calm. 'The man stood at attention for a symbol. You — specifically you — chose to live up to it. The institution chose to send him south.'","'I am not saying the Oath is worthless,' he says. 'I am saying it is insufficient. I am saying a good person does not need it to do the right thing, and a bad person will not be stopped by it. I am saying the Measure is beautiful and I loved it and it told me to let people drown. I did not let them drown. The Measure told me I was wrong. Which of us do you believe?'","**CONVICTION CHOICE (Lysander Corruption Track — Experience 2):**","**ROMANCE CHOICE (optional — if at SPARK or higher):**"],"boxes":[{"type":"info","text":"**CONDITIONAL SCENE**\nThis scene occurs only if Lysander Graves is in your party."}],"choices":[{"letter":"A","text":"'I believe you. And I believe the Measure. Both at the same time.'","target":"44","points":{"ROSE":2},"conviction":"remains"},{"letter":"B","text":"'The Measure was wrong. You were right. But walking away means no one fixes it from inside.'","target":"44","points":{"ROSE":1,"CROWN":1},"conviction":"remains"},{"letter":"C","text":"'You asked me which I believe — you or the Measure. I believe you.'","target":"44","points":{"ROSE":1,"CROWN":-1},"conviction":"advances"},{"letter":"D","text":"'The Oath exists because individual judgment is not enough.' He walks away.","target":"44","points":{"CROWN":2},"conviction":"STEADFAST"},{"letter":"E","text":"'I do not know. I am a squire who has been at this for three weeks. But I am listening.'","target":"44","points":{"ROSE":1},"conviction":"QUESTIONING"},{"letter":"R1","text":"The dark and the fire and the honesty have created something. Lean into it.","target":null,"points":{},"romance_flame":true},{"letter":"R2","text":"Keep the distance.","target":null,"points":{}}]},"37":{"id":"37","title":"PROOF OF DEFECTION","location":"","prose":["*Abandoned Barn*","Serath gives you the patrol schedules by drawing them — a grid in the dirt with a stick, the specific rotations that tell you where the Dragon Army pickets are and more importantly where the gaps are."],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Investigation (INT, proficiency if trained) (+3) | INT | DC 12\n**SUCCESS (roll 12+):** The patrol schedules are genuine. But there is something else: the description of Commander Hestrix's seal matches what is on the dispatch pouch from Scene 27 exactly. Serath knew about that pouch before you mentioned it.\n**FAILURE (roll 1-11):** The information checks out.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Enough. Treat the wound and hide them.","target":"36","points":{},"romance_comp":"Commander Serath","romance_spark":true},{"letter":"B","text":"Use the information but turn them in.","target":"39","points":{}}]},"38":{"id":"38","title":"ALDRIC AND THE QUESTION","location":"","prose":["*South Road*","He has been quiet since the barn. Now he asks: 'What do you want to do?' Not: what does protocol say. Not: what would Caeron decide. What do you want."],"boxes":[],"choices":[{"letter":"A","text":"'Hide them.'","target":"36","points":{"ROSE":1}},{"letter":"B","text":"'Report them.'","target":"39","points":{"CROWN":2}},{"letter":"C","text":"'I honestly do not know.'","target":"36","points":{"ROSE":1}}]},"39":{"id":"39","title":"THE REPORT","location":"","prose":["*Garrison*","You report Serath. They are detained. Lord Caeron commends your adherence to protocol. The paperwork is filed. The garrison moves on.","You think about the village they described. You think about the way they said it — flat precision, no performance of grief, worse than if they had been crying. You hear later they survived captivity and escaped three months after."],"boxes":[],"choices":[{"letter":"A","text":"You made the right call by the law.","target":"44","points":{"CROWN":2}},{"letter":"B","text":"It sits poorly.","target":"44","points":{"ROSE":1}},{"letter":"C","text":"A storm breaks on the road (Scene 40B)","target":"40B","points":{}}]},"40B":{"id":"40B","title":"THE STORM","location":"","prose":["*South Road — Field Exercise, Day 2*","The storm comes from the west with the particular speed that storms have when they are not interested in your schedule. One hour of grey sky, then thirty minutes of wind that turns the treeline into a sound you have never heard trees make, then rain that is not rain so much as a quantity of water that has decided to be somewhere lower and does not care what is in the way.","Aldric has his back against a pine and his arms folded with the focused patience of someone who has decided that being wet is a temporary condition he refuses to acknowledge. Mira, if present, is already working — redistributing supplies with calm efficiency. Caeron stands in the rain without appearing to notice it.","**IF TARIEL IS IN YOUR PARTY:** 'The rain is useful — it reveals who adapts and who endures. Both are valuable. The Knights of Solamnia, in my experience, default to endure.'","**IF LYSANDER IS IN YOUR PARTY:** He appears from the treeline with dry deadwood gathered before the rain started. He builds a fire with offhand competence. 'The garrison teaches you to endure discomfort. I have found it more useful to eliminate discomfort and save the enduring for things that actually require it.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Survival (WIS) (+1) | WIS | DC 12\n**SUCCESS (roll 12+):** This will pass in ninety minutes. The treeline ridge path will dry faster than the road.\n**FAILURE (roll 1-11):** The storm is a storm. You endure it."}],"choices":[{"letter":"A","text":"Endure. Stand in the rain with Caeron.","target":"44","points":{"CROWN":1,"SWORD":1}},{"letter":"B","text":"Adapt. Help Mira redistribute supplies.","target":"44","points":{"ROSE":1}},{"letter":"C","text":"Build shelter.","target":"44","points":{"SWORD":1}},{"letter":"D","text":"Join Lysander at the fire.","target":"44","points":{"SWORD":1,"CROWN":-1}}]},"44":{"id":"44","title":"THE REFUGEE COLUMN","location":"","prose":["*South Road — Day of Exercise*","The waystation is the skeleton of a building — three walls standing, the fourth a pile of useful stone. Thirty-one people in a space meant for one night's passing have been here for three days. Three children. Eight elderly. A man with a barrel-stave splint.","When they see you, the able-bodied step forward and the children are moved to the back. Then the man with the splint tries to stand at attention when he sees the Solamnic tabard.","**IF VAEL IS IN YOUR PARTY:** Vael is already here. She scouted ahead and is standing very still at the edge of the column. 'I counted. Thirty-one. Three children. We have to do something.' Not a suggestion. A fact about who she is.","**IF SERA IS IN YOUR PARTY:** Sera has been scouting ahead. She gives you the tactical picture: patrol distances, terrain cover, the window you have. 'You have about four hours,' she says. 'Use them.' +1 to the Perception roll."],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Perception (+2) | WIS | DC 13\n**SUCCESS (roll 13+):** Scout still half a mile back. All options available without time pressure.\n**FAILURE (roll 1-12):** Patrol is closer than you thought. Options B and C cost one extra round.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**OPTIONAL SCENE — THE WAYSTATION**\nThere is someone inside who should not be here. Turn to Scene 18 (The Stranger in the Barn)."},{"type":"info","text":"**OPTIONAL NIGHT SCENE — SCENE 34B**\nIf you met Sera in Scene 3B: turn to Scene 34B now."}],"choices":[{"letter":"A","text":"Report and wait for garrison orders.","target":"44_REPORT","points":{"CROWN":2}},{"letter":"B","text":"Move them north yourself, now.","target":"44_REPORT","points":{"ROSE":2,"SWORD":1}},{"letter":"C","text":"Set a defensive position. Hold scouts while they move.","target":"44_REPORT","points":{"SWORD":2,"ROSE":1}},{"letter":"D","text":"Find Caeron first.","target":"44_REPORT","points":{"ROSE":2,"CROWN":1}},{"letter":"E","text":"What the scouts found before the march (Scene 34B)","target":"34B","points":{}},{"letter":"F","text":"Explore the old ruins nearby (Scene 44B)","target":"44B","points":{}},{"letter":"G","text":"A boy in a blue coat by the road (Scene 45B — optional)","target":"45B","points":{}},{"letter":"H","text":"The Waystation — someone is inside who should not be here (Scene 18)","target":"18","points":{}}]},"44B":{"id":"44B","title":"THE OLD RUINS","location":"","prose":["*South Road — Between the Column and the March, Day 2*","There is a ruin on the ridge that the garrison maps mark as 'Solamnic watchtower (inactive).' The walls are chest-high. The archway is intact. Someone carved Est Sularus oth Mithas into the keystone at a date you can identify by the letter forms as pre-Cataclysmic.","Inside: grass growing through flagstones. A fire pit long cold. And carved into the inner wall at about knee height, a child's handprint in mud, dried hard. Someone sheltered here on the way north. Someone very young left their mark because that is what very young people do when they are in a place they will not come back to."],"boxes":[{"type":"info","text":"**Paladin Note:**\nThe Est Sularus oth Mithas carved in the keystone warms when you pass under the archway. Not the stone — the words themselves. Mark 1 tally under PALADINE or KIRI-JOLITH."},{"type":"roll","text":"**OPTIONAL ROLL:** History (INT) (+0) | INT | DC 13\n**SUCCESS (roll 13+):** This was a Solamnic chapter house. Before the Cataclysm, one of hundreds. Now it is grass and stone and the handprint of a child.\n**FAILURE (roll 1-12):** Old ruin. Old words."}],"choices":[{"letter":"A","text":"Touch the handprint.","target":"44","points":{"ROSE":1}},{"letter":"B","text":"Read the keystone aloud.","target":"44","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"Make camp here for the night.","target":"44","points":{"ROSE":1}}]},"45B":{"id":"45B","title":"THE BOY WITH THE BLUE COAT","location":"","prose":["*South Road — The Refugee Camp, Evening (if Mira is in your party)*","His name was Aldren. He was eleven years old and he had a blue coat with brass buttons. He was the one who kept the other children calm during the march. The infection moved faster than she expected. She did everything correctly. She did not have the medicines she would have had in a proper infirmary. In the morning he was gone.","Mira is sitting outside the camp. She is not crying. She is somewhere past crying — the place where grief becomes a very quiet, very heavy thing that does not make noise."],"boxes":[{"type":"info","text":"**CONDITIONAL SCENE — Mira must be in your party.**"},{"type":"roll","text":"**OPTIONAL ROLL:** Medicine (WIS) (+1) | WIS | DC 11\n**SUCCESS (roll 11+):** She needs witness: someone to simply confirm that what happened was real and that it mattered. Ask his name. That is the correct thing.\n**FAILURE (roll 1-10):** She is in pain and very still."}],"choices":[{"letter":"A","text":"Stay beside her until she is ready to move.","target":"46","points":{"ROSE":2},"romance_comp":"Mira of the Oaks","romance_flame":true},{"letter":"B","text":"'You did everything right. This was not your failure.'","target":"46","points":{"ROSE":1}},{"letter":"C","text":"Ask her his name. Make her say it aloud.","target":"46","points":{"ROSE":2},"romance_comp":"Mira of the Oaks","romance_flame":true}]},"46":{"id":"46","title":"THE DECREE STANDS","location":"","prose":["*South Road Camp*","The refugees are escorted south. The man with the splinted leg is helped by one of the escort soldiers who does not look at him while doing it. The children do not fully understand what is happening."],"boxes":[{"type":"info","text":"**Consequence:** If Mira is in your party, she leaves quietly that evening."},{"type":"info","text":"**FIGHTER — MEASURE SUBPLOT**\nFighters turn to Scene M2 (The Wrong Order) now."}],"choices":[{"letter":"A","text":"You obeyed the law. You will live with that.","target":"53","points":{"CROWN":3}},{"letter":"B","text":"You will never make that choice again.","target":"53","points":{"ROSE":1}},{"letter":"C","text":"Fighter: The Measure subplot continues (Scene M2 — The Wrong Order)","target":"M2","points":{}}]},"M2":{"id":"M2","title":"THE WRONG ORDER","location":"","prose":["*Field Camp — During the Refugee Crisis (Fighter Only)*","You have seen the decree enforced. You have your choice on record. Now you have six hours before the column moves and Ser Aldous has found you at the camp perimeter. He is not here to debrief you. He looks, if anything, like he has been thinking very hard about something he should have said years ago.","'I want to ask you something,' Aldous says. 'Not as a senior officer. As a man who got this wrong once. What do you do when the Measure is clear and the order contradicts it?' He waits. He wants your answer, not the textbook one."],"boxes":[{"type":"info","text":"**FIGHTER ONLY**\nThis scene occurs alongside Scene 46 (The Decree Stands). Paladins: you have the divine scenes instead — skip to Scene 47."},{"type":"info","text":"**THE MEASURE: THE MEASURE ON UNJUST ORDERS**\nEst Sularus oth Mithas. My honour is my life. The Measure is explicit: a decree that requires acting against innocents is an improper decree and a Knight is not bound by it — but must be prepared to defend that judgment at tribunal. This is not the easy clause. It puts the burden of judgment on the individual Knight in the exact moment when the individual Knight is most afraid."}],"choices":[{"letter":"A","text":"'You follow the Measure. That is the point of it. The order is wrong and the Measure says so.'","target":"M2_measure","points":{}},{"letter":"B","text":"'You follow the order and argue at tribunal. The moment of conflict is not the time to make policy.'","target":"M2_order","points":{}},{"letter":"C","text":"'You try to find a path that satisfies both. The 24-hour delay, the technical argument. You use the law against itself.'","target":"M2_clever","points":{}}]},"M2_measure":{"id":"M2_measure","title":"THE MEASURE IS CLEAR","location":"","prose":["*Field Camp*","Aldous is quiet for a long time. Then: 'I got it wrong the first time. I followed the order. The village is not there anymore.' He looks at you. 'The Measure gave me the answer. I chose the safer path anyway. I have had a long time to understand why that was wrong. You worked it out in one conversation.' He stands. 'You will be a good knight. What matters now is making sure the good is worth the trouble it causes.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +3**"}],"choices":[{"letter":"A","text":"Continue to Scene 47.","target":"47","points":{}}]},"M2_order":{"id":"M2_order","title":"DEFENSIBLE","location":"","prose":["*Field Camp*","'Defensible,' Aldous says. 'Not right. Defensible.' He does not push further. He does not need to. You know the difference and he knows you know. The conversation ends there and you carry the word defensible with you for the rest of the exercise, testing things against it, checking whether what you are about to do is merely defensible or actually correct."],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +1**"}],"choices":[{"letter":"A","text":"Continue to Scene 47.","target":"47","points":{}}]},"M2_clever":{"id":"M2_clever","title":"USING THE LAW","location":"","prose":["*Field Camp*","'Sometimes correct,' Aldous says. 'Know when it isn't.' He lets that sit. Then: 'The people who use the law against itself are necessary. They are also the ones who eventually find a case where the clever solution does not exist and they have to make the same choice you avoided making. Know which kind of case that was. Know it before you need to.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +2**"}],"choices":[{"letter":"A","text":"Continue to Scene 47.","target":"47","points":{}}]},"47":{"id":"47","title":"CAERON'S PRIVATE ANSWER","location":"","prose":["*South Road Camp*","'No. I do not believe it is right.' He does not look at you when he says this. 'It is, however, the law. And I am bound by the law I swore to serve.' A pause. 'I am telling you this because I think you should know where I actually stand.'"],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nHis eyes hold yours one second longer than the conversation requires."}],"choices":[{"letter":"A","text":"'Then find a way to do both.'","target":"49","points":{"ROSE":2},"romance_comp":"Lord Caeron Ashvale","romance_flame":true},{"letter":"B","text":"'I respect the honesty.'","target":"31","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"'What would you do if you were a squire right now?'","target":"49","points":{"ROSE":2}}]},"48":{"id":"48","title":"REFUSAL","location":"","prose":["*South Road Camp*","You say the word. In the careful language of the Measure, clearly, to Lord Caeron's face: No. The refugees are not turned back."],"boxes":[{"type":"info","text":"**Consequence:** +3 ROSE. Formal reprimand. The refugees live. Aldric looks at you differently."}],"choices":[{"letter":"A","text":"Accept the reprimand without argument.","target":"53","points":{"CROWN":1}},{"letter":"B","text":"Tell Caeron privately you would do it again.","target":"53","points":{"ROSE":2}}]},"49":{"id":"49","title":"THE 24-HOUR WINDOW","location":"","prose":["*South Road Camp*","The delay buys a day. By the time the argument is over, the refugees have been given directions north. They move through the night."],"boxes":[],"choices":[{"letter":"A","text":"File the assessment and say nothing more.","target":"53","points":{"CROWN":1}},{"letter":"B","text":"Make sure Caeron knows exactly what you did and why.","target":"53","points":{"ROSE":1,"CROWN":1}}]},"50":{"id":"50","title":"SERATH IN THE MORNING","location":"","prose":["*South Road Camp*","Just before dawn, Serath tells you three things about the Blue Wing's plans — specific things that can only come from someone recently inside the command structure."],"boxes":[{"type":"info","text":"**Intelligence Gained:** Dragon Army timeline on the north road is two days earlier than garrison estimates. The Blue Wing has orders to take Vogler before moving to Kalaman."}],"choices":[{"letter":"A","text":"Thank them formally.","target":"53","points":{"ROSE":1}},{"letter":"B","text":"Ask what they want in return. 'Nothing,' they say.","target":"53","points":{"ROSE":1}}]},"51":{"id":"51","title":"MOVING THE COLUMN","location":"","prose":["*South Road*","You get everyone moving. Aldric takes the rear. You take point. Three miles north you hear the patrol behind you."],"boxes":[{"type":"combat","text":"**COMBAT ENCOUNTER — REARGUARD ACTION**\nHold 3 Baaz Draconians and 1 Human Corporal for 3 rounds while refugees move ahead.\n**ENEMIES:**\n• Baaz Draconian x3: AC 13, HP 18 each.\n• Human Soldier (Corporal): AC 14, HP 16. Longsword +4 1d8+2. Tactical Command: one draconian gets +2 to its next attack.\nEnemy Tactics: Corporal hangs back with crossbow. After 3 rounds a recall horn sounds.\nVictory: The draconians fall back as the recall horn sounds. The column is clear. Twenty refugees owe their lives to the three rounds you held this line.\nRewards: 20 XP.\nFallen (0 HP): Column is safe. Aldric stabilised you. 1 HP, one exhaustion."}],"choices":[{"letter":"A","text":"Proceed to Scene 53.","target":"53","points":{}}]},"52":{"id":"52","title":"THE DEFENSIVE POSITION","location":"","prose":["*Waystation*","You organise the waystation into a defensible position. The patrol probes twice and pulls back.","*End of Act Two.*"],"boxes":[{"type":"info","text":"**Outcome:** Refugees safe. You take 1d6 damage (roll or take 3). +2 SWORD."}],"choices":[{"letter":"A","text":"Proceed to Scene 53.","target":"53","points":{}},{"letter":"D","text":"Paladin: before continuing, turn to Scene P2.","target":"P2","points":{}}]},"P2":{"id":"P2","title":"THE CHAPEL VISION","location":"","prose":["*Castle Brightholm — Old Chapel, Night*","You cannot sleep. The old chapel of the garrison is not the official chapel — the official one is clean and regularly used. This one is behind the armoury, half the roof gone, grass growing through the floor stones. The garrison uses it for storage now. But the altar is still there, uncovered, and the stone that was once the offering bowl is still the shape of a bowl.","You did not mean to come here. You were walking and ended up here. That is different from choosing.","You sit in front of the altar for a while. Nothing happens. Then you put your hand in the offering bowl — an absurd thing to do, and you do not know why you do it — and the stone is warm. Not the warmth of stone that has been sitting in an enclosed space. Warm like something living.","You speak aloud. You have not decided to do this — it simply happens. You say: 'Who are you?' No answer in words. But the warmth in your chest becomes, briefly, the specific warmth of something smiling. Then it fades to ordinary stone temperature and you are alone again.","You think about what kind of warmth that was:","The Dragon Army is confirmed within twenty miles. The formal Trials are accelerated. Scenes 53-70 cover the crisis, the condensed Trials, and the road south to Vogler. You gain Level 3 at Scene 61. Paladins: Paladin Scene P3 is in Act Three."],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nThis scene occurs the night before the formal Trials begin. Fighters: proceed directly to Scene 53 after Scene 51 or 52."},{"type":"divine","text":"**DIVINE SIGN**\nThe warmth travels up your arm and settles behind your sternum. Not painful. Not frightening. It feels like: the moment before you speak the correct answer to something important. Certainty that has not yet found words. The stone is warm and the grass is still growing through the floor and the stars are visible through the broken roof and you understand, in the part of you below language, that you are not alone in this room."}],"choices":[{"letter":"A","text":"The warmth of law and order — a gentle judge's certainty, high and patient.** Mark 1 tally: PALADINE.","target":"53","points":{"ROSE":1}},{"letter":"B","text":"The warmth of a forge before battle — practical, purposeful, directed.** Mark 1 tally: KIRI-JOLITH.","target":"53","points":{"SWORD":1}},{"letter":"C","text":"The warmth of a healer's hands — soft, focused on what hurts.** Mark 1 tally: MISHAKAL.","target":"53","points":{"ROSE":1}},{"letter":"D","text":"The warmth of sunlight through trees — wide, un-directed, alive.** Mark 1 tally: HABBAKUK.","target":"53","points":{"ROSE":1}},{"letter":"E","text":"The warmth of music heard from another room — joyful, reaching, optimistic.** Mark 1 tally: BRANCHALA.","target":"53","points":{"ROSE":1}},{"letter":"F","text":"You cannot read it. The warmth was just warmth. Mark nothing.","target":"53","points":{"CROWN":1}}]},"53":{"id":"53","title":"THE NEWS ARRIVES","location":"","prose":["*Castle Brightholm — Great Hall, Night*","Three bells at midnight — the signal everyone knows and hopes never to hear at this hour. The rider is at the back being given water. Lord Caeron is at the front with the dispatch. He reads it through twice. In the moment before he turns, before he chooses his expression, you see what is underneath it. Then he turns. 'The Dragon Army's Blue Wing has been confirmed south of Lake Akh-Tiel. Approximately two thousand. Moving north. Three days from Vogler. Possibly two.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Composure (WIS Save) (+1) | WIS | DC 11\n**SUCCESS (roll 11+):** Your face stays neutral. Caeron holds your gaze a half-second longer. +1 CROWN.\n**FAILURE (roll 1-10):** Something crosses your expression. No penalty, but it was seen."}],"choices":[{"letter":"A","text":"Go to your companions.","target":"54","points":{"ROSE":1}},{"letter":"B","text":"Stay for the full briefing.","target":"55","points":{"CROWN":1}},{"letter":"C","text":"Find Thessaly.","target":"56","points":{"ROSE":1}},{"letter":"D","text":"Find Aldric.","target":"57","points":{"ROSE":1},"romance_comp":"Aldric Voss","romance_flame":true},{"letter":"E","text":"Something is wrong about the timing. Find out who knew first.","target":"53B","points":{"ROSE":1,"CROWN":1}},{"letter":"F","text":"Find Tariel, if present.","target":"53D","points":{"ROSE":1}},{"letter":"G","text":"Find Lysander, if present.","target":"53E","points":{"SWORD":1}},{"letter":"H","text":"Mira tends to the wounded Commander (Scene 54B)","target":"54B","points":{}}]},"53B":{"id":"53B","title":"THE SOURCE","location":"","prose":["*Castle Brightholm — Records Room, Night After the News*","Thessaly finds you an hour after Caeron's briefing. She has been in the recor
