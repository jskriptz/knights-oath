tage. QUEST STATE: grows stronger when quest is completed.\n**Lore:** Given to a paladin whose faith is cracked but not broken. The crystal holds light it hasn't earned yet, on credit."},{"type":"info","text":"**QUEST: THE RETURNING FLAME**\nComplete in Shadow of the Dragon Queen: Find the Shrine of Mishakal (or any good-aligned god shrine). Spend a full night in honest prayer. In the same session, perform one act of genuine self-sacrifice for a stranger. When both conditions are met: faulty spell mechanic ends permanently. The Shard upgrades: bonus action also grants 2d6 temp HP. Once per long rest: cast Protection from Evil and Good without a slot."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"62","points":{}}]},"DG4_ember":{"id":"DG4_ember","title":"THE EMBER","location":"","prose":["*Vogler Road — The Wanting Without the Way*","Elistan is quiet for a long time. 'That is the hardest state,' he says at last. 'Wanting and not having the path. It is not failure. It is the condition that precedes everything real.' He gives you something small and closes your fingers around it.","Your Lay on Hands pool is restored to half normal (rounded up). Your divine abilities still function — unevenly, with effort. But the wanting is a kind of fire, and fire is not nothing."],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE EMBER THAT REMAINED**\n*Wondrous Item (Requires Attunement by a Paladin), Uncommon — SEEKING*\nA small piece of charcoal that is faintly warm at the centre when you hold it in a closed fist.\n**Mechanics:** Lay on Hands pool is half normal maximum (rounded up). Once per long rest: spend 10 minutes in honest prayer to cast Guidance on yourself without a slot. Each time you act in direct service of an innocent without personal benefit, mark one tally. At 5 tallies, the ember becomes The Vow Restored. Tallies reset if you knowingly act against innocents.\n**Lore:** Given to a paladin who wanted the way back and didn't have it yet. The gods of good do not require certainty — they require the wanting."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"62","points":{}}]},"DG4_fallen":{"id":"DG4_fallen","title":"THE GIFT OF THE DARK QUEEN","location":"","prose":["*Vogler Road — No Recovery*","He looks at you for a long moment. 'You believe it,' he says. 'That is real.' He stands. He does not touch you. 'When you understand what you chose,' he says, 'the door is still open. It is always open. The gods of good do not lock doors.' He walks away. That night, something else leaves gifts at the edge of your bedroll. They are beautiful. They are cold."],"boxes":[{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE QUEEN'S BRAND**\n*Wondrous Item (Requires Attunement), Uncommon — TAINTED*\nA black iron ring inlaid with five colours of enamel — red, blue, black, green, white — in the pattern of five dragon heads.\n**Mechanics:** Lay on Hands heals normally. Once per long rest: add 1d6 necrotic damage to a melee attack. However: at dawn each day, DC 12 WIS save or take 1 point of Exhaustion. Removing the ring requires Remove Curse or Greater Restoration.\n**Lore:** A gift from Takhisis to a paladin she considers an investment. The Queen of Darkness plays a long game."},{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE UNASKED QUESTION**\n*Weapon (Longsword), Requires Attunement, Rare — TAINTED*\nA longsword with a blade of black steel that reflects nothing. The crossguard is five interlocking crescents.\n**Mechanics:** +1 to attack and damage rolls. Once per long rest: on a hit, target makes DC 13 WIS save or is frightened until end of their next turn. Whenever you use this ability, make a DC 12 WIS save yourself or take 1 Exhaustion. The sword cannot be lost — if separated, it reappears in your pack within 24 hours.\n**Lore:** A gift from Takhisis to a paladin she considers a long-term investment. It can be unmade only at the Shrine of Paladine by someone who genuinely no longer wants what it offers."},{"type":"item","text":"**✦ MAGIC ITEM GAINED: THE SHADOW MANTLE**\n*Wondrous Item (Cloak), Requires Attunement, Rare — TAINTED*\nA cloak of deep violet-black that absorbs the light around you slightly.\n**Mechanics:** +1 to AC. Advantage on Stealth checks in dim light or darkness. Once per long rest: become heavily obscured to creatures more than 5 ft. away until start of your next turn. Disadvantage on Persuasion checks with clerics and paladins of good-aligned gods. Removing the cloak requires a DC 14 WIS save at dawn. On failure, you feel no desire to remove it.\n**Lore:** Takhisis gives good gifts. That is the point."},{"type":"info","text":"**YOUR PALADIN ABILITIES — THE SECRET PATRON**\nUntil you formally pledge to Takhisis in Shadow of the Dragon Queen, your paladin abilities continue to function — but their source has changed. Lay on Hands heals normally. Divine Smite is very slightly violet. Spell slots function. You are, right now, a paladin of Takhisis who does not know it yet."},{"type":"info","text":"**QUEST: THE PLEDGE OF THE FIVE HEADS**\nIn Shadow of the Dragon Queen: Takhisis will reach for you at moments of violence, desperation, or victory. When ready, seek a Dragon Army officer of Black Wing Command who carries her symbol. The pledge is private, brief, and irreversible. Upon pledging: Oathbreaker subclass. Channel Divinity becomes Animate Dead and Aura of Hate. Lay on Hands can harm enemies. The redemption arc remains available. Elistan said the door is always open."}],"choices":[{"letter":"A","text":"Proceed to Scene 70.","target":"62","points":{}}]},"69":{"id":"69","title":"MIRA AT THE CROSSROADS","location":"","prose":["*Forest Road Junction — Afternoon, Day 3*","The road splits. North to safety. South toward Vogler. Mira stands at the junction. 'I told myself I was going to take the safe road. I am not going to do that.'"],"boxes":[],"choices":[{"letter":"A","text":"South. She falls in beside you.","target":"69_ROAD","points":{"ROSE":2},"romance_oath":true},{"letter":"B","text":"'North. Take the others to safety.'","target":"69_ROAD","points":{}}]},"69B":{"id":"69B","title":"THE LAKE AT DAWN","location":"","prose":["*South Road — Day 3, Final Approach*","The lake appears first as light — the reflection of the sunrise off water, a brightness on the southern horizon that is different from sky-brightness, flatter and wider and the colour of beaten silver. Then the water. Then the village.","Vogler in the early morning is beautiful. That is the thing no one warned you about — that the place you are riding to defend is genuinely, quietly, achingly beautiful. Stone buildings along the waterfront. Boats at the pier. Smoke from morning cooking fires. A stand of aspens at the east end that have gone gold with autumn and are catching the sunrise in a way that looks like the trees are on fire in the good way.","Aldric rides beside you. He sees the lake and for a moment his face does something it almost never does: it opens. Then it reassembles. But you saw it.","**IF MIRA IS WITH YOU:** She stops her horse. 'My mother's village looked like this.' Very quiet. Then she rides on.","**IF TARIEL IS WITH YOU:** Her notebook stays closed. This is not an observation she is willing to reduce to writing.","**IF LYSANDER IS WITH YOU:** He is standing at the ridgeline, separate from the column, looking at the lake. He looks exactly like a Knight of the Sword on the morning of a battle, which is what he is whether the paperwork agrees or not."],"boxes":[],"choices":[{"letter":"A","text":"Stop. Look. Remember this.","target":"70","points":{"ROSE":1}},{"letter":"B","text":"'It is worth saving.'","target":"70","points":{"ROSE":1,"SWORD":1}},{"letter":"C","text":"Ride on. The beauty does not change the numbers.","target":"70","points":{"SWORD":1,"CROWN":1}},{"letter":"D","text":"The morning with both of them.","target":"DATE_POLY_MORN","points":{}}]},"70":{"id":"70","title":"THE BRIDGE","location":"","prose":["*South Road — Vogler Approach, Late Day 3*","The lake appears first. Then the village. And on the bridge into Vogler: a Dragon Army forward element setting up a checkpoint. Four soldiers. They have not seen you yet."],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Perception (+2) | WIS | DC 14\n**SUCCESS (roll 14+):** Two days to Vogler, not three. You warn the group. The party gains surprise.\n**FAILURE (roll 1-13):** No surprise — initiative is rolled normally."},{"type":"combat","text":"**COMBAT ENCOUNTER — THE BRIDGE CHECKPOINT**\n**ENEMIES:**\n• Human Soldier x4: AC 14, HP 16 each. Longsword +4 1d8+2.\n• Sergeant (one of the four): HP 22. Bonus action Shout: one ally rerolls a failed attack.\nVictory: The bridge is yours. The sergeant drops his sword and the remaining soldiers scatter. Vogler's gates creak open — the villagers watched the fight from the walls. You enter as the knight who cleared the road.\nRewards: 30 XP.\nFallen (0 HP): Aldric holds the sergeant. You enter Vogler at 1 HP. Villagers treat your wounds."}],"choices":[{"letter":"A","text":"Proceed to Scene 71.","target":"70B","points":{}}]},"71":{"id":"71","title":"THE FIRST SIGHT OF VOGLER","location":"","prose":["*Vogler — Evening*","Vogler in the late afternoon has the quality of a place that has been bracing itself and is briefly, exhaustedly, relieved. The people watching from the walls as you crossed the bridge have the faces of people for whom Solamnic armour is the best thing they have seen this week.","Behind you, the Dragon Army is moving. Behind you, also, are weeks that changed the shape of what you are. You are a squire now — sworn, blooded, tired in the specific way of someone who has been tested at intervals and kept passing.","Whatever comes next is the main campaign. This was how it began.","**Motto:** Est Sularus oth Mithas — My honour is my life.","You earned this not through outstanding sword work but through asking the right questions and standing by the answers. The Rose values wisdom and moral courage. Ser Aldous was present at your oath. He did not try to hide that he was moved.","**Your Road to Vogler:** You ride into Vogler carrying the weight of what justice means when law fails it. Start with +2 Persuasion and the trait: Voice of the Rose (NPCs who see you protect someone at personal cost trust you immediately).","**Motto:** The blade that does not waver.","You earned this on the south road, on the ridge, at the bridge — in every fight where you chose to stand rather than step back. Aldric was in the front row at your oath. You saw him.","**Your Road to Vogler:** You ride into Vogler knowing what is coming will need everything you have. Start with +2 Athletics and the trait: Blade-Oath (advantage on first attack of any combat).","**Motto:** Law is the shield of the innocent.","You kept the law when others would have broken it and understood that duty is the structure that lets conscience act in the world. Lord Caeron conducted your squiring ceremony himself. Afterwards, in private, he shook your hand instead of saluting. That is not in the protocol.","**Your Road to Vogler:** You ride into Vogler as the Order's standard. People will look to you when things fall apart. Start with +2 Persuasion/Intimidation and the trait: Command Presence (NPCs do not panic in your presence during combat)."],"boxes":[{"type":"info","text":"**Your Prelude Ends Here**\nTurn to the Order Outcome section for your squiring ceremony and title. Then turn to the Romance Epilogue section. Then turn to THE BRIDGE TO THE CAMPAIGN."},{"type":"info","text":"**Squire Title Granted**\nSquire-Scholar of the Rose. Addressed as 'Squire', given deference in matters of law and the Measure."},{"type":"info","text":"**Fighter Ability (carry into main campaign)**\nHistorical Insight (1/day): Ask the DM one true lore question. Advantage on Persuasion checks when appealing to someone's sense of justice."},{"type":"info","text":"**Paladin Ability (carry into main campaign)**\nVoice of Mercy (1/day): When you use Lay on Hands on a creature, they are also freed of one condition (frightened, charmed, or poisoned). Advantage on Persuasion with any NPC who has seen you act against personal interest to protect someone."},{"type":"info","text":"**Squire Title Granted**\nSquire-Warrior of the Sword. Addressed as 'Squire', first position in any fighting formation."},{"type":"info","text":"**Fighter Ability (carry into main campaign)**\nCombat Resolve (1/day): When reduced to 0 HP, make one final attack before falling. When you succeed on a death save, use Second Wind as a reaction."},{"type":"info","text":"**Paladin Ability (carry into main campaign)**\nRighteous Fury (1/day): When you use Divine Smite, you may choose to double the radiant damage. The first time in each combat that an ally is reduced to 0 HP within 30 ft. of you, your next attack before the end of your next turn has Advantage."},{"type":"info","text":"**Squire Title Granted**\nSquire-Commander of the Crown (junior). Given deference in command decisions."},{"type":"info","text":"**Fighter Ability (carry into main campaign)**\nAuthority of the Crown (1/day): Issue a command to a non-hostile NPC. They comply unless it directly harms them. Advantage on Intimidation checks against Dragon Army soldiers."},{"type":"info","text":"**Paladin Ability (carry into main campaign)**\nAura of Command (passive): Your Aura of Protection (CHA +2 to saves) also applies to allies' attack rolls against enemies that are frightened, stunned, or prone. Authority of the Crown (1/day): same as Fighter version."}],"choices":[{"letter":"A","text":"Epilogue: Aldric Voss (Scene 72)","target":"72","points":{}},{"letter":"B","text":"Epilogue: Thessaly Brightwater (Scene 73)","target":"73","points":{}},{"letter":"C","text":"Epilogue: Commander Serath (Scene 74)","target":"74","points":{}},{"letter":"D","text":"Epilogue: Mira of the Oaks (Scene 75)","target":"75","points":{}},{"letter":"E","text":"Epilogue: Lord Caeron Ashvale (Scene 76)","target":"76","points":{}},{"letter":"F","text":"Epilogue: Sera Nighthollow (Scene 77)","target":"77","points":{}},{"letter":"G","text":"Epilogue: Vael Ashmore (Scene 78)","target":"78","points":{}},{"letter":"H","text":"Epilogue: Tariel Duskmantle (Scene 79)","target":"79","points":{}},{"letter":"I","text":"Epilogue: Lysander Graves (Scene 80)","target":"80","points":{}}]},"72":{"id":"72","title":"ALDRIC VOSS","location":"","prose":["He finds you after the squiring when everyone else has gone. 'I spent eight months being competitive with you. I think that was because I did not know what else to do with it.' He looks at you. 'I know now.' He says I love you with staying — with showing up — with the way his hand finds yours. In the main campaign, Aldric Voss is a named companion with his own quest line."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"71","points":{}}]},"73":{"id":"73","title":"THESSALY BRIGHTWATER","location":"","prose":["She interviews you one last time. Except this time: 'What do you want people to remember about what happened here?' She writes it down carefully. Then she closes the notebook. Sets it on the wall. Looks at you without the professional distance. 'I stopped being a journalist about you a while ago.' She puts it down. In the main campaign, Thessaly provides intelligence and covers you."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"71","points":{}}]},"74":{"id":"74","title":"COMMANDER SERATH","location":"","prose":["They find you just before dawn. 'I am trying to become the kind of person who deserves it. I have not succeeded yet. But I am trying. I have not been trying for anyone before.' In the main campaign, Serath is a morally complex ally."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"71","points":{}}]},"75":{"id":"75","title":"MIRA OF THE OAKS","location":"","prose":["She walks beside you on the last road. She does not touch you, and she does not need to. At some point she says, very quietly: 'I was not looking for this.' You were not either. In the main campaign, Mira is the party's healer and the person you fight hardest to keep standing."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"71","points":{}}]},"76":{"id":"76","title":"LORD CAERON ASHVALE","location":"","prose":["He gives you your evaluation report. In the Overall Assessment box he has written: 'This squire will be remarkable. I have no further notes.' He stops at the door. 'The Order of the Crown values constancy. I intend to be constant.' In the main campaign, Caeron provides strategic resources and a quest line about what he is hiding."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"71","points":{}}]},"77":{"id":"77","title":"SERA NIGHTHOLLOW","location":"","prose":["She is already awake and has scouted the perimeter. She says: 'I should tell you that I am not easy to be with. I have been told this.' You tell her you are not particularly easy either. Then, not smiling but with the thing behind her eyes that is equivalent: 'All right.' That is everything. In the main campaign, Sera Nighthollow is a scout companion with her own quest line."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"71","points":{}}]},"78":{"id":"78","title":"VAEL ASHMORE","location":"","prose":["She does not do the thing where people are strange in the morning after something real. She is exactly herself — a little softer. She hands you your gear and says: 'For what it is worth, I have no regrets.' Then you are both laughing. 'I want to do this again. After. When there is an after.' In the main campaign, Vael Ashmore is a Crown-path companion with her own quest line."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"71","points":{}}]},"79":{"id":"79","title":"TARIEL DUSKMANTLE","location":"","prose":["She does not take the Oath. She watches you take it from the back of the chapel with her notebook open and her pen still. She writes one line. Afterward: 'I have decided to stay. Not as an observer.' She takes the credential and folds it and puts it in your hand. 'I do not need this anymore. I know what I am observing.' In the main campaign, Tariel Duskmantle is a political advisor with no rank, no oath, and the most accurate assessment of power in any room she enters. She loves you the way she loves an argument: completely, with her full attention, and with the knowledge that the conclusion may change."],"boxes":[],"choices":[{"letter":"A","text":"Next epilogue.","target":"71","points":{}}]},"80":{"id":"80","title":"LYSANDER GRAVES","location":"","prose":["He is not at the ceremony. He is at the gate, already mounted, facing south. On the road he does not ride beside you — he rides near. The night before Vogler: 'I will be at the wall. Whatever they need me to be. Sword for hire. No title, no Oath, no complications.' He looks at you. 'Except one.' In the main campaign, Lysander Graves is an unaffiliated fighter with no rank and the best sword arm in Vogler. He is the most dangerous kind of complication: a good man without a system, in love with someone inside one.","**CLASS:** Fighter / Paladin (circle)","**ORDER POINTS:** ROSE: ___ pts | SWORD: ___ pts | CROWN: ___ pts Highest score = Your Order. Tiebreaker: choose the one that feels true.","**PALADIN — GOD SIGN TALLIES:** PALADINE: ___ | KIRI-JOLITH: ___ | MISHAKAL: ___ | HABBAKUK: ___ | BRANCHALA: ___ God chosen at Scene P4: _______________ Sacred Oath: Devotion / Ancients / Vengeance (circle)","**FIGHTER — ARCHETYPE:** Champion / Battle Master / Eldritch Knight (circle)","**COMPANIONS AT ADVENTURE'S END (circle):** Aldric / Thessaly / Serath / Mira / Caeron / Sera / Vael / Tariel / Lysander","**ROMANCE OATH REACHED WITH (circle):** Aldric / Thessaly / Serath / Mira / Caeron / Sera / Vael / Tariel / Lysander / None","**CORRUPTION TRACKS:**","CORRUPTION TRACK 1: STEADFAST / QUESTIONING / SHAKEN / CONVINCED / FALLEN / NOT ENGAGED ROMANCE TRACK (same companion): NONE / SPARK / FLAME / OATH","CORRUPTION TRACK 2: STEADFAST / QUESTIONING / SHAKEN / CONVINCED / FALLEN / NOT ENGAGED ROMANCE TRACK (same companion): NONE / SPARK / FLAME / OATH","**ACTIVE MODIFIERS:** THE HOLLOW CROWN: Reduced / Full / Not Active THE BROKEN SWORD: Reduced / Full / Not Active","**DISPATCH POUCH KEPT:** Yes / No **TOTAL XP EARNED:** ___ / 120","**Paladin Dark God Track:** DG Track: HELD FIRM / HELD / LISTENING / COMPROMISED / FALLEN / DEEPLY FALLEN / PURIFIED / RETURNED / SCARRED","**Fighter Measure Track:**","**CONVINCED (reduced):** Disadvantage on Persuasion when invoking Order authority. Fixable through main campaign story.","**FALLEN (full):** Disadvantage on Order authority Persuasion. Advantage on individual appeals. Permanent unless resolved through main campaign quest.","**CONVINCED (reduced):** Disadvantage on Persuasion when defending institutional decisions. Fixable through story.","**FALLEN (full):** Disadvantage on institutional defence Persuasion. Advantage on civilian defence attack rolls. Permanent unless resolved through quest.","**Both FALLEN:** Both modifiers full strength. Hardest character — sees both sides of every argument.","**SHAKEN+ corruption + LISTENING+ DG:** All DG saves at Disadvantage.","**FALLEN corruption + FALLEN DG:** Darkest Paladin outcome. Recovery requires two separate quests.","**STEADFAST corruption + HELD FIRM DG:** Strongest character. Advantage on charm/compulsion/fear saves for remainder of prelude and first chapter of main campaign.","**FALLEN corruption + Keeper Measure (Fighter):** Most sophisticated fall. You understand the Measure deeply AND believe it is insufficient. Aldous will recognise this.","Your oath is spoken. Your blade is blooded. The road to Vogler is open.","The Dragon Queen's armies are marching.","The gods are waking.","Ride on, Squire.","*End of The Knight's Oath — Version 16*"],"boxes":[],"choices":[{"letter":"A","text":"View your final character sheet.","target":"71","points":{}}]},"BOND_CAMP":{"id":"BOND_CAMP","title":"AROUND THE FIRE","location":"","prose":["*Camp — Evening*","The fire is the right size tonight — not the regulation minimum that Caeron insists on, but the slightly larger version that happens when someone adds a log without being asked and no one corrects them. The column has settled into the particular rhythm of people who have been moving together long enough to develop unspoken protocols: who fills the water, who checks the perimeter, who tells the story.","Aldric is cleaning his blade. He always cleans his blade. It is the thing he does when he wants to be present without having to speak, and it works — the repetitive motion gives his hands somewhere to be while the rest of him listens.","Tonight someone asks a question. It is the kind of question that only gets asked around fires, in the dark, when the day is far enough behind and tomorrow is far enough ahead that the present moment feels briefly safe.","'What will you do when this is over?'"],"boxes":[{"type":"info","text":"**PARTY BONDING SCENE**\nThis scene deepens your connection with your companions. All companions present will react."}],"choices":[{"letter":"A","text":"'Go home. See my family. Then come back.'","target":"BOND_RETURN","points":{"ROSE":1}},{"letter":"B","text":"'Keep going. There is more road.'","target":"BOND_RETURN","points":{"SWORD":1}},{"letter":"C","text":"'I do not know yet. Ask me at Vogler.'","target":"BOND_RETURN","points":{"ROSE":1}},{"letter":"D","text":"Ask someone else the question instead.","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}}]},"BOND_TRAIN":{"id":"BOND_TRAIN","title":"TRAINING TOGETHER","location":"","prose":["*Camp — Morning*","Dawn training has become a group ritual. Not ordered — evolved. Aldric runs sword forms. Vael, if present, matches him pass for pass, the two of them moving through the same combinations with the synchronised precision of people who have been watching each other improve. Sera, if present, watches from the armoury roof or a convenient tree with the professional attention of someone filing observations for later use.","Today someone suggests a change: train together. Not the formal pairs Caeron assigns. Real training — the kind where you learn from each other's differences."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Athletics (+3) | STR | DC 12\n**SUCCESS (roll 12+):** You learn a technique from the session. +1 to your next combat encounter attack roll.\n**FAILURE (roll 1-11):** Good exercise. No specific breakthrough."}],"choices":[{"letter":"A","text":"Spar with everyone willing. Learn their styles.","target":"BOND_RETURN","points":{"SWORD":2}},{"letter":"B","text":"Focus on teaching. Show them what you know.","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"Ask Sera or Serath for tactical advice instead.","target":"BOND_RETURN","points":{"ROSE":1,"SWORD":1}},{"letter":"D","text":"Run the perimeter with whoever will join you.","target":"BOND_RETURN","points":{"SWORD":1}}]},"BOND_MEAL":{"id":"BOND_MEAL","title":"BREAKING BREAD","location":"","prose":["*Camp — Midday*","Mira, if present, has done something to the garrison rations that borders on alchemy. The bread is the same bread. The cheese is the same cheese. But somehow the combination, with whatever herbs she found at the roadside this morning, has become something worth sitting down for.","If Mira is not present, Aldric has attempted to cook. The result is edible in the way that garrison food is always edible: it sustains life without celebrating it. He is aware of this. He is not apologising.","People sit closer than they used to. That is the change you notice — not the food, not the conversation, but the physical distance. Eight months ago these were strangers. Now they are the people whose breathing you recognise in the dark."],"boxes":[{"type":"info","text":"**PARTY BONDING SCENE**\nShare a meal. Listen. Be present."}],"choices":[{"letter":"A","text":"Tell a story from home. Something true.","target":"BOND_RETURN","points":{"ROSE":2}},{"letter":"B","text":"Ask each companion one question they have never been asked.","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"Eat in comfortable silence. Let the quiet do the work.","target":"BOND_RETURN","points":{"ROSE":1}},{"letter":"D","text":"Plan tomorrow's route with the group.","target":"BOND_RETURN","points":{"CROWN":1,"SWORD":1}}]},"BOND_STAR":{"id":"BOND_STAR","title":"WATCHING THE MOONS","location":"","prose":["*Camp — Late Night*","Solinari is full tonight, silver-white. Lunitari hangs low on the horizon, red as old copper. Between them, if you know where to look: the absence that is Nuitari, the black moon. Three moons. Three kinds of power. Three ways of seeing the same sky.","You are not alone on the watch. Someone has joined you without asking, which is the specific trust of people who have stopped requiring invitations. You sit together in the silver-red dark and look at the moons and do not speak for a while.","Thessaly, if present, writes in her notebook by moonlight. Tariel, if present, watches the moons the way she watches everything — cataloguing. Lysander, if present, looks south."],"boxes":[{"type":"info","text":"**Paladin Note:** The three moons remind you of the divine presence. Mark 1 tally under whichever god feels right tonight."}],"choices":[{"letter":"A","text":"'Do you believe in the gods?'","target":"BOND_RETURN","points":{"ROSE":1}},{"letter":"B","text":"'What are you fighting for? Not the Order. You, personally.'","target":"BOND_RETURN","points":{"ROSE":2}},{"letter":"C","text":"Say nothing. Some moments do not need words.","target":"BOND_RETURN","points":{"ROSE":1,"SWORD":1}},{"letter":"D","text":"Point out Nuitari. Not everyone can see the black moon.","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}}]},"BOND_RETURN":{"id":"BOND_RETURN","title":"THE ROAD CONTINUES","location":"","prose":["The moment passes. Tomorrow continues. But something has shifted — the invisible architecture of the group has settled into a new shape, one where you are a little more known and a little more trusted. That is not nothing. In a war, it is almost everything."],"boxes":[],"choices":[{"letter":"A","text":"Continue.","target":"BOND_HUB","points":{}}]},"4A":{"id":"4A","title":"THE MEASURE AND THE MORNING","location":"Castle Brightholm \u2014 Chapel Library","prose":["Aldous closes the book slowly \u2014 not because he is finished, but because some conversations end by settling rather than stopping. He places one hand flat on the cover, a gesture so habitual it has worn the leather smooth.","'You ask the right questions,' he says. 'That is rarer than you think. Half the people in this garrison have never asked a single one.' He looks at you with the particular quality of attention he reserves for moments he considers important. 'The Trials will test whether you have memorised the Measure. They will not test whether you understand it. Those are different examinations, and only one of them matters.'","He stands, joints protesting in the way of a man who has spent too many years in cold stone rooms. 'Go. The morning is yours. Spend it on something that matters \u2014 not because I told you to, but because you chose to.' He pauses at the door. 'That is the Measure, by the way. Choosing well, when no one is watching to see whether you do.'","The library is quiet after he leaves. The book is still on the table. The morning light through the narrow window has shifted from grey to gold."],"boxes":[],"choices":[{"letter":"A","text":"Step into the corridor. The morning is waiting.","target":"1_HUB","points":{}}]},"BOND_HUB":{"id":"BOND_HUB","title":"CAMP","location":"","prose":["The group settles. The road awaits."],"boxes":[],"choices":[{"letter":"A","text":"Return to camp preparations.","target":"11_EVENING","points":{}},{"letter":"B","text":"Continue the march south.","target":"11_NIGHT","points":{}}]},"DATE_POLY":{"id":"DATE_POLY","title":"THE THREE OF YOU","location":"","prose":["*Camp — Evening*","It takes time to learn the geometry of three. Not the logistics — those are simpler than expected — but the emotional architecture: who needs attention when, whose silence means contentment and whose means distance, how to hold two people in your awareness at once without making either feel secondary.","Tonight the geometry works. You are together — all three — at the edge of the firelight. They talked to each other first, before either of them talked to you. That matters. This is not two separate relationships with you at the centre. It is a triangle, and tonight all three sides are holding."],"boxes":[{"type":"romance","text":"**POLYAMORY SCENE**\nA moment with both partners. Only available if the polyamory path was accepted."}],"choices":[{"letter":"A","text":"Ask them: 'How are you two?' Not about you. About them.","target":"BOND_RETURN","points":{"ROSE":2}},{"letter":"B","text":"Let the evening unfold. No agenda. Just presence.","target":"BOND_RETURN","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"'I never expected this. I am glad it is real.'","target":"BOND_RETURN","points":{"ROSE":2}}]},"DATE_POLY_MORN":{"id":"DATE_POLY_MORN","title":"MORNING AFTER","location":"","prose":["*Camp — Dawn*","You wake to the specific warmth of not being alone. The morning has the quality of something new that is also, somehow, already familiar. One of them is still asleep. The other is watching you with the quiet expression of someone who has been awake for a while and decided not to move because the moment was worth holding.","'Good morning,' they say. Not a question. A fact they are pleased about."],"boxes":[{"type":"romance","text":"**POLYAMORY SCENE**\nThe morning after. Tender. Real."}],"choices":[{"letter":"A","text":"'Good morning.' Mean everything.","target":"BOND_RETURN","points":{"ROSE":1}},{"letter":"B","text":"Let the sleeping one sleep. Talk quietly with the other.","target":"BOND_RETURN","points":{"ROSE":1}}]}};

// Filter lines/paragraphs by class and companion presence
function shouldHideLine(line,cls,companions){
  const l=line.trim();if(!l)return false;
  const comps=companions||[];
  // Class-conditional lines
  if(cls==='Fighter'){
    if(/^(?:\*\*)?If you are a Paladin/i.test(l))return true;
    if(/^(?:\*\*)?Paladin(?:s)?:/i.test(l)&&!/Fighter/i.test(l))return true;
    if(/^(?:\*\*)?Paladin(?:s)? (?:on |with |may |only|note|—)/i.test(l))return true;
    if(/^(?:\*\*)?Paladin(?:s)? (?:turn to|skip to|read )/i.test(l))return true;
    if(/(?:\*\*)?All Paladins:/i.test(l)&&!/Fighter/i.test(l))return true;
    if(/^(?:\*\*)?PALADIN\b/i.test(l)&&!/FIGHTER/i.test(l)&&!/Paladin Level \d/i.test(l))return true;
  }
  if(cls==='Paladin'){
    if(/^(?:\*\*)?If you are a Fighter/i.test(l))return true;
    if(/^(?:\*\*)?Fighter(?:s)?:/i.test(l)&&!/Paladin/i.test(l))return true;
    if(/^(?:\*\*)?FIGHTER\b/i.test(l)&&!/PALADIN/i.test(l)&&!/Fighter Level \d/i.test(l))return true;
  }
  // Companion-conditional lines
  const compMatch=l.match(/^(?:\*\*)?IF\s+(\w+)\s+IS\s+(?:IN YOUR PARTY|PRESENT)/i)||l.match(/^(?:\*\*)?(?:If|if)\s+(\w+)\s+is\s+(?:in your party|present|in the party)/i)||l.match(/^\(If\s+(\w+)\)/i);
  if(compMatch){
    const name=compMatch[1];
    // Check if this companion is in the party (match first name to full name)
    const hasComp=comps.some(c=>c.toLowerCase().startsWith(name.toLowerCase()));
    if(!hasComp)return true;
  }
  return false;
}
function stripCompanionLabel(line){
  // Remove "**IF X IS IN YOUR PARTY (...):**" / "**IF X IS PRESENT:**" headers, keep remaining content
  return line
    .replace(/\*\*IF\s+\w+\s+IS\s+(?:IN YOUR PARTY|PRESENT)[^*]*\*\*\s*/gi,'')
    .replace(/\*\*(?:If|if)\s+\w+\s+is\s+(?:in your party|present|in the party)[^*]*\*\*\s*/gi,'')
    .replace(/^\(If\s+\w+\)\s*/i,'');
}
function filterProse(proseArr,cls,companions){
  if(!proseArr)return[];
  return proseArr.filter(p=>!shouldHideLine(p,cls,companions)).map(p=>stripCompanionLabel(p)).filter(p=>p.trim());
}
function filterBoxText(text,cls,companions){
  if(!text)return text;
  const lines=text.split('\n');
  const filtered=[];let skipping=false;
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(shouldHideLine(l,cls,companions)){
      skipping=true;continue;
    }
    // If previous line was hidden and this is a continuation (no bold header), skip it too
    if(skipping&&l.trim()&&!l.trim().startsWith('**')&&!l.trim().startsWith('>')&&!/^[A-Z]{2,}/.test(l.trim())){
      continue;
    }
    skipping=false;
    filtered.push(stripCompanionLabel(l));
  }
  return filtered.join('\n');
}

function getCompat(a,b){
  for(const[x,y,r] of ROMANCE_COMPAT.compatible){if((x===a&&y===b)||(x===b&&y===a))return{type:'compatible',reason:r}}

}

function findCompanion(name){
  if(!name||typeof COMPANION_DATA==='undefined')return null;
  if(COMPANION_DATA[name])return COMPANION_DATA[name];
  const lower=name.toLowerCase();
  for(const[k,v] of Object.entries(COMPANION_DATA)){if(k.toLowerCase()===lower)return v;}
  return null;
}

// Storage: try window.storage (Claude artifact), fall back to localStorage
const ST={
  async set(k,v){try{if(window.storage){await window.storage.set(k,v);return}localStorage.setItem(k,v)}catch(e){try{localStorage.setItem(k,v)}catch(e2){}}},
  async get(k){try{if(window.storage){const r=await window.storage.get(k);return r?r.value:null}return localStorage.getItem(k)}catch(e){try{return localStorage.getItem(k)}catch(e2){return null}}},
  async del(k){try{if(window.storage){await window.storage.delete(k);return}localStorage.removeItem(k)}catch(e){try{localStorage.removeItem(k)}catch(e2){}}}
};
async function saveGame(slot,gs,sceneId){try{await ST.set('save-slot-'+slot,JSON.stringify({gs,sceneId,savedAt:new Date().toISOString()}));return true}catch(e){return false}}
async function loadAllSlots(){const s=[null,null,null];for(let i=0;i<3;i++){try{const v=await ST.get('save-slot-'+i);if(v)s[i]=JSON.parse(v)}catch(e){}}return s}
async function deleteSave(slot){try{await ST.del('save-slot-'+slot)}catch(e){}}

  const e=React.createElement;

  if(!c)return null;

  const isRomance=romance&&!['Friend','Distant','Cold','Observer','Hostile'].includes(romance);
  const romNarr=isRomance&&firstName&&ROMANCE_TOOLTIPS[firstName]?ROMANCE_TOOLTIPS[firstName][romance]:'';

    e('div',{className:'spell-tooltip companion-tooltip',onClick:ev=>ev.stopPropagation()},
      e('div',{className:'st-header'},

// ── Roll Box Parser ────────────────────────────────────
function parseRollBox(text){
  const lines=text.split('\n');
  let preamble=[],success=[],failure=[],coinflip='',isRequired=false,dc=null,skill=null;
  let section='pre';
  for(const line of lines){
    const l=line.trim();
    if(!l)continue;
    if(l.match(/\*\*ROLL REQUIRED/i)){isRequired=true;preamble.push(l);section='pre';continue}
    if(l.match(/\*\*OPTIONAL ROLL/i)){isRequired=false;preamble.push(l);section='pre';continue}
    if(l.match(/\*\*SUCCESS\s*\(/i)){section='success';success.push(l);continue}
    if(l.match(/\*\*FAILURE\s*\(/i)){section='failure';failure.push(l);continue}
    if(l.match(/No dice\?|Flip a coin/i)){coinflip=l;continue}
    if(section==='pre')preamble.push(l);
    else if(section==='success')success.push(l);
    else if(section==='failure')failure.push(l);
  }
  // Extract DC and skill from preamble
  const full=preamble.join(' ');
  const dcM=full.match(/DC\s+(\d+)/);if(dcM)dc=parseInt(dcM[1]);
  const skills=['Athletics','Perception','Insight','Investigation','History','Religion','Medicine','Persuasion','Intimidation','Survival','Stealth','Acrobatics','Composure'];
  const sts=['STR','DEX','CON','INT','WIS','CHA'];
  for(const s of skills)if(full.includes(s)){skill=s;break}
  if(!skill)for(const s of sts)if(full.includes(s)){skill=s;break}
  return{preamble,success,failure,coinflip,isRequired,dc,skill:skill||'WIS'};
}

// ── Roll Box ───────────────────────────────────────────
function RollBox({text,derived,gs,onBonus,rollKey,onRollSave}){
  // Check for persisted roll result
  const saved=(gs&&gs.completedRolls&&rollKey)?gs.completedRolls[rollKey]:null;
  const[result,setResult]=useState(saved?saved.result:null);
  const[rolling,setRolling]=useState(false);
  const[display,setDisplay]=useState(null);
  const[prayerAvail,setPrayerAvail]=useState(false);
  const[prayerResult,setPrayerResult]=useState(saved?saved.prayer:null);
  const[prayRolling,setPrayRolling]=useState(false);
  const[tmResult,setTmResult]=useState(saved?saved.tacticalMind:null);
  const[tmRolling,setTmRolling]=useState(false);
  const parsed=parseRollBox(text);
  let bonus=getBonus(derived,parsed.skill);
  if(parsed.skill==='Intimidation'&&gs&&gs.flags&&gs.flags.pigSkewer)bonus+=1;
  const e=React.createElement;

  // Persist a roll result to gs.completedRolls
  const saveRoll=(res,prayer)=>{
    if(!rollKey||!onRollSave)return;
    onRollSave(g=>{const cr={...(g.completedRolls||{})};cr[rollKey]={result:res,prayer:prayer||null};return{...g,completedRolls:cr}});
  };

  // Determine which god to pray to
  const getGod=()=>{
    if(!gs)return'Paladine';
    if(gs.cls==='Paladin'){
      const signs=gs.godSigns||{};
      let best='Paladine',bestVal=0;
      for(const[g,v] of Object.entries(signs)){if(v>bestVal){bestVal=v;best=g}}
      return best;
    }
    return gs.dgTrack==='FALLEN'?'Takhisis':'Paladine';
  };

  const roll=()=>{setRolling(true);setResult(null);setPrayerAvail(false);let c=0;
    const iv=setInterval(()=>{setDisplay(Math.floor(Math.random()*20)+1);if(++c>=10){clearInterval(iv);
      const d20=Math.floor(Math.random()*20)+1;const total=d20+bonus;
      const ok=total>=parsed.dc;
      const res={d20,total,ok};
      setResult(res);setDisplay(d20);setRolling(false);
      saveRoll(res,null);
      if(ok&&onBonus&&parsed.success){
        const stxt=parsed.success.join(' ');
        const bonusPatterns=[
          {re:/\+1 to (?:any |all )?(.+?)(?:check|roll|interaction|track)/i, type:'roll_bonus'},
          {re:/(?:Advantage|advantage) (?:on |in )?(.+?)(?:\.|,|$)/i, type:'advantage'},
          {re:/\+1 (.+?) romance/i, type:'romance_bonus'},
        ];
        bonusPatterns.forEach(bp=>{
          const m=stxt.match(bp.re);
          if(m)onBonus({name:m[0].substring(0,60).trim(),desc:m[0].substring(0,100).trim(),scene:gs?.history?.length?'~'+gs.history.length:'?',type:bp.type});
        });
      }
      if(!ok&&Math.random()<0.10)setPrayerAvail(true);
    }},60)};

  // Tactical Mind (Fighter Lv2+): add 1d10 to failed ability check, uses Second Wind charge
  const canTacticalMind=gs&&gs.cls==='Fighter'&&gs.level>=2&&result&&!result.ok&&!result.skipped&&!tmResult&&!prayerResult&&((derived.secondWindMax||2)-(gs.secondWindUsed||0))>0;
  const useTacticalMind=()=>{setTmRolling(true);let c=0;
    const iv=setInterval(()=>{setDisplay(Math.floor(Math.random()*10)+1);if(++c>=8){clearInterval(iv);
      const d10=Math.floor(Math.random()*10)+1;const newTotal=result.total+d10;
      const ok=newTotal>=parsed.dc;
      const tmRes={d10,newTotal,ok};
      setTmResult(tmRes);setTmRolling(false);
      // Save to completedRolls
      if(rollKey&&onRollSave)onRollSave(g=>{const cr={...(g.completedRolls||{})};cr[rollKey]={result:result,prayer:null,tacticalMind:tmRes};return{...g,completedRolls:cr,secondWindUsed:ok?(g.secondWindUsed||0)+1:(g.secondWindUsed||0)}});
      if(ok&&onBonus&&parsed.success){
        const stxt=parsed.success.join(' ');
        const bonusPatterns=[
          {re:/\+1 to (?:any |all )?(.+?)(?:check|roll|interaction|track)/i, type:'roll_bonus'},
          {re:/(?:Advantage|advantage) (?:on |in )?(.+?)(?:\.|,|$)/i, type:'advantage'},
          {re:/\+1 (.+?) romance/i, type:'romance_bonus'},
        ];
        bonusPatterns.forEach(bp=>{const m=stxt.match(bp.re);if(m)onBonus({name:m[0].substring(0,60).trim(),desc:m[0].substring(0,100).trim(),scene:'tactical_mind',type:bp.type})});
      }
    }},60)};

  const pray=()=>{setPrayRolling(true);let c=0;
    const iv=setInterval(()=>{setDisplay(Math.floor(Math.random()*20)+1);if(++c>=10){clearInterval(iv);
      const d20=Math.floor(Math.random()*20)+1;const total=d20+bonus;
      const ok=total>=parsed.dc;
      const res={d20,total,ok};
      setPrayerResult(res);setPrayRolling(false);setPrayerAvail(false);
      saveRoll(result,res);
      if(ok&&onBonus&&parsed.success){
        const stxt=parsed.success.join(' ');
        const m=stxt.match(/\+1 to (?:any |all )?(.+?)(?:check|roll|interaction)/i);
        if(m)onBonus({name:m[0].substring(0,60).trim(),desc:m[0].substring(0,100).trim(),scene:'prayer',type:'roll_bonus'});
      }
    }},60)};

  const isOptional=!parsed.isRequired;
  const finalResult=tmResult?{d20:result.d20,total:tmResult.newTotal,ok:tmResult.ok}:prayerResult||result;
  const showOutcome=finalResult&&!finalResult.skipped;
  
  return e('div',{className:'roll-box-wrapper'},
    e('div',{className:'box roll'},
      parsed.preamble.map((l,i)=>e('p',{key:i,dangerouslySetInnerHTML:{__html:fmt(l)}})),
      parsed.coinflip?e('p',{className:'coinflip',dangerouslySetInnerHTML:{__html:fmt(parsed.coinflip)}}):null
    ),
    parsed.dc?e('div',{className:'dice-area'},
      e('div',{className:'dice-info'},parsed.skill+' \u2022 DC '+parsed.dc+' \u2022 Mod '+(bonus>=0?'+':'')+bonus+(isOptional?' \u2022 Optional':'')),
      // Show result
      result?e('div',{className:'dice-result '+(result.ok?'success':'fail')},
        e('span',{className:'dice-num'},result.d20),
        bonus!==0?e('span',{className:'dice-bonus'},' '+(bonus>=0?'+':'\u2212')+' '+Math.abs(bonus)+' = '+result.total):null,
        e('div',{className:'dice-verdict'},result.ok?'\u2714 SUCCESS':'\u2718 FAILURE')
      ):e('div',{className:'dice-placeholder'},rolling&&display?display:'?'),
      // Roll button: only show if no result yet
      !result?e('button',{className:'dice-btn',onClick:roll,disabled:rolling},rolling?'\u2684 Rolling...':'\u2684 Roll d20'):null,
      // Prayer button: rare divine intervention
      prayerAvail&&!prayerResult?e('div',{className:'prayer-block'},
        e('p',{className:'prayer-text'},'You feel a presence. A warmth at the edge of your awareness.'),
        e('button',{className:'prayer-btn',onClick:pray,disabled:prayRolling},prayRolling?'Praying...':'Pray to '+getGod())
      ):null,
      // Prayer result
      prayerResult?e('div',{className:'prayer-result'},
        e('p',{className:'prayer-flavor'},prayerResult.ok?getGod()+' answers.':'The silence holds. Perhaps another time.'),
        e('div',{className:'dice-result '+(prayerResult.ok?'success':'fail')},
          e('span',{className:'dice-num'},prayerResult.d20),
          bonus!==0?e('span',{className:'dice-bonus'},' '+(bonus>=0?'+':'\u2212')+' '+Math.abs(bonus)+' = '+prayerResult.total):null,
          e('div',{className:'dice-verdict'},prayerResult.ok?'\u2714 DIVINE SUCCESS':'\u2718 UNANSWERED'))
      ):null,
      // Tactical Mind (Fighter Lv2+)
      canTacticalMind?e('div',{className:'prayer-block'},
        e('p',{className:'prayer-text'},'Your tactical instincts sharpen. You can push through this. (Expends a Second Wind use)'),
        e('button',{className:'prayer-btn',style:{background:'#2a4a6b'},onClick:useTacticalMind,disabled:tmRolling},tmRolling?'Focusing...':'\u2694 Tactical Mind (+1d10)')
      ):null,
      // Tactical Mind result
      tmResult?e('div',{className:'prayer-result'},
        e('p',{className:'prayer-flavor'},tmResult.ok?'Your training kicks in. You see it clearly now.':(result.total+' + '+tmResult.d10+' = '+tmResult.newTotal+' — not enough. But the instinct was not wasted.')),
        e('div',{className:'dice-result '+(tmResult.ok?'success':'fail')},
          e('span',{className:'dice-num'},tmResult.d10),
          e('span',{className:'dice-bonus'},' + '+result.total+' = '+tmResult.newTotal),
          e('div',{className:'dice-verdict'},tmResult.ok?'\u2714 TACTICAL SUCCESS':'\u2718 NOT ENOUGH (Second Wind use refunded)'))
      ):null
    ):null,
    // Outcome text - use prayer result if it exists, otherwise original result
    showOutcome?e('div',{className:'box '+(finalResult.ok?'roll-success':'roll-failure')},
      (finalResult.ok?parsed.success:parsed.failure).map((l,i)=>e('p',{key:i,dangerouslySetInnerHTML:{__html:fmt(l)}}))
    ):null,
    isOptional&&!result?e('button',{className:'skip-roll-btn',onClick:()=>setResult({d20:0,total:0,ok:false,skipped:true})},'Skip this roll'):null,
    result&&result.skipped&&!prayerResult?e('div',{className:'box roll-failure'},
      parsed.failure.map((l,i)=>e('p',{key:i,dangerouslySetInnerHTML:{__html:fmt(l)}}))
    ):null
  );
}

// ── Dice Helpers ──────────────────────────────────────
function rollDice(sides){return Math.floor(Math.random()*sides)+1}
function rollDamage(expr){
  // Parse "1d8+3", "2d6+4", "2d8", etc.
  const m=expr.match(/(\d+)d(\d+)(?:\+(\d+))?/);
  if(!m)return parseInt(expr)||0;
  let total=0;for(let i=0;i<parseInt(m[1]);i++)total+=rollDice(parseInt(m[2]));
  return total+(parseInt(m[3])||0);
}
