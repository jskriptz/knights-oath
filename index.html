ext":"(If not yet visited) Find Aldric in the armoury","target":"57","points":{}},{"letter":"E","text":"(If not yet visited) Something is wrong about the timing. Investigate","target":"53B","points":{}},{"letter":"F","text":"(If not yet visited, Tariel in party) Find Tariel","target":"53D","points":{}},{"letter":"G","text":"(If not yet visited, Lysander in party) Find Lysander","target":"53E","points":{}},{"letter":"H","text":"(If not yet visited, Mira and Serath both present) The infirmary door is ajar. You hear voices inside","target":"54B","points":{}},{"letter":"I","text":"(If 3+ visits) The candles have burned to nothing. The sky outside is not black any more — it is the deep grey that comes before grey becomes blue. Dawn is close","target":"53_HUB_MORN","points":{}},{"letter":"J","text":"The alarm bell — south wall! Draconians at the breach!","target":"53_BREACH","points":{"sword":1}},{"letter":"K","text":"Smoke from the grain stores. Not cook-fire smoke. Something is wrong","target":"53_SABOTAGE","points":{"sword":1}}]},"53_HUB_MORN":{"id":"53_HUB_MORN","title":"THE DAWN BEFORE THE TRIALS","location":"Castle Brightholm — East Battlements, Pre-Dawn","prose":["You find yourself on the east battlements without entirely deciding to walk here. The sky is the colour of steel being heated — not yet light, but no longer dark. Below, the courtyard is already moving: grooms leading horses, the armourer's apprentice carrying bundles of fletching, a cart being loaded with supplies that say *march* more clearly than any order could.","Three days. Maybe two. And between now and then — the Trials. Caeron has decided to accelerate them. Whatever comes after, you will face it as a sworn squire or not at all.","You lean on the battlement stone. It is cold under your hands. South, beyond the treeline, there is nothing visible — but you know what is there. Two thousand soldiers learning your name the way a river learns a stone: by wearing it down. You are not worn down yet. The bell will ring soon. When it does, the Trials begin."],"boxes":[],"choices":[{"letter":"A","text":"Go to the Great Hall. Face the Trials","target":"60","points":{}}]},"53_SABOTAGE":{"id":"53_SABOTAGE","title":"THE GRAIN STORE FIRE","location":"Castle Brightholm — Supply Wing, Deep Night","prose":["The smell hits you before the sight does — not woodsmoke, not cooking, but the sharp chemical stink of lamp oil poured on grain. Accelerant. Someone is burning the garrison's food stores on the night before a march, and that is not an accident. That is sabotage.","The supply wing corridor is dark except for the orange glow leaking under the grain store door. You can hear it — the wet crackle of oil-soaked grain catching, and under it, the sound of movement. Footsteps. Not the panicked footsteps of someone who started a fire accidentally. The measured footsteps of people with a job.","You put your hand on the door. It is warm. Not hot yet. The fire is young. Whatever is happening in there, you have minutes, not hours.","**IF SERATH IS IN YOUR PARTY:** They appear beside you. They were already coming — they smelled the oil from the corridor. 'Dragon Army sabotage team,' they say. 'Standard doctrine. Two operatives, civilian clothes, prepositioned inside the target garrison weeks ago. They light the stores the night before the assault.' Their expression is flat. 'I know this because I trained them.'","**IF MIRA IS IN YOUR PARTY:** Mira rounds the corner at a run. 'I smelled the oil from the infirmary. The grain store—' She sees the glow under the door. Her face hardens. That grain store is the one she asked Isak for in Vogler. The one she was going to use for the field hospital. The concept is transferable. 'Those supplies are the garrison's future. If they burn, the march starts hungry.'"],"boxes":[{"type":"roll","text":"**APPROACH — Choose how to enter:**\n\n**A) Kick the door. Surprise them. Sword drawn.** (+1 SWORD) Proceed to combat immediately. You have surprise — enemies do not act in Round 1.\n\n**B) Stealth. Open the door quietly and assess.** (+1 CROWN)\n**ROLL REQUIRED:** Stealth (+2) | DEX | DC 13\n**SUCCESS:** You see them before they see you. Two figures in civilian clothes, one pouring oil on the grain sacks, the other holding a torch. A third — larger, armoured beneath a cloak — stands guard with a hand crossbow. You have one free round of attacks before they react. Proceed to combat with surprise.\n**FAILURE:** The door creaks. The guard turns. The torch drops. Proceed to combat — no surprise for either side.\n\n**C) Sound the alarm first, then enter.** (+1 CROWN, +1 ROSE)\nYou shout for the watch. Help will arrive in 3 rounds. The saboteurs hear you and prepare. Proceed to combat — no surprise. Garrison reinforcements arrive after Round 3."},{"type":"loot","text":"Victory: The saboteurs are down. The grain store is saved — or lost, depending on how fast you moved.\nFallen (0 HP): The garrison arrives to finish the fight. You wake with Mira over you. 1 HP, one exhaustion.\n**AFTER THE FIGHT**\n\n**GRAIN STORE SAVED:** The supplies survived. The march starts fed. +2 CROWN. Caeron's assessment of you moves in a direction he does not discuss but you can see in the way he includes you in the next briefing.\n\n**GRAIN STORE LOST:** The supplies are ash. The march starts hungry. All ration costs double for Act 4. Caeron says nothing. His silence is louder than criticism.\n\n**SABOTEURS CAPTURED ALIVE:** +2 CROWN. Under interrogation (Caeron handles this, not you), they reveal the Dragon Army's timeline. The march begins a day earlier. This is an advantage.\n\n**INFILTRATOR CAPTURED ALIVE:** +2 CROWN, +1 SWORD. The infiltrator carries a coded dispatch. Serath, if present, can decode it: the Dragon Army's order of battle for the Vogler assault. This intelligence carries into Act 5.\n\n**IF SERATH USED COMMAND CODES:** +1 CROWN. Serath stands in the smoke-filled grain store and looks at their hands. 'I trained people to do this,' they say. 'Now I am stopping people I trained.' The complexity of this is not lost on them. Or on you.\n\n**IF MIRA DRAGGED GRAIN SACKS:** +1 ROSE. The sacks she saved will become bandage material in Vogler. She already knows this. She has been thinking three steps ahead since the south road.\n\n> **SEARCH THE SABOTEURS (Optional — moral choice)**\n> The saboteurs carry coin and a coded message. The infiltrator's chain shirt is quality steel.\n>\n> **A) Search them.** (No moral penalty — enemy combatants engaged in sabotage against your garrison.)\n> **Loot Roll:** Roll 1d20.\n> 1-5: 1d4 stl. Cheap daggers.\n> 6-10: 2d4 stl. The coded message (intelligence value).\n> 11-14: 3d4 stl. Infiltrator's chain shirt (AC 13, lighter than chain mail).\n> 15-17: 4d4 stl. Chain shirt + a vial of alchemist's fire (2d6 fire, thrown 20ft).\n> 18-19: 5d4 stl. Above + a set of thieves' tools (useful for locked doors in future scenes).\n> 20: 6d4 stl. All above + a Dragon Army officer's signet ring. Serath recognizes it: '*That is a captain's ring. This was not a routine sabotage. Someone important ordered this.*' +1 CROWN.\n>\n> **B) Leave them for the watch.** (+1 CROWN. Proper procedure. Caeron approves.)\n\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots, Lay on Hands pool, bandages, potions consumed.\n**Short rest available:** Recover Second Wind, Action Surge.\n**XP:** 10 XP per saboteur (20 total), 20 XP for infiltrator. Bonus 15 XP if grain store saved. Bonus 10 XP if infiltrator captured."},{"type":"combat","text":"**COMBAT MODE**\n**Pen & Paper:** Use stat blocks below. Run at your table. Skip to AFTER THE FIGHT.\n**Narrative Mode:** Follow rounds below. Roll when prompted.\n\n**ENEMIES:**\n**Saboteur (2):** AC 11 (civilian clothes), HP 9, Speed 30 ft. Dagger +3 (1d4+1). Oil Flask (thrown, 10 ft): target catches fire, 1d4 fire damage per round until extinguished (action). Desperate: will try to spread fire rather than fight if possible.\n**Dragon Army Infiltrator:** AC 14 (hidden chain shirt under cloak), HP 22, Speed 30 ft. Shortsword +5 (1d6+3). Hand Crossbow +5 (1d6+3, 30/120). Multi-attack: 2 shortsword attacks. Slippery: advantage on saves vs. grapple and restrain. **WILL ATTEMPT TO FLEE if both saboteurs fall.**\n\n**ENVIRONMENT:** The grain store is 30 ft x 20 ft. Grain sacks (half cover). Oil on the floor (5 ft area: DEX DC 12 or fall prone). The fire grows: Round 1 = small (no effect). Round 2 = spreading (disadvantage on Perception from smoke). Round 3 = dangerous (1d4 fire damage per round to anyone within 10 ft of grain sacks). Round 4+ = the grain store is lost.\n\n**OBJECTIVE:** Kill or capture the saboteurs AND extinguish the fire before Round 4.\n**EXTINGUISH:** Athletics DC 13 (smother with cloaks/blankets) or create water (Paladin spell, if available). Replaces your attack that round.\n**ROUND 1 — FIRE AND SHADOW**\n\n*Orange light. Smoke already thickening. The grain sacks are stacked seven high and three of them are burning, the oil turning them into wicks. The saboteurs move with the efficiency of people who have done this before — one pouring, one ready with the torch, the infiltrator turning toward the door with the hand crossbow already rising.*\n\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll (+5) | DC 14 (Infiltrator AC) or DC 11 (Saboteur AC)\n*Choose your target: the infiltrator is the threat. The saboteurs are spreading the fire.*\n\n**HIT:** Deal weapon damage. If targeting a saboteur: one hit drops them (9 HP, they are not fighters).\n\n**MISS:** Smoke and shadows. The grain store is not an arena — it is a burning room full of obstacles.\n\n**COMPANION ACTION (choose 1):**\n| Companion | Action A | Action B | Action C |\n|-----------|----------|----------|----------|\n| Serath (if present) | Engage infiltrator (+2 attack, they know the training) | Block escape route (infiltrator cannot flee) | Shout Dragon Army command codes (saboteurs hesitate — skip their action) |\n| Mira (if present) | Grab blankets — prepare to smother fire next round | Drag grain sacks from the flames (reduce fire timer by 1 round) | Treat any burn wounds (heal 1d6+2) |\n| Aldric (if present) | Flank (+1 attack) | Shield Wall (+1 AC) | Aggressive Strike (1d8+2, takes 1d4) |\n\n**ENEMY ACTIONS:**\n*Saboteurs:* If not engaged, they pour more oil. Fire advances one round on the timer. If engaged, they fight with daggers (desperate, sloppy, DC 11 defense).\n*Infiltrator:* Hand crossbow at closest target. **Defense roll DC 15.** On hit: 1d6+3 piercing. Then draws shortsword.\n**ROUND 2 — THE FIRE SPREADS**\n\n*Smoke is real now. Your eyes sting. The grain sacks are fully ablaze on the east wall and the heat is pushing you back. You have two rounds before the entire store is lost. The infiltrator is between you and the fire, blade drawn, expression flat — the face of a professional who does not care about the grain or the garrison or anything except completing the mission and getting out alive.*\n\n**ROLL REQUIRED:** Attack roll (+5) | DC 14 (Infiltrator) or DC 11 (Saboteur)\n\n**IF YOU HAVE NOT STARTED EXTINGUISHING:** The fire advances. One more round.\n\n**OPTIONAL — EXTINGUISH FIRE (replaces attack):**\n**ROLL REQUIRED:** Athletics (+3) | STR | DC 13\n**SUCCESS:** You smother a section of the fire. The timer pauses. The grain store can still be saved.\n**FAILURE:** The oil reignites. The fire continues to advance.\n\n**INFILTRATOR'S ATTACK:**\nMulti-attack: 2 shortsword strikes.\n**ROLL REQUIRED:** Defense roll | DC 15 (first strike)\n**ROLL REQUIRED:** Defense roll | DC 15 (second strike)\nEach hit: 1d6+3 piercing. The infiltrator is fast, trained, and does not fight fair.\n**ROUND 3 — DECISIVE MOMENT**\n\n*The east wall is fully ablaze. The smoke is at ceiling level and dropping. Your lungs burn. If the fire is not out by the end of this round, the grain store — and the garrison's food supply for the march — is gone.*\n\n**IF INFILTRATOR STILL STANDING:**\n**ROLL REQUIRED:** Attack roll (+5) | DC 14\n**HIT:** Deal weapon damage. If this drops the infiltrator: they fall. The fight is over.\n**(Paladin) DIVINE SMITE** available: +2d8 radiant. In the firelight, the divine light is almost indistinguishable from the flames. Almost.\n**(Fighter) ACTION SURGE** available: second attack.\n\n**IF FIRE NOT YET EXTINGUISHED:**\nSomeone must extinguish it this round or the stores are lost.\n**If you chose option C (sounded alarm):** Garrison soldiers arrive with water buckets. Fire is automatically extinguished. The stores are saved.\n**Otherwise:** Athletics DC 13 (you or a companion).\n\n**INFILTRATOR FLEES (if able):**\nIf both saboteurs are down and escape route is not blocked, the infiltrator runs.\n**OPTIONAL PURSUIT:** Athletics DC 14 to catch them. If caught: capture alive (+1 CROWN, intelligence value). If not caught: they escape into the night. Caeron will want to know about this.\nVictory: The saboteurs are down. The grain store is saved \u2014 or lost, depending on how fast you moved.\nFallen (0 HP): The garrison arrives to finish the fight. You wake with Mira over you. 1 HP, one exhaustion.\n\n**AFTER THE FIGHT**\n\n**GRAIN STORE SAVED:** The supplies survived. The march starts fed. +2 CROWN. Caeron's assessment of you moves in a direction he does not discuss but you can see in the way he includes you in the next briefing.\n\n**GRAIN STORE LOST:** The supplies are ash. The march starts hungry. All ration costs double for Act 4. Caeron says nothing. His silence is louder than criticism.\n\n**SABOTEURS CAPTURED ALIVE:** +2 CROWN. Under interrogation (Caeron handles this, not you), they reveal the Dragon Army's timeline. The march begins a day earlier. This is an advantage.\n\n**INFILTRATOR CAPTURED ALIVE:** +2 CROWN, +1 SWORD. The infiltrator carries a coded dispatch. Serath, if present, can decode it: the Dragon Army's order of battle for the Vogler assault. This intelligence carries into Act 5.\n\n**IF SERATH USED COMMAND CODES:** +1 CROWN. Serath stands in the smoke-filled grain store and looks at their hands. 'I trained people to do this,' they say. 'Now I am stopping people I trained.' The complexity of this is not lost on them. Or on you.\n\n**IF MIRA DRAGGED GRAIN SACKS:** +1 ROSE. The sacks she saved will become bandage material in Vogler. She already knows this. She has been thinking three steps ahead since the south road.\n\n> **SEARCH THE SABOTEURS (Optional — moral choice)**\n> The saboteurs carry coin and a coded message. The infiltrator's chain shirt is quality steel.\n>\n> **A) Search them.** (No moral penalty — enemy combatants engaged in sabotage against your garrison.)\n> **Loot Roll:** Roll 1d20.\n> 1-5: 1d4 stl. Cheap daggers.\n> 6-10: 2d4 stl. The coded message (intelligence value).\n> 11-14: 3d4 stl. Infiltrator's chain shirt (AC 13, lighter than chain mail).\n> 15-17: 4d4 stl. Chain shirt + a vial of alchemist's fire (2d6 fire, thrown 20ft).\n> 18-19: 5d4 stl. Above + a set of thieves' tools (useful for locked doors in future scenes).\n> 20: 6d4 stl. All above + a Dragon Army officer's signet ring. Serath recognizes it: '*That is a captain's ring. This was not a routine sabotage. Someone important ordered this.*' +1 CROWN.\n>\n> **B) Leave them for the watch.** (+1 CROWN. Proper procedure. Caeron approves.)\n\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots, Lay on Hands pool, bandages, potions consumed.\n**Short rest available:** Recover Second Wind, Action Surge.\n**XP:** 10 XP per saboteur (20 total), 20 XP for infiltrator. Bonus 15 XP if grain store saved. Bonus 10 XP if infiltrator captured."}],"choices":[{"letter":"A","text":"The grain store is secure. Return to the corridors. The night is not over yet","target":"53_HUB","points":{}}]},"62E":{"id":"62E","title":"THE FIRST CAMP BOND","location":"South Road — Day 1, Night","prose":["The fire is low and the stars are out — Solinari full, Lunitari a red sliver on the horizon, and the kind of sky that only exists when you are far enough from any settlement that the darkness is real. The column has settled. Somewhere in the distance an owl is working. The sound is older than anything on this road.","You find yourself at the edge of camp with the particular restlessness that comes from being tired but not sleepy, the body done but the mind still turning over the day like a stone in water. The others are nearby. You can hear them — Aldric's quiet breathing, the scratch of Thessaly's pen, the careful sounds of Mira checking her supplies in the dark.","**IF SERA IS IN YOUR PARTY:** She materialises beside you without sound. 'You did not hear me. That is fine. Aldric did not hear me either. Caeron almost heard me, which is why I respect him.' She sits. 'The road south has fresh tracks. Two days old. Civilian, heading north fast. Whatever they were running from, it is behind us now.'","**IF VAEL IS IN YOUR PARTY:** She finds you. 'I have been thinking about what Caeron said — about the towers disappearing behind the hill. He watched them too. He did not think anyone noticed.' She looks south. 'I noticed.'"],"boxes":[{"type":"info","text":""},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Sit with Aldric. He is sharpening something that does not need sharpening","target":"63","points":{"rose":1}},{"letter":"B","text":"Find Thessaly. Her pen has stopped. She is staring at nothing","target":"63","points":{"rose":1}},{"letter":"C","text":"Walk the perimeter with Caeron. He is already walking it","target":"63","points":{"crown":1}},{"letter":"D","text":"Sleep. The road will be long tomorrow. Let the fire do the thinking","target":"63","points":{"sword":1}}]},"64B_WOLVES":{"id":"64B_WOLVES","title":"THE PACK","location":"South Road — Day 2, Pre-Dawn","prose":["You wake to the sound of horses screaming. Not the nervous whinny of animals that have smelled something wrong — the full-throated shriek of prey animals that can see the predator. You are on your feet with your weapon in hand before your brain fully registers what your body already knows: the camp is under attack.","Wolves. Not the cautious grey wolves of the northern forests that avoid campfires and armoured columns. Dire wolves — massive, gaunt, ribs showing through matted fur, eyes catching the firelight like coins. The Dragon Army's advance has pushed them north, out of their hunting grounds and into territory where the only prey large enough to sustain a pack this size is horse. Or human.","The fire is low — banked coals, not flame. The darkness beyond the fire's reach is absolute. The wolves circle at the edge of the light, and you can count them by their eyes: six pairs, twelve points of amber, moving.","**IF ALDRIC IS IN YOUR PARTY:** He is already up. Sword drawn, shield on his arm, standing between the horses and the wolves with the posture of a man who has decided that nothing is getting past him. 'Six,' he says. 'The alpha is the large one on the left. Kill the alpha and the pack breaks.'","**IF SERA IS IN YOUR PARTY:** Sera is crouched by the fire, bow strung, an arrow nocked. She has been awake — she was on watch. 'They have been circling for an hour,' she says. 'Waiting for the fire to die. I was going to feed it, but—' She nods toward the treeline. 'I wanted to see how many.'","**IF MIRA IS IN YOUR PARTY:** Mira is with the horses, calming them with hands and voice. One of the pack horses has a gash on its flank — a wolf got close enough to slash before the screaming started. 'The horse will live,' she says. 'If we live.'"],"boxes":[{"type":"combat","text":"**COMBAT MODE**\n**Pen & Paper:** Use stat blocks below. Run at your table. Skip to AFTER THE FIGHT.\n**Narrative Mode:** Follow rounds below. Roll when prompted.\n\n**ENEMIES:**\n**Dire Wolf Alpha:** AC 14, HP 30, Speed 50 ft. Bite +6 (2d6+4 piercing). Pack Tactics: advantage on attack if another wolf is within 5 ft of target. Knockdown: on hit, target makes DC 13 STR save or is knocked prone. **Retreats if reduced to half HP and 3+ pack wolves are dead.**\n**Dire Wolf (5):** AC 14, HP 16, Speed 50 ft. Bite +5 (2d6+3 piercing). Pack Tactics. Knockdown DC 12.\n\n*The pack attacks in waves: 2 wolves in Round 1, 2 more in Round 2, the alpha + 1 in Round 3. Killing the alpha before Round 3 causes remaining wolves to flee.*\n\n**YOUR STATS:** Fighter: HP per sheet, AC per sheet, weapon per sheet. Paladin: same.\n\n**COMPANION ACTIONS (choose 1 per round):**\n| Companion | Action A | Action B | Action C |\n|-----------|----------|----------|----------|\n| Aldric | Flank (+1 attack) | Shield Wall (+1 AC) | Guard the horses (wolves cannot reach mounts) |\n| Sera | Aimed Shot (1d8+3 at any wolf) | Mark Alpha (+2 to your attacks vs alpha) | Fire Arrow (lights camp perimeter, wolves -1 attack from light) |\n| Mira | Heal (1d6+2, 1/scene) | Calm horses (prevents stampede) | Throw burning brand (1d4 fire + wolf must save DC 11 WIS or flee) |\n| Lysander | Veteran Strike (1d10+3) | Guard flank (wolves cannot flank you) | Hunt the Alpha (Lysander engages alpha directly: 1d10+3 to alpha, takes 1d6) |\n**ROUND 1 — FROM THE DARK**\n\n*Two wolves break from the circle. They do not snarl, do not warn. They come from the dark like arrows — low, fast, silent until the moment of impact. One goes for the horses. One goes for you.*\n\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll (+5 or per sheet) | DC 14 (Wolf AC)\n\n**HIT:** Your blade catches the wolf mid-lunge. Deal weapon damage. The wolf yelps — a sound that is worse than a snarl because it is the sound of a predator discovering it is prey.\n\n**MISS:** The wolf is faster than you expected. It slides past your blade.\n\n**WOLF'S BITE:**\n**ROLL REQUIRED:** Defense roll | DC 15 (Wolf bite +5)\n\n**SUCCESS:** You turn the wolf's jaws on your blade or shield.\n\n**FAILURE:** Take 2d6+3 piercing. The bite is not a slash — it is a clamp, and the wolf shakes. STR save DC 12 or be knocked prone. If prone, the second wolf attacks with advantage next round.\n**ROUND 2 — THE PACK COMMITS**\n\n*Two more wolves from the tree line. The circle has broken — the pack is committed now, all of them moving, the fire barely enough to keep the darkness from swallowing everything. You can hear them breathing. You can smell them — wet fur, blood, the musk of animals that have not eaten in days.*\n\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll (+5 or per sheet) | DC 14\n\n**(Paladin) OPTIONAL — DIVINE SMITE:** On hit, +2d8 radiant damage. The light pushes the shadows back. Wolves within 10 ft must make WIS save DC 12 or disengage for 1 round.\n\n**(Fighter) OPTIONAL — ACTION SURGE:** Two attacks this round. The wolf pack does not expect this.\n\n**WOLF ATTACKS (x2 if both still standing):**\n**ROLL REQUIRED:** Defense roll | DC 15 (first wolf)\n**ROLL REQUIRED:** Defense roll | DC 15 (second wolf, if alive)\nEach hit: 2d6+3 piercing + knockdown save.\n\n**OPTIONAL — ANIMAL HANDLING (replaces attack):**\n**ROLL REQUIRED:** Animal Handling (+1) | WIS | DC 15\n**SUCCESS:** You lock eyes with a wolf and something passes between you — not dominance, but understanding. The wolf breaks from the pack and does not return. One fewer enemy. +1 ROSE.\n**FAILURE:** Wolves do not negotiate.\n**ROUND 3 — THE ALPHA**\n\n*The alpha comes last. It is the largest wolf you have ever seen — shoulder height with a warhorse foal, scarred across the muzzle, one ear torn. It has survived everything the wild has thrown at it and it is not afraid of fire or steel or you. It steps into the firelight and its eyes find yours and the challenge is absolute.*\n\n*If the alpha has been killed early (Lysander's Hunt or a lucky hit), the remaining wolves scatter into the dark. The fight is over. Skip to AFTER THE FIGHT.*\n\n**YOUR ATTACK (vs Alpha):**\n**ROLL REQUIRED:** Attack roll (+5 or per sheet) | DC 14 (Alpha AC)\n\n**HIT:** Deal weapon damage. The alpha staggers but does not fall — it takes more than one hit to drop this animal.\n\n**ALPHA'S BITE:**\n**ROLL REQUIRED:** Defense roll | DC 16 (Alpha bite +6)\n\n**SUCCESS:** You turn the alpha's jaws. It circles, recalculates.\n\n**FAILURE:** Take 2d6+4 piercing. STR save DC 13 or knocked prone. The alpha goes for the throat when you are down.\n\n**IF ALPHA REACHES HALF HP (15 or less) AND 3+ WOLVES ARE DEAD:**\nThe alpha howls — long, low, the sound of a predator making a cost-benefit analysis. The remaining wolves break and scatter. The alpha backs into the darkness, watching you, and then it is gone.\n\n**IF ALPHA IS KILLED:**\nThe pack scatters instantly. The darkness reclaims them. The fire crackles. The horses stop screaming. The silence that follows is the loudest thing you have ever heard.\nVictory: The alpha retreats into the dark, dragging its wounded leg. The pack scatters. Camp is safe.\nFallen (0 HP): Your companions drive the wolves off while you bleed into the grass. 1 HP, one exhaustion.\n**AFTER THE FIGHT**\n\nDawn comes grey and cold. The wolf bodies are at the edge of the firelight — gaunt, scarred, driven to desperation by an army that does not care what it displaces. There is no glory in this fight. There is survival, and there is the understanding that the Dragon Army's destruction extends beyond the people it targets.\n\n**IF SERA IS IN YOUR PARTY:** She examines the alpha's tracks. 'They came from the south-east. Driven out of the Lemish border forests.' She pauses. 'The Dragon Army is burning the forests to deny cover. The wolves had nowhere left to go.' She says it without judgment, but her hand is on her bow and her face is the face of a ranger who has just watched the wild die a little more.\n\n**IF MIRA IS IN YOUR PARTY:** The pack horse's gash needs stitching. Mira works on it as the sun rises, her hands steady, her voice low. 'Everything is fleeing north,' she says. 'The animals. The refugees. The farmers. We are all running from the same thing. The difference is we are running toward it.'\n\n**LOOT — WOLF PELTS (optional):**\nDire wolf pelts are valuable — thick, warm, large enough to serve as blankets or trade goods.\n**A) Skin the wolves.** (No moral penalty — they attacked you.) Gain: 1d4 dire wolf pelts (worth 2 stl each). Alpha pelt (worth 5 stl, or can be worn as a cloak: advantage on Intimidation vs beasts).\n**B) Leave them.** The road is not a place for skinning.\n\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots, Lay on Hands pool, bandages, potions consumed.\n**Short rest available** after breaking camp: Recover Second Wind, Action Surge.\n**XP:** 10 XP per wolf, 20 XP for alpha. Max 70 XP if all killed."}],"choices":[{"letter":"A","text":"Break camp. The road continues. The wolves were just the prelude","target":"64C","points":{}}]},"64D":{"id":"64D","title":"MAKING CAMP","location":"South Road — Day 2, Evening","prose":["The light fails faster this far south — the treeline cuts the horizon higher and the autumn sun drops behind it like a stone into water. Caeron calls the halt at a clearing that has been used before: fire-blackened stones in a ring, a water source thirty yards east, and the particular flatness of ground that has been slept on by enough people to lose its original character.","Making camp is ritual now. You know your role without being told — fire duty, perimeter stones, the particular arrangement of gear that means sleep is available within arm's reach of everything you might need in a hurry. Aldric handles the horses. Mira, if present, claims the flattest ground for the medical kit without discussion. The efficiency of it steadies something.","The smoke on the southern horizon is closer. Not dramatically — a mile, maybe two. But the quality has changed. Yesterday it was distant and theoretical. Tonight it is a fact you can smell on the wind when it shifts.","**IF THESSALY IS IN YOUR PARTY:** She has her map out, marking the refugees' direction and the smoke's position with the methodical precision of someone building a record they expect to need.","**IF SERATH IS IN YOUR PARTY:** They are watching the smoke with the flat attention of someone who has seen what makes it. They do not share what they are thinking. The way they check their blade says enough."],"boxes":[{"type":"info","text":"**RATIONS — EVENING MEAL (Day 2)**\nGarrison supplies are gone. You eat from your own pack tonight.\n**Consume 1 ration.** Mark it off your character sheet.\n\n**IF YOU HAVE NO RATIONS:**\nYou sit by the fire with an empty stomach and try not to look at other people eating.\n\n**IF ALDRIC IS IN YOUR PARTY:** He notices before you say anything. He always notices. He breaks his bread in half and puts the larger piece on your knee without looking at you. 'Eat it before I change my mind.' A pause. 'You know, for someone who passed the garrison supply room every day, you are remarkably bad at planning.' He means: *I am worried about you and this is the only way I know how to say it.* **Aldric covers your meal. No ration consumed. Aldric cannot cover for you again.**\n\n**IF MIRA IS IN YOUR PARTY (and Aldric is not, or Aldric already covered):** She produces a wrapped bundle — herbs, dried fruit, a flatbread she baked at Brightholm and has been carrying since. 'I made extra. I always make extra.' She looks at you with the quiet expectation of someone who heals people for a living and considers hunger a wound. 'Next time, pack properly. I am a healer, not a quartermaster.' **Mira covers your meal. No ration consumed. Mira cannot cover for you again.**\n\n**IF SERA IS IN YOUR PARTY (and no one above can cover):** Sera drops a strip of dried venison in your lap without breaking stride. 'Found it on a scout. Do not ask which scout.' She is already walking away. Then, over her shoulder: 'That is the only time, Squire. Learn to count your supplies or learn to go hungry. I will not save you from arithmetic.' **Sera covers your meal. No ration consumed. Sera cannot cover for you again.**\n\n**IF NO COMPANION CAN COVER:** You go hungry. Apply hunger penalty (see Combat Reference). The fire smells like other people's food.\n\n*Record your current ration count on your character sheet.*"},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Help Aldric with the horses. The work is quiet and good","target":"65","points":{"sword":1}},{"letter":"B","text":"Sit with the fire. Let the day settle","target":"65","points":{"rose":1}},{"letter":"C","text":"Ask Caeron about tomorrow's route. He has been studying the map","target":"65","points":{"crown":1}}]},"64E":{"id":"64E","title":"THE BURNED FARMSTEAD","location":"South Road — Between the Refugees and Camp, Late Afternoon","prose":["You smell it before you see it. Not the distant, theoretical smoke of the southern horizon — this is close, recent, the thick black smoke of things that should not be burning. Wood. Thatch. Something organic that you do not want to identify.","The farmstead is two hundred yards off the road, set back against a tree line. The barn is fully ablaze. The farmhouse roof is burning from the east end — the fire was set there first and is working its way west. A Dragon Army patrol is in the yard: three soldiers and something else, something taller, with scales that catch the firelight. An officer. The Bozak stands apart from the soldiers, watching the burn with the detached attention of a thing that is checking a task off a list.","From inside the barn: screaming. A woman's voice. A man's voice, lower, shouting something you cannot hear over the fire.","Caeron pulls the column to a halt. He looks at the farmstead. He looks at you. 'Squire,' he says. And the word means: *you decide. This is what the Measure is for.*"],"boxes":[{"type":"loot","text":"**SEARCH THE FALLEN (Optional — moral choice):**\nThe soldiers are dead. The Bozak is bone fragments. The officer's satchel survived the explosion.\n\n**Bozak officer's satchel:** No moral penalty — enemy intelligence. Contains: patrol routes, supply line maps, a letter in Draconic that Caeron will want to read. +1d6 stl.\n\n**Soldier bodies:**\n**A) Search them.** (-1 ROSE. Loot Roll below.)\n**B) Leave them. You have done enough.** (+1 ROSE. No loot.)"},{"type":"loot","text":"**LOOT ROLL (if searched):** Roll 1d20.\n1–5: Nothing. Dragon Army soldiers carry nothing personal. They were not allowed to.\n6–10: 1d4 stl. Standard issue pay. 1 day rations (Dragon Army field pack).\n11–14: 2d4 stl + mundane item (2 days rations, a signal whistle, a bedroll).\n15–17: 3d4 stl + Potion of Healing (standard issue, one per squad). 2 days rations.\n18–19: 4d4 stl + quality item (an officer's compass, worth 5 stl to the right buyer). 3 days rations.\n20: 5d4 stl + RARE ITEM ROLL. 3 days rations."},{"type":"loot","text":"**FARMSTEAD CELLAR:** Investigation DC 13. (No moral penalty — searching for survivors/supplies.)\n**SUCCESS:** Stash Loot Roll:\n1–5: Empty. The family had nothing worth hiding.\n6–10: Preserved food, 1d4 stl in a clay jar.\n11–14: 2d6 stl + Potion of Healing (Hanna's grandmother's recipe, same as Vogler).\n15–17: 3d6 stl + quality item (a family sword, longsword, well-maintained).\n18–19: 4d6 stl + a hidden strongbox (the family's life savings — taking this is not theft if you ask, but refusing it is +1 ROSE).\n20: 5d6 stl + RARE ITEM ROLL."},{"type":"combat","text":"**COMBAT MODE**\n**Pen & Paper:** Use stat blocks below. Run the encounter at your table, then skip to Victory: The Bozak detonates in death — bone fragments scatter across the farmyard. The soldiers are down. The farm is yours.\nFallen (0 HP): Your companions hold the farmyard. You wake to Mira working on your wounds. 1 HP, one exhaustion.\n**AFTER THE FIGHT**.\n**Narrative Mode:** Follow the rounds below. Roll when prompted.\n**INJURED NPCs — FARMER HANNA AND DARRIC**\n**Hanna** (inside barn): Severe burns on arms and chest. Needs magic healing or she dies. Paladin Cure Wounds (1 spell slot), Paladin Lay on Hands (10+ HP from pool), Greater Potion of Healing, or Mira + herbs (stabilize + 1d6+2, but burns need magic to fully heal). Bandages alone are not enough — they stabilize but Hanna will lose the use of her hands.\n**Darric** (inside barn): Dislocated shoulder, smoke inhalation. Medicine DC 14 + bandage, or Mira (automatic), or any healing spell/potion. Less critical but in pain.\n*Record any resources spent.*\n**If both healed:** Hanna and Darric appear in Vogler. Hanna's hands work. Darric volunteers for the defence. +2 ROSE.\n**If only Darric healed:** They reach Vogler but Hanna cannot work. Darric is bitter but grateful. +1 ROSE.\n**If neither healed:** They do not make it to Vogler. The road takes them.\n**COMPANION SELECTION**\nFull party is available. Caeron calls the intervention — this is not optional.\n**Aldric** — Takes the Bozak head-on. Brave or foolish. Both.\n**Mira** — Essential for the civilians. She will run for the barn the moment it is safe.\n**Sera** — Ranged fire. Picks off soldiers from the treeline.\n**Serath** — Knows Dragon Army patrol timing. 'We have ten minutes before the next squad.'\n**Lysander** — Veteran assault. He has done this before. His face says he wishes he had not.\n**Thessaly** — Documents. Witnesses. Her pen is shaking but it is moving.\n**Vael** — Warns about the Bozak's spellcasting. 'It has Burning Hands and Lightning Bolt. Do not cluster.'\n\nChoose up to 3 companions for combat. The rest assist with the barn rescue.\n**ENEMY STAT BLOCKS (Pen & Paper)**\n**Human Soldier (3):** AC 14 (chain shirt + shield), HP 16, Speed 30ft. Longsword +5 (1d8+3). Javelin +5 (1d6+3, 30/120). Formation: +1 AC when adjacent to another soldier.\n**Bozak Draconian (1):** AC 15 (natural + studded leather), HP 30, Speed 30ft. Greatsword +5 (2d6+3). Burning Hands (3d6 fire, 15ft cone, DC 12 DEX half, 1/encounter). Lightning Bolt (2d10 lightning, 30ft line, DC 13 DEX half, 1/encounter). Death Throes: bones explode — 1d6 thunder damage in 10ft radius, DC 13 DEX to avoid.\nNARRATIVE COMBAT — ROUND 1\nThe soldiers see you coming. Two of them form up — shields locked, longswords ready, the mechanical discipline of men who do this for pay. The third is still at the barn door, making sure the fire does its work. The Bozak turns its head slowly, as if the interruption is a minor inconvenience. It draws a greatsword with one hand — a gesture that should require two and does not.\nThe barn screams are louder now. The fire is winning.\n**YOUR ATTACK — Choose a target:**\n**Soldier (left)** / **Soldier (right)** / **Soldier at barn door** / **Bozak officer**\n\n**ROLL REQUIRED:** Attack roll | DC = target's AC (Soldiers: 14, Bozak: 15)\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage.\n\n**IF VAEL IS PRESENT:** 'The Bozak will cast first. Spread out.' You know to expect Burning Hands.\n**COMPANION ACTION — Choose one for each companion:**\n**Aldric:** A) Flank (+1 next attack) | B) Shield Wall (+1 AC) | C) Charge the Bozak — Aggressive Strike (1d8+2, takes 1d4, draws Bozak attention)\n**Sera:** A) Scout Shot — targets soldier at barn door (1d6 dmg) | B) Mark Bozak (+2 next attack vs Bozak) | C) Cover Fire (+1 AC)\n**Mira:** A) Rush to barn — begins rescue (needs barn door cleared first) | B) Herbal Boost (+1 save vs fire) | C) Bandage (stabilize nearest wounded)\n**Serath:** A) Intel (+2 one attack) | B) Circle behind — Dagger Strike on barn-door soldier (1d4+2) | C) Feint Bozak (Bozak -1 next attack)\n**Lysander:** A) Combat Instruction (+2 attack) | B) Veteran Strike — engages nearest soldier (1d10+3) | C) Guard — positions to take Bozak's first spell\n**Thessaly:** A) Encourage (+1 next roll) | B) Document (+1 ROSE after) | C) Distraction — calls to soldiers in Common: 'Solamnic column! Surrender!' (one soldier hesitates, skips attack)\n**Vael:** A) Flanking Shot (1d6 dmg) | B) Honest Assessment (reveal Bozak HP) | C) Warning Shot — forces Bozak to use Burning Hands defensively (halves cone area)\n**ABILITY / ITEM USE (choose one, optional):**\n• (Paladin) Cast Bless: +1d4 to attacks and saves for up to 3 targets, Concentration, lasts entire combat. 1 spell slot.\n• (Paladin) Divine Smite: Bonus action after hitting with a melee weapon. 2d8 radiant (+1d8 vs Fiends/Undead). Once per turn. 1 spell slot (or free 1/long rest at level 2+).\n• (Paladin) Lay on Hands: Heal self or ally. Bonus action.\n• (Paladin) Cure Wounds: 2d8+CHA heal. 1 spell slot. Replaces attack.\n• (Fighter) Action Surge: Additional Action this round (except Magic). 1/short or long rest.\n• (Fighter) Second Wind: 1d10+[level] HP. Bonus action. 2 uses/long rest, regain 1/short rest.\n• (Any) Drink Potion of Healing: 2d4+2 HP. Bonus action.\nENEMY STRIKE — ROUND 1\nThe Bozak opens with fire. Its hand comes up, palm forward, and the air between you ignites — not flame exactly, but a cone of superheated air that smells of sulfur and hate.\n**BURNING HANDS — DEX save DC 12:**\n**SUCCESS:** Half damage. You roll clear.\n**FAILURE:** 3d6 fire damage. The heat is extraordinary. Your tabard smoulders.\n**IF VAEL WARNED YOU:** Advantage on the save (roll twice, take higher).\n**IF LYSANDER CHOSE GUARD:** Lysander steps in front. He takes the damage instead. His face does not change. His armour steams.\n\n**Soldier attack:** Roll 1d20 + DEX modifier | DC 14\n**FAILURE:** 1d8+3 slashing damage.\nNARRATIVE COMBAT — ROUND 2\nThe barn-door soldier is the key. As long as he is there, Mira cannot reach the barn. Hanna's screams are getting weaker, which is worse than them being loud.\nThe Bozak is reloading — the Burning Hands cost it something, you can see it in the way the scales along its arm are darkened. It reaches for the greatsword. The spell was its opening gambit. Now comes the steel.\n**ATHLETICS CHECK (optional, replaces attack):** Roll 1d20 + STR modifier | DC 14\nBreak the barn door open. If the barn-door soldier is dead or engaged, this succeeds automatically.\n**SUCCESS:** The door breaks. Smoke pours out. Mira can enter (or you can).\n**FAILURE:** The door holds. The hinges are warped by heat. One more round.\n**YOUR ATTACK:** (if not breaking the door)\n**ROLL REQUIRED:** Attack roll | DC = target's AC\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage.\n**COMPANION ACTION — Choose one for each companion:** (same options)\n**ABILITY / ITEM USE (choose one, optional):** (same options)\nENEMY STRIKE — ROUND 2\nThe Bozak engages in melee. The greatsword comes in a wide arc — too wide for indoors, perfect for the open yard. It has reach and strength and the particular arrogance of something that considers you a minor obstacle.\n**DEFENSE ROLL (Bozak greatsword):** Roll 1d20 + DEX modifier | DC 15\n**SUCCESS:** You duck the arc. The sword bites dirt.\n**FAILURE:** 2d6+3 slashing damage. The greatsword is not subtle. It does not need to be.\n\n**INVESTIGATION CHECK (free, if barn is open):** Roll 1d20 + INT modifier | DC 13\n**SUCCESS:** Water source — a trough by the fence. Dump it on Hanna's burns. Stabilizes her without magic.\n**FAILURE:** You do not see it. Magic healing or Mira's herbs are the only options.\nNARRATIVE COMBAT — ROUND 3\n**IF SERATH IS NOT PRESENT:** A horn sounds from the south road. Another Dragon Army patrol has heard the fighting. They will arrive in 3 rounds. End this fast.\n**IF SERATH IS PRESENT:** 'We have time. The next patrol is south of the ridge. We are clear.' No reinforcements.\nThe Bozak is wounded but fighting. It is the last significant threat — the soldiers are dead, fleeing, or pinned. The farmyard smells of smoke and blood and the chemical stink of draconian. Behind you, the barn fire is being fought by whoever you sent — Mira with wet blankets, or your own hands, or nobody at all.\n**SURVIVAL CHECK (optional):** Roll 1d20 + WIS modifier | DC 12\nTrack the patrol's approach. If Serath is not present, success gives you 1 extra round before reinforcements.\n**IF SERATH IS PRESENT:** Automatic success. No need to roll.\n**YOUR ATTACK — Finish the Bozak.**\n**ROLL REQUIRED:** Attack roll | DC 15\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage.\n**BOZAK DEATH THROES:** If the Bozak drops to 0 HP, its bones EXPLODE. 1d6 thunder damage, 10ft radius. **DEX save DC 13** or take full damage. *You were warned. Move.*\n**COMPANION ACTION — Choose one for each companion:** (same options)\n**ABILITY / ITEM USE (choose one, optional):** (same options)\nENEMY STRIKE — ROUND 3\nThe Bozak knows it is losing. It channels the last of its energy — Lightning Bolt, a 30ft line of blue-white electricity that cracks the air and leaves the taste of copper in your mouth.\n**LIGHTNING BOLT — DEX save DC 13:**\n**SUCCESS:** Half damage. You throw yourself sideways.\n**FAILURE:** 2d10 lightning damage. The world goes white. Your muscles lock. The pain is immediate and total.\n**IF VAEL IS PRESENT:** Advantage on the save. You knew it was coming.\nAFTER THE FIGHT\nThe Bozak's bones detonate and the sound is like a thunderclap in a bottle — sharp, contained, final. The soldiers are dead or fled. The farmyard is quiet except for the fire, which is dying now, and the sound of someone crying inside the barn.\nHanna is burned badly. Her arms, her chest. She was shielding Darric and the fire found her. Darric has a dislocated shoulder and the cough of a man who breathed too much smoke. They are alive. Whether they stay that way depends on what you do in the next five minutes.\n**MEDICINE CHECK — DARRIC:** Roll 1d20 + WIS modifier | DC 14\nReset the shoulder, treat smoke inhalation.\n**SUCCESS:** Darric stabilizes. He can walk. He is in pain but functional.\n**FAILURE:** The shoulder is worse than it looked. Mira (if present) can still treat him. Without Mira, he needs a sling and time.\n**HEALING HANNA — REQUIRES MAGIC OR MIRA:**\n• Paladin Cure Wounds (1 spell slot): Heals burns. Hanna's hands will work.\n• Paladin Lay on Hands (10+ HP): Same result.\n• Mira (if present) + herbs: Stabilizes. Burns heal slowly — Hanna's hands work but with scars.\n• Greater Potion of Healing: Full recovery.\n• Potion of Healing: Partial — stabilizes but burns remain serious.\n• Bandage only: Stabilizes at 1 HP. Hanna lives but her hands may not fully recover.\n*Record resources spent.*\n\n**SEARCH THE FALLEN (Optional — moral choice):**\nThe soldiers are dead. The Bozak is bone fragments. The officer's satchel survived the explosion.\n\n**Bozak officer's satchel:** No moral penalty — enemy intelligence. Contains: patrol routes, supply line maps, a letter in Draconic that Caeron will want to read. +1d6 stl.\n\n**Soldier bodies:**\n**A) Search them.** (-1 ROSE. Loot Roll below.)\n**B) Leave them. You have done enough.** (+1 ROSE. No loot.)\n\n**LOOT ROLL (if searched):** Roll 1d20.\n1–5: Nothing. Dragon Army soldiers carry nothing personal. They were not allowed to.\n6–10: 1d4 stl. Standard issue pay. 1 day rations (Dragon Army field pack).\n11–14: 2d4 stl + mundane item (2 days rations, a signal whistle, a bedroll).\n15–17: 3d4 stl + Potion of Healing (standard issue, one per squad). 2 days rations.\n18–19: 4d4 stl + quality item (an officer's compass, worth 5 stl to the right buyer). 3 days rations.\n20: 5d4 stl + RARE ITEM ROLL. 3 days rations.\n**RARE ITEM ROLL:** Roll 1d20.\n1–19: Quality mundane item (Dragon Army chain mail, AC 16, good condition but unmarked).\n20: MAGIC ITEM — +1 Longsword. Solamnic make. Taken from a fallen knight. The Bozak was carrying it as a trophy. Returning it to a Solamnic armoury grants +2 CROWN. Keeping it is not dishonourable — it was earned.\n\n**FARMSTEAD CELLAR:** Investigation DC 13. (No moral penalty — searching for survivors/supplies.)\n**SUCCESS:** Stash Loot Roll:\n1–5: Empty. The family had nothing worth hiding.\n6–10: Preserved food, 1d4 stl in a clay jar.\n11–14: 2d6 stl + Potion of Healing (Hanna's grandmother's recipe, same as Vogler).\n15–17: 3d6 stl + quality item (a family sword, longsword, well-maintained).\n18–19: 4d6 stl + a hidden strongbox (the family's life savings — taking this is not theft if you ask, but refusing it is +1 ROSE).\n20: 5d6 stl + RARE ITEM ROLL.\n**NPC GRATITUDE — HANNA AND DARRIC** (if healed)\nDarric cannot speak for a while. When he does, it is one sentence: 'You came.' Hanna holds her bandaged hands against her chest and looks at you with the expression of a woman who is recalculating everything she thought she knew about Solamnic knights.\n\n**ROLL:** Persuasion (+[bonus]) | CHA | DC 10\n\n**10–12 (Modest):** 1d4 stl. 'Take it. Please. It is the least—' Hanna cannot finish the sentence.\n**13–15 (Grateful):** 2d4 stl and Hanna's dagger — small, plain, sharp as a razor. 'It was my mother's. Use it better than I can now.' (+1 to one attack, single use, as a lucky charm.)\n**16–18 (Deeply Grateful):** 3d4 stl, the dagger, and Darric's promise: he volunteers for Vogler's defence. +1 to Vogler defence checks.\n**19+ (Indebted):** 4d4 stl, the dagger, Darric's service, and Hanna's recipe book (trade goods worth 10 stl in Vogler, or keep for +1 to Medicine checks — Hanna's grandmother knew things).\n**FAILURE (1–9):** They have nothing. They lost everything. Hanna holds your hand with her bandaged fingers and does not let go. +1 ROSE. *If both survived, the reward improves by one tier.*\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Mark any used: Second Wind, Action Surge, spell slots,\nLay on Hands pool, bandages, potions consumed.\nUpdate gold if loot was found. Record any items gained.\nNote if Hanna and/or Darric were saved (affects Vogler).\n**Short rest available:** Recover Action Surge, regain 1 Second Wind use. HP: spend Hit Dice.\n**XP:** 15 XP per soldier (45 total). 30 XP for the Bozak. Bonus 15 XP if Hanna healed. Bonus 10 XP if Darric healed. Bonus 10 XP if barn door broken Round 2."}],"choices":[{"letter":"A","text":"The farmstead is ashes. The family is alive. You ride on toward camp. The smoke on the horizon is not theoretical anymore","target":"64D","points":{}}]},"68D":{"id":"68D","title":"THE STARS OVER THE ROAD","location":"Forest Road — Night, Day 3","prose":["You cannot sleep. The river is behind you and the road ahead narrows through old-growth forest — the trees here are centuries old, their canopy so thick that the starlight comes through in points, like holes in a dark ceiling. You walk away from camp because the sounds of people trying to sleep have become worse than being alone.","The clearing is small — a break in the canopy where a tree fell years ago and the sky opened up. Both moons are visible: Solinari full and white, Lunitari a red sickle at its edge. The astronomical term is conjunction. The common term is omen, which is not the same thing but feels closer tonight.","You lie on the fallen trunk and look up. The constellations are the same ones you memorised at Brightholm in the chapel library — Paladine's constellation bright in the northern sky, the Queen's dark space where no stars burn. Aldous taught you the navigation ones. You remember the lesson better than you expected: 'Learn the sky,' he said. 'It is the one map no one can take from you.'","**IF MIRA IS IN YOUR PARTY:** She finds the clearing too. She does not speak. She lies on the grass beside the fallen trunk and looks up. After a while: 'My mother knew all the star names. The old ones, from before the Cataclysm. She said they were the same stars but the names had changed because the people naming them had.' A long pause. 'I think that is true of most things.'","**IF ALDRIC IS NEARBY:** He is at the edge of the clearing. He saw you leave camp and followed — not to talk, but to make sure you were not alone in the dark. He leans against a tree and watches the sky and says nothing, which is the best thing he could do."],"boxes":[{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Count the stars in Paladine's constellation. Seven. You have counted them before. The number has not changed. Something about that steadies you","target":"68","points":{"rose":1}},{"letter":"B","text":"Close your eyes. The sky will be there tomorrow. Sleep will not wait","target":"68","points":{"sword":1}},{"letter":"C","text":"Stay until Solinari sets. The dark after moonset is total. You walk back to camp by memory","target":"68","points":{"rose":1,"crown":1}}]},"69_KNIGHT":{"id":"69_KNIGHT","title":"THE LAST KNIGHT OF THE WHITE SPAN","location":"South Road — Day 3, Afternoon","prose":["The rider is old. That is the first thing — the particular old of a man who has been old for a long time and has been fighting against it and is now, finally, not fighting against it anymore. He sits his warhorse with the posture of a man whose body remembers perfection even though perfection left it a decade ago. The horse is old too — a grey destrier, scarred across the flanks, its mane cropped short in the Solamnic military style that nobody has used in twenty years.","His armour is Solamnic half-plate. Old. The rose insignia on the breastplate is worn to a ghost, the steel patched and repatched, the plates dented in places that speak of fights survived rather than fights won. And across his back: a greatsword in a harness that does not match the rest of his equipment. The scabbard is new. The sword is not — it is very, very old, and even from this distance you can feel something about it. A hum. A weight. The particular quality of a weapon that is more than steel.","He blocks the road. Not aggressively — he simply stops his horse and waits.","Caeron signals the column to halt. His hand goes to his hilt. The rider raises one gauntleted hand — not a threat. A greeting. The salute of the Order of the Rose, executed perfectly, from a man who learned it in an era when the salute still meant something universal.","'I am Ser Hadrian of the White Span,' he says. His voice is a ruin. A beautiful ruin — deep, resonant, cracked in places where time and weather have done their work. 'Knight of the Rose. Forty-three years of service. I was at Thelgaard when the garrison fell. I was at the Vingaard bridge when they tried to take the crossing. I have been riding south alone for six months because there was no one left to ride with.'","He looks at your column. He counts. His expression does not change.","'I have a request,' he says. 'Not for your commander. For the youngest among you.' His eyes find yours. 'For the squire.'","**IF CAERON IS WITH THE COLUMN:** Caeron's hand tightens on his hilt. He knows what this is. His expression says: *This is not your fight. You do not have to do this.* But he does not say it. Because Ser Hadrian has forty-three years of Rose authority and the request, by the Measure, is his to make.","Ser Hadrian dismounts. It costs him — you can see the pain in his knees, the careful way he transfers his weight, the veteran's trick of making the dismount look deliberate when it is actually the body's last negotiation with gravity. He draws the sword.","The hum intensifies. The blade catches the afternoon light and the light *bends* — not refraction, something else, something that lives in the steel and has been living there for longer than anyone in your column has been alive. The sword is ancient. The sword is beautiful. The sword is *awake*.","'*Dawnstrike*,' he says, holding it before him. 'Given to the first Knight of the White Span by a cleric of Paladine in the year 118 AC. It has been carried by my family for nine generations. It is the only thing I have left that matters.'","He plants the blade point-down in the road.","'I am sixty-seven years old,' he says. 'My hands shake in the morning. My left knee has not bent properly since Vingaard. I have ridden six months alone and I have watched everything I served fall to dust and I am tired in the way that no rest will fix. The Dragon Army took my garrison, my soldiers, my friends, and every institution I believed in. They did not take my sword and they did not take my honour and I would like to spend both before they take me.'","He meets your eyes.","'I am asking for a duel,' he says. 'Not to the death. To the yield. One knight against one squire, by the old forms. If you win—' he touches the sword, the armour — 'everything I carry is yours. If I win, I ride south, and I keep riding until I find the Dragon Army, and I make them earn what they have already taken.'","He pauses.","'You may refuse,' he says. 'There is no dishonour in it. But I would ask you not to. I have been riding alone for a very long time, and I would like my last fight to be against someone who wears the sun.'"],"boxes":[{"type":"info","text":"\n**B) Refuse. 'I will not fight you, ser. Ride with us instead. Vogler needs every sword.'** (+2 ROSE, +1 CROWN)\nSer Hadrian is quiet for a long time. Then he sheathes Dawnstrike. 'You are kind,' he says. 'That is not what I asked for. But I recognise it.' He does not ride with you. He salutes — the Rose salute, perfect, the last time he will give it — and turns his horse south. You watch him ride toward the smoke. He does not look back.\n**IF ALDRIC IS IN YOUR PARTY:** Aldric watches him go. His jaw works. 'He wanted to choose how it ended,' he says quietly. 'You took that from him.' It is not a criticism. It is a fact. Facts, with Aldric, are the hardest things.\n--> Return to Scene 69_ROAD choices."},{"type":"info","text":"**THE DUEL — SER HADRIAN OF THE WHITE SPAN**\n\nThe column forms a circle. This is the old form — Solamnic tradition, older than the current Order, older than the Cataclysm. A ring of witnesses. Two swords. The sun overhead. Caeron dismounts and stands at the edge, arms folded, expression unreadable.\n\nSer Hadrian takes Dawnstrike from the road. The sword hums in his hands and for a moment — just a moment — the old man is not old. The posture straightens. The eyes sharpen. The forty-three years of service flow into his grip and his stance and the particular way he holds the blade, and you understand: he was magnificent once. He intends to be magnificent one more time.\n\n**Your companions step back. This is a duel. They do not intervene. They watch.**\n\n**COMBAT — DUEL (3 rounds, no companion actions)**\n\n**YOUR STATS:** Per character sheet. Your weapon. Your armour.\n\n**SER HADRIAN:**\nHP 20 (old, fragile — the body has nothing left to give)\nAC 15 (Solamnic half-plate)\n*Dawnstrike* +7, 2d6+5 slashing + 1d6 radiant (Hadrian burns both Radiant Strikes in this duel — the sword's magic compensates for his failing strength)\n**Veteran's Instinct:** Once per duel, Hadrian can force you to reroll a successful attack. 'Not yet. Again.'\n**Failing Body:** Each round after Round 1, Hadrian makes a CON save (DC 12, then 14, then 16). On failure, his AC drops by 1 as his stance weakens. His attacks do not weaken — the sword carries what the body cannot.\n**Yield:** Hadrian yields at 0 HP. He does not die. This is a duel to the yield, not to the death."},{"type":"roll","text":"**ROUND 1 — THE OLD FORM**\n\n*He comes at you with the first combination of the old Solamnic forms — the ones from the textbooks, the ones that haven't been taught in two decades because the masters who taught them are dead. The blade leads with a diagonal cut that turns into a thrust that turns into a bind that you have never seen executed at speed before. Dawnstrike leaves a trail of pale gold light in the air.*\n\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll (per sheet) | DC 15 (Hadrian's AC)\n\n**HIT:** Your blade finds the gap between plates. Hadrian grunts — pain, real pain, and something else. Satisfaction. 'Good steel,' he says. 'Good arm.' Deal weapon damage.\n\n**MISS:** He turns your blade with a parry that looks effortless. It is not. You can see the strain in his wrist. But the parry is perfect.\n\n**HADRIAN'S STRIKE:**\n**ROLL REQUIRED:** Defense roll | DC 17 (Dawnstrike +7)\n\n**SUCCESS:** You catch Dawnstrike on your blade. The impact travels through your arms and into your shoulders and you understand what a magical weapon feels like when it is trying to get through your guard: it feels like being hit by something that wants to hit you.\n\n**FAILURE:** Dawnstrike connects. Take 1d8+5 slashing + 1d6 radiant damage. The radiant burns cold — not fire, light, the pure white light of a Paladine-blessed blade that does not distinguish between evil and merely in-the-way.\n\n**HADRIAN'S CON SAVE:** DC 12. (DM rolls or player rolls for Hadrian.)\n**FAILURE:** His stance wavers. AC drops to 14. He grits his teeth. He does not comment.\n**SUCCESS:** He holds. The old body has one more round of perfection."},{"type":"roll","text":"**ROUND 2 — THE KNIGHT HE WAS**\n\n*He is faster than he should be. The sword is carrying him — you can see it, the way Dawnstrike pulls his arm into positions his muscles can no longer hold on their own. The blade is fighting through him and he is letting it. Forty-three years of service distilled into a weapon that remembers every one of them.*\n\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll (per sheet) | DC 15 (or lower if AC has dropped)\n\n**HIT:** Deal weapon damage. Hadrian staggers. His knee — the left one, the one that does not bend — buckles. He catches himself. He raises the blade. He is not done.\n\n**IF HADRIAN USES VETERAN'S INSTINCT (once per duel):**\n'Not yet,' he says. 'Again.' You must reroll a successful attack. Take the new result. The old knight is not ready to fall.\n\n**MISS:** His guard holds.\n\n**HADRIAN'S STRIKE:**\n**ROLL REQUIRED:** Defense roll | DC 17\n\n**HIT:** Take 1d8+5 + 1d6 radiant. The radiant light flares. Your companions flinch.\n\n**MISS:** His swing goes wide. His arm shakes. The sword tries to correct. The body cannot.\n\n**HADRIAN'S CON SAVE:** DC 14.\n**FAILURE:** AC drops by 1 again. His breathing is audible now. Ragged. The kind of breathing that says the body is writing checks the lungs cannot cash.\n**SUCCESS:** He holds. It costs him everything to hold."},{"type":"roll","text":"**ROUND 3 — THE END**\n\n*He is failing. You can see it — the left leg dragging, the breath coming in gasps, the arm that held Dawnstrike for forty-three years beginning to tremble. But the eyes are clear. The eyes are younger than the rest of him. The eyes say: finish this. Please.*\n\n**CHECK HP TOTALS.**\n\n**IF YOU ARE WINNING (Hadrian at lower HP):**\n\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll (per sheet) | DC per Hadrian's current AC\n\n**HIT:** Your blade stops at his throat. Or his chest. Or the gap in his shoulder plate. Wherever it stops, it stops, and Ser Hadrian of the White Span looks at the blade and at you and his face does something it has not done in six months of riding alone: it relaxes.\n\n'Yield,' he says. And means it. And is grateful.\n\n**MISS:** The round ends. Go to TIE.\n\n**IF HADRIAN IS WINNING (you at lower HP):**\n\n**HADRIAN'S STRIKE:**\n**ROLL REQUIRED:** Defense roll | DC 17\n\n**FAILURE:** Dawnstrike connects. The impact is final — not lethal, not cruel, but absolute. You go down. The packed earth hits your back. The sky is very blue above you. Ser Hadrian stands over you, Dawnstrike's point at your chest, and the sword's pale light illuminates his face. He is weeping. Not with sadness. With relief.\n\n'You fought well,' he says. 'Better than well. You fought like a knight.' He sheathes Dawnstrike. He does not offer his hand — instead, he salutes. The Rose salute. Full, perfect, given to a squire lying in the dirt, which means he does not see a squire lying in the dirt. He sees a knight.\n\nThen he mounts. The old destrier turns south. Ser Hadrian of the White Span rides toward the smoke without looking back, and the last thing you see before your companions reach you is the Solamnic sun on his battered breastplate, catching the light.\n\n**YOU LOSE:**\nYour weapon is **BROKEN** — the impact of Dawnstrike against your blade has shattered it. Your weapon now counts as an **improvised weapon** (1d4, no proficiency bonus) until replaced. Mark this on your character sheet.\nYour armour is **SHATTERED** — Dawnstrike's radiant edge has cracked the plates beyond repair. Your AC is reduced to 10 + DEX modifier (unarmoured) until you acquire new armour. Mark this on your character sheet.\nYour companions drag you back to the column. You are **unconscious** and wake at **1 HP**. If Mira is present, she is already working on you when you open your eyes. If Aldric is present, his face is the first thing you see, and his expression is the expression of a man who just watched someone he cares about fight a legend and lose, and the losing is not what bothers him — the getting-back-up is what he is waiting for.\n**+1 SWORD, +1 ROSE** (the honour of the attempt). Ser Hadrian's respect was genuine.\n\n**SUCCESS (you defend):** The round ends. Go to TIE.\n\n**IF HP IS TIED — THE DRAW:**\nYou are both still standing. Barely. Hadrian's sword arm is trembling. Your arms burn. Neither of you can find the finishing blow and neither of you is willing to take a bad one.\n'Draw,' you say.\nHadrian looks at you for a long time. Then he laughs. A real laugh — broken, exhausted, alive. 'I have not drawn in thirty years. I forgot what it felt like.' He sheathes Dawnstrike. 'Keep your weapons, squire. You will need them. I will keep mine. I will need it where I am going.' He salutes. He rides south.\n**+2 SWORD, +1 ROSE, +1 CROWN.** No loot. The honour of the draw."},{"type":"item","text":"**IF YOU WIN — THE YIELD**\n\nSer Hadrian kneels. The kneeling costs him — the left knee makes a sound that is not a sound a knee should make — and he places Dawnstrike flat on the ground before you. Then he begins, with slow and painful dignity, to unbuckle his half-plate.\n\n'It is yours,' he says. 'All of it. By right of arms, by the old forms, by the Measure.'\n\nHe stands in his gambeson — suddenly smaller, suddenly his age, suddenly just an old man on a road. He looks at Dawnstrike on the ground and his expression is not loss. It is completion.\n\n'I was afraid,' he says. 'Not of losing. Of no one being good enough to take them from me. Of riding south and dying alone and the sword being found by someone who did not know what it was. You know what it is.' He meets your eyes. 'Carry it for the people I could not save. That is all I ask.'\n\n**ITEMS GAINED:**\n\n> **✦ MAGIC ITEM GAINED: DAWNSTRIKE**\n> *Weapon (Greatsword), Rare (Requires Attunement)*\n> An ancient Solamnic greatsword, the blade inscribed with prayers to Paladine in a script that predates the Cataclysm. The crossguard is shaped like outstretched wings. The steel hums faintly when held — not vibration, resonance. It knows when it is being carried by someone worthy.\n> **Mechanics:** +1 Greatsword. 2d6+1+STR slashing, two-handed. Weapon Mastery: Graze (on miss, deal STR mod damage). Radiant Strike: 2/day, on hit add +1d6 radiant damage (free action, declare before damage roll). The blade hums faintly when pointed toward fiends or undead within 60 feet. Once per long rest: *Dawn's Light* — as a bonus action, Dawnstrike emits bright light in a 20-foot radius for 1 minute. Undead and fiends within the light have disadvantage on attack rolls. Once per long rest: *Last Stand* — when reduced to 0 HP, you may instead drop to 1 HP. Dawnstrike's light flares and goes dark until the next dawn.\n> **Lore:** Nine generations of the White Span lineage carried this blade. Ser Hadrian was the last. Now you are the first of whatever comes next.\n\n> **ARMOUR GAINED: SER HADRIAN'S HALF-PLATE**\n> *Armour (Half-Plate), Mundane*\n> AC 15 + DEX (max 2). Solamnic make, old but functional. The rose insignia on the breastplate is worn nearly invisible. The dents tell stories. Stealth disadvantage.\n> **Lore:** Forty-three years of service. Every dent has a name.\n\nSer Hadrian stands in his gambeson, unarmed, and lighter than he has been in forty-three years. He salutes one final time. He walks — not rides, walks — to his horse, mounts with difficulty, and turns south.\n\n'I will find the Dragon Army,' he says. 'Without the sword, they will kill me quickly. That is a kindness I have been riding toward for six months.' He looks back. 'If the sword sings for you — and it will, I think — listen to it. It knows things the Measure forgot.'\n\nHe rides south. You watch him until the road takes him. He does not look back. He does not need to. He has finished.\n\n**IF ALDRIC IS IN YOUR PARTY:** Aldric is silent for a very long time. Then: 'That was a knight.' Not a compliment. An epitaph.\n\n**+3 SWORD, +2 ROSE.** The honour is immense. The weight is heavier.\n\n**AFTER THE FIGHT — UPDATE YOUR SHEET**\nRecord current HP. Record items gained or lost (BROKEN weapon, SHATTERED armour if defeated). Mark any used: Second Wind, Action Surge, spell slots, Lay on Hands pool.\nEquip new items if gained. Update AC accordingly.\n**Short rest available:** Recover Second Wind, Action Surge.\n**XP:** 50 XP (the duel itself). Bonus 25 XP if you won."}],"choices":[{"letter":"A","text":"Accept the duel. Draw your blade. 'Est Sularus oth Mithas, Ser Hadrian.'","target":"70A","points":{}},{"letter":"B","text":"Refuse. 'I will not fight you, ser. Ride with us instead. Vogler needs every sword.'","target":"69_ROAD","points":{"rose":2,"crown":1}}]},"69_ROAD":{"id":"69_ROAD","title":"THE LAST MILES","location":"South Road — Day 3, Late Afternoon","prose":["The road narrows for the last time. The forest thins and through the gaps you can see the sky changing — the grey-blue of inland Solamnia giving way to the silver-white that means water. Lake Akh-Tiel. You have read about it. You have studied maps of it. You have heard Aldous describe the water in the specific nostalgic voice of someone who saw it once and never forgot. None of that prepared you for the scale.","The column has gone quiet in the way that columns go quiet when the destination is close enough to taste and the tasting changes everything. Hooves on packed earth. Leather creaking. The particular sound of people not speaking because the silence says it better.","Aldric pulls his horse alongside yours. He does not say anything. He looks ahead and so do you and for a moment the two of you are just people on a road looking at what they are riding toward, which is either the defence of a village or the definition of who they are or both, because those are the same thing when you are twenty years old and sworn to something larger than yourself.","**IF THESSALY IS IN YOUR PARTY:** She is writing. Not in her notebook — on a loose leaf tucked into her coat. A letter. To whom, she does not say.","**IF CAERON IS WITH THE COLUMN:** He rides at the front. His posture has not changed since Brightholm — the same compressed focus, the same economy. But his hand rests on his sword hilt now, and it did not before."],"boxes":[{"type":"info","text":"**RANDOM ENCOUNTER CHECK**\nRoll 1d10. On a **10**: A rider appears on the road ahead, alone, armoured, mounted on a warhorse that has seen better decades. Turn to **Scene 69_KNIGHT** before continuing. On 1-9: nothing. The road is empty. Continue below."},{"type":"info","text":""},{"type":"info","text":""}],"choices":[{"letter":"A","text":"Ride in silence. Let the road be the road","target":"70A","points":{"sword":1}},{"letter":"B","text":"Look at Aldric. Nod. He nods back","target":"70A","points":{"rose":1}},{"letter":"C","text":"Touch the tabard. The Solamnic sun is still on your chest","target":"70A","points":{"crown":1}}]},"70A":{"id":"70A","title":"THE LAKESIDE SKIRMISH","location":"Lake Akh-Tiel — Eastern Shore, Pre-Dawn","prose":["Sera finds it. She was scouting ahead — she always scouts ahead now, without being asked, because the road taught her that asking takes time nobody has — and she comes back to the column at a run that is trying very hard to look like it is not a run.","'Observation post,' she says. She is not out of breath because Sera Nighthollow does not get out of breath, but her eyes are wider than usual. 'Eastern lake shore. Four combatants: two soldiers, a scout with a longbow, and a war dog. They have line of sight to the bridge approach. If they signal, the bridge garrison gets reinforcements before we arrive.'","Caeron processes this in two seconds. 'Can we go around?'","'Not without them seeing the column.' Sera's jaw is set. 'We go through.'","This is not a rescue. There are no civilians. No moral complexity. This is a tactical problem with a tactical solution: neutralize the observation post before they can signal, or fight two extra soldiers at the bridge. The mathematics are simple. The execution is not."],"boxes":[{"type":"loot","text":"**OBSERVATION POST SUPPLY TENT:** No moral penalty — enemy military supplies. Stash Loot Roll:\n1–5: Empty ration cans and a cold fire. They were living light.\n6–10: Supplies (rations, Dragon Army signal flags, 1d4 stl).\n11–14: 2d6 stl + mundane item (spyglass, maps of the lake shore, patrol schedules).\n15–17: 3d6 stl + useful item (Potion of Healing, antitoxin, military-grade rope).\n18–19: 4d6 stl + quality item (Dragon Army attack route map — Caeron will give you +1 to ALL Vogler defence checks for this intel).\n20: 5d6 stl + RARE ITEM ROLL."},{"type":"combat","text":"**COMBAT MODE**\n**Pen & Paper:** Use stat blocks below. Run the encounter at your table, then skip to Victory: The lakeside is clear. The observation post is yours. From here you can see the road to Vogler.\nFallen (0 HP): Your companions finish the fight. You come to on the lake shore, tasting blood and mud. 1 HP, one exhaustion.\n**AFTER THE FIGHT**.\n**Narrative Mode:** Follow the rounds below. Roll when prompted.\n**COMPANION SELECTION**\n**Sera** — Essential. She knows the terrain. +2 to all Stealth rolls during approach.\n**Serath** — Knows Dragon Army signal protocols. Can identify and disable the signal system.\n**Aldric** — Assault. If stealth fails, Aldric is the one you want beside you.\n**Lysander** — Veteran precision. +2 to first attack. 'One chance. Make it count.'\n**Vael** — Tactical assessment. Reveals enemy positions before engagement.\n\nChoose up to 2 companions.\n**ENEMY STAT BLOCKS (Pen & Paper)**\n**Human Soldier (2):** AC 14 (chain shirt + shield), HP 16, Speed 30ft. Longsword +5 (1d8+3). Javelin +5 (1d6+3, 30/120). Formation: +1 AC when adjacent.\n**Dragon Army Scout:** AC 15 (studded leather + DEX), HP 22, Speed 30ft. Longbow +5 (1d8+3, 150/600). Shortsword +5 (1d6+3). Observant: advantage on Perception. **Signal Horn:** Action to blow — adds 2 soldiers to the bridge fight (Scene 70). If the scout is killed or the horn destroyed before it sounds, no reinforcements.\n**War Dog:** AC 12 (natural), HP 11, Speed 40ft. Bite +4 (1d6+2, DC 11 STR or knocked prone). Pack Tactics: advantage on attacks if ally is adjacent to target. **Can be calmed:** Animal Handling DC 13 — the dog stops fighting and sits. It is a dog. It was trained, not born, to this.\n**STEALTH APPROACH:** Roll 1d20 + DEX modifier | DC 15 (DC 13 if Sera present)\n**SUCCESS:** Surprise round. All enemies are unaware. You get one free round of attacks with advantage. The scout does not reach the horn.\n**FAILURE:** The war dog smells you. It barks. The scout reaches for the horn. You have 1 round to stop the signal.\n**SURVIVAL CHECK (optional, before approach):** Roll 1d20 + WIS modifier | DC 14\nApproach downwind. The dog cannot smell you.\n**SUCCESS:** +2 to Stealth check. Dog does not detect you regardless of Stealth result (eliminates the dog-smells-you failure condition).\n**FAILURE:** The wind is wrong. Standard approach.\nNARRATIVE COMBAT — ROUND 1\nThe observation post is simple: a lean-to of branches against a rock outcropping, the kind of fieldcraft that is invisible from the road and obvious from ten feet away. The fire is cold — they are professionals, they know fires are visible — but the bedrolls are warm and the ration wrappers are fresh. They have been here at least two days. Watching. Counting. Reporting.\nThe scout is the problem. He is on the high ground — a shelf of rock above the lean-to — with the longbow and the signal horn at his belt. He has the eyes of a man who is paid to notice things, and his dog is curled at his feet, one ear up. Always one ear up.\n**IF STEALTH SUCCEEDED:** They do not see you. The scout is looking south. The soldiers are dozing. The dog is asleep. This is the moment. Take it clean.\n**IF STEALTH FAILED:** The dog is on its feet, teeth bared, and the bark has woken every one of them. The scout's hand is on the horn. One round. If he blows it, the bridge gets reinforcements.\n**YOUR ATTACK — Choose a target:**\n**Scout (priority — the horn)** / **Soldier (left)** / **Soldier (right)** / **War Dog**\n\n**ROLL REQUIRED:** Attack roll | DC = target's AC (Scout: 15, Soldiers: 14, Dog: 12)\nRoll 1d20 + your attack bonus. (Advantage if stealth succeeded.)\n**ON HIT:** Roll damage.\n\n**IF STEALTH FAILED — RANGED ATTACK ON SCOUT (emergency):** If you have a ranged weapon or javelin, you can target the scout before he blows the horn. Ranged attack, DC 15. On hit, the horn falls. On miss, he blows it Round 2.\n**COMPANION ACTION — Choose one for each companion:**\n**Sera:** A) Scout Shot — targets the horn at the scout's belt (ranged attack, DC 15, destroys horn on hit) | B) Mark Scout (+2 next attack vs scout) | C) Aimed Shot (1d6+3 dmg, targets scout)\n**Serath:** A) Intel (+2 one attack) | B) Signal Sabotage — if she can reach the scout (Stealth DC 13), she disables the horn silently | C) Dagger Strike (1d4+2)\n**Aldric:** A) Flank (+1 next attack) | B) Shield Wall (+1 AC) | C) Charge — engages both soldiers (1d8+2, draws aggro, takes 1d4)\n**Lysander:** A) Combat Instruction (+2 attack) | B) Veteran Strike — single devastating blow (1d10+3) | C) Guard (takes next hit for you)\n**Vael:** A) Flanking Shot (1d6 dmg) | B) Honest Assessment (reveal all enemy HP) | C) Cover Fire (+1 AC)\n**ABILITY / ITEM USE (choose one, optional):**\n• (Paladin) Cast Bless: +1d4 to attacks and saves for up to 3 targets, Concentration, lasts entire combat. 1 spell slot.\n• (Paladin) Divine Smite: Bonus action after hitting with a melee weapon. 2d8 radiant (+1d8 vs Fiends/Undead). Once per turn. 1 spell slot (or free 1/long rest at level 2+).\n• (Paladin) Lay on Hands: Bonus action.\n• (Fighter) Action Surge: Additional Action this round (except Magic). 1/short or long rest.\n• (Fighter) Second Wind: 1d10+[level] HP. Bonus action. 2 uses/long rest, regain 1/short rest.\n• (Any) Drink Potion of Healing: 2d4+2 HP. Bonus action.\nENEMY STRIKE — ROUND 1\n**IF SCOUT HAS THE HORN AND STEALTH FAILED:**\nThe scout blows the horn. The sound carries across the lake — a flat, brassy note that bounces off the water and the far shore and the bridge you cannot yet see. Two additional soldiers will be waiting at Scene 70. The tactical cost is real.\n**IF SCOUT DOES NOT HAVE THE HORN:** No signal. The bridge garrison remains unaware.\nThe soldiers engage. They are disciplined — shields up, formation tight, advancing together. The dog lunges low, going for your legs.\n**DEFENSE ROLL (soldier):** Roll 1d20 + DEX modifier | DC 14\n**SUCCESS:** Blocked.\n**FAILURE:** 1d8+3 slashing damage.\n\n**DEFENSE ROLL (war dog):** Roll 1d20 + DEX modifier | DC 14 (Pack Tactics — advantage if soldier adjacent)\n**SUCCESS:** You kick the dog away. It snarls but retreats.\n**FAILURE:** 1d6+2 piercing damage. **STR save DC 11** or knocked prone (disadvantage on next attack).\n**ANIMAL HANDLING (optional, replaces attack next round):** Roll 1d20 + WIS modifier | DC 13\nCalm the dog. It is a dog. It was trained to fight but it was also trained to obey, and the voice you use matters.\n**SUCCESS:** The dog sits. Whines. It is done fighting. (+1 ROSE. The dog follows you. No combat benefit, but it is a dog and dogs are good.)\n**FAILURE:** The dog is too agitated. It attacks again next round.\nNARRATIVE COMBAT — ROUND 2\nThe observation post is chaos now — the lean-to is knocked over, the cold fire is scattered, and the scout is retreating up the rock shelf with the longbow. He is trying to create distance because the longbow is a 150-foot weapon and you are at 15 feet. From up there, he can pin you while the soldiers close.\nThe lake is behind everything. Silver in the pre-dawn. You are fighting on the shore of the most beautiful place you have ever seen and the beauty does not stop or slow anything.\n**YOUR ATTACK:**\n**ROLL REQUIRED:** Attack roll | DC = target's AC\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage.\n\n**SCOUT LONGBOW SUPPRESSION:** If the scout is alive and on the high ground, all targets in the open take -1 to attack rolls (suppressing fire). Eliminate the scout to remove this penalty.\n**COMPANION ACTION — Choose one for each companion:** (same options)\n**ABILITY / ITEM USE (choose one, optional):** (same options)\nENEMY STRIKE — ROUND 2\nThe scout fires from the high ground. The arrow comes fast and flat — a longbow shot at close range, which means it hits like a thrown spear.\n**DEFENSE ROLL (longbow):** Roll 1d20 + DEX modifier | DC 15\n**SUCCESS:** The arrow buries in the dirt beside you.\n**FAILURE:** 1d8+3 piercing damage.\n\n**Soldier attack (if alive):** Roll 1d20 + DEX modifier | DC 14\n**FAILURE:** 1d8+3 slashing damage.\nNARRATIVE COMBAT — ROUND 3\nWhat remains is mathematics and will. The scout, if alive, is running out of arrows and running out of rock shelf. The soldiers, if alive, are considering the same calculation every soldier makes when the fight turns: is this worth dying for? The answer, for Dragon Army regulars this far from support, is usually no.\n**YOUR ATTACK — Clean up.**\n**ROLL REQUIRED:** Attack roll | DC = target's AC\nRoll 1d20 + your attack bonus.\n**ON HIT:** Roll damage. *End this before the sun comes up.*\n**COM
