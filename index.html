"Polymorph":{level:"4th",school:"Transmutation",time:"Action",range:"60 feet",comp:"V, S, M (a caterpillar cocoon)",dur:"Concentration, up to 1 hour",desc:"This spell transforms a creature that you can see within range into a new form. An unwilling creature must make a WIS save to avoid the effect. The transformation lasts for the duration, or until the target drops to 0 hit points or dies. The target's game statistics are replaced by the statistics of the chosen beast."},
"Staggering Smite":{level:"4th",school:"Evocation",time:"Bonus Action",range:"Self",comp:"V",dur:"Concentration, up to 1 minute",desc:"The next time you hit a creature with a melee weapon attack during this spell's duration, your weapon pierces both body and mind, and the attack deals an extra 4d6 psychic damage. The target must make a WIS save. On a failed save, it has Disadvantage on attack rolls and ability checks, and can't take reactions, until the end of its next turn."},
"Stoneskin":{level:"4th",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S, M (diamond dust worth 100 gp, consumed)",dur:"Concentration, up to 1 hour",desc:"This spell turns the flesh of a willing creature you touch as hard as stone. Until the spell ends, the target has resistance to nonmagical bludgeoning, piercing, and slashing damage."},
"Wall of Fire":{level:"4th",school:"Evocation",time:"Action",range:"120 feet",comp:"V, S, M (a small piece of phosphorus)",dur:"Concentration, up to 1 minute",desc:"You create a wall of fire on a solid surface within range. You can make the wall up to 60 feet long, 20 feet high, and 1 foot thick, or a ringed wall up to 20 feet in diameter, 20 feet high, and 1 foot thick. One side of the wall, selected by you, deals 5d8 fire damage to each creature that ends its turn within 10 feet of that side. At Higher Levels: +1d8 per slot above 4th."},
// Level 5 Spells
"Banishing Smite":{level:"5th",school:"Abjuration",time:"Bonus Action",range:"Self",comp:"V",dur:"Concentration, up to 1 minute",desc:"The next time you hit a creature with a weapon attack before this spell ends, your weapon crackles with force, and the attack deals an extra 5d10 force damage. Additionally, if this attack reduces the target to 50 HP or fewer, you banish it. If the target is native to a different plane, it returns to its home plane. Otherwise, it goes to a harmless demiplane and is Incapacitated there."},
"Circle of Power":{level:"5th",school:"Abjuration",time:"Action",range:"Self (30-foot radius)",comp:"V",dur:"Concentration, up to 10 minutes",desc:"Divine energy radiates from you in a 30-foot radius. Until the spell ends, the sphere moves with you, centered on you. Friendly creatures in the area have Advantage on saving throws against spells and other magical effects. Additionally, if an affected creature succeeds on a saving throw against a spell or magical effect that allows a save for half damage, it takes no damage."},
"Cloudkill":{level:"5th",school:"Conjuration",time:"Action",range:"120 feet",comp:"V, S",dur:"Concentration, up to 10 minutes",desc:"You create a 20-foot-radius sphere of poisonous, yellow-green fog centered on a point you choose. The fog spreads around corners. It lasts for the duration or until strong wind disperses it. When a creature enters the area for the first time on a turn or starts its turn there, it must make a CON save. It takes 5d8 poison damage on a failed save, or half on success. At Higher Levels: +1d8 per slot above 5th."},
"Commune":{level:"5th",school:"Divination",time:"1 minute (Ritual)",range:"Self",comp:"V, S, M (incense and a vial of holy water)",dur:"1 minute",desc:"You contact your deity or a divine proxy and ask up to three questions that can be answered with a yes or no. You must ask your questions before the spell ends. You receive a correct answer for each question."},
"Cone of Cold":{level:"5th",school:"Evocation",time:"Action",range:"Self (60-foot cone)",comp:"V, S, M (a small crystal or glass cone)",dur:"Instantaneous",desc:"A blast of cold air erupts from your hands. Each creature in a 60-foot cone must make a CON save. A creature takes 8d8 cold damage on a failed save, or half as much damage on a successful one. At Higher Levels: +1d8 per slot above 5th."},
"Contagion":{level:"5th",school:"Necromancy",time:"Action",range:"Touch",comp:"V, S",dur:"7 days",desc:"Your touch inflicts disease. Make a melee spell attack against a creature within your reach. On a hit, the target is Poisoned. At the end of each of the Poisoned target's turns, the target must make a CON save. If the target succeeds on three of these saves, it is no longer Poisoned. If the target fails three of these saves, the target is no longer Poisoned, but choose one of the diseases described in the spell."},
"Destructive Wave":{level:"5th",school:"Evocation",time:"Action",range:"Self (30-foot radius)",comp:"V",dur:"Instantaneous",desc:"You strike the ground, creating a burst of divine energy that ripples outward from you. Each creature you choose within 30 feet must succeed on a CON save or take 5d6 thunder damage, as well as 5d6 radiant or necrotic damage (your choice), and be knocked Prone. On a success, the creature takes half as much damage and isn't knocked Prone."},
"Dispel Evil and Good":{level:"5th",school:"Abjuration",time:"Action",range:"Self",comp:"V, S, M (holy water or powdered silver and iron)",dur:"Concentration, up to 1 minute",desc:"Shimmering energy surrounds and protects you. For the duration, celestials, elementals, fey, fiends, and undead have Disadvantage on attack rolls against you. You can end the spell early to use Break Enchantment, Dismissal, or similar effects."},
"Dominate Person":{level:"5th",school:"Enchantment",time:"Action",range:"60 feet",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"You attempt to beguile a humanoid that you can see within range. It must succeed on a WIS save or be Charmed by you for the duration. If you or creatures friendly to you are fighting it, it has Advantage on the save. While Charmed, you have a telepathic link with it. You can use this link to issue commands. At Higher Levels: 10 minutes at 6th, 1 hour at 7th, 8 hours at 8th."},
"Flame Strike":{level:"5th",school:"Evocation",time:"Action",range:"60 feet",comp:"V, S, M (a pinch of sulfur)",dur:"Instantaneous",desc:"A vertical column of divine fire roars down from the heavens in a location you specify. Each creature in a 10-foot-radius, 40-foot-high cylinder centered on a point within range must make a DEX save. A creature takes 4d6 fire damage and 4d6 radiant damage on a failed save, or half as much on a successful one. At Higher Levels: +1d6 fire or radiant (your choice) per slot above 5th."},
"Geas":{level:"5th",school:"Enchantment",time:"1 minute",range:"60 feet",comp:"V",dur:"30 days",desc:"You place a magical command on a creature you can see within range, forcing it to carry out some service or refrain from some action or course of activity as you decide. If the creature can understand you, it must succeed on a WIS save or become Charmed by you for the duration. While Charmed, it takes 5d10 psychic damage each time it acts in a manner directly counter to your instructions."},
"Greater Restoration":{level:"5th",school:"Abjuration",time:"Action",range:"Touch",comp:"V, S, M (diamond dust worth 100+ gp, consumed)",dur:"Instantaneous",desc:"You imbue a creature you touch with positive energy to undo a debilitating effect. You can reduce the target's Exhaustion level by one, or end one of the following effects: one effect that Charmed or Petrified the target, one curse, any reduction to one of the target's ability scores, or one effect reducing the target's hit point maximum."},
"Hold Monster":{level:"5th",school:"Enchantment",time:"Action",range:"90 feet",comp:"V, S, M (a small, straight piece of iron)",dur:"Concentration, up to 1 minute",desc:"Choose a creature that you can see within range. The target must succeed on a WIS save or be Paralyzed for the duration. This spell has no effect on undead. At the end of each of its turns, the target can make another WIS save. On a success, the spell ends on the target. At Higher Levels: one additional creature per slot above 5th."},
"Legend Lore":{level:"5th",school:"Divination",time:"10 minutes",range:"Self",comp:"V, S, M (incense worth 250+ gp consumed, plus four ivory strips worth 50+ gp each)",dur:"Instantaneous",desc:"Name or describe a person, place, or object. The spell brings to your mind a brief summary of the significant lore about the thing you named. The information might consist of current tales, forgotten stories, or even secret lore that has never been widely known."},
"Mass Cure Wounds":{level:"5th",school:"Abjuration",time:"Action",range:"60 feet",comp:"V, S",dur:"Instantaneous",desc:"A wave of healing energy washes out from a point of your choice within range. Choose up to six creatures in a 30-foot-radius sphere centered on that point. Each target regains hit points equal to 3d8 + your spellcasting ability modifier. This spell has no effect on undead or constructs. At Higher Levels: +1d8 per slot above 5th."},
"Modify Memory":{level:"5th",school:"Enchantment",time:"Action",range:"30 feet",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"You attempt to reshape another creature's memories. One creature that you can see must make a WIS save. If you are fighting it, it has Advantage. On a failed save, the target becomes Charmed by you for the duration. While Charmed, you can affect the target's memory of an event that occurred within the last 24 hours and that lasted no more than 10 minutes."},
"Planar Binding":{level:"5th",school:"Abjuration",time:"1 hour",range:"60 feet",comp:"V, S, M (a jewel worth 1,000+ gp, consumed)",dur:"24 hours",desc:"You attempt to bind a celestial, elemental, fey, or fiend to your service. The creature must be within range for the entire casting. (Usually, the creature is first summoned into the center of an inverted magic circle to keep it trapped while this spell is cast.) At the end of the casting, the target must make a CHA save. On a failed save, it is bound to serve you for the duration."},
"Raise Dead":{level:"5th",school:"Necromancy",time:"1 hour",range:"Touch",comp:"V, S, M (a diamond worth 500+ gp, consumed)",dur:"Instantaneous",desc:"You return a dead creature you touch to life, provided that it has been dead no longer than 10 days. If the creature's soul is both willing and at liberty to rejoin the body, the creature returns to life with 1 hit point. This spell also neutralizes any poisons and cures nonmagical diseases that affected the creature at the time it died."},
"Scrying":{level:"5th",school:"Divination",time:"10 minutes",range:"Self",comp:"V, S, M (a focus worth 1,000+ gp, such as a crystal ball, a silver mirror, or a font filled with holy water)",dur:"Concentration, up to 10 minutes",desc:"You can see and hear a particular creature you choose that is on the same plane of existence as you. The target must make a WIS save, which is modified by how well you know the target and the sort of physical connection you have to it. On a failed save, you can see and hear the target."},
"Telekinesis":{level:"5th",school:"Transmutation",time:"Action",range:"60 feet",comp:"V, S",dur:"Concentration, up to 10 minutes",desc:"You gain the ability to move or manipulate creatures or objects by thought. When you cast the spell, and as your action each round for the duration, you can exert your will on one creature or object that you can see within range, causing the appropriate effect: Creature (CON save or move it up to 30 feet, Restrained if held aloft), or Object (move an object up to 30 feet)."},
"Teleportation Circle":{level:"5th",school:"Conjuration",time:"1 minute",range:"10 feet",comp:"V, M (rare chalks and inks worth 50+ gp, consumed)",dur:"1 round",desc:"As you cast the spell, you draw a 10-foot-diameter circle on the ground inscribed with sigils that link your location to a permanent teleportation circle of your choice whose sigil sequence you know. Any creature that steps into the circle is instantly teleported to the target circle."},
"Tree Stride":{level:"5th",school:"Conjuration",time:"Action",range:"Self",comp:"V, S",dur:"Concentration, up to 1 minute",desc:"You gain the ability to enter a tree and move from inside it to inside another tree of the same kind within 500 feet. Both trees must be living and at least the same size as you. You must use 5 feet of movement to enter a tree. Once inside, you know the location of all other trees of the same kind within 500 feet and can step inside one of those trees or step out of the tree you're in."},
"Wall of Stone":{level:"5th",school:"Evocation",time:"Action",range:"120 feet",comp:"V, S, M (a small block of granite)",dur:"Concentration, up to 10 minutes",desc:"A nonmagical wall of solid stone springs into existence at a point you choose within range. The wall is 6 inches thick and is composed of ten 10-foot-by-10-foot panels. Each panel must be contiguous with at least one other panel. If a creature would be surrounded on all sides by the wall, that creature can make a DEX save. On a success, it can use its reaction to move up to its speed so that it is no longer enclosed by the wall."},
// Level 6-9 Spells (Epic/Endgame)
"Heal":{level:"6th",school:"Evocation",time:"Action",range:"60 feet",comp:"V, S",dur:"Instantaneous",desc:"Choose a creature that you can see within range. A surge of positive energy washes through the creature, causing it to regain 70 hit points. This spell also ends Blindness, Deafness, and any diseases affecting the target. This spell has no effect on constructs or undead. At Higher Levels: +10 HP per slot above 6th."},
"Heroes' Feast":{level:"6th",school:"Conjuration",time:"10 minutes",range:"30 feet",comp:"V, S, M (a gem-encrusted bowl worth 1,000+ gp, consumed)",dur:"Instantaneous",desc:"You bring forth a great feast. Up to twelve other creatures can partake of the feast, which takes 1 hour to consume. The feast has several benefits: cure all diseases and poison, become immune to poison and Frightened, make all WIS saves with Advantage, hit point maximum increases by 2d10, and gain those extra hit points."},
"Sunbeam":{level:"6th",school:"Evocation",time:"Action",range:"Self (60-foot line)",comp:"V, S, M (a magnifying glass)",dur:"Concentration, up to 1 minute",desc:"A beam of brilliant light flashes out from your hand in a 5-foot-wide, 60-foot-long line. Each creature in the line must make a CON save. On a failed save, a creature takes 6d8 radiant damage and is Blinded until your next turn. On a successful save, it takes half as much damage and isn't Blinded. You can create a new line of radiance as your action on any turn until the spell ends."},
"True Seeing":{level:"6th",school:"Divination",time:"Action",range:"Touch",comp:"V, S, M (an ointment for the eyes worth 25 gp, made from mushroom powder, saffron, and fat; consumed)",dur:"1 hour",desc:"This spell gives the willing creature you touch the ability to see things as they actually are. For the duration, the creature has truesight, notices secret doors hidden by magic, and can see into the Ethereal Plane, all out to a range of 120 feet."},
"Divine Word":{level:"7th",school:"Evocation",time:"Bonus Action",range:"30 feet",comp:"V",dur:"Instantaneous",desc:"You utter a divine word, imbued with the power that shaped the world. Each creature of your choice within range that can hear you must make a CHA save. On a failed save, a creature suffers an effect based on its current HP: 20 HP or fewer—killed instantly; 30 HP or fewer—Deafened, Blinded, and Stunned for 1 hour; 40 HP or fewer—Deafened and Blinded for 10 minutes; 50 HP or fewer—Deafened for 1 minute."},
"Etherealness":{level:"7th",school:"Transmutation",time:"Action",range:"Self",comp:"V, S",dur:"Up to 8 hours",desc:"You step into the border regions of the Ethereal Plane. You remain in the Border Ethereal for the duration or until you use your action to dismiss the spell. You can see and hear the plane you originated from, but everything there looks gray. At Higher Levels: three additional creatures per slot above 7th."},
"Finger of Death":{level:"7th",school:"Necromancy",time:"Action",range:"60 feet",comp:"V, S",dur:"Instantaneous",desc:"You send negative energy coursing through a creature you can see within range. The target must make a CON save. It takes 7d8 + 30 necrotic damage on a failed save, or half as much damage on a successful one. A humanoid killed by this spell rises at the start of your next turn as a zombie permanently under your command."},
"Plane Shift":{level:"7th",school:"Conjuration",time:"Action",range:"Touch",comp:"V, S, M (a forked, metal rod worth 250+ gp, attuned to a particular plane)",dur:"Instantaneous",desc:"You and up to eight willing creatures who link hands in a circle are transported to a different plane of existence. You can specify a target destination in general terms, such as the City of Brass on the Elemental Plane of Fire or the palace of Dispater on the second level of the Nine Hells. Alternatively, use this spell to banish an unwilling creature to another plane (CHA save to avoid)."},
"Regenerate":{level:"7th",school:"Transmutation",time:"1 minute",range:"Touch",comp:"V, S, M (a prayer wheel and holy water)",dur:"1 hour",desc:"You touch a creature and stimulate its natural healing ability. The target regains 4d8 + 15 hit points. For the duration of the spell, the target regains 1 hit point at the start of each of its turns (10 hit points each minute). The target's severed body members (fingers, legs, tails, and so on), if any, are restored after 2 minutes."},
"Resurrection":{level:"7th",school:"Necromancy",time:"1 hour",range:"Touch",comp:"V, S, M (a diamond worth 1,000+ gp, consumed)",dur:"Instantaneous",desc:"You touch a dead creature that has been dead for no more than a century, that didn't die of old age, and that isn't undead. If its soul is free and willing, the target returns to life with all its hit points. This spell neutralizes any poisons and cures normal diseases afflicting the creature when it died."},
"Antimagic Field":{level:"8th",school:"Abjuration",time:"Action",range:"Self (10-foot-radius sphere)",comp:"V, S, M (a pinch of powdered iron or iron filings)",dur:"Concentration, up to 1 hour",desc:"A 10-foot-radius invisible sphere of antimagic surrounds you. This area is divorced from the magical energy that suffuses the multiverse. Within the sphere, spells can't be cast, summoned creatures disappear, and even magic items become mundane."},
"Earthquake":{level:"8th",school:"Evocation",time:"Action",range:"500 feet",comp:"V, S, M (a pinch of dirt, a piece of rock, and a lump of clay)",dur:"Concentration, up to 1 minute",desc:"You create a seismic disturbance at a point on the ground you can see within range. For the duration, an intense tremor rips through the ground in a 100-foot-radius circle centered on that point and shakes creatures and structures in contact with the ground in that area. Each creature on the ground that is Concentrating must make a CON save or lose Concentration."},
"Holy Aura":{level:"8th",school:"Abjuration",time:"Action",range:"Self",comp:"V, S, M (a tiny reliquary worth 1,000+ gp containing a sacred relic)",dur:"Concentration, up to 1 minute",desc:"Divine light washes out from you and coalesces in a soft radiance in a 30-foot radius around you. Creatures of your choice in that radius have Advantage on all saving throws, and other creatures have Disadvantage on attack rolls against them. Additionally, when a fiend or an undead hits an affected creature with a melee attack, the aura flashes with brilliant light. The attacker must succeed on a CON save or be Blinded until the spell ends."},
"Power Word Stun":{level:"8th",school:"Enchantment",time:"Action",range:"60 feet",comp:"V",dur:"Instantaneous",desc:"You speak a word of power that can overwhelm the mind of one creature you can see within range, leaving it dumbfounded. If the target has 150 hit points or fewer, it is Stunned. Otherwise, the spell has no effect. The Stunned target must make a CON save at the end of each of its turns. On a successful save, this stunning effect ends."},
"Sunburst":{level:"8th",school:"Evocation",time:"Action",range:"150 feet",comp:"V, S, M (fire and a piece of sunstone)",dur:"Instantaneous",desc:"Brilliant sunlight flashes in a 60-foot radius centered on a point you choose. Each creature in that light must make a CON save. On a failed save, a creature takes 12d6 radiant damage and is Blinded for 1 minute. On a successful save, it takes half as much damage and isn't Blinded. Undead and oozes have Disadvantage on this saving throw."},
"Gate":{level:"9th",school:"Conjuration",time:"Action",range:"60 feet",comp:"V, S, M (a diamond worth 5,000+ gp)",dur:"Concentration, up to 1 minute",desc:"You conjure a portal linking an unoccupied space you can see within range to a precise location on a different plane of existence. The portal is a circular opening, 5 to 20 feet in diameter. You can orient the portal in any direction. Any creature that passes through the portal appears within 5 feet of the destination."},
"Mass Heal":{level:"9th",school:"Abjuration",time:"Action",range:"60 feet",comp:"V, S",dur:"Instantaneous",desc:"A flood of healing energy flows from you into injured creatures around you. You restore up to 700 hit points, divided as you choose among any number of creatures that you can see within range. Creatures healed by this spell are also cured of all diseases and any effect making them Blinded or Deafened. This spell has no effect on undead or constructs."},
"Power Word Kill":{level:"9th",school:"Enchantment",time:"Action",range:"60 feet",comp:"V",dur:"Instantaneous",desc:"You utter a word of power that can compel one creature you can see within range to die instantly. If the creature you choose has 100 hit points or fewer, it dies. Otherwise, the spell has no effect."},
"True Resurrection":{level:"9th",school:"Necromancy",time:"1 hour",range:"Touch",comp:"V, S, M (a sprinkle of holy water and diamonds worth 25,000+ gp, consumed)",dur:"Instantaneous",desc:"You touch a creature that has been dead for no longer than 200 years and that died for any reason except old age. If the creature's soul is free and willing, the creature is restored to life with all its hit points. This spell closes all wounds, neutralizes any poison, cures all diseases, and lifts any curses affecting the creature when it died. The spell even provides a new body if the original no longer exists."},
"Wish":{level:"9th",school:"Conjuration",time:"Action",range:"Self",comp:"V",dur:"Instantaneous",desc:"Wish is the mightiest spell a mortal creature can cast. By simply speaking aloud, you can alter the very foundations of reality in accord with your desires. The basic use of this spell is to duplicate any other spell of 8th level or lower. You don't need to meet any requirements in that spell. Alternatively, you can create other effects at DM discretion, though doing so may have consequences."},

// Filter lines/paragraphs by class and companion presence
function shouldHideLine(line,cls,companions){
  const l=line.trim();if(!l)return false;
  const comps=companions||[];
  // Class-conditional lines
  if(cls==='Fighter'){
    if(/^(?:\*\*)?If you are a Paladin/i.test(l))return true;
    if(/^(?:\*\*)?Paladin(?:s)?:/i.test(l)&&!/Fighter/i.test(l))return true;
    if(/^(?:\*\*)?Paladin(?:s)? (?:on |with |may |only|note|—)/i.test(l))return true;
    if(/^(?:\*\*)?Paladin(?:s)? (?:turn to|skip to|read )/i.test(l))return true;
    if(/(?:\*\*)?All Paladins:/i.test(l)&&!/Fighter/i.test(l))return true;
    if(/^(?:\*\*)?PALADIN\b/i.test(l)&&!/FIGHTER/i.test(l)&&!/Paladin Level \d/i.test(l))return true;
  }
  if(cls==='Paladin'){
    if(/^(?:\*\*)?If you are a Fighter/i.test(l))return true;
    if(/^(?:\*\*)?Fighter(?:s)?:/i.test(l)&&!/Paladin/i.test(l))return true;
    if(/^(?:\*\*)?FIGHTER\b/i.test(l)&&!/PALADIN/i.test(l)&&!/Fighter Level \d/i.test(l))return true;
  }
  // Companion-conditional lines
  const compMatch=l.match(/^(?:\*\*)?IF\s+(\w+)\s+IS\s+(?:IN YOUR PARTY|PRESENT)/i)||l.match(/^(?:\*\*)?(?:If|if)\s+(\w+)\s+is\s+(?:in your party|present|in the party)/i)||l.match(/^\(If\s+(\w+)\)/i);
  if(compMatch){
    const name=compMatch[1];
    // Check if this companion is in the party (match first name to full name)
    const hasComp=comps.some(c=>c.toLowerCase().startsWith(name.toLowerCase()));
    if(!hasComp)return true;
  }
  return false;
}
function stripCompanionLabel(line){
  // Remove "**IF X IS IN YOUR PARTY (...):**" / "**IF X IS PRESENT:**" headers, keep remaining content
  return line
    .replace(/\*\*IF\s+\w+\s+IS\s+(?:IN YOUR PARTY|PRESENT)[^*]*\*\*\s*/gi,'')
    .replace(/\*\*(?:If|if)\s+\w+\s+is\s+(?:in your party|present|in the party)[^*]*\*\*\s*/gi,'')
    .replace(/^\(If\s+\w+\)\s*/i,'');
}
function filterProse(proseArr,cls,companions){
  if(!proseArr)return[];
  return proseArr.filter(p=>!shouldHideLine(p,cls,companions)).map(p=>stripCompanionLabel(p)).filter(p=>p.trim());
}
function filterBoxText(text,cls,companions){
  if(!text)return text;
  const lines=text.split('\n');
  const filtered=[];let skipping=false;
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(shouldHideLine(l,cls,companions)){
      skipping=true;continue;
    }
    // If previous line was hidden and this is a continuation (no bold header), skip it too
    if(skipping&&l.trim()&&!l.trim().startsWith('**')&&!l.trim().startsWith('>')&&!/^[A-Z]{2,}/.test(l.trim())){
      continue;
    }
    skipping=false;
    filtered.push(stripCompanionLabel(l));
  }
  return filtered.join('\n');
}

// Language parsing: [LANG:LanguageName]text[/LANG] or [LANG:LanguageName|fallback]text[/LANG]
// Returns {text, languageNotes} where languageNotes are [{lang, understood}]
function parseLanguageText(text,knownLanguages){
  if(!text||!text.includes('[LANG:'))return{text,languageNotes:[]};
  const langs=knownLanguages||[];
  const notes=[];
  const parsed=text.replace(/\[LANG:([^\]|]+)(?:\|([^\]]*))?\]([\s\S]*?)\[\/LANG\]/gi,(match,lang,fallback,content)=>{
    const langName=lang.trim();
    const understood=langs.some(l=>l.toLowerCase()===langName.toLowerCase());
    notes.push({lang:langName,understood});
    if(understood){
      return content;
    }else{
      // Show fallback if provided, otherwise show italicized "unknown language" marker
      return fallback?fallback.trim():'*[Speech in '+langName+' — you do not understand]*';
    }
  });
  return{text:parsed,languageNotes:notes};
}

const ARMOR_NAMES=['Chain Mail','Scale Mail','Leather Armor','Studded Leather','Half-Plate'];
function getItemSlot(name){
  if(!name)return null;
  const n=name.toLowerCase();
  if(WEAPONS_WITH_MASTERY.some(w=>w.name===name)||n==='pig skewer'||n==='dawnstrike')return'mainHand';
  if(n==='shield')return'offHand';
  if(ARMOR_NAMES.includes(name))return'armor';
  if(n.includes('helm')||n.includes('hat')||n.includes('circlet')||n.includes('crown')||n.includes('coif'))return'head';
  if(n.includes('cape')||n.includes('cloak')||n.includes('mantle'))return'cape';
  if(n.includes('tabard')||n.includes('surcoat')||n.includes('vest'))return'tabard';
  if(n.includes('glove')||n.includes('gauntlet')||n.includes('bracer'))return'hands';
  if(n.includes('boot')||n.includes('greave')||n.includes('sabaton'))return'boots';
  if(n.includes('ring'))return'ring1';
  if(n.includes('amulet')||n.includes('necklace')||n.includes('pendant')||n.includes('medallion'))return'amulet';
  return null;
}
function buildEquipment(weapon,armor,hasShield){
  return{head:'Leather Helm',cape:null,tabard:'Solamnic Tabard',armor:armor||'Chain Mail',mainHand:weapon||'Longsword',offHand:hasShield?'Shield':null,hands:'Leather Gloves',boots:'Leather Boots',ring1:null,ring2:null,amulet:null};
}
function syncEquipToState(gs){
  // Sync equipment slots → gs.weapon, gs.armor, gs.hasShield, gs.offHandWeapon
  if(!gs.equipment)return;
  gs.weapon=gs.equipment.mainHand||'Unarmed';
  gs.armor=gs.equipment.armor||'None';
  gs.hasShield=gs.equipment.offHand==='Shield';
  // Track off-hand weapon for dual wielding
  const ohw=gs.equipment.offHand;
  gs.offHandWeapon=(ohw&&ohw!=='Shield'&&WEAPONS_WITH_MASTERY.some(w=>w.name===ohw))?ohw:null;
}
function equipItem(gs,itemName,slotOverride){
  const eq={...(gs.equipment||{})};
  let slot=slotOverride||getItemSlot(itemName);
  if(!slot)return gs;
  // Ring: if ring1 is taken, try ring2
  if(slot==='ring1'&&eq.ring1&&!slotOverride)slot='ring2';
  // Two-handed weapon: clear off hand
  const wpn=WEAPONS_WITH_MASTERY.find(w=>w.name===itemName);
  if(wpn&&/Two-Handed/i.test(wpn.props)){eq.offHand=null}
  // If equipping to offHand and main hand is two-handed, block it
  if(slot==='offHand'){const mw=WEAPONS_WITH_MASTERY.find(w=>w.name===eq.mainHand);if(mw&&/Two-Handed/i.test(mw.props))return gs}
  // Light weapon in offHand: verify it's actually light
  if(slot==='offHand'&&wpn&&!isLightWeapon(itemName))return gs;
  eq[slot]=itemName;
  const ns={...gs,equipment:eq};
  syncEquipToState(ns);
  ns.derived=calcDerived(ns.stats,ns.cls,ns.level,ns.armor,ns.hasShield,ns.feat,ns.wounds,ns.exhaustion);
  return ns;
}
function unequipItem(gs,slotId){
  const eq={...(gs.equipment||{})};
  if(!eq[slotId])return gs;
  eq[slotId]=null;
  const ns={...gs,equipment:eq};
  syncEquipToState(ns);
  ns.derived=calcDerived(ns.stats,ns.cls,ns.level,ns.armor,ns.hasShield,ns.feat,ns.wounds,ns.exhaustion);
  return ns;
}
function isLightWeapon(name){const w=WEAPONS_WITH_MASTERY.find(x=>x.name===name);return w&&/Light/i.test(w.props)}
function getSlotOptions(gs,slotId){
  // Returns all inventory items that can go in this slot (including currently equipped)
  if(!gs||!gs.inventory)return[];
  const current=gs.equipment?gs.equipment[slotId]:null;
  const eqVals=gs.equipment?Object.values(gs.equipment).filter(Boolean):[];
  // If main hand is two-handed, offHand can only be empty
  const mainWpn=gs.equipment?WEAPONS_WITH_MASTERY.find(w=>w.name===gs.equipment.mainHand):null;
  const mainIsTwoHanded=mainWpn&&/Two-Handed/i.test(mainWpn.props);
  if(slotId==='offHand'&&mainIsTwoHanded)return current?[current]:[];
  const opts=[];const seen=new Set();
  if(current&&!seen.has(current)){seen.add(current);opts.push(current)}
  gs.inventory.forEach(it=>{
    if(seen.has(it))return;
    if(eqVals.includes(it)&&it!==current)return;// equipped elsewhere
    const s=getItemSlot(it);
    // Light weapons can go in offHand (dual wielding)
    if(slotId==='offHand'&&s==='mainHand'&&isLightWeapon(it)){seen.add(it);opts.push(it);return}
    // Shield always valid for offHand
    if(slotId==='ring2'&&s==='ring1'){seen.add(it);opts.push(it)}
    else if(s===slotId){seen.add(it);opts.push(it)}
  });
  return opts;
}

const CONSUMABLE_ITEMS=/^(Potion|Greater Potion|Bandage|Dried Yarrow|Pine Salve|Clean Bandage|Antitoxin|Ration)/i;
const QUEST_ITEMS=/tabard|token|patrol sketch|family ring|carved wooden|dispatch|signet|sealed orders|journal|battle plans|whistle|rose commentary|boar tusks|kapak venom|pig skewer/i;
function categorizeItem(name){
  if(WEAPONS_WITH_MASTERY.some(w=>w.name===name)||/dawnstrike|pig skewer/i.test(name))return'Weapons';
  if(ARMOR_NAMES.includes(name)||/shield/i.test(name))return'Armor & Shields';
  if(/helm|glove|gauntlet|boot|greave|cape|cloak|ring|amulet|pendant|necklace|medallion|bracer|sabaton|coif/i.test(name))return'Gear';
  if(CONSUMABLE_ITEMS.test(name))return'Consumables';
  if(QUEST_ITEMS.test(name))return'Quest Items';
  if(/pack|rope|torch|whetstone|caltrop/i.test(name))return'Supplies';
  return'Miscellaneous';
}

function splitSave(gs,sceneId){
  const character={};const progress={};
  for(const k of CHARACTER_FIELDS){if(k in gs)character[k]=gs[k]}
  for(const k of CAMPAIGN_PROGRESS_FIELDS){if(k in gs)progress[k]=gs[k]}
  progress.sceneId=sceneId;
  progress.campaignId=(CAMPAIGN&&CAMPAIGN.id)||'knights-oath';
  progress.campaignVersion=(CAMPAIGN&&CAMPAIGN.version)||null;
  return{character,progress}
}
function mergeSave(character,progress){
  const gs={...character,...progress};
  delete gs.sceneId;delete gs.campaignId;delete gs.campaignVersion;
  return gs
}
function migrateLegacySave(saveData){
  // Detect old format: has gs but no saveVersion
  if(!saveData||saveData.saveVersion)return saveData;
  if(!saveData.gs)return saveData;
  const{character,progress}=splitSave(saveData.gs,saveData.sceneId);
  return{saveVersion:2,character,progress,savedAt:saveData.savedAt||new Date().toISOString()}
}

async function saveGame(slot,gs,sceneId){
  try{
    const{character,progress}=splitSave(gs,sceneId);
    // Strip derived from character (recalculated on load)
    delete character.derived;
    const saveData=JSON.stringify({saveVersion:2,character,progress,savedAt:new Date().toISOString()});
    await ST.set('save-slot-'+slot,saveData);
    await PrefBackup.set('save-slot-'+slot,saveData); // Mirror to Preferences on native
    return true
  }catch(e){return false}
}
const SAVE_SLOT_COUNT=6;
async function loadAllSlots(){
  const s=Array(SAVE_SLOT_COUNT).fill(null);
  for(let i=0;i<SAVE_SLOT_COUNT;i++){
    try{
      let v=await ST.get('save-slot-'+i);
      // Fallback: if localStorage empty, try Preferences backup
      if(!v)v=await PrefBackup.get('save-slot-'+i);
      if(v){
        let parsed=JSON.parse(v);
        parsed=migrateLegacySave(parsed);
        s[i]=parsed;
        // Restore to localStorage if recovered from Preferences
        if(!await ST.get('save-slot-'+i))await ST.set('save-slot-'+i,v);
      }
    }catch(e){}
  }

}

// ── Roll Box Parser ────────────────────────────────────
function parseRollBox(text){
  const lines=text.split('\n');
  let preamble=[],success=[],failure=[],coinflip='',isRequired=false,dc=null,skill=null;
  let section='pre';
  for(const line of lines){
    const l=line.trim();
    if(!l)continue;
    if(l.match(/\*\*ROLL REQUIRED/i)){isRequired=true;preamble.push(l);section='pre';continue}
    if(l.match(/\*\*OPTIONAL ROLL/i)){isRequired=false;preamble.push(l);section='pre';continue}
    if(l.match(/\*\*SUCCESS[\s:(]/i)){section='success';success.push(l);continue}
    if(l.match(/\*\*FAILURE[\s:(]/i)){section='failure';failure.push(l);continue}
    if(l.match(/No dice\?|Flip a coin/i)){coinflip=l;continue}
    if(section==='pre')preamble.push(l);
    else if(section==='success')success.push(l);
    else if(section==='failure')failure.push(l);
  }
  // Extract DC and skill from preamble
  const full=preamble.join(' ');
  const dcM=full.match(/DC\s+(\d+)/);if(dcM)dc=parseInt(dcM[1]);
  const skills=['Athletics','Perception','Insight','Investigation','History','Religion','Medicine','Persuasion','Intimidation','Survival','Stealth','Acrobatics','Composure'];
  const sts=['STR','DEX','CON','INT','WIS','CHA'];
  for(const s of skills)if(full.includes(s)){skill=s;break}
  if(!skill)for(const s of sts)if(full.includes(s)){skill=s;break}
  return{preamble,success,failure,coinflip,isRequired,dc,skill:skill||'WIS'};
}

// ── Roll Box ───────────────────────────────────────────
function RollBox({text,derived,gs,onBonus,rollKey,onRollSave}){
  // Check for persisted roll result
  const saved=(gs&&gs.completedRolls&&rollKey)?gs.completedRolls[rollKey]:null;
  const[result,setResult]=useState(saved?saved.result:null);
  const[rolling,setRolling]=useState(false);
  const[display,setDisplay]=useState(null);
  const[prayerAvail,setPrayerAvail]=useState(false);
  const[prayerResult,setPrayerResult]=useState(saved?saved.prayer:null);
  const[prayRolling,setPrayRolling]=useState(false);
  const[tmResult,setTmResult]=useState(saved?saved.tacticalMind:null);
  const[tmRolling,setTmRolling]=useState(false);
  const parsed=parseRollBox(text);
  let bonus=getBonus(derived,parsed.skill);
  if(parsed.skill==='Intimidation'&&gs&&gs.flags&&gs.flags.pigSkewer)bonus+=1;
  // Aldous mentor: +1 to ROSE-related checks (Persuasion, Medicine, Insight) in Act One
  const roseSkills=['Persuasion','Medicine','Insight','Performance'];
  if(gs&&gs.flags&&gs.flags.aldous_mentor&&roseSkills.includes(parsed.skill))bonus+=1;
  // Apply accumulated roll bonuses from gs.bonuses
  if(gs&&gs.bonuses){gs.bonuses.forEach(b=>{if(b.type==='roll_bonus'&&b.name){const sk=parsed.skill.toLowerCase();const bn=b.name.toLowerCase();if(bn.includes(sk)||bn.includes('any')||bn.includes('all'))bonus+=1}})}
  // Exhaustion penalty (D&D 5e 2024: -1 per level to d20 rolls)
  const exhPenalty=derived?.exhaustionPenalty||0;
  bonus-=exhPenalty;
  const e=React.createElement;

  // Persist a roll result to gs.completedRolls
  const saveRoll=(res,prayer)=>{
    if(!rollKey||!onRollSave)return;
    onRollSave(g=>{const cr={...(g.completedRolls||{})};cr[rollKey]={result:res,prayer:prayer||null};return{...g,completedRolls:cr}});
  };

  // Determine which god to pray to
  const getGod=()=>{
    if(!gs)return'Paladine';
    if(gs.cls==='Paladin'){
      const signs=gs.godSigns||{};
      let best='Paladine',bestVal=0;
      for(const[g,v] of Object.entries(signs)){if(v>bestVal){bestVal=v;best=g}}
      return best;
    }
    return gs.dgTrack==='FALLEN'?'Takhisis':'Paladine';
  };

  // Check for tool advantage
  const toolAdvantage=checkToolAdvantage(gs,parsed.skill);

  const roll=()=>{setRolling(true);setResult(null);setPrayerAvail(false);let c=0;
    const iv=setInterval(()=>{setDisplay(Math.floor(Math.random()*20)+1);if(++c>=10){clearInterval(iv);
      let d20=Math.floor(Math.random()*20)+1;
      let d20b=null;
      // Tool advantage: roll twice, take higher
      if(toolAdvantage){d20b=Math.floor(Math.random()*20)+1;d20=Math.max(d20,d20b)}
      const total=d20+bonus;
      const ok=total>=parsed.dc;
      const res={d20,d20b,total,ok,tool:toolAdvantage};
      setResult(res);setDisplay(d20);setRolling(false);
      saveRoll(res,null);
      if(ok&&onBonus&&parsed.success){
        const stxt=parsed.success.join(' ');
        const bonusPatterns=[
          {re:/\+1 to (?:any |all )?(.+?)(?:check|roll|interaction|track)/i, type:'roll_bonus'},
          {re:/(?:Advantage|advantage) (?:on |in )?(.+?)(?:\.|,|$)/i, type:'advantage'},
          {re:/\+1 (.+?) romance/i, type:'romance_bonus'},
        ];
        bonusPatterns.forEach(bp=>{
          const m=stxt.match(bp.re);
          if(m)onBonus({name:m[0].substring(0,60).trim(),desc:m[0].substring(0,100).trim(),scene:gs?.history?.length?'~'+gs.history.length:'?',type:bp.type});
        });
      }
      if(!ok&&Math.random()<0.10)setPrayerAvail(true);
    }},60)};

  // Tactical Mind (Fighter Lv2+): add 1d10 to failed ability check, uses Second Wind charge
  const canTacticalMind=gs&&gs.cls==='Fighter'&&gs.level>=2&&result&&!result.ok&&!result.skipped&&!tmResult&&!prayerResult&&((derived.secondWindMax||2)-(gs.secondWindUsed||0))>0;
  const useTacticalMind=()=>{setTmRolling(true);let c=0;
    const iv=setInterval(()=>{setDisplay(Math.floor(Math.random()*10)+1);if(++c>=8){clearInterval(iv);
      const d10=Math.floor(Math.random()*10)+1;const newTotal=result.total+d10;
      const ok=newTotal>=parsed.dc;
      const tmRes={d10,newTotal,ok};
      setTmResult(tmRes);setTmRolling(false);
      // Save to completedRolls
      if(rollKey&&onRollSave)onRollSave(g=>{const cr={...(g.completedRolls||{})};cr[rollKey]={result:result,prayer:null,tacticalMind:tmRes};return{...g,completedRolls:cr,secondWindUsed:ok?(g.secondWindUsed||0)+1:(g.secondWindUsed||0)}});
      if(ok&&onBonus&&parsed.success){
        const stxt=parsed.success.join(' ');
        const bonusPatterns=[
          {re:/\+1 to (?:any |all )?(.+?)(?:check|roll|interaction|track)/i, type:'roll_bonus'},
          {re:/(?:Advantage|advantage) (?:on |in )?(.+?)(?:\.|,|$)/i, type:'advantage'},
          {re:/\+1 (.+?) romance/i, type:'romance_bonus'},
        ];
        bonusPatterns.forEach(bp=>{const m=stxt.match(bp.re);if(m)onBonus({name:m[0].substring(0,60).trim(),desc:m[0].substring(0,100).trim(),scene:'tactical_mind',type:bp.type})});
      }
    }},60)};

  const pray=()=>{setPrayRolling(true);let c=0;
    const iv=setInterval(()=>{setDisplay(Math.floor(Math.random()*20)+1);if(++c>=10){clearInterval(iv);
      const d20=Math.floor(Math.random()*20)+1;const total=d20+bonus;
      const ok=total>=parsed.dc;
      const res={d20,total,ok};
      setPrayerResult(res);setPrayRolling(false);setPrayerAvail(false);
      saveRoll(result,res);
      if(ok&&onBonus&&parsed.success){
        const stxt=parsed.success.join(' ');
        const m=stxt.match(/\+1 to (?:any |all )?(.+?)(?:check|roll|interaction)/i);
        if(m)onBonus({name:m[0].substring(0,60).trim(),desc:m[0].substring(0,100).trim(),scene:'prayer',type:'roll_bonus'});
      }

  const isOptional=!parsed.isRequired;
  const finalResult=tmResult?{d20:result.d20,total:tmResult.newTotal,ok:tmResult.ok}:prayerResult||result;
  const showOutcome=finalResult&&!finalResult.skipped;
  
  return e('div',{className:'roll-box-wrapper'},
    e('div',{className:'box roll'},
      parsed.preamble.map((l,i)=>e('p',{key:i,dangerouslySetInnerHTML:{__html:fmt(l)}})),
      parsed.coinflip?e('p',{className:'coinflip',dangerouslySetInnerHTML:{__html:fmt(parsed.coinflip)}}):null
    ),
    parsed.dc?e('div',{className:'dice-area'},
      e('div',{className:'dice-info'},parsed.skill+' \u2022 DC '+parsed.dc+' \u2022 Mod '+(bonus>=0?'+':'')+bonus+(isOptional?' \u2022 Optional':'')+(toolAdvantage?' \u2022 '+toolAdvantage+' (Adv)':'')),
      // Show result
      result?e('div',{className:'dice-result '+(result.ok?'success':'fail')},
        e('span',{className:'dice-num'},result.d20),
        result.d20b!==null?e('span',{className:'dice-bonus',style:{color:'var(--gold)'}},' (adv: '+Math.min(result.d20,result.d20b)+'/'+Math.max(result.d20,result.d20b)+')'):null,
        bonus!==0?e('span',{className:'dice-bonus'},' '+(bonus>=0?'+':'\u2212')+' '+Math.abs(bonus)+' = '+result.total):null,
        e('div',{className:'dice-verdict'},result.ok?'\u2714 SUCCESS':'\u2718 FAILURE')
      ):e('div',{className:'dice-placeholder'},rolling&&display?display:'?'),
      // Roll button: only show if no result yet
      !result?e('button',{className:'dice-btn',onClick:roll,disabled:rolling},rolling?'\u2684 Rolling...':'\u2684 Roll d20'):null,
      // Prayer button: rare divine intervention
      prayerAvail&&!prayerResult?e('div',{className:'prayer-block'},
        e('p',{className:'prayer-text'},'You feel a presence. A warmth at the edge of your awareness.'),
        e('button',{className:'prayer-btn',onClick:pray,disabled:prayRolling},prayRolling?'Praying...':'Pray to '+getGod())
      ):null,
      // Prayer result
      prayerResult?e('div',{className:'prayer-result'},
        e('p',{className:'prayer-flavor'},prayerResult.ok?getGod()+' answers.':'The silence holds. Perhaps another time.'),
        e('div',{className:'dice-result '+(prayerResult.ok?'success':'fail')},
          e('span',{className:'dice-num'},prayerResult.d20),
          bonus!==0?e('span',{className:'dice-bonus'},' '+(bonus>=0?'+':'\u2212')+' '+Math.abs(bonus)+' = '+prayerResult.total):null,
          e('div',{className:'dice-verdict'},prayerResult.ok?'\u2714 DIVINE SUCCESS':'\u2718 UNANSWERED'))
      ):null,
      // Tactical Mind (Fighter Lv2+)
      canTacticalMind?e('div',{className:'prayer-block'},
        e('p',{className:'prayer-text'},'Your tactical instincts sharpen. You can push through this. (Expends a Second Wind use)'),
        e('button',{className:'prayer-btn',style:{background:'#2a4a6b'},onClick:useTacticalMind,disabled:tmRolling},tmRolling?'Focusing...':'\u2694 Tactical Mind (+1d10)')
      ):null,
      // Tactical Mind result
      tmResult?e('div',{className:'prayer-result'},
        e('p',{className:'prayer-flavor'},tmResult.ok?'Your training kicks in. You see it clearly now.':(result.total+' + '+tmResult.d10+' = '+tmResult.newTotal+' — not enough. But the instinct was not wasted.')),
        e('div',{className:'dice-result '+(tmResult.ok?'success':'fail')},
          e('span',{className:'dice-num'},tmResult.d10),
          e('span',{className:'dice-bonus'},' + '+result.total+' = '+tmResult.newTotal),
          e('div',{className:'dice-verdict'},tmResult.ok?'\u2714 TACTICAL SUCCESS':'\u2718 NOT ENOUGH (Second Wind use refunded)'))

    ):null,
    // Outcome text - use prayer result if it exists, otherwise original result
    showOutcome?e('div',{className:'box '+(finalResult.ok?'roll-success':'roll-failure')},
