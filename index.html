gotiating and runs on purpose. She does not look up when you come in. 'Sit with him.' She nods at the old man in the corner who is holding his own hands and staring at nothing with the look of someone who has been frightened long enough to have forgotten what unfrightened felt like. 'Hold his hand. Talk to him. He is frightened and I cannot be in two places at the same time.'","Mira of the Oaks is small and precise, with the steady hands of a healer and the look of someone who takes stock of a room before deciding how to be in it. Dark skin, dark eyes, hair pulled back in the functional style of someone who needs to see clearly and cannot have things in the way. She is younger than her competence suggests — mid-twenties, maybe — but the competence is entirely real."],"boxes":[{"type":"companion","text":"**COMPANION JOINS: MIRA OF THE OAKS**\nHealer and refugee. Will travel with you if you earn her trust.\nRole: Party healer: restores 1d6+2 HP to any companion once per scene."},{"type":"roll","text":"**OPTIONAL ROLL:** Medicine (+1) | WIS | DC 10\n**SUCCESS (roll 10+):** You recall a calming technique. The old man steadies. Mira notices. +1 Mira romance track.\n**FAILURE (roll 1-9):** You do your best. No penalty — the kindness still counted.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**Paladin Note:**\nIf you are a Paladin: you may use Lay on Hands (touch, costs 1 HP from your pool) to ease the old man's pain. This is the first time your power has worked so clearly. Mark 1 tally under MISHAKAL on your God Sign tracker."}],"choices":[{"letter":"A","text":"Sit with the old man until Mira can take over.","target":"21","points":{"ROSE":1},"romance_spark":true},{"letter":"B","text":"Ask Mira how you can be most useful.","target":"21","points":{"ROSE":1,"CROWN":1}},{"letter":"C","text":"Apologise — you have training — and leave.","target":"11","points":{"ROSE":-1}},{"letter":"D","text":": Return to where you were. Carry what you learned here.","target":"8","points":{}}]},"10":{"id":"10","title":"THE ADMISSION","location":"","prose":["*Castle Brightholm — Chapel Steps*","Aldous laughs. Not the polite laugh of someone managing you — a genuine one, warm and immediate, with the deep lines around his eyes that come from a lifetime of doing it. 'Every squire worth their salt feels that,' he says. 'The ones who do not are the ones I worry about.' He settles back in his chair with the unhurried quality of someone who is exactly where he intended to be this morning. 'The question,' he says, 'is not whether you feel it. The question is what you do with it. Which brings us to what you are actually afraid of.' He waits. He is good at waiting. You get the sense he has had this conversation a great many times and has learned that the silence does more work than the prompting.","He sets down the commentary text he was pretending to read and looks at you with the specific attention of someone who has been waiting for this particular conversation since the first week you arrived. 'You are the kind of squire who asks whether they are good enough,' he says. 'That is a more interesting question than the ones most of your cohort are asking. The ones asking it are rarely the ones I end up worried about.'"],"boxes":[],"choices":[{"letter":"A","text":"'I am afraid I will do everything right and it will not be enough.'","target":"20","points":{"SWORD":2}},{"letter":"B","text":"'I am afraid I will make the wrong choice when it actually matters.'","target":"20","points":{"ROSE":2}},{"letter":"C","text":"'I am afraid I will not know the right choice until it is too late.'","target":"20","points":{"ROSE":1,"CROWN":1}}]},"11":{"id":"11","title":"THE DAY BEGINS","location":"","prose":["*Castle Brightholm — Main Courtyard*","The bell rings at the same time it always does. Formation assembles in the main courtyard with the efficiency of people whose bodies have been doing this for eight months without consulting them. You find your place. Aldric finds his, three feet to your right, where he has been every morning for eight months.","**IF VAEL IS IN YOUR PARTY:** Vael is three positions to your left in formation. She does not look at you. She is looking at Caeron, with the same focused assessment you have seen her bring to her own sword dents — the attention of someone who is studying how a thing works so she can understand why it sometimes doesn't. After formation she catches your eye. A slight nod. Not casual. The nod of someone who has been paying attention and wants you to know it.","Lord Caeron reads out the day's assignments with the unhurried precision of a man who has already decided everything and is now informing you of the results. Field exercise. South road. Reported bandits. He reads out the pairs. Your name, then Aldric's. You feel Aldric absorb it without moving."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** History (INT, proficiency if trained) (+3) | INT | DC 11\n**SUCCESS (roll 11+):** You recall a garrison briefing from three weeks ago: there have been refugee reports on the south road for over a month, not just the past few days. Someone suppressed those earlier reports. The 'bandits' may have been there much longer than the official timeline suggests.\n**FAILURE (roll 1-10):** You have no specific knowledge of the south road beyond what Caeron just said.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**OPTIONAL SCENE — DRAGONLANCE CAMEO**\nBefore your preparation choice below: if you want a brief encounter with a canon character from the Dragonlance world, turn to Scene 11B now. It is non-mandatory flavour. Return here after 11B."}],"choices":[{"letter":"A","text":"Continue to Scene 12 — the spar.","target":"12","points":{}},{"letter":"B","text":"A familiar face in the courtyard (Scene 11B — optional canon encounter)","target":"11B","points":{}},{"letter":"C","text":"Plan the exercise with Aldric together.","target":"22","points":{"ROSE":1,"CROWN":1}},{"letter":"D","text":"Find Thessaly first — she may have intelligence.","target":"23","points":{"ROSE":1}},{"letter":"E","text":"Train harder. You want to be sharp.","target":"24","points":{"SWORD":1}},{"letter":"F","text":"Check on Mira before you march.","target":"25","points":{"ROSE":1}},{"letter":"G","text":"Go to the mess hall. Eat. Watch. Learn.","target":"33","points":{"ROSE":1}},{"letter":"H","text":"Take a night watch shift. The wall has things to teach you.","target":"34","points":{"SWORD":1}},{"letter":"I","text":"Visit the forge. Your blade needs attention.","target":"35","points":{"SWORD":1}},{"letter":"J","text":"Check the infirmary for refugees.","target":"9","points":{"ROSE":1}},{"letter":"K","text":"Spend the evening getting to know your companions better.","target":"BOND_CAMP","points":{}}]},"11B":{"id":"11B","title":"A FAMILIAR FACE IN THE COURTYARD","location":"","prose":["*Castle Brightholm — Main Courtyard*","At the edge of the morning formation there is a young man you have not seen before. Not a garrison squire — his armour is older, a knight's kit that has been carefully maintained through years of use rather than stored and polished for ceremony. The Brightblade family crest. He stands in the formation anyway, because standing in formation is what you do, and he is clearly the kind of person who does what you do.","Ser Aldous speaks to him after formation. A brief exchange. The young man listens with the complete attention of someone who does not take instruction for granted. He nods once. He does not look as though things are going particularly well for him. He looks as though he intends to do the honourable thing regardless.","When formation breaks he catches your eye. A slight nod — not casual, formal. The greeting of one squire to another. His name is Sturm. He is passing through on his way south and needed a place to sleep. 'The Knighthood still stands,' he says, when you ask why he wears the armour when he could wear anything. 'Someone should act as though it does.'","The spar with Aldric is part of the morning routine. After the spar — and after formation, where Lord Caeron reads out the day's assignments — the real decisions begin. The field exercise on the south road is tomorrow. Today is preparation. How you spend it matters."],"boxes":[{"type":"info","text":"**DRAGONLANCE CAMEO — OPTIONAL SCENE**\nThis scene is non-mandatory flavour. It introduces a canon character from the Dragonlance world who may reappear in the main campaign."},{"type":"info","text":"**Who Is Sturm Brightblade?**\nSturm Brightblade is one of the Companions of the Lance — the heroes of the War of the Lance. At this point in the timeline he is a squire himself, working to prove himself worthy of the Knighthood his father abandoned. He takes the Oath of Measures more seriously than most knights. He will fight for anyone who cannot fight for themselves. He will die for it one day. Right now he is just a young man who sleeps in garrison stables when he has to and acts like a knight when he does not have to."}],"choices":[{"letter":"S1","text":"Tell him you admire the conviction. He looks surprised — not many say that.","target":"11","points":{"ROSE":1}},{"letter":"S2","text":"Ask him about his father. He is quiet a moment. 'He left the Order. I chose not to.'","target":"11","points":{"ROSE":1}},{"letter":"S3","text":"Nod back. Let the moment be what it is.","target":"11","points":{"CROWN":1}},{"letter":"A","text":"Plan the exercise with Aldric together.","target":"22","points":{"ROSE":1,"CROWN":1}},{"letter":"B","text":"Find Thessaly first — she may have intelligence.","target":"23","points":{"ROSE":1}},{"letter":"C","text":"Train harder. You want to be sharp.","target":"24","points":{"SWORD":1}},{"letter":"D","text":"Check on Mira before you march.","target":"25","points":{"ROSE":1}},{"letter":"E","text":"Check the infirmary. There was mention of refugees arriving in the night.","target":"9","points":{"ROSE":1}},{"letter":"F","text":"Go to the mess hall. Eat. Watch. Learn.","target":"33","points":{"ROSE":1}},{"letter":"G","text":"Take a night watch shift. The wall has things to teach you.","target":"34","points":{"SWORD":1}},{"letter":"H","text":"Visit the forge. Your blade needs attention.","target":"35","points":{"SWORD":1}}]},"12":{"id":"12","title":"THE SPAR","location":"","prose":["*Castle Brightholm — Training Yard*","Twenty minutes in and you are evenly matched. This is not how this usually goes — Aldric Voss has been beating you in sparring for seven months by the specific margin of someone who is better and knows it and does not need to prove it further. Tonight the margin has disappeared. He pauses, breathing hard, and looks at you with an expression that takes a moment to identify because you have not seen it before: surprised. Not unhappy. Surprised.","'You have been watching me,' he says. Not an accusation. An assessment. He looks pleased in the way that people who take competition seriously look pleased when the competition is finally worth their attention. 'The tell. You found it.' You did. Three months ago. You said nothing. 'Good,' he says — and means it — and raises the practice sword again.","The spar is over. The morning bell rings. Formation assembles. Whatever happened between you and Aldric in the yard — the gap, the finding, the almost-laugh — is something you will both carry into the day without mentioning. That is also something."],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Athletics (+3) | STR | DC 14\n**SUCCESS (roll 14+):** You find the gap on his third combination. He goes down on one knee, laughing. +2 SWORD. His respect is genuine now.\n**FAILURE (roll 1-13):** He wins by a narrow margin. +1 SWORD. 'Better than last month.'\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Let him win. Concede with grace.","target":"11","points":{"CROWN":1},"romance_spark":true},{"letter":"B","text":"Take your opening. Win clean.","target":"11","points":{"SWORD":2}},{"letter":"C","text":"Call it a draw.","target":"11","points":{"ROSE":1,"CROWN":1}}]},"13":{"id":"13","title":"THE REPAIRED SWORD","location":"","prose":["*Castle Brightholm — Armoury*","The armoury smells of iron filings and neatsfoot oil and the particular efficiency of a woman who has been doing this work for longer than you have been alive and views every preventable problem as a small personal insult. She takes your sword without comment, examines the pommel dent with the expression of someone who has seen worse but finds worse no consolation, and sets it in the repair queue. While you wait, Lord Caeron arrives for his monthly equipment review. He acknowledges you with the absence of acknowledgment that means he has registered you and is thinking about it.","He works his way through the rack with the same clipboard efficiency. When he reaches your sword — the dent now smoothed, the pommel flush and clean — he holds it at eye level for exactly the same amount of time as every other sword. He makes his mark. He sets it down. He moves to the next one. He does not comment. You understand, from everything you know about Lord Caeron Ashvale, that not commenting is the comment."],"boxes":[],"choices":[{"letter":"A","text":"'Thank you, my lord.' Accept it quietly.","target":"11","points":{"CROWN":1}},{"letter":"B","text":"'What do you look for in a squire, my lord?'","target":"28","points":{"ROSE":1}},{"letter":"C","text":"'I notice you inspect your own equipment personally.'","target":"29","points":{"ROSE":1},"romance_spark":true}]},"14":{"id":"14","title":"I CAN DO BETTER","location":"","prose":["*Castle Brightholm — Assessment Hall*","He does not look up. He makes a small mark on his clipboard. Then: 'Then do.' You turn to go. You are almost at the door when he adds — same tone, almost to himself but not quite: 'The dent is a small thing. It is the attention to small things that determines a knight's character.' He is already looking at the next item on his list. The assessment is over. The other thing hangs in the empty hall.","You are in the corridor when you fully understand what he said. Not the 'then do' — that was expected, brisk, over. The other thing. The one he said almost to himself. The dent is a small thing. It is the attention to small things. He is not talking about the sword. You replay it three times in the next twenty steps and by the third time you have decided it is the most useful thing anyone has said to you this week, possibly this month."],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nHe watches you leave. The pause before he returns to his papers is slightly longer than necessary."},{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 14\n**SUCCESS (roll 14+):** He said it to your back because he cannot say it to your face — not yet. That addendum cost him something. He does not give unsolicited assessments. You are the first squire this year he has followed with an additional remark. ROMANCE SPARK Caeron activates at Advantage if you act on this knowledge.\n**FAILURE (roll 1-13):** He speaks to the room. You are not sure if the remark was for you or habit.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Go directly to the armoury and fix the dent today.","target":"13","points":{"CROWN":2}},{"letter":"B","text":"Find Aldric — spar and work off the feeling.","target":"3","points":{"SWORD":1}}]},"15":{"id":"15","title":"THE POINTED QUESTION","location":"","prose":["*Castle Brightholm — Assessment Hall*","'Satisfactory is not the highest mark given today,' he says. 'Ser Voss received the same. You and he are currently equal. That answer will be the last one that surprises me from you. I would advise you not to lose the instinct that generated it.'","He leaves before you can respond. The hall is briefly, completely quiet. The other squire who was waiting for their result has apparently vanished. You stand in the empty corridor with the feeling of someone who has just been told something important in a language they are still learning."],"boxes":[],"choices":[{"letter":"A","text":"File it away and move on.","target":"11","points":{"CROWN":1}},{"letter":"B","text":"Find Aldric and tell him. He will find it funny or annoying. Probably both.","target":"11","points":{"ROSE":1}},{"letter":"C","text":"Ask around about Lord Caeron. Who is he really?","target":"30","points":{"ROSE":1}}]},"16":{"id":"16","title":"WHAT THESSALY WRITES DOWN","location":"","prose":["*Castle Brightholm — East Gate*","'That is the first honest answer I have gotten all week.' She asks if she can follow your progress through the Trials. In exchange, she will share what she hears.","There is something in how she frames it — not 'may I follow your progress' but a genuine exchange, an offer of her own access for yours. She has better intelligence than the garrison. You can see that from the map she carries and the ink still drying on the page she just turned. She has been here three days and she already knows things Lord Caeron does not. Whatever she is writing down, it is worth having her write it."],"boxes":[],"choices":[{"letter":"A","text":"Yes. An ally who hears everything is valuable.","target":"11","points":{"ROSE":1}},{"letter":"B","text":"Yes, but you want to read what she writes first.","target":"11","points":{"CROWN":1}},{"letter":"C","text":"You would rather she observed and formed her own conclusions.","target":"19","points":{"ROSE":2}}]},"17":{"id":"17","title":"THE FAMILY NAME","location":"","prose":["*Castle Brightholm — East Gate*","'Six generations. Does that feel like a gift or a weight?'","It is the kind of question that sounds simple and isn't. Thessaly asks it the way she asks everything — without judgment already loaded into it, genuinely waiting to see what you say. Her pen is not moving. Whatever you answer, she is listening, not transcribing.","She found you near the east wall, which is not a coincidence. Thessaly Brightwater does not accidentally find people. The evening is cold and the torches have been lit and the garrison has the quieter particular quality of a place preparing for something. She has her notebook closed, which means this is not on the record, and her pen behind her ear, which means she might change her mind."],"boxes":[],"choices":[{"letter":"A","text":"'Both. Always both.'","target":"16","points":{"ROSE":2}},{"letter":"B","text":"'A gift. I carry it proudly.'","target":"11","points":{"CROWN":2}},{"letter":"C","text":"'Mostly a weight lately.'","target":"16","points":{"ROSE":1},"romance_spark":true}]},"18":{"id":"18","title":"THE STRANGER IN THE BARN","location":"","prose":["*South Road — Night*","The barn was supposed to be empty. Night patrol sweep, routine, you have done a hundred of these. Your lantern finds them behind the hay bales: dark clothes, a wound managed for at least a day without proper materials, eyes that come up to meet yours with the calm of someone who has set fear aside for later as a matter of function. The clothes are civilian. The cuts where insignia were removed are still visible in the fabric."],"boxes":[{"type":"companion","text":"**COMPANION JOINS: COMMANDER SERATH (CONDITIONAL)**\nDragon Army defector, possible love interest. Joins ONLY if you hide them.\nRole: Intelligence on Dragon Army movements and patrol schedules."},{"type":"roll","text":"**ROLL REQUIRED:** Insight (+1) | WIS | DC 14\n**SUCCESS (roll 14+):** They are telling the truth. The fear points south, not at you. Choose with full knowledge.\n**FAILURE (roll 1-13):** You cannot read them. You decide blind.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**Paladin Note:**\nIf you are a Paladin: your Divine Sense activates involuntarily. Serath is not fiend, undead, or celestial — they register as a person in genuine distress. The reading is clean. This is a human who is afraid. Mark 1 tally under MISHAKAL (the god of mercy toward the wounded)."}],"choices":[{"letter":"A","text":"Hide them. Treat the wound. Sort the implications later.","target":"36","points":{"ROSE":1},"romance_spark":true},{"letter":"B","text":"Ask them to prove the defection first.","target":"37","points":{"ROSE":1}},{"letter":"C","text":"Tell Aldric — this is a two-person decision.","target":"38","points":{}},{"letter":"D","text":"Report them immediately.","target":"39","points":{"CROWN":2}}]},"19":{"id":"19","title":"THE FIRM WORD","location":"","prose":["*Castle Brightholm — Squire Quarters*","You stand in the restored quiet of your tent. The quill is back on the footlocker. Everything is exactly where it should be. You are not sure why this is unsatisfying.","The interaction with Zinnia — who borrowed your quill to write something she called 'extremely urgent correspondence' and returned it covered in blue ink — was brief, entirely reasonable on your part, and is now sitting oddly. You were polite. You were clear. She left without apparent offense. None of this explains the specific quality of the silence she left behind."],"boxes":[],"choices":[{"letter":"A","text":"Go after her and apologise — you were too stiff.","target":"7","points":{"ROSE":1}},{"letter":"B","text":"Let it go. She understood.","target":"11","points":{}}]},"20":{"id":"20","title":"WHAT ALDOUS KNOWS","location":"","prose":["*Castle Brightholm — Chapel Steps*","'A village. Twenty years ago. I had orders that were legal. That followed the Measure to the letter. And they were wrong. I followed them anyway because I told myself it was not my place to decide. The village is not there anymore.' He says it the way someone says a thing they have said before — out loud, to themselves, in the dark — enough times that the words are worn smooth. Not healed. Smooth.","He is quiet for a moment. The chapel library is cold and the candle between you is down to its last inch and neither of you moves to replace it. 'I tell you this,' he says finally, 'not because it is a cautionary tale. It is not a cautionary tale. It is a true story about what happens when you let the law do your thinking. The Measure exists to protect people. If you ever hold the Measure in one hand and a person in the other and you are not certain which one matters more — that uncertainty is the answer.' He closes the commentary text. The lesson is over. The weight of it is not."],"boxes":[{"type":"info","text":"**You Gain:**\nAldous's Trust. Unlocks a critical path in Scene 31."},{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 13\n**SUCCESS (roll 13+):** He has told this story before — not often, but deliberately. He chose to tell it to you now and not six months ago. Something about how you asked made him think you were ready for it. He is giving you the most important thing he can: evidence that the Measure can become a shield if you let it. This is instruction, not confession.\n**FAILURE (roll 1-12):** It is a heavy story told plainly. You receive it as such.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Thank him. Mean it.","target":"11","points":{"ROSE":1}},{"letter":"B","text":"Sit with him in silence a while longer.","target":"11","points":{"ROSE":2}}]},"21":{"id":"21","title":"THE HEALER'S GIFT","location":"","prose":["*Castle Brightholm — Infirmary*","She prepared it before you asked — before the assignment was formally posted, even. Dried yarrow. Clean bandages rolled tight. A small clay jar of salve smelling of pine and something you cannot name. 'The yarrow slows bleeding. Press hard and do not move them until it stops. The salve is for infection — draconian wounds tend to close wrong without it.' She says this the way she says everything medical: factual, complete, without drama. Her hand is warm when yours brush taking the bundle. She does not pull away immediately."],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nHer hand is warm when yours brush. 'Be careful,' she says — two words carrying more weight than their purpose."},{"type":"info","text":"**ADD TO INVENTORY — MIRA'S TRAVEL BUNDLE**\nMira prepared this before you asked. Native PC and CPC: add to your inventory or equipment list. • Dried yarrow (press hard: slows bleeding, DC 10 Medicine to apply) • Clean bandages (2 uses, each stabilises at 1 HP) • Pine salve (prevents infection in draconian wounds — use within 1 hour of injury)"}],"choices":[{"letter":"A","text":"'I will. Thank you.' Hold her gaze.","target":"22","points":{"ROSE":1},"romance_spark":true},{"letter":"B","text":"Ask her to come as a field medic.","target":"22","points":{"ROSE":2}},{"letter":"C","text":"Accept efficiently and leave.","target":"22","points":{"CROWN":1}}]},"22":{"id":"22","title":"ALDRIC'S PLAN","location":"","prose":["*Castle Brightholm — Map Room*","He already has a plan. Aldric Voss does not arrive at planning sessions — he arrives to them. The approach routes are sketched in charcoal on the back of his exercise schedule with timing estimates and threat assessments in his small precise handwriting. 'Three approaches. Direct is fastest but visible from the ridge. East through the treeline is slower but quiet. West crosses the river and needs a ford.' He looks at you after each one. Not for permission. For what you think. This is what trust looks like when Aldric Voss demonstrates it."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** History (+3) | INT | DC 11\n**SUCCESS (roll 11+):** The eastern treeline has a hidden ford — the route is faster than Aldric thinks.\n**FAILURE (roll 1-10):** You have no useful knowledge of this terrain.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"'East. Agreed.'","target":"40","points":{"CROWN":1}},{"letter":"B","text":"'Direct. We are knights, not scouts.'","target":"41","points":{"SWORD":1}},{"letter":"C","text":"'What is on the west bank? I want more information.'","target":"42","points":{"ROSE":2}},{"letter":"D","text":"'East — but split up. Meet at the ridge.'","target":"43","points":{"SWORD":1,"ROSE":1}},{"letter":"E","text":"'Wait. Let me check with Sera first — she has been watching the south road.'","target":"40","points":{"ROSE":1,"CROWN":1}}]},"23":{"id":"23","title":"THESSALY'S INTELLIGENCE","location":"","prose":["*Castle Brightholm — East Gate*","Thessaly has a better map than the garrison does. Not better as in more detailed — better as in updated, with marks the garrison does not have, from sources the garrison has not consulted. She spreads it on the table in the field tent and shows you a red mark. 'Refugees,' she says. 'About thirty. Here, not here' — she taps the bandit location — 'here.' The second location is further south. 'The bandit report and the refugee report are from the same place. Draw your own conclusions.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Investigation (INT, proficiency if trained) (+3) | INT | DC 13\n**SUCCESS (roll 13+):** Thessaly's map has three additional marks she did not explain. Cross-referencing with garrison road records: the Dragon Army has made at least two probing passes on this road in the last month. The refugees are not just fleeing the war — they are fleeing something that has been methodically clearing the area ahead of the main advance.\n**FAILURE (roll 1-12):** The map shows what Thessaly told you. Nothing more is visible.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Take the map directly to Lord Caeron before the exercise.","target":"44","points":{"CROWN":2}},{"letter":"B","text":"Share it with Aldric and plan together.","target":"22","points":{"ROSE":1,"SWORD":1}},{"letter":"C","text":"Ask Thessaly to come with you as an observer.","target":"45","points":{"ROSE":1}}]},"24":{"id":"24","title":"SHARPENING THE BLADE","location":"","prose":["*Castle Brightholm — Training Yard*","You train until the light fails. Running forms. Working the gap in your guard that you spotted in Scene 3 and have been quietly furious about ever since. The yard empties around you. The evening bell rings. You keep going.","There is a particular quality to training when no one is watching — no evaluation marks, no Caeron with his clipboard, no Aldric to compete with. Just you and the forms and the steady accumulation of marginally better. It is not exciting. It is the point. Aldric finds you packing up. 'You have improved,' he says. From Aldric Voss, this is equivalent to a sonnet."],"boxes":[],"choices":[{"letter":"A","text":"'Yes.' You mean it.","target":"22","points":{"SWORD":1}},{"letter":"B","text":"'Ask me at the end of tomorrow.'","target":"22","points":{"ROSE":1}},{"letter":"C","text":"'I will not be ready until I am there.'","target":"22","points":{"ROSE":1}}]},"25":{"id":"25","title":"BEFORE THE MARCH","location":"","prose":["*Castle Brightholm — Infirmary, Dawn*","She is awake before you come. The infirmary at pre-dawn has the quality of somewhere that has been working all night without anyone noticing. She hands you the folded paper before you speak — the yarrow directions in her careful hand. 'I prepared it this morning. Just in case.' She looks away when she says it. Not evasively — the way people look away when they are giving you something they cannot take back and they need a moment to finish releasing it. 'Be careful today.'"],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nYou stand in the infirmary doorway with morning light behind you and Mira will not quite look at you and you will not quite leave."}],"choices":[{"letter":"A","text":"'I will come back and tell you how it went.'","target":"22","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"Nod. Say nothing. It means the same thing.","target":"22","points":{"ROSE":1}},{"letter":"C","text":"March south — the road ambush awaits (Scene 26)","target":"26","points":{}}]},"33":{"id":"33","title":"THE MESS HALL","location":"","prose":["*Castle Brightholm — Midday*","The mess hall operates on a schedule that has not changed in forty years, which is either a testament to institutional consistency or evidence that no one with authority has eaten here recently. Long trestle tables, benches worn smooth, the smell of bread and something involving turnips that has been a source of garrison debate since before you arrived. The bread is good. The bread has always been good. The rest is a matter of opinion held by people who have stopped expecting otherwise.","Aldric eats like he does everything else — efficiently, without wasted motion, finishing before you are half done. Across the hall, Thessaly is interviewing one of the kitchen staff. Whatever she is learning about turnip procurement is, knowing Thessaly, somehow connected to garrison supply routes and by extension the Dragon Army's logistical capacity. Two tables down, Ser Aldous eats alone with a book open beside his plate and the comfortable air of a man who considers a meal without reading a meal wasted."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Perception (WIS, proficiency if trained) (+1) | WIS | DC 10\n**SUCCESS (roll 10+):** At the corner table, partly hidden by the pillar: Lord Caeron is eating alone. He is not reading. He is watching the room — specifically, the squires. Specifically, for slightly longer than the others, you. When your eyes meet he looks down at his plate with the speed of someone who was not expecting to be caught. +1 to any Caeron Insight check this Act.\n**FAILURE (roll 1-9):** The mess hall is busy and loud and you notice nothing beyond the turnips.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**NPC CROSS-TALK — ALDRIC AND THESSALY**\nAldric and Thessaly are arguing — not loudly, but with the focused energy of two people who are both certain they are correct. The subject, as far as you can tell: whether the garrison's intelligence on the south road is adequate. Thessaly thinks it is catastrophically insufficient. Aldric thinks the chain of command will provide. They are both, in different ways, right. Thessaly catches your eye mid-argument and raises one eyebrow — an invitation to weigh in, or permission to enjoy the show."}],"choices":[{"letter":"A","text":"Join the argument. Side with Thessaly — the intelligence is inadequate.","target":"11","points":{"ROSE":1}},{"letter":"B","text":"Join the argument. Side with Aldric — the chain of command exists for a reason.","target":"11","points":{"CROWN":1}},{"letter":"C","text":"Listen. Do not weigh in. Take the bread.","target":"11","points":{"ROSE":1}},{"letter":"D","text":"Sit with Aldous instead. You want to ask about something.","target":"4","points":{"ROSE":1}}]},"34":{"id":"34","title":"THE WATCH","location":"","prose":["*Castle Brightholm — East Wall, Night*","The night watch is four hours of looking at darkness and learning what darkness sounds like when nothing is in it. The east wall faces the road and the road faces south and south is where, at some indeterminate distance, something is happening that has not reached you yet. The stars are Solinari, half-full, and whatever scattered light the lesser moons provide. The wall is cold stone and you lean against it and breathe and the air smells of pine and frost and the particular mineral quality of a late autumn night in northern Solamnia.","You are alone for the first hour. Then you are not.","**IF SERA IS IN YOUR PARTY:** Sera appears without announcement, as she does. She sits on the wall rather than leaning against it, legs dangling over the dark, and for ten minutes she says nothing. Then: 'Listen.' You listen. Wind. Pine. The creak of the gate timber. Nothing. 'Exactly,' she says. 'That is what worries me. No night birds. They stopped two days ago.' She looks at you with the flat professional gaze that means she is trusting you with something she has not told the senior officers yet. 'Something is on the south road. Something that frightened the wildlife before the patrols noticed.'","**IF SERA IS NOT IN YOUR PARTY:** You are alone for the four hours. This is not a hardship. There is a particular quality to standing watch that you have come to value — the suspension of the day's noise, the reduction to essentials: eyes, ears, the dark, the question of what is in it. You learn more about Castle Brightholm from its silence than from its bustle. The stone cools at a rate that tells you the season. The wind shifts at the second hour, carrying something from the south that is not quite smoke and not quite nothing."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Perception (WIS, proficiency if trained) (+1) | WIS | DC 13\n**SUCCESS (roll 13+):** Just before the third hour: a light on the south road. Brief — a lantern uncovered and covered again, the signal pattern used by Solamnic scouts to report all-clear. But the garrison did not send a scout tonight. Someone is using Solamnic signals on the south road and the garrison did not authorise it. This is relevant in Scene 53B.\n**FAILURE (roll 1-12):** The night is dark and clear and empty. Four hours. Nothing to report.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**Paladin Note:**\nIf you are a Paladin: at the quietest part of the watch — the hour between two and three when even the wind stops — something happens. Not a vision. Not a voice. A feeling, behind your sternum, of being accompanied. Of someone standing watch with you who is not visible and not intrusive and simply: present. It lasts ten minutes. When it ends the cold feels less cold and you are certain, without evidence, that whatever is on the south road will not arrive tonight. Mark 1 tally under whichever god feels right. This is a small sign. Small signs count."}],"choices":[{"letter":"A","text":"Report the light to Caeron at dawn.","target":"11","points":{"CROWN":1,"ROSE":1}},{"letter":"B","text":"Tell no one. Watch more carefully tomorrow.","target":"11","points":{"SWORD":1}},{"letter":"C","text":"Share it with Sera . Two sets of eyes are better.","target":"11","points":{"ROSE":1}}]},"35":{"id":"35","title":"THE FORGE","location":"","prose":["*Castle Brightholm — Armoury Forge, Afternoon*","The forge is the loudest place in Brightholm and the warmest. Bronwyn — the armourer, who has been here longer than Ser Aldous and sees no reason to say so — works the bellows with the steady rhythm of someone whose body stopped distinguishing between work and breathing years ago. The heat is a wall. The sound is a heartbeat. The smell is hot iron, coal, neatsfoot oil, and the specific human smell of someone who has been sweating productively since before dawn.","She does not acknowledge you for three minutes. This is not rudeness — Bronwyn has standards, and one of them is that she finishes what she is doing before she decides whether the interruption is worth her attention. When she does look up, she looks at your sword first and you second. This tells you everything about Bronwyn's hierarchy of values.","'Let me see it.' Not a request. She takes the sword, holds it to the light, turns it twice. Examines the edge where you have been sharpening it yourself. Makes a sound that is not approval but is the absence of disapproval, which from Bronwyn is considerable.","'You sharpen it too far forward,' she says. 'Two inches behind the point is where the work happens in a real fight. Not the tip. The belly.' She shows you. Her hands on the blade are as precise as a surgeon's. In three strokes she changes something you cannot quite identify and when she hands it back the balance is different. Better. You wonder how long the sword has been wrong and how long she has been waiting for you to bring it in."],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Investigation (INT, proficiency if trained) (+0) | INT | DC 11\n**SUCCESS (roll 11+):** While she works, you notice something on the forge wall — a Solamnic Knight's insignia, old, scorched. Not displayed. Set aside. 'My husband's,' she says, without being asked. 'Knight of the Rose. Died at Vingaard. The insignia survived the fire.' She does not say anything else about it. She does not need to. The forge is hot and the hammer falls and someone who loved a Knight of the Rose is still here, maintaining the swords, and has been for a very long time.\n**FAILURE (roll 1-10):** She finishes her work. You learn about sword maintenance. The forge is loud and hot and that is all.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**ADD TO KNOWLEDGE — SWORD MAINTENANCE**\nBronwyn's correction is permanent. Your longsword now has a +1 bonus to damage rolls against enemies in medium armour or heavier (you know where to aim). This bonus stacks with existing weapon modifiers. Mark this on your character sheet."}],"choices":[{"letter":"A","text":"Ask her about the insignia.","target":"11","points":{"ROSE":1}},{"letter":"B","text":"Ask her to teach you more about blade work.","target":"11","points":{"SWORD":1}},{"letter":"C","text":"Thank her and leave. She has work to do.","target":"11","points":{"CROWN":1}}]},"M1":{"id":"M1","title":"THE LETTER AND THE SPIRIT","location":"","prose":["*Castle Brightholm — During Act One (Fighter Only)*","Ser Aldous stops you in the corridor two days after your conversation in the library. He has a book under his arm — not the Measure, something older, the binding cracked. 'Walk with me,' he says. He takes you to the garrison's east wall and shows you the southern road. A traveller is being turned away at the gate. The traveller has valid papers. The gate guard has a standing order: no travellers past the third bell. It is not yet the third bell by four minutes. The gate guard is being technically correct and functionally unkind."],"boxes":[{"type":"info","text":"**FIGHTER ONLY**\nThis scene becomes available after Scene 8 (Ser Aldous on Justice). Read Scene 8 first. Paladins: your divine scenes (P-track) cover this ground differently — skip to Scene 9."},{"type":"info","text":"**THE MEASURE: THE MEASURE ON INTERPRETATION**\nThe Measure was written to govern knights, not gate guards. But the same logic applies: the law is only as good as its interpretation. A law followed with malice is not the Measure. A law followed with judgment is. The question Aldous is asking, without asking it: when you hold the Measure, will you hold the letter or the intention?"}],"choices":[{"letter":"A","text":"Speak to the gate guard. The traveller has valid papers and the bell has not rung. The order should be followed as written — which means the traveller passes.","target":"M1_letter","points":{"CROWN":2,"ROSE":1}},{"letter":"B","text":"Let it go. The guard is following orders. The traveller will find lodging. This is not a Measure problem.","target":"M1_restrain","points":{"CROWN":1}},{"letter":"C","text":"Ask the guard why. Not to correct him — to understand his reasoning. Then, depending on the answer, decide.","target":"M1_ask","points":{"ROSE":2}}]},"M1_letter":{"id":"M1_letter","title":"THE LETTER WELL USED","location":"","prose":["*Castle Brightholm East Gate*","The guard is annoyed but cannot argue. The traveller passes. Aldous watches you the whole time with the expression of someone marking a test paper he expected to be harder. 'The letter well used,' he says. 'You can defend that decision at any Measure tribunal in Solamnia. You can also defend it to the traveller. Both matter.' He hands you the old book. 'Read the third chapter when you have time. It is about what happens when the letter is used badly.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +2 — THE LETTER**\nYou are learning the Measure as a tool. Mark +2 on your Measure track. How you use this learning in M3 and M4 will shape your gift."}],"choices":[{"letter":"A","text":"Continue to Scene 9.","target":"9","points":{}}]},"M1_restrain":{"id":"M1_restrain","title":"THE RESTRAINT","location":"","prose":["*Castle Brightholm East Gate*","You let it go. The guard is following his orders. The traveller leaves. Aldous nods slowly. 'Restraint is its own form of judgment,' he says. 'The Measure does not require you to intervene in everything. Knowing when not to act is as important as knowing when to act.' He pauses. 'The traveller will be fine. The guard will keep doing this. At some point you will have to decide whether that concerns you.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +1 — RESTRAINT**\nMark +1. Your path leans toward deliberate judgment over immediate action. This will matter at M3."}],"choices":[{"letter":"A","text":"Continue to Scene 9.","target":"9","points":{}}]},"M1_ask":{"id":"M1_ask","title":"THE QUESTION","location":"","prose":["*Castle Brightholm East Gate*","The guard's reason: he was told the order means no exceptions and he does not want trouble. You let the traveller through. Then you tell the guard, simply: 'The order says third bell. Four minutes before the bell is before the bell.' You do not report him. You do not lecture him. Aldous says nothing for a while. Then: 'You asked why before you judged. Most people do it the other way around. Most of the time that is a mistake.'"],"boxes":[{"type":"measure","text":"**MEASURE TRACK: +3 — THE QUESTION**\nHighest first-scene gain. Mark +3. You are learning the Measure through understanding, not just rule. This path is the hardest and the most useful."}],"choices":[{"letter":"A","text":"Continue to Scene 9.","target":"9","points":{}}]},"26":{"id":"26","title":"THE SOUTH ROAD AMBUSH","location":"","prose":["*South Road — Day 1 of Exercise*","The south road is pine-scented and cold and then the treeline erupts. Three miles from Brightholm — close enough that you could still, if you strained, hear the morning bell — four Baaz Draconians come out of the trees with the businesslike certainty of a unit that has done this before and expects it to work. They cut off the road. They advance. No parley. Aldric's hand is on his sword hilt. So is yours, you notice, before you consciously decided."],"boxes":[{"type":"info","text":"**Paladin Note: Before the Fight**\nIf you are a Paladin: in the half-second before the draconians move, you hear something — a voice, barely there, like a command shouted across a great distance. It is one word. You cannot quite catch it. But your hand is already on your sword and you feel no fear. Mark 1 tally under KIRI-JOLITH (the god who steadies soldiers before battle)."},{"type":"combat","text":"**COMBAT ENCOUNTER — DRAGON ARMY SCOUT PATROL**\nSetup: Four Baaz Draconians block the road. Aldric fights beside you.\n**ENEMIES:**\n• Baaz Draconian x4: AC 13, HP 18 each, Speed 30 ft.\n• Shortsword +3, 1d6+1 piercing. Or Javelin +3, range 30/120 ft., 1d6+1.\n• Death Throes: Turns to stone at 0 HP. DC 10 DEX save or restrained 1 min.\n**YOUR STATS THIS FIGHT:** Fighter: HP 12, AC 16, Longsword +5 1d8+3. Second Wind available. Aldric: AC 15, HP 14, +1 to your rolls. Paladin: HP 10, AC 16, Longsword +5 1d8+3. Lay on Hands pool available. Divine Smite: expend a spell slot (at Level 2) for +2d8 radiant.\nEnemy Tactics: Two draconians rush the closest target. Two hang back with javelins. Killing two causes the remaining two to spread rather than retreat.\nFleeing: Disengage + Dash action. DC 12 Athletics or one free attack as you run.\nRewards: 15 XP per draconian. Satchel on patrol leader: sealed dispatch pouch.\nVictory: Road clear. Aldric claps your shoulder. 'I did not expect that.' Proceed to Scene 27.\nFallen (0 HP): 0 HP. Aldric drags you clear and stabilises you. Proceed to Scene 27 with 1 HP, one exhaustion."},{"type":"info","text":"**BAAZ DRACONIAN (CR 1/2)** AC 13 | HP 18 | Speed 30 ft.\nAttacks: Shortsword +3, 1d6+1 piercing. Javelin +3, range 30/120 ft., 1d6+1 piercing.\nSpecial: Death Throes: Stone at 0 HP. Creature within 5 ft. DC 10 DEX save or restrained 1 min."}],"choices":[{"letter":"A","text":"The draconians are stone. Continue to Scene 27.","target":"27","points":{}}]},"27":{"id":"27","title":"AFTER THE AMBUSH","location":"","prose":["*South Road*","Four Baaz, stone now. The dispatch pouch from the patrol leader bears a Black Wing seal. This is an advance element. They were mapping the road to the garrison. Aldric looks at you with a new calculation in his eyes."],"boxes":[{"type":"info","text":"**TRACK YOUR HP**\nAfter the ambush: update your current HP on your sheet. Native PC starting HP: Fighter 12, Paladin 10. Each Baaz hit deals 1d6+1 (average 4). CPC: record any HP lost. Rest opportunity before Scene 27 if you need it."},{"type":"levelup","text":"**LEVEL UP — YOU ARE NOW LEVEL 2**\nNew Features: Fighter: Action Surge (extra action, 1/short rest). Choose Archetype: Champion (Improved Critical 19-20), Battle Master (4 Superiority Dice d8, 3 manoeuvres), or Eldritch Knight (2 cantrips, 2 1st-level spells, 2 spell slots). Paladin: Fighting Style (Dueling, Great Weapon, or Protection). Spellcasting: 2 first-level slots. Choose 2 spells from: Bless, Command, Cure Wounds, Detect Evil and Good, Divine Favour, Protection from Evil and Good. Divine Smite now available: on a hit, expend a spell slot to add +2d8 radiant damage.\nSpell Slots / HP: Native PC — Fighter: HP +7 (total 19). Paladin: HP +6 (total 16). CPC: add your Level 2 HP roll (1d10+CON for Fighter, 1d8+CON for Paladin) to your sheet.\nRecord this on your character sheet before continuing."},{"type":"info","text":"**PALADIN — DIVINE TRACK**\nBefore making your choice below, Paladins turn to Scene P1 (The First Sign) now. It occurs this same night — you are on watch and something happens. After P1 and DG1, return here and choose your path forward."},{"type":"info","text":"**OPTIONAL SCENE — THE WAYPOINT FIRE**\nThe night after the ambush, on the road back: there is someone at the waypoint mile-marker who should not be there. If you want to investigate, turn to Scene 27B now. Scene 27B introduces Lysander Graves. It leads to Scene 36."},{"type":"info","text":"**DARK SCENE — SCENE 32B**\nScene 32B (What the Army Left Behind) is available now. It depicts what the Dragon Army did in the village of Thresh — you will find it before Scene 31. It leads to Scene 36. NOTE: Vael Ashmore appears in 32B."}],"choices":[{"letter":"E","text":"Turn to Scene 32B now — what the army left in Thresh.","target":"32B","points":{}},{"letter":"A","text":"Turn to Scene P1 now .","target":"P1","points":{}},{"letter":"B","text":"Take the dispatch immediately to Lord Caeron.","target":"31","points":{"CROWN":2}},{"letter":"C","text":"Read it yourself first.","target":"31","points":{"ROSE":1,"CROWN":1}},{"letter":"D","text":"Hide it and find the nearest refugee camp.","target":"44","points":{"ROSE":1}},{"letter":"F","text":"Investigate the stranger at the waypoint fire (Scene 27B)","target":"27B","points":{}}]},"27B":{"id":"27B","title":"THE WAYPOINT FIRE","location":"","prose":["*South Road — Night After the Ambush*","You find him at the waypoint mile-marker, which the garrison uses for overnight stops on extended patrols. A fire, built well — the economical kind that throws heat in one direction and minimal light in every other, the fire of someone who knows what sees fire in the dark. A man sitting against the marker stone, cleaning a blade. He looks up when you approach without alarm, which means he heard you a hundred yards ago and decided you were not a threat.","The blade is not regulation. Solamnic steel, yes — you recognise the fuller line — but the grip has been rewrapped in dark leather, and the crossguard has been modified. The armour, too: Solamnic issue, Knight of the Sword markings half-filed and then left, as if the filing was an impulse he reconsidered or an argument he abandoned.","There are two dead Baaz Draconians at the tree line. They are very recently dead. He did this alone.","'You are from Brightholm,' he says. Not a question. He has seen your tabard. 'Squires.' He looks at Aldric, then at you, the assessment of a professional cataloguing what he is working with. 'How many did you fight today?' You tell him. Four. He nods. 'I had two. They are getting sloppy or I am getting faster. Both are bad signs, for different reasons.'","'Sit,' he says. 'The road is clear for two miles and I have more food than one person needs. That is not generosity — it is logistical efficiency. I stole it from a Dragon Army supply drop an hour ago and it is going to spoil.'","He eats the way soldiers eat — fast, without tasting it, the habit of someone who has been eating between things for long enough that meals have become fuel rather than events. Between bites he tells you, without being asked, that he has been on the south road for three weeks. Alone. He has killed more draconians in that time than most patrols. He has reported none of it because there is no one to report it to, or rather there is, but the report would involve explaining why he is here and who sent him and the answer to both is: no one.","**CONVICTION CHOICE (Lysander Corruption Track — Experience 1):**","**ROMANCE CHOICE (optional — after conviction choice):**"],"boxes":[{"type":"companion","text":"**COMPANION JOINS: LYSANDER GRAVES**\nKnight of the Sword — technically. Currently operating as an independent. He is brilliant, charismatic, and carrying something he has not set down in years. Possible love interest — the dangerous kind.\n**Role:** Combat instructor: once per Act, Lysander teaches you a technique. +1 to your next attack roll after receiving instruction."},{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 12\n**SUCCESS (roll 12+):** The half-filed insignia. He started removing his Order markings and stopped. Not because he changed his mind about leaving — his body language is clear: he has left. He stopped filing because erasing it felt dishonest. He earned it. He does not want to serve under it. He does not want to pretend he never wore it. This is a man for whom honesty is the last principle standing, and he is holding onto it with both hands.\n**FAILURE (roll 1-11):** He is a Knight, or was. He fights well. That is all you can read in the firelight.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"'You fight like a Knight of the Sword.' 'I fight like a man who was one.'","target":"36","points":{"SWORD":1},"conviction":"QUESTIONING"},{"letter":"B","text":"'The half-filed insignia. You stopped.' 'I stopped.'","target":"36","points":{"ROSE":1},"conviction":"QUESTIONING"},{"letter":"C","text":"'You should report to the garrison. There is a chain of command.' He laughs — genuinely.","target":"36","points":{"CROWN":1},"conviction":"STEADFAST"},{"letter":"D","text":"Say nothing. Share the fire.","target":"36","points":{"ROSE":1},"conviction":"QUESTIONING"},{"letter":"R1","text":"There is something about the firelight and the competence and the half-filed insignia. You notice him differently than you notice other people.","target":null,"points":{},"romance_spark":true},{"letter":"R2","text":"You share the fire. It is what it is.","target":null,"points":{}}]},"P1":{"id":"P1","title":"THE FIRST SIGN","location":"","prose":["*South Road — Night After the Ambush*","You are keeping watch after the ambush. The fire is low. Aldric is asleep. The night is ordinary in every way except one: the wound on your arm — a graze from a javelin you barely noticed during the fight — has stopped bleeding. You look at it in the firelight. The skin is closed. Not healed over days. Closed, as if it were a week old.","You did not do this. You do not have magic like this. Not yet. There is no spell, no prayer, nothing you can point to as a cause. Just: you were hurt, and now you are less hurt than you should be.","You sit with this for a while. Then you decide what it means:"],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nFighters: skip to Scene 27 or wherever the story sends you next. Paladins: read this scene before continuing."},{"type":"divine","text":"**DIVINE SIGN**\nThe wound is closed. The night is still. Somewhere very far away, something is paying attention to you. It does not feel like a threat. It does not feel like a gift either. It feels like: a gaze. Patient. Vast. Waiting to see what you do next."}],"choices":[{"letter":"A","text":"A sign of protection from a god of good and law — silver light, a guardian's gaze.** Mark 1 tally: PALADINE.","target":"DG1","points":{"ROSE":1}},{"letter":"B","text":"A sign from a god of battle — the warrior's body sustained so it can fight again.** Mark 1 tally: KIRI-JOLITH.","target":"DG1","points":{"SWORD":1}},{"letter":"C","text":"A sign from a god of healing — the body made whole by something that values wholeness.** Mark 1 tally: MISHAKAL.","target":"DG1","points":{"ROSE":1}},{"letter":"D","text":"A sign from a god of nature — living things mend; this is just that, applied.** Mark 1 tally: HABBAKUK.","target":"DG1","points":{"ROSE":1}},{"letter":"E","text":"You are not sure what it means. Mark nothing. Carry the question.","target":"DG1","points":{"ROSE":1}}]},"DG1":{"id":"DG1","title":"THE WHISPER IN THE WOUND","location":"","prose":["*South Road — Night After the Ambush (Paladin Only)*","The wound is closed. That is what you know. What you do not know is what closed it. You are sitting alone at the edge of the firelight when you first hear it — not a voice exactly, more like the shape a voice leaves behind. Something that knows your name and the weight of your ambitions and has been waiting for a moment when you were alone and questioning."],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nThis scene occurs the same night as P1. Read P1 first. Then read this. Fighters: skip to Scene 28."},{"type":"dark","text":"**DARK TEMPTATION — TAKHISIS WHISPERS**\nYou have been chosen. Not by your little gods of law and healing — by something older. Something that does not ask you to serve. That wound? I closed it. Not them. I saw what you could become and I preserved it. Your gods of good ask you to give. I offer you to take. The Dragon Armies will reshape this world. You could reshape them. One word is all it needs. One small yes."}],"choices":[{"letter":"A","text":"Refuse. Directly, clearly, with the Oath. You know what this is.","target":"DG1_held","points":{}},{"letter":"B","text":"Refuse but you are shaken. The voice knew things.","target":"DG1_shaken","points":{}},{"letter":"C","text":"Ask who is speaking. Not agreement — but you engage with it.","target":"DG1_listen","points":{}},{"letter":"D","text":"The wound is real. The help is real. You do not say yes — but you do not say no.","target":"DG1_silent","points":{}}]},"DG1_held":{"id":"DG1_held","title":"THE REFUSAL","location":"","prose":["*South Road — The Same Night*","The voice does not argue. It simply goes. That is what tells you it was real — a voice inside your head would have argued. This one left clean, the way things leave when they have been told no by someone who means it. You sit with the silence for a while. It smells of cold pine and the road and something faintly metallic that might be the aftermath of a divine voice or might just be the night air near a weapon."],"boxes":[{"type":"dg_track","text":"**DG TRACK: HELD**\nYou have refused the first temptation cleanly. Mark HELD on your God Sign notes. This choice compounds — each refusal makes the next easier."}],"choices":[{"letter":"A","text":"Continue to Scene 28.","target":"28","points":{}}]},"DG1_shaken":{"id":"DG1_shaken","title":"THE SHAKEN REFUSAL","location":"","prose":["*South Road — The Same Night*","You said no. That matters. But it knew your name. It knew about the ambition you have not told anyone — the one that lives just under the dedication, the one that might be what actually drives you. You cannot sleep. Somewhere between watch changes you make yourself say the Oath aloud, quietly, to no one. Just to hear it in your own voice. Just to check it is still yours."],"boxes":[{"type":"dg_track","text":"**DG TRACK: HELD (SHAKEN)**\nYou refused, but the temptation landed. Reduce your highest god tally by 1 — the doubt is real. The Dark Queen will find the crack next time."}],"choices":[{"letter":"A","text":"Continue to Scene 28.","target":"28","points":{}}]},"DG1_listen":{"id":"DG1_listen","title":"THE FIRST STEP","location":"","prose":["*South Road — The Same Night*","You asked. The voice told you: Someone who sees what you are capable of. Then it went quiet, not because you refused it but because it had planted what it wanted to plant. You will think about this in the morning. You will tell yourself you were just gathering information. You will almost believe it."],"boxes":[{"type":"dg_track","text":"**DG TRACK: LISTENING ■**\nYou engaged. This is not a fall — yet. But Takhisis does not need agreement. She needs attention. You have given her yours. Mark LISTENING. If you reach FALLEN by DG3 without recovery, your divine abilities are affected."}],"choices":[{"letter":"A","text":"Continue to Scene 28.","target":"28","points":{}}]},"DG1_silent":{"id":"DG1_silent","title":"THE SILENT COMPROMISE","location":"","prose":["*South Road — The Same Night*","You did not say yes. But you let the silence be the answer, and the voice heard that silence the way it was listening for — not as refusal. In the morning the wound is still closed and you are still yourself and the world is still the same world. Almost.","*End of Act One.*","The field exercise has become something far more serious. The 'bandits' are refugees. The Dragon Army has a scout presence within two hours. Scenes 28-52 cover the refugee crisis, a major command decision, two more combat encounters, and the aftermath that defines your Order path. Paladins: Paladin Scene P2 is in Act Two."],"boxes":[{"type":"dg_track","text":"**DG TRACK: COMPROMISED ■■**\nSilence was acceptance enough. Mark COMPROMISED. Your Lay on Hands pool is reduced by 2 HP until you find recovery. The connection to your true god has been partially muffled."}],"choices":[{"letter":"A","text":"Continue to Scene 28.","target":"28","points":{}}]},"28":{"id":"28","title":"WHAT CAERON LOOKS FOR","location":"","prose":["*Castle Brightholm — Armoury*","'Someone who can hold two truths at once — that the law matters and that people matter more. Most can only hold one.'","He says it the way someone says a thing they have thought about very carefully and arrived at through experience rather than reading. You have the sense that this answer cost him something — that there was a version of Lord Caeron Ashvale who could only hold one truth at a time, and the version in front of you is the result of learning, painfully, to hold two."],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nHe meets your eyes with unusual directness. 'Ask me something harder.'"}],"choices":[{"letter":"A","text":"'What do you do when your orders conflict with your conscience?'","target":"29","points":{"ROSE":2}},{"letter":"B","text":"'What made you a knight rather than a lord?'","target":"29","points":{"ROSE":1}},{"letter":"C","text":"Thank him and leave.","target":"31","points":{"CROWN":1}}]},"29":{"id":"29","title":"CAERON'S ANSWER","location":"","prose":["*Castle Brightholm — Armoury*","He says it when he thinks you are not watching — which means he says it when he thinks the conversation is over and the thing he was holding back while it was not over can now be safely set down. 'I became a knight because being a lord meant staying behind walls when the bad things came.' A pause while he examines the hilt of his sword. 'I have not always been correct about what constitutes a bad thing. That is something I have had to learn at intervals. I prefer not to keep learning it.'"],"boxes":[{"type":"roll","text":"**OPTIONAL ROLL:** Insight (WIS, proficiency if trained) (+1) | WIS | DC 15\n**SUCCESS (roll 15+):** He is describing a specific incident, not a general philosophy. There is a moment in his past where he made a command decision he still questions — not the same as Aldous's, but adjacent. If you note this and ask carefully in a later scene, he will tell you what it was.\n**FAILURE (roll 1-14):** He is speaking generally. The history behind the words is not visible.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Leave quietly.","target":"31","points":{"ROSE":1}},{"letter":"B","text":"'I think you are more correct about it than you believe.'","target":"31","points":{"ROSE":1},"romance_spark":true}]},"30":{"id":"30","title":"WHO IS CAERON","location":"","prose":["*Castle Brightholm*","Third son of a minor noble house, passed over for inheritance. Became a knight because there was nothing else and found out he was exceptional at it. His house considers knighthood beneath them. He considers them beneath the Measure.","What you piece together: the armour he wears is paid for out of his own salary, not the family estate. The saddle on his horse is older than most of the garrison squires. He does not mention his family. No one who knows him mentions it either — which tells you something about how that subject was closed. A man who chose this life at real cost, and will not let it be anything less than exactly what it should be."],"boxes":[],"choices":[{"letter":"A","text":"This makes you respect him differently.","target":"11","points":{"ROSE":1}},{"letter":"B","text":"This makes you understand him. There is a difference.","target":"11","points":{"CROWN":1},"romance_spark":true}]},"31":{"id":"31","title":"THE HIGH JUSTICE ARRIVES","location":"","prose":["*South Road Camp — Day 2*","He rides in with six escort soldiers and the expression of a man carrying something heavy that he did not choose to carry. The decree is formal — sealed, High Justice mark, legally binding and structurally unambiguous. He reads it out in the field camp: The refugee group is to be turned back south. Roads must remain clear for military movement. Crown law overrides field commander discretion. Thirty people. Families. Two wounded from yesterday. The Dragon Army, on a map, is approximately one day south of where they will be sent."],"boxes":[{"type":"info","text":"**DRAGONLANCE CAMEO — LORD GUNTHAR UTH WISTAN**\nThe High Justice who arrives with the decree is Lord Gunthar uth Wistan, Grand Master of the Knights of Solamnia. He is a man of genuine honour caught between the law he serves and the world that law was written for, and they are no longer the same world."},{"type":"roll","text":"**ROLL REQUIRED:** Persuasion (+0) | CHA | DC 15\n**SUCCESS (roll 15+):** You find wording in the decree permitting a 24-hour field assessment delay. Caeron approves. The refugees have time. +2 ROSE, +1 CROWN.\n**FAILURE (roll 1-14):** The decree is airtight. You must choose: comply or refuse.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"info","text":"**OPTIONAL SCENE — THE OBSERVER**\nA woman arrived with Lord Gunthar's escort who is not part of it. If you want to meet her, turn to Scene 31B (The Observer) now. Scene 31B introduces Tariel Duskmantle."},{"type":"dark","text":"**PALADIN — DARK TEMPTATION TRACK**\nTonight, Takhisis speaks again. Before making your choice below, Paladins with the DG track active turn to Scene DG2 (The Offer) now."}],"choices":[{"letter":"A","text":"Comply. The decree is the law.","target":"46","points":{"CROWN":3}},{"letter":"B","text":"Ask Caeron privately if he believes it is right.","target":"47","points":{"ROSE":2}},{"letter":"C","text":"Refuse outright.","target":"48","points":{"ROSE":3}},{"letter":"D","text":"Use the dispatch pouch from Scene 27 as leverage.","target":"49","points":{"ROSE":2,"CROWN":1}},{"letter":"E","text":"Meet the diplomatic observer who arrived with the escort (Scene 31B)","target":"31B","points":{}},{"letter":"F","text":"Paladin: Takhisis speaks again (Scene DG2 — The Offer)","target":"DG2","points":{}}]},"31B":{"id":"31B","title":"THE OBSERVER","location":"","prose":["*South Road Camp — Day of the High Justice's Arrival*","She arrives with Lord Gunthar's escort, though she is clearly not part of it — positioned at the rear, riding a civilian horse, wearing no insignia. Her credential, when Caeron examines it with the unhurried scepticism he brings to all documents, identifies her as a diplomatic observer from the eastern provinces, authorised by the Council of Whitestone to monitor Solamnic field operations during the current crisis. The credential is genuine. Caeron's expression when he hands it back suggests he wishes it were not.","Tariel Duskmantle dismounts with the easy competence of someone who has been in considerably more militarised situations than this and adjusted to each of them within the hour. She surveys the camp — not the defences, which she clearly assessed on approach, but the people. How they stand. How they respond to Gunthar's presence. How the squires look at the knights and the knights look at the decree and the decree looks at the refugees and no one is looking at the same thing.","Then she looks at you. Not past you to Aldric, or through you to Caeron. At you. With the particular attention of someone who has identified the interesting person in the room and intends to have a conversation with them whether they like it or not.","'The decree,' she says, when she finds you after the reading. No preamble. 'Thirty people sent south into the path of the army that displaced them. The Measure permits this?'","**CONVICTION CHOICE (Tariel Corruption Track — Debate 1):**","**ROMANCE CHOICE (optional — after conviction choice, if you chose A or C):**"],"boxes":[{"type":"companion","text":"**COMPANION JOINS: TARIEL DUSKMANTLE**\nDiplomatic observer. She is watching everything. She will share her observations if you engage with them — and her observations will make you uncomfortable.\n**Role:** Political intelligence: +1 to any Persuasion or Insight check involving authority figures if you consult her first."},{"type":"roll","text":"**OPTIONAL ROLL:** Persuasion (CHA) (+0) | CHA | DC 14\n**SUCCESS (roll 14+):** You articulate a response that accounts for the Measure's tension between law and protection. +1 to all future Tariel interactions.\n**FAILURE (roll 1-13):** 'The standard answer,' she says, without contempt.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"'The Measure does not permit it. The decree does. There is a difference.'","target":"31","points":{"ROSE":2},"conviction":"QUESTIONING"},{"letter":"B","text":"'The Measure is imperfect. All law is imperfect. That does not make it worthless.'","target":"31","points":{"ROSE":1,"CROWN":1},"conviction":"STEADFAST"},{"letter":"C","text":"'You are right. The Measure failed those people. I do not know how to reconcile that.'","target":"31","points":{"ROSE":1},"conviction":"SHAKEN"},{"letter":"D","text":"'You are an observer. Observe.'","target":"31","points":{"CROWN":1},"conviction":"STEADFAST"},{"letter":"R1","text":"Hold her gaze a moment longer than the argument requires.","target":null,"points":{},"romance_spark":true},{"letter":"R2","text":"Do not.","target":null,"points":{}}]},"DG2":{"id":"DG2","title":"THE OFFER","location":"","prose":["*Field Camp — Night of the Refugee Decree (Paladin Only)*","Thirty people. The decree in one hand. The Measure in the other. Tomorrow you will have to choose — follow the law that is supposed to protect people but tonight is asking you to destroy them, or break it. You are still awake at the second watch when the voice returns. It sounds different this time. Patient. Almost kind."],"boxes":[{"type":"info","text":"**PALADIN ONLY**\nThis scene triggers after Scene 31 (The High Justice Arrives), on the night before you must act on the decree. Fighters: skip to Scene 36."},{"type":"dark","text":"**DARK TEMPTATION — TAKHISIS WHISPERS — THE SWEET OFFER**\nYou see the problem with your little code? The law is wrong and you know it and you have to obey anyway or break it and be punished. I am offering you a third path. Serve me — just this once — and those thirty people live. I will arrange it. No one will be punished. The decree will be satisfied. The refugees will disappear from the road in a way no one questions. All it costs is this: you carry my mark. Just a small one. No one will know but you."}],"choices":[{"letter":"A","text":"No. You will find your own way to protect them, inside the Measure or outside it. The answer is no.","target":"DG2_held","points":{}},{"letter":"B","text":"No — but you ask how she would arrange it. Just information.","target":"DG2_listen","points":{}},{"letter":"C","text":"You ask for a day to think.","target":"DG2_delay","points":{}},{"letter":"D","text":"You accept. The refugees will be safe. That is what matters.","target":"DG2_fall","points":{}}]},"DG2_held":{"id":"DG2_held","title":"THE REFUSAL — SECOND TIME","location":"","prose":["*Field Camp — The Same Night*","The voice goes. You are alone with the decree and thirty people and no clean answer. This is what the Measure does not account for — the moments when the law fails the people it was written to protect and you are the only person standing between them. You will figure it out yourself. That is the point of the oath. Not to be given the answer. To find it."],"boxes":[{"type":"dg_track","text":"**DG TRACK: HELD FIRM ✓**\nSecond refusal. Your connection to your god strengthens. +1 to your highest god tally (faith proved under pressure)."}],"choices":[{"letter":"A","text":"Continue to Scene 36.","target":"36","points":{}}]},"DG2_listen":{"id":"DG2_listen","title":"THE QUESTION","location":"","prose":["*Field Camp — The Same Night*","She tells you. Casually, as if the answer costs her nothing. The refugees would simply... find another road. One that leads somewhere safe. The decree would be satisfied by their absence from this road specifically. It is, technically, not wrong. You catch yourself thinking: that is actually clever. Then you catch yourself having thought that. You say no. But later."],"boxes":[{"type":"dg_track","text":"**DG TRACK: LISTENING DEEPENS ■**\nYou are reasoning with a dark god. This is dangerous. If already LISTENING: mark COMPROMISED. If first LISTENING: stay at LISTENING but -1 to any one god tally."}],"choices":[{"letter":"A","text":"Continue to Scene 36.","target":"36","points":{}}]},"DG2_delay":{"id":"DG2_delay","title":"THE DELAY","location":"","prose":["*Field Camp — The Same Night*","She takes your pause as what it was — consideration. By morning the refugees are gone from the road. Quietly, without your involvement. The decree is technically satisfied. You did not agree. You just did not say no in time. That distinction matters. It also does not matter at all. Your Lay on Hands heals. The healing feels the same. You test it three times to be sure."],"boxes":[{"type":"dg_track","text":"**DG TRACK: COMPROMISED ■■**\nShe acted on your silence. The debt is recorded even if you didn't sign it. Your Lay on Hands pool is reduced by 3 HP. You are aware of a faint wrongness when you use it."}],"choices":[{"letter":"A","text":"Continue to Scene 36.","target":"36","points":{}}]},"DG2_fall":{"id":"DG2_fall","title":"THE FIRST FALL","location":"","prose":["*Field Camp — The Same Night*","The refugees are safe. You told yourself that is what matters. You still believe this. But there is something different about the divine warmth in your hands now — not absent, not cold, but filtered. As if it is coming through something. The healing works. The prayers feel answered. But there is a quality to the answer that is new and you cannot quite name what the quality is."],"boxes":[{"type":"dg_track","text":"**DG TRACK: FALLEN ■■■**\nYou have accepted the Dark Queen's help with full awareness. This is recoverable — but only through Scene DG4 (The Reckoning). Until recovery: Lay on Hands heals half normal HP (round up). Divine Smite does full damage but leaves a faint shadow-bruise on targets. Your god tallies are frozen until you recover."}],"choices":[{"letter":"A","text":"Continue to Scene 36.","target":"36","points":{}}]},"32B":{"id":"32B","title":"WHAT THE ARMY LEFT BEHIND","location":"","prose":["*South Road — Abandoned Village of Thresh, Day 2*","You smell it before you see it. Woodsmoke that has been burning too long. The village of Thresh is eight buildings around a well and it is mostly still standing, which is worse than if it had burned. What the Dragon Army did here did not require fire.","There are bodies. The Dragon Army did not take prisoners here — or they took some and left the rest as a message. The message is: this is what happens when you do not comply quickly enough. The village elder is still at his table. The door is still open. Someone's dog is still waiting outside a house whose occupants are not coming back. The well has been fouled. This was not a battle. This was an afternoon's work.","There is one survivor. An old woman sitting behind the mill, uninjured, who watched from there and who has not spoken since."],"boxes":[{"type":"info","text":"**VAEL ASHMORE**\nVael Ashmore is already here. If you have not read Scene 5B, this is where you meet her. She was scouting ahead. She found this first. She has been standing here for a while."},{"type":"info","text":"**DARK SCENE — This scene contains depictions of war atrocities.**"},{"type":"romance","text":"**ROMANCE MOMENT**\nVael does not cry in front of you. Later — when you make camp and she thinks you are asleep — you hear her. It is brief and very quiet and when it stops she is silent for a long time. You do not tell her you heard. But in the morning you make sure you are the one who brings her water, and she takes it without looking at you, and that is also a kind of closeness."},{"type":"roll","text":"**OPTIONAL ROLL:** Investigation (INT, proficiency if trained) (+3) | INT | DC 12\n**SUCCESS (roll 12+):** Four days ago — but the supplies show three days of consumption after the army passed. Some people survived the initial visit and stayed or left afterward. The casualty count is lower than it first appears.\n**FAILURE (roll 1-11):** The village shows you what happened. You cannot read more than the obvious.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"}],"choices":[{"letter":"A","text":"Bury the dead before you move on.","target":"36","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"Get the survivor moving north.","target":"36","points":{"SWORD":1,"CROWN":1}},{"letter":"C","text":"Find something to mark the place.","target":"36","points":{"ROSE":1}},{"letter":"D","text":"Report the coordinates to Caeron. Document it precisely. This is evidence.","target":"36","points":{"CROWN":2,"ROSE":1}},{"letter":"E","text":"Lysander wants to talk philosophy (Scene 36B)","target":"36B","points":{}}]},"34B":{"id":"34B","title":"WHAT SCOUTS DO BEFORE A MARCH","location":"","prose":["*Field Camp — Night Before Moving the Column*","The watch at midnight has its own texture: coals where the fire was, stars very bright, the camp breathing in the slow rhythm of people genuinely asleep. Sera finds you here not because she was assigned this post but because she walked the perimeter and here is where she ended up. She sits a foot away and does not speak for a while.","She has been doing reconnaissance on the south road and what she found she has already reported. What she has not reported is what it did to her. She has the flat stillness of someone who has been holding something at arm's length all day and is now, in the dark, letting themselves feel the weight."],"boxes":[{"type":"romance","text":"**ROMANCE MOMENT**\nShe does not ask for anything. She is simply — present. Near you. After a while her shoulder finds yours and stays there. That is all. It is not nothing."}],"choices":[{"letter":"A","text":"Stay still. Let her have the silence she came here for.","target":"51","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"Ask quietly: 'What did you find out there?'","target":"51","points":{"ROSE":1}},{"letter":"C","text":"Cover her hand with yours for a moment. No words.","target":"51","points":{"ROSE":2},"romance_flame":true}]},"36":{"id":"36","title":"WOUND AND TRUST","location":"","prose":["*South Road — Abandoned Barn, Night*","The barn smells of old hay and damp and the copper-salt note of a wound managed without proper materials. You work by lantern light. Serath watches you work with the careful attention of someone building a file on you in real time. They do not speak while you work. When it is done: 'You did not have to do that.' Not gratitude. Not manipulation. An honest observation."],"boxes":[{"type":"roll","text":"**ROLL REQUIRED:** Medicine (+1) | WIS | DC 12\n**SUCCESS (roll 12+):** Clean technique. Serath will be mobile by morning. +1 to all Serath trust checks.\n**FAILURE (roll 1-11):** Adequate work. They will be slow for two days.\n*No dice? Flip a coin: Heads = pass | Tails = fail*"},{"type":"romance","text":"**ROMANCE MOMENT**\n'You could still report me,' Serath says. 'I want you to know I understand that.' Not manipulation. Just honesty."}],"choices":[{"letter":"A","text":"'I know. I am not going to.'","target":"50","points":{"ROSE":2},"romance_flame":true},{"letter":"B","text":"'I have not decided yet. But I treated the wound first.'","target":"50","points":{"ROSE":1}},{"letter":"C","text":"'Tell me something the Dragon Army is planning. For the people in its path.'","target":"50","points":{"SWORD":1}}]},"36B":{"id":"36B","title":"LYSANDER'S PHILOSOPHY","location":"","prose":["*South Road — Camp, Night (Conditional: Lysander in party)*","He finds you at the edge of the firelight. He is sitting on a rock with his modified sword across his knees and the stillness of someone who has been sitting like this for years
